body:
  text: 祝太常簡一十二首張子羽三首朱諌議之才一十七首劉內翰著二十四首施內翰宜生四首朱葭州自牧二十首孫內翰九鼎一首劉修撰彧二首趙內翰可三首劉西嵓汲一十首劉內翰瞻三首郝內翰俁二十首張郾城公藥三首任南麓詢九首馮臨海子翼七首史明府旭三首邊內翰元鼎四十二首李丞旨晏七首王都運寂七首蓮峯真逸喬扆一首祝太常簡簡字廉夫單父人宋末登科國初倅某州仕至朝奉郎太常丞兼直史館有嗚嗚集行於丗其詩說有云豫政和丁酉任洺州教官是時括蒼鮑慎由欽止出所注杜詩說天王守太白守讀如狩於河陽之狩髙秋登寒山南望馬邑州馬邑州在城州界豫撿唐書志寶應元年徙馬邑州于鹽井城欽止為有據矣舊注馬邑屬鴈門與杜子美作詩處全無關涉後人遂謂王源叔謬於牽引不知源叔𥘉不注杜詩豫識其孫彥朝彥朝不說杜詩非其大父注蓋彥朝不學見流俗皆讀舊注因而認有可歎可歎好問常以此問趙禮部趙云廉夫前輩必不妄試更考之今日見吳彥高東山集有贈李東美詩引云元祐閒祕閣校對黃本鄧忠臣字愼思余柳氏姨之夫今丗所注杜工部詩乃愼思平生究竭心力而為之者鏤板家標題遂以託名王源叔翰林兩王公前後記初無一語及此注而後記又言如源叔之能文止作記於後則源叔不注杜詩為可見矣舉丗雷同無為辨之者宣和近貴李東美有才藻善行書且喜作小楷所寫杜集精密遒麗有足嘉賞為作古詩一篇紙尾因記鄧公事後人聞此其誰不疑然豫少時目擊不可不識姑以告李侯非求信後人也彥髙此說正與廉夫合近歲得浙本杜詩是源叔之孫祖寧所傳前有序引備言其大父源叔未嘗注杜詩廉夫彥髙益可信故併記於此廉夫詩甚工如賦雪云雲屋無寒夢油燈有細香書懷云白髮渾無賴朱顔更不回遮眼細書聊引睡扶頭濁酒最關情此類甚多舟次丹陽船頭東下趂晨鍾船外清霜氣暗通斷鴈聲歸煙靄裏孤帆影落月明中隋河波浪千年急梁苑池臺一旦空試問碧堤無限柳敗條衰葉幾秋風下第魚臺東寺病眼逢花亦倦開流鶯飛去悮相猜多情却愛僧堂燕才得春風却再來靑奴名實於人不可誣馬牛我亦受人呼丗閒物化多難曉誰為此君為此奴雜詩雨後淸寒滿袖風鴈聲南去暮雲濃秋來𣏌菊能多少欲助盤餐自不供榴花嬌欲鬪羅裙石竹開成碎纈文更有戎葵亦堪愛日烘紅臉酒初醺虛極齊獨坐虛齊長鋏短燈檠明月當窗夜氣淸却掩塵編時閉目胡床獨坐聽秋聲相國寺鍾寒雞縮頸未鳴晨巳聽舂容入夢頻未必佛徒知警悟秪能喚起利名人春日鶯語相喧浩蕩春落花細點禁街塵遊絲飛絮狂隨馬遲日和風欲醉人夏雨電掣雷轟雨覆盆晚來枕簟頗冝人小溝一夜水三尺便有蛙聲喧四鄰和常祖命二首著書不得自名家卷裏蠅頭散眼花未用一杯張翰酒正須七碗玉川茶操筆文章學古風生平羞與腐儒同相如雖有凌雲賦不及東方射守宫撿旱草樹連雲緑間黃年飢村落自荒凉晚蟬抱樹聲聲急野菊迎人細細香張子羽子羽字叔翔東阿人馬定國薺堂集載其師友六人其一香嚴可道上人題比陽道邊僧舍云山頭翠色僧房靜山下紅塵客路長五月行人汗如雨豈知髙處有清凉其一鮮于可字東父蜀嘉州人從祖侁父之武皆有名於時東父詩有小雨潤履綦花氣襲芳襟十里靑山堪布屐半篙春水巳勝舟之句其一髙鯤化字圖南平原人少有能詩聲如盤中酒影金蛇活與流虹聚石矼之句皆竒怪不凡其一王景徽字彥美祁國文獻公溥之後贈定國詩云㵎下松杉巳蔽牛溪中蘋藻可供羞故鄉未有終焉計欲指吳山歸去休其一吳縯字子長東平人文肅公奎之孫年三十以食貧暫仕即歸隱于魚山狼溪之側寄定國云情馳夏日流目斷晚雲碧新詩從何來逺自金馬客雄深作者意奔軼古人迹名髙四海望髮未一莖白應嗤窮途士抽簪老泉石采蕨在南山驅牛向東陌勞生豈不苦衣食迫晨夕膏粱無宿懷茅茨得真適卒歲將何求一飽惟力訪國城石氏云昔我訪君處樹凉炎暑收今君訪我來城空殘雪留經時少乘興兩至皆空投茅茨隔溪上車馬度城頭不聞機杼聲但聽溪水流向來方圎翁曽伴此中遊近聞大梁至京塵滿衣裘相思懶歸步落日風颼颼山居云西首魚山崦北連黃石祠崇岡在東南我家山北陲地僻少人事終朝掩柴扉尊酒不常得書卷聊自怡春風數日來處處生蕨薇寸心復何纍一飽良可期當年終南人捷徑以貽譏知我無心者豈顧悠悠辝擬淵明貧居云淒其歲云暮北風無時休晨興倦薪水夜寐乏衾裯缺月正裴回宿鳥頻啁啾欲無憔悴歎奈此霜霰秋松楸脫兵火環堵且淹留閉門念袁安守賤弔黔婁坐讀貧士詩吾乃淵明儔溪上招王仲先云幽居復何為冬來性成懶柴門俯淸溪寸步出亦罕今晨偶携杖愛此晴日暖寓目隨所之行到南溪畔背隂雪猶積向暖冰全冸搘頥卧石上仰靣蒼崖斷泉聲何從來乍喜兩耳換平分意甚遲斗落勢方悍坐來百慮忘還惜日景短塵寰多憂虞中林足間散故人戀明時歸休苦遲緩幅巾來何時臨流話幽欵叔翔亦其一也定國謂叔翔於文章無所不能嘗仕國朝官洛陽云遊龍門訪潜溪僧舍入谷訪精舍鍾聲先逺聞陽光時翳竹泉脉俄當門山僧禁足久瞑目誦微言要知鹿臺寺但指山頭雲䇿杖御栝西幽蘭秀荆榛風煙浩難及薄暮花紛紛宿寶應重嵓煙靄合寶閣春風暮山深月影遲坐久識歸路伊昔府中彥征驂同夜駐徂年能幾時變滅等驚霧禪房伴茗飲豈待酒中趣卧來淸不寐瘦鶴警宿露㴝明覓舊題松間宛如故又作巳復等驚霧壽張和滑益之理髮秋庭趂夕陽靜中誰可共傳觴雲橫故國三年别水繞孤村六月涼病眼只貪書味永渴心頻夢橘奴香魚山早有終焉計少日應容解印章朱諌議之才之才字師美洛西三鄉人宋崇寧閒登科入齊為諌官坐直言黜為泗水令尋乞間退寓居嵫陽因而家焉昆弟數人皆有文名師美自號慶霖居士有霖堂集傳於丗如云魯甸分鴻影齊山入馬蹄門靜堪羅雀書成不換鵝雨過好花紅帶潤日長嘉樹緑移隂此類甚多子瀾字巨觀南越行南越太后邯鄲女皓齒明眸照蠻土珊瑚為帳象作床錦繖髙張擊銅鼓太液池內紅芙蓉自憐謫墮蠻煙中灞陵故人杳無耗深宫獨看南飛鴻隨兒作帝心不願惟願西朝柏梁殿茂陵劉郎亦可人遣郎海角來相見金猊夜燎龍涎香明珠火齊爭煌煌番禺秦甸隔萬里今夕得遂雙鴛鴦白首相君佩銀印干戈欲起蕭墻釁莫言女子無雄心置酒宫中潜結陳漢家使者懦且柔纎手自欲操霜矛孤鸞竟落老梟手可憐空奮韓千秋樓船戈鋌師四起或出桂陽下灕水越郎追斬吕嘉頭九郡同歸漢天子尉他墳草幾畨靑霸業猶與炎洲撗玉璽𥘉從真定得黃屋却為邯鄲傾五羊江連湘浦竹嬌魂應伴湘娥哭後薄薄酒薄酒可以謀醉不必霞滋玉味麁布可以御冬不必狐貉䝉茸醜婦可以肥家不必楚女吳娃獨夫長夜商祚訖羲和湎淫紊天曆李白跌宕三百杯阮籍沈醟六十日眠瓮吏部寡廉恥解貂常侍隳法律儻使飲薄酒未見有此失秦昭狐腋幾喪首鄭藏鷸冠貽厥咎尨裘金玦豈不哀繡衣朱襮固無取皆緣麁衣惡不御賈禍招譏亦何有夏姬滅兩國驪姬禍五丗捧心顰眉亡夫差墮髻啼粧敗梁兾醜婦似可惡終不至顚沛勸君飲薄衣麁娶醜婦此樂人間最長久薄酒麁衣吾何悲醜婦自醜吾不知道眼混圎宜不二媺惡妍陋無殊歸瓦罍石臼斟吾酒脫粟藜羹皆可口醉境陶然無後憂玉碗浮蛆彼何有漢文天子猶弋綈士服麁布乃所宜要繩屐葛同一暖霞縠冰紈徒爾為無鹽如漆后齊桓孟光舉臼配伯鸞古來傾城由哲婦有德乃令家國安我能遣婦縫麁對婦飲薄傍人大笑吾不惡寓言二首獸有善觸邪草有能指侫獸草非有心不移本天性前王著臣冠俾爾效端鯁如何不稱服觸指反忠正吾欲取二物豢植列臺省一令邪侫徒奔逃亟深屏風雨晦時夜雞鳴有常聲霜雪枯萬幹松柏有常青內守𥘉巳定外變終難更若人求丗利浮沉無定情俯仰效􅥱槹低昂甚權衡反出木鳥下徒為萬物靈謝孫寺丞惠梅華我來泗水上居與墟墓鄰彌望多棗栗礙眼昏荆榛忽忽度歲月不知時巳春朝來佳公子遺我梅花新秀色照窗几妙香襲衣巾莽如瓦礫場驚賭瓊瑶珍念昔客江南千樹臨江津吳儂不知貴但與桃李倫自從墮東土夢繞江之濵嘆彼和鼎實亦復生不辰窮愁坐空山豺虎雜鳯麟此贈意不淺難為俗子陳次韻東坡跋周昉所畫缺申美人巫峽昭君有竒色毛生欲畫無由得但作東風背靣身看來巳可傾人國朝來睡起鬢髮垂手如春笋領蝤蠐繡帷幽夢斷難續想像翠黛顰修眉春光三月濃於酒燕燕雙飛鶯喚友不教膩臉露桃花且喜腰支似楊柳君不見漢宫多病李夫人轉靣不顧君王嗔古來畫工畫意亦自足煙霧玉質何由真暴雨掣電奔雷暗靄間崩騰白雨襲人寒頺山黑霧傾濃墨倒海衝風㵼急湍勢似陽侯夸海若聲如項籍破章邯炎歊一濯須臾耳巳看天圍碧玉寬宿間廄淡煙衰草慵回首晚日殘霞欲斷魂脫帽卸鞍投逆旅蕭蕭黃葉水邊村十月十五日夜作連珠詩四首披衣開戶幾宵興永夜無眠魂九升坐覺飛霜明瓦屋天如寒鑑月如冰天如寒鑑月如冰僵卧家僮喚不譍却憶少年逰太學蕭然獨對短檠燈蕭然獨對短檠燈引睡翻書睡幾曽自笑年來憂患熟跏趺真作坐禪僧跏趺真作坐禪僧不學窗間故紙蠅湛若琉璃含寶月此中無减亦無增卧病有感二十韻臯蘇粲園英澤芝紛水葉赤辨舞纎肌黃𫀆緩老頰鳴飛各有適吾獨嗟衰薾齒髮久巳踈又復失調燮梁肉謝鼎俎參苓富巾篋葵扇風未來桃笙汗初浹呻吟和哀蟬夢寐追化蝶撫枕念平生丗故飽更涉弱齡負竒志胸霓蟠煒曄夜徯傅嵓訪朝待渭濵獵荀爽歲九遷康侯日三接功業著鍾鼎聲名垂史諜那知事大謬舉趾得躓跲多難集暮年百願亡一愜寒灰消寸心淸淚腐雙睫坐令孤鵬騫化作瘴鳶跕憂來復自慰人生幾􅕴莢呼吸過百歲俯仰失千劫乘流須縱櫂遇坎即停楫些語不成騷商歌鼓長鋏復用九日詩韻呈黃壽鵬忽忽天星二十九當年曽醉瓊林酒癸未歲登科弟適二十九年春風射䇿紫垣深猶記靈和殿前柳與君雖異千佛名出入南宫同戶牖春蠶食葉七千人看君運筆如揮帚妙齡忠氣軼衡嵩餘子紛紛真培塿那知晚莭岱陽城白髮蒼顔兩間叟君材有如萬斛舟顧我碌碌才筲斗時窮壯士或飯牛遇合封侯起屠狗東皋有田供王賦天寒且輟扶犂手寂寥圭竇對書冊火冷燈青夜方久先生乘興肯相過亦有青錢沽玉友七夕長短言牛不可以服箱女不可以成章其名則然實豈爾政如箕斗難挹揚河漢特水象安有波浪為津航惟鵲乃巢居詎能上天構橋梁星經有躔次東西永相望今夕復何夕乃謂合并如鸞凰一人唱誕惑萬丗浪令兒女爭猖狂瓠牛載槃何等秩金梭擲地殊荒唐吾命有貴賤吾性本直方探官與乞巧是豈吾所臧何如舉酒邀明月更遣清風屏炎熱星光落盞黃金空露華糝袂真珠滑我方幕天席地醉兀兀癡牛騃女知何物水月有興明月落湖水天淵體俱一浩蕩碧琉璃奩此寒玉璧微風觸湖波合散作六七浮光逐水紋金蛇勢盤詰人心湛寂初與月同淸質外纍一汨之萬態紛殊迹因知養心者無為風浪失劉內翰著著字鵬南舒州皖城人宣政末登進士弟歸朝預銓調碌碌州縣年六十餘始入翰林充修撰出守武遂終于欣州刺史皖城有玉照鄉既老號玉照老人示不忘本云次韻彥髙即事福威看九落筆削在麟經中道亡三鑑危時憶九齡網羅無處避鼙鼓不堪聽身逺遼陽渡