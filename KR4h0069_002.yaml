贈同知王子直中散别時風雪暗龍津一夢經年復見君去國光隂雖易得夾河形勢且平分心如征馬常嘶代身伴秋鴻却渡汾此日一樽難惜醉新年風景舊知聞送鄜州節判任元老罷任東歸二首長塗冰雪歲峥嶸客裏那堪送客行萬里歸心應接淅一樽别酒且班荆春生汶水庭闈近人去雕隂幕府輕欲仗征鴻寄消息地寒不肯過邊城都騎駸駸指汶陽關門應識棄繻郎暮寒煙浪歸期阻細雨簷花飲興長束帶暫為彭澤令曳裾休忤漢梁王邊城情味君應㑹為說無憀與故鄉小雨不出寧海司理㕔吏散庭空鎖碧苔冷官門戶幾曽開踈踈細雨槐華落寂寂虛堂燕子來多病始知窮有鬼獨賢方覺仕無媒故園拋擲奔馳外剛道江山未放回過渾源留别田仲祥同知節使金臺前夢杳無蹤一阻雲山莫計重雙鯉附書常不達兩萍浮海偶相逢燕南落日車分轍代北春風酒滿鍾明日去留牽丗務燈前談笑且從容劉仲規挽辭富貴康強九十春公歸無憾我傷神人間秀氣還嵩岱夢裏行年屬巳辰名姓空留耆舊傳衣冠不見老成人凄凉通德門前路無復青蒲褁畫輪訪山寺僧踏破蒼苔叩竹扃晚晴庭院有餘清幡腰落日紅千颭簷際遙岑翠一撗種秫公田聊卒歲栽蓮僧社擬投名從今興熟頻來往未信齊鍾午後鳴謝吳堡知寨安巨濟贈紙百幅百幅溪箋逺見羞故人佳餉若為酬幸將晚節收魚網未得良工起鳯樓柿葉學書差足慰藝香辟蠹㑹須求揮毫不見雲煙落愚賈操金愧暗投淸河道中暮歸緩轡溪邊喜乍晴夕陽流水浸孤城川平佛塔層層見浪穩商舟尾尾行十里煙霞隨野步兩崖禾黍撼秋聲雨暘雖有豐年兆久客都無地可耕晚泊濟陽江北秋隂一半晴晚凉留與客襟淸水邊畫角孤城暮雲底殘陽逺樹明旅鴈為誰來有信斷蓬如我去無程寥寥天地誰知巳村酒悠然只獨傾冬日擬江樓晚望萬里長空淡落暉歸鴉數盡下樓遲山如駭浪髙玄湧天似寒灰黯淡垂紫塞西撗連統萬黃河東下接汾睢此邦形勢雄今古只與羈人百不宜對雪寂寂袁安舍柴門雀可羅靑旃無舊物黃竹有新歌罷飲瓢仍棄供吟筆旋呵殷勤掃荒徑尚憶子猷過郊行緩轡尋春水一涯最憐朝雨浥輕沙小溪煙重偏冝柳平野雲垂不礙花靑眼步兵元好酒黑頭江令未還家興長不覺歸來晚過盡城頭陳陳鴉和郭仲榮郡城秋望城髙野闊思何窮人在西風一笛中樓影不搖溪水淨舂聲相答暮山空海天引望能供碧霜樹禁秋更倚紅回首客魂招不得蓴鱸歸興滿江東孫內翰九鼎九鼎字國鎮欣州定襄人天㑹六年經義弟一人在太學時逰金明作詩云片片桃花逐水流東風吹上木蘭舟隔溪紅粉休相認年少孫郎不姓劉弟九疇億俱有時名三人同榜登科吳彥髙贈國鎮詩云孫郎有重名談笑取公卿淸廟瑟三嘆齊房芝九莖其為名流所稱道如此中州文派先生指授之功為多年八十餘卒甄㽵三藏真身三藏來中土時其師授記謂當緣甄住殁後三百年見夢于白氏出地中生自龜兹國來從大業年緣甄駐飛錫夢白出重泉鐵石亦有毁筋骸何尚全應知待彌勒萬劫庇山川劉修撰彧彧字公茂安陽人天眷二年經義弟一人自號香嵓居士歷京兆總幕終于翰林修撰春隂似雨非晴意思深宿酲牽率泥重衾苦憐燕子寒相並生怕梨花晚不禁薄薄簾幃欺欲透悠悠歌管壓來沉南園北里狂無數唯有芳菲識此心秋雨得雲字一室蕭然半掩門簷牙懸溜喜𥘉聞棲鴉不動寒偎樹過鴈無聲冷貼雲歷耳半隨風淅瀝舞階仍帶葉􅌭紛隔籬為問東皋叟牟麥前春定十分趙內翰可可字獻之髙平人貞元二年進士仕至翰林直學士風流有文采詩樂府皆傳於丗號玉峯散人集子述字勉叔承安二年登科賦雪云竒貨可居天種玉太平有象麥連雲屏山故人外傳說勉叔詩章字畫皆有父風性落魄嗜酒卒以樂死俶儻竒男子也來逺驛雪夕使髙麗時作江上東風冷不禁晚雲翻手弄晴隂春來天氣不全好夜久雪花如許深暖老正思燕地玉辟寒誰有魏臺金空齊寂寞靑綾被學得東山擁鼻吟雲興館曉起雙旌晚泊雲興館對靣髙峯絶可人一夜山雲飛作雪要誇千樹玉嶙峋江路聞松風雪裏雲山上竹屏松風入耳細泠泠朝來醉著江亭酒却𬒳髯龍喚得醒劉西嵓汲汲字伯深南山翁之子天德三年進士釋褐慶州軍事判官入翰林為供奉自號西嵓老人有西嵓集傳於家屏山為作序云人心不同如靣其心之聲發而為言言中理謂之文文而有節為之詩然則詩者文之變也豈有定體哉故三百篇什無定章章無定句句無定字字無定音大小長短險易輕重惟意所適雖役夫室妾悲憤感激之語與聖賢相雜而無愧亦各言其志也巳矣何後丗議論之不公邪齊梁以降病以聲律類俳優然沈宋而下裁其句讀又俚俗之甚者自謂靈均以來此祕未睹此可笑者一也李義山喜用僻事下竒字晚唐人多效之號西崑體殊無典雅渾厚之氣反詈杜少陵為村夫子此可笑者二也黃魯直天資峭拔擺出翰墨畦徑以俗為雅以故為新不犯正位如參禪著末後句為具眼江西諸君子翕然推重别為一派髙者雕鐫尖刻下者模影剽竄公言韓退之以文為詩如教坊雷大使舞又云學退之不至即一白樂天耳此可笑者三也嗟乎此說既行天下寧復有詩邪比讀劉西嵓詩質而不野淸而不寒簡而有理淡而有味蓋學樂天而酷似之觀其為人必傲丗而自重者頗喜浮屠邃於性理之說凡一篇一詠必有深意能道退居之樂皆詩人之自得不為後丗論議所奪真豪傑之士也題西嵓人愛名與利我愛水與山人樂紛而競我樂靜而間所以西嵓地千古無人看雖看亦不愛雖賞亦不歡欣然㑹豫心卜築於其間有石極峭屼有泉極淸寒流觴與祓禊終日堪盤桓此樂為我設信哉居之安卜築西嵓最可人靑山為屋水為鄰身將隱矣文何用人不知之味更真自古交遊少同志到頭聲利不關身清泉便當如澠酒澆盡胸中纍劫塵平涼道中青山炯無塵塵滿行人衣行人望靑山咫尺不得歸吾歸不作難丗故苦相違何當臨溪水一洗從前非南園步月雲撗樹外山樹映山巔月微風拂寒枝踈光散清樾幽歡難相遇此景安可忽從來山水心不為塵埃沒不如意朝亦不如意暮亦不如意今日只如此來日復何異一歡強欲謀百憂巳先至乃知塵網苦動輒心萬計髙軒與華冕儻來亦如寄規規必欲求愈勞終不遂善哉榮啓期自寬以遣纍慶州回過盤嶺宿義園隨馬雨不急催人日欲晡山從林杪出路到水邊無拘縛嗟微宦﨑嶇走畏途村家應最樂雞酒夜相呼到家三載塵勞慮翻然盡一除園林未搖落庭菊正扶踈繞屋看新樹開箱撿舊書依然故山色瀟灑入吾廬髙陽道中杏花開過野桃紅榆柳中間一徑通禽鳥不呼村塢靜滿川煙雨淡𪷟𪷟家僮報西嵓栽植滋茂喜而成詠孤雲出岫本無心何用微名挂士林近日故園消息好西嵓花木巳成隂留别四弟對床喜淸夜樽酒話平生自是今宵雨於人却有情酒中作樹暗春將老酒䦨人欲歸徘徊風月夜花絮一簾飛劉內翰瞻瞻字嵓老亳州人天德三年南榜登科大定初召為史館編修卒官党承旨丗傑酈著作元與魏內翰飛卿皆嘗從之學嵓老自號櫻寧居士有集行於丗作詩工於野逸如厨香炊豆角井臭落椿花之類為多春郊桑芽粒粒破春靑小葉迎風未展成寒食歸寧紅袖女外家紙上看蠶生無極道中銀河淡淡㵼秋光缺月梢梢挂晚凉馬上西風吹夢斷隔林煙火路蒼茫所見傾欹石片插漣漪上有蕭蕭楊柳枝藻荇半浮苔半濕浣沙人去不多時郝內翰俁二十一首俁字子玉太原人正隆二年進士仕至河東北路轉運使子居簡字仲寬進士不第有詩名太原平陽間居中字仲純樞密院令史出身嘗刺坊州人物楚楚所謂文獻不足猶超人群者也正大末除鳯翔治中南山安撫使詩亦有功子玉自號虛舟居士有集行于丗如云勞生雖可厭淸景亦自適殊有古意也郝吉甫蝸室草草生涯付短椽身隨到處即安然功名角上無多地風月壷中自一天丗路久諳甘縮首麴車才值便流涎一生笑我林鳩拙辛苦營巢二十年聽雪軒扶踈窗外竹歲暮亦可愛蕭散軒中人髙節凛相對淸寒入夢境風雨號萬籟覺來聞雪落淅瀝珠璣碎飢腸出佳句亹亹入三昧華堂沸絲竹此樂付兒輩魏處士野故㽵郊原冷落霜風後桑柘蕭條兵火餘試問當時卿與相幾家猶有舊田廬七月十五日夜顯仁寺東軒對月野迥雲歸盡山髙月上遲暗螢依露草驚鵲繞風枝素影隨波逺新凉與酒宜中秋更有味試為卜歸期應制狀元紅仙苑竒葩别曉叢緋衣香拂御爐風巧移傾國無雙艷應費司花弟一功天上異恩深雨露丗閒凡卉謾鉛紅情知不逐春歸去常在君王顧盻中疊翠樓畫樓西畔石州山指點雲煙識翠鬟回首十年真一夢淡天如水夕陽間題均福堂三首憧憧車馬競春遊不見溪堂五月秋卧聽雲濤舂午枕夢隨鷗鳥落沙洲為魚為鳥知誰是看水看山俱得意存亡貴賤聽天公只有歸休須早計歸休得計即歸來林下空言只可咍莫待山靈嫌俗駕却將鞍馬覔塵埃次仁甫韻渺渺撗煙渚凄凄挂月村酒非鄰舍取詩復故人論丗態烏栖屋生涯雀在門西山却多思松雪動吟魂題溫容村寺壁草樹醒朝雨烏鳶快晚晴山光自明潤野氣亦淒淸茗碗間中味紋楸靜裏聲此懷能自適未要縛簪纓故城道中同元東巖賦客亭南北厭飄零尚喜揚鑣過故城桐葉不堪追往事泥丸尤足見民情靑山閲丗幾興廢白塔向人如送迎佇立夕陽無限思西風禾黍動秋聲晚過壽寧稻壠分棊局松門入畫圖牛羊歸自急鷗鷺宿相呼落日低靑嶂髙風起暝途歸僧上煙靄回首愧區區子文致君九日用安字韻聊亦同賦旅食京華秋又殘舊遊真似夢槐安間居浪說重陽好塵丗端知一笑難黃菊巳堪增悵恨白衣無復慰荒寒馬頭明月應相笑依舊紅塵滿客鞍題孔氏園亭嚴勝諸孫賢至今相承種德滿家林緑槐丹杏風流逺翠竹蒼松歲月深傾蓋昔誰陪俊賞過庭今復嗣徽音此生夙有東遊願杖屨他時或可尋攬秀軒寺得新遊處軒餘舊賦詩山川蒲子國松柏晉侯祠行止非人力登臨且歲時道人應笑我真負鹿門期上巳前後數日皆大雪新晴遊臨漪亭上十日隂風料峭寒試從花柳問平安野亭寂歷春將晚山徑縈紆雪未乾足踏東流方縱酒手遮西日悔投竿淵明正草歸來賦莫作山中令尹看奉陪太守遊南湖同郭令賦翠幄千章䕃晚空年華心賞兩無窮雲頭欲落催詩雨池靣微生解愠風經笥使君談似綺仙舟令尹飲如虹娵隅自適清池樂不信參軍是郝隆三月望日次邊德舉攬秀軒水繞千家邑山圍一席天桑麻新雨露檜柏老風煙夢後餘芳草愁時更杜䳌亦知推不去端用得忘年新秋旅食京華困鬱蒸可人秋意及新晴夜窗便覺風千里曉鏡從添雪數莖蟬噪不離羈客耳燕歸還動故園情軟紅塵外西山色乞與間人眼暫明寺樓晴望詰曲欄杆靣翠微葱籠窗戶溢清暉雨侵斜日明邊過雲望山前缺處歸多病過春猶止酒薄寒向晚却添衣宦名不負滄波願羞見陂田白鳥飛題五丈原武侯廟一首仲純籌筆無功事可哀長星飛墮蜀山摧三分豈是平生志十倍寧論蓋丗才壞壁丹青仍白羽斷碑文字只蒼苔夜深老木風聲惡尚想褒斜萬馬來張郾城公藥公藥字元石宰相安簡公孝純永錫之孫以文廕入仕嘗為郾城令詩號竹堂集寒食云一百五日寒食節二十四番花信風新年云客情病裏度殘臘老色鏡中添一年雲樹縈寒猶漠漠竹梢迎日巳姢姢春晚云細風皺緑漲溪水小雨點紅添海棠又云芭蕉葉斜卷舒雨酴醾架小縱撗春人喜傳之子觀字彥國仕為某軍節度副使孫厚之茂弘承安五年進士許下三庾劇暑