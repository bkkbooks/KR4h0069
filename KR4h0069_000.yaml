front:
  text: 中州鼓吹翰苑英華序商右司平叔衡嘗手抄國朝百家詩略云是魏邢州元道道明所集平叔為附益之者然獨其家有之而丗未之知也歲壬辰豫掾東曹馮內翰子駿延登劉鄧州光甫祖謙約豫為此集時京師方受圍危急存亡之際不暇及也明年留滯聊城杜門深居頗以翰墨為事馮劉之言日往來於心亦念百餘年以來詩人為多苦心之士積日力之久故其詩往往可傳兵火散亡計所存者才什一耳不總萃之則將遂湮滅而無聞為可惜也乃記憶前輩及交遊諸人之詩隨即録之會平叔之子孟卿攜其先公手抄本來東平因得合豫所録者為一編目曰中州集嗣有所得當以甲乙次第之十月二十有二日河東人元好問𥙿之引翰苑英華中州集總目聖製
