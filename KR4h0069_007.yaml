body:
  text: 蘭泉先生張建二十二首張瓉一首毛宫教麾七首朱宫教瀾三首姑汾漫士王琢六首吕中孚九首王元節三首李端甫一首楊澤州庭秀二首孫省元鎮一首張著二首景覃一首假繼昌五首嶽行甫二首迂齊先生周馳二首劉太常鐸七首李扶風節二首劉勳一十三首李澥四首秦略一十三首張琚二首馬編修天來一首張內翰本一十首申編修萬全一首崔遵三首王主簿革一首衛丞慶一首劉昂霄二十四首田紫芝三首王萬鍾三首雷琯一十九首王亳州賔三首李夷三首郭邦彥六首史學八首侯冊五首王元粹三十三首王鬱一十二首蘭泉先生張建建字吉甫蒲城人明昌𥘉舉才行授絳州教官召為宫教應奉翰林文字以老乞身道陵愛其涥素不欲令去左右眷眷久之超同知華州防禦使事仍賜詩有從今晝錦蓮峯下三樂休誇榮啓期之句士林榮之吉甫自號蘭泉老人有集行於丗其論詩云作詩不論長篇短韻須要詞理具足不缺不餘如荷上灑水散為露珠大者如豆小者如粟細者如塵一一看之無不圎成始為盡善吉甫詩雖不能盡如所言然亦未為無所得也擬古十首飛雲何冉冉髙與日月齊中有兩仙人盛服持玉圭我欲從之游天險不可躋邈焉望不及短日西山西客從嶽頂來貽我松粉黃為言服之久身輕欲飛翔我嘗淡無味我嗅寂無香還君三太息丗好方膏梁枯桑依頽垣摧折生理微剝我枝間葉備君身上衣葉盡誰復顧棲鳥來亦稀君看牡丹藂日日笙歌圍靑靑河濵柳柯葉柔且妍一從智巧萌戕賊為柸棬器成豈不佳天質失自然爭如河堤上濯濯披春煙石泉何淸泠中有九節蒲蒲性本孤潔不受滓穢汙一移入城市生意寄泥淤翠葉日焦卷不霜而自枯寄言守靜者勿涉奔競途庭前蘭蕙窠三年種不成門外旱蒺藜一旦還自生弟恐傷我足鋤去根與萌如何一雨後走蔓復縱橫有客曵長𥚑䄂刺謁髙閎低頭拜閽者始得通姓名主人果厚眷開宴海陸并顧必丞彼顔語必順彼情不如茅簷下飽我藜藿羮菶菶嶧山桐一樹十二枝枝分十二律所指各不移胡為師襄于獨謂東南竒一律不可闕一枝不可遺誰能以此意說似典樂䕫美人何熒熒顔若苕之英絶丗而獨立一顧傾人城三星正當戶俟我亦在庭之子無良媒不敢犯露行丘中有一士顔㒵淸且癯緼𫀆僅蔽體𬞞飯不滿盂時出蓬蓽門鼓腹歌黃虞不知何所得矯首望八區山中林櫻墮紅珠打著琴上絃山人時一笑愛此聲琅然韓信廟一檄風馳萬壘降當時意趣巳難量既能歸漢識真主何必下齊求假王將幄深嚴巖樹碧門旌搖曵嶺雲黃我詩責備春秋法勝把君侯美處揚送張子玉渭水玻璃碧秦山劒戟明秋光如我瘦行色與君淸蟬嘒西風柳鴉翻落日城歸舟幸無物且莫苦貪程梨花蠧樹枝髙茁朵稠嫩苞開破雪搓毬碎粘粉紫䰅齊吐潤卷丹黃葉半抽月影曉窗留好夢雨聲深院鎖淸愁瓊胞巳實香猶在散入長安賣酒樓長安酒家有梨花樓答華隂宋先覺雲臺淸集憶當年詩筆逢君厭老拳後㑹邈如千里逺壯懷不似十年前風帘搖曵橋南酒煙樹溟濛渭北天咫尺靈山飛不到夢魂長繞玉峰蓮送賀彥淳還南邠玉峰明滅暮雲邊默計歸程約半千襁負尚憐靈照幼家貧賴有孟光賢臨歧淚眼三年别夾路風槐六月天佇立望君西去逺夕陽村落起孤煙山村風雨圗雨昏山店望未見風緊傘簷張不開莫訝披圖便成句為曽行到此中來吉甫又嘗有詩云風卷旱塵攙馬過雲移涼影趂人行其寫目前之景甚與山村風雨詩相似今附于此賦胡直之溪橋蓮塘二首漁父詞體溪橋腳下水平分橋柱萍粘浪打㾗天向晚日攙昏兩簇靑煙斷岸村拂拂輕風漾翠瀾粉煤新撲小荷盤塘水漲岸㾗漫草閣臨流五月寒雜詩二首瓦瓶擔山泉石鼎煮巖菊燎以松桂枝淸芬滿茅屋踏雪尋梅花雪梅同一色不是暗香來梅花尋不得俊師定庵渟泓石上泉照我良是我輕風一蕩激真態互掀簸乃知求慧性非戒定未可道人此名庵千劫付一坐海月自澄明天花任飛妥吾生劇萍梗萬里信漂墮湛然摩尼珠坐受昏塵褁何時陪逺公同社事香火送王主簿還鄉笑君習氣只書生薄有歸裝亦自淸瘦僕擔詩雙籠重羸牛引軛一車輕長亭巳過那知逺别酒猶多未忍傾記取明年斷腸處玉梨花底月三更張瓉瓉字器之河中人才氣超邁時輩少見其比年未二十以鄉試魁陜西河東不幸早丗張吉甫弔之云惜哉器之真丈夫少年讀遍天下書一事不成死於途苗而不秀有矣夫秀而不實有矣夫其為名流所嗟惜如此遊棲巖寺林表招人白塔明竹間蘭芷石泉淸惠崇水墨西軒景煙帶平蕪水帶城毛宫教麾麾字牧逹平陽人大定十六年舉學行特賜進士出身授校書郎入教宫掖歷太常慱士終于同知沁州軍州事有平水集行于丗無題一首小顰對起石州山楊柳分靑入髻鬟乍識春風眼如鶻為誰無語獨慿欄遊河西孫氏園亭榭依山水亂鳴巳如罨畫障中行照溪芳樹紅雲合迎客幽禽翠羽輕豪氣未饒金谷友醉魂如到錦宫城猶慙歸騎匆匆去不得持杯待月明魏城馬南瑞以異香見貽且索詩為賦二首梅心蘭甲類元同氣壓荀家百和功借潤更煩纎手玉出雲𥘉試慱山銅崇朝日下亭亭蓋三月花間細細風我有因緣在香火鼻端消息為君通二卉真香豈復加便冝編譜入雄誇留殘一點薔薇水幻出諸天薝蔔花佩帶正垂金鈿小薰爐孤起翠雲斜金籠甲帳豪華事慚愧桑樞甕牖家新春雪與韓府推春到千門氣自嘉更教飛雪助年華六街官柳枝枝絮一夜江梅樹樹花况是縱吟多伴侣直須爛醉作生涯掃庭迎客東風裏幕府風流有故家和思逹兄杏花碎剪明霞役化工曉園香散暖煙中羞逢柳眼三眠白分得桃腮一笑紅上苑繁華迷故國曲江憔悴老春風欲傳此恨花無語強對芳時作醉翁春賞潤入梅天雨乍晴喚回春意有新鶯雲霞照眼靑山近羅綺吹香白晝明翠勺銀罌沽酒市暖風遲日賣花聲人人共喜華胥丗何用遨頭羡錦城朱宫教瀾瀾字巨觀霖堂先生之子學問該洽能丗其家大定二十八年進士時年巳六十意氣不少衰歷諸王文學應奉翰林文字終於待制党趙推挽之力為多以嘗入教宫掖故集中多宫詞寒食不出地偏無客過吾廬寒食淸明入燕居驥子捧甌仍臘茗孟光舉按只春𬞞蠅沾香篆渾傷字蜂蹙瓶花半墮書習氣未除還自笑却將佳節付三餘黃筌雀蝶飢雀喧爭蛺蝶孤錦宫城闕見丘墟老筌妙意誰知解丹粉圗中有諌書宫詞太一芙蓉上下天秋波淡淡白生煙採蓮宫女分花了笑把蘭篙學刺船姑汾漫士王琢琢字器之平陽人與毛牧達同時相友善天性孝友為鄉里所稱酷嗜讀書往往手自抄寫家素貧乏而能以剛介自持未嘗有所丐貸時命不偶年四十五以病卒士論惜之有姑汾漫士集行于丗所著中聖人賦今丗少有能到者詩好押強韻務以馳騁為工七月十五夜看月云歷樹有驚鵲悄鄰無吠厖對雨云春雨薄如夢曉雲間似愁秋霖云窗寒知氣重人靜覺泥深驟雨云雹點撒冰彈電光飛火繩春隂云庭淡梨花月樓寒燕子風久雨云練挂遮簷直麻懸到地齊此類甚多元夜雪寶燈樓閣淡連雲轉眄俄驚糝玉塵逰伎行歌俱失意𬞞畦麥壠自知春良宵不肯平平過造物應誇著著新獨有中天端正月一樽梅影屬間人和張仲宗雪詩不用體物諸字天人應卜歲出此當佳占舞巧穿幽隙堆寒壓短簷間門誰擁篲醉館自開簾比興非無物詩人正避嫌同漕使趙中憲對雪投隙穿窗苦見侵向無湘酎若為禁花多不入貧家眼嵗好方知造物心躍馬共思追兔跡抱戈誰與置羊斟新詩與雪爭竒峭擁褐空齊得細吟又一詩南華夢好𥘉飛蝶閬苑春閒又落花似勝前詩恨終篇不能完好耳癸酉歲大熱似動不動雲蒸空欲雨未雨天無風時時日腳蹴雲破一射萬土紅爐中纎絺挂體劇重鎧大屋僅可為樊籠積冰為丘坐自潰輕箑况得微涼通山林亦聞有暍死城市逼側宜無容吾生於熱亦屢度此熱盡可并前鎔雖然一氣播常令頓作駭異疑非公曽聞天南有祝融出入毒霧騎雙龍自從鼎去昧神怪無乃煽處行心胸手搖斗柄酌炎海力逐熛怒乘離宫喜為鬱蒸怒為火流爍金石乾河洪熾昌自欲弄朱夏驕蹇未肯官炎農霞煙灼灼燥昏曉鳥獸喘喘茫西東此而不制滿三伏遂恐百物隨枯蓬太白之兵攢萬鋒銀河之浪滔無窮可洗虐熖夷姦凶我欲呼訴煩神功耽耽九虎天關重辛未九月二十一日雪幾日西郊霧連宵北牖風菊花猶泛酒雪片忽填空草樹秋容失河關曉氣濛聽𥘉疑落葉仰不辨髙鴻爛熳三冬意慿凌百圃功披裘赴雞黍掃徑惜籬藂豈料玄英巧來爭白帝雄剪裁渾草草飛舞太匆匆秪作干時令非關兆歲豐冬雷怪相似春電冷應同安得蛟龍蟄何由翳靄通日華升赤壁天色湛青銅尚有登臨興寧無賦詠工煙霞狂醉嘯一發醉顔紅雨夕感寓漠漠𥘉燈後森森細點飄繁聲入遙夜冷簟恍秋宵起欲吟相和吁無客可招何曽洗兵馬但覺漏薪蕘雷電𥘉無預炎蒸遂不驕㵼簷鏘未歇欹枕兀無聊澗巳山輸潦堤應水沒橋長林倦今夕孤鳥撼驚條似我纒憂戚因貧墮寂寥避人猶虺蜴擇宿等鷦鷯共丗難曹襧無才匹管蕭苦心還自笑末俗本多囂未老愁摧鬢長飢帶賸腰牀寒少陵𬒳飲陋子淵瓢射䇿𥘉游漢潜山敢傲堯鹽車竟垂耳風鷁忌干霄一室元空掃千鍾豈易要芳蘭逼憔悴尺鷃失逍遙字對諸生識詩煩衆手雕搜求勞腎胃戞擊謝咸韶舊弄新絃掩窮途拙目搖爭為壯夫篆只使古風澆血指甘時巧包羞愴道消優游能卒歲三四儘論朝故慢幽霖透長檠暗燼挑不辭墻出菌儻見榖抽苗饜飫貪夫腹翻騰樂歲謡晴樓交燕雀凉樹沸蟬蜩坐快虹霓出憂無萍梗漂浩歌彌激烈興在海門潮吕中孚中孚字信臣兾州南宫人孝友純至迄今為鄉人所稱纍舉不弟以詩文自娛有淸漳集行于丗其賦紅葉云張園多古木蕭寺半斜陽先君子甚愛之小景靑蕪平野四圍山山郭依依紫翠間村逺路長人去少一竿斜日酒旗間春月柳塘漠漠暗啼鴉一鏡晴飛玉有華好是夜䦨人不寐半庭寒影在梨花水聲長陂千頃碧淙淙浪卷秋風過石矼記得夜來愁聽處一燈明滅照寒窗雪隨風拂拂玉花飄入夜寒窗更寂寥爐火巳殘燈未燼一簾踈竹白蕭蕭送李嘉甫信都令耘甫之弟溪水碧於草溪邊送客行寫詩傳别意把酒聽歌聲去路靑天逺歸心白羽輕尊前折楊柳一一是離情寫懷秦川西去逺不意過漳川歸夢三千里羈愁二十年謀生空白髮行路若靑天餘事休相問相留只醉眠梨花等待淸明得得芳團枝晴雪暖生香洗粧自有風流態却笑紅深睡海棠集句騷人吟罷起鄉愁百感中來不自由一種人間太平日滿衣塵土避公侯柳風外絲絲裊緑煙輕花𥘉破不成綿却嫌官路逢寒食惱亂離愁似去年王元節元節字子元弘州人祖山甫遼户部侍郎父詡海陵朝左司貟外郎子元壻於南山翁傳其賦學弟進士雅尚氣節不能從俗俯仰故仕不達既罷密州觀察判官即間居鄉里以詩酒自娛號遁齊老人年五十餘卒弟元德亦弟進士有能名於時終於南京路提刑使靑塜環珮魂歸靑冢月琵琶聲斷黑山秋漢家多少征西將泉下相逢也合羞與党丗傑軍判丁亭㑹飲望斷西州萬里家又將新火試新茶靑油幕下成何事兩見常山山杏花古鎮道中秀拔諸峯鎮海墩海天水氣兩昏昏鷗飛翠竹白沙地人宿黃魚紫蟹村向背雲山行處路淺深潮浦漲來痕同游幸有能詩客不倦躋攀到石門李端甫端甫字濟夫同州人弟進士三王內恕及人榜仕為平定州軍事判官工于詩有虎迹未乾溪水近樵聲相答嶺雲深之句子實字師白死于壬辰之亂太白扇頭巖冰澗雪謫仙才碧海騎鯨望不回今日霜䊵見遺像飄然疑自月中來楊澤州庭秀庭秀字德懋華州人大定中進士學詩於蘭泉張吉甫有渴心曉夢江湖闊醉眼春風草木低之句泰和三年刺澤州致仕後間居鄉里坐為楊圭詿誤𬒳法士論冤惜之成臯道中瘦馬成臯道阻長崢嶸冰雪老年光九關欲上虎豹怒三徑未歸松菊荒嵩少雲煙聊駐馬漢唐宫殿兩亡羊鄭南嶺下梅花發千里相思空斷腸李簡之蓮池集句一月衰顔幾笑開生前相遇且銜柸蓮塘十里花如錦有底忙時不肯來孫省元鎮鎮字安常絳州人髙才博學嘗中省試魁承安二年五赴廷試賜弟以陜令致仕年八十四卒有注東坡樂府歷代登科記行於丗弟寧州刺史錡字安丗潘原令鉉字安道同榜擢弟鄉人榮之號三桂孫氏安常孫詵思美軍府參佐安丗孫處謙志全安道孫蔚今俱在許氏雙桂堂許家二桂聮翩秀孫氏三枝次弟春盛事若將相北竝輸君堂上拜雙親張著著字仲揚永安人泰和五年以詩名召見應制稱旨特恩授監御府書畫九日雨沐天容霽欲流好山誇翠出墻頭黃花憔悴東籬晚一假陶家冷淡秋雨後西風無意嫪纎雲掃盡千峯雨腳痕一片秋光淸似水家家空翠滿柴門景覃覃字伯仁華隂人年十八有賦聲大定𥘉三赴簾試後以病不就舉博極群書有舉問者立誦數百言不休又從而講說之為人誠實樂易不修威儀隱居西陽里以種樹為業落托嗜酒醉則浩歌日以為常作詩有功樂府亦可傳豫同年進士王元禮嘗從之學說伯仁老不廢書有勸以養目力者曰我輩非讀書則無所用心要當死而後巳耳晚年於易有所得年七十終于家自號渭濵野叟有集傳關中感事蘭芳切禁當門種李苦何傷並道生自古英雄足猜忌莫教身外有浮名假繼昌繼昌字子新白水人自號適安居士喜作詩與華隂景伯仁相友善家甚貧而丗間事皆不以挂口有以錢遺之者必盡送酒家名酒曰黃嬌蓋關中人謂兒女為阿嬌子新以酒比之故云一日天苦寒人有遺之酒者飲不盡而醉夜半忽驚起以衣衾覆酒缸僵卧榻上人為言酒自不冰先生將不為寒所病乎子新笑曰人病尚可酒病不可療也其好飲如此臨終辭鄉里託以他適明日卧于党氏園亭大石上視之巳逝矣伯仁吊之云適安居士舊知聞廓逹靈根厭丗紛辭罷親朋便歸去一籌今日又輸君梨花一林輕素媚春光透骨濃薰百和香消得太真吹玉笛小庭人散月如霜一溪一溪流水走靑蛇春在江邊漁父家竹外寒梅看欲盡淸香移入小桃花春早二首魚兒水泛鴨頭緑野馬塵飛羊角風西崦山家籬落背杏梢𥘉見一分紅斷冰銷盡荻芽尖凍壠蘇來白薺添幾片野雲飛不去晚風吹作雨纎纎讀紀信傳鹿走中原兩虎爭滎陽圍解事堪驚當時拔劒論功者矢口何人說紀生嶽行甫行甫字仁老鄜州洛川人在關中最有詩名泰和𥘉有以仁老時病詩逹之道陵者道陵大加賞異授以官不就士論髙之舊所傳沾泥柳絮燕銜去鎖月梨花鶯喚開本前人詩又苦無佳致丗俗識真者少悮謂仁老所作乃閧傳之曽見仁老詩百餘篇佳句甚多續當就秦中好事家搜訪之謝人惠二小漆冠規製新翻出杜郎最宜閨子夜燒香不爭寶髻峩宫樣自與霓裳配道裝細攏翠鬟雲易滿淺銜牙櫛月難藏水衡雙寄非無意要買楊枝惱孟光立春日銀線靑絲翠碗堆爭牛擊鼓欲驚雷翻風鬪巧春頭勝漉雪浮香臘尾杯迎暖梢梢金著柳逗寒葉葉粉飄梅不成一事人空老半百光隂又七回迂齊先生周馳馳字仲才濟南人經學出於醇德先生王廣道賦學出於泰山李時亨至於党趙又其忘年友也資性古雅而以襟量見稱大定中住太學屢以䇿論魁天下私試亦頻中監元家素饒財鄉人強以子弟從之學所得束修皆散諸生之貧者貞祐之兵濟南陷不肯降携二孫赴井死鄉人葬之宅後之壽樂堂遼東人吳子英嘗從仲才學能記其所著亞父撞玉㪷賦及他文數篇箸詩章廟御題限紅字韻矢束形何短籌分色盡紅駢頭斯效力失偶竟何功比數槃盂側經營指掌中蒸豚挑項臠湯餅拌油葱正使遭讒口何嘗廢直躬上前如許借猶足沃淵衷子私盍反支起也勿以微才棄安危任不輕誰憐一片小能使四方平几桉由吾正槃盂免爾傾何當遇夷坦沉默更何營此詩王仲澤所傳或以為仲澤作也以其與周才仲詩意相近姑附於此以俟更考劉太常鐸鐸字文仲兾州棗強人承安五年進士元光二年入為太常博士正大𥘉改兵剖貟外郎以武昌軍節度副使致仕癸巳歲病殁于京師自號柳溪先生有集傳于家武成王著作序言文仲生未能言巳識百餘字及授學頴悟過人為人誠實少許可不徇流俗不慕榮利蓋實録云子敏中字庭幹亦學詩今居洛中三陽述懷蟻穴吾猶夢蝸廬此僅容一川靑靄合半嶺白雲封地僻冝藏拙間官足養慵只慚無𥙷報潦倒不歸農即事亦在三陽時作地與中州迥民餘上古淳峽長深束渭路險曲通秦煙柳千家曉風花百里春一官如自擇間處著間身澠池驛舍用苑極之郎中韻慣從鞍馬作生涯宿處依依認是家爐火相看衣袖暖盤餐未辦驛厨譁淹留歲月頭如雪汨沒風塵眼更花永夜如何得消遣新詩吟罷自煎茶春日翠微深處幾人家風揚輕煙雨壓沙寒勒野桃開較晚向陽才有兩三花所見輪竿老子緑蓑衣細雨斜風一釣磯正是鄰家社醅熟柳條穿得錦鱗歸讀李訓鄭注傳二首誰教閹宦作櫂臣肅代優遊到敬文三子謀踈誰不道泄機也合罪劉蕡棊醫入侍本防猜偶失機權亦可哀陳竇至今佳傳在莫從成敗論人材李扶風節節字正臣涇州人吕造榜進士以詩名關中資性滑稽談笑有味而臨事以幹局稱歷威戎扶風令𥘉名守節哀宗即位去守字哀宗知其名謂侍臣言吾不欲人避上一字李守節何故避之良久曰臣子敬君避之亦可正臣有詩云棓頭打出和糴米丁口簽來自願軍讀之則時政可見矣漁父舉丗從誰話獨醒短蓑輕蒻寄餘生半篙春水丗塵逺一笛晚風山雨晴稚乳滿船生事簡魚蝦到市利源輕旁人莫怪機心少曽與滄洲白鳥明有感亂離何事最堪傷孝子陵前假氏㽵鑄鐵作門貽鬼笑堆金齊斗買天亡春風草滿藏書壁落日狐鳴打麥埸惆悵賢郎一丘土過車腸痛獨難忘劉勳勳字少宣本出洛陽元魏遷洛陽二十萬家實雲中故其父祖而上為雲中人至少宣客居濟南樂其風土遂占籍焉少日住太學與兄譙庭老俱有聲埸屋間南渡後專於詩學往往為人所傳其先丗本衣冠家風流緼藉都無科舉氣見于文字者亦然嘗有詩云萬里風沙憐病客幾年刁斗厭寒更人憐直道違時好自喜間身與丗踈擊筑漫流燕客淚佩蘭誰識楚臣心濟南云午風襟袖知秋早甲夜䦨干得月多又云船行著色屏風裏人在回文錦字中百和香薰風過處萬盤珠落雨來時此類甚多少宣長於尺牘落筆皆有可觀其樂府如暮鴉庭院春隂淡之句尤可喜也讀張仲揚詩因題其上布衣一日見明君俄有詩名四海聞楓落吳江真好句不須多示鄭參軍偶作將軍馬躍五檛鼓客子車行三唱雞白髮書生無伎倆滿窗紅日醉如泥杜善甫乞炭筆口酸嘶解說窮寒爐隨手變春紅因君大笑涪翁拙費盡竒香得馬通呈吕陳州唐卿警盜何煩鼓夜檛麗譙淸晝卷髙牙春回和氣一千里雪與豐年十萬家逋賦稍寬新得帖軍書不至早休衙新年載酒須行樂次弟東風繞郡花秋涼桃笙乘勢獻微涼紈扇無功送暑光老病不嫌風露冷莫教添作鬢邊霜愛詩李道人嵩陽歸隱圖脫却儒冠巳自間更令家事勿相關百錢便掛靑藜杖不看先生紙上山元夜隂晦逐逐雕鞍趂畫輪年芳樂事一番新芙蓉城暖東風夜楊柳樓深笑語春兩鬢愁添新白雪十年夢到軟紅塵空庭不見梅花月寂寞春隂最惱人傷曹吉甫之死官職雖低首不低爭教有志竟空賫向人指畫將何語臥筆糊塗不解題小女繞床猶戲劇老兵伏地亦悲啼春風繫馬庭前樹只想東齊醉似泥同趙宜之賦梨花月雪樹生香淡月邊相媒相合鬪淸妍空庭冷落秋千影虛度良宵亦可憐不寐酪奴作祟攪秋眠追咎前非四十年一夜蟲聲相計㑹併催白髮到愁邊戲鄭秀才張老豆新頻見餉鄭家米鑿不須賖客來粥熟吾能辦要與齊奴鬪咄嗟春日粉蝶耽香夢正迷黃蜂和蜜計何癡小軒無事誰如我臥看楊花點硯池答仲和此身安處苦難尋常羡歸鴉易滿林望逺真成廣武嘆得詩空作洛生吟逢人放適村村酒感物悲哀歲歲心想得濟南花正好抱城春水一篙深李澥澥字公渡相人少從王內翰子端學詩能行書工畫山水就所長論之詩為長性寬緩笑談有味居京師十五年日逰貴人之門所至以上客延之善處丗不為人所忌疾雅有前輩典刑纍舉不弟年六十餘卒於通許陳留之間漫書胸懷平日窗八達伎倆只今龜六藏唯有間情如老菊寒華自信晚能香二老雪行圗雪明萬仞鄴西山杖屨平生幾往還滿眼京塵空對畫何時真似兩翁間祕書張監墨梅圖張南人眼中只有梅千樹不挂丗間蜂蝶花十載江南春夢斷至今淸影在君家燈下梅影丁年夜坐眼如魚老矣而今不讀書墻角短檠還有用瓦瓶相對一枝踈秦略略字簡夫陵川人父事軻有詩名工作大字簡夫少舉進士不中即以詩為業詩尚雕刻而不欲見斧鑿痕故頗有自得之趣悼亡一詩髙出時輩殆荆公所謂看似尋常最竒崛成如容易却艱難者耶年六十七卒臨終留詩云軀殼羈栖宅兒孫邂逅恩雲山最佳處隨意著詩魂簡夫自號西溪老人有集行于丗子彥容為黃冠師今在平陽拳秀峯平滑石之俗其俗資磨礱磊醜石之秀其秀在醜中正如古丈夫貌寢氣質雄又如聖人心孔竅虛明通大都一拳許含蓄華與嵩大巧本若拙足見造化功好處元更多摹寫不易工君其善調護抵擊防兒童雪行匹馬東來冰雪天蒼山手冷墮吟鞭煙中髣佛聞雞犬不覺人家到眼前鳥影過寒塘著眼分明莫作疑從來形影本同歸不應水砥靑天上更有飛禽仰靣飛悼亡自古生離足感傷爭教死别便相忘荒陂何處墳三尺老眼他鄉泪數行多事春風吹夢散無情寒月照更長還家恰是新寒節忍見堂空紙挂墻元日新曆從頭數殘冬與我違不知垂老至但覺拜人稀汲水泥融井看書暖入幃淺情墻外柳新緑巳依依贈趙宜之年時見君行路難喜於長安新得官日來見君鄰婦哭驚似藍田尋得玉愛官愛玉樂有涯愛君之詩無盡期古人骨冷不復作主張騷雅非君誰白髮臨水時自照照我須與眉須眉何所似恰似純白絲從兹一白後寧有再黑時譬如花落地不復還故枝殷勤語須眉聽我自解詩幼小癡讀書既壯多憂思自苦有冰蘖自潤無膏脂勞生到今日汝白將何辭同希顔𥙿之賦樂真竹拂子覔箇龜毛抵死難直教擊碎釣魚竿丗人不用生分别信手拈來總一般少室山卓劒峯神威洗盡丗間讎電歇雷間怒氣收一柄太阿留少室却擎空掌華山頭此身此身日日一簞貧貧裏留殘自在身獨把笻枝行又立東風花柳不嗔人穀靡靡上黨公府作穀靡靡靑割將來強半粃急忙舂米送官倉只恐秋風馬塵起官倉逺在蕎麥山南梯直上靑雲閒梯危一上八九里之字百折縈回環慿誰說向監倉使斛靣莫教髙一指請君㳂路看擔夫汗顆多於所擔米麝香山麝逃風逺谷藏一山行過四山香臍堂自養千鈞弩枉怨虞人鼻孔長趙洛道中柔靑𥘉散壠頭桑村落人家布穀忙一段蕪菁渾著角葉間猶有幾花黃張琚琚字子玉河中人父鉉字鼎臣大定中弟進士仕至同知定國節度使事子玉刻意於詩五言其所長也如𥘉至華下云老雨梧桐夜孤燈蟋蟀秋客同州云秋風留客館夜雨借僧氊詩人喜稱道之至有張五字之目集號韋齊移河中耕戰連年廢吾知有此行條山猶在眼渭水若為情飽肉豺狼喜傾巢燕雀驚西樓今夜月愁絶是空城秋夜人與年華老愁兼節物雙髙風梧墮砌久雨竹侵窗客簟悲秋臥僧鍾數夜撞更堪蓑鬢影蕭颯照寒釭馬編修天來天來字雲章人止謂之元章介休人黃裳榜經義進士博學多技能畫入神品百年以來無出其右者屏山常言天下辨士有三王仲澤馬元章純甫其一也元章住太學十九年貧苦之極人所不能堪然其談笑自若也大安𥘉調潁州司候靈壁簿召為國史院編修官正大九年病殁於京師年六十一劉紹宣有贈詩云波瀾口頰談玄駛土木形骸與丗違疇昔麻鞋見天子只今道服勝朝衣蓋實録也元章多作詩欲别出盧同馬異之外又多用俳體作譏刺語如云木偶衣冠休嚇我瓦伶口頰欲謾誰嚙骨取肥屠肆狗哺糟得醉酒家猪如此之類不得不謂之乏中和之氣至其賦丹霞下寺竹云人天解種不秋草欲界獨為無色花雪云夜來窗外渾疑月今日墻頭不見山末云先生睡起騎驢看太素一遊非丗間龍門云白含雲竇雪靑𥙷石門天則知詩者亦當以功掩過耳山中靑林寂寂鳥關關畫出風煙落照間脫却草鞋臨水坐野雲分我一邊間張內翰本本字敏之觀津人貞祐二年進士工於大篆及八分四十歲後學詩詩殊有古意正大九年以翰林學士從曹王出質客居燕京長春宫將十年後遊濟南病卒得王子正書晨鵲何處來飛鳴向前除故人在天涯遺我尺素書為言長相思夢寐同所居所居亦靡他上論揖讓𥘉覺來獨愴然淡月留太虛蹇豫臨末路丗味皆泊如一學未敢輟尚念客氣鉏切磋與琢磨政恐朋友踈自從吾子東門乏長者車發揮天人奧大辨孰起豫丹陽何髙明吾子昔所廬南軒拂翠筠此潭照紅蕖蝗害非不虐子食豈無餘灤江固自佳何堪曵長裾春風旦夕至歸哉莫踟蹰寄弟離離丘壠田鬱鬱霜露思相隔二十年旦莫一何悲中途涉萬里天幸復來歸燕安此懷居愧彼神與祇叔兮孝且友見義能不疑上念先塋孤亦閔乃兄癡護喪營大葬勤苦我所知昨朝尺書來殷勤咸及兹燈下展轉讀涕淚沾裳衣父祔失臨穴子焉庸我為我非羽毛寄飽食冥然飛田居有素懷行當事畬菑與子奉遺祀沒身以為期梁都運斗南新居落成購材燕市中作室何翹翹老手為拮据百日不敢驕室成僅容膝勃溪益無聊云胡寫豫懷惟是風雨宵先生名大夫黼衣華四朝楓堂接桂室燕處俱道遙新築誠瑣兮貧飲稱一瓢居之不自陋無乃壯志消孰知君子心一念恆萬朝滔滔寧我盈凛凛不吾凋處樂及處約所以長嚻嚻里社來落成賤子亦見招槃餐無兼味至樂等聞韶我獨何人斯永惟德音昭日居及月諸維此心搖搖中秋雨夕呈君美怪得秋雲不肯晴天公為惜此杯傾無邊清景關人意多事西風送雨聲挂樹婆娑辜勝賞桐枝點滴厭殘更殷勤朝鏡休重攬白髮星星又幾莖九日月中對菊同禧伯郎中賦六首花上淸光花下隂素娥惜此萬黃金一杯寒露三更後誰信幽人更苦心九日餘香伴月明一觴亦足暢幽情青樓夜半琵琶語不說人間有此清子山牢落去江南賦主悲哀尚一堪只恐秋天聞亦苦併催紅雨下霜巖庾信哀江南賦唯以悲哀為主病魂招得未渾全瞑倚秋屏豈是禪一夢忽成霜蝶去草深三徑若為眠鬼化斯文念賈生精神雕琢坐寒更一書草就渾衣卧恨煞東方不肯明龍山戲馬賞秋光多少新詩入錦囊磨滅英雄豈勝數千年依舊一花香申編修萬全萬全字百勝髙平人兄無夷字百福崇慶二年進士百勝少有聲太學中貞祐二年乙科調福昌簿不赴隱居盧氏山中以讀書為業作詩有靜功然不多見也正大中召為史館編修從行省慶山南征道中有詩云回首秋風謝敝廬﨑嶇又復逐戎車人生行止元無定一葦江湖縱所如不數日溺水死人以為䜟云病中遣懷浪走天涯歲月侵病中猶作越人吟野麋本自便豐草倦鳥寧當忘故林畫像功名元有命乞墦富貴果何心幾時真脫塵囂纍巖穴尋居不厭深和陳舜俞詩閙裏那容更刺頭石田茅屋喚歸休杜門便與詩書老過隙從教歲月流槃木見容良自愧錯刀相贈若為酬酌君安得如川酒醉眼蚍蜉萬户侯崔遵遵字懷祖北燕人父建昌字曼卿大定二十五年進士仕至同知武安軍節度使事懷祖事繼母孝與人交有終始遲重少語未嘗及人短長少日在太學有賦聲南渡後不就舉選居嵩山二十年課僮僕治生生理亦粗給前輩如趙吏部子文張左丞信甫馮亳州叔獻或懷祖丈人行皆與之詩酒相往來懷祖喜賔客有藴藉從容文雅使人久與之處而不厭也嘗有宿少林詩云靑山巳有十年舊小雪又為三日留其他往往稱是送𥙿之官鄧下兼簡仲澤靑燈别酒夜沉沉力負相思自不任間裏更誰留我醉興來無復伴君吟一枝仙桂知難擬千頃黃陂未厭深為向荆州王粲道安排佳境約相尋和𥙿之二首行李西來便得君相從回首七經春君方備悉原思病我亦私憐仲父貧砥事却成今日别枯腸難著此愁新鳶肩火色真將驗馬虎何勞更問辛不幸還能作幸民十年同醉頴川春酒船載我雖堪老仕路有時或為貧少室山人三日惡夷門紙價一番新益知哀樂終年事未唱驪駒鼻巳辛王主簿革革字德新一名著臨潢人以䕃𥙷官碌碌管庫餘三十年正大中以六赴廷試賜出身調宜君簿為人有藴藉善談笑密公與之唱酬相得甚歡𥘉在太原作詩有赤心遭白眼笑靣得嗔拳之句公甚愛之有詩寄之云柳塘雲觀千鍾酒笑靣嗔拳五字詩蓋志此也及弟後呈同年云孤身去國五千里一弟遲人四十年大為間間所稱德新交遊滿天下獨許欽叔與豫為莫逆云年七十八終於雲中寄答劉京叔十年相望惜睽違驚見蘭章墮客扉鄭子巳聞耕有谷榮公誰念老無衣水浮落日流無盡山礙行雲斷不飛千古神川亦吾土幾時同采北山薇衛承慶承慶字昌叔襄城人父文仲承安中進士以孝友淳直稱於鄉里官至文登令年七十餘卒臨終沐浴易衣冠與家人訣怡然安坐誦東坡赤壁樂府又歌人間如夢以下二句歌闋而逝昌叔資冲淡有父風及識路宣叔王逸賔文伯起故其詩似之感興十日不出門出門春巳好並山花更多十里紅未了朝看花尚研暮看花又老蔫紅墮危枝餘香寄芳草人生秪如此百年疾過鳥安得脫塵寰逰戲萬物表劉昂霄昂霄字景玄别字季房陵川人父俞字彬叔明昌二年進士仕為承發司管勾泰和中豫識景玄於太原人有言是家讀廣記半月能背誦者豫未之許也戲取市人日曆鱗雜米鹽者令讀之一過目無脫遺大率景玄之學無所不窺六經百氏外丗譜官制與兵家所以成敗者為最詳為人細瘦似不能勝衣好橫䇿危坐掉頭吟諷幅巾奮袖談辭如雲四座聳聽噤不得語故評者謂承平以來王湯臣論人物李之純玄談號稱獨步景玄則兼衆人之所獨愈叩而愈無窮不知去古談士為逺近餘子不論也嘗用門資叙調慶陽軍器庫使不就諸公方薦試宏辭而景玄病不起矣臨終夢賦山泉云帶雲縈逺澗和月到踈林又云萬里馮唐老中年賈傅歸未幾下丗年三十七中秋日同辛敬之魏邦彥馬伯善麻信之元裕之燕集三鄉光武廟諸君有詩昂霄亦繼作積甲原頭漢閟宫登臨還喜故人同超超萬里乾坤眼凛凛千年草木風今古消沉詩句裏河山浮動酒柸中極知勝日須轟醉更得銀盤上海東趙村晚望放眼東原上風煙接渺茫林踈出村落野迥散牛羊天地浮元氣山河半夕陽登髙一長嘯未覺阮生狂送𥙿之往洛陽兼簡孫伯英洛水嵩山壽樂堂每從熱惱得淸涼竹床石枕應無恙尚可分風供十方題𥙿之家山圖萬里神州劫火餘九原夷甫有餘辜作詩為報元夫子莫倚家山在畫圗同敬之𥙿之遊水谷分韻賦詩得荷風送香氣五字各賦一首招提有勝踐日暮一經過何物媚遊人微風動池荷尋幽意自愜况與佳人同俗物不到眼談笑來天風敲門看修竹重理舊年夢上山復下山清風管迎送寒泉漱雲根湛然涵鏡光誰知一滴味中有曹溪香迂辛與臞元得句猶有味頽垣斂暝色深竹貯秋氣瞑色敬之句秋氣𥙿之句也寄申伯勝三首直氣南山相與髙爭教塵土涴靑袍征科頗似曽料理差勝參軍作馬曹執版那能拜下風丗間禮數困英雄狂歌醉舞人誰識憔悴通泉郭代公連昌能隔幾牛鳴不見令人鄙吝生乘興時思一相訪劇談豪飲見真情遊五渡谷南山如碧環缺處蒼崖開當年造物手辦此何神哉睥睨倚天壁千古封莓苔源源萬斛泉飛出重山來白龍三百丈行處鳴春雷巨石若棟宇磊砢相推排跳波與濺沫餘怒猶喧豗我來值杪秋萬壑風聲哀黃花雜紅樹錦繡紛巖隈竒勝夙所貪欲去仍裴回題詩還自笑愧我非仙材田紫芝紫芝字德秀滄州人父齊以䕃為部掾德秀少孤養於外家定襄趙氏故多居於欣年十三外祖廣寧治中命賦麗華引語意驚絶人謂李長吉復生資性頴悟一覽萬言年二十讀經傳子史幾遍為人踈俊而以藴藉見稱與同郡王元卿齊名貞祐𥘉避兵臺山倉卒為遊騎所馳遇害時年二十三士論惜之夜雨寄元敏之昆弟時年十六醉夢蕭森蝶翅輕一燈無語夢邊明虛簷急雨三江浪老木髙風萬馬兵枕簟先秋失殘暑湖山徹曉看新晴對床曾有詩來否為問韋家好弟兄亂後登凌雲臺愁思紛紛不易裁凌雲臺上獨裴回亂鴉背著斜陽去寒鴈帶將秋色來破屋無煙空碎瓦新墳經雨巳蒼苔天翻地覆親曽見信得昆明有劫灰冥鴻亭下弟後作眼底功名一物無飛揚跋扈竟何如青雲歧路多辛苦賴得皇家結網踈王萬鍾萬鍾字元卿秀容人父甫字用之通經史淳質有儒行亦以知醫見稱兄萬石字器玉住太學有賦聲用之妻死不更娶二子俱無家室井臼之事率親為之貧居陋巷中破屋蕭然不蔽風雨而弦誦之聲不絶也元卿少有逸才讀書有後先不欲速成詩文間適似其為人客至淸談終日人不敢以俗事浼之與同郡田德秀齊名號王田評者謂規製宏博王不及田而瀟灑無塵土氣田亦非王比也元卿嘗有詩寄豫關中云千里吕安思叔夜二年社燕伴秋鴻賦梅花云漢宫月下三千額好在春風一抹痕哭吾兄敏之云蘭徑水流三月暮桂林風落一枝春古詩尤蕭散有自得之趣兵火中皆亡失之矣𥘉用之聞北兵入塞即以吾州為不可守去之太原五年不敢歸貞祐二年州破死者十餘萬人而用之亦以是日病殁於太原較其時皆三月三日巳時也人謂用之先見固可稱然生死定數亦自不能免云元卿父殷之後與其兄居于平晉之金城里明年兵復至兄𬒳害元卿欲收葬之時遊騎充斥親舊勸勿往元卿持不可曰兄死不收留此身欲何用耶流涕而去尋亦𬒳禍時人甚哀惜之元卿長豫一月死時年二十七矣春宵風尖月細春猶淺酒冷燈昏夜向深人在西軒愁不寐十年間事總經心元氏桂軒為敏之賦簾捲堂前桂子凉一軒燈火夜𥘉長月中春好元無價天上風來别有香棠棣一家同映秀詞林百丗繼餘芳間花野草空無數掩盡人間獨擅埸江村風雨圖秋風槭槭淡林暉煙靄昏昏失翠微一假蓴鱸江上興蓬窗岑寂夢魂飛雷琯琯字伯威坊州人以薦書從事史館調八作司使慱學能文時輩少有及者并州人李汾與伯威同在史館以髙蹇得罪伯威作詩送之頗譏翰林諸人不能少忍至與一書生相角逐使之狼狽而去有郎君未足留商隱官長從教罵廣文之句又云明日春風一柸酒與君同酹信陵墳人甚稱之信陵館酒間二首間過信陵飲有懷信陵君君去日巳逺誰憐抱關人徑携一壷酒往酹公子墳墳科久巳平墓木幾為薪泉扉鎖長夜千載不復晨昔與賢俊遊今為狐兔鄰豪貴竟安在念之心紛紜有生㑹歸盡但恐後無聞此意不可必且醉梁園春維昔有迂叟樹桐彼髙岡殷勤為封植遂欲棲鳯凰桐生日巳長鳯來殊未央維鳯覽德輝非時詎來翔枝幹枯以死志願終莫償憶在西周𥘉飛下𡵨之陽裴回不能去和鳴聲鏘鏘文王既巳沒千載徽音亡咄爾叟何為而欲發其光空令枯株上日晏啼鶖鶬客有自關輔來言秦民之東徙者餘數十萬口携持負戴絡繹山谷間晝餐無糗糒夕休無室廬飢羸暴露濱死無幾間有為秦聲寫去國之情者其始則歷亮而宛轉若有所訴焉少則幽抑而悽厲若訴而怒焉及其放也嗚嗚焉愔愔焉極其情之所之又若弗能任焉者噫秦豫父母國也而客言如是聞之悲不可禁乃為作商歌十章倚其聲以紓豫懷且俾後之歌者知秦風之所自焉扶桑西距若華東盡在天王職貢中一自秦原有烽火年年選將戍河潼春明門前灞水濵年年此地送行頻今年送客不復返卷土東來避戰塵盡室東行且未歸臨行重自鎖門扉為語畫梁雙燕子春來秋去傍誰飛灞水河邊楊柳春柔條折盡為行人只愁落日悲笳裏吹斷東風不到秦纍纍老稚自相携側耳西風聽馬嘶百死才能到關下仰看猶似上天梯上得關來似得生關頭行客唱歌行虛巖逺壑互相應轉見離鄉去國情前歌未停後迭呼歌詞激烈聲嗚嗚天下可能無健者不挽天河洗八區折來灞水橋邊柳盡向商於道上栽明年三月花如雪㑹有好風吹汝回行人十步九盤桓巖壑縈回行路難忽到商顔最髙處一時揮淚望長安西來遷客莫回首一望令人一斷魂正使長安近於日煙塵滿目北風昏陽夏懷古短衣匹馬西北來十年去國隨風埃解鞍呼酒歌一曲玉鞭倒捉𫾣金罍君不見項王臺昔時崔嵬今巳頽秋風蕭瑟吹草萊又不見漢王城昔時岧嶤今巳平寒煙寂寞啼鼯猩牧童擡頭學楚聲野老扶犁城上耕耕勢不斷楚聲哀行人欲去還徘徊劉項英雄安在哉人間俯仰易陳迹聞身健在須銜柸龍德宫紫簫吹斷綵雲歸十二樓空盡玉梯綵仗竟無金母降仙𥚑猶憶化人携千年洛苑銅駝怨萬里坤維杜宇啼莫倚危欄供極目斜陽更在露盤西南國南國春生江水肥烏檣風扇錦帆歸吳兒日暮棹歌發驚起鴛鴦相背飛古意四首美人傷獨宿窈窕春閨深素手卷翠𬒳當窗調玉琴危絃奏苦調淸歌抗哀音絃絶歌復咽起作薄命吟妾如朱槿花含英愁晏隂郎如靑銅鏡照靣不照心不怨不照心但惜飛光沉且留連理枕莫捲合歡衾儻君回餘輝歡盟尚可尋對酒不能飲拊劒自度曲一唱行路難歌與淚相續朝為楊朱泣暮作阮藉哭古道盡荆棘新蹊苦薋菉曲行違吾心直行傷我足曲直無適從昂頭羡鴻鵠綿綿菟絲草濯濯柳樹枝結根偶相值引蔓纒綿之春風一披拂柯葉含榮滋弱質附美蔭百齡誓不違淸商忽用事霜颷颯巳凄豈意百尺條同此寸草萎委蔓失所託憔悴徒傷悲知君無歲寒何用相因依賢王悲墜屨賢婦念遺簮重在不忘故微物何所欽嗟我昔遊友雲路揚徽音詎念宿昔好棄擲各飛沉昔如膠投漆今如辰與參桃李雖成蹊諒無松柏心王亳州賔賔字德卿亳社人貞祐二年進士由虹縣令入為尚書省令史壬辰京城受圍亳州為單父軍楊春所據春以事出德卿與故譙縣尉王進反正朝廷授進集慶軍節度使德卿同知使事明年夏六月車駕幸蔡道出于亳德卿逆謁上與語慰勞者久之詔行六部尚書事仍賜丗爵後數日部曲崔七輩以軍食不給送欵執德卿與副使吕鈞往市中鈞且行且拜泣涕不休德卿毅然無所屈大呼曰但殺但殺不能從汝也是日遇害德卿學詩甚力故所得亦多如風生傳令箭星落受降城烟外暮鐘催倦馬林間殘照聚歸鴉倉小軍爭米村荒虎食牛又贈剛上人云楞嚴讀罷爐煙冷淡坐山堂閲丗人言懷云功名不到書生手坐撫吳鈎惜壯圗題馬丘寺壁云落葉擁窗僧入靜孤燈穿屋客吟秋人甚稱之衛真道中毳𫀆落托又西征陌上東風小雪晴草色換回原燎黑冰澌消入水痕淸年華荏苒心情减邊事倉皇夢寐驚早晚渦南傳吉語一犁煙雨趂春耕舟中河伯夸秋漲舟人健晚凉櫓聲搖落月山氣鬱蒼蒼除夜落托功名挽不前圍爐兀坐夜蕭然臘殘畫角東風裏春到梅花小雪邊守得歲來慵攬鏡送將窮去自裝船平明點撿人間事只有詩魔似去年李夷夷字子遷後改名倵宛丘人苦於作詩賦古鏡云盤盤古皇州夢斷繁華歇一鞭春事忙耕出壠頭月土蝕背花昏蹄涔駭龍蹲須髯怒欲張縮手不敢捫又云壽光閲人多曽有此客否欽叔諸人甚愛之贈國醫張子和禁籞喧喧以字行粗工往往笑狂生天將借手開金匱雲本無心到玉京歌嘯動成千日醉留連翻厭五侯鯖祝君莫觸曹瞞怒丗上青黏要指名古劒古柵崖摧老雨天忽驚神物茁蒲然蛇吞元氣蟄千載龍逐奔霆脫九泉逆首未歸豪馘裏鋏歌聊發慨彈邊物猶屢出為時用撫匣澘然惜壯年書淵明傳後南渡龍孫角秃顚不甘橫斃寄奴弦一襟義氣麾周粟滿簡淸風削宋年雪徑低回松落落霜籬健羡菊鮮鮮時屯謐輩輕頽節顔厚吾家草木賢郭邦彥邦彥字平叔本鄠縣人僑寓陽翟遂占籍焉興定五年進士調永城簿以退讓見稱生丗不幸處于頑囂傲三者之間鬱鬱不自聊年未四十而死寄庵先生愛其詩甚嗟惜之秋夜聞彈箜篌露重花香飄不逺風微梧葉落無聲倡樓何處教新曲夜靜月髙弦索鳴村行三首棗花𥘉落路塵香燕掠麻池乍頡頏一片雲隂遮十頃賣瓜棚下午風涼芹葉蘆花岸兩邊釣溪石畔落孤鳶小畦引入平流水麻桿森森巳拍肩豆葉芃芃麻葉光稙禾得雨又催黃田家樂事誰真得牧子行歌醉叟狂酒醒少年驕氣總消磨萬事紛紜夢裏過三載自持葷食戒一心還𬒳性宗魔凌煙閣上榮名好聚窟洲邊樂事多今日酒酣都忘却亂吟俳語作狂歌讀毛詩含氣有喜怒觸物無不鳴天機泄鳥迹文字從此生誰言土葦器聲合天地淸朴壞犧氏瑟巧露媧皇笙末流不可障聲律隨合并遍讀蕭氏選不見真性情怨刺雜譏罵名曰離騷經頌美獻諂諛是謂之罘銘詩道𥘉不然自是時代更秦火燒不死此物如有靈至今三百篇殷殷金石聲漢儒各名家辨口劇分爭康成獨麾戈諸儒約連衡祭酒最後出千古老成精我欲讀爾雅不辨螯蟹名尚憐沈謝輩滿篋月露形孔徒凡幾人入室無長卿三子論性命舉丗為譏評白首草太玄才得覆醬罌不如匡鼎說愈笑人愈聽史學學字學優延安人兄才字才長住太學有聲學優正大中省試第一人釋褐舞陽簿辟盧氏令卒官妻李氏國𥘉河南尹成之孫女小詩殊有思致學優嘗客京師有所眷久而不歸李作詩寄之云百年風樹底誰淚到君前學優得詩即日命駕陪陳彥丈謁筠泉榮上人才長強隨禪客到西禪竹柏團靑䕃石泉一首小詩吟不就間情元在落花邊宫詞學優寶帶香構水府仙黃旗綵扇九龍船薰風十里瑶華島一派歌聲唱採蓮默翁溪山撗幅默翁龐都運才卿自號五雲雛鳯下遼天來作金鸞翰墨仙詩酒償殘鶯館債簡書薰破鹿門禪自憐歲月塵中老盡攬溪山筆底傳短草踈林秋一幅典刑人物記當年李道人嵩陽歸隱圖石壁城頭夜斬關軟紅塵底曉催班道人一笑那知許門外淸溪屋上山晚梅孤根春半恰春回剛逐夭桃艷杏開蝶子蜂兒應有語東風元不為渠來七夕箱牛回馭錦機間天上悲歡亦夢間月夜竝肩人不見蕭蕭風葉滿驪山醉後觀魚暫覺心差樂化蝶元來夢亦忙得似醉中都放下春風自與百花香過太室三輔祥開表聖期三呼夭壽與天齊殿栖碧瓦仍唐制洞鎖蒼苔失漢題柱玉巳聞安廟祏劒鋒重為剪撐黎升中剩有辭臣賦滿望鸞旗鳯蓋西玉柱卓劒二峯名侯冊冊字君澤以門資仕與杜仲梁張仲經劉京叔遊用是得名嘗作樂府云玉階春草傷心碧錦瑟華年過眼空又云千金買斷靑樓月爛醉桃花扇影風人多愛之壬辰歲病京師圍中作詞云回首鳯凰城下路人不見月茫茫明日君澤死其後京城亦丘墟矣寒食交遊零落葉辭柯歲月崢嶸馬注坡燕子不來寒食過滿城風雨落紅多醉中爛醉歸來驢失腳破靴指天冠倒卓起來白眼望靑天狂氣崢嶸無處著陶潜止酒意有在餔糟醊醨良未害君看謝奕對桓溫得失老兵何足怪螟蛉蜾螺待二豪飲中寧有山家濤平明徑訪陳驚坐相對春風把蟹螯學古體桐風吹月烏啼井蟾波濕露沉雲影素絲牽玉轉泉華美人睡覺燕支冷銀鉤掛簾北窗曉翠鬟臨鏡雙鸞小黃衫少年望不來寂寂庭階滿春草昨朝昨朝巳作春歸辭今日還成送客詩客子春光俱不見落花寂寂閉門時楚宫離宫樓閣與天通暮雨朝雲入夢中回首舊時歌舞地女蘿山鬼泣秋風王元粹元粹字子正初名元亮後止名粹平州人系出遼丗衣冠家年十八九作詩便有髙趣性習專固丗事不以纍其業故時輩無能當之者正大末用門資叙為南陽酒官遭亂流寓襄陽襄陽破隻身北歸寄食燕中遂為黃冠師有十月風霜侵病骨數家針線𥙷殘衣之句親舊有憐其孤苦欲為之更娶者子正業巳髙舉主太極道院竟不能自返年四十餘癸卯九月病卒詩人淄川楊叔能挽之云匹婦主中饋雖貧生理存五言造平淡隻影臥黃昏謾下陳蕃榻虛沾文舉尊北平家丗絶銜恨入荒原從弟鬱亦攻詩方之其兄蓋商周矣春日時年十八春日何慘慘春雲何隂隂桃李都未花况乃餘寒侵久在城市居而無人見尋讀易了一編靜見天地心貧士寡徒侣古來非獨今臨髙客子臨髙秋思生碧山無際暮雲撗但看八月草木落未見中原塵坌清流景暗徂人易老故園何在夢頻驚樽中有物同誰盡正要相看醉膽傾葉縣贈李長源相見各異縣歲暮風霜淸三日同眠食深見故人情借問何所歷大梁與秦京悠悠川途永冉冉歲月傾子當東北馳豫亦西南征人事相羈束何時當合并聊斟昆陽酒為澆胸次平出處固難必勉哉崇令名送李文起令鄜城好去鄜城宰當途有薦章長才試縣邑嘉政寄循良逺路連秋草征衫帶夕陽濟時公等在吾欲泛滄浪九日慿髙一望客心傷風景蕭條是楚鄉飛鴈欲歸何處去幽花還似昔年芳詩因感物聊成詠酒為隨人強舉觴十載蹉跎身事晚每逢佳節轉凄凉壽李長源匹馬短衣看此行看君誰信是書生聽詩未覺秦川逺何劒常懷晉水淸一飯見哀韓信恥千金為壽魯連輕壯年休灑新亭泪且為江山灌巨觥旅次旅次渾無定生涯亦漫勞病求方士藥寒憶故人袍避俗惟黃卷忘憂但濁醪柴門多落葉昨夜朔風髙西山避亂三首蒼山多回互四望令人迷過午日巳暖殘雲融為泥路滑不可進弱葛愁攀躋老幼委溝壑不如犬與雞嗷嗷同行子手中各有携汲澗為飲食架木為巖栖夜半三四驚翁媪禁兒啼念我長病母亂離隔東西野宿不得曉飛霜沾敝𫀆空山凝寒色天邊星月髙憶昨離鄂城數家同遁逃穿林恐相失前後聞呼號避亂但欲逺焉知登頓勞俯臨萬仞壑性命輕鴻毛靑靑道邊麥知是誰家田山田固巳薄榛石復相連旁有破茅屋日入不見煙借問舊居者聞亂巳西遷平生苦淪薄對此增慨然甲兵暗宇宙誰能安一㕓愁憂無從訴仰靣視蒼天伐木南澗底雙鹿過我前還鄂城舊居四月六日作南風兵塵逺病客返舊居入門顧西壁書籍亦無餘數口共嗷嗷日事將何如屋破未暇葺草滿須當鋤昔去季冬末今來孟夏初深愧資用絶時時煩里閭經廢宅誰家住宅北山隈亂後逋人尚未回惆悵門前是官道臨風一樹杏花開登鄂城寺樓亂後行藏豈自由此身雖在病兼憂一杯徒積黃泉恨四壁難為白日謀數極乾坤見中否跡隨溝壑恐長休可憐海內干戈滿獨對江山倚寺樓八月二十三日夜走西山婦病不能進兒啼不肯行蒼茫荒野外北風鼓鼙聲老幼夜中逃失路入榛荆月出天欲曙山頭烽火明鄧卒一戰潰敵勢遂縱橫昨朝使帖下主將亦還營嗷嗷二十載何時見升平我生值丗亂丗亂難為生哭李長源十月西來始哭君山中何處有孤墳以才見殺人皆惜忤物能全我未聞李白歌詩堪應詔陳琳書檄偶從軍窮途無地酬知巳㑹待升平緝舊文襄陽七絶句江雨初晴江漲發凉風吹水波浪開日暮津頭聞打鼓越商巴賈卸船來街頭魚米近頗貴縮項長腰最可珍江東蓴鱸亦何好能令張翰稱逹人近值喪亂棄中原南來亦復著南冠吾家舊井峴山畔野老謾作北人看襄陽城府自古雄千甍萬瓦當晴空短衣少年何處客相邀一醉楚樓中城東大堤堤上頭何處女郎同出遊紫蓋留連不歸去唱歌日暮傍汀洲江上小兒誇善沒一日入水知幾回汝曹未有機心在緣底鷗鳥不飛來歎息耆舊不復見欲問土風誰為陳羊公遺碑武侯廟江邊酒家說向人武侯廟武侯祠廟南山曲苔滿荒碑不堪讀客子登臨又一時秋色蒼蒼入喬木天下不可無竒材千年精爽安在哉孤吟裴回不忍去寒日欲下悲風來萬里萬里江山動楚吟異鄉風物長年心孤身轉覺乾坤窄往事空驚歲月深木落髙城初過鴈霜飛幽館夜聞砧蹉跎未就東逰計醉後悲歌淚滿襟醉後雲自無依鶴自孤此生誰信有窮途干戈二十年來客留得殘骸傍酒爐丹陽東樓仙人樓居避蒸濕東樓縹眇群仙集風吹髙柏影在衣忽驚滿坐蛟龍入日晚留連共一觴歸來如夢海生桑片雲送雨山頭黑傍水低飛燕子忙東樓雨中水邊人去燕爭泥風動緑荷香滿溪髙樹繞樓遮望眼獨看山色過墻西倚樓人看水東流橋上行人却望樓零落故宫無覔處蕭蕭禾黍滿城秋多年蒼柏拂簷枝燕子飛來語向誰枕簟不防留客住滿樓風雨下簾時雨入溪樓不見山雨晴依舊數峯間韋郎詩句王維畫好在幽人指顧閒庭中野蔓走靑蛇窗外萱葵亂彩霞雲漏斜陽雷漸逺東邊飛雨到瓊華好風吹袖覺凉生雨後東溪水面平無數荷蓮看正好却嫌波底亂蛙鳴溝水淸泠樹䕃圎下樓間步上樓眠夜來夢裏驚風雨元是松聲到枕邊王鬱鬱字飛伯少日作樂府擬古別離有黃鶴樓髙雲不飛鸚鵡洲寒星巳曙之句人多傳之其後入京師大為李欽叔所稱與之詩云詩句嫓國風下者猶楚辭贈詩者甚多有云憶昔頴亭見飛伯恍若夢中逢李白又云紫陘仙人今淵雲騎風御氣七尺身又云良金元有價白璧况無瑕又云王郎少年詩境新氣象慘淡含古春筆頭仙語復鬼語只有溫李無他人飛伯用是頗自貴重云春日行春日飛春野寂紅朋碧友元胎濕東風著意寒食時遊絲粘人困無力小鈴犢車宴堤沙鳯簫驚落瓊英花荒墳頽頽啼夕鴉草荒月黑鬼思家寄逺吟一封征人書秋帆瀟湘岸當君髙樓醉憶妾空閨嘆陽關曲城東車馬巳促裝城西江水靑茫茫緑楊陌上一杯酒離愁慘淡春無光秦樓花映晴煙直誰家少婦當門立金鞭入手紫燕嘶回首飛雲曉山碧傷别曲蘭臯飛暗塵征車紆去轍長安雖咫尺回首繁華歇故人亭下酒蛾眉眼中血平生慷慨腸忽作柔縧結傳聞紫塞旁秋烽下危堞班超未投筆來瑱空嚼鐡誰能金閨中坐眷姢姢月長安少年行新月平康金步蓮靑雲戚里玉連錢誰家年少秋風裏梁甫吟成抱劒眠楚妃怨凉風繞樹秋長河絡天碧深宫悄無人月暗莎雞泣古别離山腰露蕙含天淚江林楓葉秋容醉夫君八月鴈門行碎霜冷印白龍轡憶君挑妾初鳴琴琴中巳有白頭吟朝朝暮暮當時事言之秪足傷人心君不見湘妃二女哭舜時煙筠青玉紅珠滋蒼梧人去百想絶忍交今日生離别生離别情偏重不及雙飛南浦雲落紅寂寂春閨夢秋夜長秋風嫋嫋吹庭樹傷心一葉隨風去葉隨風去何所之似我年年困羈旅神蟉紆屈泥中蟠青雲未到誰汝憐愁來不寐起視夜斗柄斜指西南天折楊桞長安二月多緑楊逺信未到龍庭旁佳人中夜抱影坐風窗泠泠愁思長青天無雲一鏡潔萬户千門音響絶何人撗笛在髙樓玉龍呌徹春江月遊子吟短日空裴回流雲自來去茫茫曉野客衣單白露無聲落秋樹楊翟贈李司户國瑞洛陽賞盡牡丹春寂寞鈞臺對夕曛手折幽蘭贈行子多情惟有李參軍飲密國公諸子家宣平坊裏榆林巷便是臨淄公子家寂寞畫堂豪貴少時容詞客醉琵琶中州庚集卷終
