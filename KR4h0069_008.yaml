front:
  text: 中州辛集弟八
  hash: sha256:ecc0a69276a47d605cde1786d0a88f9acf4896a13129248f9b19fe2cb6448970
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0069_SBCK_008-1a}
body:
  text: 邢內翰具瞻一首王太常繪一首王禮部競一首杜佺一首邊轉運元勳二首李寧州之翰四首三興居士一首楊興宗一首趙亮功一首賈泳一首元日能一首范墀一首王雄州仲通一首韓內翰汝嘉一首王吏部啓一首朝洗馬㑹一首王內翰遵古二首王汾州璹二首李特進獻可二首雷溪先生魏道明二首學易先生雷思一首王大尹翛一首髙工部有鄰一首宋孟州揖二首髙轉運德裔一首路兾州仲顯一首張代州大節一首趙轉運慤三首郭祕監長倩一首郭録事用中一首趙太常之傑三首趙轉運鼎一首田轉運特秀一首趙漕副文昌一首路轉運忱一首髙密州公振一首張轉運彀一首宗御史端修一首張戶部翰五首李好復二首楊祕監邦基一首吕陳州子羽四首趙鹽部文昌一首韓內翰玉二首王都運擴一首趙吏部伯成三首梁録事仲新一首盧待制元一首太常卿石抹卋勩一首苑滑州中一首趙禮部思文六首李坊州芳一首劉鄠縣昂三首錦峰王仲元三首盧冝陽洵一首刁涇州白三首劉戶部光謙一首毛提舉端卿一首康司農錫一首張戶部德直一首馮辰一首王丗昌二首李宜陽過庭一首田錫二首張介一首龐漢一首宋景簫二首李警院天翼三首張參議澄四首劉神童微一首郭宣道一首張仲宣二首胡汲一首王修齡一首别起邢內翰具瞻具瞻字嵓夫遼西人天㑹二年進士與吳蔡為文章友仕至翰林待制出塞樓外青山半夕陽寒鴉翻墨點林霜正沙細草三千里一笛西風人斷腸王太常繪繪字質夫濟南人天㑹二年進士武陟道中詩云梧葉重勝迎日露蕎秧薄要護霜雲人頗稱之仕至太常卿有注太白詩行於丗江天秋晚圖萬頃波閒踏浪兒瀟湘秋晚趂歸時四山紅葉風聲健散入儂家欵乃詞王禮部競競字無競安陽人宋末登科仕國朝至禮部尚書兼翰林學士承㫖年六十四大定四年卒無競善作大字字或廣長丈餘而結密如小楷京都宫殿題榜皆其筆趙禮部以為古今弟一手唯党篆差可配耳一孫名道通字彥深今為黃冠師奉使江左讀同官蕭顯之西湖行記因題其後雲煙濃淡費臨摹行記看來即畫圗雲夢不妨吞八九筆頭滴水了西湖杜佺佺字真卿武功人宋末有詩名於關中兒時嘗作藥名詩有杜仲吾家好弟兄自然同姓又同名之句及以五言百韻上乾州通判馬㳙㳙大加賞異阜昌中登科􅊩官亦有聲馬嵬太真墓過客多題其詩甚多道陵詔録其詩得五百餘首付詞臣弟之真卿詩在髙等舊有錦溪集亂後不復見矣子師楊亦能詩尤工書翰奉天揚煥然云然馬嵬道中垂柳隂隂水拍堤春晴茅屋燕爭泥海棠正好東風惡狼藉殘紅送馬蹄邊轉運元勳元勳字輔臣豐州人後遷雲中祖貫道遼日狀元輔臣天㑹十年進士終於河閒路轉運使與弟元鼎元恕望瀛臺春望晴雲如困桞如癡丹杏開殘碧草齊一派望瀛臺下水暖風遲日浴鳬鷖七夕髙樓人散酒樽空漫擬新文送五窮獨倚南窗夜岑寂一鈎凉月下踈桐李寧州之翰字周卿濟南人宣和末擢弟人有勸參童貫可以徑至館職者周卿謝絶之國兵破洺州縳見元帥誘之使降語及君臣之際辭情慷慨自分一死帥憐之遂𬒳録用後守寧州陷田侍郎珏黨籍除名徙上京遇赦復官終於東平倅有漆園集行于丗子靈石尉謙孫德元今在鄉里書呈仲孚造物固難量誰能計寒餓失馬乃為福夢牛翻作禍長溪霜練靜修嶺蒼龍卧魂夢吾已安不勞歌楚些題密雲州學壁﨑嶇到此興何堪况復風謡意未諳旅舍蕭條空自遣胸懷磊落向誰談留連暮雨侵踈牖宛轉飛雲掃翠嵐因億林泉歸去好一燈幽夢繞春潭中京遇因長老天涯流落偶生還古剎相逢語夜䦨歎我歸途千里逺喜君禪榻一身安松聲不斷風吟細月影無邊露氣寒分手山堂更寥索冷雲衰草伴征鞍歲暮休怪年來白髮新天涯三載困埃塵隅離沙磧窮隂地收得桑榆老病身對雪莫吟秦嶺句撥醅且醉漢江春此生自斷無餘事何必區區問大鈞三興居士三興居士阜昌中人題平隂僧寺三吳家近水晶宫行坐紅香緑影中今日異鄉僧寺裏一盆荷葉戰西風楊興宗興宗髙陵人宋既渡江故興宗有龍南集豫同舍郎關中楊君美嘗見之出劒門嘔啞鳴櫓下長川萬疊青峰只眼前山鷓啄殘紅杏粉杜䳌啼破緑楊煙夢回蜀棧雲千片醉枕巴江月一船物色誰分杜陵老風騷牢落劒南天趙亮功亮功華州人嘗監冨平酒甘露寺鄭南峯下寺泉石間踈篁飛雨度山閣間雲生野塘簷前松子落厨際柏煙香别後聞鍾磬山隂空夕陽賈泳泳字漢甫洛陽人題安生僧寺天㑹巳酉豫嘗舉王化原李端中同過是寺屬兵厄甫罹堂宇頽弊繪素剝落秋草野蔓羅生階上盤桓終日間闃其無聞時風塵未靜竊謂此地當日就丘墟及今與端中復來則寺有僧簡師矣向之所見頽者巳完葺剝者復嚴潔鍾閣巍焉石塔巋焉庭樹鬱焉皆向之所未有者也因一讀舊題已經五稔自念五年之間所向齟齬十步九蹶卒陷機穽豈非禍患之來有積漸歟抑得失行止非人所能為歟嗚呼事去如夢人生如寄窮達相推雖賢智有不能免焉者顧余何足道哉所不知者他日過此寺之興廢余之得喪悲歡又何如也續題一詩貽失路者共為一嘆云癸丑七月八日題重來巳是五年遊憂患相仍欲白頭翻羡亭亭兩竒樹不知風雨過春秋元日能日能不知何許人與劉嵓老同時紅梅天上瓊兒白玉肌吳粧略約更相宜認桃辨杏由君眼自有溪風山月知巖老同賦云一點清香透雲雪是中那得杏花天評者謂二詩同意而日能為工范墀墀字元涉系出頴川有詩話行于丗和髙子𥘉梅春風也自惜流光只放寒梅一樹芳玉粉更粧前夜雪口脂猶注昔年香江湖昨夢誰同記詩酒風流豈易忘東閣何郎未全老花枝休笑鬢絲長王雄州仲通仲通字達夫長慶人天㑹六年進士皇統中陷田㲄黨藉編配五國㑹赦還丗宗即位復官終于永定軍節度使送客措足疑無地捫心幸有天故人成解后殘喘見哀憐落日驚魂外孤雲泪眼邊西歸萬里夢今夕到君船韓內翰汝嘉汝嘉字公度宛平人父昉遼末狀元仕國朝至宰相嘗作武元聖德神功碑為作者所稱公度皇統二年進士纍遷真定路轉運使坐公事遷清州防禦使召為翰林侍讀學士卒寄元真同年十年塵土鬢毛班杖屨還來踏故山葉寄殘紅春尚在雲酣濕翠雨仍慳不堪倚樹追前事更恐臨溪見病顔一日暫來千日去何時倦鳥得真還王吏部啓啓字希畢大興人正隆二年進士纍遷戶部貟外郎通州刺史用宰相萬公薦權右司郎中章宗即位不一歲遷工部侍郎即以河南北路提刑使拜吏部尚書使宋使還出為絳陽軍節度使致仕還鄉里與左丞董公參政馬公宣徽盧公尚書郭公為九老㑹年七十九卒子師揚字仲雄南渡後隱居嵩山時年巳六十餘經傳子史皆手自抄之如健舉子結夏課然希顔說仲雄在太學同舍號為閉户王先生其謹厚蓋家法云孫造字成叔今居東平王右轄許送名酒久而不到以詩戲之燕酒名髙四海傳兵厨許送巳經年靑看竹葉應猶淺紅比榴花恐更鮮枕上未消司馬渴車前空墮汝陽涎不如便約開東閣一看長鯨吸百川朝洗馬㑹㑹字公錫髙平人道院文元公之後宣和末中武舉仕為太子洗馬天眷二年經義進士為人美風儀器量宏博澤人經靖康之亂生徒解散公錫稍誘進之貧不能就舉者必厚為津遣在官下則分俸以給之至于李承旨致美昆仲亦出其門士論歸焉歷虞鄉猗氏臨晉三縣令以興平軍節度副使致仕年七十八終於家詩號泫水集虞鄉縣齊云官况薄於重搾酒瓜期近似欲殘碁王官谷云煙藏芳樹逺雲𥙷斷山齊鄉人至今傳之孫國章字公憲李承旨外孫教授鄉里樂於提誨諸生經指授者肅然如在官府進退拱揖皆有可觀蓋其家法云杜䳌杜宇啼聲枕上來一聲哀似一聲哀千哀萬怨無今古喚得行人若箇回王內翰遵古遵古字元仲父政金吾衛上將軍三子遵仁遵義元仲其季也元仲四子庭玉宇子溫內鄉令終於同知遼州軍州事庭堅字子貞有時名庭筠字子端庭掞字子文過太原贈髙天益天益能作大字遼海渺千里風塵今二毛心雖如筆正官不稱才髙管庫非君事山林必我曹相期老鄉國拂石弄雲璈野菊子貞鬪雞臺下秋風裏白白黃黃無數花日暮城南城北道半隨榛棘上樵車王汾州璹璹字君玉太原人天眷二年進士弟珙器玉珦汝玉皇統九年同榜家丗業醫有隂德聞里中嘗有金蠶金馬之瑞君玉仕至汾陽軍節度使鄉人榮之號三桂王氏行尚書省左右司郎中仲澤其從孫也金馬在部掾清卿房迄今寶之遊太寧寺西山踏破萬層靑與客携壷上太寧泉石有情容避俗軒裳無術可逃形雲榮屋角僧禪靜露下松梢鶴夢醒明日却尋塵境去曉猿啼月若為聽王元仲海嶽樓同諸分賦汝玉十二朱欄倚半空元龍髙卧定誰雄簷楹翠濕蓬山雨枕簟凉生弱水風物色撗陳詩卷裏雲濤飛動酒柸中謫仙㑹有騎鯨便八極神遊路可通李特進獻可獻可字仲和遼東人太師金源郡王石之子太師遼末狀元仲和丗宗元妃之弟大定十年史紹魚榜進士歷州縣入翰苑纍遷戶部貟外郎以事貶淸水令召為大興少尹遷戶部侍郎終於山東東西路提刑使衛紹王即位以仲和元舅贈特進道國公子道安特旨符寶郎淸水寒食感懷桃花零亂柳成隂人到春深思更深芳草戍樓天不盡異鄉寒食故鄉心召還過故關山過關天日正晴明誰道山神不丗情逺客得歸心緒别隴瀧間作斷腸聲雷溪先生魏道明道明字元道易縣人父遼天慶中登科仕國朝為兵部郎中子上達元真元化元道俱弟進士又皆有詩學元道最知名仕至安國軍節度使暮年居雷溪自號雷溪子有鼎新詩話行於丗元道春興云燕來燕去烏衣巷花落花開榖雨天髙麗館偏凉亭云凉或作梁碧海半彎蝸角國春風十里鴨頭波中秋云丹桂知經幾寒暑冰壼别是一山川其所得者也佛嵓寺虎谷西垠北口南撗橋過盡見松庵舊逰新夢猶能記般若真如得遍參霜圃擷𬞞充早供石泉煮茗薦餘甘殘年便擬依僧住過眼空花久巳諳退食竿頭犢鼻清貧在夢裏槐安舊習空退食歸來淡無事水邊長嘯看晴虹學易先生雷思思字西仲渾源人天德三年進士大定中任大理司直持法寬平至今稱之仕至同知北京轉運使事有易解行於丗弟志字尚仲亦弟進士仕至永定軍節度使西仲季子淵最知名食松子千嵓玉立盡長松半夜珠璣落雪風休道東遊無所得歲寒梁棟滿胸中王大尹翛翛字翛然范陽人皇統二年進士資禀鯁峭甫入仕即以材幹稱大定中皇子曹王尹大興翛然為少尹王移鎮北門復以同尹從之前後多所規益朝廷稱焉遷咸平轉運使改知瀋州坐為怨家所誣奪官宰相有為辨理者得鄭州防禦使章宗即位召拜禮部尚書以選為大興尹兩月政成發姦擊強剖繁理劇百年以來無有出其右者尋為護前者所排繫獄纍月天子知其非罪出之翛然幅巾歸范陽明年起為定國軍節度使致仕卒遺命無請諡無立碑然至今言名臣者必及焉烏子秀自左司貟外郎左遷上京幕官楚山白玉點蠅頭正坐胸中有九流同部吏郎皆五馬不知山鬼解揶揄髙工部有鄰有鄰字德卿遂城人數歲入小學州將為子娶婦驂御盈路同舍兒競觀之德卿讀書自若也大定三年弟進士歷州縣為尚書省令史時相議絀詞賦專明經德卿以賦有譎諌之義反復詰難竟得不罷爾後擢弟者廷試時務䇿亦自德卿發之明昌𥘉纍遷安國軍節度使父飛狐令某嘗尉南和以公事活千餘人德卿實生是邑父老有身及當時事者扶杖迎勞歡呼馬前德卿亦為立碑尉㕔不踰月子嵩猶子鑄同榜登科時人榮之泰和中使宋還拜工部尚書致仕卒德卿孝友廉介長於吏事所至興學校敦風化以儒雅自緣飾耆舊至今稱之子嵓字士瞻弟進士季子嶷字士美正大𥘉監察御史最知名馬嵬事去君王不奈何荒墳三尺馬嵬坡歸來枉為香囊泣不道生靈淚更多宋孟州楫楫字濟川長子人年十九天德三年擢弟除著作郎母老丐歸養許之泰和三年以省掾從吏部尚書梁肅使宋副趙王府長史直臣獵淮上射一虎斃之濟川有詩記其事語意俊拔泗州守刻石於鎮淮堂濟川官至孟州防禦使子元吉字祐之明昌二年進士元圭字達之泰和三年進士皆有名於時曾孫弘道今在武陟還紫雲寺素扇且題詩其上吳綾便靣小團團失手拈來亦厚顔障盡驛塵三十里却還明月紫雲閒庭槐庭槐先人手所植再丗淸隂方滿臺慚愧兒孫種桃李花枝凖擬當年開髙轉運德裔德裔字曼卿鶴野人髙才博學弱冠擢弟纍遷登聞撿院同知太府少監平陽少尹開州刺史豐王傅卒於西京路轉運使工於為文字畫尤有法所題卷軸今猶有存者嘗以樗軒所書比之氣韻形似無毫髮少異樗軒自望者甚髙何至學曼卿乃暗之合真異事也子元道殿中侍御史坐忘女女環州張氏年十三異夢之後坐忘巳四年矣贈詩者甚多結習銷來性自圎去留元不閒人天消搖自是忘形蝶枯寂寧同委脫蟬無礙真空常蕩蕩若存餘息尚綿綿立亡坐脫皆遊戲定力何嘗有變遷路兾州仲顯仲顯字伯達兾州人家丗寒微其母有賢行教伯達讀書國𥘉賦學家有類書名節事者新出價數十金大家兒有得之者輒私藏之母為伯達買此書撙衣節食纍年而後致戒伯達言此書當置學舍中必使同業者皆得觀少有靳固吾即焚之矣伯達正隆五年進士明昌𥘉授武安軍節度使鄉人榮之雲朔用兵伯達奉使江左還獻賜弊以佐軍未報而伯達死章廟詔以所獻還其家夫人傅氏曰此非吾夫意復上之有司不聽夫人付之州學買上田二千畝有竒以贍生徒故相馬琪德玉時判州事聞于朝賜號成德夫人伯達二子鐸字宣叔鈞字和叔俱有名于時宣叔為諌官諌章廟元妃李氏出細微不應上僣有纍聖德又其兄弟恃寵納賂將有楊國忠之禍坐謗訕除名宣叔布衣還鄉里傅夫人臨終敕宣叔曰汝以憂國愛君故極言直諫天子明聖特暫有所蔽計他日必復起汝前事須再言勿有所顧藉也墓碑不之載故表出之楊祕監釋伽出山像自從此老出山隅惱亂蒼生底事無他日若逢楊處士只教畫箇涅盤圖張代州大節大節字信之五臺人天眷中進士與興陵有藩邸之舊愛其真淳甚倚重之歷橫海軍節度使咸平大興尹吏部尚書河東北路兵馬都總管明昌𥘉請老特授鴈門節銊除其子嵓叟欣州刺史以榮其歸信之好奬進士類滄州徐韙太原王澤大興吕造經其指授卒成大名士論以風監歸之嵓叟字夢弼亦弟進士歷嵐潞懷三州節度終於集慶軍屏山謂吏事不及乃父而以長厚見稱子待舉臺掾選授奉御正大末從車駕東狩不知所終孫紹祖在東平同新進士吕子成輩宴集狀元樓鸚鵡新班宴杏園不妨老鶴也乘軒龍津橋上黃金榜三見門生是狀元趙轉運慤慤字叔通黃山先生渢之父也宋末汪彥章任鄆州教官通叔為學正嘗預酬唱故其詩文皆有源委國𥘉登科仕至同知南京路轉運使事擬古春風動地來依依燒痕青王孫行不歸離恨何時平翩翩誰家兒曉獵開紅旌雕弓插白羽怒馬懸朱纓圍合意氣雄厮養厭庖烹人生一春草時至何足榮君看五陵樹日暮悲風生蜀山曉發曉發蜀山道山深人自迷殘星數徽小斜月一梳低隔舍繅車響遙林杜宇啼區區事行役何日得安栖寒齊雪中書呈許守剪水作花開紛紛天上來聲淸偏傍竹艷冷欲欺梅積潤滋牟麥餘膏丐草萊窮閻休嘆息數日是春回郭祕監長倩長倩字曼卿文登人皇統丙寅經義乙科仕至祕書少監兼禮部郎中修起居注與施朋望王無競劉嵓老劉無黨相友善所撰石次明傳為時人所稱有崑崙集傳于丗子天驥義師院藂竹南軒移植自西壇瘦玉亭亭十數竿得法未應輸老柏植根兼得近幽蘭雖無穠艷包春色自許貞心老歲寒百草千花盡零落請君來向此中看郭録事用中用中字仲正平陽人大定七年進士歷浮山簿陜州録事卒年三十一有寂照居士集郝子玉毛牧達鄭仲康為之引其賦醋魚云身卧不知雲子白氣酣聊作木奴酸按博物志西羌仲秋日取鯉子不去鱗破腹以赤秫米飯鹽醋合糝之逾月則熟謂之秋鮓故仲正云然又賦雪云灞橋柳絮人千里楚澤蘆花水半扉殊有詩人思致恨不假之以年耳偶得參遍藂林懶出遊指端孤月照髙秋大千界裏間窺掌不二門中暗點頭掃地燒香聊自遣栽花種竹儘風流莊蒙抵死談齊物無物齊時也合休趙太常之傑之傑字伯英大定人本名宗傑避諱改大定十六年進士歷西京提刑副使棣州防禦使終于太常卿使宋還言事云宋人文敝之極且脆弱不足為慮邊部為可慮也其前識如此子繪名進士早卒孫季卿在燕中許道寧羣峰暮雪道士平生林野人醉中拈出雪峯真為君療却煙霞癖比似青囊藥更神題濟源龍潭寺樹圍修竹竹圍庵庵下泓然碧一潭極目荷花半秋色小撗圖上看江南除夜日月不肯留歲曆倐云畢僧坊見節物新正在明日夜半拊枕嘆半百又加七形骸念念改膂力能不失經言男數八此去才有一健者未可期况乃常衰疾物情忌盈滿君子愼名實行矣安退間吾其保終吉趙轉運鼎鼎字德新欒城人大定十六年進士喜作詩頗知道學屏山所許如此仕至西京路轉運使元日詩云拜嗟筋力隨年改飲覺屠酥到手遲惜不多見也子中立字正卿弟進士文譽甚著宿來同堡渭北洮南過却春窮邊冰雪更愁人來同驛裏題詩處破屋青燈一病身田轉運特秀特秀字彥實昜縣人大定十九年進士仕至太原轉運使喜作詩為周德卿李之純所賞感興云散木不材寧適用虛舟無意任乘流百年身丗槐安國千古人情羮頡侯賦古塔云締構百年人換丗消沉千古鳥盤空他類此彥實所居里名半十行弟五以五月五日生小字五兒二十五歲鄉府省御四試俱中弟五年五十五八月十五日卒造物之戲人如此五月五日生者見其賦集序胡國瑞云宿萬安寺長途鞍馬倦黃塵喜見空嵓萬疊雲漫漫野煙迷去鳥蕭蕭林葉帶殘曛苔封老檜龍鱗起石礙流泉燕尾分夜敞松窗耿無寐一庭蘿影月紛紛趙漕副文昌文昌字當時陵川人仕至京兆轉運副使嘗有詩云蟲聲連壞壁樹色入秋窗草香花落處山黑雨來時頗為黃華所稱歌扇媚娘巧作貫珠喉畫扇團團半掩羞唱到春山小顰處一輪明月為花愁路轉運忱忱字子誠平郭人大定二十二年進士纍遷監察御史終於河東北路轉運副使秋懷落日留虛壁秋風急戍樓髙歌鬼神夜揮涕虎狼秋豪貴少靑眼文章多白頭何時挂長劒天地一扁舟髙密州公振公振字特夫正隆𥘉進士歷南京留幕終於密州刺史詩有家學賦南園江鄉有翠蓋紅粧無俗韻緑隂青子更多情之句惜不多見也裴氏西園簿領沉迷倦不禁偶從名勝此幽尋竹隂踈處見潭影人語定時聞鳥音陳跡謾留千古恨歡逰聊慰十年心多情一片梁園月送我垂鞭出上林張轉運彀彀字伯英臨潁人大定二十八年進士仕至河東南路轉運使家多法書名畫古物袐玩周秦以來鏡至百餘枚他物稱是天性孝友與人交極誠𣢾古所謂博雅君子者伯英可以當之弟瑴字伯玉美風儀善談論氣質豪爽在之純希顔伯仲閒舉進士有聲埸屋及再上不中即拂衣去嘗自言丈夫子娶非尚主官不徒步至宰相不屑可也宰相李公仲修適之皆與之逰從不敢以布衣諸生處之家既貴顯厚於奉養擊鮮為具賔客日滿門窮晝竟夜卒以樂死嘗賦雪云樵􅍥雙鳬懶漁蓑一蝟拳醉後云日日飲燕市人人識張鬍西山晚來好飲酒不下驢賦畫石云腹非經笥口不肉食胸中止有磊磊落落百千萬之怪石興來茹噎快一吐將軍便欲關弓射氣母忽破碎物怪紛狼藉有時醉狂頭插筆掃盡人閒雪色壁其顚放如此石淙天后離宫在嵩山曲河即東坡為韓子華賦詩處也潁水洗餘髙士耳是非猶恐汚人牛區區武媚何為者水上磨崖紀宴遊宗御史端修端修字平叔一字伯正汝州人大定二十二年進士衛紹王避丗宗諱改宗為姬而天下止以宗平叔目之好學喜名節操履端徑慕司馬溫公之為人自為諸生時見者必悚然敬之明昌中自省掾拜監察御史車駕東狩是歲大寒人有凍死者平叔諌止之元妃兄弟李喜兒輩干預朝政平叔上書以逺小人為言道陵知其為喜兒發詔喜兒就問卿欲朕逺小人小人為誰其以姓名對平叔奏小人止李喜兒兄弟耳喜兒以聞李氏兄弟皆𬒳切責竟以訐直貶官平叔自守愈篤是是非非議論一出于正大為朝廷所知降詔褒諭以全州節度副使卒官平叔妻死不更娶潔居二十年士論髙之永寧遊彥哲調汝州司候將之官問為政平叔言為政不難治心養氣而巳彥哲不領明日復來云夏𥘉入官且臨先生鄉郡請問從政而先生乃以治心養氣為言思之不能得願終教之平叔曰子寧不知此耶治心則心正心正則不私養氣則氣平氣平則不暴不私不暴為政之術盡於此矣平叔墓碑及傳間間公為作稱其剛稜疾惡有鐵靣陳了翁之風人不以過云姪孫汝作正大末保山棚有功入守汝州力盡城復陷兵人欲降之不屈而死漫書泠靣宜教冷眼看只慙索米向長安隂崖何限枯松樹望見屏幃盡牡丹張户部翰翰字林卿秀容人大定二十八年進士為人有藴藉如素宦然纍遷監察御史翰林直學士貞祐𥘉户部侍郎車駕南渡出為河平軍節度使召拜户部尚書草創之際經費空竭雖米鹽細物皆倚之而辦豫嘗見於户曹邠州一書生言時事相與詰難凡數十條率不思而對雖反復計度者亦自不能到信通濟之良材也宣宗旦暮相之㑹卒年五十五弟翛字飛卿承安五年進士同知河東北路兵馬都總管事猶子天彛字仲常黃裳榜登科子天任字西美近侍局副使死於宋州之變贈石德固西湖之月清無塵橘中之樂猶避秦向來所見止此耳渠亦豈是真知津如君眼孔乃許大萬事付之塵甑墮兒能詩書又肯播著腳丗間看踏破青巾玉帶桃李花日斜空望紫雲車布衣誰識隱君子一馬㿉然何處家再過回公寺山州風土極邊頭二十年中復此遊青鬢巳隨人事改碧溪猶繞寺門流輕寒剪剪侵駝褐小雪霏霏入蜃樓為問勞生幾時了不誠長抱異鄉愁萬寧宫朝回宿雨𥘉收變曉凉宫槐恰得幾花黃鵲傳喜語留鞘尾泉打空山輥鞠場巳覺雲林非俗境更從衣䄂得天香太平朝野歡娛在不到蓮塘有底忙奉使髙麗過平州館昨日龍泉巳自竒一峰寒翠壓簷低兼并未似平州館屋上層巒屋下溪金郊驛山館翛然爾許清二更枕簟覺秋生西窗大好吟詩處聽了松聲又雨聲李好復好復字仲通安喜人明昌二年進士榆次令有能聲入為警巡使嘗以事縳一護衛道陵有投鼠之喻出為歷城令終于滑州刺史邵智夫同游南城園林晴晝蔚如煙林外支流盡水田落日趂墟人巳散鷺鷥飛上渡頭船雨中與客飲門外平橋一水分數聲漁唱隔溪聞暖風落絮飄香雪小雨沾花濕夢雲釀具未甘名長物詩壇聊欲張吾軍相逢莫惜通宵飲明日間身不屬君楊祕監邦基邦基字德茂大定中進士仕至祕書監禮部尚書文筆字畫有前輩風調丗獨以其畫比李伯時云墨梅粉蝶如知合斷魂啼粧先自怨黃昏花光筆底春風老寂寞嶺南煙雨痕吕陳州子羽子羽字唐卿大興人大定末進士仕至陳州防禦使元光末為酷吏所誣以乏軍興繫獄比赦至唐卿自縊死朝臣有辨其冤者詔復官希顔為制辭云毁譽之來在仁賢而不免是非之論至久逺而乃公人謂唐卿於此語為無愧屏山故人外傳吕氏自國朝以來父子昆弟凡中弟者六人以六桂名其堂貞幹字周卿尤自刻苦酷嗜文書著碣石志數十萬言皆近代以來事迹幽隱譎怪詼諧嘲評無所不有在史館論正統獨異衆人謂國家止當承遼大忤章廟㫖謫西京運幕量移北京致仕自號虎谷道人晚年感末疾又號吕跛子自作傳以見志間間公亦以為篤志君子也弟士安字晉卿卿雲字祥卿子鑑字德昭皆名士唐卿其從子云廣平道中風色著黧靣霜華侵老須昏埃埋故驛積雪縞修途凍䄂新詩句寒林古畫圗夜寒孤月上天地一冰壷宿章義廣勝寺小邑本無事我來勞簡書路長頻問馬人靜厭烹魚鍾冷僧參外燈殘客夢餘此心誰領㑹松月夜窗虛至日歲晏多風雪官間深屋廬小詩窮則變美酒數斯疏未草歸田賦空翻引睡書窗明添眼力巳覺日光舒李白醉歸圖春風醉䄂玉山頽落魄長安酒肆回忙煞中官尋不得沉香亭北牡丹開趙鹽部文昌文昌字公權平陽人明昌二年進士仕至遼東路鹽使博學好持論周常山甚愛之子觀字維道從事史院資謹厚不忤于物間間許其字畫進進不巳可到古人云軍中寄親舊軍中從事鬢絲垂把釣江湖與願違紅葉關河為客久黃花時節寄書歸霜天不盡孤雲逺秋意無聊一鴈飛鄉社故人應念我豈知南望更依依韓內翰玉玉字溫甫其先相人五丗祖繼寧仕石晉為行軍司馬從出帝北遷居析津曽孫知白仕遼為中書令孚為中書門下平章事賜田盤山遂為漁陽人曽祖錫字難老仕國朝以濟南尹致仕溫甫明昌五年經義詞賦兩科進士入翰林為應奉應制一日百篇文不加點又作元勳傳稱旨道陵嘆曰勳臣何幸得此家作傳耶泰和中建言開通州潞水漕渠船運至都升兩階授同知陜西東路轉運使事大安三年都城受圍夏人連陷邠涇陜西安撫司檄溫甫以鳳翔總管判官為都統府募軍旬月得萬人藉秦州場買馬官香及鳳翔冒買馬七百寶雞埋沒官鐵他州郡弓弩數千以給軍出屯華亭與夏人戰敗之獲牛馬千餘時夏兵五萬方圍平涼又戰于北原夏人疑大軍至是夜解去當路者忌其功驛奏溫甫與夏寇有謀朝廷疑之使使者授溫甫河平軍節度副使且覘其軍先是華州李公直以都城隔絶謀舉兵入援而溫甫恃其軍為可用亦欲為勤王之舉乃傳檄州郡云事推其本禍有所基始自賊臣貪容姦賂繼緣二帥貪錮威權既止夏臺之師旋致㑹河之敗又云齊魏以髙壘為能堅蒲絳以穿空為得計褁糧坐費盡膏血於生民棄甲復來竭資儲于國計要權力而望形勢連歲月而守妻孥又云命令不至京師奈何眄眄四集之師懸懸半歲之上人誰無死有臣子之當然事至于今忍君親之弗顧勿謂百年身後虛名一聽史臣只如今日目前何顔以居人丗公直一軍行有日矣將佐違約國朝人有不從者輒以軍法從事京兆統軍便謂公直據華州反遣都統楊圭襲取之皆置極刑公直曾為書約溫甫溫甫不預知其書乃為安撫所得公直書三一與京兆宣撫一與溫甫一與楊圭故京兆軍得因書襲華州及使者覘溫甫軍且疑預公直之謀即實其罪溫甫赴官道出華州𬒳囚死於郡學臨終書二詩壁閒士論冤之溫甫先賦怪松云昂藏殊未展傴僂旋自縮惜爾雲外姿耐此胯下辱又云木髙衆必摧地厚敢不局河中皆泛泛澗底自鬱鬱未幾𬒳禍人以為䜟云子不疑字居之小字錦郎以父死非罪誓不祿仕丙申之夏過豫冠氏出其父臨命時手書云此去冥路吾心皎默剛直之氣必不下沉兒可無慮丗亂時艱努力自護幽明雖異寧不見尓豫為之惻然臨終二詩客自朝那戍東過古鄭原衰年㑹凶運竒禍發流言白骨將為土青蠅且在樊仰呼天外恨沉思地中冤母喪半途鬼兒孤千里魂此心終不滅有路訴天閽天下無雙士軍中有一韓才名兩相纍丗道一何艱旅次窮冬暮囚孤永夜寒身亡家亦破巢覆卵寧完矍鑠鞍仍在驚呼鋏屢彈丈夫忠義耳無惜感歌還王都運擴擴字充之永平人明昌五年進士纍遷同知德州防禦使事山東飢詔馳驛赴官且以振貸事付之時棣州飢尤甚而不在發粟之數充之擅開倉救之朝廷不之罪也泰和七年夏旱充之以監察御史受詔審冤因為同列言往時審冤一切以末减為事至殺人者之罪亦貰出之地下之冤當誰理之乎使還言創設三司不便大略言三司之設特以刻剝為事大定間一曹望之為戶部天下倉廩府庫皆實百姓無愁怨之聲存乎其人不在改官稱也今三司官皆戶部舊貟掾屬亦户曹舊吏豈有愚於户部而智於三司者乞復戶部之舊無駭民聽可也崇慶初遷河東北路按察簽事上書言時病四一將不知兵二兵不可用三事不素定四用人違其長貞祐二年太原受兵充之之功為多最後權陜西西路轉運使行六部尚書前政太原喬丗權子實燕人趙伯成子文號為稱職充之表表自見雖處細務亦有法掾屬奔走從事無敢後者評者為子實寬緩欲為不忍欺子文愼密欲為不能欺皆未必能然獨王公之不敢欺為有徴云年六十三致仕卒子元慶字善甫歸德行六部郎中次子元亨題神霄宫清心軒紛紛百慮自心生方寸清來百慮平未了此心私自笑更憂時丗欲澄清趙吏部伯成伯成字子文宛平人明昌五年經義詞賦兩科進士博通書傳有貞積之力性沉厚言必中理從在太學日人以趙骨鯁目之纍遷侍御史拜中丞陜西西路轉運使靜難軍節度使哀宗即位召為吏部尚書坐為飛語所中罷官卒于嵩山中潞人宋文之說其臨終甚明了也蠟梅二首涷蕾含香蠟點勻古來幽谷有佳人詩家只怨和羹晚不道紅梅别是春冷艷踈香寂寞濵欲持何物向時人東風自是清狂手辦作竹籬茅舍春元弟以所業見投賦詩為贈耆舊隔存殁為君重嘆嗟人門得嵇紹文賦見張華夙有凌雲筆方乘犯斗槎忘年即吾友未可論通家梁録事仲新仲新字良輔朝城人明昌五年進士初試仙掌承露詩主司以為擅場用是知名卒于許州録事冮天暮雪圖南雪不到地霏霏滿竹樓沙河燈市裏春在木綿裘盧待制元元字子達玉田人父啓臣字雲叔弟進士仕宦亦達自號浭水先生和趙元發劉師魯葛藤韻云乳兔生長角鏖湯結厚冰木終成假佛髮不礙真僧莫認指為月須明火是燈拈花微笑處只記老胡曽子達幼而敏惠年未二十試於長安為䇿論魁擢弟後又中䇿魁明昌𥘉章廟設宏詞科命公卿舉所知子達與郭黻周詢張復亨就試凡七日並中選遂入翰苑纍遷至待制二兄長庸弟曽名進士又俱擢髙弟時人以燕山竇氏比之屏山故人外傳云爾子安字希謝翔字仲升仲升正大末登科間詠天近蒼龍闕居連白馬堂松聲得鄰舍山色出宫墻巷陋輪蹄少庭間日月長九衢紅霧裏亦有白雲鄉太常卿石抹丗績丗績字晉卿承安中進士終于禮部尚書子嵩字企隆應奉翰林文字父子皆死蔡州之難紙鳶鴟鳶鵰鶚誰雌雄假手成形本自同果物戲人人戲物為風乘我我乘風扶搖謾擬層霄上髙下都歸半紙中兒輩呶呶方佇目豈知天外有冥鴻苑滑州中中字極之大興人承安中進士纍官京西路司農少卿滑州刺史好賢樂善有前輩風流貞祐中髙琪當國專以威刑肅物士大夫𬒳捃托者笞辱與徒隸等醫家以酒下地龍散投以蠟丸則受杖者失痛覺此方大行於時極之有戲云嚼蠟誰知味最長一杯卯酒地龍香年來紙價長安貴不重新詩重藥方時人傳以為笑極之嗜讀書一以資于詩詩亦往往可傳壬辰卒于京師年五十七贈韶山退堂聰和尚郎當舞䄂少年埸線索機關似郭郎今日棚前間䄂手却從鼓笛看人忙趙禮部思文思文字庭玉永平人明昌五年進士貞祐中陷沒都城間關南渡遂為朝廷所知歷􅉑州刺史汝州防禦使金安集慶兩軍節度使召拜禮部尚書壬辰卒官為人誠實樂易自少日有君子長者之目南狩以後趙吏部子文楊禮部之美趙禮部周臣陳司諌正叔與庭玉皆完人終始無玷缺者也弟庭圭同榜登科三子敬叔介叔方叔今居鄉里試院中呈同官崔伯善李順之睡起松隂鳥雀譁忽驚霜果墮簾牙簡書迫促全踈酒眼力眵昏只費茶不學道人餐柏葉却隨舉子踏槐花提衡文字非吾事崔李風流有故家侯相浪溪歲寒堂靜中臺榭隔紅塵水色山光日日新不用㳂溪種松竹主人元是歲寒人捕蝗感草蟲有作雖是形模不苦爭汝能傷稼我能鳴誰知竟有長平禍玉石填來共一坑草蟲悲咽不能言亂逐螟蝗瘞古原水底癡龍正貪睡瓮中蝎虎更銜冤二詩疑圍城中作觀者可以意推之嵩山承天谷又云逍遙谷煙霞直上逍遙谷路轉山腰咫尺迷巳覺洞天分聖境更疑石磴是仙梯霜添紅葉黃花好天與金壼玉柱齊兩峯名醉倚西風正南望暮雲煙草一時低吊同年楊禮部之美海內文章選人中道德師爭教衰病足不到鳯凰池李坊州芳芳字執剛大興人承安二年進士歷乾坊兩州刺史同知都轉運使事為人敬賢下士欵曲周至聞人一善極口稱道士論以此歸之又精于吏事纍以廉能進秩正大末致仕殁於洛陽之難留别祿食愧踰量智困念歸愚符竹恆為纍幸及引年𥘉驅馬國西門𥘉服返田廬金閨富才彥絶足駃髙衢眷我謝朝蹟冠蓋寵歸途歸途豈不榮顧瞻亦踟蹰煌煌丹山鳯覽德萃淸都行人得捿止老鶴靑天孤石樓俯淸伊旁有野人居儻逢經過便山水足相娛劉鄠縣昂昂字次霄濟南人承安五年進士調鄠縣令劉光甫曽為同官稱次霄髙材博學詩時有佳句云零口早行馬上兀殘夢沉沉天向晨行雲如妬月古道不逢人野曠耕聲逺山髙露氣新哦詩無好語聊耳一吟呻讀國志二首虎視鯨吞卒未休一時人物盡風流婦翁正得黃承彥兒子當如孫仲謀乳臭䝉孫真寄坐齒寒鄰國莫分憂阿瞞狐媚無多罪誰作桓文得到頭泣漢遺黎血未乾繁昌新築受終壇天球寶鼎私臧獲坎井拗堂局鳳鸞地易主賔窮赤壁勢成螳雀事烏丸陳言衮衮令人厭枉就輸棊覆舊槃錦峰王仲元仲元字淸卿平隂人承安中進士以能書名天下歷京兆轉運司幕官子公荗今在雲中雪中同周臣內翰賦二首天上端花散不收溫溫叶氣浹皇州橫溪月淡梅宜臘平野風間麥有秋淸興雅髙東武㑹孤吟誰似霸陵遊西山玉立三千丈好句都輸趙倚樓雪𥘉稀時拂拂稍密自紛紛老樹曉迷月瘦峯寒怗雲色從空際得聲向靜中聞客枕淸無夢哦詩徹夜分贈青柯平隱者太華神明觀青柯小有天大哉霄壤內無此弟昆賢齊物三千行棲雲二百年𥘉平𥘉起後又得兩臞仙盧宜陽洵洵字仁甫髙平人李承旨致美見所作上梁文勉使就舉六十一歲吕造榜登科歷河南府教授河陽丞宜陽令致仕後居伊陽年八十三卒仁甫有詩學以鞏原及赤壁圗詩著名招飲云南園仙杏猩紅破北渚官醪玉汗醇巳約尊前成二老全勝月下作三人白溝白沙清淺不容舟遼宋封疆限此溝到了山河無定主碧波依舊只東流刀涇州白白字晉卿信都人吕造榜乙科歷涇州幕官入𥙷省掾卒作詩極致力樂府尤有風調今散失不復見矣渭水渭水秋天白驪山晚照紅行人迷古道老馬識新豐霜雪滿歸鬢乾坤猶轉蓬愁來成獨酌醉䄂障西風物質物質方圎定營營止自疲鶴鳬傷斷續鵬鷃失髙卑巧宦多成拙徐行未必遲可憐筝上鴈來往聽人移送花縱撗詩酒少年曽老矣追歡謝不能種出好花無用處東鄰乞與坐禪僧劉户部光謙光謙字達卿瀋州人父澤字潤之為部掾斷獄有隂德劉之昂與之酬唱其詩有云侯門舊說炎如火陋巷今猶冷似冰半夜柸槃長䄂舞白頭書冊短檠燈用是人不敢以府史待之達卿泰和三年進士資幹局處事詳雅為朝廷所知纍官司農少卿病瘡許州宣宗敕國醫診視之卒年五十六好問為舉子時識於登封相得甚歡尊酒間談笑有味使人不能忘也寄陳正叔雷希顔東南形勝古徐州人物休評弟幾流落落陳雷天下士故應連榻卧黃樓毛提舉端卿端卿字飛卿彭城人父矩桓州軍事判官殁王事飛卿二十歲始知讀書遊學齊魯間備極艱苦飢凍疾病不以廢業凡十年以經義魁東平泰和三年擢弟纍遷提舉榷貨司户部貟外郎性剛明疾惡過甚坐與監察御史相可否為所中傷降鄭州司候改孟津丞將復用矣㑹卒子思遹今居東平題崞縣郝子玉此君軒桂林名姓一枝新萬竹靑靑德有鄰渭上風煙分别派山陽詩酒屬間人心期巳到冰雪窟眼界不知花栁塵萱背從今看輝映嫩香新粉四時春康司農錫錫字伯祿寧晉人其祖嘗與兄弟分財他田宅無所問止取南中生口十餘人縱為民而巳以故家獨貧父奕為里胥性純篤縣令者倚之以納賄及令為御史所劾奕自念言直則令𬒳罪終丗不齒渠官長而我以事證之何以立於丗乃自縊而死令竟以無迹可尋獲免伯祿既養於外祖田氏田氏見伯祿骨骼異他兒謂當有望使之應童子舉飲食卧起躬自調護備極勞苦得解赴都一日日暮行茭葦中懼為同行所遺至背負伯祿而行及長師柏鄉王翰周輔束修不能備周輔與諸公共賙給之黃裳榜擢弟歷櫟陽簿警巡判官辟彭原令𥙷省掾考滿遷開封府判官拜監察御史言宰相侯摯師安石非相材提點近侍局宗室安之聲勢熖熖請託公行不可使久在禁近朝議偉之選授右司都事京南路司農丞破上蔡諸縣羣不逞把持之黨以河中治中充行六部郎中從軍城陷投水死伯祿孝于母友於其弟有恩義於朋友從政則死心以奉公為民古所謂公家之利知無不為者唯伯祿為然同年生如雷希顔兾京父宋飛卿之等名士數十人丗以比唐日龍虎榜至論氣質尚以伯祿為稱首云按部南陽有贈魯山佳政霑鄰邑白水歡謡見路人縣務淸談君自了農郊夙駕我何勤星河直上冰輪轉桃李前頭玉樹春海寓疲民望他日草堂那得遽移文張户部德直德直字伯直平陽人叔祖邦彥字彥才張楫榜登科以當川令致仕有松堂集行于丗嘗有詩云青山淡淡水溶溶盡出蒼祗點化工無限燒痕渾緑染可憐喬木待春風父迪祿字仲英明昌𥘉進士歷歧山上黨二縣令卒於省掾伯直貞祐三年進士釋褐新平簿辟藍田令秩滿父老詣行臺留再任去之日為立生祠移沔池通許召𥙷省掾選授右警巡使終於同知武勝軍節度使事子城今居永寧叔能見過度嶺千峯闊㳂溪一徑微山寒花發晚村逈客來稀強飲酬佳節悲歌送夕暉平生愛歡聚衰病與心違馮辰辰字駕之臨潼人貞祐三年進士辟涇陽令九歲知作詩雨後時年十三東風花外錦鳩啼喚起西山雨一犁緑滿𬞞畦人不到桔橰間立夕陽低王丗昌丗昌字慶長寧州人貞祐三年同進士出身以信都丞致仕過華州拔地三峰冷翠微落嵓飛瀑噴珠璣吟鞭落托騎驢過戰刃韜藏牧馬歸十丈玉蓮秋不謝半楞掌月晝還飛地靈人傑無遺逸未分蟠螭老布衣方城東寺海棠苦苣如針草有芒桃花輕薄絮顛狂少陵例有詩沾丐只枉無言到海棠李宜陽過庭過庭字庭訓武亭人貞祐二年進士歷宜陽永寧滎陽三縣令所去見思入為右曹掾斷獄寬平當妖賊李亨首坐所詿誤數百人皆從輕法正大中擢右三部司正終於昌武軍節度副使少日從太原王正之學故詩文皆有可觀人𥘉與交者多不能合久之知其為淳質長厚人也壬寅四月暴卒於東平子蕚字華甫讀公孫弘傳古來好客數平津我道真龍未必真一箇仲舒容不得不知開閣為何人田錫錫字永錫宛平人興定五年進士調新蔡主簿間居南陽驥立山下資豪爽自少日有聲埸屋閒作詩甚多吊蘇墳一篇有英靈還却眉山秀依舊東風草木天之句丗閧傳之牧牛圖干戈擾擾遍中州挽粟車行似水流何日承平如畫裏短蓑長笛一川秋故縣别業九折驅車夢易驚一㕓老計喜𥘉成園𬞞不借將軍地宅劵何勞宰相名山入平簷供逺翠水環釣石得深淸漫郎聱叟琦玗子誰悟他生與此生張介介字介夫彭城人正大元年經義弟一人歷鞏穀熟二縣令幼有賦聲為人有緼藉嘗贈詩人楊叔能末章云我貧自救如沃焦君來過我亦何聊為君欲寫貧士嘆才思殊减荒村謡楊𥘉以荒村謡得名故云讀天寶遺事不但昨非今亦非上皇騎馬泪沾衣曲江死後無忠諌却憶詞人秋鴈飛龐漢漢字茂弘平晉人正大末年進士沉毅有志節待次內鄉北山兵亂遇害終南溪冷雲低壓萬長楊十頃秋隂鎖北堂門外兵塵漲秦楚水邊煙景似湖湘荷翻山雨僧窗晚竹泛溪風客枕凉早晚𥘉平遂真隱繞陂間牧石頭羊宋景蕭景蕭字望之濟川族孫正大六年進士辟令秦安未赴遭亂望之於劉景玄為外兄故其詩頗獲沾丐嘗有荒山銷盡古今魂之句詩家稱焉河隂望河朔感寓一首南來邊報日駸駸思禹亭髙泪滿襟野燒為誰留白草荒城空自隔踈林鴈聲不斷天連水山色無情古又今離合興亡只如此往年爭識少陵心春雪用上官明之韻喋喋春蟲閙撲窗地爐茶鼎蚓聲長詩中有味淸於酒只缺冰梢數點香李警院天翼天翼字輔之固安人貞祐二年進士歷滎陽長社開封三縣令所在有治聲遷右警巡使汴梁既下僑寓聊城落薄失次無以為資辟濟南漕司從事方鑿圎枘了不與丗合衆口媒蘖竟罹非命輔之材具甚美且有志於學與人交欵曲周密久而愈厚死之日天下識與不識皆為流涕豫謂天道悠逺良不可知而天理之在人心者亦自不泯也還家三首幽花雜草滿城頭華屋唯殘土一丘鄉社舊人何處在語音強半是陳州牡丹樹下影堂前幾醉春風榖雨天二十六年渾一夢堂空樹老我華顚殊音異服不相親獨倚荒城淚滿巾秪有靑山淡相對似憐我是此鄉人張參議澄澄字之純别字仲經本出遼東烏惹族國𥘉遷之隆安神黃縣府君移官洛水因家焉之純早孤能自樹立避地洛西率資無旬日計而泰然以閉戶讀書為業嘗從辛敬之趙宜之講學故詩文皆有律度兵後居東平詩名藉甚如云齊客計窮思蹈海𣏌人癡絶謾憂天壞壁粘蝸艱國步荒池漂蟻失軍容此類甚多積雨積雨生頑痺新晴意自怡幽花依小徑野蔓媚踈籬髮少從梳懶年衰與杖宜腐儒慚用拙糲食復何辭和林秋日感懷寄張丈御史二首塞草枯黃秋未殘北風裘褐日生寒田園政憶遂𥘉賦冰雪莫吟行路難囊頴露錐徒自苦蒯緱有劒秪空彈南窗明暖無塵到慚愧髙人老鶡冠別家六見月牙新萬里風霜老病身塊坐氊廬心悄悄逺懷茅屋夢頻頻瓜田無取終成謗市虎相傳久是真鄉國歸程應歲暮火爐煨栗話情親輥馬圖飛塹乘城力亦優不應伏櫪便垂頭而今丗上無良樂兀兀黃塵輥得休劉神童微微字伯祥益都人七歲能文道陵召入宫賦鳯凰來儀二首稱旨賜經童出身係籍太學後登貞祐二年弟春柳應制得城字翠細圎勻緑線輕著行排立弄新晴更看三月春風裏散作飛花滿鳯城郭宣道宣道字德明邢州人系出衣冠家人物楚楚而有老成之風貞祐中客南陽名士定興張履坦之罷鄧州觀察閒居此縣之石橋見德明愛之招致門下飲食教督委曲周備遂有聲埸屋閒正大末沒兵中送同舍張耀卿𥙷掾中臺摩雲頭角看昴藏意外升沉豈易量取士皆知有科舉進身𥘉不在文章關心鴈塔功名晚試手烏臺歲月忙此去一官先有路獨憐燈火夜窗凉張仲宣仲宣字利夫相州人舉進士有聲子柔字子友今在林慮下弟主司頭腦舊冬烘更著書郎骨相窮曉賦得官何足道直須遮馬困吳融戲題石鹿蜂猴畫卷橫槊將軍馬足塵判花學士筆頭春功名果屬丹青手造物如何戲得人胡汲汲字直卿衛州人少有賦聲與新鄭傅伯祥呂鵬舉相友善兒寢陋而滑稽無窮時命不偶竟窮悴而死休笑參軍靴不襪休嗟門客食無魚燕鴻來去端誰使鵬鷃消搖本自如潦倒淵明三徑菊荒唐惠子五車書古人淡裏求真味身外紛華不羡渠王修齡修齡字紹先同州人詩有得意好花開早落喚愁芳草燒還生之句間間愛而戲之目為癡仙人黃葉行送祖唐臣歸柘縣送君黃葉山黃葉紛不掃上有蕭蕭之風樹下有漫漫之衰草山中黃葉行復青髀肉一消人自老酒盡意不盡執手臨古道古道連延走錦襄錦襄日暮浮雲翔一燈孤館相思處寒鴈一聲秋夜長中州辛集卷終
