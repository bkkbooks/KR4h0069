body:
  text: 常山周先生昂一百首黃山趙先生渢三十首劉左司昂一十一首魏内翰摶霄三首王隱君磵一十三首劉治中濤六首劉左司中二首路司諌鐸二十六首師拓一十二首酈著作權一十六首禮部楊公雲翼二十一首屏山李先生純甫二十九首常山周先生昂昂字德卿真定人父伯禄字天錫師事玄貞先生禇承亮承亮字荗先宣和六年擢弟調易州戸曹㑹皇子郎君破真定拘境内進士七十三人赴安國寺試䇿䇿目上皇不道少主失信舉人希旨極口毀詆荗先離席揖主文劉侍中言君父之過豈臣子所當言長揖而出劉爲之動容比牓除荗先𬒳黜餘悉放弟狀元許必軰自號士十二賢牓帥府重其名檄荗先以易州司户知槀城漫一應之㝷解印去年七十終弟子謚爲玄真先生大定𥘉弟進士仕至同知沁南軍節度使事德卿年二十一擢弟釋褐南和簿有異政遷良郷令入拜監察御史路宣叔以言事𬒳斥德卿送以詩坐謗訕停銓乆之起爲龍州都軍以邊功得復召超三司判官大安軍興權行六部貟外郎德卿傳其甥王從之文法云文章工於外而拙於内者可以驚四筵而不可以適獨坐可以取口稱而不可以得首肯又云文章以意爲主以字語爲役主強而役弱則無令不從今人往往驕其所役至跋扈難制甚者反役其主雖極辤語之工而豈文之正哉德卿𥘉有常山集喪亂後不復見從之能記三百餘首因得傳之屏山故人外傳云德卿以孝友聞又喜名節藹然仁義人也學術醇正文筆髙雅以杜子美韓退之爲法諸儒皆師尊之旣歷臺省爲人所擠竟坐詩得罪謫東海上十數年始入翰林言事愈切出佐三司非所好從宗室承𥙿軍承𥙿失利跳走上谷衆欲徑歸德卿獨不可城䧟與其從子嗣明同死於難嗣明字晦之短小精悍有古俠士風年未三十交游半天下識髙而志大善談論而中節作詩喜簡澹樂府尤温麗最長於義理之學下筆數千言𥘉不見其所從來試於府於禮部俱弟一擢弟主淶水簿從其叔北征得還而不忍去使晦之不死文字不及其叔而理性當過之甞謂學不至邵康節程伊川非儒者也其說類此而天不假年悲夫晚望煙抺平林水退沙碧山西畔夕陽家無人解得詩人意只有雲邊數點鴉香山山林朝市兩茫然紅葉黃花自一川野水趂人如有約長松閱丗不知年千篇未暇償詩債一飰聊從結淨縁欲問安心心巳了手書誰識是生前有感壯心未分逐流年衰鬢從渠衆目怜却恨詩情消减盡語言枯淡到中邊冷巖行賦冷巖相公所居冷巖賢宰相宗室永貞自號也或爲盂或爲鍾人心自異山本同天清雲逺望不極小孤宛在江流中澗之毛可筐筥山之木可斤斧唯有白雪髙崔嵬風吹不消自太古峴山何竒羊子所攀東山何秀謝公往還今爾胡爲籍甚乎人間于嗟乎冷山早起覆斗臨霜閣號鍾滿夜城飛揚他日事去住此時情文字工留滯塵沙管送迎百年今巳半􅏮􅏮畏虚生曉望曉樹雲重隱春城日半隂蒼茫塵土眼恍愡歳時心流落隨南北才華閱古今柴荆生事窄寧憶二踈金覊旅覊旅情方慘暄寒氣尚膠谷風連逺陣原樹鬱春梢要路嗟何及浮名乆已抛百年麁飯在真欲事誅茅早春小雪寒仍在煙花意巳深老侵長路鬢春蕩故園心幸可追沂詠何勞費越吟微躬應自愛莫作愧千金雪小雪暮能繁愁雲乆更昬細燈寒岀戸欹樹老當軒竹葉舊時釀梅花何處村賦詩空入夜愁絶與誰論雨過雨映髙簷過山開晩日明動雲方潰擁號水未休爭沙岸黿鼉岀荒庭鶴鸛行草泥沾屐齒杖䇿有餘清晚歩鬱鬱孤城隘飄飄絶塞㳺短衣忘逺歩髙興㑹清秋白水深樵谷黃雲古戍樓居人半裘毯撗管暮生愁夜門巷溪聲爽衣裳夜氣蘓地清林影散月静桂華孤左省詩頻詠南樓興不辜關山冰雪裏何處覔天隅晚望疊嶂何時出荒城落日低音書雲去北烽燧客愁西鷹隼乗秋擊狐狸倚暮啼吟詩且排悶佳句敢攀躋獨酌渺渺清溪闊悠悠弱藻沉客衣臨水静鳥影過舩深暫把魚竿坐因知静者心滄洲髙興動巢父可東㝷秋夜髙閣鍾𥘉殷層城月未光浄空含宇大卧斗帶星長暗覺巢烏動清聞露菊香誰家砧杵急應怯暮天凉對月月近天河白秋深夜氣清蛛絲時隱見兔杵正分明欹帽中霄落孤舟幾處行清風殊未發樹穩鵲休驚促織促織來何處秋風暗與期苦吟人不解多恨爾如知獨枕難安夜寒衣欲及時凌晨攬清鏡一半巳成絲溪南小徑通沙穩清溪帶樹深岸危伭白屋雲近没青岑洒落髙秋氣飛騰志士心雲臺與麟閣莫遣二毛侵継人韻髙興秋方逸幽居晚見過歡交寧厭數詩好不論多五字含風雅千篇費琢磨自知才力拙相報欲如何送李天英下弟不須寂寞恨東歸洗眼三年看一飛試捲波瀾入毫頴莫敎歐九識劉幾宿西藍聞道西藍好能來定有縁青山避喬木流水信平田歩屧迷深竹題詩惜暮煙塵心厭翻倒一室暫安禅北湖清明碧水隨時酒春風著處花歡嬉萬國本富貴五侯家金動樓頭管香廻日暮車老夫唯欲睡兒女莫相誇中秋夜髙陽對月端正髙陽月空庭又見過清風禁睡得白髪奈愁何尚識王良䇿難知織女梭金波流汨汨應爲照滹沲丘家㽵早發渡馬危橋立村雞暗樹號星稀白水闊霧重黒山髙外物誰能必人生㑹有勞鵾鵬終變化早晩借風濤邊月邊月弓𥘉滿山城角尚孤中天看獨立永夜興誰俱未覺風生暈空懷斗轉隅含情知白兔欲下更踟躕侍祠太室設燎彤庭敞懸燈玉殿深星河含爽朗城闕動隂沉祗慄誠𥘉薦馨香德巳歆清風動雲幕有喜見神心夜歩擊柝隣居静開門宿鳥驚西風秋半急北斗夜深明獨立乾坤大徐行杖屨輕遥怜漢宮闕重露濕金莖宋文貞公廟開元四荒不動塵柱石中原有老臣襄土一丘松栢暗長安三日荔枝新讀陳後山詩子美神功接混茫人閒無路可升堂一班管内時時見賺得陳郎兩鬢蒼偶書幽隂不放終年樹好味仍餘盡日茶詩業未降心有種丗縁𥘉盡眼無花失子白髪飄蕭老病身幾因兒女涙沾巾虚談悮丗王夷甫只有情鍾語最真北行即事二絶句聞道崑崙北風塵避僕窪至今悲漢節不合度流沙五月分衣蓈三軍受甲時莫敎麟閣將頻發羽林兒邊月驅車宿雙浦極目耿金波不有中秋景其如永夜何沙分疑白雪練失想明河桂樹元無意南傾獨好柯晨起鼓聲隨曉角合㳫起平荒宿火連岡小寒星墮水長鯨翻驚日動馬食快宵凉白首登壇將功名好自強西城道中草路幽香不動塵細蝉𥘉向葉閒聞溟濛小雨來無際雲與青山淡不分醉經齋爲虞郷麻長官賦詩書讀破自融神不羡雲安麹米春黃卷至今真味在莫將糟粕待前人清放齋平生眼白嫌物俗此身誰要冠帶束茶甌飯飽一飲足卧聽松風仰看屋孫資深歳寒堂丗態浮雲日夜移春蘭秋菊各爭時此心鐵石無人㑹唯有庭前栢樹知登綿山上方環合青峰挿劒長小平如掌寄禅房危欄半岀雲霄上祕景盡收天地藏野闊群山驚破碎雲低滄海認微茫九華籍甚因人顯迥秀可怜天一方謁先主廟暗粉陳丹半在亡短垣殘日共悲凉不須古碣書綿竹自有荒村記葆桑塵土衣冠曾繫馬歳時歌舞亦稱觴不應巴蜀江山麗能使英靈忘故郷送客相見席不暖送行情更牽只愁人靣隔不放馬蹄前塞迥雲垂地溪平水接天山川後期闊把臂兩茫然莫州道中大陵河東古莫州居人小屋如蝸牛屋邊向外何所有唯見白沙纍纍堆山丘車行沙中如倒拽風驚沙流失前轍馬啼半跛牛領穿三歩停鞭五歩歇雞聲人語無四隣晚風蕭蕭愁殺人人有禱沙應神遼東老兵非使臣何必埋却雙行輪即事憂患年來坐讀書田園抛却任荒蕪目前却得晨昬力碌碌無由似阿奴又逺目傷心千里餘凛然真覺近狼須雲邊處處是青塚馬上人人皆白鬚正憶荒村臨古道不堪獨樹點平蕪誰人與話西園路梅竹而今似畫圖感秋秋氣入行悵愁人中夜知雞聲與人語耿耿異常時清晨起危坐感嘆不自持羲和馭飛轂往返無停期春草如昨日巳復悲離離顧謂鏡中髮尓衰安得遟結束媚鞍馬荒山去委蛇黃花泫宵露緑野含晨曦吾事乆不諧悠悠隨所之有懷南澗約敢賦北山詩對月月滿秋仍早臺髙夜未徂水光先剡淡星影失踟躕玉帳傳更急荒城擊柝孤去年雙泪眼依舊入平蕪鵲山西征疲短服北望慘衰顔再宿殊雞舎相看獨鵲山斾沾新雨過鳥逐暮雲還白首瞻星漢何時鼓角閑望山中松地險蟠根古人稀小徑消雨皴開白雪風響入青霄未畏斧斤逼唯愁霹靂燒解鞍那避逺冷色故相招利渉道中寄子端行武昌望利渉髙青煙低白雪岡陵彌漫溝澮滅氤氲冷日從東來照我清影忽作溪水卧明月凌兢羸馬蝟毛縮詰曲微行蛇腹裂遺鞭脫鐙𥘉不知指僵欲墮骨欲折氊裘毛襪良可念我自無俻誰從輟人家土榻借微暖坐乆清冰落鬚頰黃華臞仙怯風馭乆向笙歌窟中蟄徑須持此逺相餉一洗夜堂花酒熱即事二首不堪華髮半頭生老去偏添愛嫪情新得家書來報喜舊時龜子遶床行一床安置似僧居白髮忘梳動月餘懶性漸成愁把筆小詩常擬倩人書九日不堪馬上逢佳節况是天涯望故郷髙㑹未容陪戲馬舊逰空復憶臨香癡雲黯黯方垂地小雪霏霏欲度墻猶頼多情數枝菊肯留金蘂待重陽對月萬里寥天月相隨不憚勞屢添華髮滿曾傍黒山髙影動新瓊杵光含舊寶刀常娥應見訝獨宿弊綈𫀆翠屏口七首去歳翠屏下東流看湧波愁將新鬢髮還對舊關河翅徤翻秋隼峰髙並晚駞草深饒虎跡夜黒欲誰過地擁河山壯營關劒甲重馬牛來細路燈火出寒松刁斗方嚴夜羔裘欲禦冬可怜天設險不入漢提封玉帳初鳴鼓金鞍半偃弓傷心看塞水對靣隔華風山去何時断雲來本自通不須驚異域曽在版圖中野蔓梢駞架輕泥濺馬鞍徑斜來險石溪急上清灘羽檄千山静羔裘六月寒長松空夾道蕭䬃不成看旌節瞻前帳風塵識舊坡眼平青草短情亂碧山多晚起方投筆前驅効執戈馬蹄須愛惜留渡北流河萬里來崩豁終年氣慘悽地窮青澗断天近玉繩低孛窟黄沙北崑崙白雪西故園何處覔搔首意空迷塞古秋風早山昬落日低積雲鴉度乆荒岸馬歸齊燈火看時出茅茨漸欲迷塵沙恨于役况乃對雞栖邊俗返闔看平野斜垣逐慢坡馬牛雖異域雞犬竟同窠木杵舂晨急糠燈照夜多淳風今巳破征歛爲兵戈山家七首秋日山田熟山家趣轉竒壠苞銀栗綴墻蔓緑雲垂野飯留佳客青錢付小兒主人愁喪亂數數問邊陲蕭颯晚風凉髙杠引斾長嶺雲殘宿陣陵日湛晨光巳作依劉表終須問葛強俯身馳萬里未覺鬢毛蒼年深師欲老秋至敵還輕但使財思義猶多死易生指揮無險阻感激在精誠萬古麒麟閣何曾浪得名簡易軍中事川原入望多草平鋪碧錦山逺出青螺逺愧桃花水重臨杏子河去年關塞意蕭䬃起悲歌赤澗蟠雙闕靑山壯一門放歌逰逺目箕踞得髙原地險勞天設邊戈厭日屯廟謀新控扼萬里可雄呑官舎暫投轄塞垣還着鞭路移新歳月心醉好山川方丈何由到桃源恐浪傳相看不隔水遺恨惜他年翡翠長松秀氍毹細草班屢經新渡水不數舊看山太華愁登陟終南費引攀豈知圖畫景長在馬蹄間北行卸鞍休馬倦解橐罷駞鳴細雨侵衣急長郊入卧平溪喧看水滿山黒厭雲生莫恠龍行數應知欲洗兵比歳頻分甲今年賀息兵競誇新戰士誰識舊書生北塞甘長别南天欲逺征二年迎復送空媿泰州城山丹花浪蘂誰能記山丹舊所聞卷花翻碧草低地落紅雲塞雨沾衣乆溪風入把勤莫言羗婦醜誰識漢昭君春日即事凍柳僵榆未改容狐裘貂帽尚冝風欲㝷把酒渾無處春在鳴鳩谷谷中寄金山老庭前雙栢樹作别似晨朝書信隨溪茗音聲落海潮嶺雲閑可翫邊月苦無憀相見愁他日風沙兩鬢凋寄王子明病起身仍懶眠多意尚迷筆成今夕把書似隔年題乆恨心期阻難邀物理齊燈花應解事岑寂向人低無題西風吹白水日暮動寒威野帳收旗盡奚兒飲馬歸梢梢聞鳥過慘慘見雲飛夜黒多豺虎荒村定敢依萱草萬里黃萱好風煙接路傍迹踈雖異域心宻竟中央染練成𥘉色移瓶得細香客愁無路遣始爲看花忘得家書窮愁非昔境白髮有深根涙破孤城郡書來萬里村鴈聲寒日夜秋色老乾坤爲問遊方子何時慰倚門書齋夜雨書齋冷西風木葉抛暗蛩侵壞壁低鴈落寒郊壯志𥘉甞膽吾生豈繫匏草玄雖閉戸未用客相嘲聞蟬冥機辝委蛻天籟發幽嘶迥露増晨洗清風借晚携暫成千里隔還作一枝低客思饒相觸愁時故不齊晚隂不成落日明西極髙雲暗朔方樓臺分照耀宇宙一蒼茫不借蛟龍便虚成燕雀忙何須遣雷怒鬱鬱繞髙梁竇氏園亭雲樹春秋色風泉日夜聲過庭髙幕暗吹簟轉雷驚翠䄂擎詩罷銀壷得酒傾平生躭野趣到此眼偏明磴鑿蒼崖破池通碧㵎流憩深怜洞室吟穩憶扁舟谷口堪髙隱河梁厭逺逰卜居真此地幽寂更何求即事二首南苑霓旌動繚墻天街蓮燭照脩廊斗南絳氣風吹盡小雨濛濛濕建章楊花顛倒入簾櫳睡鴨香殘碧霧空盡日㝷詩㝷不得鵓鴣聲在夢魂中代書寄大元伯南園臈蟻記同傾一帋書來萬里情日夜愁心隨柳色東風吹滿大梁城和路宣叔梅月底明肌粲壽陽道人呼入竹西堂安排臈味千鍾酒消破春風萬斛香花鳥有情應見惜娥眉傾國故難藏西湖骨朽東坡逺又爲君詩惱一埸新秋畏日經時暑清秋一夕凉真堪近燈火不復病衣裳宋玉悲揺落安仁愧老蒼鄙夫那及此睡美百憂忘靳子温𣢾春亭曽數花䰅傍藥欄春風不到酒盃寛自怜白首荒三徑桃李年年檐上看厎柱圖鬼門幽險深百篙人門過窄逾兩牢舟人叫渡口流血性命咫尺輕鴻毛開圖頓覺風雷怒素髮飄蕭激衰腐河來天上石不移安得此心如厎柱寒林七賢苦寒如此欲何之雪㡌風裘意自竒縱有清詩三百首未應肯得党家兒過省冤谷嬰兒偃蹇正堪孩換得山西老將回往者不追來不戒莫將家丗論人材魯直墨跡詩徤如提十萬兵東坡真欲避時名須知筆墨渾閑事猶與先生抵死争讀柳詩功名翕忽負𥘉心行和騷人澤畔吟開卷未終還復掩丗間無此最悲音憶劉及之千株何處封君橘二頃誰家負郭田長路風塵空費日故園書扎動經年未能免俗真聊耳不爲懷憂亦悄然襟抱何人與開釋論文除得老臞仙家園五畝園連竹三閒屋向陽氣和春浩蕩心靜日舒長花鳥成相識琴書付兩忘陶然一樽酒誰復記羲皇晚望獨立孤城上關山望不休異郷驚絕域逺目豁清秋未擬登樓作空歌出塞愁故園飛鳥外溪水正南流水南晚眺小徑通沙穩清溪帶樹深岸危低白屋雲近没青岑洒落髙秋氣飛騰志士心賦詩増感激流水是知音正月大風雨風如渤澥勢凌虚寒破貂裘力尚餘不是化工難倚頼也知青帝有驅除吊張益之當年讀書山堂中夜喜與君燈火同塵編壞簡如蠹攻弱質鄙鈍煩磨礲新詩如洗露芒鋒逸氣欲倒浮雲騘輕裘肥馬丗上雄吾徒一飯甞未充君如孔翠愁彫籠我亦哀鴻避鳴弓孤城一别天西東幾見黃葉飛霜風寄書無由魂夢通西望落日銜千峰他時雲雨儻相逢猶思驚雷起池龍鬼神無賴欺天公哀哉若人竟死窮自聞君亡阜生匈上訴九關無路從百年過眼如轉蓬夢時憂樂覺即空長夜漫漫何時終作詩寄哀投殯宮別本長夜漫漫何時終爲落句黃山趙先生渢渢字文孺弟進士明昌末終於禮部郎中性冲澹學道有得黃山其自號也閑閑趙公云黃山正書體兼顔蘇行草俻諸家體超放又似楊凝式當處黃魯直蘓才翁伯仲間党承旨篆陽冰以來一人而巳而以黃山配之至今人謂之党趙有黃山集行於丗凉陘云峩峩景明宫五雲湧蓬萊山空白晝永野曠清風來放逺亭晴日未消千嶂雪煖風先放一川花青天低處是平野白鳥去邊明落霞秦村道中云桃花都𬒳風吹却楊柳似將煙染成其餘多稱此晩宿山寺松門明月佛前燈庵在孤雲最上層犬吠一山秋意静𫾣門時有夜歸僧僊和尚坐脫識得從來覺性圎西歸隻履更翛然永嘉穩歩曹溪路臨濟飽叅黃栢禅桶底脫時無一物機輪轉處有三玄火中留得一莖草依舊光明爍大千黃山道中小榖城荒路屈盤石根寒碧漲秋灣千章秀木黃公廟一點飛雲白塔山好景落誰詩句裏蹇驢駞我畫圖間膏肓泉石真吾事莫厭乗閑數往還郊外逈野饒秋色髙臺半夕陽鷗眠沙渚静鳥没嶺雲長薄宦違幽興浮生更異郷歳華成白首丘壑愈難忘貢院中懷山中故居歳晩西溪路誰過舊草堂苔紋侵柱礎竹色度隣墻白首光隂疾青山意緒長相思老兄弟夜夜夢還郷貢院聞雨燈暗風飜幔蛬吟葉擁墻人如秋巳老愁與夜俱長滴盡堦前雨催成鏡裏霜黃花依舊好多病不能觴聚逺臺獨上平臺上風雲萬里來青山一樽酒落日未能回秋日感懷歳月不相饒秋風䬃巳至蚊雷稍收聲團扇且復置久雨不冝人新凉差怏意數篇東皐詩引我北䆫睡林泉乆隔闊塵土作憔悴伹有適人適何甞事吾事一貧旣忘懷所好無不遂丗無陶靖節何人知此味用仲謙元夕詩韻聞道藍田輞口㽵欹湖前日具飛航李膺定巳回仙棹王績無由入醉郷薄宦繫人如坐井窮愁染鬢欲成霜早知上界多官府只向人間作酒狂分韻賦雪得雨字大雪𥘉不知開門已無路驚喜視曆曰此瑞固有數池冰凍欲合林鴉噤仍聚巳成玉壷瑩尚作寶花雨造物固多才中有無盡句大兒擬圭璧小兒比塩絮後人例蹈襲彌復入窘歩聚星號令嚴亦自警未悟誰有五色筆繪此天地素好語覔不來更待偶然遇和荗才韻十年爲客未還家嬴得毶毶兩鬢華别後故人應念我不來踏雪看梅花留題西溪三絶誰開玉鑑瀉天光占断人間六月凉日落沙禽猶未散也知受用藕花香波光湛碧冷無痕眇眇輕風起縠紋認得朝來踈雨過却因水底見飛雲緫道西溪畫不如豈知造物用功夫蟾光忽作靈犀透表裏通明兩玉壷九日懷尹無忌茅屋秋蕭索幽居盡日閑碧雲看欲暮逺客幾時還書劒成何事風塵只強顔思君千里夢夜夜到燕山立秋日月如川流去矣不復回萬物各有營榮悴更相催餘生苦多艱壯志乆摧頽念欲學還丹鬱紆殊未諧今朝立新秋庭樹西風來舉首望天宇飛雲獨徘徊呼兒且沽酒浩歌豁秋懷醉中得妙理逸興何悠哉和崔深道春寒長風忽落青林端風聲洶若江聲寒太隂盤礴乱天序推書撲筆成長嘆美人何許媚幽獨使我不見心無歡頗聞隱居誦莊屈蓬䆫坐擁塵編殘琴歌酒賦兩寂寞懸知此興殊未䦨遟君一來吐欵要舉盃放目雲天寛西城觀水西山秋水來天地巨野撗流浩無際長風蹙浪鱗甲生兩角斜分半山際繚堤北去接飛橋鼓鼙洶洶飜驚濤中流突兀玉山起直疑河伯驅靈鰲冷光揺蕩秋雲白渾似夢中逰震澤隔林我欲喚漁郎孤帆忽如過鳥翼安得酒舩常拍浮四時甘味置兩頭何人與我同此樂頴陽試覔元丹丘盆池荷花一泓寒碧甃波光雨後妖紅獨自芳不許纎塵汚天質政須淸吹發幽香洛神𥘉試淩波襪妃子來從礜石湯休笑埋盆等兒戲要令引夢水雲郷扈從車駕至荆山海上飛來碧玉峯瑶林琪樹更青葱參差樓觀浮雲表顛倒山光落鏡中侍從有臣司碧落笑談無處不清風好分靈沼爲膏澤乞與人閒作歳豐中秋秋氣平分月正明蘂珠宫闕對蓬瀛巳驅急雨消殘暑不遣微雲點太清簾外清風飄桂子夜深凉露滴金莖聖朝不奏霓裳曲四海歌謳即樂聲史舜元甞從文孺學詩說道陵中秋賞月瑶光樓召文孺對御賦詩以清字爲韻道陵讀至落句大加賞異手酌金鍾以賜且字之曰文孺以此鍾賜汝作酒直士林榮之髙祖言吾不如子房君父字呼臣下不爲無故事也題齊物堂至人識破浮生理萬變何甞有不同果蝶夢周周夢蝶爲風乗我我乗風得時未必全無識窮處方知却有通畢竟欲齊齊底物丗間元是一虚空秋郊晚望桃竹猶堪杖幽㝷興頗嘉池荷能幾葉籬菊不多花地坼成龜兆林枯岀犬牙村農慶豐歳社鼓巳三撾元日馬上逢元日東風送客愁滹沲春水渡􅌡海夕陽樓雪照潘郎鬢塵侵季子裘勞生巳強半更欲玷淸流過良郷縣學儒宫宜地僻竟日有餘淸殿古碑仍在庭空草自生風髙時脫木雲重欲摧城客興巳消洒秋堂更雨聲和詵上人雪詩貧巷仍飛雪空庭逈絕塵照䆫疑不夜着樹忽驚春枕冷夢魂短山明天宇新賦詩分氣象定有㶚陵人澗上逺徑留殘照踈林出小園山川半豺虎歳月且琴尊杜老新雞柵龐公舊鹿門不才真忝竊人道典刑存新凉頗覺小眠快便知秋意真淸風論丗舊老圃得時新移竹觀君子飜書訪古人可人陶靖節隨意葛天民過蓚縣董大夫廟漢朝元不用真儒豈信忠嘉益帝圖賈誼長沙晁錯死不須獨恨老江都寓居冩懷平陸温風雪半消孤煙籬落隔溪橋趂虚人去林皐静時有晚鴉銜墮樵劉左司昂昂字之昂興州人大定十九進士曽髙而下以科名相踵者七丗矣昂天資警悟律賦自成一家輕便巧麗爲場屋捷法作詩得晩唐體尤工絶句往往膾炙人口張秦娥者頗能小詩其賦逺山云秋水一抺碧殘霞幾縷紅水窮霞盡處隱隱兩三峯其後流落之昂贈詩云逺山句好畫難成柳眼才多緫是情今日衰顔人不識倚爐空聽煑茶聲又云二頃山田半欲蕪子孫零落一身孤寒䆫昨夜蕭蕭雨紅日花梢入夢無娥爲之泣下屏山故人外傳記之昂早得仕年三十三省掾考滿授平涼路轉運副使人謂卿相可坐致矣術士有言之昂官止五品者之昂自望者甚厚不信也俄丁母憂爲當塗者所忌連蹇十年卜居洛陽有終焉之志有薦其才於道陵者泰和𥘉自國子司業擢左司郎中將大用矣㑹遼陽人大中欲揺執政賈鉉爲言者所劾辤連之昂道陵震怒一時聞人如史肅李著王宇宗室從郁皆譴逐之鉉㝷亦罷政之昂降上京留守判官道卒竟如術者之言醉後禅僧勸讀傳燈録道士敎行進火功今日興來俱破戒黃花籬落醉西風山中雨嵩髙山下逢秋雨破傘遮頭過野橋此景此時誰㑹得淸如䆫下聽芭蕉都門觀别買酒消閑愁剪刀剪流水閑愁不可消流水無窮巳悠悠䆫下断腸波緫是行人墮淚多門外馬嘶思逺道小嚬猶唱渭城歌歌聲未断征鞍發望断垂楊人影滅斜陽照影却歸來兩地相望今夜月閱人多矣主人翁離别都歸一笑中陌上行人終不悟年年楊柳怨春風客亭折盡官橋楊柳枝春風依舊緑絲絲啼鸎爲向行人道離别何時是盡時山堂山雨溪邊過山堂夜獨呤悠悠松上月照見壁閒琴弔張維翰維中兄弟蓮幕清曹粉署仙福兮禍倚豈其天座隅異物鵩來止地底佳城馬不前萬里青雲今巳矣兩枝丹桂竟徒然阿奴莫愛聲名好碌碌持家亦自賢維翰名甫弟一人擢弟維中名庸此牓乙科阿奴謂冉冉字維賢後以省元登科兄弟科名如此近丗所未有也即事二首雨洗明河畫扇收胡床露冷藥欄秋墻隂未得中庭月一點螢光草際流山花山雨相兼落溪水溪雲一様閑野店無人問春事酒旗風外鳥關關歌風臺劉項興亡轉燭過亂蝉吟破漢山河長陵卧老咸陽月沛上猶傳擊筑歌弔李仲坦仲坦物故後省試魁始有特恩之命文章巧與丗相違身後新恩事巳非不及萋萋原上草一番春雨緑如衣王官谷潛溪時照塵埃客微雨不遮天柱峯斜日落花人去盡淡煙樓閣數聲鍾魏内翰摶霄摶霄字飛卿初用䕃𥙷以薦書從事史舘明昌中宏詞中選授應奉翰林文字未幾卒飛卿詩以富艶稱如張公子席間賦嵩山筆力豪逸党承旨許其在劉無黨之上云送河南府尹張壽甫赴闕夜半恩綸出漢宫朝家虚席待燕公春風巳徧湖山外元氣還歸鼎鼐中侍從定誰陪白鳳伭回空自惜冥鴻洛川萬頃蒲桃碧長與清愁日夜東田若虚遊龍門寳應用天隨子體賦詩因次其韻二首少室右臂禹所断開排清伊來髙寒土肉養石自古秀山腰流泉無時乾佛髻滴滴染濕翠松風颼颼鳴驚湍白傅巳矣不可見予誰從之投歸鞍闕塞若廐馬奔騰多竒庬慤爾不可沮西來何悾悾駿足忽勒破英才如拘龐有客善體物新詩留僧䆫晏軰豈足道微瀾生盆缸徑續𣏌菊意來浮玻璃江吏部昔竄謫猶能題臨瀧况此六大寺磓堂時鳴樁紫翠出萬瓦天風旋珠幢興寄百斛鼎無才誰其扛㑹聽項籍約吾將從之降王隱君磵磵字逸賔先丗家臨洛至逸賔遂爲汴梁人愽學能文不就科舉孝友天至非其食不食家無甔石之儲晏如也明昌中故相馬吉甫惠迪判開封舉逸賔王彦功游宗之德行才能逸賔得鹿邑主簿就乞致仕彦功以親老調鞏州敎官宗之讓不受三人者雖岀處不齊而時人皆以髙士目之閑閑公甞集党承旨趙黃山路司諌劉之昂尹無忌周德卿與逸賔七人詩刻木以傳目爲明昌辤人雅製云暮春郭南大梁城外孤臺傍煙昬水碧春林芳慿髙極目見歸鴈風物令人思故郷紫金山下斜陽暮萬里川光照雲樹山間細雨花落時何人來往東風路記南塘所見簡孟友之大橋南郭野橋東十里垂楊十里風渺渺煙波連御道離離雲稼入郊宫雨滋蔓草曉逾緑日映荷花晩更紅登覧只宜開笑口尊前六客四衰翁次文逺韻野性唯便􅞔寂居蒼苔鳥跡滿庭書林花過雨紅猶重籬竹和煙翠亦踈已與農人成保社更令兒軰學耕鋤賞音只有東郊客日䄂新詩到敝廬謝竹堂先生見過學稼古寺側結廬髙柳隂音書故交絕歳月杜門深新雪添衰鬢寒灰死壯心西州賢别駕連日肯相㝷次友之秋日雨後韻洺州秋雨後幽勝可供閑白首留他縣歸心遶故山野泉來竹底危磴入雲間尚記登髙㑹重嵓細菊班寓居南村朝來出門無所適野徑雨晴沙不泥鼓笛誰家賽春社杖藜隨過柘岡西雜詩七首隂隂緑樹闇庭除散盡鳴禽静有餘獨對爐薫坐終日㑹心唯有漆園書瓦爐栢子細煙消閑讀禅經破寂寥風細月髙人巳静隔䆫踈竹夜蕭蕭晴日南溪物色饒草芽新緑凍全消金絲柳底洲沙没數尺流波拍野橋南畝東皐春務時田家候雨罷耕犂却汲井泉澆藥圃更䟽陂水灌麻畦竹繞沙村水漫流鵁鶄鸂鶒對沉浮一竿便擬從漁父卷置琴書買釣舟屋頭藂木撼蒼煙風卷飛花到枕邊南寺有僧來問字打門驚覺午䆫眠漢梁王苑古臺西秋思紛紛獨杖藜雲壓髙城鴈飛盡一聲寒角夕陽低劉治中濤濤字及之夏津人明昌二年同進士用戸部尚書孫鐸薦入翰苑歷太原運副汾州倅入爲太子賛善以彰德治中致仕㝷卒沁南節度康塘良輔葬之林慮之寳嚴小雪黃紬𬒳暖起還慵小雪經簷落旋空舊舘簿書寛半餉冷官庭戸滿西風馬遭萁窘三山瘦人坐詩工五鬼窮安得東風囑桃李也敎春色到衰翁和德卿雪南華香火是真依不學呼鷹雪打圍梁苑舊逰荒徑改頴濵新唱綵牋飛春生東閤酣朝飲寒入西隣泣夜機夢寐扁舟釣江水重嗟白髮此心違井陘寒壓歳峥嶸山隂日少晴敗眠鷄小梗勸坐火多情便靣堪長路牽頭破老兵誰敎戀升斗盡室此途行宿平遥集福寺院僻和僧静門閑與晝長燕泥朝雨淖蝶蘂晚風香野興煎詩思乾愁繞客腸青奴如解事供我暮䆫凉送王純叔守曹州栢路人看御史騘年來眼落簿書藂單車乍别金鑾月五馬頻嘶玉勒風故國山河連小鄶舊家雞犬識新豐遥知别夜詩成處醉袖淋浪蜜炬紅戲用前人語題天平别墅表聖當年絹五千休休亭下買林泉黃華靣目君還見天柱峯髙不直錢劉左司中中字正夫漁陽人屏山故人外傳云正夫爲人短小精悍滑稽玩丗中明昌五年詞賦經義弟詩清便可喜賦甚得楚辝句法尤長於古文典雅雄放有韓柳氣象敎授弟子王若虚髙法颺張履張雲卿皆擢髙弟學古文者翕然宗之曰劉先生以省掾從軍南下改授應奉翰林文字爲主帥所重常預秘謀書檄露布皆岀其手軍還授右司都事將大用矣㑹卒有文集藏于家周德卿甞謂正夫可敬從之可愛之純可畏皆人豪也冷嵓公柳溪斗印輕抛繫肘金故園風物動歸心柳含煙翠絲千尺水冩天容玉一㝷山色只於閑裏好風波不似向來深人閒桃李栽培滿換得溪南十畝隂龍門石佛鑿破蒼崖巳失眞又添行客眼中塵請君看取他山石不費工夫緫法身路司諌鐸鐸字宣叔伯達之子與弟鈞和叔父子俱有重名而宣叔文最竒尤長於詩精緻温潤自成一家任臺諌有古直臣之風貞祐𥘉出爲孟州防禦使城䧟投沁水死有虚舟居士集得之鄉人劉庭幹家書州驛壁雉堞俯巳見羊腸行尚難炊煙界沮水老木識橋山畤廢無人吊臺髙有鳥還客懷秋館雨未老鬢先斑王子端挽辤才名如此不償窮再入承明一病翁白髮光隂文字裏黃華林麓畫圖中謫仙猶想屋梁月荆産空懷松下風聊應丗縁縁故在會看歸鶴語遼東慶壽寺晚歸九陌黃塵没馬頭眼明佛界接仙洲清溪照影紅蕖晚禅榻坐凉碧樹秋少室宗風間木義𥙿陵遺墨爛銀鈎對談不覺山銜月只爲松風更少留賦丈室碧玉壷善甫賦詩鐸亦奉和二首心知雲路等榆枋戲作方壷當玉堂虚静自應祥止止逍遥均是一蒼蒼心含寳月無中外身着青霞可頡頏政爾天遊到疑始覺知誰送竹風香隨人作計魚千里知命無憂鳥一天碧落雲深堪避丗碧落洞名九華煙煖可忘年平章萬有歸玄覧收拾方心入大圎上界真人自官府不妨聊作橘中仙次韻荅季通華顛何意軟紅塵霄漢聊收退鷁身方喜長松倚東野又從淨社得遺民髙山流水知音少霽月光風發興新頼有好詩相慰籍不然開口欲誰親雨中月翳有時吐風薰俄自清雲廻暑天影雨進夜䆫聲眼聽叅天籟神游得化城覺來還故處飢䑕撼燈檠輞川畫圖風景是亭榭歳年非秋色半黃落人煙深翠微暗溪魚得計杳靄鳥忘機觸物增惆悵吾廬早晩歸髙唐劉氏駐春園風光去人無咫尺人自塵勞不相及此心旣定境從之雪樹霜林亦春色劉翁有道乆陸沉十年種樹今成隂醉郷天地白日永鶗鴂栗留皆好音良辰行樂今巳矣依舊東流泛蘭芷誰道青春挽不留鯉庭看取新桃李膏車秣馬吾將歸誓與清景相追隨安用苦求三徑資明月常滿千家墀赫仲華求賦鄴臺張氏野堂白沙翠竹小江村路轉西郊隔市塵入坐好山如有素忘情鷗鳥澹相親芋魁飯豆平生足澗草嵓花各自春得酒誰能更覊束不妨倒着白綸巾題鄒公所藏淵明歸去來圖牛刀小試義熈前一日懷歸豈偶然有意候君門外柳無機還我酒中天貞姿佳菊秋霜裏真意南山夕鳥邊善學展禽唯此老萬人海裏小斜川衞州贈子深節度淇上風光萃一樓樽前北海百無憂平分玉鑑漁村晚四望黄雲寡婦秋望一作卷斜照鈎簾納煙翠微飈髙枕看安流梅天消息和羹近老稚寧容挽鄧侯潼關樓迥臨飛鳥車升汗十牛地靈開翠壁天逺送黃流趣戰如姧計當關豈壯猷天梯且失守况說土山頭七夕與信叔仲荀㑹飲晚歸有作秋香㵼月笑談香飲散歸來夜未央闕角星河揺淡影柳行燈火試新凉雄飛勲業歸時輩信美江山着漫郎萬事浮雲心鐵石休將梁國嚇蒙莊襄城道中有言長官暴横者禾黍伭風汝水長遟遟驛騎困秋陽病軀官事交相礙夢雨行雲肯借凉盡說秋蟲不傷稼却愁苛政苦於蝗詩成應𬒳西山笑巳炙眉頭尚否臧感寓沄沄一水抱山流路轉岡陵到渡頭張翰秋風動歸興惠崇煙雨着孤舟禄輕道重從三黜日暮人遥發四愁丗事悠悠莫回首聊慿酒聖作天游冠氏雨中氣肅關河萬緑摧逺遊節物動悲哀人牛不見曉煙重草樹有聲山雨來老矣何堪米塩事中之安得聖賢盃遥怜鶴髮孤雲底日望林梢一葉逥細香軒三首花氣爐煙揔不同噀青噴翠小䆫風中邊故嗅渾無有心跡相忘忽暗通閣雨含風戸牗凉聞機才發興何長無心孤竹那能爾自是詩人知見香霜雪青青玉一藂肯從桃李借薫醲不知香界何從立慿仗清風問籜龍芳梅如佳人贈襄城衛昌叔芳梅如佳人不見令人思豈無桃李顔夏蟲篤於時霜風静天宇蘭悴菊亦衰凌寒一笑粲功烈如彼卑幾年豳西路赭岡望逶迤思之不得見空吟水曹詩夜月將夢去雲深水之湄邂逅踈竹邊峩峩認風儀今日真見止昨夢猶蓍龜塵中儓儗子謂我酷好竒逃空聞足音此心胡不夷遂𥘉園詩閑閑堂行邁巳自勞坐忘猶有爲動静二塵耳一真非即離舉頭見青山曲肱囀黃鸝心安萬境寂境轉何妨隨思玄堂塵丗一何隘永懷耿中情端蓍得吉卜有鶴戾天鳴慨然趣予裝雲旂渺遐征鴻𪷟偶相值笑我勞經營駕言還故鄉方寸以道寧先疇理耘耔𥘉服細芳馨諦觀九州事曽不出戸庭漁父有黙識餔糟愈於醒汴梁公廨西樓二首官舎誰言隘西樓興不窮閑雲欹枕裏飛鳥捲簾中風定天還水煙虚月度松回觀猶有愧破屋着盧仝盧仝以方處士王逸賔雲態看來變簷隂坐次移一蝉吟未了雙鳥去何之薄宦槐安夢浮名劒首炊安心元有法遣興可無詩次韻酈著作病起玄晏耽書昔坐癡如今手版對山持病知居士安心處貧是詩人換骨時單見敢叅東觀論徐行休嘆後山遟山林朝市元無異怨鶴驚猿自不知師拓拓字無忌平凉人舉進士不中明昌中有司薦其才以嗜酒不果作詩有氣象而工於錬句如賦鴈云天伭仍在眼山没更傷心溪上云夕陽明菡蓞秋色淨蕪葭白曵衝煙鷺紅翻漾水霞春日池上云水風凉綺席沙日麗金壷燕市酒樓云氣清天矌蕩露白野蒼凉又荷蒼秋近葉蓮􅕹雨餘花大爲時人所稱秋夜吟阪路太行險波濤滄海深素緼未偶時白髮將盈簮壯士暮年意游子中夜心拊劒一太息月暗天横參浩歌行送濟夫之秦行視田園霜歛野草白氣肅天宇清開尊酌逺客餞此秦關行秦關杳杳愁西顧千里蒼茫伹煙樹子今行轡按秋風想見秦關雄勝處河流洶洶崑崙來蓮峯秀拔青雲開終南南走絡巴蜀五陵北望令人哀我本渭城客浪迹來東征窮齊歷宋嗟何營尚氣慕俠游梁城信陵白骨委黄土夷門誰復知侯生拊劒一長嘯作歌誰爲聽青天白日空冥冥不能乗桴入滄海拂衣且欲歸汧涇落魄髙陽歸未得送子西歸空愴情冬夜二首雲破月穿牖夜嚴風號隙客子寢不安寒燈照空壁黙然不平事起坐長太息書但記姓名劒本匹夫敵追奔慕前哲恢張濟時䇿何意造物兒重此稻梁役興酣氣益振孤憤逺飄激非無南山雲髙臥養虚寂茹芝酌懸流嘯吟展匈臆聖達豈不念且有不煖席此抱誰與知乾坤夜寥閴破屋星斗入踈牗霜風生沉沉夜何乆杳杳天不明燈暗飢鼠出月朗棲烏驚幽意苦盤礴歷落窮八紘貧賤豈足戚所思天下英盤木無先容竟與枯朽并旃毳脛纔掩䔧藿腹不盈鬱鬱命丗才何階伸一鳴僵卧蓬蒿底要路誰爲名恥作掃門謁寧爲醴酒行直將呌閶闔皎皎開寸誠白日下留照廓廓賢路亨此志恐未必揺蕩熱中情游同樂園晴日明華構繁隂蕩緑波蓬丘滄海逺春色上林多流水時雖逝遷鸎暖自歌可怜歡樂極鉦鼓散雲和陪人逰北苑甲子歳繫馬溪邊酌啼鸎柳外聞望長魂欲断愁豁酒微醺草色明殘照江聲入暮雲故園春巳到歸思日􅌭紛曲江秋望山逺嶂重出野平天四圍凉風芡實坼乆雨藕花肥水闊漁舟小天長去鳥微紫蒲行處有采采莫盈衣和王逸賔繁臺詩憑望怜臺逈長吟苦思荒行雲春郭暗髙鳥暮天蒼草色傷心極松風洒靣凉故園兵革外殊覺路途長贈雲中劉巨濟雲廓乾坤迥霜摧草樹殘風聲秋晚急月色夜深寒緑綺音誰㑹青霄氣自干那知燕市裏把酒得交驩郡城南郭早望曉立回塘上何人逸興同柳濃天霽雨萍坼岸含風鳥影明蒼靄湖光倒碧空秦川何日到解髮濯清澧中元後二日暑謝凉生際庭虚雨過時天長雲断續風急樹披離丗態貧逾薄秋光老易悲燕城寒事早還與舊貂期和張叔獻題首善閣岧嶤飛閣與雲齊來凭脩欄日轉西秦客此時愁欲醉隴山何處望渾迷九天花鳥催春事千里風煙入暮題乆怕殊方看節物不知今日在丹梯酈著作權權字元輿安陽人作詩有筆力圃田道中云断橋經壞屋古道入崩山石礀云蒼崖秀苔花壞道𥙷石棧徐行下井底斗上岀天半綺岫宫云離宫巋相望百年幾遊歷獨知窮巳樂衆懟不汝䘏繁華忽灰燼歳月空瓦爍赤水道中云水近嘘寒氣星殘曵白芒燒痕云炎威隨變㓕餘燼委丘壤田疇更断續原隰依下上班班澗溪毛往往漏㝷丈晴空墮雪影夕照壓秋嶂昆明翻刼灰黒水走濁浪煙中一線來細路入空曠游石瓮云雲閒兩石角相闘如闕門上連石瓮口谽谺愁猱猿枵如空洞腹瑩滑無纎痕何年𥙷天手月斧雲爲斤琢成蒼玉甗覆此玻璃盆龍潭云臺髙野望逺地僻春意閑郊行云強引村醪終少味漫留詩句懶題名村行云瘦藤籬角蔓雜草樹根花夾道懸新棗荒畦卧晩瓜又云歳豐人樂社秋近客思家書事云佳樹漲新緑危藂棲老紅與顯叔云茶竈翻春白糟床滴曉紅雜詩云樹影僧携錫鈴聲客到門片月冷千嶂敗橋通兩村此類甚多元輿父瓊國𥘉有功仕至武寧軍節度使元輿以門資叙宦不達朝廷髙其才明昌𥘉以著作郎召之未幾卒有坡軒集行於丗聞砧玉關消息到長安處處砧聲搗夜闌想得月殘哀響断一燈淸淚剪刀寒夷門遣懷梁園花木艶精神盡属東風點綴人雪壓老梅香不起問君消得幾多春西游雜詩茅店雞聲外柴車犬吠間踈星涵積水殘月墮昏山好夢人何在秋風我獨還梨園有名酒聊此慰閒關慈恩寺塔慈恩石刻半公卿時遇聞人爲指名龍虎榜中休着眼一篇俚賦悮平生木犀菊小未堪摘荒池悴芙蕖窮秋不慰眼幽獨將焉如殷勤蘂宫子種桂庭之除乗閑弄餘花散落荒山隅從兹雲月裔漂泊生江吴姢姢耐凍枝便與群芳殊琉璃剪芳葆蛾黃拂仙裾垂袖花點碧漱金粟生膚好風披拂九里香縈紆蘭蕙不敢友荃蓀正僮奴妄意此尤物化工異吹嘘不然九天香安得獨付渠託物寄深緼古今一三閭收攬名草木自比君子徒惟兹不掛口無乃聖不居抑夫古簡編断缺秦火餘君看齊魯臣史筆逸其書惜哉不可曉臨風爲嗟吁尤怜元祐前不及附歐蘇末路益可惜例進宣和𥘉仙根豈易致百死不一甦昔逰汴離宫識此傾城姝摩挲三品石尚想狎客娛却後十五年微霜半粘鬚一枝再經眼相對怜羇孤不知苦何事玉骨乃爾癯故人怜我老尺書逺招呼要趂秋香濃共此碧玉壷遥知婵姢客與我一笑俱竹林寺矮松蒼煙靄山曲回溪抱脩筠中藏古佛宫荒僻無四鄰靈松揷殿脚偃蹇今幾春何年霹靂雨抉石搜潜鱗謫重飛舉難墮此蜿蜒身聮拳縮爪股氣屈不得伸卧枝老無力支撐藉樵薪無風自悲吟失水固不神安知才不才禍福了巳分南山聳千嶂直幹排風雲正以中繩墨中道遭斧斤豈知無用資千歳保其真何必求先容養此老囷輪我亦愛竒節歳晏守賤貧他時來汝伴露頂挂葛巾自鶴壁游善應洹山淸晨發鶴山痩馬陵峻嶺春風吹雪谷朝霧濕雲影羊腸抱傾崖絕壑如下井硤關山却立老眼入絕境人家跨淸溪桑柘鬱數頃西行復幾里嵓谷栖短景窮溪水源淸溜溜如細綆下流泉滿山勢合乆方騁灘光落鏡明嵐氣霏雨冷何年鑿靑壁兩佛入禅定殘僧乆零落遺塔寄煙暝荒凉布金地雜遝樵牧徑同逰成六逸轟飲助髙興留連更坐卧談笑發嘲詠感物復嘆嗟醉語忽逕廷靑山不愛寳歳歳出礬礦公場沸千夫利井供百鼎誰開爭奪源敗此丘壑勝頗思呼有力擲入萬里迥天神定笑我癡絶謾生癭長懷古畸人飛夢繞箕頴八渡崖奔湍百折似蟠虬響入山根匯復流咫尺蒼崖溪八渡等閑䔧杖我頻遊層崖障日樵聲晩寒谷呼風樹影秋安得剰栽溪上竹一菴領盡兩山幽留仲澤朝衫酒濕紫宸霞暫輟旌旗擁使華馳馬彎弓真將種載書囊筆自名家江湖萬里春回鴈燕趙千林月滿花明日升沉便霄壞更留玉樹倚蒹葭寄唐州幕官劉無黨白髪靑衫宦苦卑邊荒誰識鳳麟姿河西落魄髙書記劒外淸貧杜拾遺紫玉山髙傳楚夢蠙珠淵淨照黃陂禁中頗牧他年事先遣江淮草木知除夜殊方節物老堪驚病怯諸隣爆竹聲梨栗異時郷國夢琴書此夕故人情眼看曆日悲存殁淚濺屠蘇憶弟兄白髪明朝四十七又隨春草一番生七夕縹緲針樓外天敎彩羽過歩雲榆送影拂月桂交柯繡縷縈芳𬒮瓜蓮得巧梭常娥如解妬還與試斜河濟源廟海子内有二黿人以將軍目之投餅餌則至我欲燃犀起蟄雷謾誇海蘸紙錢灰將軍不是池中物也爲區區餅餌來裴公亭十里蓮塘際碧山入潭無數竹根泉詩狂欲洒亭閒壁却愧文公與樂天郊行二首十里脩篁翠拂天靑田漠漠水濺濺髙林忽断驚回首不覺竒峰墮眼前溪橋納納馬蹄輕竹裏人家犬吠聲行盡灘光溪路黒膈林燈火夜深明禮部楊公雲翼雲翼字之美樂平人明昌五年經義進士弟一人詞賦亦中乙科天資穎悟博通經傳至於天文律曆醫卜之學無不臻極事母孝與人交欵曲周宻處事詳雅而能以大節自任南渡後二十年與禮部閑閑公代掌文柄時人號楊趙而公以後軰自處不敢當也宣宗頻歳南伐事勢有决不可者論議之際時相多以避嫌不敢言公獨直言極諌以爲兩淮生靈皆陛下赤子不能外禦北兵而取償于宋以天下爲度者不如是也是後再岀兵時全一軍幾爲宋人所覆宣宗悔悟責主兵者曰我當何靣目見楊雲翼耶興定末拜吏部尚書中外望其旦暮入相竟以足疾不果正大五年八月終於翰林學士年五十九謚曰文獻天下識與不識皆哀惜之至今評者以爲百餘年以來大夫士身備四科者惟公一人而巳子恕字誠之弟進士今在燕中陽春門堤上薄薄晴雲漏日髙雪消土脉潤如膏東風可是多才思先送輕黃到柳梢光林寺煙浮霜塔閉禅關今落先生杖屨閒碧水同來弄明月黃塵不解汙靑山因縁多自成三宿物我終同付八還欲識光林全體露松花落盡嶺雲閑上白塔寺睡飽枝笻徹上方門前山好更斜陽苔連碧色龜趺古松落輕花鶴夢香身出窮通皆幻影山林朝市自閑忙簾幡不動天風靜莫聽鈴中替戾岡聞韶圖千古神交寄至音聞韶想見聖人心容聲便落筌蹄外後學休從肉味㝷張廣文消揺堂方寸閑田了萬縁大空物物自翛然鶴鳧長短無餘性鵬鷃髙低各一天身内江湖從濩落眼前瓦䃯盡虚圎叩門欲問姑山事聾瞽由來愧叔連侯右承雲溪功成何許覔菟裘天地雲溪一釣舟夢破煩襟濯明月詩成醉耳枕寒流西風歸興隨黃鵠皎日盟言信白鷗政恐蒼生未忘在草堂才得畫中游大秦寺寺廢基空在人歸地自閑緑苔昬碧瓦白塔映靑山暗谷行雲度蒼煙獨鳥還喚回塵土夢聊此弄澄灣蔡村道中水連深竹竹連沙村落蕭蕭巳暮鴉行盡畫圖三十里靑山影裏見人家戴松畫牛春草原頭雨濕煙夕陽渡口水吞天披圖坐我風蓑底一夢長林二十年廻文梧井落花秋寂寂竹䆫揺月夜沉沉孤鸞舞處回腸断逺鴈來時别恨深煙雨凉氣先秋至重隂接望迷有無山逺近濃澹樹髙低鳥雀枝閒露牛羊舎北泥支頥政愁絕風雨過前溪和吕介甫山下三秋雨山中六月凉樹林溪谷暗花藥小欄香夢破風開卷詩成鳥送觴紅塵多内熱政爾救頭忙謾與乍寒簾幙一燈靑從臾羈情爾許淸葉擁西風秋有思天垂北斗夜無聲吟蛬遶夢家千里過鴈連愁月四更寄語黃華耐岑寂好看霜蘂到歸程㕠成寺中登樓雲意生隂晚不收西風踈雨一江秋畫圖忽上䦨干角隱隱平灣轉釣舟父老寄樂平令胡德玉老去宦情薄秋來鄉思多遥怜乗壠在無奈棘林何白水青沙谷黃雲赤土坡幾時隨父老社酒太平歌應制雪詩隂雲破臈不曽晴瑞雪隨風落五更積玉未平鳷鵲瓦飛花先滿鳳凰城潤深農畝千疇緑塵壓龍沙萬里淸最好壽柸浮喜色明年洗眼看升平元日香灺猶餘去歳煙五更斗柄巳回天來從天外春何早俵向人間老不偏莫問流光似流水且從今日數今年東風五十七年夢夢覺還驚雪滿顚太一湫四崖環抱鏡光平數畝澄泓石底淸寒入井頭千丈雪淨涵嵓際一天星傍人爭出魚依勢銜葉飛來烏護靈日日東風送潮岀只應絶頂透滄溟應制白兔聖徳如天物効祥褐夫新賜雪衣裳光揺玉斗三千丈氣傲金風五百霜禁籞合棲瑶草影御爐猶認桂枝香中興慶事光圖牒黼坐齊稱萬壽觴李平甫爲𥙿之畫繫舟山圖閑閑公有詩某亦継作名利走朝市山居良獨難况復山中人讀書不求官東嵓有佳致書室方丈寛彼美元夫子學道如觀瀾孔孟澤有餘曽顔膏未殘向來種德深直與山根蟠之子起其門孤鳳騫羽翰計偕聊爾耳平歩靑雲端朅來遊京師士子拭目觀禮部天下士文盟今歐韓一見折行輩殆如平生歡舞雩詠春風期著曽點冠五言造平淡許上蘇州壇我甞讀子詩一倡而三嘆丗人非無才多爲才所謾髙者足詆訶下者或辛酸吾子忠厚姿不受薄俗漫晴雲意自髙淵水聲無湍他日傳吾道政要才行完會使兹山名與子俱不刋閑閑公爲上淸宫道士冩經并以所養鵝群付之諸公有詩某亦同作會稽筆法老無塵今代閑閑是後身只有愛鵝縁巳盡舉群還付向來人屏山李先生純甫純甫字之純弘州人承安年進士仕至尚書右司都事爲舉子日亦自不碌碌於書無所不闚而於莊周列禦宼左氏戰國䇿爲尤長文亦略能似之三十歳後徧觀佛書能悉其精微旣而取道學書讀之著一書合三家爲一就伊川横渠晦庵諸人所得者而商略之毫髮不相貸且恨不同時與相詰難也性嗜酒未甞一日不飲亦未甞一飲不醉眼花耳熱後人有發其談端者隨問隨荅𥘉不置慮漫者知所以統窒者知所以通傾河㵼江無有窮竭好賢樂善雖新進少年游其門亦與之爲爾汝交其不自貴重又如此迄今論天下士至之純與雷御史希顔則以中州豪傑數之子仝字稚川今居鎭陽雪後玉環暈月蟠長虹飛沙捲土號隂風黃雲羃羃翳晴空屋頭唧唧鳴寒蟲天符夜下扶桑宮玄冥震怒鞭魚龍魚龍飛岀滄海底咄嗟如律愁神工急㪺北斗捲雲漢凌凘捲入天瓢中椎璋碎璧紛破碎六華剪岀寒瓏璁翩翾作穗大如手千竒萬巧難形容恍如墮我銀沙界淸光縞夜寒朣朧肝腸作祟耿無寐試把往事閑追窮男兒生須衘枚卷甲臂琱弓徑投虎穴䇿竒功不然羊羔酒漲玻璃鍾侍兒醉臉潮春紅誰能蹇驢駞着㶚陵東骨相酸寒愁煞儂屏山正吐黃虀氣笑倒坐閒亡是公赤壁風月笛圖鉦鼓掀天旗脚紅老狐膽落武昌東書生那得麾白羽誰識潭潭蓋丗雄𥙿陵果用軾爲將黃河倒捲湔西戎却敎載酒月明中舩尾嗚嗚一笛風九原喚起周公瑾笑煞儋州秃鬢翁送李經髯張元是人中雄喜如俊鶻盤秋空怒如恠獸拔枯松老我不敢嬰其鋒更着短周時緩頰智囊無底眼如月斫頭不屈靣如鐵一說未窮復一說勍敵相扼巳錚錚二豪同軍又連衡屏山直欲把降旌不意人間有阿經阿經瓌竒天下士筆頭風雨三千字醉倒謫仙元不死時借竒兵攻二子縱飲髙歌燕市中相視一笑生春風人憎鬼妬愁天公徑奪吾弟還遼東短周醉别黙無語髯張亦作衝冠怒阿經老淚如秋雨只有屏山拔劒舞拔劒舞擊劒歌人非麋鹿將如何秋天萬里一明月西風吹夢飛關河此心耿耿軒轅鏡底用兒女肩相摩有智無智三十里眉睫之閒見吾弟張謂伯玉周謂晦之爲蝉解嘲獻臣伯玉不平蟬解老蜣破衲染塵緇轉丸如轉造物兒道在矢溺傳有之定中幻岀嬋姢姿金仙未解羽人尸吸風飲露巢一枝倚杖而吟如惠施字字皆以心爲師千偈瀾翻無了時關楗不落詩人詩屏山叅透此一機髯弟皤兄何見疑此理入玄人得知髯弟恐我飡却西山秀張有登樓詩昨日上髙樓西山翡翠堆今日上髙樓西山如死灰想見屏山老療飢西山限飡却西山色高樓空崔嵬皤兄勸我吸却壷盧溪髙有壺溪詩云我親壷盧溪未易以蠡測大若溪上翁有口吸不得壷中别是一洞天溪上翁即壷中仙畢竟人間無着處杖頭挑取屏山去因蟬倩我問渠伊快掉葛藤復是誰髯弟絶倒皤兄嘻㶚陵風雪君不見浣花老人醉歸圖熊兒捉轡驥子扶又不見玉川先生一絶句徤倒莓苔三四五蹇驢駞着盡詩仙短䇿長鞭似有縁政在㶚陵風雪裏管是襄陽孟浩然官家放歸殊不惡蹇驢大勝楊州鶴莫愛東華門外軟紅塵席㡌烏靴老却人贈髙仲常借問髙書記南征又北征從軍元自樂逰子若爲情筆下三千牘胸中百萬兵傷弓良小怯彈鋏竟何成慘淡風塵際悲凉鼓角聲别家四十日並塞兩三程斗絶牛皮嶺荒寒燕賜城吟邊白鳥没醉裏暮雲撗感槩悲王粲顛狂笑禰衡虎賁多將種底用兩書生真味堂問渠真味若爲言不着塩梅也自全黿鼎大夫徒染指麹車公子漫流涎匈中巳有五千卷徽外更聽三兩絃此老淸饞何所嗜宦名嚼蠟巳多年畫兔三窟言何鄙中林計未踈貧而長衣褐老矣不中書搗藥元無死忘蹄始見渠子皮今尚在遺像豈陶朱猫飲酒枯腸痛飲如犀首竒骨當封似虎頭甞笑廟謀空食肉何如天隱且糟丘書生幸免翻盆惱老婢仍無觸鼎憂只向北門長卧護也應消得醉郷侯天游齋丈人未始岀吾宗草靡波流盡太冲七竅鑿開無混沌六根消落盡圎通法身兔角聲聞外塵事牛毛夢幻中誰會天游更端的瘦梅踈竹一䆫風孫卿子諸儒談性盡歸情誰信黃河徹底淸未到崑崙源上見且休容易小荀卿謝安石阿堅休道不英雄兒軰俄成蓋丗功屐齒折時渠自省至今人解笑桓冲魏徴徤兒揺足據山東李氏家居太半空貞觀力排封建議魏徴元只是田公老蘇宋季人憂大瓠穿敢留金幣不輸邊權書更信蘇家䇿剰費靑苗幾倍錢偶得包褁靑衫巳十年聦明更覺不如前簿書藂裏先抽手鼓笛埸中少息肩瓶底剰儲元亮粟叉頭髙掛老坡錢會須着我屏山下了却平生不問天雜詩六首顛倒三生夢飛沉萬刼心乾坤頭至踵混沌古猶今黒白無真色宫商豈至音維摩懶開口枝上一蟬吟乾坤太聚落今古小朝昏諸子蠅鑚帋群雄虱處褌一心還入道萬物自歸根却笑幽憂客空招楚些魂丹鳳翔金鼎蒼龍戲玉池心源澄似水鼻息細於絲枕上山川好壷中日月遟神仙學道者那許小兒知空譯流沙語難叅少室禪泥牛耕海底玉犬吠雲邊仰嶠圎茶夢曹山放酒顛書生眼如月休被衲僧穿狡兔留三窟彌猴戲六䆫情田鋤宿草心月印澄江酒戒何曾破詩魔先巳降雄蜂雌蛺蝶正自不成雙道義富無敵詩書貴不貲浮空幾兩屐狂樂一絇絲豪俠非吾友臞儒即我師誰知茅屋底元自有男兒又作元有丈夫兒趙宜之愚軒羿窮射殺金畢逋老盧磔殺玉蟾蜍朝夕相避崑崙墟忍見天公一目枯塵昏土眯萬萬古雲眵雨淚寒糢糊嗟哉區中人么麽如蚍蜉書生不惜兩瞳子長使看書如老奴水部一竒士西河君子儒二公正坐詩作祟得句令人不敢書先生有膽乃許大落筆突兀無黃初軒昂學古澹家法岀關雎暗中摸索出竒語字字不减瓊瑶琚神憎鬼妬天公怚戲將片雪翳玄珠九竅鑿開混沌死罔象未必輸離朱静掃空花萬病除一片古心含太虚屏山有眼不如無安得恰似愚軒愚安得恰似愚軒愚子端山水同裕之賦遼鶴歸來萬事空人閒無地着詩翁只留海岳樓中景長在經營慘淡中馬圖同裕之賦韓筆定襄霍益之家物天馬飛來不苦難雲屯萬騎開元間太平有象韓生筆曽見真龍如此閑瓢庵書生只合飽黃虀大嚼屠門計似癡壁上七絃元自雅囊中五字更須竒横陳巳覺如嚼䗶皆醉何妨獨啜醨此味欲談舌本強如人飲水只渠知劉宋六千衰翁血打圍深山赤手搏熊羆子孫只解相魚肉辛苦知他爲阿誰哭黃華士價五羊皮人生黍一炊蓋棺那可忍掛劒不勝悲向上誰曽到而今渠得知侍臣傷立本老姥怒羲之作病無如酒窮愁正坐詩中郎猶有女少傅竟無兒散落真行帖飄零騷雅辤儒林頓憔悴未敢哭吾私怪松謡阿誰栽汝來幾時輪囷擁腫蒼虬姿鱗皴百怪雄牙髭拏空夭矯蟠枯枝疑是秘魔嵓中老慵物旱火燒天鞭不出睡中失却照海珠羞入黃泉蛻其骨石鉗沙錮汗且僵埋頭卧角政摧藏試與摩挲定何似怒我棖觸須髯張壯士囚縛不得住神物丗閒無着處隄防夜半雷破山尾血淋漓飛却去虞舜卿送橙酒屏山持律不作詩硯塵筆秃縈蛛絲枯腸燥吻思戞戞法當以酒䟽瀹之何物督郵風味惡棖觸閑愁無處着苦思新釀壓橙香丗閒那有楊州鶴乞詩送酒並柴門瀛洲仙裔令公孫肺腸憤庠芒角岀傾㵼長句如翻盆怪汝匈中雲夢大老我眼皮危塞破徑呼短李與黔王快取錦囊收玉唾欽叔士衡中州丁集卷終
