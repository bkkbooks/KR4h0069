body:
  text: 白先生賁一首王內翰樞一首晦軒先生趙晦一首浚水王先生丗賞四首南湖靖先生天民一首東皋桑先生之維一首步元舉一首馮文叔一首張庭玉一首宗道一首鮮于溥三首史士舉二首王敏夫二首王利賔一首孫益一首郝先生天挺一首孫邦傑一首張瓛一首徐好問一首吕六鵬一首髙永一首曹用之一首趙達夫二首邢安國二首張溫一首馬舜卿一首劉曹王䂊七首杜丞相充一首虞令公仲文一首張丞相孝純一首張左相汝霖一首劉右相長言一首右相文獻公耶律履一首張平章萬公一首董右丞師中一首孫太師鐸一首梁參政􅚻一首賈左丞益謙一首丞相壽國髙公汝勵一首胥莘公鼎一首張左丞行中一首楊戶部慥二首鄭內翰子聃一首孟內翰宗獻六首趙內翰攄一首趙文學承元一首張太保行簡三首張內翰楫四首閻治中長言八首李治中著一首擬栩先生王中立六首王先生豫可七首照了居士王彧三首無事道人董文甫七首薛繼先四首白先生賁賁汴人自號决壽老自上丗以來至其孫淵俱以經學顯客有求觀豫孝經傳者感而賦詩古人文瑩理後人但工文文工理愈暗紙扎何紛紛君看六藝學天葩吐竒芬詩書分躰製禮樂造乾坤千岐更萬轍要以一理存如何臻至理當從踐履論茇涉經險阻鑽研閲寒溫孝第作選鋒道德嚴中軍仰觀及俯察萬象入見聞不勞施斧鑿筆下生煙雲髙以君唐虞下以覺斯民君如不我鄙時來對爐熏王內翰樞樞字子愼良鄉人遼日登科仕國朝直史館三河道中十載歸來對故山山光依舊白雲間不須更讀元通偈始信人間是夢閒睡軒先生趙晦晦字光道管城人宋末代州法曹秀容主簿汴京破後不復仕自號睡軒居士子洵子都大定二十年進士真定路總管判官孫綱三赴廷試以䕃𥙷官終于永壽令曽孫居禮之讓今在燕中暮春壓枝梅子半靑黃葉底殘紅雨褪香翠鈿舞風榆落莢緑針浮水稻抽秧酒濃猶覺春酲困睡美方便午夢長苦被啼鶯訴花老揮毫聊作送春忙浚水王先生丗賞丗賞字彥功汴人與尹無忌王逸賔趙文孺相周旋明昌中保舉才能德行賜出身釋褐鞏州教授終于鹿邑簿有浚水老人集傳于丗立春後十日登樓今日登樓眼風煙倍覺新溪梅初破蕚屋雪半融銀鴈外天逾碧鷗邊水自春兒曹應見笑吟望獨傷神春雪只謂春天暖寧知雪霰飛龍蛇且深蟄花柳不勝威糝糝凌風細紛紛帶雨稀誰當問穹昊生殺果何機探梅候得南枝破玉腮心顔今日為君開細看苔徑無行跡先賞應輸我獨來稱善齊宮途馳逐只堪羞何意須封萬户侯平日少游真可念絶勝辛苦駐壷頭南湖靖先生天民天民字達卿滏陽人其父國初官原武因而家焉少日嘗兩魁鄉試自望者不碌碌所與交如龐才卿楊茂才劉之昂王逸賔皆一時名士晚年買田南湖葺亭圃植竹樹以詩酒為事自號南湖老人年七十九卒子文煒德昭從孫顒子昂西子放瓢圖髻鬟蕭颯苧羅秋千古香溪水自流吳越兵爭竟何得風流輸與五湖舟東皋桑先生之維之維字之才恩州人蔡丞相伯堅之子壻也以樂府著稱有東皋集傳于丗白髮白髮近年見十中三兩莖半因愁儧出多為病添成梳裏有時落鑷餘還又生老知無可避何處是功名步元舉元舉關中人下弟過榆次栖遲零落未歸人巳坐無成更坐貧意氣散論題柱客晨昏多負倚門親囊空漸覺錢餘貫衣敝翻饒虱滿身遙望秦關獨惆悵一天風雨落花春馮文叔文叔遼東人客舍秃襟紬褐破書囊十五年來客異鄉生事穽中搖虎尾窮途天上轉羊腸三朝不遇馮唐老半夜悲歌寧戚狂獨倚牛車望遼海西風塵土鬢蒼蒼張庭玉庭玉字子榮易縣人能日賦百篇有集行于丗即事烏鳶繞樹山梨熟胡蝶穿花木槿開赤腳城中借書去蒼頭原上負薪來宗道道字雲叟山隂人以足疾不仕有詩云家藏千卷冨身得一生間茅屋經年補柴門盡日關其自處可見寶嵓僧舍寂寂鍾魚柏滿軒午風輕揚煮茶煙西堂竟日無人到只許山人借榻眠鮮于溥溥字彥仁宋文臣子駿之後髙祖淳淳之子孝標標之子壽吉壽吉之子坦皆擢進士弟而仕亦達彥仁坦之子以門資仕終于櫟陽令濟源盤谷天壤佳處坦父子居其間飲酒賦詩翛然塵垢之外至今人以髙士目之弟彥魯子忠厚今居鄉里魯村道中小橋沙路巳堪圖更著衰翁跨蹇驢暮靄似催寒日短秋容仍帶逺林踈鵰盤平野黃榆落兔走橫岡白草枯漸喜間身逺朝市一年強半在村墟春日倣舊詩體年老逢春莫等間逢春能得幾回看插花儘要花枝滿把酒休辝酒盞乾好向酒邊留舞袖不妨花外駐吟鞍聞身健在須行樂燕語鶯啼春又殘早發燈前夢斷家千里馬上詩成月一痕晨粥未烹官路逺隔林煙火是漁村史士舉士舉字仲升滎澤人漢功臣弘肇之後髙祖所賜鐵劵故在其大父官濟源樂其山水因家焉父神山令激石琚榜進士仲升以䕃補官歷銅鞮三川兩縣令初任京兆録事以歲旱擅開倉賑貧身往太一湫禱雨尋獲嘉澍用是得名為人雅重知義理褒衣緩帶消搖山水閒宛然一老書生也貞祐之亂避于太行保聚失守老幼皆出降仲升義不受辱投絶㵎而死年七十九孫庭玉宇德秀今居山陽超化石根寒溜迸珠璣尋丈驚看雪浪飛我是玉川煙水客暫來盤礴亦忘歸晉祠小橋流水竹蕭森竹裏人家一徑深只缺東風小籬落梅華踈淡月籠隂王敏夫敏夫五臺人作詩工於賦物甚為趙宜之所稱鴈門前輩中有許蛻子遷以武皇廟詩著名又酒渴後四句云眼底恨無雲夢澤胸中疑有沃焦山南窗花影三竿日指點銀瓶照病顔有集傳河東往往稱此倪民望字具瞻屏山所謂倪侯頭如筆其鋒不可當者有種松詩云種松莫種柳種柳莫種松堅脆非所計雅俗寧與同可是種松無隙地却教憔悴柳隂中張韶九成寄朔州苟輔臣云陳雷膠漆輕餘子楚漢風雲屬少年李忠直卿賦雪云不將柳絮春風比好作梨花月夜看至于蘇吉莘老李鵬翼冲霄與具瞻之子仲儀詩文多可傳喪亂之後惜不能記憶之矣同東嵓元先生論詩林逋仙去幾來年驚見梅花弟二篇千歲氷霜松骨瘦九秋風露鶴聲圎騰輝定出連城上得趣知從太古前邂逅茅齊話終夕只疑人丗改桑田李氏友雲樓霧幕煙迷十二欄壷觴招我一躋攀黃簾卷起湘川竹分得西州數點山王利賔利賔字茂實襄城人朴直純素作詩有古意似其為人然亦未嘗以示人也家與衛昌叔鄰居而不相往來計平生所交唯不肖而巳豫一日過襄城知茂實病就卧內候之乃見壁閒所黏五言古詩十數首竄改重疊往往可傳然後知茂實所以交豫者特以詩故耳渠既不言豫亦無從知之惜登時不謄寫今忘之矣題扇頭輕紗畫竹雀柄短不盈握暑氣正憑陵清風一何邈孫益益字德𥙿秀容人嘗從先大夫學詩送張安中還雲中名保極雲朔名士相送還相送臨分手重分驊騮欣得路鴻鴈惜離羣木落黃華露城玄紫塞雲中秋月正好千里謾思君郝先生天挺天挺字晉卿陵川人家丗儒素伯父子揚有詩名號東軒老人先生少日有賦聲早衰多疾厭於名場遂不復就舉貞祐之兵避于河南往來其衛閒為人有崖岸耿耿自信寧落薄而死終不一傍冨兒之門年五十七卒於舞陽臨終浩歌自得不以死生為意其平生自處為可見矣好問十四五先人令陵川時從先生學舉業先生教之曰今人賦學以速售為功六經百氏分磔綴緝外或篇題句讀之不知幸而得之不免為庸人况一敗塗地者乎又曰讀書不為藝文選官不為利養唯通人能之又曰今丗仕官多用貪墨敗官皆苦于飢凍不能自堅者耳男子生丗不耐飢寒則雖小事不能成子試以吾言求之先生工于詩時命好問屬和或言令之子欲就科舉詩非所急將無徒費日力耶先生曰君自不知所以教之作詩正欲渠不為舉子耳子思溫字和之孫經字伯常今居順天送門生赴省闈靑出於藍靑愈靑小年埸屋便馳聲未饒徐淑早求舉却笑陸機遲得名嗟我再衰空眊矂喜君初筮巳崢嶸此行占取鰲頭穩平地煙霄屬後生孫邦傑邦傑字伯英雄州容城人曽祖堅國初有功官至隴州刺史伯英少日住太學有時名所與游皆名士興定初知丗將亂棄家為黃冠師燒笋煨茁舊聞山谷語勸耕還憶大蘇詩傳將火候無多訣留得天真又一竒未放錦䙀開束縳巳看玉版證荼毗白麻初拜驚燒尾見此應慚冨貴癡張瓛瓛字君玉大名朝城人嗜作詩年巳老而刻苦殊未减為人謹願有禮見稱諸公閒卒年六十八子鏞鎮今居鄉里送侯道士十年走南北黃塵汙人衣翩翩夜啼烏一枝無可依問君何所如鳬舄東南飛恨我不得往失腳穽與機從君知不能一笑人閒非何水無蒲魚何山無蕨薇終當拂衣去往叩雲山扉徐好問好問字𥙿之永寧人龍門疏鑿而來道路通行人萬古翠微中南山山寺題詩滿一字何曽到禹功吕大鵬大鵬字鵬舉密縣人自言宋名相申公之裔宣宗頻歲南伐鵬舉作詩欲以撼主兵者云縫掖無由挂鐵衣劒花生澀馬空肥燈前草就平南䇿一夜江神泣涕歸其以氣岸自許皆此類也夏日北渡後作旋移石枕拂藤床細灑槐隂趂晚凉大地嗷嗷困爐鼎老天不肯下殘陽髙永永字信卿出于盤陽大族父元字善長教信卿作舉子讀書略通即棄之去為人不顧細謹有幽并豪俠之風賔客入門則盡家所有者為具不為明日計人以此愛之貞祐初避兵太原與李長源居于廣平寺有盜穴墻而入長源性恇怯聞騷窣聲噤不敢語盜盡挈信卿所有而去長源徐曰緑林之子至矣於是信卿生理大狼狽南渡居嵩州出入屏山之門其學遂進𥘉名䕫字舜卿又名揆屏山改焉真定王之竒士衡攻雜學屏山目為怪魁王從之內翰為賦善哭詩奉聖馬餌升公敢為大言著書十萬言號北新子大略以談兵為主且曰古人兵法非不盡但未有北新子五十里火雨耳信卿皆與之游故其詩豪宕譎怪不為法度所窘有冰柱雪車風調觀咀龍篇及大雨後見寄可槩見矣正大壬辰病沒於京師年四十六跋賈天升所藏假志寧山水蒼壁雲氣湧長松風雨寒湍流擘山出玉虹飲溪灣胸中無雲夢筆底無江山想見破墨初布袖蛟龍蟠壯觀駭心魄萬象本自間寒齊靜相對逺意空追攀曹用之用之歸德人幼有賦聲屢中甲乙詩亦有功嘗戲作鬼仙語云瀏瀏竹閒雨熒熒窗下燈相逢不相顧含淚過巴陵詩有本事中山楊正卿能道所以然真人作鬼語也憶舊花鳥巡簷喚曉晴喚來和氣滿春城春風二十年前客煮酒靑梅也後生趙達夫達夫太原人性嗜讀書而不事科舉南渡後居緱氏山中安貧守分故終丗窮悴壬辰之兵遇害紅梅西湖句好巳成塵蠟點都能幾許春乞與瓊兒薄梳洗才情留待月中人柳楊柳攙春不耐秋十分憔悴儘風流水邊沙際風煙冷收拾殘陽合暮愁邢安國安國字仲祥沁州武鄉人少日有賦聲四十歲後即不應科舉以詩酒自娛避亂客泌陽十餘年後北歸備極艱苦其見於詩者如此往時李長源傳仲祥柳花一詩渠甚愛之今以丹崖集校之與傳者不同當是長源曽與商略之耶楊花細點輕團轉復飄隋家堤岸霸陵橋非綿非絮寒無用如雪如霜暖不消狂惹客衣知有恨巧尋禪榻故相撩陂塘回首浮萍滿依舊春風擺翠條過唐州西李口白沙翠竹溪上村漁家賣魚喚行人西風吹皺一溪水水光日影金鱗鱗張溫溫字元佐上黨人祖仲容字才翁宋末登科仕至屯田貟外郎以好士名天下致仕後有詩云病身衰退謝明朝北洞間眠晝寂寥十畝晚禾煙冉冉一林修竹雨瀟瀟黑花遮眼秋不落白雪撲頭春未消丗事悠悠吾老矣一壷濁酒且逍遙至今為鄉里所傳元佐泰和六年李演榜乙科登弟詩樂府俱有名于時感懷一首彌月不出門出門沙漲東風昏老樹擺撼轟雷奔鬼物叫嘯山前村僑居客子驚心魂歸來繞屋尋蘭蓀蘭蓀落索靈苗髠主人醉倒老瓦盆衣䄂半帶淋漓痕藝藝蕭艾同歸根天生天殺何怨恩糟床與翁共淸渾絶勝𬒳髮叫帝閽馬舜卿舜卿名肩龍以字行宛平人先丗遼大族有知興中府者故又號興中馬氏祖大中國初登科節度全錦兩州父成誼字冝之張楫榜登科京兆路統軍司判官舜卿在太學有賦聲宣宗初人有告宗室從坦殺人從坦字履道一時賢將帥處猜嫌之地人以為必死而不敢言其冤舜卿以太學生上書大略謂從坦有將帥材方今人物無有出其右者臣一介書生無用於丗願代從坦死留為天子將兵書奏詔問汝與從坦交分厚耶舜卿對臣知有從坦而從坦未嘗識臣從坦冤人不敢言臣以死保之宣宗感悟赦從坦授舜卿東平録事委行臺試驗宰相侯莘公與之語不契留數月罷歸將渡河與排岸官紛競筐中搜得軍馬糧料名數及利害事目疑其姦人之偵伺者繫歸德獄根勘適從坦至立命出之正大四年冬薄游鳳翔德順州將愛申以書招舜卿舜卿欲往鳳翔總管以敵兵勢甚張吾城可恃德順不可守勸勿往舜卿曰愛申平生未嘗識我一見為知巳我知德順不可守我往必死然以知巳故不得不死也乃舉行橐付族父明之為死别冒險而去既至不數日受圍城中義兵七八千而巳州將假舜卿鳳翔總管判官守禦一以委之凡受攻百日食盡乃陷軍中募生致之不知所終時年五十三詔贈某官配食褒忠廟舜卿年少時過襄垣題詩酒家壁辭氣縱橫時輩少有及者如云玉鞭再過長安道人靣依前似花好殷勤勸我梨花春要看尊前玉山倒他語類此㑹州道中山腰薄雪眩朝􅚐未放陽和入燒痕一片長安丗情月梨花院落幾黃昏諸相劉曹王豫豫字彥由阜城人仕宋知濟南府事汴京下立張邦昌為大楚皇帝宋滅楚更立彥由國號齊建元阜昌八年廢為蜀王遷黃龍府改封曹有集十卷行于丗二子麟猊孫通海陵朝參知政事四丗孫瑛今在太原雜詩六首竹塢人家瀕小溪數枝紅杏出踈籬門前山色帶煙重幽鳥一聲春日遲風荷柄柄弄淸香輕薄沙禽落又翔紅日轉西漁艇散一川山影暮天凉古渡停驂日向沉凄凉歸思梗淸吟碧山幾點塞天闊紅葉一林秋意深倚嵓蕭寺據危崖丈室軒窗靣水開雪霽暮寒山月上數竿修竹一枝梅晝色晴明著色圖山光凝翠接平湖煙嵐自古人難畫逺即深深近却無寒林煙重暝棲鴉逺寺踈鍾送落霞無限嶺雲遮不斷數聲和月到山家客館雪消北嶺安排暖寒入東風阻節春絶塞亂山圍古驛他時說著也愁人杜丞相充充字公美相州人仕宋知滄州歸國拜尚書右丞相領中山行臺以壽終塵汨汨勞生為爾忙只除不到白雲鄉步回洛浦生羅襪歌斷秦樓蔌杏梁間撲衣襟迷逺望靜穿窗隙鎖斜陽帝城別有風流在輦路春風十里香虞令公仲文仲文字質夫丗南之裔武州寧逺人仕為遼相歸朝授樞密使平章政事封秦國公四歲作詩賦煎餅有魚目蟬聲之句人以神童目之雪花四歲作瓊英與玉蘂片片落前池問著花來處東君也不知張承相孝純孝純字永錫滕陽人宣和末知太原國兵圍守踰年人相食幾盡乃下朝廷憐其忠換相職後以相齊致仕汴京建行臺起為左承相踰年得請歸鄉里二兄尚安健鄉人為作三老圖薨諡安簡子公藥字元石昌武軍節度副使致仕孫觀字彥國丗為文章家曽孫厚之字茂弘承安二年進士中運使寄酒淸明日到以詩謝之芳樽到日恰淸明似與嘉辰默計程擬助林園延勝賞肯容桃李落繁英老來官爵渾無味間裏柸盤却有情見說使車臨岱麓儻能相過共飛觥張左相汝霖汝霖字仲澤遼陽人家丗貴顯父浩字浩然以門資仕揚歷中外遂升端揆進拜太師封南陽郡王五子仲澤平章政事莘國公汝為字仲宣河北東路轉運使汝翼仕不達皆進士也汝方字仲賢自號丹華老人汝猷宇仲謀俱至宣徽使父子兄弟各有詩傳于丗王子端內翰太師之外孫其淵源有自云春溪一首黯黯春愁底處消小桃無語半含嬌東風不管前溪水暖緑溶溶拍畫橋劉右相長言長言字宣叔東平人宋相莘老之孫而學易先生斯立之猶子也父蹟年三十五終於儀真令工詩能文有南榮集傳東州今獨豫家有之宣叔正隆宰相詩文能丗其家今不復見矣通叔以詩送古鏡為長言生日之壽次韻謝之綵衣祿隱非臞仙猶有向來文字緣都城一別兩歲晚寄聲勞苦常相先人間始生俗禮重而我永感方頽然逺憑詩句致竒物欲挽暮景回虞淵規摹九寸函大方古製不作菱花妍開奩拂拭愧陋質但喜虹氣浮晴天夫君久要心不遷期與鐵杖論清堅保身賴此孤月圎明年上印歸行田右相文獻公耶律履履字履道東丹王之七丗孫學通易太玄至於隂陽歷數無不精究嘗以鄉賦一試有司以露索為恥遂不就舉䕃𥙷國史掾興陵朝纍遷薊州刺史入翰林為修撰歷直學士待制禮部尚書特賜孟宗獻榜進士弟俄預淄王定冊功拜參知政事明昌元年進右丞薨年六十一興陵嘗問宋名臣孰為優履道以蘇端明軾對上曰吾聞軾與王詵交甚欵至作歌曲戲及姬侍非禮之甚尚何足道耶履道進曰小說傳聞未必可信就使有之戲笑之間亦何得深責丗徒知軾之詩文人不可及臣觀其論天下事實經濟之良才求之古人陸贄而下未見其比陛下無信小說傳聞而忽賢臣之言明日録軾奏議上之詔國子監刋行自號忘言居士有集傳于丗三子辨才武廟署令善才工部尚書楚才中書令四孫鈞鉉鏞鑄史完從事日感懷不學知章乞鑑湖不隨老阮醉黃壚試從麟閣諸賢問肯屑蘭臺小史無一戰得侯輸妄尉長身奉粟愧侏儒禁城鍾定燈花落坐拊塵編惜壯圖張平章萬公萬公字良輔東阿人正隆二年進士仕長山令有惠政人為立祠入為右司貟外郎太師淄王愛之許以宰相器明昌初纍遷御史中丞以言事忤旨除彰國軍節度使召為大興尹拜參知政事以母老丐歸養出判東平河中濟南丁內艱起復擢平章政事封壽國公為相知大體有敦厖耆艾之目既致政而眷顧未衰復起判濟南安撫山東便冝行事未幾得請薨於家諡文貞繪像衍慶宫配享章宗廟廷戊戌二月中旬登稷山清榭問囚推案朝還暮危坐不知春淺深今日簷閒看風色一株紅杏暗驚心董右丞師中師中字紹祖邯鄲人後徙洺州皇統九年進士承安中入政府直道自立而以通材濟之泰和初元妃李氏方寵幸兄喜兒為宣徽使有楊國忠之權一日德州教授田庭方上書言事云大臣持祿近臣怙寵此言路之所以塞也道陵顧謂紹祖言大臣持祿當謂公等近臣怙寵者為誰時喜兒侍立殿上紹祖倒笏指之曰莫非謂李喜兒之屬否上頷之紹祖嘗言作宰相不難但一心正兩眼明足矣少日以詼諧得名及在相位亦未嘗廢談笑然不害其為國朝名相也俄致政賜弟京師後三年薨有燕賜邊部詩傳於丗紹祖師王內翰彥潜而與之同榜登科彥潜沒後待其子恩禮殷重不减骨肉論者謂孫鐸振之事其兄明之張彀伯英愛其弟伯玉舉丗無與為比至於紹祖之待其師之子則古所未有也有漳川集傳于家自臨洮還臨潭仍是漢家城漢家城在臨潭羌人所稱積石相望十驛程西略河源東竝海此身何地不經行紹祖之孫濟剛記此詩末句又作塵埃風雨嘆勞生孫太師鐸鐸字振之恩州人大定十三年進士明昌中擢戶部尚書時巳有相望及考滿以戶曹繁重且未有可代者特旨進一官再任而同列二人俱以入相矣振之賀席中戲舉青州老柏院布衣張在詩云南鄰北里牡丹開公子王孫去不回惟有庭前老柏樹春風來似不曾來為御史所劾降授同知河南府事有以詩送之者云想到洛陽春正好南鄰北里牡丹開聞者皆大笑振之後入政府遷尚書右丞薨贈太子太師作詩甚多其賦玉簮有披拂秋風如有待裴回凉月更多情之句甚為詩家所稱癸亥清明日翛然一室暗塵凝兀兀端如打坐僧習氣未除私自笑短檠還對讀書燈梁參政􅚻􅚻字國寶別字瑩中范陽人大定十六年進士歷州縣稍遷警巡使治尚嚴肅權貴斂迹朝廷知其才纍試繁劇由中都路轉運使拜户部尚書俄參知政事資方正敢言大事北兵動立和議人有笑其懦者卒如其言未幾薨于位虎賊咤曰梁􅚻在族矣其為人可知留題長平驛秦趙均為失霸圖起何殘忍括何愚殺降未見無禍者纍將其能有種乎日暮悲風噎丹水夜深寒月照頭顱山名也快心千載杜郵劒人所誅耶鬼所誅賈左丞益謙益謙字亨甫本名守謙避哀宗諱改焉宣宗朝參知政事出知濟南移鎮河中南渡後召拜左丞尋致仕居鄭州哀宗即位史官乞因宣廟實録遂及衛紹王初虎賊既弒逆乃立宣宗宣宗之人至謂衛王失道天命絶之虎實無罪且於主上有推戴之功獨張信甫上章言虎賊大逆不道當用宋文帝誅傳亮徐羡之故事章奏不報爾後舉朝以大安崇慶之事為諱及是謂亨甫大安中嘗拜御史中丞宜知衛王事乃差編修官一人就訪之亨甫知其旨謂來者言知衛王莫如我然我聞海陵𬒳弒而丗宗皇帝立大定三十年禁近能暴海陵蟄惡者得美仕史官修實録誣其淫毒狼鷔遺臭無窮自今觀之百可一信耶衛王勤儉慎惜名器較其行事中材不能及者多矣吾知此而巳設欲飾吾言以實其罪吾亦何惜餘年朝議偉之正大三年年八十薨子賢卿頥卿翔卿皆以門資仕今一孫仲明在東平贈答史院從事見說才名自妙年多慙政府舊妨賢物華天寶無今古鳳閣鸞臺孰後先鄭圃道尊何敢望濟南書在子當傳莫言老眼昏花滿及見風鵬上九天丞相壽國髙公汝礪汝礪字嵓甫應州金城人大定中進士揚歷中外居戶曹三司為最久相宣宗十年小心畏愼夙夜匪懈篤于古人造膝詭辭之義謀謨周密人莫得而聞元光末宣宗上仙公亦薨于位君臣之契義均同體者於斯見之平生嗜讀書南渡之後機務倥偬未嘗一日廢書不觀臨終留詩有寄謝東門千樹柳安排青眼送行人之句時年七十一諡配享宣宗廟庭至今士論謂公才量渾厚足為守成之良相恨所遭不時耳雨後時雨雨三日田家家萬金有年天子慶憂國老臣心胥莘公鼎鼎字和之代州繁畤人父持國大定中為太子司藏有功母后家章宗即位擢拜尚書右丞和之大定二十八年進士至寧𥘉都城受兵由戶部尚書參知政事宣宗即位除泰定軍節度使不赴改判大興貞祐二年拜尚書右丞車駕南渡出為汾陽軍節度使移知平陽權河東南路宣撫使四年授樞密副使權右丞兼職如故五年正月朝京師進平章政事封莘國公行臺關中未幾兼左副元帥明年以溫國公致政進封英行臺衛州以病薨於位雷希顔為作神道碑云黃霸為良吏稱首及為丞相與張敞論列功名大减王允當漢祀之衰計誅董卓近古社稷臣然不赦凉州人旋致傕汜之禍蕭俯之淸介崔植之論議皆足為唐名臣而俯議銷兵植餓朱克融輩不卑一官遂再亂河朔彼或量不足或才略有所窮權不足以濟事智不足以知時故也以姚崇之賢惟其不知道未免為救時之相其他可知也國家有通明相曰英國胥公尚兼數公之長豫謂希顔此論似涉過差至于為國朝名相以度量雄天下則在公為無愧矣在長安日乞致仕表云興造功業方聖主有為之時表裏山河豈愚臣養病之地送弟有之云丗事正須髙著眼官途休厭少玄頭他文類此弟恆常之子嗣祖今在燕中送弟恆作州男子四方志人生五馬榮君恩何以報民政不宜輕御物當存恕存心要盡誠勿矜新號令姑守舊章程斂暴單貧困囚淹狡僞萌慈柔難禁暴苛急必傷生東郡吾將老西陲敵未平一生能幾别四事果難并方此對床樂愴然分𬒮驚荒詩何足記聊寫弟兄情張左丞行中行中字信甫莒州日照人祖莘鎮西軍節度副使父暐御史大夫以武安軍節度致仕兄行簡易無體榜弟一人信甫大定二十八年進士衛紹王朝虎賊巳除名為民賂遺權貴得復用信甫言其必反及弒逆自為太師尚書令澤王信甫時為禮部尚書人謂必為所殺甚危之一日虎下禮部鑄監國寶信甫持不可虎雖怒然亦竟不能殺也宣宗即位授參知政事丞相髙琪專權用事聲勢熖熖人莫敢仰視議論之際唯信甫與之抗朝廷稱焉所居拙軒有為作銘者其引云發凶豎未形之謀則先識者以為明犯強臣不測之威則疾惡者以為剛蓋實録云元光末出為靜難軍節度使哀宗即位首命召之遷尚書左丞後二年致政卒於嵩山之崇福宮信甫家丗儒素雖位宰相而奉養如寒士日書經史五百字為課寒暑不廢者四五十年故於書無所不讀詩殊有古意也右丞文獻公所畫張果像古來人物畫為難驚見仙公樹石間莫把丹靑名右相太平勳業在人寰楊戶部慥慥字叔玉代州五臺人承安五年進士歷州縣入為尚書省令史拜監察御史侍御史京西大農司丞京南司農卿戶部侍郎權尚書自入戶曹即有相望資雅重事無巨細處之皆有法至於知朝廷大體則又非他人所能及也京城受兵權參知政事明年卒於河平叔玉文工於詩而人不以能文稱特未見其文耳過司竹監有懷王監正之不見嵩丘跨鶴仙才名留得萬人傳春郊漬酒傷今日夜雨論文記昔年宰樹謾懸公子劒髙山巳絶伯牙絃故居修竹靑靑在寂寞終南落照邊乾陵牝雞一啄血波流天下何緣不姓周今日阿婆心力盡乾陵秃似老僧頭狀元鄭內翰子聃子聃字景純大定人少日有賦聲時輩莫與為敵天德三年弟三人登科士論仍以為屈而海陵不之許也正隆二年詔景純再試擇能賦者八人先以題付之以困景純且將視其中與否罪賞之御題天賜勇智正萬邦海陵謂侍臣漢髙祖諱不避之可乎乃改作萬國及開卷景純果弟一人楊伯仁張汝霖中選劉幾綦戩李師顔輩皆被黜海陵終不以景純為工與被黜者兩罷之趙獻之賀啓云丹桂一枝不失舊物靑錢萬選無愧古人其為名流所稱道如此纍官吏部侍郎改侍講學士卒其賦酴醿有玉斧無人解修月珠裙有意欲留仙之句甚為詩家所稱即事一錢不直程衛尉五斗解酲劉伯倫讀罷離騷解衣卧門前花柳自爭春孟內翰宗獻宗獻字友之開封人大定三年鄉府省御四試皆弟一供奉翰林曹王府文學兼記室參軍以疾尋醫久之授同知單州軍州事丁母憂哀毀致卒劉無黨題其詩卷後云簮紱忘情纍山林閲歲隂選官堂印手說法老婆心友之深於內典丗路嗟前却人生變古今公乎真不死名姓斗之南相人孔嗣訓挽云二十年閒事才名一夢新衰羸驚喪母哀毀竟亡身魂返愁楓夜情留淚草春黃公酒壚在此去只悲辛汴人髙公振特夫云見說平生夢前途盡目前友之未弟時夢中預見前途所至于今皆驗乘除雖有數凶禍竟何緣禮樂三千字才名二十年仁人遽如許無路問蒼天又云誰謂詩成䜟淸冰果自焚友之雪燭詩固知劫火終無盡誰謂淸冰也自焚未幾下丗人嗟埋玉樹天為落文星友之鄰舍李生言六月中連二明星隕于友之所居虛靜軒前數詩雖不盡工姑并記之有以見先生於出處之際死生之變造物者皆使之前知其以天下重名卑之者為不偶然云龔平甫森玉軒古人借宅亦種竹大是叨竒心未足髙齊聞有萬琅玕坐對懷山飲秋緑官間勝日無一事尊酒不空仍有肉他時剝啄叩君門髙枕矮床容我宿舊畜一琴弃置者久之李君仲通為張絃料理仍鼓數曲以詩贈之我家筝奴憂樂同塵埃滿面鬢髮蓬徽絃不具挂墻壁似慙無以娛衰翁夫君一見為披拂坐使寒谷回春融中含太古意味足雜以新態來無窮繁聲流水不可喻直與造化相冥通形神久巳坐灰槁一旦抉剔驅盲聾寂然反聽杳難詰但覺萬竅俱玲瓏千金不得和扁力誰謂起廢由枯桐曲終玄旨竟誰㑹非絃非指仍非空拂衣欲往君且止為我乘興彈悲風張仲山枝巢達人孤髙與丗踈百年直寄猶須臾歸來掩關聊自如人之不足等有餘樂哉下視濠梁魚逍遙自契莊蒙書異時馭氣遊太虛我知枝巢亦蘧廬柳塘搖搖風影漾寒塘靜裏亭臺日月長不似隋家堤岸上亂鴉殘照管興亡蘇門花塢繞舍雲山慰眼新看花差後洛陽塵從君小築繁香塢不負長腰玉粒春閏月九日南崖烘暖貯秋光勝處相㳂嚼一觴俚諺難逢兩寒食閏餘今值小重陽頭風比似常年愈菊靣渾如去歲黃老矣歡逰定能幾佳時此樂最難忘趙內翰攄攄字子充宛平人自號醉全老人早赴北宫蒼龍雙闕鬱層雲湖水鱗鱗柳色新絶似江行看淸曉不知身是趂朝人趙文學承元承元字善長先丗汴人兵火閒寓旅河閒遂占籍焉大定十三年詞賦弟一人除應奉翰林文字兼曹王府文學以踈俊少檢得罪王府貶廢久之遇赦量敘卒於臨洮探春冰底流泉匹練飛麴塵著柳不禁吹杖藜恰到春生處巳有人家插酒旗張太保行簡行簡字敬甫大定十九年詞賦弟一人家丗儒臣備於禮文之學典貢舉三十年門生遍天下南渡後遷禮部尚書太子太保䎐林學士承旨薨諡文正楊內翰之美銘其墓稱敬甫天性孝友太夫人疾不解衣者數月居喪哀毀過禮事其父御史大夫自幼至終未嘗少違顔色與諸弟居三十餘年家門肅睦人無閒言率勵子弟不知為驕侈雖處冨貴與素士無異平生無泛交無私謁慎勤周密動循禮法居無怠容口無俚言身無徑行雖古君子無以加故天下言家法者唯張氏為弟一言禮學言文章言德行之純備者亦唯張氏之歸有集三十卷傳於家敬甫賦燕云王氏烏農巷盧家白玉堂寒食云餳粥雞毬留故事風花鶯柳閙春城中秋云露凝灝氣霑瑶席雲近淸光護桂宫此類甚多也六月二十九日北官朝回踈柳衰荷又一時淸波飛葉夢靈芝年年踏盡溪邊路不覺吳霜點鬢絲酬郭光秀才疇昔君來事巳暌豈知今我又羈栖波臣儻不辭升斗鵠卵終當遇魯雞題子端雪溪小隱圗出處皆天豈自由仙摽終合冠鰲頭不妨貌取黃華景時向鈴齊作卧游張內翰楫楫字巨濟先丗泰州長春人有官於山隂者遂占籍焉曽祖頥宗銀靑榮祿大夫祖惠懷逺大將軍父天白􅉑縣簿巨濟明昌五年詞賦弟一人仕至鎮戎州刺史為人有藴藉善談論文賦詩筆截然有律度時人甚愛重之陜州詩云駭浪奔生馬荒山卧病駝永寧劉氏園亭云菊老芙蓉衰梨柿葉爭絳叩門人不譍一犬吠深巷此類甚多秋興飄零千里道牢落半生愁殘月如新月今秋似去秋露濃花氣重風細竹聲幽何日清溪上煙蓑一釣舟客中絳脣花不語靑眼柳𥘉眠塵去尋芳馬香來載酒船歸期仍鴈後野興巳鷗邊惆悵無家客春風又一年蓮實水妃擎出紺珠囊玉笋雕槃喜乍嘗膚白巳攙新藕嫩心青猶帶小荷香鬪餘翠鳥零珍羽飛盡黃蜂露蜜房口腹纍人良可笑此身便欲老江鄉初夏小園緑笋閒朱櫻點綴年華似有情露浥葛巾晨氣潤風隨竹簟晚凉生間窺黠鼠潜身處靜厭飛蚊繞鬢聲安得冷泉幽石畔解衣盤礴樹隂淸閻治中長言長言字子秀濟南長淸人客居兖州之嵫陽祖俊行臺南榜父時升任忠傑榜曽髙以來登科者六丗矣子秀少日慕張忠定之為人故名詠避衛紹王諱改焉幼孤養於從祖能自振厲好學工詞賦閒有前人句法性本豪俊使酒任氣及遊京師乃更折節遂以謹厚見稱酒酣耳熱故態稍出嘗以弟一流自負屏山獨深知之不以為過也平生多竒夢果魁天下士論厭服在翰苑十年出為河南府治中𬒳召以道梗不得前卒於亳州子魯瞻魯安今一孫在洺州北齊行天保大人襲丗貴未待齊成巳無魏䜟裏方傳近水羊夢中先兆攻城蝟六君三丗都能幾二十八年翻手裏細思孝靜靈運詩天道好還非妄矣應制中秋璧月當秋夜未䦨漢宫髙㑹浹宸歡塊蘇塵丗三千界珠翠瑶光十二欄桂實飄香浮壽斚露華零潤溢仙槃都人側聽雲韶奏共指天家是廣寒婆速道中書事此地先經戰人生苦未聊泉源疏地脉田壠上山腰敗石平危徑枯柴𥙷短橋曉煙明逺爨暮雪暗歸樵履滑心頻悸梯危骨欲銷解鞍空倒卧無夢訖通宵送麗酒麗橙與秀實御史驄馬朝回畫閣深遙知春意領梅心麗橙嬌軟麗尊小聊助風流對淺斟閻立本職貢圖諤諤昌周此一書形容熬貢寫成圖寧知右相無深意莫指丹靑便厚誣盤山招隱圖畫出中盤望隱歸鳴珂朝馬尚遲遲賦詩未敢輕相誚却恐吾山也勒移三門集津圖津門未為天下險勿作駭相觀兹圖偃月堂中李林甫有人能寫此心無丁氏思祖亭鶴野三千里鳬函五百年人閒仍舊德龜筮得新阡族屬東州望衣冠鼻祖傳異時誰式墓應識子孫賢李治中著著字彥明真定人髙才博學詩文得前人體工於字畫頗尚玄言承安二年經義弟一人在翰林七年出副定州召為戶部貟外郎坐大中黨事謫臨洮府判官量移西京路按察司判官遷彰德府治中城再陷避于塔上兵人招降大罵不從掘塔倒而死觀音院書閣門巷蓬蒿一尺深小軒岑寂似山林鳥聲落枕有髙下山色閲人無古今客裏三年侵老境床頭一易浣塵襟晚凉癡坐忘言裏滿地西風白玉簪異人擬栩先生王中立中立字湯臣岢嵐人博學強記問無不知少日治易有聲埸屋間家豪於財賔客日滿門所以待之者備極豐腆其自奉則日食淡湯餅一杯而巳年四十喪妻遂不更娶亦不就舉選齊居一室枯淡如衲僧如是三四年乃出時人覺其談吐髙闊詩筆字畫皆超絶若有物附之者問之不言也間間趙公知平定先生往謁之與之詩云寄語間間傲浪仙枉將詩酒汚天全黃塵遮斷來時路不到蓬山五百年因言唐丗士大夫五百人皆仙人謫降中有為丗味所著迷而不反者如公與我皆是也一日來都下館於間間公家中秋夜飲酒賦詩且就公索墨水一槃公如言與之明旦不告而去壁間留龜鶴二字廣長一丈而墨水具在不知以何物書之也朝士來觀者車馬填咽都下競傳王先生仙去矣久之先生從外至問二字以何物書之不答題詩其旁云天地之閒一古儒醒來不記醉中書旁人錯比神仙字只恐神仙字不如先生平生詩甚多有醉袖舞嫌天地窄詩情狂壓海山平之句他亦稱此人有問丗外事者亦一二言之好作擘窠大字往往瞑目為之筆意縱放勢若飛動間間公甚愛之屏山嘗見先生商略前代人物引先儒論議數十條在目前如人人自相詰難然後以巳意斷之以為辨博中弟一流人也臨終預尅死期如言而逝州將石倫葬之欣州時年五十六豫嘗從先生學問作詩究竟當如何先生舉秦少遊春雨詩云有情芍藥含春淚無力薔薇卧晚枝此詩非不工若以退之芭蕉葉大梔子肥之句校之則春雨為婦人語矣破却工夫何至學婦人先生晚年易名雲鶴自號擬栩云中秋素丸東溟來飛上玻璃盆聊揮五輪手撥去萬里隂印透山河影照開天地心人丗有昏曉我未嘗古今屏山所傳作素紈靑溟來聊舒五輪指雜詩四首華山宫殿白雲封不見當年打睡翁貪看終南山色好不知紅日下前峯獨跨蒼虬下太清春風萬里月華明因君感激為君說鑿破天機我也驚雲葉𥻘𥻘皺碧空笙簫遞響入天風忽驚風浪耳邊急不覺形神來丗中此生休更問浮名名利區區不暫停我有一丸天上藥用時還解濟蒼生題𥙿之樂府後常恨小山無後身元郎樂府更淸新紅裙婢子那能曉送與凌煙閣上人王先生豫可豫可字南雲吉州人父本軍校南雲亦嘗隸籍年三十許大病後忽發狂久之能把筆作詩文及說丗外恍惚事南渡後居上蔡遂平郾城之閒在郾城為最久遇文士則稱大成將軍於佛前則諦摩龍什於道則騶天玄俊於貴游則威錦堂主人為人軀幹雄偉貌亦竒古戴靑葛巾項後垂雙帶狀若牛耳一金鏤環在頂額之閒兩頰以靑涅之指為翠靨衣長不能掩脛故時人有哨腿王之目落魄嗜酒每入城市人爭以酒食遺之夜宿土室中夏月或尸穢在旁蛆蟲狼藉不恤也人與之紙落紙數百言或詩或文散漫碎雜無句讀無首尾多六經中語及韻學家古文竒字字畫峭徑遇宋諱亦時避之人或問以故事其應如響諸所引書皆丗所未見談說之際稍若有條貫則又以誕幻語亂之麻知幾張伯玉與之遊最狎說其所詩以百分為率可曉者才二三耳題嵩山石淙云石裂雯華漬月秋蓋石淙之石皆狀若湖玉其髙有五六十尺者石之文如蟲蝕木如太古篆籕竒峭秀潤一一在潭水中親到其處知詩為工也蔡州北懸壷觀仙榆云壷樹苔波月漬皴醉後云一壷天地醒眠小宫體云萬疊雲山飛小鴈射虎首句云風色偃貂裘即閣筆自戲云此虎來矣樂府云唾尖絨舌淡紅甜又自戲云欲下犁舌獄耶和太白宫詞云金盆水不暖翠雀啄晴苔又云鳳蹴瑶華散龍銜桂子香西瓜云一片冷截潭底月六彎斜卷隴頭雲烹茶云簾捲緑隂花外月玉山冰雪醉扶翁凌霄花云啼鳥倒銜金羽舞驚蛇斜傍玉簾飛威錦堂樂府云鳳環捧席帶香屏鯨杯倚伎和雲捲屏疑作慿此類尚多人亦多贈南雲詩者李子遷云石鼎夜聮詩筆健布囊春醉酒錢麁真南雲傳神詩也壬辰兵亂為順天軍將領所得知其名竊議欲挈之北歸館於州之瑞雲觀南雲明日見將領自言云我不能住君家瑞雲觀也不數日病卒後復有見之淮上者宫詞水曲朱門漪漾漫一簾花雨月波寒金閨背襯鴛鴦冷春困秋千立畫干南園湖石翠雀銜雲墮翠蕪砥峰倒影卧平湖飛花不到穿簾月髙倚晴天一劒孤馴鶴圖張伯玉家畫幀宫人徐行以手整叉一鶴後隨謂之馴鶴圖伯玉請賦詩欽叔常苦其作詩多不用韻限以叉來苔三字寢處粧鉛未捲叉孤雲花帶月邊來六宫簾幕金鸞冷露濕晨煙啄翠苔雜詩二首白露沙灘浸緑湄小舟艤岸尚依希山回屏曲江連樹春鎖人家深處歸暗悲秋色素團團一雨飄零飈霽寒天淨長空煙斂處彩虹金挂樹頭山宫體二首紅葉鋪霜撼御階繡蓮塵蹴襯羅鞋袖沾鶯翅調簧語墮却銜翹入鬢叉驕馬金籠藉草歸翠鸞屏曲染紅霏憑欄山色春風裏喚得鶯兒燕子飛照了居士王彧彧字子文洺州人承安中進士資剛决不可犯為尚書省掾知管差除與郎官相可否即弃官去往來登封盧氏山中改名知非字無咎自號照了居士居山中二十年布衣𬞞食井􅍫自親時人哀苦之而知非處之自若也少日為文工於四六詩亦有功和二宋落花韻四首云曽見嬌窺宋玉墻忽驚遺夢到延凉聚塵非分侵凌玉流水無情葬送香錦襪謾拋終隔靣綵灰雖吐若為腸蒼苔碧草無窮恨木石癡兒亦自傷可人未厭出鄰墻回首空殘翠幕凉好事只傳懷夢草殊鄉誰致返魂香塵凝燕子慵䦕眼煙暗馬嵬空斷腸穠李絳桃俱異物為歌薤露寫餘傷緑影浮空只自傷賞心死著未能忘瓊枝不解留春色銀燭空曽照夜粧肺腹巳傳蜂蜜盡肌膏仍與燕泥香情知靑帝回車日合有祥風老退房韶華終竟合雕傷獻笑縈懷忍遽忘露壓不禁昏淚臉風披無奈醉愁粧芳菲頓减林園趣狼籍空餘陌路香却憶班姬浪辛苦一生都得幾專房既學佛作决定歌禪家以為證道新豐之後無有及者𥘉出京有詩云親踈俱穩人倫了㛰嫁齊成俗意周一筆盡鉤塵債斷都無虧缺大家休休休休愛著何時是徹頭風息浪平人巳渡笑携明月下孤舟嵩山中云撒手寧論萬丈崖腳跟未肯點塵埃東君也自魔君數故著青紅眼底來來何遲去何早二五不多十不少一聲柄木遍虛空誰識堂堂真照了又贈安居士國寶云不招措大嗔不喚王子文不惹禪和笑不名王照了他人怕人嫌照了要人嫌人人有靣樹有皮努力方便勤粧嚴粧嚴也田賢不然也由賢鼻孔莫遣他人穿又答國寶云幻人誰拙復誰能遊戲何妨傀儡棚凡事不堪君莫怪儂家靣目得人憎又云忽然識破虛空我六合縱橫更有誰正大壬辰參知政事宗室思烈行臺洛陽以知非有重名力致之使參議臺事城陷不知所終子升卿有賦聲早卒禪頌三首昧巳全拋大事憂為渠剛攬等間愁乘榆晚景無多子針芥人身豈易投間日搆來忙日用此生迷却再生休鼻頭捩轉從今始看作回程火裏牛吾身非我底為情說著塵勞特地驚五九盡時山更好澗泉雲鳥自春聲放下情懷觸處安生涯取取沒多般褐衣襤䄛聊遮赤短髮鬅鬙底用冠一榻省緣資困歇二匙隨分了飢餐也知苦澀人人笑烈日初心不敢謾貞祐末行臺都尉南征獲武經進士李申之于盱眙左右司郎中劉光謙逹卿潤文官李獻能欽叔愛其才辨欲活之以避嫌不敢也乃託以問事機令軍中羈管之申之作詩贈主囚者云一飯感君無地報寸心許國只天知明朝定作長準鬼馬革仍煩為褁尸又云胸中萬古撗鐘阜一死鴻毛斷不移又獻書都尉云金國歲歲南侵計所得不能一二州而軍力折耗殆盡今歲此舉亦曽慮人有議其後何以禦之乎為公計者不若此南軍大舉斂兵而退雖屢出無功得全師而返猶可自救不然師老食殫困頓于堅城之下讒間一行則公受禍不久矣某軍敗而死固其所也乞于盱眙城下責以不降之罪以一死見處使人人知之則都尉亦于名教有功書上之明日申之謀遁歸不果乃殺之欽叔說其臨刑回靣南向欣然就戮甚嗟惜之豫謂申之胸中萬古撗鍾阜與王知非烈日𥘉心不敢謾皆列丈夫語故附見于此無事道人董文甫文甫字國華潞人承安中進士為人淳質恬于丗味於心學有所得人知尊敬之而不知其所以得也子安仁亦學道父子嘗間居寶豐閉户不出以習靜為業朝夕不繼晏如也國華歷金昌府判官禮部貟外郎昌武軍節度副使正大中以公事至𣏌縣自知死期作書與家人及同官又作詩貽𣏌縣令佐詩畢擲筆于地以扇障靣而逝有和太白山明和尚牧牛圖詩刻石於洛陽其引云夫人有等差教分頓漸上根之人一聞千悟不落階級中智而下必由漸進此人牛次弟不得不立心性動靜徼妙有無學者所冝諦觀也以人牧牛是動而有制從有以觀其徼者也進進而不巳則漸至於回首馴伏從無以觀其妙者也有入于無徼及于妙固善矣又不如靜而無礙之為愈也靜而無礙又不如兩忘雙泯之入神也若夫人牛兩忘明月獨照恍然俱失所在當是時也吾將離形去智神亦無功同于大通與道為一則向之人牛亦筌蹄中一微塵耳吾儒所謂盡心盡性者無外於是因借明和尚韻再下一轉語㑹心者必能知之詩不録秋夜見即如無爐上雪淡而有味水中鹽齊行定惠千燈熖淨識乾坤一鏡奩晝眠莊周先我復天真化蝶飛來管領春我亦莊周周亦蝶不知若箇是真身審是堂按劒人人駭夜光蜀雞合道勝鸞凰飛蛾可是無分别直道油燈是太陽文中子續經紛紛述作史才雄聽似秋來百草蟲不是春雷轟蟄窟蚓蛇㑹得化成龍豫嘗以王氏六經為問先生云王氏六經是權道設教雖孔子亦然但後人不能知之耳因以此詩見示臨終詩四首無情喪主沒錢僧送上城南無事人撿盡傳燈無盡録更無公案遮番新生有地死有處萬牛不能移一步一輪明月印天心此是渠儂住處住白髮三千丈紅塵六十年只今無見在虛費草鞋錢今古一輪月分明印碧霄門門蟾影到處處桂香飄不起眼中暈何勞指上標真空渾照破歸去杖頭挑隱德薛繼先繼先字曼卿猗氏人少日三赴廷試南渡後隱居洛西山中課童子學事母孝與人交謙遜和雅所居人化之子純孝字方叔有父風客有詐為曼卿書就方叔取物者曼卿年已老狀貌如少壯人客不知其為曼卿而以為方叔也而與之書曼卿如書所取物付之雖其家人亦不以語之也監察御史石玠子堅行部過曼卿曼卿避不之見或言君何無鄉曲情耶曼卿曰君未之思耳凡今時政未必皆善石御史一有所劾則必謂自我發之同惡相庇他日并鄰里有受禍者其畏愼類此正大未司農卿楊慥叔王丞康錫伯祿薦曼卿與汴人髙仲振武陟宋可武淸張濳磁陽曹珏大名王汝梅隱操不减古人朝廷議授以官以兵亂不果曼卿喜作詩工于賦物如松化石云瘦見千年傲霜骨錬成一片𥙷天心時人稱焉壬辰之亂病沒於宜陽仲振字正之系出遼東其兄領開封鎮兵正之幼就舉選年四十後即以家業付其兄挈妻子居嵩山於書無不讀而以易皇極書為業安貧樂道不入城市山野小人亦知敬之王汝梅張濳從之學三人行山谷閒人望正之風袖翩然如欲仙而未舉也張王說正之嘗遇異人教之養生呼吸吐納日以為常靈氣時至安坐不動而骨節戞戞有聲恍惚中時與真靈接對所談皆丗外事既不以語人故無得而傳潜字仲升有志節慕荆軻聶政之為人三十歲後乃折節讀書太學諸人髙其行義有張古人之目客嵩山從正之學易五十歲始娶妻妻魯山孫氏亦有賢行夫婦相敬如賔負薪拾穗行歌自得大用與之同業而生理優贍憐髙張之貧時有餽餉皆謝不受鄉里為仲升斸瓜田瓜熟仲升約中分之以償其勤衆不忍但小摘而去仲升亦弃瓜不收衆如約然後取食之嘗行道中拾得一斧夫婦計度移時乃持歸就訪其主歸之所居寺㽵有兄弟分財致諍者其弟指仲升所居曰我家如此獨不畏張先生笑人耶天興之兵避於少室絶頂時丗已亂寇􅟃暴撗無復人理仲升不甘與之處閉口不食七日而死婦隨亦投絶澗中汝梅字大用律學出身伊陽簿秩滿遂不出性嗜讀書動有禮法生徒以法理就學者兼以經學授之後生輩服其教無敢為非義者可字豫之貞祐之兵其姑嫁大姓槀氏夫與子皆兵死而資産獨在姑以白金五十笏遺豫之豫之受不辭一日姑得槀之踈屬立為後挈之省外家豫之置酒㑹鄉鄰且謂姑言姑往時遺可以金可以槀氏無子故受之姑今有子矣此金槀氏物非姑物也我何名取之因呼妻子舁金出歸之槀氏鄉里用是重之大兵再駐山陽軍中有聞豫之之名者問知所在質其子使人招之曰肯從我者禍福與公共之不然公之子死矣親舊競勸之往豫之不從曰吾有子無子與吾兒之死與生皆有命焉豈以一子故併平生所守者而亡之乎其後豫之竟以無子死與字子玉早歲有賦聲誠實樂易丗俗機械事皆所不知喜賔客欵於接物無書生氣習從之遊者樂之而不厭也六人者喪亂後惟子玉居弘州十二年乃終九日感懷曼卿衰年易感我今知無訝騷人動楚悲故國久拋兵劫後佳辰多負菊華期一時蘭艾同凋落兩鬢雪霜仍别離髙丗輸他陶靖節悠然髙興滿東籬過洛陽豫之西來東去洛陽城千尺浮圖了送迎十日酒旗歌板地白頭孤客可憐生寄人宰縣仲升縣務無難易人才自異同割雞良暫屈製錦要專工積弊姦贓後遺黎喘汗中不存憂丗志底用讀書功嫉惡看平日知君有古風莫教循吏傳獨載魯山翁載方言作上聲呼白髮感懷子玉少年豪舉氣如虹今日蕭然一病翁曉鏡秪添頭上雪春風不緑鬢邊蓬文章那作一錢直燈火空勞半丗功擬築糟丘便歸老醉鄉何者是窮通中州壬集卷終
