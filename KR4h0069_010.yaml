詩題於集後俾知吾心者不吾過也庚申六月丙辰江東朱辨書絶域山川飽所經客蓬歲晚任飄零詞源未得窺三峽使節何容比二星蘿蔦施松慙弱質蒹葭倚玉怪殊形齊名李杜吾安敢千載公言有汗青濟陽公謂宇文叔通叔通受官而少章以死自守恥用叔通見比故此詩以不敢齊名自託至于書年為庚申與稱江東朱辨者蓋亦有深意云秋夜秋夜雖漸永未抵客愁長秋月雖巳圎不照寸心方將心貯此愁莫作萬斛量為月憐此夜誰共千里光空令還家夢欲趂征鴻翔附見籧然子趙滋滋字濟甫夲出馮翊其祖貞元閒來為南京漕司户籍判官卒官下妻子不能歸遂為汴人濟甫少日出閭里閒其曉音律善談笑得之宣政故家遺俗者為多及長厭于遊蕩乃更折節取古人書讀之學書學畫學詩學論文立志既堅力到便有所得為人強記默識不遺微隱唐以來名人詩文往往成誦如目前考論文義解析絡脉殆若夙昔在文字間者畫入能品詩學亦有功如黃石廟等作今代秉筆者或亦未可輕議間間趙公書法為今代弟一手學者多倣之但得其形似而巳濟甫筆勢飛動頗得公不傳之妙宗室胙公文采風流照映一時而濟甫以布衣從之遊商略法書名畫胙公亦以真賞稱焉隆德太一故宫樓觀臺沼門戶道路花木水石悉能歷數之聽者曉然如親到其處至於宋名賢所居弟宅坊曲與其家行輩群從孫息姻婭排比前後雖生長鄰里者不加詳也嘗過長清一禪寺與僧談僧言五派傳授圖大不易作濟甫笑曰易與耳因索筆作圖坐中他日以舊本證之不毫末差也丁酉歲殁於東平時年五十九黃石廟狂豪擊車代無人神石一砭志乃信吹噓風雲遮楚秦炎精熾然四百春一縮尚吝續後塵江山有待終此身望望久愁撗目民朝陽凄凄霜未休江燕竟來江北遊山回鼎移海橫流天風何時清九州草泥自古跧王侯神弃不恤誰當羞割牲釃酒空千秋先大夫詩鄉先生權參知政事代郡楊公叔玉撰先人墓銘今略載於此先生姓元氏字德明秀容人唐禮部侍郎次山之後自幼讀書丗俗鄙事終其身不挂口為人誠實樂易洞見肺腑雖童子以言欺之亦以為誠然也先大夫殁遺産無幾先生布衣𬞞食處之自若家人不敢以生理纍之僮奴有竊拾東家之棗者立命還之貧人負債則往往令折劵以貸之也纍舉不弟放浪山水閒未嘗一日不飲酒賦詩春秋四十有八終于家先生作詩不事雕飾清美圎熟無山林枯槁之氣居東山福田精舍首尾十五年東嵓其自號也有集三卷藏于家銘曰貪夫徇財智士死名宇宙古今萬轍混并我機弗張我戶弗扄天宇泰然物莫敢攖飲芳食菲岩岫杳冥玉佩瓊琚御風泠泠魯山之醇次山之清閲丗幾傳猶有典刑邈哉先生明昌承安閒科舉之學盛大夫士非賦不談人知先人有聲埸屋閒其以詩文為業則不知也先人捐館後十年好問避兵南渡逰道日廣丗始知有元東岩之詩楊尚書之美云彼美元夫子學道知觀瀾孔孟澤有餘曽顔膏未殘林觀察顯卿云文章變古名新躰孝弟傳家守舊規雷內翰希顔云詩句妙九州孝友化一川王右司仲澤云讀書楓樹林曵杖白石灣至今文彩餘虎子仍班班李長源云衣冠巢許自髙雅岩壑䕫龍非棄捐餘人不能悉紀家集亂離以來凡三失之今所存者特吾益之兄及門生輩所記憶者耳小子不肖暗於事機不能髙蹈逺引戀嫪升斗徼幸萬一以取縶維之禍殘息奄奄朝夕待盡誠懼微言將絶謹以古律詩四十首附之中州集之癸冊庶幾來者知百餘年閒作詩如先人而人或未之見其餘抱一槩之操泯泯默默終老而無聞者豈勝計哉是又可為嘆也桃源行山中三月山桃開紅霞爛熳無邊涯音崖山家藏春藏不得落花流水人閒來憶昔携家竄岩谷秦人半向長城哭回頭塵土失咸陽繒弋徒勞羡鴻鵠冬裘夏葛存大朴小國寡民皆樂俗晝永垣籬雞犬間春晴門巷桑榆緑漁郎偶到本無心仙境何緣得重尋今日武陵圖上看唯見雲林深復深送德溫同舍赴簾試太常侍祠水蒼珮內相夜下金蓮燭皇家結網未曽踈亦有佳人在空谷一從唐賦變遼律仰視折楊猶雅曲雲臺勳業一青衫𬒳髮操戈踵相屬筋疲力涸僅乃得墨水一升凡幾辱英雄俯首入彀中舉丗悉然非子獨子家口衆親又老歲月旨甘須寸祿薦書聞說過南宫冷暖人情到僮僕我𥘉與子偕計吏人後人前隨碌碌不慚齊客售鼓瑟頗為荆人悲獻玉一詩今日送君行萬里秋風看鴻鵠功名前路知不免雞黍後期良未卜錦標無用咤龍頭帛書且當傳鴈足雨後十日山中雨今朝見夕陽乾坤覺清曠草棘有輝光竹影搖殘滴松聲送晚凉南窗聊自適無用說羲皇覽鏡四十宜未老年年添鬢絲直教隨牒去也是挂冠時臺閣多新賦山林有逸詩悠然一樽酒滿酌不須辝室人生朝新酒清渾共糟床洗盞嘗平時唯欲醉此日重難忘容服慙王霸山林得孟光白頭翁與媪萬事聽諸郎太原古城惠明寺塔秋望西山萬古壯陪京一日汾流入廢城浩浩市聲爭曉集畇畇原隰但秋耕晉公老去詩仍在晉公晉陽官舍春日詩云白頭官舍裏今日又春風越石亡來恨未平千尺浮圖暮煙底瓦盆濁酒為誰傾薄遊同郝漕子玉賦全晉山河百戰埸登臨歷歷見興亡夷居尨雜尤堪嘆霸氣沉雄亦未量石瓮煙霞詩秀潤駘祠風月酒淋浪書生不是功名具慚愧山翁問葛強山中秋夕黃卷有餘習青燈共晚凉只知書味永不覺鬢絲長老檜千年物幽蘭一國香平生陶靖節此夕邈相望寄宗人彥達交城人杯酒無緣接舊歡空將書尺問平安要君知我詩成處落日西風正倚欄榴華山茶赤黃桃絳白戎葵米囊不入格庭中忽見安石榴嘆息花中有真色生紅一撮掌中看模寫雖工更覺難詩到黃州隔千里畫家辛苦費鉛丹過鳳凰山在鴈門鳳凰聞說似天壇北去南來馬上看想得松聲滿嵓谷秋風無際海波寒瓶形嶺早發在繁畤界海雲蕭瑟雪花乾人在羊腸百八盤間客不知名利苦見時應作畫中看寒食再遊福田寺春山寂寂掩禪扉復嶺盤盤入翠微布襪青鞋供勝踐粥魚齊鼓薦玄機日烘幽徑緑煙暖風定曉枝紅雨稀曽是西堂讀書客不應啼鳥也催歸家園假山八尺飛來峰蒼然立於獨細看甲乙字疑是平泉族山非一草石見石山亦足便恐東岫雲來我簷下宿今朝鑿盆池明朝種松菊自笑住山人何時返嵓谷同侯子晉賦鴈沉沉江浦雲浩浩朔漠雪微生幾寒暑翅老飛欲折樓中見新過夕照送明滅欹枕數聲來踈窗耿殘月悲鳴或天性南北隨所愜誰念孤旅人年年為愁絶寒林圖為侯子晉賦川光茫茫風景暮一雪無情天地素長安閉門千萬家亦有行人踏長路新豐煙火灞橋水畫史工作荒寒趣雪中故事知幾何偏識詩翁忍寒處君不見淮西城下鵝鸛鳴官軍夜斫吳家營只如党家麁俗亦不惡銀燭金荷天未明拈出雪詩三十韻蹇驢席帽可憐生雪詩三十韻見坡集贈答彥文相過之什程太原人剝啄誰叩門開門得吾友握手一大笑慰我離群久之子富才具事業可力取瞻望青松姿衰遲愧蒲柳金閨滿鵷鷺什伯自為偶寂寞林野人過從但鄰叟盤餐無兼味笋蕨才適口窮達俱偶然相逢且柸酒枕上往時見白髮談笑輕歲月誰謂明鏡裏蕭蕭不勝鑷山林蹉跎久丗慮初未絶觸物重興懷忽忽不自愜遭逢有竒耦才用隨巧拙如何杜陵叟自比稷與契茫茫拊塵編何時卒吾業秋暮王氏園亭細徑雲林底危亭澗水湄秋先殞黃葉寒未老紅葵嚼句幽禽答尋花晚蝶隨無人共幽興思與野僧期六言北闕三臺五省東山萬壑千岩琴書中有真味風月外無多談山園梨葉有青紅相半者戲作一詩霜輕霜重偶然中一葉雖殊萬葉同不信丗閒間草木解隨兒女作青紅詩少有吟詩癖吟來欲白頭科名不肯換家事幾曽憂含咀將誰語研磨若自讎百年間伎倆直到死時休尊酒土灰論逺計木石笑浮生但有一尊酒何須千載名憶山中二絶句東寺留連飲張園爛熳遊兒童望歸路一日幾登樓秋色山中好山翁醉不回不知籬下菊霜後幾叢開山中雨後繞屋湍聲轉臨崖老樹摧雷轟一雨去雲擘兩山開遣興張翰一杯酒林逋千首詩性唯便自適材敢論時施狡兔從三窟鷦鷯分一枝青山有佳色只似往年時發兾州留别恩禪師詩拙非同社情親本故鄉共知成逺别且復暫相將池古蓮花淨窗深檜葉香何時重携酒來宿贊公房貴公子詠髙堂紅燭鼓聲齊舞遍纎腰月未西一曲纏頭一雙錦驊騮空自惜障泥蓮葉觀音恩禪師所藏同路宣叔賦瑞相分明一葉中華嚴性海共圎通補陀自有丹青變畫史區區可得工謝張使君夢弼餽春肉牙豬肋厚一尺玉鹽花入深蒸脫骨韭芽蓼甲春滿盤走送茅齊慰幽獨山人食貧才一粥幾𬒳艾生嘲首蓿食前方丈非素懷頗憶懸貆繞髙屋呼來鄰叟共一飽為說使君方繼肉飢民待哺今幾家無䇿贊君慚此腹區區一肉見歌詠說食書生良未足却愁今夕夢寐閒有物踏破園𬞞緑仙雞詩并序繁畤義興鎮酒家韓氏子畜一雞以善鬪雄其鄉一日敵家以藥飼雞使不知痛求與韓雞對韓雞鬪久果𬒳傷口下頷不收垂死矣一賣藥道人過其門曰我能活此韓欣然使療之里中諸兒隨看者一二十輩皆使向壁立道人以雞置籠中探手良久若摩拊然者巳而取瓢水噀之置瓢籠上即出門兒曹怪其久不還竊視之雞喙巳復生矣道人布𫀆草冠腋下懸青囊落魄嗜酒夜宿寺閣上韓氏子與里中人奔走求之并所卧草薦不在矣是時明昌七年仲規弟為此鎮酒官豫亦在焉作仙雞詩以記之老雄健鬪夸擅埸韓郎抱歸神色揚豈知黠兒出徼幸毒手一發不得妨毳毛散灑尚可養利觜一哆何由張青囊道人何許來自言救藥吾有方垂髯噀水濯殘血半喙隨手生新黃筠籠半開聞腷膊草冠巳往徒驚忙神仙丗有寧虛荒惜哉詭激不可量丗人鷙勇天且劓况於物也資強梁敷策枯枿變金石未若與丗針膏盲何須變化示狡獪知君辦作淮南王蓬萊東望雲茫茫愛而不見心為狂刀圭不願換凡骨且欲共醉無何鄉燈下讀林和靖詩落葉落復落淸霜今幾番踈燈照茅屋山月入頽垣老愛寒花淡幽嫌宿鳥喧卷中林處士相對兩忘言觀西岩張永淳畫鴈慘淡經營下筆難畫成不似卷中看知君連夜江湖夢折葦蕭蕭沙水寒從趙敷道覔石榴仙人囊中五色露得種昔與蒲桃俱猩猩染花開五月巳覺秋實懸庭除張園一酸齒欲裂君家兩株蜜不如竹馬兒童厭梨栗緑囊聊為剝紅珠雪行五更驢背滿靴霜殘雪離離草樹荒身在景中無句寫錯教人比孟襄陽龍眠畫馬驪黃求馬丗皆然滅沒存亡自一天當日鹽車人不識只今空向畫中傳歲暮蔌蔌霜力徑沉沉山氣冥北風半夜起吹動一天星送張兾州致政還都狀元行簡之父一扎恩書下紫宸東門祖道畫圖新路人也解賢踈傅河內猶思借寇恂父子文章千載事田園松菊自由身玉京才過梨花節靈沼行春莫厭頻用宋退傅張公間遊靈沼探春回故事春雪幾日韶華雪更侵龍公試手本無心寒留整整斜斜態暖入融融泄泄隂著柳直疑香絮重擁階還似落花深前頭桃李應無恙剩破相如買賦金楸樹道邊楸樹老龍形社酒澆來漸有靈只恐等間風雨夜怒隨雷電上青冥七夕天河唯有鵲橋通萬劫歡緣一瞬中惆悵五更仙馭逺寂寥雲幄掩秋風觀柘枝伎腰鼓聲乾揭畫梁綵雲擎出柘枝娘簾閒飛燕時窺影鑑裏驚鸞易斷腸輕細不妨重暈錦回旋還恐碎明璫杖頭白雨催花急拂散春風兩袖香敏之兄詩敏之諱好古性識頴悟讀書能強記務為無所不窺年二十就科舉時先東岩君巳捐館太夫人年在喜懼望其立門戶為甚切及再上不中意殊不自聊又娶婦不諧日致惡語遂以狷介得疾嘗作望月詩有莫怪更深仍坐待密雲或有暫開時之句人或言詩境不開廣非佳語也嘆曰吾得年不永境趣能開廣否未幾沒于北兵之禍年三十一中秋無月佳辰無物慰相思先賞空吟昨夜詩莫怪更深仍坐待密雲或有暫開時讀裕之弟詩藁有鶯聲柳巷深之句漫題三詩其後阿翁醉語戲兒癡說著蟬詩也道竒吳下阿蒙非向日新篇爭遣九泉知鶯藏深樹只聞聲不著詩家畫不成慚愧阿兄無好語五言城下把降旌傳家詩學在諸郎剖腹留書死敢忘先人臨終有剖腹留書之語背上錦囊三箭在直須千古說穿楊題江村風雨圖渡口舟橫水拍空墨雲傾雨樹號風江山不到紅塵眼半幅煙綃想像中中州癸集卷終
