body:
  text: 溪南詩老辛願二十首李講議汾二十五首李戶部獻用一十三首司馬侍郎朴一首滕奉使茂實八首通理先生何宏中一首醉軒姚先生孝錫三十六首朱奉使辨三十八首籧然子趙滋一首先大夫詩四十四首敏之兄詩五首三知巳溪南詩老辛願願字敬之福昌人其大父自鳳翔來居縣西南女几山下以力田為業敬之自號女几野人年二十五始知讀書取白氏諷諌集自試一日便能背誦乃聚書環堵中讀之書至伊訓詩至河廣頗若有所省欲罷不能因更致力焉音義有不通者搜訪百至必通而後巳有一事闕十年者由是博極羣書於三傳為尤精至于內典亦稱該洽杜詩韓筆未常一日去其手作文有綱目不亂詩律深嚴而有自得之趣性野逸不修威儀貴人延客敬之麻衣草屨足脛赤露坦然於其閒劇談豪飲旁若無人髙獻臣為河南治中聞其名引為上客及獻臣為府尹所誣敬之亦𬒳訊掠幾預一網之禍自是人以敬之之名為諱絶不與交不二三年日事大狼狽田五六十畝歲入不足一牛屢為追胥所奪竟賣之以為食衆雛嗷嗷張口待哺雅負髙氣不能從俗俯仰迫以飢凍又不得不與丗接其枯槁憔悴流離頓踣往往見之于詩元光𥘉豫與李欽叔在孟津敬之自女几來為之留數日其行也欽叔為設饌備極豐腆敬之放筯而嘆曰平生飽食有數每見吾二弟必得美食明日道路中又當與老飢相抗去矣㑹有一日辛老子僵仆柳泉韓城之閒以天地為棺椁日月為含穟狐狸亦可螻蟻亦可耳豫二人為之惻然敬之佳句極多如自憐心似魯連子人道靣如裴晉公萬事直須稱好好百年端欲付休休院靜寬留月窗虛細度雲浪翻魚出浦花動鳥移枝之類恨不能悉記耳木栖云吟窗醉几秋風晚只許幽人箇裏知三鄉光武廟云万山青繞一川斜到其處知為工也豫嘗論敬之士之有所立必藉國家教養父兄淵源師友講習三者備而後可喻如丗之美婦多出於膏腴甲族薰醲含浸之下閭閻閒非無名色一旦作公夫人則舉步羞澀曽大家婢不如其理然也故作新人材言教育也獨學無友言講習也生長見聞言父兄也至於傳記所載西子乃苧蘿山采薪氏之女越君臣教之容止七日而納之王遂能惑夫差傾吳國豈常理也哉敬之落落自拔耿耿自信百窮而不憫百辱而不沮任重道逺若將死而後巳者三十年亦可謂難矣南渡以來詩學為盛後生輩一弄筆墨岸然以風雅自名髙自摽置轉相販賣少遭指擲終死為敵一時主文盟者又皆泛愛多可坐受愚弄不為裁抑且以激昂張大之語從臾之至比為曹劉沈謝者肩摩而踵接李杜而下不論也敬之業專而心通敢以是非白黑自任每讀劉趙雷李張杜王麻諸人之詩必為之探源委發凡例解絡脉審音節辨清濁權輕重片善不掩微纇必指如老吏斷獄文峻網密絲毫不相貸如衲僧得正法眼徴詰開示幾於截斷衆流人有難之者則曰我雖不解書曉書莫如我故始則人怒之罵之中而疑之巳而信服之至論朋輩中有公鍳而無姑息者必以敬之為稱首蓋不本於教育不階於講習不出於父兄而卓然成就如此然則若吾敬之者真特立之士哉劉景玄趙宜之雷希顔李欽叔張仲經杜仲梁王仲澤麻知幾亂後兵去人歸日花開雪霽天川原荒宿草墟落動新煙困鼠鳴虛壁飢烏啄廢田似聞人語亂縣吏巳催錢贈趙仲常名憲宜之從弟詩有黃塵衮衮塵隨腳華髮蕭蕭老壓頭之句趙子年雖小論詩樂最深秋風凡幾首冬日更多吟老大吾無力文章爾用心荒山松竹底莫厭數相尋過嵩山催老年光衮衮來好懷知欲向誰開箕山潁水春風裏呼起巢由共一柸隆德故宫蛇分鹿死巳無秦五十年來漢苑春問著流鶯無一語栁條依舊拂墻新同趙長水泛舟洛水秦山晚自澄孤洲煙樹緑相仍波搖朗月浮金鏡嶺隔華星斷玉繩但覺轉船驚白鳥豈煩揮翣怒青蠅風塵浩蕩飄蓬裏愧似林宗陪李膺山寒山寒春靜早關門新月微光照短垣可恨暮雲欺落景却將殘靄助黃昏陋室陋室何妨似燕窠暮年終得返魚蓑壷中日月時常好枕上功名不足多往古來今真夜旦髙天厚地一罝羅鹿門幸有龐公樂牛角徒為寧戚歌亂後還三首兵戈為客苦思鄉春暮還鄉却自傷典籍散亡山閣冷松筠憔悴野園荒鶯銜晚色啼深樹燕掠春隂入短墻鄰里也知歸自逺競將言語慰凄凉亂後還家春事空樹頭無處覔殘紅棠梨妥雪霑新雨楊柳飄綿揚晚風談笑取官驚小子艱難為客愧衰翁殘年得見休兵了收拾間身守桂叢春來漂泊心情减老去艱危氣力微芳草際天愁思逺干戈滿地故人稀懷金躍馬時何有問舍求田事巳違糲食弊衣聊自足白頭甘息漢隂機題遊彥明林園三首先生未老厭儒冠築屋栽籬守歲寒經史日長常滿桉魚蝦溪近得供盤幽花入室無多種瘦竹關情只數竿蕭灑逺辭車馬跡求官何必近長安城郭繁華斷往還林園幽􅞔養髙間花玄暖蘂斜窺水竹亞晴梢巧避山尊俎歲時君得意風埃南北我何顔丹房藥鏡遊心久不惜哀矜洗病孱不礙遙看冷翠微儘教叢竹映窗扉籬根傍水知魚樂屋角鄰花鳥自歸濁酒野芹安巳久華軒髙馬到從稀人間回首皆堪鄙羡汝幽棲得所依贈劉庵主劉遼貴族蚤薄軒裳貴髙尋綺皓蹤一囊閭里藥六尺水雲笻午枕眠芳景晴簷望逺峯柴門常不掩應得野夫從函關雙峯髙聳大河旁自古函關一戰埸紫氣久無傳道叟黃塵那有弃繻郎煙迷短草秋還緑露浥寒花晚更香共說河山雄百二不堪屈指算興亡贈趙宜之二首夫子今詞伯胡為逺帝京靑雲無轍迹白髮有柴荆鬼戲多年病人髙四海名麟經方有缺無惜繼丘明轉徙家無地逢迎客有樽光隂連病枕天地一愚軒霜雪靑松古風塵白璧溫從渠投隙者衮衮向金門送𥙿之往許州酒間有請豫歌渭城煙雨者因及之白酒留分袂靑燈約對床言詩真漫許知巳重難忘爽氣虛韓嶽文星照許昌休歌渭城柳衰老易悲傷寄𥙿之靑雲一别阮家郎甚欲題詩逺寄將好句眼前常蹉過佳人心上不曽忘誰家秋月茅亭底何處春風錦瑟旁昌谷煙霞久寂寞歡遊還肯到三鄉山園歲暮山園懶再行蘭衰菊悴頗關情靑靑多少無名草爭向殘陽暖處生李講議汾汾字長源平晉人系出鴈門曠達不羈好以竒節自許避亂入關京兆尹子容愛其才招致門下留二年去之涇州謁張公信甫一見即以上客禮之自是遊道日廣然關中無一人敢與相軒輊者元光末用薦書得從事史館舊例史院有監修宰相為之同修翰長至直學士兼之編修官專纂述之事若從事則職名謂之書寫特抄書小史耳凡編修官得日録分受之纂述既定以藁授從事從事録潔本呈翰長平居無事則翰長及從事或列坐飲酒賦詩一預史事則有官長掾屬之别長源素髙亢不肯一丗乃今以斗食故人以府史畜之殊不自聊髙張諸人率以新進入館史家凡例或未能盡知就其所長且不滿長源一笑故刋修之際長源在旁則蓄縮慘沮握筆不能下長源正襟危坐讀太史公左丘明一篇或數百言音吐洪暢旁若無人既畢顧四坐漫為一語云看秉筆諸人積不平而雷李尤所切齒乃以嫚罵官長訟干有司然時論亦有不直雷李者故證左相半踰年不能决右丞師公以傷風化為嫌遣東曹掾置酒和解之不得巳乃罷尋入關明年驅數馬來京師日以馬價佐歡道逢怨家則畫地大數而去又明年恆山公仙在鄧之西山長源往說之署行尚書省講議官既而恆山與參知政事思烈相異同頗謀自安懼長源言論欲除之遁之泌陽竟為所害長源孝友廉介過人者甚多寧寒餓而死終不作寒乞聲向人人亦以此愛之平生以詩為專門之學其所得為尤多如洛陽才子懷三䇿長樂鍾聲又一年清鏡功名兩行泪浮雲親舊一囊錢煙波蒼蒼孟津渡旌旗歷歷河陽城長河不洗中原恨趙括元非上將才三輔樓臺失歸燕上林花木怨啼䳌空餘一掬傷時淚暗墮昭陵石馬前同輩作七言詩者皆不及也辛卯秋遇豫襄城杯酒間誦關中往來詩十數首道其流離丗故妻子雕喪道塗萬里奔走狼狽之意雖辭旨危苦而耿耿自信者故在鬱鬱不平者不能掩淸壯磊落有幽并豪俠歌謡慷慨之氣此詩兵火中散亡今就其少作豫所能記憶者録之陜州黃河城下水澄澄送别秋風似洞庭李白形骸雖放浪并州豪傑未凋零十年道路雙蓬鬢萬里乾坤一草亭八月崤陵霜樹老傷心休折柳條青州北州北光風艷綺羅南來扈從北人多梨園法曲懷奴舞月窟新聲倩女歌紫禁衣冠出金馬青樓阡陌瞰銅駝薄遊却憶開元日常逐春風醉兩坡再過長安細柳斜連長樂坡故宫今日重經過一時人物存公論萬里雲山入浩歌白髮歸來幾人在青門依舊少年多自憐季子貂裘敝辛苦燈前讀揣摩汴梁雜詩四首天津橋上晚凉天鬱鬱皇州動紫煙長樂觚稜青似染建章馳道直于絃犬牙磐石三千國聖子神孫億萬年一䇿治安經濟了漢庭誰識賈生賢琪樹明霞五鳳樓夷門自古帝王州衣冠繁㑹文昌府旌㦸森羅部曲侯美酒名謳陳廣座凝笳咽鼓送華輈秦川王粲何為者憔悴囂塵坐白頭樓外風煙隔紫垣樓頭客子動歸魂飄蕭蓬鬢驚秋色狼藉麻衣涴酒痕天塹波光搖落日太行山色照中原誰知滄海橫流意獨倚牛車哭孝孫寥落關山對月明客窗遙夜夢魂驚二年歧下音書絶八月河南風露清苒苒暮愁生草色迢迢秋思入蟲聲誰知廣武英雄嘆老却窮途阮步兵上清宫三首憶昔秋風從茂陵詞臣忝預漢公卿瑶池宴罷西王母翠輦歸來北斗城石馬嘶殘人事改劫灰飛盡海山平唯餘太一池邊月伴我驂鸞上玉京蒼梧雲氣赤城霞綿絡鈞天帝子家仙掌髙承九霄露霓旌遙駐五雲車昆明火劫驚人丗瀛海風濤撼客槎醉裏忽逢王子晉玉笙吹上碧桃花千劫塵緣謝吏曹道山仙闕事遊遨樓臺縹眇滄溟闊宫殿森羅紫極髙幾代雲孫接仙李千年王母醉蟠桃詩成便欲還山去猶待君王賜錦𫀆避亂陳倉南山回望三秦追懷淮隂侯信漫賦長句慿髙四顧戰塵昏鶉野山川自吐吞渭水波濤喧隴阪散關形勢軋興元旌旗日落黃雲戍弓劒霜寒白草原一飯悠悠從漂母誰憐國士未酬恩雪中過虎牢蕭蕭行李戞弓刀踏雪行人過虎牢廣武山川哀阮籍黃河襟帶控成皋身經戎馬心逾壯天入風霜氣更豪橫槊賦詩男子事征西誰為謝諸曹清明鳴珂振轂滿重城春日綿綿老燕鶯人在碧雞坊外住淡隨流水過清明下弟學劒攻書謾自竒回頭三十六年非春風萬里衡門下依舊并州一布衣磻溪封侯輸與曲如鉤冷坐磻溪到白頭老婦厨中莫彈鋏白魚留待躍王舟感寓述史雜詩五十首并引正大庚寅豫行年三十有九獻賦明廷為有司所病遂有不遇時之嘆皂衣斗食從事史館以素非所好愈鬱鬱不得志臥病中僻居蕭條盡日無來人緬維先哲凡所以進退出處之際窮達榮辱之分立身行道建功立事關諸人事者竊有所感焉於是始自騷人屈平以來下逮漢晉隨唐諸公終之以逺祖鴈門武皇作為述史詩五十首以自慰其羈旅流落之懷述近代則恐涉時事故斷自唐以下不論嗚呼三百篇大抵皆聖賢感憤之所為作也余以愚忠謬信獲譏于斯丗久矣非敢示諸作者庶幾後丗有楊子雲者出或能亮豫之宿心是歲秋七月既望并州人李汾引蘇客卿秦游說諸侯獲上卿賈人唇舌事縱撗可憐一丗癡兒女爭羡腰間六印榮韓淮隂信杖劒淮隂去復還舉頭西望識龍顔堂堂竟握真王印未害男兒辱胯閒叔孫奉常通秦時博士魯諸生漏網驪山百丈坑邂逅劉郎習綿蕝便能彈壓漢公卿馬中令周腳踏長安陌上塵布衣西上欲誰親君王不省常何䇿憔悴新豐一旅人逺祖鴈門武皇死心唐室正諸侯鐵馬南來隘九州當日三垂岡上意諸孫空抱腐儒羞擬張水部行路難洛陽行人心欲折半年西州信音絶彈箏峽口兵塵髙半夜心懸隴山月君不見嗷嗷失羣鳥泪盡眼流血潼關晝閉漢使稀安得慰我生離别雲溪曉泛圖曉景淡明月落影潭西丘晴川挂煙樹光拂雲河流楓林入行色關山生白頭羡羡畫中人憶我秦川遊君帆渺何許儻下滄浪洲滄浪吾有約寄謝同盟鷗古月一篇為𥙿之賦古月天不收敵君三萬秋天孫弄明鏡光湧雲間流憶昔放逐江南州金陵女兒歌櫂謳草褁烏紗巾散著紫綺裘酒酣把玉笛直欲捫參歷井騎斗牛醉中呼兒搖雙舟吾欲乘流下石頭起來茫茫視八極萬里只有元丹丘丹丘子遊人間風塵何為往復還玉華山人近招我九日朝帝蒼梧山西歸擾擾王城足是非不堪多病决然歸只因有口談時事幾𬒳無心觸禍機日暮豺狼當路立天寒鵰鶚傍人飛終南山色明如畫何限春風笋蕨肥避亂西山作三月都門晝不開兵塵一夕捲風回也知周室三川在誰復秦庭七日哀鴉啄腥風下陽翟草銜冤血上琴臺夷門一把平安火定逐恆山候騎來李户部獻甫獻甫字欽用欽叔從弟也兄欽止欽若皆中朝名勝家故將種而同時四進士人門之秀照映一時欽用博通書傳於左氏及地理之學為精為人有幹局心所到則絶人逺甚故時人有精神滿腹之目歷咸陽簿辟行臺掾屬正大初夏人請和朝廷以馮子駿往議欽用預行夏使有口辨馮善人無以折之往復之際至以歲幣為言欽用不能平從旁進曰夏國與敝邑和好百年今雖易君臣之名而為兄弟之國使兄而輸幣寧有據耶曰兄弟且不論宋日曽與吾家二十五萬匹典故具在君獨不知耶金朝必欲修舊好非此例不可欽用作色曰使者尚忍言耶宋以歲幣餌君家而賜之姓岸然以君父自居夏國君臣無一悟者誠謂使者當以為諱乃今公言之使者果能主此議以從賜姓之例敝邑雖歲捐五十萬某請以身任之夏使語塞和議乃定使還朝廷録其功授慶陽總帥府經歷官尋辟長安令京兆行臺所在供須之繁急于星火欽用所以處之者常若有餘縣民賴之以安入為尚書省掾壬辰之兵奏充行六部貟外郎守備之䇿時相倚任之以功遷鎮南軍節度副使兼右警巡使車駕東巡死于蔡州之難時年四十所著詩書文號天倪集者留京師欽用死其家亦破非同年華隂王元禮購得之幾有人琴俱亡之恨然則文字言語之傳與否亦有數存於其間耶夏夜銀潢淡淡沒踈星一陳凉從雨後生仰看浮雲成獨卧數圍蛛網絡中庭九龍池春望五年外地看清明袖手玄回過客亭謝絮楚萍無定著春光如我更飄零興慶池書所見短短蒲菰刺水青翠萍開處鑑波明畫船轉過垂楊外水靣風來聞樂聲題黃華幽居圖層層佛屋貼山腰山下幽居勝午橋物外人家無稅役間中生理足漁樵鴈踰逺障凌虛逈人與髙秋共寂寥何處人閒景如此便應歸隱不須招長安行長安道無人行黃塵不起生榛荆髙山有峯不復險大河有浪亦巳平向來百二秦之形秪今百二秦之名我聞人固物乃固人不為力物乃傾將軍誓守不誓戰戰士避死不避生殺人飽厭敵自去長安有道誰當行黃塵漫漫愁殺人但見蔽野雞羣鳴河東遊子淚如雨眼花落日迷秦城長安道無人行長安城中若為情别春辝東皇按轡來何遲人閒二月才芳菲六十日春能幾時不如意事常相隨一聲啼鴂花片飛把酒却與春别離春緩歸聽我歌滔滔歲月如流波貴憂孰與賤樂多吾寧不欲列華鼎馳鳴珂香屏倚妓薦綺羅人生賦分有定在誰能買愁費天和長安市上酒如海跨驢徑上烟脂坡酒酣醉舞雙婆娑春自來去如豫何秋風怨踈星耿耿明天河夜凉翠幕生微波碧梧委葉傅金井一夕秋風將奈何春風令人和秋風感人悲妾愁自與秋風期秋風爭管人别離燈灺垂紅粉泥暗龜甲屏風雲影亂絡緯弔月啼不斷蓮漏壓荷夜未半凉飄蕭蕭入踈竹枕底寒聲碎瓊玉敲愁撼睡睡不明花露盈盈泫魚目秋風且莫吹念妾守空閨嫁狗隨走雞隨飛九死莫作蕩子妻郎薄幸妾薄命花自無言絮無定碧雲暮合郎未歸幾度粧成掩明鏡河上之役三首河堤一决豈天窮失在當年固白公誰與麻岡開故道暫教版籍見山東新築河堤要䇿勳萬人採淨北壖薪青青好借曹州柳舊是中原一假春曹陷沒巳久萬夫卷土障橫流負土成山水未收明日落成真盛事誰能作賦擬黃樓圍城碧樹蒼煙起暮雲長安陌上斷行人百年王氣餘飛觀萬里神州隔戰塵身與孤雲向雙闕愁隨落日到咸秦山河大地分明在莫為時危苦愴神驟雨龍戰雲鏖擁日囚鞭驅雷電走蛟虬望中雨腳橫天落觸處湍聲卷地流梁苑樓臺失炎暑漢家城闕動髙秋若為借得天瓢去倒㵼明河淨九州資聖閣登眺同麻杜諸人賦髙閣凌雲眼界寬野煙碧樹有無閒天邊孤鳥飛不盡陌上行人殊未還魏國幾回時事改汴堤千古夕陽間愁來重倚欄干望嵩少西頭是故山南冠五人司馬侍郎朴朴字文季溫公之猶子宋兵部侍郎以奉使見留居于祁陽授以官託疾不拜遨逰王公之門以壽終文季工書翰有晉人筆意興陵萬機之暇嘗購其遺墨學之有雪霽同韓公度登圎福寺閣和李效之詩今略載于此積雪日出杲雪飛梅巳殘朋遊要及時閣鄰有遐觀乘此蕪穢平快覽天宇寬霽色混銀界矌望連江干山如白毫相滉溢清楊端一氣轉浩渺萬里皆瀰漫優哉賦梁苑想像排廣寒此下不可讀當俟善本考之無餘居士齊壁有沈傳師遊道山嶽麓詩石刻穆仲等和之因亦次韻湘西勝景豈易論群山騰闖萬馬奔鶴泉一麓騫鵬噣松風十里藏祗園當時侍御偶題寫筆力孰敢爭雄尊東京少年妙詞藻南陽舊族齊隂樊天心月脅出竒語使我展讀忘朝昏差差戈劒隱一敵落落旗鼓嚴千屯無餘居士厲幽志細研六藝方專門凍骭嬌兒慣腸莧啼飢瘦婦餘淚痕帷君德義允相愜每窮道妙角與根他人勸酒驚逐魂二子頻酌勤空樽醉中詩成渺江海風外幡影徒飛翻卷藏篋笥巳戢戢風生襟䄂何軒軒嗟乎我亦有餘腐陋哉羊政囚華元滕奉使荗實荗實字秀頴姑蘇人初名祼徽宗改賜焉以太學正兼明堂司令與樞密路允迪翰林修撰宋彥通奉使割三鎮太原尋奉密詔據城不下國相怒囚使人於雲中欽宗北遷秀頴謁見涕泣請從行主者不之許放允迪彥通南歸荗實留鴈門與兄宗正丞福字伯壽淮南發運使䄎共居久之家人至自汴梁秀頴往來并代之閒布衣終身臨終令黃幡褁尸而葬仍大刻九字云宋使者東陽滕荗實墓士大夫哀其忠為之起墳於鴈門歲時致祭好問兒時先大夫教誦秀頴臨終詩然亦僅能記末章數語而巳庚子春自山東還鄉里值鄉先生鴈門李鍾秀挺求秀頴詩文鍾秀云喪亂以來家所藏書焚蕩都盡避兵山中民家偶於破箱中得秀頴詩一編紙巳敗爛前序秀頴自作可辨者百餘字大略言能安於死生之分而不能忘感槩不平之氣又曰蘇屬國牧羊海上而五言之作自此始豫敢援以為例後敘是筆吏林泉野老彥古彥古不著姓年七十八手録三滕始末號東陽滕秀頴鳳山思逺記者詩數百首可讀者什六七臨終一詩缺三五字而巳非筆吏此集則秀頴之事無以見於丗豫意先生名節凛然不愧古人其文字言語宜有神物護持雖埋沒之久而光明發見决有不可掩焉者因備述于此亦使彥古之名託之而不腐云椅字恐悮當作祹見南申髙濟叔碑哀隆德守臣張確確浮休張舜民之弟嘗為烏延帥幕獨不廷謁童貫作詩吊之睢陽萬古一張巡忠義傳家有丗臣顔子伏膺當入室潘郎望拜肯同塵圍城巳陷天猶晦仗劒臨危氣益振餘子鄰邦盡曹李偷生端作九泉人天寧節有感節臨重十慶天寧古殿焚香祝帝齡身在北方金佛剎眼看南極老人星千官花覆常陪燕萬里雲遙阻在廷松柏滿山聊獻壽小臣孤操亦青青汴梁故老云徽宗本以五月五日生以俗忌移之十月十日故此詩有重十之句雨後𬞞盤可喜偶成過雨盤𬞞日日新從今休嘆庾郎貧寒虀安取咄嗟辦火食不憂生死鄰野莧何施雖可鄙美芹欲獻去無因干戈萬里風塵晦慙愧平生肉食人五日節物驚心動逺思薰風又見浴蘭時空尋好句書紈扇無復佳人繫綵絲酒注菖蒲唯欲醉筒包菰黍不勝悲明年此日當何處風裏孤蓬自不知喜雨旱暵雨霑渥豐穰都不疑商羊應屢舞布穀強多知龍見寧非數雲行自有時當年班夏令曽得近丹墀偶成纎雲卷盡見秋容古木交隂一掃空雪壓羣山曉來雨葉侵缺甃幾番風欲歸未得人將老屢送還來鬼亦窮賴得子卿佳傳在整冠時讀慰飄蓬立春東皇布政物皆春山色禽聲便可人滿谷和風消積雪半窗晴日動遊塵宫花插帽枝枝秀菜甲堆槃種種新拘窘經時成土俗聊從一醉適天真臨終詩并序某奉使亡狀不復反父母之邦猶當請從主行以全臣節或怒而與之死幸以所杖節幡褁其尸及有篆字九為刋之石埋於臺山寺下不必封樹蓋昔年大病夢遊清凉境界覺而失病所在恐于此有緣如死窮徼則乞骸骨歸悉如前禱預作哀詞幾于不逹方之淵明則不可亦庶幾少遊之遺風也虀鹽老書生謬列王都官索米了無𥙷從事敢辭難殊鄰復盟好杖節來榆關城守久不下川涂望漫漫儉輩果不惜一往何當還牧羊困蘇武假道拘張騫流離念窘束坐閲四序遷同來悉言歸我獨留塞垣形影自相吊國破家亦殘呼天竟不聞痛甚傷肺肝相逢老兄弟悼歎安得歡波瀾卷大厦一木難求安就不違我心渠不汗我顔昔燕破齊王群臣望風奔王蠋猶守節燕人有甘言經首自絶脰感槩今昔聞未嘗食齊祿徒以丗為民况我祿數丗一死何足論逺或死江海近或死朝昏斂我不須衣褁尸以黃幡題作宋臣墓篆字當深刋我室尚少艾兒女皆童頑四海無置錐飄流倍悲酸誰當給衣食使不厄飢寒歲時一酹我猶足慰我魂我魂亦悠悠異鄉寄沉冤它時風雨夜草木號空山通理何先生宏中宏中字定逺先丗居鴈門叔祖青出武辨任欣州兵馬使因家焉祖行宣西逰遇仙不返行宣之子子竒子霖政和中中武舉髙科子竒秉義郎武州宣寧尉子霖忠翊郎守豐州安豐寨皆沒王事定逺子竒子也幼倜儻儀觀秀整雅以竒節自許宣和末方賊擾江浙定逺以太學武舉進士陳破賊三䇿徽宗褒諭謂非近日言事者所可比巳而破賊如定逺䇿遂知名宣和元年集英殿試䇿中弟二調滑州韋城尉汴京𬒳圍州郡多避走獨韋不下兵退統制武漢英奏辟欽宗御札召赴軍前以路塞不果因請兵真定宣撫司時副帥种師中兵巳潰宣撫司檄定逺副漢英守銀冶路既而太原破西路無完城定逺等提兵竝山而東將赴援京師俄漢英戰死定逺收合散亡立山棚七十四所號令所及千里而逺艱食數月人不敢相食詔以為武節大夫河東河北兩路統制接應使是後國朝兵日盛所守唯銀冶一城而巳帥府募人生致定逺天㑹五年二月糧盡被擒大帥昭刺憐其忠解縳授以官定逺投牒於地曰我常以此物誘人出死力若輩乃欲以此嚇我耶帥嘉其不降屈又問欲還鄉否定逺謀南奔陽以願歸為言㑹監送使臣有先與定逺相攻劫者訴之囚西京府君廟二年帥一日召之授以官又不拜使之充軍亦不從取家屬填城黃龍府益偃蹇不行帥怒裭衣欲斬之定逺欣然就戮曰得死所矣擁之行巳數十步帥終不忍召還問爾授官不願充軍又不行填城又不行斬又不懼畢竟欲如何定逺徐曰生死在公奚問為帥怒解繫之西京獄得州人保任者數十族乃放歸請為黃冠時神霄宫廢道士舊以徽宗為東華君將毀其像定逺為起紫微殿遷像事之年六十三正隆四年病殁自號通理先生所著成真通理二集藏于家州將傅慎微幾先贈詩云故人何定逺造物不虛生骨骼稜稜瘦詩篇字字清丗皆尊道藝我獨見忠誠尊酒分携後何時蓋復傾其餘與朱少章輩唱酬甚多皆為所推重載之墓碣之隂述懷馬革盛尸每恨遲西山餓踣更何辭姓名不到中興曆付與皇天后土知醉軒姚先生孝錫孝錫字仲純豐縣人政和四年登科調代州兵曹國朝兵入鴈門州將議以城降官屬恇怯投死無所仲純投床大鼾略不以為意帥府就注五臺簿未幾移疾去因家五臺善治生亭榭場圃富于逰觀賔客日盈其門州境歲飢出家所藏粟萬石振貧乏多所全濟鄉人德之中年之後以家事付諸子放浪山水閒詩酒自娛醉軒其自號也資稟簡重喜怒不形于色弃官時年二十九至八十三乃終名士大夫為詩以吊者數十人先生長于尺牘所著雞肋集喪亂以來止存律詩五卷而巳今略載於此次冠卿韻云節物後先南北異人情冷暖古今同次趙獻之韻云紅纈退風花著子緑針浮水稻抽秧溪墅早春云久客交情諳冷暖衰年病骨識隂晴春日和德充云煙染緑絲迷别浦雨催紅糝綴長條新詩云愁邊日晷偏疑短夢裏江鄉未當歸盤無兼味慙留客夢厭多岐不到鄉賦雪云酒敵餘威翻索寞詩含幽思倍清新雨云岸漲魚吹沫山空石轉雷雪云舞風初學絮帶雨不成花峯山寺云谷虛繁地籟境寂散天香雲生古木千章秀山抱晴川一掌平懷士㑹云詩忙踈酒盞俸薄减厨煙感懷云玄晏暮年常抱病子山終日苦思歸古詩尤有髙趣恨不復見之矣挽詞今載丁此掌飲令胥持國云山東夫子老河東誰與先生嗅味同早歲遽辭名宦裏百年常樂聖賢中醉軒風月千秋恨蝸室樽罍一夢空白玉樓成人不見空餘鄉淚託東風司經劉迎云百年陸變蒼茫曉向山林得老蒼孤幹鬱生陳柏樹故基巋立魯靈光謀生有道田園樂閲丗無心壽命長何日車聲過通德拜公一炷影前香髙平李仲略云蚤歲才猷著﨑嶇步丗艱非嫌食周粟甘學抱吳關髙義追東漢移文謝北山孤風激貪懦凛凛莫容攀平水毛麾云蓋丗清芬五十年直疑湖海水雲仙不矜江夏無雙譽便造南華弟一篇松菊就荒堪笑晚蓴鱸託興果誰賢佳城鬱鬱髙名在應與臺山萬古傳西京都轉運使丹元子田彥臯云淋浪風月三千首遊戲塵凡八十秋三徑尚存元亮菊五湖空負子皮舟王元老云夫子人之傑魁終道最純鄉閭連沛邑族系出虞賔清節冰壷瑩孤標玉樹新妙齡探桂窟雅志傲蒲輪事業傳衣鉢風流表縉紳斗南唯此老月旦復誰人忍死哭亡社偷安笑具臣斯文雖未喪吾道竟難伸彭澤不書宋東陵無負秦直從強健日收得自由身把臂言猶在回頭跡巳陳發書占賈鵩絶筆惑商麟去矣騎箕尾嗟哉厄巳辰終天從此别窮壤向誰親墮椁逢王果留燈待沈彬彭湯俱逝水丘跖共荒榛書帶緣新壠笛聲起舊鄰絶絃雙墮淚撫劒一傷神冢樹悲長夜山花作好春龜趺平木杪誰為寫光塵丞旨党丗傑云望西山以馳吊兮其下維德人抱明月以螭盤兮寧終屈而不伸天昏廓以西闢兮群飛紛其上翥將搏拏以並征兮惜衝風之落羽蘭為佩兮桂為帷誰招余者兮余從與歸青雲豈難振跡兮顧犍結之不素玄豹自媚其文兮亦何嫌于隱霧詩書與友兮琴尊與游適意自安兮樂閒自休出吾餘以研桑兮猶足以比素封之侯惟清閒為祕福兮非有力能兼取雖神仙猶可畏兮曽莫樂于下土數與數相乘除兮常此奪而彼與陋巖栖之下槩兮心實往而跡藏出非徼而處非隱兮吾獨蹈古人之所常隨時委順以終老兮噫先生為不士睡起生涯甘分寄耕桑山色圍門水繞墻困病久懲耽酒癖愛間猶有和詩忙簷冰滴砌春猶冷野馬浮川日漸長舊事老年多記憶故園歸夢正悠揚枊溪别墅安車隨意飽甘肥晚食徐行理亦齊山市日髙人未集柴門客至鳥先啼溪橋散望携笻渡野寺牽吟信筆題容膝易安聊自適瓮天間看舞醯雞歲晚懷二弟少易成歡老易傷壯逰垂白未還鄉煙塵無復音書到魂夢猶疲道路長爆竹又驚新薦歲屠蘇空憶舊傳觴年年此日遙相憶鴻鴈何時續斷行睡起睡起日侵牖開軒遙見山曉風吹臘盡芳草惹春還煙暖鶯遷谷雲低鴈渡關衰年人事减遇酒得開顔次李平子登臺有感韻落日孤雲帶逺岡戍樓煙瘴舊邊埸疲民卒歲方懷土逺客慿髙自憶鄉漢使一朝延四皓秦詩千古吊三良行藏此意無人解聊借青山送酒觴九日題峰山不須歌吹上叢臺千里晴川入座來丗事難慿休挂口生涯見在且銜杯無情趂暖花先老有信迎寒鴈巳回遙想故園親種菊霜枝露蘂向誰開次韻王無競見寄客懷重倚仲宣樓白草黃雲塞上秋山色不隨塵丗改水聲還抱故城流隙中畏景那堪玩鏡裏衰顔秪自羞多愧詩人苦相憶逺傳佳句吊清愁間居無客訪衰殘柴門盡日關耽書真是癖惜酒近成慳苔徑行搜句茅簷臥看山却嫌明鏡裏偏照鬢毛班和成冠卿見寄别恨頻添鬢雪深百年懷抱鬱沉沉摽名不挂金銀榜涉丗空堅鐵石心俗物何勞供一醉殘僧正欲伴孤吟朱絃三弄虛簷寂唯有清風是賞音次韻秋興老畏年光速愁添旅夢多西風著梧竹歸思入煙波夜永慿詩遣顔衰得酒和故溪千樹柳誰復曬漁蓑感白髮彈鋏慿誰聽客歌震雷那復化魚梭梳頭白雪驚新有障眼玄花比舊多鄉問阻兵猶斷絶羇懷憑酒暫消磨不須更問今朝客門外元無雀可羅曉霽一夜雲峯卷迅雷殘紅狼藉點蒼苔鶯聲豈解留春住燕語虛勞喚夢回愁寂頓疑詩思减衰殘偏感歲華催柳溪魚鳥應相識乘興無嫌日日來重九偶成天邊今日又重陽隴樹紅飛鴈信霜且插茱莄慰衰鬢莫將詩句撓回腸歌勤皓齒人俱醉舞戀晴暉蝶也忙來日預期扶宿酒未應籬菊减秋香溪橋早春輕黃未染柳梢勻連日溪風卷塞塵乍暖乍寒花信晚相呼相應鳥聲頻少勤謾挾經綸䇿老懶空餘病患身追憶故園桃李樹年年紅紫為誰新東軒琴示兒子沂古人無復見但有東軒琴一鼓髙山操因窺古人心正聲久沉埋俚耳喧哇淫正可自怡恱不須求賞音花前獨酌二絶句老將花酒作知音起就花前酒自斟莫便興來先酩酊却妨真賞廢搜吟移得名花手自栽花知不為老人開興來誰是樽前客唯有提壷送酒杯題柳溪别墅雨霽風和不動塵柳邊携酒賞晴春頻來溪鳥渾相識渡水穿花不避人芍藥緑蕚披風瘦紅苞浥露肥只愁春夢斷化作彩雲飛次韻李相公偶成簾鳥喚歸夢竹風追夕凉感時空有淚却老分無方流水依山白孤雲帶日黃無人共樽酒散髮卧藜床村居偶成靜愛柴門野興幽杖藜徐步到岩丘深林有獸為先噪廢圃無人泉自流土瘠稅租隨力辦年豐禾黍過時收客來不慮無供給白酒黃雞亦易求用峯山舊韻舊步西風寺窮幽未覺賖松根纒石瘦雲磴出岩斜思爽餘三唱詩成自一家空餘幾兩屐不踏渡溪槎春水上堤沙春晴散望賖衰年花近眼久客夢還家映日孤鴻沒迎風雙燕斜平生江海意早晚送浮槎題佛先寺臧穀雖殊竟兩亡倚欄終日念行藏巳欣境寂洗塵慮更覺心清聞妙香孤鳥帶煙來逺樹斷雲收雨下斜陽人間未卜蝸牛舍逺目橫秋益自傷芭蕉鳳翅搖寒碧虛庭暑不侵何因有恨事常抱未舒心蜀葵傾心知向日布葉解承隂空側黃金盞誰人與對斟次韻公才對菊見懷髮蓬新感二毛侵尚阻清樽對菊斟久擬芝蘭同臭味莫疑魚鳥自髙深食貧豈復甘秦灸客病空懷奏楚音挂席無由上牛斗漫慿流水送歸心寄田朝散善輔粉署標名舊山城識靣新青雲摧徑翮空谷滯幽人丗路謀身拙心田育德醇久要知可卜傾蓋巳情親春日書懷雲散交情薄棊翻丗態新山容猶帶臘鳥語巳回春節物驚心遽丘園入夢頻東風如解語端笑未歸人春日溪橋留戀春光慰病顔無情風雨卷春還隂隂密緑籠溪暗細細踈紅點徑斑老去益憐詩思澀歡來聊破酒腸慳不嫌門外無車轍得遂衰慵一味閒登樓有懷老愧憑欄目力昏百年懷抱向誰論晴空鴈起雲邊塞夕照人歸郭外村因記昔逰驚迅晷暫將離恨付清樽誰人肯似邊居士逺駕朱輪過雀門題滕奉使祠本期蘇鄭共揚鑣不意芝蘭失後凋遺老秖今猶涕泪後生無復識風標西陘鴈度霜前塞滹水撨爭日暮橋追想生平英偉魄凌雲一笑豈能招朱奉使辨辨字少章宋吉州團練使天㑹六年以通問見留命以官託目疾固辭猝然以錐刺之而不為瞬用是得歸凡居雲朔二十年自號觀如居士有曲洧風月堂詩話行於丗蘇子翼送黃精酒仙經何物堪却老較功無如太陽草龍銜雞銜名雖異菟公羊公事可考蘇君真是神仙裔橘井隂功貫穹昊雲笈書成數萬言銀關珠宫用心早獨知此物有竒效福地名山為儲寶不憚林泉新斸掘斥去杵􅍫謝飾搗况從髙士論麴糜更課公田收秫稻一朝靈液浮瓮盎三冬浩氣生襟抱且欣軟飽得澆腸漫說逆流工𥙷腦眼碧那憂散黑花髮白故應還翠葆賈傳只嫌松醥陋劉墮敢誇桑落好直須五斗論解酲寧待三柸乃通道誰知萬里落旄人亦許匏尊自傾倒為君喚回雪窖春八載羈愁供一掃曼倩宜分此日桃安期莫詫他年棗何煩更採石斛花巳覺容顔不枯槁根連石室喜入夢句擬桐溪愧摛藻平生我亦愛書扎朱髓緑腸勤探討幸君汲引成此志鶴駕駸駸望仙島吞腥啄腐非夙心歲晚兹言良可保初春以蔓菁作虀因憶往年避難大隗山采蘋澗中為虀虀成汁為粉紅色而香美特異乃信鄭人所言為不誣矣今食新虀因成長韻藏𬞞飽三冬媚盤無靃靡陳虀解束縛冰雹散刀几春畦蕪菁苗入眼漸可喜青黃含風露採摘從此始持歸作新虀一飽競鮮美芬香溢肺肝甘脆響牙齒捫腹幽窗下芻豢詎能比憶昔避難𥘉竄身重嵓裏雲煙昏具茨老稚且棲止燕兵大搜索焚蕩石牛底脫命擉虎山野哭紛四起暮投山前店茅棟例燒毀潜伏窟室中衣敝不蓋體妻孥坐相對生意薄於紙晨朝行澗中采芹澗邊洗鄭人誇此虀他菜非所擬氤氲投瓦盎觸鼻似蘭芷一杯紅粉羮析酲勝仙醴乃知野人獻涼薄未宜鄙今來滯殊鄉白首家萬里猶能對葷羶咀嚼出宫徴回思十年夢爭奪殊未巳飽食但謀身吾顙良有泚北人以松皮為菜豫初不知味虞侍郎分餉一小把因飯素授厨人與薗𬞞雜進珍美可喜因作一詩吾老似出家晚悟愧根鈍滋旨却羶葷禪蛻要親近偉哉十八公兹道亦精進舍身奉刀几割體絶嗔恨鱗皴老龍皮鳴齒溢芳潤流膏為伏龜千歲未須問便堪奴笋蕨詎肯友芝􅌲跏趺得一飽萬事皆可擯侍郎文懿後落落衆推俊淡然丗味薄內典得所信香厨留淨供頻食不言頓晏然默不語草木雷音震得法於此公骨髓傳心印應憐持節人餉此為問訊欲將無上味為我洗塵坌食之不敢餘感激在方寸豫以年事漸髙氣海不能熟生暖冷旅中又無藥物遂用火攻之䇿灼艾凡二百壯吟呻之際得詩二十韻不作漳濵卧年侵血氣衰據鞍思少壯攬鏡嘆清羸有病方求艾無營莫問蓍心知出下䇿理勝遇中醫陽燧神逾速銅仙術盡施論功鄙炮製取穴辨毫釐火帝恩光異炎官績用竒書螢比差似珠蟻迫方知忖物嗟炮鱉觀形笑灼龜煙微初炙手氣烈漸鑽皮閉目書徒展支頭枕屢移發狂還自哂賈勇僅能支宋鷁追風日吳牛喘月時忠言勞緩頰善謔為開眉服氣工夫逺燒丹歲月遲衛生防後患伐性釋前疑展轉那成夢呻吟且當詩因心念民瘼出位嘆身卑欲巳七年病當從百丗師保身將保國未可廢針規元夕有感朔雪餘千里東風遍九州關河中土異燈火上元愁緑蟻嘗新釀青貂戀故裘紫姑無用卜丗事正悠悠憶鍾離濬浚都同聚讀書螢楚岸春風憶送行三十年前初識靣四千里外更關情出疆我亦徒勞爾入仕君今何似生旅鴈相逢須一問要從郵上得新聲炕寢三十韻風土南北殊習尚非一躅出