body:
  text: 劉龍山仲尹二十八首劉記室迎七十六首許内翰安仁六首承旨党公六十四首黃華王庭筠二十八首禮部趙閑閑秉又六十三首劉龍山仲尹仲尹字致君蓋州人後遷沃州正隆二年進士以潞州節度副使召爲都水監承卒致君家丗豪侈而能折節讀書詩樂府俱有藴藉有龍山集甞於其外孫欽叔處見之叅涪翁而得法者也墨梅一十首瘦損昭陽鏡裏春漢家公主奉烏孫淚痕滴盡穹廬月誰道䄂香解返魂絕纓人醉燭花殘主意方濃未厭歡十五瓊兒梳洗薄琵琶才許近簾彈生憎施粉與施朱換骨玄都亦自姝踈影冷香題不到夢驚煙雨暗西湖趙郎愛香人不知羅浮山下有佳期春寒徹骨角聲起才記參撗月墮時君王鳯駕九龍池後輦傳呼召雪兒狼藉玉臺銀燭暗丁香小麝印宫眉鐘鼓沉沉度苑墻玉繩初直殿東廂荀妃早發雞鳴埭殘月微分燭下粧衡州何處問花光抺月批風只欠香安得江南断腸句爲題風雨涴啼粧髙髻長娥滿漢宫君王圖玉按春風龍沙萬里王家女不着黃金買畫工古絹誰藏謝女真天寒翠袖一招魂江山嫁盡風流夢雪滿冰溪月掛村妙畫工意不工俗老子見畫只㝷香未應塗抺相欺得政自不爲時丗粧自理日日南軒學蠹魚隱中獨愛隱於書兒癡婦笑謀生拙不道從來與丗踈西溪牡丹爲雲爲雨定成虚醉臉籠嬌試粉初舉國春風避姚魏換胎天質到黃徐百年金谷憑欄䄂三月楊州載酒車我欲禪居浮餘習湖灘枕石㸔㳺魚秋盡利禄蝸涎壁年華蟻夢槐秋隨庭樹老寒逐鴈聲來養性論三適分愁詠七哀閉門人客少書藉遶床堆晚隂歲澇饒秋雨雲寒結暝隂晚芳留凍蝶踈木立飢禽閑覺交㳺减衰從老病㝷安眠恐徼倖底用說𥘉心冬日刁騷短髮鑷還生鏡裏形骸只自驚睡枕食槃飜歳月頭風股痺識隂晴鳩棲任笑謀生拙兔簡難忘照眼清不用煖爐公庫酒試容擁被聽雞聲寒夜漏聲穿竹夜霜清儘着功夫伴短檠睡足梅花半梢月虚徐老鼻學香生秋日東齋一區寂寞子雲家便腹那能貯五車筋力只今如老鶴筆頭新愛綰秋虵樹間風定葉漫徑籬外雨寒梅着花勝日一樽能笑客更湏官鼓候晨檛䆫外梅蕾三首玉兒秀稺雲幄藏鼻觀巳覺缾水香過眼空花均一寓十分春色属秋堂細蕾初看柳麦肥春風得得遶䆫扉道人方作玉溪夢石塢竹橋風雪飛初秋夜凉小蟲機杼月西廂風雨纔分半枕凉白髮自踈河漢夢一瓶秋水玉簮香謝孔遵席後堂畫山水圖後堂號秀隱君家在龍沙弱水東朅來塵丗笑春風都將天外蓬壷景漏作人間畫手工玉腕雪迴犀管細寳煤香散鳯綃空只應大地山河影常記飛鸞下月中别墅二首墻根雨大土花碧秋笋寒添一兩莖愛買僻書人笑古痛憎俗事自知清黃花催織鈿鈿出白髮欺人故故生饘粥年來吾稍具厭隨鞍馬逐浮名風雨驅寒入弊裘閑齋氣味冷颼颼年華過眼驚飛鳥利禄催人窘督郵竈下旋添温坑火床頭剰買讀書油可人誰似黃夫子着意裁詩寄四休龍德宫碧栱朱甍面面開翠雲稠疊鎻崔嵬連昌庭檻渾裁竹罨畫溪山半是梅藻井香銷塵化網銅欄秋澁雨留苔只應千古華清月狼籍春風媿露臺酴醾相看絕是好交友着眼江梅季孟中海窟笙簫來鶴背月林冰雪繞春風滿前玉蘂名尤重特地梨花夢不同安得涪翁香一瓣種成聊供小南豐夏日床頭書冊聚麻沙病起經旬不煑茶更爲炎蒸設方略細烹山蜜破松花不岀好詩讀罷倚團蒲唧唧銅缾沸地爐天氣稍寒吾不出氍毺分坐與狸奴一室老來湖海媿陳登只有頭鬚未是僧坐對黃昏鍾鼓定竹根吹火上吟燈欽叔所傳少時豪氣愛陳登老去真成有髮僧劉記室迎迎字無黨東萊人初以廕試部椽大定十三年用薦書對䇿爲當時第一明年登進士弟除豳王府記室改太子司經顯宗特親重之二十年從駕凉陘以疾卒章宗即位録舊學之勞賜其子國樞進士弟無黨自號無諍居士有詩文樂府號山林長語詔國學刋行淮安行淮安城壁空樓櫓風雨半摧雞糞土傳聞兵火數年前西觀竹閒藏乳虎迄今井邑猶荒凉居民生資惟搉場馬軍歩軍自來往南客北客相經啇迩來戸口雖増岀主戸中閒十無一里閭風俗樂過從學得南人煮茶喫青衫從事今白頭一官乃得西南陬宦㳺未免簡書畏歸去更懷門戸憂丗縁老矣百不好落筆尚能哦楚調從今買酒樂昇平爛醉歌呼客神廟修城行淮安城郭真虚設父老年前向予說築時但用雞糞土風雨即摧乾更裂秖今髙低如堵墻舉頭四野青茫茫不知地勢實衝要東連鄂渚西襄陽誰能一勞謀永逸四壁依前護塼石免令三歳二歳間費盡千人萬人力唐州後竟用此䇿也河防行南州一雨六十日所至川源皆泛溢黃河適及秋水時夜來决破陳河堤河神憑陵雨師借晩未及晴昬復下傳聞一百五十村蕩盡田園及廬舎我聞禹時播河爲九河一河旣滿還之他川平地逈勢隨弱安流是以無驚波秖今茫茫餘故迹未易區區議䟽闢三山橋壞勢益南所過泥沙若山積大梁今丗爲陪京財賦百萬資甲兵髙談泥古不湏爾且要築堤三百里鄭爲頭汴爲尾准俻他時漲河水普照旃檀像舊物也方丈老人比以見還作詩謝之我昔㳺京師稽首禮瑞像堂堂紫金身示現大法藏裝嚴七寶几重疊九霞帳光如百千日晃耀不容望想初法王子運力攝諸匠瓌材發神祕妙斵岀智創風流蜀居士翰墨老彌壯雷霆大地底音樂諸天上猶疑三十二不具梵音相不知一點真正勝千語浪嗚呼五因縁語綺反成謗我今獨何幸相見問無恙文殊本無二何處覔真妄庶修香火供獲脫煩惱障天龍想驚喜訶衛日歸向巳覺海潮音人天㑹方丈梁忠信平逺山水憶昔西㳺大梁苑玉堂門閉花隂晩壁閒曽見郭熈畫江南秋山小平逺别來南北今十年塵埃極目不見山烏靴席帽動千里只慣馬蹄車轍間明䆫短幅來何處亂點依俙涴寒具煥然神明頓還我似向白玉堂中住濛濛煙靄樹老蒼上方樓閣山夕陽一千頃碧照秋色三十六峯凝曉光懸崖髙居誰氏宅縹緲危欄䕃青樾定知枕石髙卧人常笑騎驢逺遊客當時畫史安定梁想見泉石成膏育獨將妙意寄毫楮我愧雨立隨諸郎此行真成幾州錯區區丗路風波惡還家特作發願文伴我山中老猿鶴連日雪惡用聚星堂雪詩韻朔風朝來放雲葉紛紛吹落龍沙雪山河大地同一如變化湏臾亦竒絕叅天松項老猶強搶地竹頭低欲折亂飄書帙愛䆫明狂入地爐驚火㓕重衾方擁膚尚粟凍筆將書肘先掣未容衰白點鬢華只許醉紅生面纈何人清唱墮梁塵有客髙吟霏鋸屑昔賢句法今尚在断臂阿誰心地瞥後生曠丗安敢望故事歷刼徒能說是中聖處公㑹無一粒靈丹工點鐵徐夢弼以詩求蘆菔輒次來韻昔聞趙州老老大猶泛愛說法利人天機縁不勝在當年鎮府話蓋以小喻大具眼領略之於兹豈無待嗚呼後來者見趣逺不逮又聞東坡公謫居飽鮭菜暮年海南住几席溪山對自饌一杯羹老狂猶故態㝡喜霜露秋味岀雞豚外乃知作詩本口腹不無賴風流二大士妙處無向背在家與出家相投若針芥先生今復然秀句筆端快誰云修法供逰戲出狼狽一飽待明年桑麻歌佩佩再次前韻神農甞草木濟丗以仁愛根源列郡岀品目成書載中云萊菔根試驗頗爲大昌谷嘔時須文園渴甞待食異地黃并効與蕪菁逮豈惟齒衆藥政自冠諸菜五州風土宜罫布畦壠對墾鋤盡衆力封培窮百態翠角春雨中黃花晚煙外日送盤筯資歳給缾罌賴片玉岀頭顱層冰起膚背脆美掩蓴葵甘辛敵薑芥物生貴有用對此一何快儲貯得沉涵弃遺免狼狽但足齊人喰何慚楚臣佩鰒魚君不見二牢山下獅子峯海波萬里家魚龍金鷄一唱火輪岀曉色下瞰扶桑宫槲林葉老霜風急雪浪如山半空立貝闕軒騰水伯居瓊瑰噴薄鮫人泣長鑱白柄光芒寒一葦去撗煙霧閒峯巒百疊破螺甲宫室四靣開蠔山碎身粉骨成何事口脢之珎乃吾祟郡曹受賞雖一言國史收痂豈非罪筠藍一一千里來百金一笑收羹材色新欲透瑪瑙盌味勝可浥葡萄醅飲客醉頰浮春紅金盤旋覺放箸空齒牙寒光潄明月匈臆秀氣噴長虹平生浪說江瑶柱太嚼從今不論數我老安能汗漫逰買舡欲訪漁郎去樓前曲樓前山色秋撗碧樓下水光秋漫白眼看對此千里愁樓下長歌古離别蕭蕭郎馬何時歸鴈奴去作斜行飛㶚橋過客夕陽逺渭城行人朝雨微玉凄花冷令人痩日暮倚樓雙翠䄂蕙炷猶殘鸂鶒香麹塵半著鴛鴦繡五雲飛過芙蓉城洞天冷落雲間笙妾身有願化春草伴君長亭仍短亭題十眉圖寶箱拂塵金􅘫鉞周昉丹靑見真筆春風曽憶賦妖嬈人共畫圖成十一燭奴香底花光凝錚錚鐵響聞三更車聲雷動不通語眼態波横空送情蠻雲盤鶴遼天闊犀玉依依對書扎人生何處不相逢還醉武陵溪上月雲中君圖衣若新沐蘭湯薰靈巫拜舞方迎神恍然相見帝者服九歌昔詠雲中君畫史亦可人妙入造化域羽衣玉麈羙且閑此意不知何處得空明倐忽紛溟濛胡爲眷眷臨壽宫飄然來下復逺舉想像决去隨飛龍祠空人散秋蕭瑟落日猿聲喚秋色湘天極目青茫茫慿髙一望無南北楚山清曉圖山姢姢江茫茫縁山林木老巳蒼穿林細路縈羊腸汀洲人家蘭杜香兩山秀岀江中央宛如雙劒森鋒鋩層巒架空化寳坊塔波突兀一氣傍雞聲喔喔林鳥翔頋瞻曙色開東方淸風宿霧方蒼凉兠羅綿網淡平野紫磨金餅暾浮桑櫓聲才動欲離岸鍾韻巳殘猶殷床當年有米維楚狂生子亦復肖阿章想從乃翁住朝陽收拾山緑餐湖光膝前翰墨觀淋浪此圖戲出遂擅埸彼衆史者何敢當不然安得牙籖犀軸古錦囊賞覧一朝蒙古皇題劉德文戯綵堂郵傳文書日傍午過眼不容留頃許先生遣决談笑閒退食歸來奉慈母吾不愛錦衣榮歸誇梓里吾不愛繡衮徒歩登槐府傳家所愛作寧馨入室不愁無阿賭堂中怡愉奉顔色堂下嬉戲同兒女十分壽斚泛醇酎五色綵衣紛雜組映堦萱草弄春色循陔蘭葉榮朝雨先生藴藉古人似早歳聲名天尺五拘縻豈合坐冗曹獻納直冝趨禁所更書屈指今幾日竚看褒詔傳天語龍光歆艶動庭闈湯沐䟽封分郡土芝封鈿軸爛雲錦羽衣寶帔輝金縷形容何止入畫圖歌詠亦湏流樂譜區區賤子獨何幸晩喜宗盟同鼻祖他年一笑約升堂萬石尊前拜嚴姥送劉德正驥騄蟻垤空莫干犀革断人材必超軼物理乃融冸先生廊廟具冰雪自湔盥十年處繁劇風力濟詳練堂堂八靣敵了了一笑粲雲中國西邑食貨資輓轉中臺輟之去正倚咄嗟辦從容九年蓄坐想岀鞭筭向來塩鐵使緒業著家傳春朝觀上計廣厦奉間燕行矣需詔除鵷行聳榮觀盤山招隱圖溪山不難買所費千金儲不如數峯雲朝昬對吾廬交㳺豈無人轉盻傷離居不如吾兄弟相應如笙竽左侯薊名族温温器璠璵身雖市朝寄心與功名踈伯也亦可人文華炳於菟風神聳魁偉襟韻含冲虚平生一片心縁塵不關渠相期有幽事歳晚山林俱綵服照黃冠歡呼奉親輿大婦侍巾帨中婦供庖厨諸孫戲膝前翩然鳯將雛朝采南㵎芹暮漉西溪魚煙霞入杖屨風月來䆫䟽觀竹上巢雲禮佛登香爐紅龍雪浪湧白塔蒼煙孤冰絃冩天籟茶甌泛雲腴快哉天下樂俯仰餘何須正恐老太冲招隱昔所無寄題禹城孫氏茂德亭濟南孫夫子養素抱絕識家有五畝園種樹如種德枝葉深覆護根本飽封殖要令方寸地不著荆與棘流芳𬒳鄰里餘䕃連阡陌居然物隨化草木盡佳色河陽藝桃李壽張蒔梓漆至今靑史上相望如黒白乃知百年用賴此一日積君今尚隱約白首勤墾闢人心亦天理否泰有終極㑹待東風來吹春滿花國郭熈秋山平逺用東坡韻槐花忙過舉子閑舊㳺憶在夷門山玉堂曽見郭熈畫拂拭縑