和人七夕韻今古良霄此㑹同望窮雲物有無中人間鈿合三山隔天上靈槎一水通鳷鵲樓空紈扇月鴛鴦機冷䇡羅風不須更乞蛛絲巧乆矣人生百巧窮海上潮蹙三山㠀煙橫萬里沙蜃樓春作市鼉皷暮催衙一曲水仙操片帆漁父家安期定何處試問棗如瓜次曹次仲韻因以自感自笑區區學道難未容香火訪名山因循憂患餘生裏收歛光芒窘歩閒白社祝公今日始丹丘容我幾時還相從願結翻經㑹共過壷中日月閑寒食阻雨招元功會話滿城風雨殿餘春燕坐翛然亦可人楊柳杏花相對晩石泉槐火一時新愁邊興味渾宜酒句裏機縁欲脫塵早晩阿咸來過我坐中軟語慰情親次韻諸園不暇㳺覽故人家有小池臺桃李成蹊手自栽尊酒幾時邀客去園林無日不花開丹靑一一歸圖畫紅紫紛紛費剪裁勝槩湏公與題品杖藜何惜醉中來自解投紱歸來歳月過清閑殊勝吏分窠人思狡兔藏三窟我願白鷗同一波棊局何妨爛樵斧印章終欲博漁蓑人間萬事俱塵土醉倒尊前奈我何陪諸友登三山亭二首半濠清淺芰荷彫落日登臨未寂寥山色逼秋渾作市海聲迎暮欲吞潮沙頭白鳥疑相熟木末靑旗苦見招不似常時對官府可無閑話及漁樵霜林餘葉未全彫極目西風對泬寥萬里沙荒秋後草三神山動晩來潮移尊正及兵厨近結客何須驛騎招老素撫床端可必未甘隨分隱耕樵秋郊秋水四五尺暮山三兩峯浮雲白毫相落日紫金容蓑笠前村笛樓臺古寺鍾殷勤小平逺圖畫記渠儂次劉元直韻二首秋來何事憶歸頻正以家無妬婦津未許桂枝招隱士不妨桃葉贈行人夢魂歴歴千山逺客宦悠悠五斗貧犀箸鸞刀許何日歸來舉案得紛綸半年歸夢别離間只有音晝鴈足還羅幕翠撗秋掩冉玉壷紅濕淚斕班天明不作霧非霧月破可憐山復山准擬春風對眉膴一尊相對洗愁顔次韻夜雨海山何處是蓬瀛節物催人意自驚客裏厭逢今舊雨夢餘愁聽短長更故園頗覺歸期緩老境難堪此叚清想得詩成正蕭瑟竹䆫燈火夜微明代人憶舊緩歩素絲障微吟紫綺裘醉便風側帽歌愛月明樓犀軸題春恨銅荷滴夜愁風流十年夢燈火漫楊州梅誰道江梅驛信遲碧琅玕裏見横枝爲㝷踈影暗香處獨立嫩寒淸曉時嚼蘂不妨浮白飲認桃休賦比紅詩平生東閣風流在何遜而今鬢欲絲題雪浦人歸圖亂目寶花雨過眉斑竹笻挐音迎畫鷁喜態動烏龍水鏡千江月風琴萬壑松遥知永今夕情話得從容歸來圖戲作雲髻春風一尺髙笑携兒女候歸橈情知一首閑情賦合爲微官懶折腰城南庵故郷歸思白雲邊缾鉢東來想浩然桑下乆無三宿戀室中今許一燈傳夢驚城郭風塵窟興寄湖山雪月舡老矣重㳺恐難得平生四海與彌天書何維楨見贈詩後塵埃握手衆人中草木從來臭味同春夏我雖迷岀處交㳺君不異𥘉終赤黃晩歳徴竒夢清白平生継古風嘆息蜀州人日作傷心不覺涕無從寄題薊丘僧房道人休去白雲邊老矣分明懶瓉然叅學誰能知許事退休聊得息諸縁忘形馬跡車塵外適意山光水影前想得松根憇寂寞壞殘雲衲半垂肩虚春亭碧琅玕裏小蘧廬想像幽人手植𥘉不獨禪心破諸有還於法性識真如古宿有翠竹真如之句應縁任笑風月底岀丗要觀霜雪餘他日升堂叅玉版會須傍岀賞春𬞞雨後塵埃日日厭風霾一雨方容眼界開水底天光大圎鏡樹頭山色小飛來馬牛渉地無相及鷗鷺知人巳不猜更得扁舟待明月一盃容我醉雲罍題歸去來圖筆端竒處發天藏事逺懷人涕泗滂餘子風流空魏晉上人談笑自羲皇折腰五斗幾錢直去國十年三徑荒安得一堂重冩照爲公桂酒㵼蕉黃過關渡水圖短車無復駕靑牛散䇿方來對白鷗煙水從容許君獨暫須分我一舡秋寄題孔德通東園花木隂隂一畝宫平生髙興與誰同尊罍北海無虚日郷里東家有故風先業固知衣鉢在大門何惜橐奩空襄陽耆舊今誰識尚喜風流見阿戎次韻酈元與贈于元直道舊人物傷心萬馬空于今聲價歘然東教條不獨行千里籌䇿曽經奉一戎事契百年知有自笑談三語記無同白頭賴有髯叅在解說當時喜怒公倦㳺方嘆錦囊空此道誰知一夕東客裏簿書慚老子詩中旗鼓避元戎叩門莫厭經過數促席聊容語笑同此樂秪憂兒輩覺不應品藻待渠公彦美生朝壯日里閭俠臂彎雙角弓繡韉金匼匝貂䄂紫蒙茸雲態自蒼狗玉輝猶白虹爲君占壽骨詩句有清風張萱戲嬰圖犀顱玉頰寧馨子霧鬢雲鬟窈窕娘三十年前大門日憶觀群戲碧方床河橋桃李香中八九家青旗髙挂緑楊斜晚來風色渡頭急滿地蕭蕭楊白花昌邑道中屋角雞號夜向晨客床相對話悲辛流離僅脫噲等伍老大空爲濟上人却掃欲安無事貴累人猶属有錐貧故山鄰里今安否歸去同㝷笋蕨春題仲山枝巢鏡中青鬢雪霜皤歳月從敎落魄過物理不容人太過生涯休嘆我無多百年竟似蠅鑚𥿄萬事終同鼠飲河秪恐徐公宿縁在東風時夢海棠窠許内翰安仁安仁字子靖河間樂壽人大定七年進士歴禮部貟外郎出守澤州遷同知河南府事以汾陽軍節度使致仕子古字道真父子俱名流也望少室名山都不見真形萬仞盤盤入杳冥安得雲間騎白鶴下看三十六峯青送二道者歸汾州介休山下兩閑人來訪汾陽舊使君明日却歸塵外去一雙白鶴上青雲草木蟲魚詠二首蠅鑚故𥿄竟不悟蛾撲明燈甘喪生大似盲人騎瞎馬不知平地有深坈蓬在麻中應自直蔦生松下亦能髙不關若輩工攀附物理由來繫所遭少室道中少室峰頭曉月沉千家城郭淡隂隂五更雞唱殘星㓕馬上看山過少林逰泰安竹林蕭寺天教勝處安峰巒騰擲水雲閑客來緫說逰山好不道山僧却厭山承旨党公公諱懷英字丗傑宋太尉進之十一代孫父純睦自馮翊來以從仕郎爲泰安軍録事叅軍卒官妻子不能歸遂爲奉符人公之在孕也太夫人夢道士吴筠來託宿及公生儀觀秀整如神僊然少頴悟日授千餘言師亳社劉嵓老濟南辛㓜安其同舎生也甞試東府取解魁是後困於名場遂不以丗務嬰懷放浪山水間詩酒自娱簞瓢屢空晏如也夫人石氏徂徠先生之後亦能安貧守分旣乆郷豪傑有知公者稍料理之大定十年擢進土甲科調成陽軍事判官汝隂令入為史館編修應奉翰林學士出爲泰定軍節度使爲政寛簡不言而人化召爲翰林學士承旨致仕大安三年九月年七十八終於家是夕有大星殞於所居之堂衆驚視之而公巳逝矣謚曰文獻禮部閑閑公墓誌云公之文似歐公不爲尖新竒險之語詩似陶謝奄有魏晉篆籕入神李陽冰之後一人而巳甞謂唐人韓蔡不通字學八分自篆籕中來故公書上軋鍾蔡其下不論也小楷如虞禇亦當爲中朝弟一書法以魯公爲正柳誠懸以下不論也古人名一藝而公獨兼之可謂全矣皇叔永蹈伏誅公作詔云天下一家詎可窺於神器公族三宥卒莫逭於常刑非忘本根骨肉之情蓋爲宗社安危之計亦由凉德有失睦親乃於間歳之中連致逆謀之起恩以義掩至於重典之亟行天髙聽卑殆匪此心之得巳興言及此惋嘆奚窮論者謂公之制誥百年以來亦當爲弟一閑閑公作碑偶不及此故表出之穆陵道中二首沂山一何髙群峯鬱孱顔我行問遺老云此小太山望秩有常祀其神號東安草荒穆妃墳雨剥漢武壇神仙果何在可想不可攀千年等一昔俯仰悲人寰東望蓬萊宫咫尺滄波間重山復峻嶺溪路宛盤盤流水滑無聲暗瀉溪石間岸草淒以碧鮮葩耀紅丹髙雲映朝日流景青林端我行属朱夏欲愒不得閑山中有佳人風生松桂寒瓊花木后土像皇媧化萬象賦受無竒偏胡爲墮愛境亦爲尤物牽煌煌靈祠花玉蘂冠春妍婉如傾國姝獨立江湖邊顧惜怨奪移含秀梁宫煙青黃竟自㓂始信擁腫全珍材歸好事肌理緻旦堅瑑刻方寸餘遺像規汾壖願言稅靈馭要復安所怜神㳺妙難詰豈以大小懸槐根開夢國橘實㳺棊仙靜想寶龕中坐納東南天况有大者存指顧超八埏君錫生子四月八日左君錫薊北名士堂前種萱憂可忘不如生兒喜殊常嘔啞啼笑彩衣側滿堂和氣生嘉祥宴寢香凝佳夢兆與佛同生佛親抱我來𥘉見岀錦綳肌肉照人眉宇好丗間兒子空紛紛如君此兒真慰人薊山東盤岀英秀政與德門宜子孫天馬駒海鶴子氣骨𥘉成便超異籋雲冲霄從此始立春水結東溪凍未漪風凌枯木怒猶威不知春力來多少便有青蠅負煖飛端午日照道中幾年客舎逢端午今日東行復海隅三歳巳無平老艾一盃聊作辟愁符夏日道岀天封寺疊澗重岡掩復開鳥啼人寂路縈回微凉暫逐行雲過細雨俄從逺樹來丗事自嗟吾老矣山僧那識興悠哉婆娑十畝溪邊櫟借汝清隂感不材龍池春興三十餘年惜别心重來獨興此登臨佳人何在暮雲合㳺子不歸春草深曲檻凭欄花羃羃扁舟繫岸柳隂隂避人白鳥忽驚去雙影飛翻明翠岑宿宣灣清頴去無極悠悠楚甸深人家半臨水村徑曲穿林積雨猶行潦荒煙易夕隂夜凉淮浦月寂寞照邊心黃彌守畫呉江新霽圖江雲卷宿雨江風散晨煙山光煙雨潤欲滴影墮江水空明間脩蛾新粧翠連姢下拂塵鏡窺明蠲漁舟來何許觸破青茫然中流水肥魚逆上受網應有松鱸鮮借問張季膺西風幾時還漁郎理網喚不應但見水碧江涵天如何塵埃中眼界有許寛道人匈次陂萬頃爲寫此境清而妍蒼崖無塵樹影寒直欲坐我苔磯邊我家竹溪隂小艇撗清漣異時赤脚踏兩舷不應尚作披圖看雪中四首詩人固多貧深居隱茅蓬一夕忽富貴獨卧瓊瑶宮夢破䆫明虚開門雪迷空蕭然視四壁還與嚮也同閉門撚須坐愈覺生理窮天公巧相幻要我齊窮通衝寒起沽酒一洗芥蔕胸翻翻雪中鴉飛鳴覔遺粟雪深不可求遶屋啄寒玉顧我如鴟鳶多儲有餘肉我亦生理拙凍卧僵雪屋日午甑無煙飢吟攪空腹豈不知屠沽肥甘隨取足幸待春雪消吾猶多𣏌菊歳晏苦風雪曠野寒崢嶸濕薪燒枯棘距刺相拏撐濃煙乆伊鬱微熖方晶熒津津膏乳漲中有蚯蚓鳴蓬蒿掇快炬倐作飛灰輕餘暖未及愜睫涙先巳盈幸有鄰家酒時澆肌粟平歳晏雪盈尺農夫倍欣然不作祁寒怨應知有豐年笑我寄一室歸耕無寸田無田吾不憂飲啄當問天我看多田翁租賦常逋懸伭頭負呵責顔色慘可怜不如拾滯穗行歌兩無牽雪寶花天雨曉紛紛佛界䊋嚴盡白銀待臈風雲𥘉接勢犯寒糟麴若爲神園中芳草誰能賦江上梅花獨自春半臂騎驢得佳句九原誰喚㶚陵人蟬槁壤隂潜罷轉丸飄飄便作飲風仙幽藂何處拳枯蛻别樹還來續断絃小院日長清夢覺空庭人靜緑隂圎無情物化誰能料觸撥覊懷一慨然漁村詩話圖江村清境皆畫本畫裏更傳詩語工漁父自醒還自醉不知身在畫圖中曉雲次子端韻灤溪經雨浪生花曉碧翻光漾曉霞川上風煙無定態盡供新意與詩家送髙智叔歸濟南巳作西溪約還爲汶上行漂流知分際㑹合見平生旅枕勞歸夢家山入去程空齋桃李月寂寞照清明日照道中路轉清溪樹蔚然解鞍坐愒午隂圎避人鷗鳥驚飛盡時有㳺魚弄柳綿夜發蔡口落霞墮秋水浮光照舡明孤程發晩泊倦楫揺天星藹藹野煙合翛翛水風生逺浦浩渺漭微波澹彭觥畸鳥有時起幽蟲亦宵征懷役嘆獨邁感物傷旅情夜乆月窺席忼慨心末平西湖晩菊重湖匯城曲佳菊𬒳水涯髙寒逼素秋無人自芳菲鮮飈散幽馥晴露隨餘滋蹊荒緑苔合采采歎後時古瓶貯清泚芳樽湔塵霏逺懷淵明賢獨徃誰與期徘徊東籬月歳晏有餘悲西湖芙蓉林飈振危柯野露委荒蔓孤芳爲誰妍一笑聊自獻明䊋炫朝麗醉態羞晚困脉脉懷春情悄悄驚秋怨豈無桃李媒不嫁惜嬋媛悠哉清霜草共抱蘭菊恨浪溪别呉安雅浪音郎浪水清且白頻年照行役褰裳渉微波微波去無極悠悠溪上山送我往復還與君臨水别幽恨寄山閒奉使行髙郵道中二首野雪來無際風檣岸轉迷潮吞淮澤小雲抱楚天低蹚􅨬舡鳴浪聨翩路牽泥林烏亦驚起夜半傍人啼細雪吹仍急凝雲凍未開牽閑時掠水帆飽不依桅岸引枯蒲去天將逺樹來行舟避龍節處處隱漁隈孤鴈集句萬里衘蘆至寒空半有無蹤分沙岸靜聲入塞垣孤影早衝關月飛髙望海隅不知天外侣何處下平蕪黃菊集句九月欲將盡鮮鮮金作堆遶籬殘豔宻擁鼻細香來五色中偏貴群花落始開可憐陶靖節共此一傾盃金山我從渡淮渉髙郵雪風連日吹行舟維陽地西闖夜色星月隱見邊城樓晴光破曉射瓜歩照燿玉宇開瓊洲馮夷收威浪妥帖容我一到金山頭金山勝槩冠呉楚萬礎磻峙江中流平生夢寐不到處乃以王事從私㳺鍾山雨花落眼底海門鶴崖波際浮川開林闔望不極但見逺色明輕鷗風煙渺漭異吾土行役有程難乆留一杯未舉帆影轉巳㸔浙樹稍旗旒趙飛燕冩真昭陽宫裏千蛾眉中有一人輕欲飛姊妹寅縁特新寵六宫鉛粉無光輝春回太液花如繡花底輕風扶翠䄂君恩不許作飛仙襞積宫裙留淺皺君王貪宴温柔郷木門不省揺倉琅避風臺成略今古空使遺妬驚霓裳當年傾城復傾國誰寫餘妍入丹碧背燈擁髻一潸然不應尚有樊通德村齋遣事人生天地真蘧廬外物擾擾吾何須與其覊馬齊轅駒豈若飲齕隨駘駑不知掉尾忘江湖呴呴濡沬胡爲乎誰念挾卷矜村墟磨丹點黝圍樵蘓申鞭示箠嚴範模矍如狙翁調衆狙爾雅細碎編蟲魚辝嚴義宻字見踈烘齋睥睨音語麤諷誦誰敢忘須臾萬中有一差錙銖吚啞坐使爲呻呼咄哉倡言口囁嚅等爲兒戲夫何殊霜風入戸寒割膚生薪槎芽供燎爐漫漫濕煙迷四隅白鶴日見黔如烏此閒縱樂能何如其誰相與歌歸歟技籠嗟我自摰拘垂翅更待窮年徂和張德逺伐松之什社櫟賦散材乃遭匠石嗤髙梧中宫徴不能保孫枝全傷隨用否理固不可移堂堂十八公端勁岀天姿蟠根借餘潤茂鬱清溪湄雨師夜失律偶此遺神螭煙鱗漬寒雨霧鬣明朝曦騰拏困愈壯偃蹇僵不疲未能走沆漭聊與草木嬉長風動頭角吟嘯舒欝伊塵埃詎能乆雷電㑹有時昨宵卧溪月老影閑撗欹天明竟不舉俯仰益怪竒拏拳攀半崖渴喙呑清漪希珍價不售復病樵柯危材髙輒爾耳咄彼造化兒樛枝飽霜雪遽與蓬蒿衰孤摽挽萬牛未爲廊廟知窈窕桃李春奈爾千歳期枯桑豈自賈取敗以老龜兹非爨下材梁棟終見施長短歸自然勿爲鳬鶴悲題獐猿圖雲山空岡阜重㩂葉半濕新霜紅溪猿得意適其適閑攀靜挂晴光中孤􅍪何從來寂歴野竹風舉頭相視不相測昂藏却立如癡童鯤鵬負雲天斥鷃處蒿蓬萬生所樂自不同恝然胡爲之二蟲和濟倅劉公傷秋川流爲潴鉅野闊水色天容兩開豁山隨水逺勢奔騖駿馬西來衘轡脫山前雲木散不收坐看本末來歸舟秋容澄明納萬象畫本寂黙撗雙眸謫仙曽來釣煙磧想見夕陽寒影隻騎鯨去作汗漫逰只有荒臺壓澄碧臺邊昨夜西風來倦㳺覊宦心悠哉豈無瓊艘百拖載春色是中可以忘形骸官居得秋况不惡髙吟何遽悲揺落君不見中郎詩翰憶湖山秋色正滿連雲閣題春雲岀谷圖春雲乍岀山有無春雲巳去春山孤山光空濛不可冩正要雲氣相縈紆山吞雲吐變明晦半與嵓谷生朝脯輕林蕭蕭暗溪樹餘影漠漠開樵居舟人艤掉並沙尾坐看縹緲揺空虚巧分天趣岀畫外韻逺不與丹靑俱今人重古不知畫但愛屋漏煙煤汙惜哉東坡不及見此本詩中獨有疊嶂煙江圖輕林蕭又一作輕隂霏又新泰縣環翠亭官居坐官府不見青山青閑來亭上看青山遶重城左見靑山縱右見青山撗具敖浮虚碧崢嶸群峰連姢相繚縈縣庭無事苔蘚生獨携珎琴寫溪聲琴聲鏘鏘激虚亭罷琴舉酒招山英山英莫相嘲我雖朝市如林埛客有山中來聞說令尹清山英異時合有情周遮不放公馬行喜雨山雲駃如驅山雨沛如傾幽人夢𥘉醒卧聽簷溜聲雷霆怒相搏似與隂陽爭蛟龍乆何蟠始此幽蟄驚餘花曉猶落竟日方破晴明朝東臯望照眼生意明焦枯𬒳沽濡相與迴春榮忻然野桃李新緑棲殘英漸漸麥壠翠溜溜溪流淸蛙鳥亦解喜飛沉玄喧鳴萬物皆得時棲遲感吾生直應挂儒冠便逐春農耕睡覺門外月色如晝霜風過翏然成聲作一絶老木經霜衆竅空月明深夜響秋風始知天籟非人籟吹萬由來果不同題張維中華山圖苡珠散遺胄我姓岀馮翊空聞華山名未始見顔色三峯擢觚稜經眼但石刻那知玉井蓮香落清渭北巔崖劃變轉勢走關輔窄豈無愛山人不解傅粉墨多才曲江裔公暇日招揖歸裝貯新圖尚帶煙霧濕明䆫一傳玩怳若到郷國我生隨宦遊乆作東南客有田太山下繞屋皆泉石懷恩戀官廪老大歸未得况復秦川遥便恐此生隔崚嶒蒼煙靣只許畫中識詩成持送君想像三嘆息題馬賁畫鸂䳵圖雙眠雙浴水平溪共㸔秋光卧兩堤誰信瀟湘有孤鴈冷沙寒葦不成棲書因叔北軒壁生涯自分老林泉欲止還行信有縁未許綸竿歸醉手且教煙水入吟鞭雲山聊欲追聱叟風腋何妨借玉川獨卧北軒元不寐竹閒寒雨夜琅然和元卿郊行馬駃車驅起路塵傍山隂翳作春温東風欲放萌芽動巳有疲牛嚙燒痕丗華將有登州之行作是詩以送之少陵兄弟蓋三人坡老相知只卯君五畝有期將共隱一樽何意便輕分秋鴻渺渺看孤往夜雨瀟瀟忍獨聞佗日書來問無恙我應深釣竹溪雲濰宻道中懷古十二全齊勢興亡俯仰中地傾濰水北山断穆陵東破塜餘殘甓荒蹊足轉蓬燕齊舊懸隔不接馬牛風過棠梨溝地僻人煙少山深㵎谷重坡陁下長坂迤邐失諸峯問俗知懷土聽歌識相舂幾家茆屋外田畝自衡從昫山驛亭阻雨東海地名蒼梧舊說云此㠀自蒼梧浮來又州有景踈樓脫葉蕭蕭山木稠連檣飄汎海蓬秋浪回昫㠀馮夷舞雲暗蒼梧帝子愁欲往未行淹僕馬乍來還去羡鶬鶖景踈樓下無邊水暫濯塵纓可自由弔石曼卿曼卿甞通守昫山遣人以泥封桃李核彈之嵓石中其後花開滿山又甞携妓飲山之石室閒鳴絃爲冰車鐵馬聲城頭山色翠玲瓏尚憶清狂四飲翁鐵馬冰車断遺響桃花石室自春風生平詩價千鈞重身後仙逰一夢空想見蓬萊水清淺芙蓉城闕五雲中昫山道中三首二年三到水雲郷瘦馬凌兢怯路長野雪未乾春未雨落鳶飛起暗塵黄呉歌楚語海山間織葦苫菰便自安巳作稻塍猶未種小溝流澁水車乾海路東南万壑傾青山孤起壓重城驛亭春半餘寒雪墻角無人草自生應制粉紅雙頭牡丹二首卿雲分瑞兩嫣然鏡裏䊋成糓雨天曉日倚欄閑妬艶春風拾翠兩駢肩水南水北何曽見桃葉桃根本自仙夢想沉香亭北檻略修花譜記芳妍春意應嫌芍藥遲一枝分秀伴雙㽔並肩翠䄂𥘉酣酒對鏡紅䊋欲闘竒上苑風煙工獻巧中天雨露本無私更看散作人閒瑞万里黃雲麥兩歧次文孺韻病眼花生𥿄覊懷棘遶墻挑燈簷溜急到枕漏聲長響徹雞塒曙寒迎鴈背霜凄凉三逕菊無夢到壷觴好問按此詩是貢院中唱和故有花生𥿄棘違墻之句白㽵道中煖風遟日弄春晴渾似龍眠畫裏行沙路半隨堤尾曲幾家桃李鵓鴣鳴花品翠裙襞積破黃薇新様丁香結玉㽔最愛東風木芍藥淡紅深紫兩相宜上皇書扇後便靣團圝字點鴉天風吹墮委塵沙燕泥庭草争工拙何似當年陌上花送崔深道東歸君從鬱葱幾時來鬱葱山色空崔嵬白雲巳自動歸意蠨蛸蛜蝛况可懷薰風濁酒非莓苔那知空齋響蚊雷酒酣臨風解相憶喚取玉笛傳清哀和道彦至山光凝黛水浮空地僻偏宜叔夜慵尚喜年登更冬暖敢論人厄與天窮君方有志三重浪我巳無心萬里風擬葺小園師老圃緑畦春溜引連筒楚清之畫樂天小娃撐小艇偷採白蓮回不解藏縱跡浮萍一道開詩因題其後樂天歸卧湖山邊閑買池塘娛暮年小蠻巳老樊素去心地玲瓏如白蓮室中誰遣散花天故點禪衣香破禪鴛鴦爲報竊花處題詩要戲小嬋姢紅䊋秋水照明蠲清之粉本清且妍道人無心𬒳花惱對畫作詩真適然君不見元亮投名蓮社裏不妨更賦閑情篇寄賈因叔鶉居鷇食兩迷陽四十猶貪桂子香石汶爲君抛水月憲陵回首見冰霜虫魚細碎成書癖荆棘崢嶸矢醉郷舉白北軒真一夢竹間猶記雨浪浪題大理評事王元老雙橘堂朱橘復朱橘傳分包貢實煌煌中堂榜竒畫照公堂前萱草碧公今致養豐禄食更取蠻珎奉顔色舉觴一笑三千秋坐㸔諸孫索梨栗宿舊縣四更而歸道中摭所見作行路難三星排空山月明思歸客子夜半行單衣短褐風凄清響踏黃葉棲禽驚怱怱曉轉沙岸側枯蓼寒蘆鳴索率山月欲隨山煙黒前途無人脚無力行路難堪嘆息途中壬辰正月平明發郊墟獨歩蹌躞蹀引領發前程日岀煙未㓕林迥鳥始喧麦短牛巳嚙春陽氣未壯道左尚殘雪長風拂歸𬒮凛欲變冬冽指凍僵不拳膠凝仍欲折而我竟何事犯此寒正切脩途去未幾行意先巳􅒒安得兩翼生髙飛度林樾徐茂宗蝸舎萬生擾擾安其安鷽鳩不羡鵬飛摶端知扶揺上九萬無異跳躍蓬蒿間是身江海一漂粟身外紛然皆外物一㕓儻可容所寓何用渠渠作髙屋知君從道由心成昔焉忘俗今忘形物來弭角不知競觸蠻血戰良虚名我夢𫾣門訪君舎舎小不容相對話覺來驚見壁間蝸俯仰人間真物化壬辰二月六日夜夢作一絶句其詞曰矯冗連天花春風動光華人眠不知眠我佩絳紅霞夢中自以爲竒絶覺而思之不能自曉故作是詩以紀之夢中作詩真何詩夢中自謂清且竒覺來反覆深諷味字偏句異誠難知豈非夢語本真語無乃造物爲予嬉君不見莊周古逹土栩栩尚作蝴蝶飛我生𨳩眼尚如此况在合眼夫何疑黃華王先生庭筠庭筠字子端熊岳人父遵古字仲元正隆五年進士仕爲翰林直學士才行兼備道陵所謂昔人君子者也子端早有重名大定十六年甲科文采風流照映一時歷州縣用薦者供奉翰林承安中爲言事者所累謫鄭州幕官未幾復應奉稍遷修撰卒官年四十七子端詩文有師法髙岀時輩之右字畫學米元章其得意處頗能似之墨竹殆天機所到文湖州巳下不論也平生愛天平黃華山水居相下十年自號黃華山主有集傳于丗其殁也道陵有詩悼之其引云王遵古朕之故人也乃子庭筠復以才選直禁林者首尾十年今兹云亡玉堂東觀中無復斯人矣其家以遺文來上㝷繹之乆良用愴然詩不録屏山故人外傳云子端出家子風流藴藉冠冕一時爲人眉目如畫羙談笑俯仰可觀外視若簡貴人𥘉不敢與接一見之後和氣津津溢於衡宇間又其折節下士如恐不及苟有可取極口稱道之故人人恨相見之晩也子萬慶字禧伯詩筆字畫俱有父風仕爲行尚書省左右司郎中猶子明伯㓜歳學書書家即稱賞之倜儻無機膂力絶人曽有詩云釣鰲公子鐵心匈興在三山碧海東千尺雲帆巳髙揭不知何日得秋風死於鄧州年未四十也楊秘監下槽馬圖龍眠悔畫馬政恐墮馬趣我今破是說試下弟一句道人三昩手游戲萬象具萬象𥘉莫逃畢竟無所住譬如大圎鏡照物隨其遇少焉物四散影果在何處楊侯具此眼透脫向上路萬馬落人間蓋證龍眠誤書西齋壁丗事雲千變浮生夢一場偶然携柱杖來此據胡床有雨夜更靜無風花自香岀門多道路何處覔亡羊八月十五日過泥河見鴈家在孤雲落照間行人巳上鴈門關慿君爲報平安信才是雲中弟一山示趙彦和四柳危亭坐晩隂殷勤雞黍故人心兒孫滿眼田園樂花木成隂年歳深十畝蒼煙秋放鶴一簾凉月夜撗琴家山活計良如此歸興秋風巳不禁大安寺試院中寒食東風日日漲黃沙供佛床頭始見花寒食淸明好時節年年憔悴獨離家獄中賦萱沙麓百戰埸舄鹵不敏樹况復幽圄中萬古結愁霧寸根不擇地於此生意具婆娑緑雲杪金鳯掣未去晚雨沾濡之向我泫如訴忘憂定漫說相對淸淚雨柳州戲題堦前芍藥東坡長春如稚女及賦王伯颺所藏趙昌畫梅花黃葵芙蓉山茶四詩党承旨丗傑西湖芙蓉晚菊王内翰子端獄中賦萱凡九首予請閑閑公共作一軸冩因題其後云柳州怨之愈深其辝愈緩得古詩之正其清新婉麗六朝辝人少有及者東坡愛而學之極形似之工其怨則不能自揜也党承旨出于二家辤不足而意有餘王内翰無意追配古人而偶與之合遂爲集中弟一大都柳岀于雅坡以下皆有騷人之余韻所謂生不並丗俱名家者也獄中見燕笑我迂踈觸禍機嗟君底事入圜扉落花吹濕東風雨何處茅簷不可飛偕樂亭日暮西風吹竹枝天寒杖屨獨來時門前流水清如鏡照我星星兩鬢絲野堂二首緑李黃梅繞屋踈秋眠不着鳥相呼雨聲偏向竹間好山色漸從煙際無雲自知歸鳥自還一堂足了一生閑門前剥啄定佳客簷外孱顔皆好山韓陵道中石頭犖确兩坡間不記秋來幾往還日暮蹇驢鞭不動天教子細數前山絶句竹影和詩瘦梅花入夢香可怜今夜月不肯下西廂孫氏午溝橋亭閑來橋北行偶過橋南去寂寞獨歸時沙鷗晩無數送士選山東外臺判官秋天寥廓使星明光動山東七十城玉署文章厭閑冷繡衣風采試澄清人隨白鴈霜前到詩繞青山馬上成才力如君君未老只愁無地避功名張禮部溪山真樂圖悠悠春天雲想見平時閑朝遊溪橋畔暮宿山堂間澹然不知愁亦復忘所懽岀山𥘉無心旣岀還思山人間待霖雨欲歸良獨難山堂悵何許蕭蕭松桂寒内郷浙江張浮休窪尊爲二兄賦嵓花覆我酒酒靣照幽妍風如惜花影不肯生微漣空山悄無人花枝自留連懷人成獨醉日暮山蒼然超化寺隔竹微聞鍾磬音墻頭脩緑冷隂隂山迎初日花枝靚寺褁淸潭塔影深吾道蕭條三巳仕此行衰病獨登臨簡書催得怱怱去暗記風煙擬夢㝷舎利塔蒼山亭亭如覆盎佛塔東西屹相向林頭朝日射重簷黃金丹砂曄生光中華此塔弟十五圖記所傳知不妄智惠薰成舍利羅夜半竒芒時一放想見當時阿育王麾叱神工鞭鬼匠雲車瘴海挽炎沙沙底黃腸三萬丈石排方靣蔑石叚鐵錮瘦中腰鼓様功夫精宻業長乆位置尊嚴氣髙張地皮浮水膚寸許旱溢與之俱下上崧山歸山夏秋雨雨潦從衡嵗相盪天龍圍護夜义守終刼不敢生波浪塔前樹秀老不死樹下水流多益壯再拜初甞一勺甘洗我三生煩惱障夏日西䆫近事香如夢北客窮愁日抵年花影未斜猫睡外槐枝猶顫鵲飛邊中秋虚空流玉洗丗界納冰壷明月幾時有清光何處無人心但秋物天下近庭梧好在黃華寺山空夜鶴孤𬒳責南歸至中山丙申春短轅長路兀呻吟行李遲遲日益南親老家貧官職重恩多責薄淚痕深向人柳色渾相識着雨花枝半不禁回首觚棱雲氣隔六年侍從小臣心送子貞兄歸遼陽青峭江邊玉數峯煙梳雨沐爲誰容到時爲向山靈道歸意如君一倍濃采蓮曲南北湖亭競采蓮呉娃嬌小得人憐臨行折得新荷葉却障斜陽入畫舡秋郊瘦馬踏晴沙微風度隴斜西風八九月踈樹兩三家寒草留歸犢夕陽送去鴉隣村有新酒籬畔㸔黃花憶漍川極目江湖雨連隂甲子秋青燈十年夢白髮一扁舟夏日檀欒倒影硯波清注了黃庭譜鶴銘且喜過門無褦襶却憐涴壁有寧馨劉賔客詩寧字平聲呼河隂道中二首梨葉成隂杏子靑榴花相映可憐生林深不見人家住道上唯聞打麥聲微行入麥去斜斜才過深林又幾家一色生紅三十里際山多少石榴花禮部閑閑趙公秉文秉文字周臣滏陽人閑閑其自號也㓜頴悟讀書若夙習大定二十五年進士應奉翰林文字上書論宰相胥持國當罷宗室守貞可大用又言獄訟征伐國之大政自古未有君以爲可大臣以爲不可而可行者坐譏訕免官未幾起爲同知岢嵐軍州事轉北京路轉運司度支判官承安五年冬十月隂晦連日宰相萬公入對上顧謂萬公曰卿昨言天日晦冥亦猶人君用人邪正不分者極有理趙秉文曩以言事降授聞其人有才藻工書翰又且敢言朕非棄不用以北邊軍興姑試之耳泰和二年改戸部主事翰林修撰岀爲寧邊州刺史二年改平定州治化清靜所去人思之貞祐初中國仍歳𬒳兵公建言時事可行者三一遷都二導河三封建朝廷略施行之四年除翰林侍講學士明年轉侍讀興定中拜禮部尚書兼侍讀同修國史知集賢院𨳩興正月京師戒嚴時公巳老日以時事爲憂雖食息頃不能忘毎聞一事可便民一士可擢用大則拜章小則爲當路者言殷勤鄭重不能自已竟用是得疾薨年七十四自㓜至老未甞一日廢書不觀著易叢說十卷中庸說一卷揚子發微一卷太玄箋賛六卷文中子類說一卷南華略釋一卷列子𥙷注一卷刪集論語孟子解各一十卷資暇録一十五卷所著文章號滏水集者前後三十卷大槩公之文岀於義理之學故長於辨析極所欲言而止不以繩墨自拘七言長詩筆勢縱放不拘一律律詩壯麗小詩精絶多以近體爲之至五言大詩則沉鬱頓挫學阮嗣宗真淳簡澹學陶淵明以它文較之或不近也字畫則有魏晉以來風調而草書尤警絶殆天機所到非學能至宣徽舜卿使河湟夏人多問公及王子端内翰起居狀朝廷因以公報聘其爲四方所重如此論者謂公至誠樂易與人交不立崖岸主盟吾道將三十年未甞以大名自居仕五朝官六卿自奉養如寒士不知富貴爲何物蓋學道所得云雜擬三首朱明變氣候大火向西流六龍整征轡焂忽夏巳秋閶闔來悲風霜稜𬒳九州豈不念時節歳律聿其周精衛填溟海木石安所投獨携羡門子髙歩登崑丘千秋長不老永謝區中囚猗猗南山竹並生凡卉藂歳晏多霜雪見别蕭艾中我欲食鵷鶵千歳不一逢留之和律吕截作嶰谷筒一變爲清商日暮來悲風清泉漑石根上有白雲封虚心抱靜節知音爲誰容不如歸去來一竿釣淸灃白日淪西汜滄海無回波四時更代謝奈此遲暮何我欲制頽光惜無魯陽戈憑髙望八荒眖迷山河驚風振江海山林無靜柯獸狂走四顧曠野迷絓羅西登廣武山北顧望三河蓬蒿蔽極目人少虎狼多喟然發長嘆拊劒徒悲歌花下墓山前樹今人看花昔人墓昔人栽花待邀賔花開墓上人何處今年花盡復明年今人復爲後人憐酒澆墓上喫不得留與飢鴉作寒食俲王右丞獨歩幽篁裏獨坐幽林下談玄復觀易西日隱半峰返照林間石石上多古苔山花間紅碧花落人不知山空水流岀和淵明擬古五首小智多自私大方乃無隅一毫納萬象萬象非卷舒日月爲我牖天地爲我廬曲土窘拘囚一身無容居我夢登日觀青天入平蕪俯視但一氣二豪彼何如昔日穆天子侈心窮八荒崑崙入馬蹄蘧廬視明堂王母爲之謡白雲何茫茫憑髙俯九州塊如螻蟻場歸來越河關萬冡壓崧邙遂令學仙者聞風爲激昂漢武千秋露淮南八公方至今瑶池宴空爲後代傷吾道無緇磷萬古常如兹奈何中智下謂彼不知時與丗頗殊好譬彼澠與淄我欲質所從登髙望九疑路逢古漁父長歌滄浪辝岀門異所見退坐還自思當丗固殊古古人不吾欺翩翩岀林鳥日暮將何之倚簷送歸盡聊欲弦吾詩西北有佳人樓上拊雲和一鼓别鶴操再弄求凰歌絃聲幾欲絶哀響何其多昔爲掌中珠今爲路旁花壯年不再得華落將如何張衡詠思玄屈平賦逺逰髙情薄雲天意氣隘九州朝攀扶桑枝夕飲弱水流翻然不忍去無女哀髙丘嚴霜下百草歳律聿其周蕭蘭共憔悴巳矣吾何求中秋天風吹河漢明月懸清光淸光不可掇流影入杯觴吸此風露魄洗我冰炭腸向來功名心一笑雪沃湯人生幾中秋彈指三萬埸胡爲置熱惱不使心清凉此心如秋月虚明洞八方此身萬化中太山一毫芒尚無物與我何者爲彭殤推琴黃葉落矯首白雲翔解衣一盤礴清境墮渺茫送雷希顔赴涇州録事李君羙治中公廨南樓坐中作嚴霜枯百草揺蕩鴻鵠心翩翩萬里翼隨雲落西南涇水東流不到燕送君落日孤雲邊聲名一日天下白還作南樓坐中客西州自古多豪英作者凛凛氣猶生太尉清風萬萬古不勞折箠笞此虜男兒生不功名死無益莫言簿領卑凡職君不見當時髯張一尉耳至今雙廟令人起魯直烏絲襴黃庭太清虚皇玉景經琅凾瓊笈秘始清囊以雲錦金鈿扃四神守衛訶百靈中夜一氣存黃庭玄霜瓊膏清子形方瞳緑髮魂魄寧上壽千秋下百齡天書夜降勑六丁控駕三素乗風泠鳯笙龍筦超冥㝠揚旌抗斾㸌飛星八㓕吐毒驅雷霆擲火萬里流金鈴仙人拂石刼不聽笑視人丗風中螢丗間醉夢紛膻腥三尸調汝丹田螟有如尾閭泄滄𬈑一朝神離鳥飛缾涪翁書法岀蘭亭名書此經實自銘𨳩卷恍然如酒醒養生新發庖丁硎同粹中師賦梅寒梅雪中春髙節自一竒人間無此花風月恐未冝不爲愛冷豔不爲惜幽姿愛此骨中香花餘嗅空枝影斜清淺處香度黃昏時可使飢無食不可無吾詩游華山寄元𥙿之我從秦川來遍歷終南游暮行華隂道清快明雙眸東風一夜撗作惡塵埃咫尺迷嵓幽山神戲人亦薄相一盃未盡隂霾収但見兩崖巨壁挿劒㦸流泉夾道鳴琳璆希夷石室緑蘿合金仙鶴駕空悠悠石門劃断一峯出婆娑石上爲遲留上方可望不可到崖傾路絶令人愁十盤九折羊角上靑柯平上得少休三峰壁立五千仞其下無址傍無儔巨靈仙掌在霄漢銀河飛下靑雲頭或云竒勝在髙頂脚力未易供㝠搜蒼龍嶺瘦苔蘚滑嵌空石磴誰雕鎪毎怜風自四山而下不見底惟聞松聲萬壑寒颼颼捫參歷井到絶頂下視塵丗區中囚酒酣蒼茫瞰無際塊視五岳芥九州南望漢中山碧玉簮亂抽况復秦宫與漢闕飄然聚散風中漚上有明星玉女之洞天二十八宿環且周又有千歳之玉蓮花開十丈藕如舟五鬛不朽之長松流膏入地盤蛟虬采根食實可羽化方曈緑髪三千秋時聞笙簫明月夜芝軿羽蓋來瀛洲乾坤不老青山色日月萬古無停輈君且爲我挽回六龍轡我亦爲君倒却黃河流終期汗漫逰八極乗風更覔元丹丘和淵明飲酒九首翩翩萬里鶴日暮將何之昬鴉擇所安笑汝不知時孔席不暇暖此理吾不疑尚愧淵明翁濁酒時一持貧賤豈不苦仰慕冥鴻飛富貴豈不樂乃有黃大悲苦樂各異趣嗜好從所依我欲作九原獨與淵明歸挂冠不待年况此齒髪衰遥醉一盃酒母令寸心違秋菊有至性霜松無俗姿采采黃金花笑拊蒼煙枝偶有盃中物成此一叚竒白雲南山來岀岫復何爲醉卧東籬下聊脫人間覊今日好天色清晨雪雲開東風如故人適我平生懷坐見南來燕孤雌與雄來暮歸主人堂梁閒有雙栖巢傾覆其子又𥙷新巢泥翩翩隨陽鴈幽貞苦難諧江湖偶相失咫尺雲路迷哀哀霜雪際獨向胡天回􅋧鳥閉籠中舉翮觸四隅騏驥駕塩車跼䠞困中途雖然遭識拔未免爲人驅傍觀信羙矣自愧良有餘不如兩無累還我田園居千載淵明翁誰謂不知道謾賦責子詩調戲以娯老杜陵蓋自况亦豈恨枯槁壷觴淸濁共適意無醜好歸來五柳宅守我不貪寶長嘯天地間獨立萬物表幽居澹無事雅志了玄經眼花憎文字悠悠竟無成中夜起不寐披衣守寒更梅竹散淸影素月流廣庭孤鶴閟逸響切切寒虫鳴拊卷長嘆息慨慷惻中情漢儒傳注學未爲丗所得秦火少完書豈免烏焉惑後儒𥙷罅漏聖道少開塞俗士喜持戈又一秦相國且共歡一觴多言不如黙淵明非嗜酒愛此酒中真謂言忘憂物中有太古淳回首市朝中萬事牛毛新去年持使節悠悠過西秦官闕隨飛烟衣冠化埃塵當時憑軾士慷慨嘆徒勤所以山林客樂與魚鳥親西登大華頂曠望長河津寄謝三峯雲聊欲瀝吾巾誓將從此去笑謝當塗人和韋蘓州秋齋獨宿冷暈侵殘燭雨聲在深竹驚鳥時一鳴寒枝不成宿擬兵衛森畫㦸冠帶事朝謁清坐彈鳴琴以彼塵外趣逺我遺丗心岸幘送歸鳥隱几見遥岑聊同靜者樂豈必居山林寄王學士子端寄語雪溪王處士年來多病復何如浮雲丗態紛紛變秋草人情日日踈李白一杯人影月鄭䖍三絶畫詩書情知不得文章力乞與黃華作隱居上淸宫二首霜葉蕭蕭覆井欄朝元閣上玉筝寒千年遼鶴歸華表萬里宫車泣露盤日上霧塵迷碧瓦夜深月露洗荒壇断碑膾炙人何在吏部而今不姓韓暇日登臨近吹臺夷門城下訪寒梅鼇頭他日幾人在尊酒而今一笑開秋潦滲餘村逕岀夕春歇處野禽來醉歸扶路人爭㸔知是詩仙閬苑回寄陳正叔渺渺西風去翼輕長林風葉動秋聲嵩邙竟秀容多可河洛交流忌獨淸廣武山川迷故壘成臯草木閟空城憑髙一掬英雄淚寄與窮途阮歩兵寄𥙿之乆雨新晴散痺頑一軒凉思坐中間樹頭風冩無窮水天末雲移不定山宦味漸思生處樂人生難得老來閑紫芝眉宇何時見誰與嵩山共往還古瓶䗶梅石冷銅腥苦未淸瓦壷温水照輕明土花暈碧龍紋澁燭淚痕踈鴈字橫未許功名歸鼎鼐且收風月入瓶罌嬌黃喚醒朝陽夢漢苑荒凉草棘生暮春得寒字九日聊偷一日閑三分春事二分闌郷關夢裏人空老風雨夜來花又殘乍坼泥封糕酒熟未開火禁粥餳寒却思投劾歸田去楊柳隂中把釣竿靈感寺徒河岸北白蓮東法鼓驚飛碣石鴻塔上風煙髙鳥路山頭雲雨化人宫松林礙日蜂房冷石砌頽沙蟻穴空欲盡休公揮塵樂鬢絲羞對落花風五月牡丹應制好事天工養露芽陽和趂及六龍車天香護日迎朱輦國色留春待翠華糓雨曽霑靑帝澤薫風又卷赤城霞金槃薦瑞休嗟晩猶是人閒第一花代州金波曽醉鴈門州端有人間六月秋萬古河山雄朔部四時風月入南樓漢家戰伐雲千里唐季英雄土一丘繫馬朱欄重回首煙波誰在釣魚舟𨳩元寺嵗乆開元寺黃花落石龍瓶深添碧甃蝸壁篆金容䆫影年年塔禽棲夜夜鍾平生睡秋雨竹閣味偏濃謁北嶽四大神儀一群山太茂尊奠方荒兾宅視禮配天孫西送虞淵暮東瞻碣石暾宝符臨代郡鐵罋扼并門控趙襟形壯包燕氣象渾九河深禹跡萬里叫虞魂在昔登封始前驅羽衛繁千官駢部曲萬騎隘山樊卜地恒陽曲移祠泰始元晉移祠曲湯荒碑刓歳月飛石􅗟乾坤帝秩加黃屋宫居象紫垣雲楣朽芝瑞雨砌裂槐根天業恢弘大山靈翊衛屯巫閭歸帝製長白發金源九廟龍盤接三邦虵勢吞雲煙浮近甸日月遶中原欵謁天香重封題御署存銀鏐諸産富電雨萬靈奔神聽羞回德天聦納正言負時身九死去國淚雙痕日近趨天闕生還託聖恩許身徒稷契無術𥙷羲軒帝籙長桒洞仙巖張果村卜居如可近重整北山轅陪李舜咨登憫忠寺閣日月躔雙栱風煙納寸眸雲山浮近甸宇宙有髙樓鳥外餘殘照天邊更去舟登臨有如此况接李膺逰廬州城下月暈曉圍城風髙夜斫營角聲寒水動弓勢断鴻驚利鏃穿呉甲長戈断楚纓回看經戰處慘淡暮寒生白鴈波淨影逾白霜清鳴更哀乾坤雙鬢老風雪一聲來林迥隱猶見天長去復回物情嫌太㓗莫使羽毛摧桃花㠀寄王伯直氷破村橋擁春寒旅鴈低逺山封霧小髙浪與雲齊島寺明松雪潮舡濺藕泥詩情吟不盡寄與畫中題郎山馬耳峯房駟落人閒入石露雙碧月明聞夜嘶驚落山頭石春逰三首無數飛花送小舟蜻蜓欵立釣絲頭一溪春水關何事皺作風前萬疊愁樹藏脩竹竹藏門門外清流幾股分行過小橋人不見背隂花氣隔墻聞煙外絲絲風柳斜春光也自到天涯太平有象村村酒寒食無家處處花暮歸貪㸔孤鳥入重雲不覺青林雨氣昏行過断橋沙路黒忽從電影得前村清居寺五杉亭觀子野留題五杉今日只三株曽是詩人嘆息餘君去我來杉尚在断腸君殁見君書雞鳴山煙蒸山腹晴猶濕河帶冰凘暖漸流獨上雞鳴㸔日岀五雲多處是皇州盧溝河分橋柱如瓜蔓路入都門似犬牙落日盧溝溝上柳送人幾度岀京華雨晴二首東風時送瓦溝聲欹枕幽䆫夢自驚睡起不知雲巳散夕陽偏向柳梢明一抺平林媚夕暉山煙漠漠燕飛飛倚欄遥認天邊電何處行人帶雨歸寓望蒲根閤閤亂蛙鳴點水楊花半白青隔岸風來聞鼓吹柳隂深處有園亭戴花病來盃酒懶重持強爲花殘折一枝人老易悲花易落東風休近鬢邊吹玉堂玉堂隂合冷䆫紗雨過銀泥引篆蝸萱草戎葵俱不見蜂聲滿院採槐花夏至玉堂睡起苦思茶别院銅輪碾露芽紅日轉堦簾影薄一雙蝴蝶上葵花華山石頭犖确水縱撗過雨山間草屨輕未到上方先滿意倚天青壁看雲生雨晴一春不雨漫塵黃碧瓦朝來泛霽光留得紫葳花上露幾招渴燕下雕梁即事樓頭不見暮山重遥認青林雨意濃一陣風來忽吹散断雲還𥙷兩三峯同樂園二首春歸空苑不成妍柳影毶毶水底天過却清明逰客少晩風吹動釣魚舡石作垣墻竹映門水回山複幾桃源毛飄水靣知鵝柵角岀墻頭認鹿園繫舟山圖𥙿之先大夫甞居此山之東岩山頭佛屋五三間山勢相連石嶺關名字不經從我改便稱元子讀書山虎牢兩崖峽束枕洪濤自古英雄爭虎牢蒼天胡爲設此險長使戰骨如山髙中州丙集卷終
