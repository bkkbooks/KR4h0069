body:
  text: 馮內翰璧一十五首王內翰若虛三十八首麻徴君九疇二十五首劉御史從益三十三首宋內翰九嘉一十一首雷御史淵二十九首李右司獻能二十首王右司渥一十一首冀都事禹錫二首馮內翰璧璧字叔獻别字天粹承安二年進士歷州縣召入翰林再為曹郎宣宗朝屢以使指鞠大獄權貴如歸德知府宿州總帥聲勢熖熖朝廷知其跋扈而不能摧伏者叔獻以法臨之毛髮不貸也幼有重名就所長論之館閣臺諌與賔客言乃其選也徒以小心奉法不畏強禦故屢以城旦書屈之識者有用違其長之嘆興定末以同知集慶軍節度使事致仕居嵩山龍潭者十餘年諸生從之遊與四方問遺者不絶賦詩飲酒放浪山水閒人望以為神仙焉山中多蘭每中春作華山僧野客人持數本詣公以香韻髙絶為勝少劣則有罰謂之鬪蘭所釀松醪東坡所謂歎幽姿之獨髙者惟叔獻能盡之客有以京國名酒來與之校者味殊不能近正如深山草衣木食人語覺傭兒販夫塵土氣為不可嚮也是後松醪鬪蘭遂為山中故事叔獻少日在太學賦聲籍甚其學長於春秋詩筆淸峻似其為人字畫楚楚有魏晉間風氣雅為間間公所激賞制誥典麗當代少見其比尺牘又其專門之學風流藴藉不减前丗宋景文左丞董公紹祖奉使江左得其詩餞行喜見顔間詩四韻每誦一句輒為一舉觴李右司之純談笑此丗為不足玩見叔獻則必為之􅋏然王延州從之公於鍳裁為海內稱首敬其名德至不敢以同年生數之北渡還鄉里年七十九終於家墓碑云所貴於君子者三曰氣曰量曰品有所充之謂氣有所受之謂量氣與量備而才行不與存焉本乎才行氣量而絶出乎才行氣量之上之謂品品之所在不風岸而峻不表襮而著不名位而重不耆艾而尊是故為天地之美器造物者靳固之不輕以豫人閲百千萬人之衆歷數千百年之久乃一二見之同乎其時非無孤雋偉傑之士從容於禮文之域角逐乎功名之地唯其俗不可以為雅劣不可以為勝故自視缺然陳太丘事業無聞而名重天下房次律坐鎮雅俗而舉世以王佐許之施之當時未必適用然千載而下有為之斂衽者非品何以得之元光正大以來天下大夫士論公平生者蓋如此子渭字淸甫以門資敘仕為密院機察淸慎而文天下有馮孝子之目今居鎮陽同裕之再過㑹善有懷希顔寺元魏離宫十日來凡兩前與髯卿借齊奠少林往其時巳薄暮諸勝不暇訪今同魏諸孫再到風煙上寺僧導升殿雄深肅瞻仰柱礎門限砧追琢成大壯不見磨琢痕瑩滑明滉朗摩挲三嘆息後丗無此匠晚登西南亭碧玉對千丈如王官天柱如太華仙掌留宿贊公房秀色夢餘想夜靜耿不眠泉溜琴筑響惜髯今不來聮詩共淸賞和希顔虎守天門未易通庾塵無扇障西風主人何負盜憎主公論不明私害公老伏固非千里驥冥飛似是五噫鴻紛紛往事渠知幾都付嵩巔一笑中送國醫儀師顔企賢得請歸關中次朝賢韻心平窮富恐欺天靣有隂功蓋有年歸去靑山仁者樂祕來丹訣老而傳尚醫冗食渠百輩公論共推君十全技道精微仍逺引就非輕舉亦幾仙河山形勝圗書劒丁年記昔遊中條之麓過蒲州地形西控三秦逺河勢南吞二華秋晉魏兵爭一春夢漢唐壇祀幾荒丘披圗吊古令人慨不必重登鸛雀樓雒帥覔蘭作詩以寄雲插髙牙畫㦸森春移寶檻燕堂深水南紅藥初退舍嵩麓紫蘭今嗣音繭足赬肩坐香纍髙梁華棟豈渠心使君有問花應語玉樹誠佳非故林明皇擊梧桐圖三郎耳譜趂花奴風調才情信有餘天寶錯來非一拍霓裳中節亦區區送人出使陽春有腳蘇疲瘵水鏡無心照潔汙九道澄淸天意切人才一一似君無習池醉歸圗襄漢方屯十萬兵習池日往不曽醒紛紛悮晉皆渠輩何獨王家一寧馨東坡海南烹茶圖講筵分賜密雲龍春夢分明覺亦空地惡九鑽黎洞火天遊兩液玉川風隂晦中忽見華山吏部能開衡嶽雲坡仙曽借海宫春蓮峰清曉忽自獻二公何人豫何人草堂春暮撗披遷客倚樓家萬里五陵飛鞚酒千金草堂淡與春山對幽鳥一聲春巳深元光閒豫在上龍潭每春秋二仲月往往與元雷遊歷嵩少諸藍襌師汴公方事參訪每相遇輒揮毫賦詩以道間適之樂今猶夢寐見之兒子渭近以公故抵任城襌師附寄詩以叙疇昔未幾駐錫東庵因造謁閒出示裕之數詩醉筆縱橫亦略道嵩逰舊事感嘆之餘漫賦長句二首性理諸方巳遍參歸來一錫駐東庵山中蓮社舊招隱旅舍阿戎新對談詩筆如君僧有幾文章愧我老無堪綾書大字拈香疏須趂微之酒半酣少林修竹欲天參竹外幽間草結庵顧我雖存唯白髮與君曽此共玄談干戈撗絶境猶夢草樹荒殘人豈堪臘瓮松醪髯莫預啇歌悲壯不能酣雨後看竝玉所控諸峯竝玉如髙人壁立九千仞一日不見之令人生鄙吝春深木葉敷秀色益濡潤結茅寄僧藍晴碧時得趂老宿詫孫峯隅侍到齠齓連延靑一色枚數須諦認溟濛空翠閒我亦疑未信朝夾雲氣昏埋沒瑜匿瑾如蒼梧政愁湘妃鬱思舜重隂俄解駮霮湗夕暉襯姢姢忽層出歷歷分逺近雪峰互吞吐千狀才一瞬出竒如孫吳相降如廉藺如衆星拱辰如侯伯入覲接武如朋簮承迎如價儐負固如吳楚爭長如齊晉怪詭如夷蠻駢羅貢琛贐窘蹙如擒獲係纍將就釁如應龍神靈蟄卧時奮迅如天駟超軼坰牧稅羈靷如雄對改容失筯駭疾震如猛士無譁攢槊俟嚴陳獨兩峰巍然魁傑儼崇峻光輔嶽柱天鬱為中興鎮降生申與甫周室僨復振詩傳配嵩髙百丗磨不磷同希顔怪松嵩髙地氣靈花木競妍秀玉峰西南趾有松獨怪陋偃蹇如蟠螭奮迅如攫獸葉徑須髯張皮古鱗甲皺菌蠢藤癭怒支離笻節瘦月上虬影搖風度雨聲驟子落慰枯禪枝樛礙飛鼬盤根萬乘器平蓋千歲壽樵斤幸免尋厦匠矧肯搆龍化㑹有時天旱期汝救王內翰若虛若虛字從之槀城人承安二年經義進士少日師其舅周德卿及劉正甫得其論議為多博學強記誦古詩至萬餘首他文稱是善持論李屏山柸酒間談辨鋒起時人莫能抗從之能以三數語窒之使噤不得語其為名流所推服類此釋褐鄜州録事歷門山令入翰林自應奉轉直學士居冷局十五年崔立之變群小獻諂為立起劫德碑以都堂命召從之從之外若遜辭而實欲以死守之時議稱焉北渡後居鄉里癸卯三月東游與劉文季輩登太山憩於黃峴峰之萃美亭談笑而化時年七十從之天資樂易負海內重名而不立崖岸雖小書生登其門亦折行輩交之滑稽多智而以雅重自持謀事詳審出人意表人謂從之於中外繁劇無不堪任直以投間置散故百不一試耳自從之沒經學史學文章人物公論遂絶不知承平百年之後當復有斯人不也子恕字寬夫攄憤非有驕謇心非徼正直譽浩然方寸閒自有太髙處平生少諧合舉足逢怨怒禮義𥘉不愆謗訕亦奚顧孔子自知明桓魋非所懼孟軻本不逢豈為臧氏沮天命有窮逹人情私好惡以此常泰然不作身外慮贈王士衡王生非狂者乃以善哭稱每至欲悲時不閒醉與醒音詞𥘉惻愴涕泗隨縱撗問之無所言坐客笑且驚王生不暇恤若出諸其誠嗟我與生友此意猶未明絲染動墨悲麟亡傷孔情韓哀峻嶺陟阮感窮途行涕流賈太傅音抗唐衢生古來哭者多其哭非無名生其偶然歟何苦摧神形如其果有為為爾同發聲貧士嘆甑無塵瓶無粟北風蕭蕭吹破屋入門四顧何悲凉稚子低眉老妻哭丗無魯子敬郭元振之真丈夫故應餓死填坑谷蒼天生我亦何意蓋丗虛名食不足爭如只使冗且愚大腹便便飽粱肉感秋西風撼庭柯踈葉鳴䇿䇿天地一蕭條羈懷亦岑寂靑春恍如昨轉盻年半百自從長大來轉覺日月迫功名非所慕老大不足恤怛然感時心自亦不能釋淸晨梳短髮巳見數莖白刀鑷雖可施殆似兒子劇此身委蛻耳毁棄無足惜况於毛髮間而乃強修飾靑靑如陸展星星行復出畢竟白滿頭復將何所摘生日自祝空囊無一錢羸軀兼百疾况味何蕭條生意渾欲失淸晨聞喧呼親舊作生日我初未免俗隨分略修飾舉觴聊自祝醉語盡情實神仙恐無從富貴安可必修短卒同歸何足喜與戚一祈粗康強二願早間適衣食無大望但要了晨夕萬事不我攖一心常自得優游終吾身志願從此畢失子妍研掌中兒捨我一何遽其來誰使之而復奄然去平生三舉子隨滅如朝露顧我能無悲其如有天數自從學道來衆苦頗易度有後固所期誠無亦何懼人生得淸安政以纍輕故㛰娶眼前勞託遺身後慮百年曽幾何為此雛稚悮顧語長號妻此理亦應諭憶之純三首幼嵗永真契中年得偉人傾懷當一靣投分許終身燈火談玄夜鶯花逐勝春何時重一笑胸次欲生塵靣目三年隔音書萬里遙宦途俱蹭蹬日事各蕭條志大謀常拙身孤道易消本無當丗用隱處㑹相招雋氣輕天下髙情到古人銜柸曼卿放下筆老坡神時論誰優劣人材自屈伸窮愁須理遣不必淚沾巾復寄二首志大言髙與丗違拂衣具作竹林歸黃塵道口風波惡未必先生自處非自笑趨塵亦強顔食謀未免敢言間紫芝果可充飢腹從子玉屏巖石間病中二首學道今何得謀生久不成藍衫幾棄物絳帳亦虛名事拙應天意交踈即丗情煩憂時自解感觸又還生鬱鬱窮愁意營營久病身詩情渾欲减藥物但相親未得驅窮鬼終須問大鈞三時勞慰拊甚愧故人真感懷枉却全家仰此身書生那是治生人百憂耿耿填胸臆強作歡顔慰老親自笑酒得數柸還巳足詩過兩韻不能神何須豪逸攀時傑我自丗間隨分人别家到了身安是本圗何須身外覔浮虛誰能置我無飢地却把微官乞與渠慵夫自號身丗飄然一瞬閒更將辛苦送朱顔時人莫笑慵夫拙差比時人得少間西城賞蓮呈晦之晦之自號放公舊賞回頭巳隔年髙花又見出新妍偶成濁酒狂歌㑹恰及斜風細雨天樂事適來偏有興間身常得分無緣作詩莫怪多誇語差比放公先著鞭題淵明歸去來圖五首此下皆中年所作靖節迷途尚爾賖苦將覺悟向人誇此心若識真歸處豈必田園始是家孤雲出岫暮鴻飛去住悠然兩不疑我自欲歸歸便了何須更說丗相遺拋却微官百自由應無一事掛心頭銷憂更藉琴書力借問先生有底憂得時草木竟欣榮頗為行休惜此生乘化樂天知浪語看君於丗未忘情名利醉心濃似酒貪夫衮衮死紅塵折腰不樂翻然去此老猶為千載人翰長間間公命題城南訪道圖戲作二詩且為解之云得道由來不必勞癡兒舍父謾逋逃間間老子還多事時向招提打一遭竹木蕭森䕃緑苔幽襟自愛北軒開主人無說吾何問乘興而來興盡回答鄭下辨禪師見戲代防禦髙俟酒肆淫房總道埸偶然游戲亦何妨阿師自墮泥牛趣更笑春風柳絮狂還家五首日日他鄉恨不歸歸來老淚更沾衣傷心何啻遼東鶴不但人非物亦非荒陂依約認田園松菊存亡不足論我自無心更懷土不妨猶有未招魂山杏溪桃化棘榛舞臺歌榭墮灰塵春來底事堪行處門外流鶯枉喚人回思夢裏繁華事幸及當年樂此身間立斜陽看兒戲憐渠虛作太平人艱危嘗盡鬢成絲轉覺歡華不可期幾度哀歌仰天問何如還我未生時山谷於詩每與東坡相抗門人親黨遂有言文首東坡論詩右山谷之語今之學者亦多以為然漫賦四詩為商略之云絶足由來不可追汗流餘子費奔馳誰言直待南遷後始是江西不幸時信手拈來丗巳驚三江衮衮筆頭傾莫將險語誇勍敵公自無心與物爭戲論誰知出至公蝤蛑信美恐生風奪胎換骨何多樣都在先生一笑中文章自得方為貴衣鉢相傳豈是真巳覺祖師低一著紛紛嗣法更何人王內翰子端詩近來陡覺無佳思縱有詩成似樂天其小樂天甚矣漫賦三詩為白傳解嘲功夫費盡謾窮年病入膏肓豈易鐫寄語雪溪王處士恐君猶是管窺天東途西抹鬪新妍時丗梳粧亦可憐人物丗衰如鼠尾後生未可議前賢妙理宜人入肺肝麻姑搔背豈勝便丗聞筆墨成何事此老胸中自一天麻徴君九疇九疇字知幾莫州人三歲識字七歲能草書作大字有及數尺者故所至有神童之目章廟召見問汝入宫殿中亦懼怯否對曰君臣父子也子寧懼父耶上大竒之弱冠住太學有聲埸屋間南渡後讀書北陽山中其詩云讀書空山裏落月低巖幽山鬼語夜半怪我非巢由又云壯士半凋落鐡花繡吳鈎始以古學自力博通五經於易春秋為尤長少時有惡疾就道士學服氣數年疾遂平又從宛丘張子和學醫子和以為能得其不傳之妙大率知幾於學也專故所得者深飢寒勞苦人所不能堪者處之怡然不以纍其業也嘗為郾城張伯玉賦透光鏡欽叔傳之京師趙禮部大加賞異貼壁間坐卧讀之興定末府試經義弟一詞賦弟二省試亦然簾試以脫悮下弟知幾先有才名又連中甲選天下想望風采雖牛童馬走亦能道麻九疇姓名正大三年右相侯蕭公趙禮部連章薦知幾可試館職乃賜盧亞榜第二甲第一人及第授太祝權太常博士應奉翰林文字知幾資野逸髙蹇自便與人交一語不相入則徑去不返顧自度終不能與丗合未幾謝病去作詩工於賦物如夏英公篆韻其詩云千狀萬態了不同哭鬼號神自兹始簡如庖羲地上畫繁如神農日中市圎如有娀乙鳥卯方如姜源巨人履傾如怒觸不周山遡如逆上蠶叢水積如女媧石未煉碎如昆吾瓦經毀蚩尤旗張尾後曲黃帝鼎成足下峙五丈專車斷禹戈九日橫天落羿矢流漦不去龍垂髯銜書匆來鳯挽觜方相四目闢門闕䕫牛一脛踔階戺貌似心猜未必然賴君注釋車南指及手植檜印章等詩可見也字畫正書八分皆有功詩最其所長少時猶失持擇近詩精深峭刻似其為人他文不及也明昌以來以神童稱者五人太原常添壽四歲作詩云我有一卷經不用筆寫成展開無一字晝夜放光明合河劉滋文榮六嵗有詩云鶯花新物態日月老天公劉微伯祥七歲被旨賦鳯凰來儀新恩張漢臣丗傑五六歲亦召入賦元妃素羅扇畫梅云前村消不得移向月中栽其後常隱居不出餘三人者皆無可稱道獨知幾能自樹立一日名重天下耆舊如間間公且以徴君目之而不名也壬辰歲遇亂卒年五十平山常仲明之子德葬之小商橋傍近趙㽵賦伯玉透光鏡太隂淪魄元不耀太陽分光成二曜嗚呼怪銅盜此幻透影在壁與背肖奩開㸌㸌光走庭劃如剸犀乍脫鞘泓澄秋落百丈潭疑有龍向天門跳秦娃漢婉化鴛士寵雨恩雲埋鳯詔當年椒塗鑑桃李身後泉臺映蓬藋枕簟無情草木香笙歌不暖梟狐嘯髑髏一醜不再妍不知持此將安照萬斛珠璣委俑人喚得偷兒成鬼剽借問金椎一控時何如海上青蠅吊壽如金石佳且好此銘此篆兩竒峭今誰子後曩誰先贏得紐樞經蟻竅千古繁華一夢醒恍然入手稱神妙丹砂紫翠羽靑萬金難買人年少君侯新自洛陽來玉臺人物今溫嶠相看大笑古人癡收鏡入奩還自笑跋范寬秦川圖山水人傳范家筆畫史推尊為第一朅來因看秦川圖天下丹靑能事畢大山巖巖如國君小山鬱鬱如陪臣大石盤盤社與稷小石落落士與民一山一形似爭長一石一態如布軍想君胸中有全秦見鐻削鐻鐻乃真掌上長安近於日千樹萬樹生靑春憶昔岐山鳯皇語葱葱柞棫霑新雨昆夷束手密須降不見功勳見歌舞黃金鑄牛西入𤏡五丁雲棧通中國驪山宫闕九天髙六處孱王走銜璧不信詩書信法家關東半被魚書惑盡卷圖籍亦大好五十年凶都一掃章邯董翳舉如毛沐猴冠委金陵道北原兵自天而下漢室傾頽如解瓦祁山六出縱無功渭水猶堪飲君馬螭蟠老將骨未朽草付那能濟陽九技癢投鞭抵歲星歸來鹿死何人手神武空矜賀六渾投機常落周人後竟令馮翊軟沙邊東風一夜吹新桞侵尋皂角相料理拋擲龍津浮汴水鷁頭過處巳非隋不覺晉陽人姓李華淸髙宴戞宫梧舞馬如何護兩都縱得靑騾還蜀道肉得沙埸白骨無興亡自取不足吁可憐神州為盜區貪徴往古山川事忘却題詩賞畫圖松筅同希顔欽叔裕之賦犧尊靑黃災木命羈絆剪剔傷馬性折松為筅得之天此君幸免箋殘撗𥘉緣形似有代無不料竒功乃差勝人閒斤斧不須勞坐中活火鳴笙簫千秋蟄骨養霜雪一日奮鬛翻雲濤巖烟擊拂殷雷起顚風蹴踏銀山髙莫嫌勺水懦無力如捲三江都一吸借汝歲寒姿扶我衰朽質掃除幻夢不到眼洗刷埃霾下胸臆捫霞直與羡門期一笑桑田海波白竹癭冠為李道人賦東方有物字豐隆以鳴為職驅群聾萬頭濈濈囚凍窟欲出不出愁天公回寒作暖出一噫黑帝不敢藏昆蟲所以獨為六子長揮斥元氣周神功車轟鼓震頃萬里六甲雲風隨喚起四隂用事合收聲猶奮狂陽鳴不巳號令非時遭物玩草木不凋花再蕾惱得司秋訴帝􅕡漏泄機緘法當死天公大怪下桎梏推落車中墮巖谷非程非馬亦非人化作蒼莨一枝竹徑氣剛風難遽銷夜聞風雨猶蕭蕭聳身直上三千尺天公又怪干雲霄鬼壓神縳不聽出只見白雲鎖三日雲散唯餘靑屈盤頥隱於臍變仙質道人真是萬物盜斫取為冠就天巧秋霜爭敢上頭顱常與春風同醉倒此冠固竒惜未大有冠獨在方之外日月為藤織四時烟霞為樺綿千載天潢絶漢梁虛碧比斗旋衡簪沆瀣不隨脂粉侣狻猊不逐風霜陪獬豸一任旋乾復轉坤頭上峩峩終古在欲作檀那施此冠不識先生苦為戴彈琴懷山中人門前雪垂垂室中理朱絲手按十三徽心飛天一涯故人渺何許萬里驚鴻飛試慿朱絲語一聲聲亦悲一彈雪欲落再彈雪正作只在此山中故人今憂樂我欲彈文王岐山雲渺茫我欲鼓曽子無田可耘耔道逺望不及千山復萬水思君復思君正恐須髯皤后䕫若不來奈此宫商何春風早晚起百鳥喧庭柯時携一尊酒為君奏雲和夏日亭柯碧合龍蛇影睡起轆轤鳴曉井一簾曉雨捲不晴槐花滿地黃金冷屈指西風又到門相思團扇欲生塵何時萬户垂楊裏髙揖金鞭逢故人牛嘆誰憐宿料一生無身後仍遭金十奴帷蓋却教蒙狗馬不知何事負農夫淸明村村榆火碧烟新拜掃歸來第四辰城裏看家多白髮逰春總是少年人暮春山家二首山煙向晚白濛濛人過梨花樹底風一犬不鳴村徑黑野燈孤起逺林中語䦨壯氣欲消磨奈此青燈永夜何壁上取琴彈一曲不知天外落銀河手植檜印章梁折山摧入小成日華留得寸暉明不盈一握空蟲篆未喪斯文粗姓名草木西周朝有暮圖書東觀死猶生二千年後司封細未信栽時出此情贈𥙿之向來三度見君詩常望西山有所思誰料并州天絶處相逄梁苑雪消時賢人樂古聲猶在聱叟文髙丗豈知只恐神嵩不留客秦川如畫渭如絲秋懷江山如畫衣冠盡蒲柳無情宫殿秋亦用此韻者也昨夜新凉御褐裘一番節物弄淸愁月懸雙杵若為夜人在一隅偏覺秋敗葉只能驚畫扇啼螿終不到朱樓還鄉夢斷寒衾曉依舊雲山是蔡州和伯玉食蒿醬韻九尺東方生不如一侏儒飲啄各有程厚薄與生俱文蒲及屈芰何乃淡以枯正如謝三旌甘心作羊屠伊蒿本薪材豈足克庖厨薄雪草堂徑新霜古城隅河南地差暖冬有不死蕪靑來澗邊筥緑入几上盂微香能侣菊小苦賢於荼酷烈變醯醢薰醲破脂酥書生喜倒說食亦變精麁借問冰茶者何如羔酒乎况爾蓼彼蕭蓬茆固其徒偶然躐一等遽欲忘樵夫邇來歲頗饑太半殣在途攘肉或至犬首丘不如狐命賤秪求死計窮交議逋尚有紈袴兒朝夕食於株寧知掃野椑一飽不易圖遂令人輕生不畏鑕與鈇如君有蒿醬猶是千金軀復次韻五臟太多可張頥託臞儒自非何曽家安得陸海俱莊周幸有粟不至魚肆枯何勞夷門市下車朱亥屠春韭與秋菘歲晚不供厨蒿腹不蒿目大方果無隅為醬非負口猶勝范萊蕪豈無靑精飯駐顔炊一盂豈無菖蒲歜辟邪如神荼又豈無椒花除瘟等酴酥蒿於數品中頗同武官麁數品雖異饌置之醬可乎猶材各有施豈必皆吾徒公綽優為老劣於滕大夫大抵食如士取之非一塗君詩志其味食經有董狐彼哉黿羹指斫棺終莫逋彼哉萍虀手竟死珊瑚株寧如醬以蒿不出本草圖蓋後人好竒一洗腥砧鈇為謝饞祟鬼渠今離我軀又翌日又為履道所戲其意似欲窮吾技再和前章書呈伯玉菣可為炙啖博哉釋草儒奈何騷人詠不與蘭茞俱靑靑發陳荄嫩勝梯生枯靣柔似張禹氣冽如申屠忽逢易牙口一日登君厨君兄昔在日作事太廉隅遊宦三十年不治一室蕪嘗載米之郡政如置水盂不義獲八珍棄之猶堇荼相對話終日茗碗無鹽酥見客惟恐遲遇飯不擇麁無食但有名窮不亦冝乎我本寒素士卧雪袁司徒臭味偶相似豈是敦薄夫見君食蒿醬取嘲於仕途和君蒿醬詩緼袍隨衣狐詩醬兩情苦此債無由逋蒿荻無棄材奈此蒼松株何當列鉶瓮一依饗禮圖唯聞廣庭樂不見轅門鈇此日雖無醬猶堪養羸軀元𥙿之以山遊見招兼以詩四首為寄因以山中之意仍其韻石華政可採負我孤舟蓬胡為紅塵裏擾擾槐安宫山間緑蘿月一照千巖空洪崖去不返淸游誰與同空餘松根泉雜佩流無窮人心墮泥滓不如與天通舉頭視霄漢浩露洗心胸日月兩角蝸天地一粒粟老盆可徑醉豈擇瓦與玉大笑區中人朱門丐梁肉淸曉登少室日夕眺王屋紫煙晞我髮碧霞貯我腹溪中有白雲萬事付濯足物物愜幽情不獨蘭與菊南風入桂樹髙葉碧崢嶸舉手戲攀折上與雲煙撐黃金間白玉遍地先晶熒笙簫坐間發鸞鶴空中鳴浩歌山谷應起舞衣裳輕一尊石上酒如我浩氣盈目送飛鴻盡靑雲萬里平國風久巳熄如火不再然流為玉臺詠鉛粉嬌華年政須洗妖冶八駿踏芝田靑苔明月露碧樹凉風天塵土一一盡象緯昭昭懸寂寥抱玉辨爭竟搖尾憐幸有元公子不為常語牽許方村即事聮句體披熱逹許方山巔靑漫漫野黃麥初割畦緑蔬才灌村籬檾葉深巷樹春花亂煙長見新治風逺聞淸煆濯衣女在溪販鐵人栖館墻危壘破石路黑沾遺炭山雲頃刻雨沙地須臾暵鐸鳴駕犢耕罩密防雞散繅餘殘繭挂釣罷么系貫沽酒有客賖鬻李何人喚朴慘官始威牒煩民更玩歷險小車多逢人黯衣半縣逺肉難求山近寇可逭何當卜隱居尋我杖藜伴梁山宫圖梁山宫髙髙切雲秦家簫鼓空中聞宫殿作雲王作龍何人敢謁滈池君珠圍翠繞窮天下道上行人衣半赭不覺生靈血液枯化為宫上鴛鴦瓦朝盧生暮侯生師事二人學羡門焉知以政藏其身神仙亦死何曽神空能詐取六孱國不識盧生真間客種成間隙盧生去尚令道士作鬼語祖龍竟墮此機中以璧見欺猶未悟魚腥引得扛鼎來梁山火滅漢旗開何如後丗丹靑手一夫不役千樓臺梁山之圖却傳丗梁山之宫安在哉跋伯玉命簡之臨米元章楚山圖巴東峽壁如駮霞天鑿荆門當虎牙下有奔湍沉碧沙直衝北顧如投家雲煙昏曉互明滅朝看沃日暮吞月逺山如指近如奉過客那知空一瞥髙人廬此恨來晚不厭孤蓬疊往返莫言造物好窮人許大乾坤冨君眼以心為鏡照諸山山如人靣紛殊顔扁舟日日靑山上靑山却在滄波間人道癡兒固貪取我怪髙人亦如許巳將胸次祍長江更把豪端扛巨楚薺列楓林葉浮舸巧促魁梧入么麼丈尋收拾無邊春千里逰邀坐中我自此頭吳尾甌越蠻烟五月髠人髮江山多處乃爾毒始信中原天下甲楚山可覽不可上水氣昏昏且多恙畫山縱不到真山有楚之峯無楚瘴靜明居士見山饞想在庵中得飽參戲呼老李臨君畫已坐君貪我更貪秋雨小霽湖陽道中一雨𥘉晴菊瘁花朝來啼殺報晴鴉地鄰異域空懷古人對殘秋更憶家十月紅爐是明日往年新火醉流霞忩忩又上湖陽道何處還堪駐客槎秋望雲氣東南壯風煙正北長逺人投屋小寒草帶城荒馴鴨便秋潦飢牛背夕陽間情儘堪畫未要雨浪浪堂溪城南感寓斷岸崩崖帶草長茂林髙塏晚生凉田頭經水成駒卧雲色因風變狗蒼戰地尚餘唐壘柵故城曽入楚封疆牛童趂日貪捫虱那解興亡事可傷俳優施能賣晉移君二旃解譏秦救陛郎多少諌臣翻獲罪却教若輩管興亡李道人家山圖見說髙齊住太行溪山襟帶古祠堂圭桐葉落周家雨鐵樹根盤晉國霜烽火不堪耕夜月畫圖猶可掛殘陽自憐不及汾川鴈春去秋來過石梁李道人嵩陽歸隱圖城郭維崇井里維通冠蓋維錯紈綺維藂云誰之子招子歸嵩舍我箏筑樂彼潺淙食彼瓦缶遺我鼎鍾云誰之子繪子歸嵩離人友鹿避俗朋松石嚙我足泉癭我嚨吾恐時人笑子歸嵩有山有怪有水有龍盜出寇沒嘯兕咻熊吾恐狂人誑子歸嵩子謂我言决意歸嵩歸嵩何如如鴻避弋如鶴脫籠與幻俱化與化俱融是以歸嵩南山重重翠如植葱北山隆隆紺如堆銅仰嵩俯嵩雨濯雲烘嵩之為我我之為嵩我聞子言衣如張風心先去鳥層雲蕩胸靜言思之冨為目蒿貴為心蓬飾說于令詎知任公歸嵩良是生龜脫筒子不歸嵩送子歸嵩陽夏何正卿作疊語四句未成章豫復以疊語寄之凡四變文緼緼蠢蠢何等民矯矯亢亢內守真昂昂藏藏獨異俗落落莫莫不厭貧歸與歸與且糊口鳯兮鳯兮德衰久樂云樂云無絃琴命乎命乎一柸酒匪鱣匪鮪故為藏避言避丗必也狂至大至剛秣吾馬爰淸爰淨修我牆用之捨之時所係晉如摧如寧復計暖然凄然任春秋優哉游哉聊卒歲紅梅一種冰魂物巳尤朱脣點注更風流歲寒未許東風管淡抹穠粧得自由劉御史從益從益字雲卿南山翁撝之曽孫大安元年進士拜監察御史坐與當路者辨曲直得罪去久之起為葉縣令修學講義聳善抑惡有古良吏之風葉劇邑也兵興以來户减三之一田不毛者萬七千畝其歲入七萬石故在也雲卿請於大農為减一萬民賴之流亡歸者二千餘家未幾𬒳召百姓詣臺乞留不聽入授應奉翰林文字踰月以疾卒時年四十四葉人聞之以端午罷酒為位而哭且立石頌德以致哀思之心焉雲卿博學強記於經學有所得為文章長於詩五言古詩又其所長雷御史說雲卿在太學時年甚少嘗有詩云黃金錯落雲間闕紅粉髙低栁外墻時輩皆推伏之其卒以詩得名者固巳見於此矣雲卿詩如荒烟斜日村村晚衰栁寒蒲岸岸秋兩鄉留寓風黧面千里相望月滿襟子美不妨衣露肘長卿猶有賦􅓸雲春雪云千層寶樓閣一片玉山川臨終云壞壁秋燈挑夢破老梧寒雨滴愁生此類甚多不能悉載也有蓬門先生集行於丗二子祁字京叔郁字文季俱有名於時題蘇李合畫淵明濯足圖天機本自足人事或相須東坡畫三昧乃與龍眠俱黃州冨丘壑餘杭渺江湖巳困口嘲弄更堪手糊塗其來本遊戲所到非功夫平生斜川翁尚友千載餘可聞不可見風摽定何如笑倩李居士為豫巧形模臨流想有詩滄浪元非漁不入聲利埸政恐吾足汚二公有深意百年留此圖不著色塵相淡然如游天地𥘉主人牢緘縢丹靑有渝此不渝過尉氏懷阮籍朝來國門逰暮抵蓬池宿有懷阮步兵豪氣無撿束嘯歌陟髙臺長風振林木老眼何曽靑四海無一物萬古留詩名九原消醉骨居然方丈家惜也微瑕玉塗窮道不窮先生安用哭泛舟回瀾亭坐中作昔年醉回瀾猶恨身屬官今年邂逅來身與亭俱間洗心亭下水照眼亭西山溪山如故人喜我復來還有酒澆我胸有花怡我顔韝鷹乍脫臂但覺天地寬山隂忽回船夜䦨情未闌樂山松樂山一何崇上有千嵗松淸孤月露底秀拔天地中蒲柳抱常質桃李開芳容爭如十八公笑傲冰霜風居然喜避丗不肯汚秦封蟠如北海螭伏如南陽龍紛紛過者多匠石終不逢明堂幾時搆喚起蒼髯翁和淵明雜詩俗士苦紛競此心本無塵功名乃外物了不關吾身吾身復何有形神假相親天地開一室日月挾兩鄰有生即有化如晏之必晨但得酒中了亦足稱逹人揮戈欲却日小力自不量何如任天運閉門坐齊芳詩書列四隅著我於中央夏臥北窗風隆冬曝朝陽但有藜藿羹亦足充飢腸少為飢所驅老為病所迫人生能幾何東阡復南陌急須沽酒來一笑舉太白浩歌草木振起舞天地窄同歡二三子誰主復誰客浮沉大浪中畢竟歸真宅歲月去何速老炎變新凉遊子久不歸回首望大梁風埃慘如此何處真吾鄉野菊明落日林楓染飛霜勸我一柸酒悠然秋興長和淵明始春懷田舍家食自不惡菽水甘清貧學道未有得讀書亦良勤雖勤竟何補俯首愧古人靜言閲丗故來者日月新况復抱沉痾百憂無一欣安得衛生訣益我華池津恍如一夢覺不與萬法鄰野人借問我恐是劉遺民和淵明飲酒韻日入了公事援琴洗塵喧秋堂一燈明清響到夜偏彈罷枕書臥渺然夢靑山山英向我問君駕何時還家僮忽喚覺惆悵不能言臘日次幽居韻丗務方擾擾人生何營營不如不出門坐頥天地情泰中有否來隂極即陽生掀髯一笑起窗外風鐸鳴看雲偶獨立踏雪時間行最愛朝日外負暄向南榮歲除夕次東坡守歲韻人生都百年誰問鬪龜蛇容顔鏡中換老醜不可遮殷勤守此嵗來歲復如何南鄰祭竈喧北里驅儺譁須臾罷無為但聽樓鼓撾明朝四十過暮景真易斜初心自慷慨白首還蹉跎寄語少年子雖健不足誇次韻别歲一日復一月其來不肯遲一冬復一春既去誰能追問嵗果安往懵不知津涯常於歲除夕知是相别時鄰翁慣禮餞買酒烹鮮肥百挽不得留一别那須悲年年例如此華髮吾何辭惟有學道心自覺老不衰次韻餽歲親朋餉無時鄰里歡有佐况當歲之終可以具百貨禮意各示勤手假不妨大我貧無往還閉户但髙卧藜羮且充腸珍味不登坐猶勝許文休衣食出馬磨自非楊子雲載酒何人過空吟餽歲詩自歌還自和淸明即事用前韻一度淸明了一年溫風嫋嫋雨班班幾家繡幰尋芳去何處蹇驢䭾醉還宿草新墳驚丗短落花流水占春間曉鶯啼破松窗夢缺月東南掛屋山五月十四夜對月有感丗事易隨雲變滅人生難保月團圝淮陽旅舍三年夢河朔風聲五月寒何處雲山端可老向來天地為誰寬宦游腳底生荆棘蜀道而今却不難再過郾城示伯玉知幾三年兩度過溵陽鞍馬紅塵道路長花月不應知我老溪山也解笑人忙朔風凛凛頻驚坐夜雨蕭蕭偶對床他日水南營葬地愧無遺愛在桐鄉次韻間間公夢歸眉間喜色幾時黃滿貯羈愁著瘦腸萬里鄉關飛不到十年歧路走空忙杯心蘸月松梢影鼻觀通風柏子香最愛南山舊山色夢中相覔不相忘題間間公夢歸詩後用叔通韻學道幾人知道味謀生底物是生涯莊周枕上非真蝶樂廣柸中亦假蛇身後功名半張紙夜來鼓吹一池蛙夢間說夢重重夢家外忘家處處家送儀提點西歸自斷平生不問天拂衣歸去任吾年五侯鯖飽無多味九老圖成又一傳叵首京華瞻日逺放懷鄉社得天全綸巾醉卧咸陽市始信人間有散仙再賡人定端能坐勝天刀圭有力制頽年道非出丗頭頭是丹不遺經口口傳隂魄沉迷終鬼録陽精飛錬即神全三山縹眇誰能到目下身安亦是仙次韻李公度瓶有儲糧鬢有絲蹉跎歲晚坐書癡輞川畫隱王摩詰錦里詩窮杜拾遺應舉尚陪新進士主文半是舊相知春闈看决魚龍陳未必尖錐勝鈍錐題無盡藏梁斗南所藏畫誰開天地祕密藏今古人間用不窮眼尾搖光千丈月耳根傳響一溪風勝游赤壁文章在髙卧燕山氣象同二老風流渺何許後生猶可畫圖中三弟手植瓢材且有詩豫亦戲作為愛胡盧手自栽弱條柔蔓漸縈回素花飄後𥘉成實碧䕃濃時可數枚試問老禪藤繳去何如遊子杖挑來早知瓠落終無用只合江湖養不才次韻三弟贈南庵老人一庵礴勝巢仙不入叢林怡是禪花圃蓮塘間打景粥盂齊鉢老隨緣忘言巳了八千偈適意更揮三兩絃邂逅我來推不去坐分一半好風煙次韻劉少宣旅窗蝶夢曉驚回默數流年秪自哀與丗迂踈甘袖毛及身強健且銜柸桐雕翠葉看看盡菊著黃花旋旋開杖屨南庵訪幽事秋光滿眼送詩來酬李子遷曽著朱衣侍冕旒忽乘羸馬出皇州靑山有約携琴往白髮無成把鏡羞却笑張儀誇舌在不妨巢父有詩留柳湖莎徑東南夢又見兒童迓細侯過洧川次侯生君澤韻誰能孤憤效韓非且喜玄微對鏡機出得山來無逺志寄將書去有當歸間居巳判平生了真賞從教舉丗稀日咀道腴深有味更須口腹事甘肥聞蛬用少陵韻唧唧不堪聞村居更惱人靑衫傷久客華髮念雙親嵗莫那逢雨秋宵未向晨石心猶可轉百感本來真除夕用少陵韻窗送迢迢漏燈開艷艷花正愁聞過鴈久客羡栖鴉放眼春猶好驚心日又斜一蓑江上雨歸思浩無涯即事卧疾劉公幹躬耕鄭子真溪山留好客天地許間人花醉紅沾袖松吟翠繞身捫心無所歉持此壽吾親宋樓道中十里羊腸路詰盤過花穿柳幾回還馬頭忽轉靑林角緑繞人家水一灣過武丁廟旱則為霖水則舟若人端合夢中求荆王枕上陽臺雨板築英雄老死休戲答侯威卿覔墨萬松火厄化緇塵依舊徂徠雪裏春冷劑香螺䕫一足破慳分與畫眉人宫中取張遇墨燒去膠以之畫眉謂之畫眉墨北園碧梧斜影落胡床白葛烏巾滿意凉宴坐不知紅日晚笋輿歸路麥花香宋內翰九嘉九嘉字飛卿夏津人黃裳榜進士乙科歷藍田髙陵扶風三水四縣令皆有能聲入為右警巡使應奉翰林文字正大中病失音廢居殁於癸巳之禍嘗有詩云浩歌風露下醉袖拂南山又題壽安煙霞亭云粧鑾土壁紅千點界畫銀沙緑一鈎其才藻可略見矣途中書事三首幼稚扶輪婦挽轅連顚翁媪抱諸孫飢民羸卒如流水掘盡原頭野薺根老稚扶携訪熟鄉驛塵滿路殣相望終朝拾穗不盈把只有流民如麥芒攘絲奪麥人爭略烘日吹風天有年湯餅元非小人腹繭絲都作大夫賢館中納凉書事凉灑塵纓聵耳醒虛堂窈渺好風淸雀知愛子來回哺鼠不畏人旁午行每用熟眠酬􅞔寂端知固有享髙明宦游非不佳官府奔走塵勞漫一生東州有感東城衰草沒黃沙故壘周遭小范衙牧竪那知真老子龜趺繫馬卧吹笳搗金明寨作建除體建牙誓諸將梟鳴軍盡驚除道非戰事銜枚幻竒兵滿鎧霜日輝行陳寂無聲平旦飛出谷桑棗蔽金明定知此陳迹中原遮寇城執鞭吾不及范公凛如生破碑字仍在屭贔卧深荆危襟按其壘信哉天下英成敗翻覆手狐兔今橫行收復㑹有時夷吾當請纓開圖聣督亢按劒逐長鯨閉塞亦巳久一揮氛曀淸𬒳檄從軍不巾不襪柳隂行朝醉南村暮北㽵一旦捉將官裏去直驅盲馬陳中央即所乘盲馬而言留别孫俊民姚公茂草根殘日射離觴主席風生熱肺腸此去兜零紅照夜輸君吹笛傍糟床酴醿菊酴醿風味醺人醉著莫東籬愛酒翁一夜金英全換骨冷香晴雪滿秋風蓮社圖野鶩家雞俗好乖虎溪泉石滿塵埃壯哉砥柱頽波裏惟有淵明挽不來飛卿不喜佛法自言平生有三恨一恨佛老之說不出于孔氏前二恨辭學之士多好譯經潤文三恨大才而攻異端淵明挽不來之句蓋自况也卯酒臘蟻𥘉浮社瓷篘宿酲正渴卯時投醉鄉兀兀陶陶裏底是形骸底是愁雷御史淵淵字希顔别字季默同知北京路轉運使事思之季子崇慶二年黃裳榜進士甲科釋褐涇州録事徐州觀察判官召為荆王府文學兼記室參軍轉應奉翰林文字同知制誥兼國史院編修官拜監察御史以公事免用宰相侯莘卿薦除太學慱士還應奉終于翰林修撰𥘉在東平東平河朔重兵處也驕將悍卒倚外寇為重自行臺以下皆務為摩拊之希顔􅊩官自律者甚嚴出入軍中偃然不為屈不數月閭巷間家有希顔畫像雖大將亦不敢以新進書生遇之嘗為户部髙尚書所辟櫂遂平縣事時年少氣鋭擊臺右發姦伏一縣畏之稱為神明及以御史巡行河南百姓相傳雷御史至豪猾望風遁去正大庚寅倒回谷之役希顔上書破朝臣孤注之論引援深切灼然易見而主兵者沮之䇿為不行至今以顧望為當國者之恨希顔三歲喪父七歲養於諸兄年十四五貧無以為資乃以胄子入國學便能自樹立如成人不二十游公卿間太學諸人莫敢與之齒渡河後學益博文益竒名益重為人軀幹雄偉髯張口哆顔渥丹眼如望羊遇不平則疾惡之氣見於顔間或嚼齒大罵不休雖痛自摧折然猝亦不能變也生平慕田疇陳元龍之為人而人亦以古人期之故雖以文章見稱在希顔仍為餘事耳雲卿父子有宛丘之行作二詩為餞陽春到上林百卉紛白紅岸谷稍敷腴溪光亦冲融獨有石間柏不落鼓舞中期君如此木歲晚延淸風漢庭議論學傾耳待歆向君家賢父子千載蔚相望讀書二十年閉户自師匠異端絀偏雜陳言刋猥釀剛全百鍊餘氣出諸老上頽風正波靡去去作隄障京叔將拜掃于陳徴言為贈老懶廢學茫無所得獨記其與屏山雲卿襟期所在者非以為詩也梁苑池塘生緑煙吹臺草色春芊芊故人幽扄閉長眠氣槩英英猶眼前陽春無力蘇重泉孝子感時涕泗漣匍匐歸掃淮陽阡徴豫贈别意拳拳我自頑頓須人鐫安能視後輒子鞭姬情孔意星日懸斡旋萬化中持權斯文興喪實關天尋常墨客技藝然醫巫星曆相比肩何用雕琢空徂年即今海縣謾腥膻獨挽洙泗可洗湔乃公有志屏山賢二豪在日豫牽連傷哉未售墳巳顚老我欲種南山田子之兄弟其周旋事業絶勝空言傳同𥙿之欽叔分韻得莫論二字幼安謝辟命子雲老寂寞趨嚮豈獨異時命非所度我久困流離一㕓求負郭雖無斬敵功尚舉力田爵嵩少啓吾封四履盡伊洛有客來問津醉眼入寥廓丗事久閉眼終日只睡昏淸風何處來佳客巳在門倒屣往從之玉色向我溫妻孥趣作具歡喜傾瓶盆淸夜襆𬒳往共就遺山元嘲謔及俳語發揮閒微言懸斷漏天樞髙嘯驚鄰垣吻合政相和意到俄孤騫恨不倒囷廪矧肯留籬樊弃屩獲珠玉披榛見蘭蓀我肱巳三折醉墮偶全渾知無適俗韻量力任灌園二君淸廟器巾羃華罍尊蒼生望休息朝廷待崇尊出處既異途㑹合難預論此樂未易得此夕勿憚煩白酒舉𥘉子黃雞溷諸孫水樂喧後部山鬟秀前軒一醉萬事休啇聲滿乾坤㑹善寺怪松物生自有常怪特物之病嗟嗟此老蒼怪怪生魁柄侏儒蹙髀股宿瘤擁腮頸蜿蜒蛟龍戲騰擲貙虎競須髯喜張磔意氣怒狂迸匠石求棟楹節目足譏評芻蕘急薪槱堅悍空盻瞪靜言觀倚伏未易相吊慶雖違時丗用顧免斤斧撗陽秋莫榮悴歲月何究竟盤盤曲則全挺挺獨也正小草悮掃迹伏神還守性儻隨天中景廣宇共庥映玉華山中同𥙿之分韻送欽叔得歸字洗耳潁川水療飢西山薇山川得佳客草木生光輝末路風教薄此道日巳微相期千載事非君誰與歸九日登少室絶頂同𥙿之分韻得蘿字間居愛重九佳人重相過登髙酬節物少室鬱嵳峩迤邐謝塵土夷猶出煙蘿歘如據鰲頭萬壑俯蜂窩浩浩跨積風濔濔渺長河日車昃紅輪天宇凝蒼波指點數齊州始覺氛埃多我無倚天劒有淚空滂沱驚鱗盼奧渚倦翼占危柯悔不與家來結茅老巖阿歸途眷老阮廣武意如何月下同飛伯觀畦丁灌園得畦字村居鄰老圃喘汗憫夏畦轆轤健晚凉月輪轉天蹊剡剡金融溝㳙㳙冰冸溪黃萎漸蘇息緑潤俄凄迷生意續夜氣甘滋浹新荑風露觸處香河漢望中低野人無逺謀且喜豐食鮭雖愧下帷董稍悟養生嵇歸懷自浩然流光挹平西濟南珍珠泉大地萬寶藏玄冥不敢私抉開靑玉罅渾渾流珠璣輕明疑夜光潔白真摩尼風吹忽脫串日射俄生輝有時如少靳觱沸却纍纍風色媚一川老蚌𥘉未知君看一日間巧歷所不資逰人隨意滿不卑乾沒兒吾謂歷下城繁華富瑰竒貪夫死專利帝意憐其癡故露連城珍可玩不可幾若曰天壤間所遇皆汝資何必祕篋笥自貽伊瑕疵詩成一大笑臆說量天機讀孔北海傳漢室風流絶建安老瞞父子力排山可憐魯國真男子也著區區七子間賦侯相公雲溪相君襟度本汪洋戲鑿陂池便渺茫解起晴雲作霖雨更邀明月貯淸光千重復嶺藏仙境萬斛香泉釀醉鄉畢竟麟符拋不得煙波空效五湖蒼贈陳司諫正叔洗兵有志挽天河補衮剛留諫諍坡賦出石腸還婉麗政成鐵靣却中和寒侵桃李淒無色雪壓池塘慘不波急手尊前謀一醉六街塵土涴人多濟南泛舟水底見山有感而作南山巳在風塵外更恐飛埃涴碧巔一棹晚凉波底看浴沂靣目本天然洛陽同𥙿之欽叔賦日上煙花一片紅嵩邙西峙洛川東才聞候騎傳靑蓋又見牽羊出絳宫事去關河不撗草秋來陵寢但飛蓬書生不奈興亡恨斗酒聊澆磈磊胸啓母石同𥙿之賦千古崩崖一罅開強將神怪附郊禖無情頑石猶胎謗貝錦從為巷伯哀贈答麻信之并序麻弟避兵渡河徑謁𥙿之于嵩髙夤緣一見相與之意甚厚既留數日又將過吾景玄于女凡之隂維元劉國士也而弟游於其間則弟之為人可知巳臨行復長歌相贈淸平豐融蓋他日未易量也愛仰不足詩以送之五老英靈未陸沉一枝髙秀出詞林圭璋自是淸朝器律吕偏諧治丗音此去文章足知已後來功用只齊心濟時相約元劉了索我雲山深復深雪風定雲仍暖天圍四顧低紛紛俄攪野浩浩欲平溪樵檐歸時重漁舟望處迷飢鴉空繞樹若箇可安棲宫鴉萬樹瓊芳鎖漢宫群鴉容與五雲中曙光先背朝陽日春信頻呼禁籞風靑鬢巧梳欣一色秀眉學畫鬪新工鳯樓未訝啼聲切愁滿長門信未通洮石硯緹囊深復有滄洲丈室春融翠欲流退筆成丘竟何益乘時真欲礪吳鈎馬上見桃花九衢鞍馬苦塵腥忽見溪桃倦意醒未必施朱便麁俗最憐滌露出娉婷城東詩老圖幽絶水上仙郎記窈冥何似玉堂留故事賣花擔上有丹靑叔獻兄歸隱嵩山有詩見及依韻奉寄幾百千年一敬通飄飄歸袂振孤風平生自處神明在衰俗無從議論公韶簫向來儀彩鳯弋繒何苦慕冥鴻他年杖屨相尋處三十六峯雲霧中劉御史雲卿挽詞二首氣幹參天擬萬尋聖門梁棟自堪任豸冠嶽嶽鋒稜峻鳧舄翩翩惠愛深可忍佳城玉埋土最哀慈幄血霑襟傳家賴有雙珠在不爾何如慰士林少同里閈早知音投分交情雨舊今鄉校聮裙春誦學上庠連榻夜論心南山松桂愁霜殞北地乾坤恨日侵不得生芻躬一奠西風吹淚滿衣襟題黃華江臯烟樹二首踈桞靜茅亭亭下長江路不見亭中人蕭蕭烟景莫江山萬里眼一亭略約之黃華未死在看取畫中詩送李執剛致仕歸洛漕計中興屬老成引年陳請獨崢嶸果能辦此公真勇愛莫留之我愴情塵坌恐驚黃鵠舉烟波不負白鷗盟洛陽去去春如錦晝日神仙看地行梨花得紅字雪作肌膚玉作容不將妖艷嫁東風梅魂何物三春在桃臉真成一笑空雨細無情添寂寞無情亦作淚痕月明有意助豐融有意助亦真態更相如病渴妨文賦想像甘寒結小紅河山形勝圖髙峯巨塹與天連中國關防表裏全北岸塵氛重回首不如圖上看風煙次𥙿之韻兼及景玄弟名腸相焮半成灰戰退紛華斾始回文字喜逢修月手津梁愧乏濟川材等間有酒輒共醉信口俄詩不置才最憶平生劉子駿紫芝可惜不偕來愛詩李道人若愚嵩陽歸隱圖我家嵩前凡再朞詩僧騷客相追隨春葩􅌭紛香澗谷夏泉噴薄淸心脾霜林置酒曵錦障雪嶺探梅登玉螭重陽夜宿太平頂天雞夜半鳴喔咿整冠東望見日出金輪湧海光陸離神州赤縣入指顧風埃未靖空噓欷窮探極覽不知老泉石佳處多留題簡書驅出踏朝市期㑹迫窄愁鞭笞襟懷塵土少淸夢齒頰棘荆真自癡叩門剝啄者誰子道人靣有熊豹姿披圖二室忽當眼貫珠編貝多文辭我離山久詩筆退摹寫豈復能淸竒東風吹客衣敗絮逐風飛曉雪沒寒薺無物充朝飢空簞嘖嘖號飢鼠叨虱蠕蠕緣破袴人生豈是犬與雞終歲區區守門户遊說萬乘苦不早儀秦殆是穿窬盜六國印千金車滿眼榮華鏡中老孔子聘列國孟軻遊濟梁能令千載後名與日月光男兒生丗不虛生死恨身後無聲名不然鳴玉遊紫京不然著書談六經九日可射天可𥙷鞭笞百蠻作降虜離騷一篇亦不惡雄筆盤盤映千古君不見彩鳯翔丹霄一鳴應九韶寸雲起太山霖雨滿人間丈夫窮逹果在天安用兒女得志相歆羡失志相悲憐仰天大笑出門去四海今誰魯仲連夜宿虛皇閣下倚天靑壁截雲霞一水髙懸界削瓜不惜竛􅿓攀石磴要看絢爛坼雲華玉峯影裏虛皇閣鐵笛聲中祕監家明日川塗入塵土却應平地幾褒斜玉華谷同希顔𥙿之分韻得秋字玉龍落峽噴飛流空翠霏霏晚不收軟腳山堂一壷酒暮凉間對兩峯秋四皓圖弋繒安足致冥鴻自是兼懷翊贊功謾說壷關有遺老望思臺上巳秋風韶華過眼弦上箭人生得酒從歡宴北斗闌干夜參半耿耿踈星淡河漢追憶潁亭泛舟寄陽翟諸友十月冬氣寒淸霜殞群木輕舟泛潁水微風吹野服信流不知還石艇撗老玉苔花錦斕班懸溜珠䍡􅝹頗離㕓市雜倒㵼軒裳俗歲月今幾何春草萋以緑懷歸劇飢渴仰羡雙飛鵠矯首九山雲迢迢傷逺目郟城秋夜懷李仁卿日入羣動息暝色隂濛濛故人隔潁水嫋嫋生秋風輕風捲纎雲碧漢磨靑銅坐久襟袖凉皎月升天東伊人如此月霽色羅心胸可望不可親倐巳駕飛鴻念此太虛間心交神自通而况千里月相望寧不同孤光透薄帷儼如接音容翻翻繞枝鵲唧唧侵階蛬上床轉不寐髙樓待晨鍾相思夜何永月落秋床空題飛伯詩囊飛伯以布為囊采當丗名卿詩投其中頴露毛錐秪自賢智如樗腹但求全迂踈差似淵才冨羞澀猶無杜老錢收拾珠璣三萬斛貯儲風月一千篇嘔心大勝奚奴錦要與風人被管絃送王飛伯歸陽翟物外根株本仙種丗間紅紫避嚴粧遨頭詞伯今何遜一笑詩成字字香丹陽觀竹宫中移賜素士如林侍紫淸紫淸新許住蓬瀛姢姢粉節霜勻出矗矗煙梢玉削成福地根莖蒙化育中天雨露惜恩榮緑章封事朝來奏又聽風前彩鳯鳴王右司渥渥字仲澤以字行興定二年進士調管州司候不赴壽州防禦使邦獻商州防禦使國器武勝節度庭玉愛其才連辟三府經歷官在軍中凡十年舉寧陵令未赴丁太夫人憂廬墓三年服除復授寧陵正大七年朝廷與宋人議和擇可為行人者仲澤以才選凡再至楊州制司宋人愛其才有中州豪士之目使還以寧陵課最遷一官入為尚書省掾三月即授太學助教充樞密院經歷官八年院廢權右司郎中中牟失利不知所終仲澤博通經史有文采善談論工書法妙于琴事詩其專門之學人物楚楚若素宦于朝吏事則與兾京父相上下其辨博又屏山所許天下談士三人之一也嘗與豫行內鄉止中馬上賦詩云霜風十月餘千山錦崢嶸又九日登潁亭見寄云茫茫襄城野歲晏多風埃野田半巳荒草蟲鳴更哀西風吹白雲大隗安在哉七聖之所迷而我胡為來我本林野人𥘉無經丗材失身鞍馬間坐令雙鬢摧安得元紫芝共舉重陽柸詩成西比望九山鬱崔嵬此詩脫遺處不復能記憶讀之尚可以見斯人胸懷之髣佛仲澤潁上詩不才𬒳棄翻為福拙計無營却似髙是處靑山可埋骨誰家白酒不消憂夕陽轉屋卧林影急雨壞橋喧水聲人喜傳之潁亭三載西湖阻勝逰潁亭聊喜散羇愁九山西絡煙霞去一水南吞澗壑流賔主唱酬空翠琰干戈橫絶自滄洲匆匆匹馬從軍去慚愧煙波萬里鷗有寄十年鐵馬暗京華客子飄零處處家征鴈久踈河朔信小梅重見汝南花棲棲活計依簷雀冉冉年光赴壑蛇舊雨故人應念我不來聮句夜煎茶寄京父憶昔相從在寢丘城南城北縱歡逰杏花聮句香隨馬野水添杯浪拍舟邂逅又成三月别飄零合負一春愁汝陽淮甸經行遍應有新詩為我留餐秀軒祕風幾日搖霜樾秋色南山兩竒絶野人窗戶終日開要看千秋秦嶺雪層崖深谷相吐吞落日白鹿東南奔野花雙塔古蘭若樓觀縹渺煙霞昏玉山生玉人不識草木四時空好色輞川舊與藍橋通細水至今流石室一川黃葉長安秋望望不見令人愁書生不是濟時具收得間身成此逰主人開筵留客醉山雨多情濕征𬒮明朝騎馬上七盤回首山家但空翠遊藍田甲申之秋月建戌我行商顔正落木山英似與行子期撥霧披雲到山腹古潭千丈照錦峰下有蟄龍上棲鵠髙風吹雪巳多時熊耳雙尖寒欲縮新乘一水出龍渦驚見千峯遮木槲南山秀拔北山雄劒㦸森然對羣玉﨑嶇直過藍田西始見商山真靣目悮真峽口忽中斷天末修眉畫濃緑此峽何年得此名曽有金仙構華屋西巖石室懸細水萬斛瓊珠輸輞谷行人尚說有七盤瘦馬巳愁疲百曲風門放眼望秦川擾擾更嗟塵界局去年游騎渡葭蘆萬里撗行如鬼速灞陵原下馬飲血太華峰頭虎擇肉今年九月未防秋始見登埸有新穀一鞭暮指古招提踈雨有情留客宿主人聞客喜相接尊酒笑談如昔夙蹇豫懶散本真性臨水登山此生足一行作吏志益違十載從軍雙鬢秃官家後日鑄五兵便擬買牛耕白鹿送𥙿之還嵩山髙懷不受簿書侵淸潁鷗盟欲重尋老去宦情知我薄間來道念見君深對床夜雨他年夢滿馬西風此日心嵩頂勝游誰得共仙聞仙馭待知音末句用古仙人詩語古仙人辭今附於此夢入雲山宫闕幽鸑鸑同侣鴛鳯流桂月竟夜光不收丗俗擾擾成囂湫醉飛星馭鞭金虬八仙浪迹追真遊龜玉筌蹄二十秋摩霄注壑須人求覔劒如或笑刻舟陽燧非無甪綺儔元鼎以來虛崑丘東井徒勞冠帶修松餐竹飲度蜃樓嵩頂坐嘯垂直鉤秪應慚愧劉幽州知音者無惜留跡興定庚辰夏六月望豫與河南元好問趙郡李獻能同遊玉華谷又將歷嵩前諸剎因憩於少姨廟元周行廓廡得古仙人詞於壁間然其首章直屋漏雨為所漫剝殆不能辨乃磴木石而上拂拭汛滌迫視者久之始可完讀觀其體則柏梁事則終始二漢字畫在鍾王之間東井又元鼎所都幽州必賢宗子虞也夫眷眷不忘幽州者非吾田疇尚誰歟田復所事之讎却曹瞞之賞衰俗波蕩中挺挺有烈丈夫風氣其死而不亡蓋無疑其能道此語亦無疑觀者不應以文體古今之變而疑仙語也噫仙山靈嶽宜有閎衍博大之真人往來乎其間而丗人莫之識也豫三人者乃今見之夫豈偶然哉再拜留跡以附知音者末渾源雷淵題此詩為仙語無疑然直謂田疇則似亦未安屏山李純甫題逰丹霞下院同𥙿之鼎玉分得留字霜落豐山白水收歲華全在竹園頭賦詩鞍馬慚真賞載酒林泉阻勝游野色自隨人意逺夕陽應為鳥聲留仙源回首旌旗隔一笛西風喚客愁丹霞下寺土人以竹園頭名之驛口橋看白蓮隂隂喬木障晴暉的的冰蕖照碧漪秋暑困人仍御扇晚風生竹却添衣百年蓬鬢關心切千里蓴羮與願違杖屨頻來約他日不妨先築釣漁磯蒙城縣齊榖雨連朝沒麥埸官糧未入長官忙階庭有雨靑鞋閙牢户無人白日長三門津層崖摩蒼穹四月號隂風大河三門險神禹萬丗功他山亦崔嵬砥柱獨尊雄雷霆日鬪擊悍暴愁天公劉侯智有餘始令舟楫通仍餘石上穴飛棧曽連空遙瞻白玉枝梃植丹竈中仙公去不返此事真冥蒙夫人與鼓崖怪幻尤難窮獨喜兵火餘巋然出新宫當時疏鑿意四海要㑹同誰知千歲後築壘防嘯凶詩成一大笑浩浩洪波東𬒳檄再至楊州制司驛亭有題詩譏豫和事不成者云來往二年無一事靑山也解笑行人因為解嘲二年奔走道途間知𬒳靑山笑往還只向江南南岸老行人應更笑靑山冀都事禹錫禹錫字京父龍山人崇慶二年進士調沉丘簿與縣令者不相能及令以贓敗疑京父發之乃賂遺權貴誣京父以賔客依託之事坐廢十年朝臣薦其才者積數十人終為銓曹所礙居襄邑部使者起之攝旁近諸縣所至有父母之愛農司治許昌又為主事區處餽餉上下千餘里不露聲跡而條畫次弟皆具雖鱗雜米鹽若不足經意者問之即應如指諸掌一時吏如康伯祿李欽止諸人多自以為不及也正大中當路諸公極力辨其𬒳誣乃得以常調守扶風丞召𥙷省掾不就歸德奏充知事及城𬒳攻京父為經歷官守禦之䇿一府倚重之車駕至授左右司都事兼應奉翰林文字官奴之變家人勸京父羸服免禍不從人有自外至者京父問賊入禁中否曰禁中賊滿矣乃自投水中在京師時希顔仲澤欽叔京父相得甚歡升堂拜親有昆弟之義而不肖徒以文字之故得幸諸公間希長豫六歲澤長四歲欽與京少豫二歲希殁於正大辛卯之八月年四十八澤殁于明年之七月年四十七欽殁于其年十一月年四十一歲京殁于又明年之三月年四十二蓋不二三年而五人者唯不肖在耳今日録諸君子詩感念平昔不覺流涕之被靣也僧房上方樓觀夾衣寒霜後川原眼界寬我是禪房未歸客阿師休作長官看贈雷御史兼及松庵馮丈平生疾惡如風手力振臺綱事所難人道千鈞羞射鼠我憐衆喣解漂山明時士論知無負晚歲交盟豈易寒見說嵩前茹芝老白雲倚杖待君還中州己集卷終
