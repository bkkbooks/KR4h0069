body:
  text: 吳內翰彥髙五首蔡丞相伯堅一十二首蔡太常正甫一首髙內翰士談一首劉內翰鵬南一首鄧千江一首趙內翰獻之一十首任南麓君謨一首馮臨海士美一首李丞旨致美四首劉龍山致君一十一首劉記室無黨二首黨丞旨丗傑五首王內翰子端一十一首王隱君逸賔一首密國公子瑜七首禮部間間趙公六首胥莘公和之一首許司諫道真二首馮內翰子駿一首溪南詩老辛敬之一首李右司欽叔三首王右司仲澤一首李扶風正臣一首景伯仁三首宗室文卿一首髙仲常二首王豫可三首王監使正之一首趙內翰子充二首孟內翰友之一首張太尉信甫一首王玄佐一首趙愚軒冝之三首先東巖君二首折治中元禮一首吳內翰彥髙人月圎南朝千古傷心事猶唱後庭花舊時王謝堂前燕子飛向誰家恍然一夢仙肌勝雪宫髻堆鴉江州司馬靑衫淚濕同是天涯彥髙北遷後為故宫人賦此時宇文叔通亦賦念奴嬌先成而頗近鄙俚及見彥髙此作茫然自失是後人有求作樂府者叔通即批云吳郎近以樂府名天下可往求之欣衷情夜寒茅店不成眠殘月照吟鞭黃花細雨時候催上渡頭船鷗似雪水如天憶當年到家應是童稚牽衣笑我華顚春從天上來海角飄零嘆漢苑秦宮墜露飛螢夢裏天上金屋銀屏歌吹竟舉靑冥問當時遺譜有絶藝鼓瑟湘靈促哀彈似林鶯瀝瀝山溜泠泠梨園太平樂府醉幾度春風鬚變星星舞破中原塵飛滄海風雪萬里龍庭寫胡笳幽怨人憔悴不似丹靑酒微醒對一窗涼月燈火靑熒好問曽見王防禦公玉説彥髙此詞句句用琵琶故寶引據甚明今忘之矣滿庭芳誰挽銀河青冥都洗故教獨步蒼蟾露華仙掌淸淚向人霑畫棟秋風嫋嫋飄桂子時入踈簾冰壷裏雲衣霧鬢掬水弄春纎厭厭成勝賞銀槃潑録寶鑑披奩待不放楸梧影轉西簷坐上淋漓醉墨人人看老子掀髯明年會淸光未減白髮也休添風流子書劒憶遊梁當時事底處不堪傷蘭楫嫩漪向吳南浦杏花微雨窺宋東墻鳯城外燕隨靑步障絲惹紫遊韁曲水古今禁煙前後暮雲樓閣春草池塘回首斷回腸年芳但如霧鏡髮成霜獨有蟻尊陶寫蝶夢悠揚聽出塞琵琶風沙淅瀝寄書鴻鴈煙月微茫不似海門潮信能到潯陽蔡丞相伯堅大江東去二首離騷痛飲問人生佳處能消何物江左諸人成砥事空想岩岩靑壁五畝蒼煙一丘寒玉歲晚憂風雪西州扶病至今悲感前傑我夢卜築蕭間覺來岩桂十里幽香發磈磊胸中冰與炭一酌春風都滅勝日神交悠然得意離恨無毫髮古今同致永和徒記年月倦遊老眼放間身管領黃華三日客子秋髙茅舍外滿眼秋嵐欲滴澤國淸霜澄江爽氣染出千林赤感時懷古酒前一笑都釋千古栗里髙情雄豪割據戲馬空陳迹醉裏誰能知許事俯仰人間今昔三弄胡床九層飛觀喚取穿雲笛涼蟾有意為人點破空碧水調歌頭雲間貴公子玉骨秀撗秋十年流落冰雪香靄紫貂裘燈火春城咫尺曉夢梅花消息繭紙寫銀鉤老矣黃塵眼如對白蘋洲丗間物唯有酒可忘憂蕭間一假歸計佳處著君侯翠竹江村月上但要綸巾鶴氅來往亦風流醉墨薔薇露灑遍酒家樓月華淸樓倚明河山蟠喬木故國秋光如水常記别時月冷半山環珮到而今桂影尋人端好在竹西歌吹如醉望白蘋風裏關山無際可惜瓊瑶千里有年少玉人吟嘯天外脂粉淸輝冷射藕花冰蕊念老去鏡裏流年空解道人生適意誰會更微雲踈雨空庭鶴唳江神子慢賦瑞香紫雲點楓葉岩樹小婆娑歲寒節占髙潔纎苞暖釀出梅魂蘭魄照濃碧茗碗添春花氣重藝窗晚濛濛浮霽月小眠鼻觀先通廬山夢舊淸絶蕭間平生淡泊獨芳溫一念猶未衰歇種陳迹而今老但覓茶煙禪榻寄間寂風外天花無夢也鴛鴦債從渠千萬劫夜寒回施幽香與春愁客聲聲慢涼陘寄內靑蕪平野小雨千峰還成暮陘寒色裁剪藝窗憶得伴人良夕遙憐幾重眉黛恨相逢少於行役梨花淚正宫衣春瘦曉紅無力應怪浮雲夫壻不解趂新醅醉眠涼月怨入關河西去又傳音息誰知倦遊心事向年來苦思泉石人未老約閭峰多占秀碧石州慢髙麗使還日作雲海蓬萊風霧鬢鬟不假梳掠仙衣捲盡雲霓方見宫腰纎弱心期得處丗間言語非真海犀一點通寥廓無物比情濃覓無情相慱離索曉來一枕餘香酒病賴花醫却灔灔金尊收拾新愁重酌片帆雲影載將無際關山夢魂應被楊花覺梅子雨絲絲滿江干樓閣尉遲杯紫雲暖恨翠雛珠樹雙栖晚小花靜院相逢的的風流心眼紅潮照玉碗午香重草緑宫羅淡喜銀屏小語私分麝月春心一點華年共有好願何時定粧鬟暮雨零亂夢似花飛人歸月冷一夜小山新怨劉郎興尋常不淺况不似桃花春溪逺覺情隨曉馬東風病酒餘香相半驀山溪淸明緑野玉色明春酒燕地雪如沙為喚起斗南溫秀鬢絲禪榻夢覺古楊州瑶臺路返魂香好在啼粧瘦春前入眼似是章臺柳欲典鷫鸘裘悮金車香迎馬首緑隂靑子後日便東風秋千散暮寒生月到西廂後鷓鴣天二首解語宫花出畫簷酒尊風味為花甜誰憐夢好春如水可奈香餘月入簾春漫漫酒厭厭曲終新恨到眉尖此生願化雙瓊柱得近春風暖玉纎秀樾橫塘十里香水花晚色靜年芳煙脂雪瘦薰沉水翡翠盤髙走夜光山黛逺月波長暮雲秋影蘸瀟湘醉魂應逐凌波夢分付西風此夜涼江城子半年無夢到春溫可憐人幾黃昏想見玉徽風度更淸新翠射娉婷雲八尺誰為寫五湖真好風歸路軟紅塵暖冰魂縷金裙喚起一天星月入金尊留取木犀花上露揮醉墨灑行雲公有詩八尺五湖明秀峰又云十丈琅玕倒冰玉明年為寫五湖真正用此詞意魏道明作注義有不通故表出之蔡太常正甫江城子王溫季自北都歸過豫三河坐中賦此鵲聲迎客到庭除問誰歟故人車千里歸來塵色半征裾珍重主人留客意奴白飯馬青芻東城入眼杏千株雪糢糊俯平湖與子花間隨分倒金壷歸報東垣詩社友曽念我醉狂無髙內翰士談玉樓春為伯求作少年人物江山秀流落天涯今白首形容憔悴不如初文彩風流仍似舊百花元是仙家酒千歲靈根能益壽都將萬事付天公且伴老人開笑口木蘭花減字西湖睡起飛絮遊絲春老矣漲緑涵空十頃玻璃四靣風時平事少天與湖山供坐嘯他日西州却怕羊曇感舊遊朝中措琅瑘山色最淸雄心賞待衰翁路轉峰回如畫新亭半濕靑紅風流賔從清間歲月且共從容莫笑尊前老大猶堪管領春風劉內翰鵬南鷓鴣天雪照山城玉指寒一聲羌管怨樓間江南幾度梅花發人在天涯鬢巳斑星點點月團團倒流河漢入杯盤翰林風月三千首寄與吳姬忍淚看鄧千江臨洮人望海潮上蘭州守雲雷天塹金湯地險名藩自古臯蘭營屯繡錯山形米聚喉襟百二秦關鏖戰血猶殷見陳雲冷落時有雕盤靜塞樓頭曉月依舊玉弓彎看看定逺西還有元戎閫令上將齋壇區脫晝空兜零夕舉甘泉又報平安吹笛虎牙間且宴陪珠履歌按雲鬟未拓興靈醉魂長繞賀蘭山趙內翰獻之望海潮代州南樓雲朔南陲全趙寶符河山襟帶名藩有朱樓縹眇千雉回旋雲度飛狐絶險天圍紫塞髙寒吊興亡遺迹咫尺西陵煙樹蒼然時移事改極目春心不堪獨倚危欄惟是年年飛鴈霜雪知還樓上四時長好人生一丗誰間故人有酒一尊髙興不減東山驀山溪賦崇福荷花崇福在太原晉溪雲房西下天共滄波逺走馬記狂遊正芙蕖平鋪鏡靣浮空欄檻招我倒芳尊看花醉把花歸扶路清香滿水楓舊曲應逐歌塵散時節又新涼料開遍撗湖淸淺冰姿好在莫道總無情殘月下曉風前有恨何人見好事近密雪聽窗知午醉晚來𥘉覺人與膽鉼梅蘂共此時蕭索倚窗間看六花飛風輕止還作箇裏有詩誰會滿踈籬寒雀浣溪沙二首擡轉爐薰自換香錦衾收拾却遮藏二年塵暗小鴛鴦落木蕭蕭風似雨踈櫺皎皎月如霜此時此夜最淒涼火冷薰爐香漸消更闌撥火更重燒愁心心字兩俱焦半丗清狂無限事一窗風月可憐宵燈殘花落夢無聊望海潮發髙麗作雲垂餘髮霞拖廣袂人間自有飛瓊三館俊遊百銜髙選翩翩老阮才名銀漢會雙星尚相看脈脈似隔盈盈醉玉添春夢雲同夜惜卿卿離觴草草同傾記靈犀舊曲曉枕餘酲海外九州郵亭一别此生未卜他生江上數峰靑悵斷雲殘雨不見髙城二月遼陽芳草千里路傍情卜算子譜太白詩語明月在青天借問今時幾但見宵從海上來不覺雲間墜流水古今人共看皆如此唯願當歌對酒時長照金尊裏鷓鴣天二首金絡間穿御路楊青旗遙認醉中鄉可人自有迎門笑下馬何妨索酒嘗春正好日𥘉長一尊容我駐風光歸來想像行雲處薄雨霏霏灑靣涼千頃平波溢岸清草香沙暖水雲晴輕衫短帽垂楊裏楚潤相看别有情揮彩筆倒銀瓶花枝照眼句還成老來漸減金叉興回施春光與後生集句鳯棲梧霜樹重重靑嶂小髙棟飛雲正在霜林抄九日黃花才過了一尊聊慰秋容老翠色有無眉淡掃身在西山却愛東山好流水極天橫晚照酒闌望斷西河道任南麓君謨永遇樂月巳中秋菊還重九夜久涼重滿地淸霜半天白曉孤唱聞耕壠蕭蕭窗几依然琴硯但覺鼠窺風動悔生平趍前猛甚晚退却成無勇興衰更換妍媸淆混造物大相愚弄三釁羞人五交賈鬻侯伯寧無種而今此念消除都盡唯有故山歸夢吾廬更雙溪淸繞萬峰翠擁馮臨海士美江城子煙脂坡上月如鉤問青樓覓溫柔庭院深沉窗户掩清秋月下香雲嬌墮砌花氣重酒光浮淸歌皓齒艷明眸錦纏頭若為酬門外三更燈影立驊騮結習未忘吾老矣煩惱夢赴東流李丞旨致美婆羅門引保德西樓作汗融畏日豈知髙處有風清倚欄襟袖涼生坐看崩雲脫壞不礙亂峰青待目窮千里却怕傷情河分古城聽裂岸怒濤驚好是烽沉幽障鼓臥邊亭西樓老子更無用胸中十萬兵酒到處莫放杯停虞美人佳人酒暈紅生頰灧灧霞千疊雨餘紅淚濕黃昏誤認當年人靣倚朱門飄零又送青春暮悵望劉郎去教人不恨五更風只恨馬蹄無處避殘紅鷓鴣天苒苒萋萋雨後村芳塵不到五侯門曽隨曉淚撩詩思又向春風入燒痕春去後億王孫啼紅南浦記芳溫夕陽樓外連天逺乞與騷人怨楚魂回文菩薩蠻斷腸人去春將半歸客倦花飛小窗寒夢曉誰與畫愁眉劉龍山致君鷓鴣天二首滿樹西風鎖建章官黃未褁貢前霜誰能載酒陪花使終日尋香過苑墻修月客弄雲娘三吳淸興入淋浪草堂人病風流減自洗銅瓶煮蜜嘗騎鶴峰前弟一人不應著意怨王孫當時艷態題詩處好在香痕與淚痕調鴈柱引蛾顰緑窗絃牽苦能􅌙砌臺歌舞陽春後明月朱扉幾斷魂樓宇沉沉翠幾重轆轤亭下落梧桐川光帶晚虹垂雨樹影涵秋鵲喚風人不見思何窮斷腸今古夕陽中碧雲猶作山頭恨一片西飛一片東璧月池南剪木栖六朝宫袖窄中宜新聲蹙巧蛾顰黛纎指移􅌙鴈著絲朱户小畫簾玄細香輕夢隔涪溪西風只道悲秋瘦却是西風未得知南歌子榴破猩䏎血萱開鳯尾黃舊間風簟雪肌涼一枕濃香魂夢到巫陽雲紵描瑶草蓮腮洗玉漿碧梧深院小藤床此意一江春水正難量攤破浣溪沙蠶欲眠時日巳曛柔桑葉大緑團雲羅羅猶小陌上看行人翠實玄條梅弄色輕花吹壠麥初勻鳴鳩聲裏過盡太平村浣溪沙四首貼體宫羅試夾衣冰藍嬌淺染東池春風一把瘦腰支戲縷寶鈿呈翡翠笑拈金剪下酴醿最宜京兆畫新眉萬疊春山入寸心章臺西去柳隂隂藍橋特為好花尋别後魚封煙漲闊夢回鸞翼海雲深情知頓著有如今繡館人人倦踏靑粉垣深處簸錢聲賣花門外緑隂輕簾幕風柔飛燕燕池塘花暖語鶯鶯有誰知道一春情摩腹椎腰春事非樂天猶恨小樊歸多生餘念向來癡往事半隨殘夢轉飛詞不盡短