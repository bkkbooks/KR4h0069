平楚斷霞落日懷千古懷千古一盃還酹信陵墳土胥莘公和之阮郎歸寄李都運有之人情冷暖共髙伭踈慵非所宜老夫碌碌夲無機閑敎造物疑形木槁鬢絲垂山林先有期故人只道挂冠遲此心應不知許司諫道真行香子秋入鳴皐爽氣飄蕭挂衣冠𥘉脫塵勞䆫間岩䄂看盡昬朝夜山伭晴山近曉山髙細數閑來幾處村醪醉糢糊信手揮毫等閑陶冩問甚風騷樂因循能潦倒也消揺眼兒媚濁醪篘得玉爲漿風韻帶橙香持盃笑道鵝黃似酒酒似鵝黃丗縁老矣不思量沉醉又何妨臨風對月山歌野調儘我踈狂馮内翰子駿玉樓春宴河中瑞雲亭長原迤邐孤麋臥野色微茫河界破草丞行屨緑雲深花觸飛丸紅雨妥髙亭𥘉試煎茶火醉玉漸譁春滿座行盃莫厭轉籌頻佳節等閑飛鳥過溪南詩老辛敬之臨江仙河山亭留别欽叔𥙿之誰識虎頭峯下客少年有意功名淸朝無路到公卿蕭蕭華屋白髮老諸生邂逅對床逢二妙揮毫落帋堪驚他年聮𬒮上蓬瀛春風蓮燭莫忘此時情李右司欽叔春草碧紫簫吹破黃州月蔌蔌小梅花飄香雪寂寞花底風鬟顔色如花命如葉千里涴兵塵淩波韈心事鑑影鸞孤筝絃鴈絶舊時雪堂人今華髮斷腸金縷新聲柸深不覺琉璃滑醉夢遶南雲花上蝶江梅引爲飛伯賦靑梅漢宫嬌額倦塗黃試新粧立昭陽蕚緑仙姿髙髻碧羅裳翠䄂卷紗閑倚竹瞑雲合瓊枝薦暮凉壁月浮香揺玉浪拂春簾瑩綺䆫冰肌夜冷滑無粟影轉斜廊冉冉孤鴻煙水渺渺三湘靑烏不來天也老斷魂些淸霜靜楚江浣溪沙何中環勝樓感懷垂柳隂隂水拍堤欲窮逺目望還迷平蕪盡處暮天伭萬里中原猶北顧十年長路却西歸倚樓懷抱有誰知王右司仲澤水龍吟從商帥國器獵同𥙿之賦短衣匹馬淸秋慣曽射虎南山下西風白水石鯨鱗甲山川圗畫千古神州一時勝事賔僚儒雅快長堤萬弩平岡千騎波濤卷魚龍夜落日孤城鼓角笑歸來長圍𥘉罷風雲慘澹貔貅得意旌旗閑暇萬里天河更須一洗中原兵馬看鞬櫜嗚咽咸陽道左拜西還駕李扶風正臣滿江紅示婦𥿄帳春温春睡穩䆫槐揺緑吾老矣不堪重着翠圍紅簇千古淸風荆布在一家樂事糟糠足笑杜陵憔悴漫多情須燕玉求凰意傳新曲驂鸞夢從渠續問臨卭何賤㑹稽何辱畎畝豈無天下土斧斤不到山中木但莫敎風雨兩雛鳩危枝宿景伯仁鳯栖梧倦客情悰紛似縷小院無人臥聽秋蟲語歸意巳攙新鴈去晚凉更作瀟瀟雨架上秋衣蝇點素冷菊戎裝尚𬒳春花妬别有溪山容杖屨等閑不許知人處天香二首市逺人稀林深犬吠山連水村幽寂田里安閑東隣西舎准擬醉時歡適社祈雩禱有簫鼓喧天吹擊宿雨新晴壠頭閑看露桑風麥無端晴亭暮驛恨連年此時行役何似臨流蕭散緩衣輕幘炊黍烹雞自勞有脆緑甘紅薦芳液夢裏春泉糟床夜滴百歳中分流年過半塵勞繫人無盡桑柘周圍菅苐伭架且喜水親山近倦飛髙鳥筭也有閑枝棲穩紙帳紬衾日髙睡起懶梳蓬鬢閑堦土花碧潤緩芒鞵恐傷蝸蚓倒掩衡門空解草玄誰信俗駕輕雲易散賴獨有蓬峰破孤悶丗事悠悠從敎莫問宗室文卿從郁字文卿本名瑀字子玉衛紹王改賜焉父金紫公有中庸集文卿以父任充符寳章宗試一日百篇賜弟朝廷經略西蜀宗室綱遣太尉中孚之子公輔說吴犧稱藩文卿私謂梁經父言誘人以叛豈有天下者所宜爲其後蜀事竟不成識者稱焉仕至安肅刺史西江月題邯鄲王化吕仙翁祠堂壁斷何人舊字爐寒隔歳殘香洞天人去海茫茫玩丗僊翁巳往西日長安道逺春風趙國臺荒行人誰不悟黃粮依舊紅塵陌上髙仲常梅花引蒿火目蔾羮腹書生寧有封侯骨長須奴下澤車艱関險阻誰敎渉畏途半生落漠長安道一事無成雙鬢老南轅胡北轅吴功名冨貴情知不可圗槐安夢鼓笛弄馳驟百年塵一閧陶淵明張季鷹一盃濁酒焉知身後名有溪可漁林可繳須信在家貧也樂熊門春浿江雲幾時作箇山間林下人貧也樂一將進酒二城下路淒風露今人犂田昔人墓岸頭沙帶蒹葭漫漫昔時流水今人家黃埃赤日長安道倦客無漿馬無草開函関閉函関千古如何不見一人閑六國擾三秦掃𥘉謂商山遺四老馳單車致緘書裂荷焚芰接武曵長𥚑髙陽真得盃中趣身到醉郷安穩處生忘形死忘名二豪侍側劉伶𥘉未醒王予可小重山予可自解􅭤霜脂粉也寳榭簾鉤捲月䆫縷衣金様褪汎餘香卿卿榮耀寵恩光三竿日顰翠楚山長螺髻戞浮觴鳯奩塵瑩恨浥􅭤霜賣珠樓外串離腸春殘夢今夜擬髙唐生查子夜色明河静好風來千里水殿謫仙人皓齒淸歌起前聲金斚中後聲銀河底一夜嶺頭雲遶遍樓前水長相思風煖時雨晴時熏褶羅衣人未歸螓蛾愁欲飛枕瓊霞瑣䆫紗簾月樓空燕子家春風掃落花王監使正之梅花引山之麓河之曲一灣秀色盤虚谷水溶溶雨濛濛有人行李蕭蕭落葉中人家籬落炊煙濕天外雲峯迷淡碧野雲昏失前村溪橋路滑平沙没舊痕丹楓下瀟湘夜撗披省見王維畫畫無聲慘經營何如幻我淸寒此道行馬頭風急催行色疑是山靈嫌俗客釣魚磯緑蓑衣有人坐弄滄浪猶未歸趙内翰子充南歌子澗草萋萋緑林鸎恰恰啼汀沙過雨便無泥喚得芒鞋隨意到前溪浦漵渾堪畫雲烟緫是題江湖老伴一蓑衣真箇斜風細雨不須歸虞美人同孟利器㝷春春來日日風成陣桃李飄零盡樹頭樹底覓殘紅只有郭西梨雪照晴空酬春須得如川酒酒債㝷常有葛巾欹側倩人扶大似浣花溪上醉騎驢孟内翰友之菩薩蠻回文睡驚秋近鳴蟲砌蒼鬢摻匀霜影孤燈翳冷長歎浩歌狂張太尉信甫信甫名中孚丗爲安定望族初以父任知寜環鎮戎三州天㑹中宋亂渭帥劉錡遁走諸將推信甫攝帥事時左副元帥軍巳次官池信甫乃詣行營約衣冠禮樂無變宋舊則當送欵從之即日事定授鎮洮軍節度使兼經原經略安撫使改陜西諸路節制使及地入於宋信甫留臨安皇統中理索北歸就拜行臺兵部尚書天德二年叅知政事貞元初新都城遷尚書左丞以病乞身出爲濟南尹改南京留守未幾薨弟忠彦字才甫歸國授招撫使丗宗朝終於吏部尚書信甫昆弟天性友愛起行陣間而文雅俱有可稱信甫自號長谷老人才甫季弟某義谷有三谷集傳於家驀山溪山河百二白古関中好壯歳喜功名擁征鞍彫裘繡帽時移事改萍梗落江吴聽楚語厭蠻歌往事知多少蒼顔白髮故里欣重到老馬省曽行也頻嘶冷焑殘照終南山色不改舊時靑長安道一回來須信一回老王玄佐賢佐一字玄佐名澮咸平人爲人沉黙寡欲邃於易學若有神授之又通星曆緯䜟之學明昌初德行才能召至京師命以官不拜朝廷重其人授信州敎授未幾自免去再授博州敎授郡守以下皆師尊之一日守澮客適中使至中使漠然少年重賢佐名強之酒守從旁救之曰王先生不茹葷酒勿苦之也中使乃止是夕賢佐棄官遁歸郷里宣宗即位聞其名議驛召之以道梗不果車駕南渡人有自咸平來者說賢佐年六十餘起居如少壯人宣宗重其人常以字呼遣王曼卿授遼東宣撫使不拜又詔宰相以書招之云阻奉仙摽渴思道論敬佇下風瞻系何極先生嘉遯林藪脫屣浮榮究大易之盈虚洞玄象之終始道尊德重名動天朝推其緒餘足利天下然君子之道出處語黙何常之有或拂衣而長往或濡跡以捄時故當其無事則采薇山阿餌木岩岫固其宜矣及多難之際社稷傾危而不顧蒼生倒懸而不解其自爲謀則善矣仁人之心固如是乎某等猥以不才謬膺重任四郊多壘各將誰執徒積慙汗坐視何益日夜以思庶幾得明利害而外爵禄者在天子左右同濟太平今聖上明發不寐軫念元元屈巳下賢尊師重道歎先生之絶識仰先生之髙風雖黄帝尊廣成之道唐虞重頴陽之節不是過也先生懷寳遺丗如某輩之不肖固在所棄獨不念累丗祖宗之基業億兆生靈之性命忍忘之耶昔商岩四老定儲嗣而蹔來東山謝安爲蒼生而一起今安危大計非特定儲之勢也強敵侵逼又非東晉之時也生民塗炭亦巳極矣豈先生建䇿於明昌之初獨無一言於貞祐之日乎想先生憣然而改惠然而來審定大計轉危爲安然後披蕙幌拂雲扄未爲晩耳敬聽車音某雖不肖請擁篲而先之書逹竟不至遼東破時年九十餘矣洞仙歌賦榛實屏山所録圎剛定質混物非凢類仁處其中靜忘意任蝶蜂狂遶燕雀喧爭心君正惟取淸白自治黃衣從淡泊此箇家風異偶合隂陽棄神智怕旁人冷眼嫌太孤髙樽俎地聊許松梧同器待他日山林不相容請援手仙芚要充仙贄沮物作渾物趙愚軒宜之行香子三首鏡裏流年緑變華顚謝西山靑眼依然人生安用利鎖名纏似燕營巢蜂課蜜蟻爭羶詞苑群仙埸屋諸賢看文章大筆如椽閑人書冊且枕頭眠有洗心經傳燈録坐忘篇潦倒無聞坐慣家貧眼昏花心口猶存人皆笑我我儘敎人拚醉吟風閑釣月困眠雲邂逅交親語欵情真且相從莫浪辛勤西山歸隱不用移文看菊成叢松結子竹生孫山擁垣墻水滿溪塘幾人家籬落斜陽又還夏也一霎人忙正稻分畦𧖟卸簇麥登埸老子徜徉閑日偏長鬢鬔䯳只管㝷凉緑隂何處旋旋移床有道邊槐門外柳舎南桑先東岩君好事近丞相韻首倡及髙子文屬和附于此夢破打門聲有客䄂携團月喚起玉川髙興煑松簷晴雪蓬萊千古一淸風人境兩超絶覺我胷中黃卷𬒳春雲香徹天上賜金奩不减壑源三月午盌春風纎手看一時如雪幽人只慣茂林前松風聽淸絶無柰十年黃卷向枯腸搜徹蔡丞相誰打玉川門白絹斜封團月晴日小䆫活火響一壷春雪可怜桑䇡一生顛文字更淸絶直擬駕風歸去把三山登徹髙子文折治中元禮元禮字安上丗爲麟撫經略使父定逺僑居於忻遂占籍焉明昌五年兩科擢弟學問該洽爲文有法度仕至延安治中死于葭州之難坊州有詩云籬落層層景軒䆫靣靣山至其處知爲工也望海潮從軍舟中作地雄河岳疆分韓晉潼関髙壓秦頭山倚斷霞江吞絶壁野煙縈帶滄洲虎斾擁貔貅看陣雲截岸霜氣撗秋千雉嚴城五更殘角月如鉤西風曉入貂裘恨儒冠誤我却羡兠鍪六郡少年三明老將賀蘭烽火新収天外岳蓮樓想斷雲横曉誰識歸舟剰着黃金換酒羯鼓醉凉州中州樂府卷終
