body:
  text: 史御史肅三十首蕭尚書貢三十二首史内翰公奕一首龐都運鑄一十九首許司諌古四首王防禦良臣一十首髙治中庭玉四首李治中遹六首陳司諌規四首馮内翰延登十七首劉鄧州袓謙三首髙慱州憲八首王監使特起七首李經六首梁太常持勝一首愚軒居士趙元三十五首宻國公璹四十首史御史肅肅字舜元京兆人僑居北京之和衆㓜孤養於外家天資挺特髙才慱學作詩精緻有理尤善用事古賦亦竒峭工於字畫業科舉爲名進士立朝爲才大夫優於政事嚴而不苛所至有聲吏畏而安之累以廉陞歷赤縣及幕官入爲監察御史遷治書出刺通州大中黨獄起爲所絓謫静難軍節度副使大安初召爲中都路轉運副使超戸部正郎復坐鐫降同知汾州事卒官舜元素尚理性之學屏山學佛自舜元發之晩年頗喜養生謂人可以不死甞欲棄官學道而竟止於此可哀也巳詩號澹軒遺槀今在燕都鄭庭幹家其平生則見之屏山故人外傳云偶讀賈逹之邀飯帖有感作詩哭之微官巳歎鸞棲屈異事俄傳鵩吿凶彩筆書來墨痕濕玉樓人去酒尊空當時快意牛心炙今日傷懷馬鬛封一幅銘旌送哀挽白楊蕭索九原風河上堤外三竿日河邊八尺泥夜風喧馬櫪秋露冷鷄棲歳月吾生老關山客夢迷故園桃李樹揺蕩不成蹊别張信夫破壘殘星没寒城曉角孤天低雲錯莫野曠雪模糊小市千錢米征人丈八殳邊愁故未巳不敢恨長途别懷玉官曹不着市門仙緑髮忩忩換少年慣作簿書塵裏夢愧無山水窟中縁蜂腰鶴膝曾搜句兎角龜毛不論襌此别相思渺何許一川山色鴈連天山隂縣湧雲驅雨不成霖山徑危行未要深午夢初迴烏鳥楽小亭斜日柳隂隂方丈坐中紙本功名直幾錢何如付與北䆫眠詩書作我閑中地風月知人醉裏天水底游魚真見性樹頭語鳥小叅襌平生習氣蓮華社一炷香前結後縁早岀遵化朝來對酒不能觴看盡西風去鳥行山好未忘三日雅詩窮嬴得一秋忙强顔紅葉自由舞野性黃花無賴香多謝殷勤暮雲影更留淡墨冩溪光宿睦村闌干河漢巳西傾獨坐披衣過五更簷馬丁東風外響田車歷轆月中行忘形沙鳥知人意窣地山雲不丗情露草霜筠有幽意詩題分付候蟲聲次韻安之飲酒日上南䆫巳數竿醉頭扶起不巾冠欲開杜瓮多招客先乞兵厨暫𥙷官玩丗唯知酒功聖藏身無似醉郷寛麒麟閣上功名字不博生前一笑歡過九里山斷蛇扛鼎兩爭雄陳迹荒凉萬事空今日山前無過客數株衰柳管秋風道傍柳秋霜一何嚴凋此道傍柳殘枝幾葉在其勢不得乆憶昨三春時濯洗煙雨後弄姿舞婆娑勸我一盃酒别後遽能幾忽忽成老醜人生非金石長短百年壽功名與富貴於身亦何有古人隨物化今已柳生肘我獨何爲哉窮年事奔走長堤隱落月駐馬一迴首春風柳梢黃定得西歸否登憫忠寺閣淨宇懷超想層梯企俊游喧卑三界盡製作六丁愁聚土閑童子移山老比丘能除分外見寸木即岑樓讀傳燈録閉戸懶不岀真成住夏僧肝腸雖自苦靣目得人憎處丗若大夢學禪猶小乗早知文字悮更用讀傳燈夏夜一雨昭蘇外群山宴寂中移床就佳月引𬒮納凉風蝸舎怜渠小蚊雷訝許同幽懷閟淸境舒嘯夜將終物化物化能忘我天遊不用心羶香群蟻聚樹静一蟬吟敗井勞深汲荒庭闕近㝷枕書聊假息夕日半墻隂立秋日舊糓催新糓今秋似去秋年衰猶徤飯官逹也窮愁樹鳥依依宿簷螢細細流箇中詩句在倚杖得冥搜感興避俗嫌髙絕千榮恥盜誇居貧偶從仕學道不忘家樹果蕃秋實園葵粲晚花一軒吾事了無意競紛華偶書東風數點梨花雪吹我傷春萬里心知有髙亭堪眺逺惜無佳客共登臨晴雲入戸團傾蓋飛鳥隨人作好音寒食淸明少天色孤居未要酒盃深放言二首蓮社從來說陶逺竹林今不數山王家雞野鶩何須較秋菊春蘭各自芳淸風明月無人管茶鼎薰爐與客同壯歳羞爲褦襶子如今却羡囁嚅翁曉出東盧谷口子真隱水濵韋氏㽵鷗鷴賔客對鴻鴈弟兄行小圃藂生竹平林半是桑朝陽生野渡濕盡馬蹄霜次張信夫韻綘帳先生寄一州不敎文字到撗流草玄只擬關門坐好事應從載酒游虎穴巳曽探虎子龍溝未信出龍頭錦囊詩句年來滿供盡閑花野草愁髪脫年年道路少清歡處處葵𬞞餽薄飡月色過䆫同夜夢霜華著壁獨朝寒求醫未有詩千首破老唯消竹數竿衰髪從今不須脫少留衰白戴黃冠立秋日畏景流庭過凉颸即坐來物隨時共換人覺老相催憇蝶依藂穩嘶蟬抱樹哀玉簮香好在墻角幾枝開復居士年來一復齋馴庭鳥雀絶驚猜雨添䆫下硯池滿風掲床頭書卷開身似卧輪無伎倆心如明鏡不塵埃紛紛寵辱人間丗付與浮雲任去來北潭竹隂松影玉葱蘢十里平堤一徑通碧水乍開新鏡靣青山都是好屏風寒蟬髙鳥淸愁外折葦枯荷小景中酒力未多秋興逸夕陽聊貸半林紅晚興秋蟲巳息又還吟晚雨初晴又作隂水靣微風掠蒼玉雲頭落日縁黃金年豐酒價應須賤睡起茶甌未要深人道雙淸到心迹年來無迹亦無心雜詩二首春江日暖舞淸漣客舎蕭蕭一縷煙幽鳥隔林招我醉小桃當戸爲誰研禪心巳作沾泥絮詩思渾如上水船却是官閑得無事一簾紅雨枕書眠南皮城下荒秋草說是當日燕支臺丗事翻騰只如此吾生棄置巳焉哉迎風紫莧因循老背日黃花次弟𨳩獨夜不眠思阿謝白羊如駕小車來春雪豐年不救兩河饑臈盡纔看小雪飛謾說春來膏澤好其如壠上麥苗稀空花只解驚愁眼濕絮寜堪補敗衣頗笑西臺瘖御史日斜騎馬踏泥歸蕭尚書貢貢字真卿咸陽人唐太傅寘十七代孫博學能文不减前輩蔡正甫大定二十二年進士自涇州觀察判官召補省掾不四五月拜監察御史累遷右司郎中預修泰和律令所上條畫皆委曲當上心興陵嘉歎曰漢有蕭相國我有蕭貢刑獄吾不憂矣又奏死囚獄雖巳具仍責家人伏辨以申冤抑詔從之遷刑部侍郎入謝曰臣願因是官廣陛下好生之德上大恱凡真卿所平反多從之歷大興同尹德州防禦使同知大名府事陜西西路轉運使河東北路按察轉運使靜難軍節度使南京都轉運使御史中丞以户部尚書致仕年六十六終於家謚曰文簡有注史記百卷公論二十卷五聲姓譜五卷文集十卷傳於丗渭南縣齋秋雨穴床撐拄小䆫前一點靑燈照不眠簷溜淙琤風淅瀝嫰凉如水夜如年假梅緑䆫嬌小似梅人素手東風巧思新鸞尾剪裁千顆雪蜂脾點綴一家春長敎客枕生幽思不逐林花委路塵莫道去非詩破的兔毫那解寫花真臨泉道中半丗事行役兹㳺初未經峽門迷白晝嶺脊上青冥澗曲莓苔滑松盤霧雨溟登危人跼蹐渉險馬竛􅿓落日留行客投鞭得驛亭短墻明積雪破屋漏踈星羗笛誰三弄羈懷強一聽葭蘆知不逺河外數峯靑自感形骸付與甄陶外禍福難防倚伏前孔雀若知牛有角應須忍渇過寒泉荒田擬白樂天荒田幾歳闕人耕欲種糜蕎趂晩晴急手剪除荆與棘一科才了十科生樂府崔生徽蘭二崔名徽門晝煖柳啼鴉蘭閤䆫深月照紗腰素輕盈珠衱穩鬢雲鬆亂玉釵斜春風一去空陳迹暮雨三生只當家自倚廣平腸似石不妨綺語賦梅花米元章大字卷顔楊死去誰補處米狂筆力未可涯追摹古人得髙趣别出新意成一家老蛟𩥇雲肉倔強枯樹漬雪冰楂牙九原裴說如可作應有新詩三嘆嗟裴說懷素草書歌欲歸家三嘆嗟眼前三箇字枯樹楂烏梢蛇黒老鴉楊侯畫晉公臨江賞梅樂天與鳥窠襌師泛舟談玄不顧而去戲爲一絶以代晉公招樂天同飲云明粧冷蘂兩淸新靣纈浮光數爵頻抆拭風前寒鼻液快來同醉雪中春漢歌華隂雙璧傳山鬼報道明年袓龍死草閒豪傑伺天時攘袖撫衿争欲起藂祠篝火妖狐語夥渉爲王張大楚南公舊有三户謡東井新看五星聚中原茫茫走秦鹿天遣沛公興白屋大虵斬斷素靈號蚩尤祭罷朱旗矗朅來扶義入關中恩結人心帝道隆秦法煩苛猶一洗項王慓悍何勞攻三傑相須立人紀四老仍來安太子巳令陸賈說詩書更詔孫通制儀禮阿翁着手規摹逺獨恨兒孫讀城旦王純覇雜寜不知不是不知知巳晩楚歌沙丘車過亡明鏡人頭畜鳴自賢聖阿房殿裏醉宫娃趙髙手中持國柄群雄雲擾蕩山東邯鄲却墮秦圍中項王一戰動天地諸侯膝行趍下風割裂河山建侯國天下畏威心不服只貪衣繡榮楚猴豈識金刀得秦鹿楚歌一夜四靣發泣别虞姬歌數闋殘兵牢落似晨星獨騎凌兢踏寒月烏江渡口方喚舩五侯追奔巳江邊苦道天亡非戰罪劒化壯氣成飛煙君王雄武古無比獨無仁義誰相濟向能忠計資范増未必漢家能卜丗穀城東頭土一丘悠悠遺恨何年休悲長平秦兵伏甲武安西趙將非材戰士携千里陣雲沉曉日萬家屋瓦震秋􅎏哀纏朽骨天應泣怨入空山鳥不栖百戰區區竟何得阿房煙草亦淒迷雒陽西來洛水遶崧髙野店荒村換市朝董卓搜牢連數月郭威夯市又三朝刧灰深掘終難盡鬼火争然忽自消千古興亡幾春夢只將閑話付漁樵中秋對月去年中秋客神京露坐舉盃邀月明今年還對去年月北風黃草遼西城年年月色長清好只有悲秋人易老兒童不解憶長安歌舞團圝遶翁媼人生宦游真可怜不知何處度明年預愁老罷廢詩酒負此冰玉秋嬋娟我生萬事隨縁耳居自無憂行亦喜君不見杜子閨中只獨看鄜州寂莫千山裏寄荅張維中北轅千里赴陪都日覺還家計愈踈人事浮雲千變化宦途平地幾﨑嶇靑山有約長回首白髮無情忽滿梳賴有同年老兄弟相思時寄數行書保德州天橋鬱鬱風雲入壯懷天潢飛下碧崔嵬兩崖偪側無十音忱歩萬頃逡廵納一盃濺沬紛紛跳亂雹怒濤殷殷轉晴雷曽聞電火魚燒尾㑹趂桃花漲水來靈石縣古道行人少荒城亂石侵天橫機素直河入土囊深澗近雲長潤山髙日易沉田翁樂豐歳歌笑下﨑􅋂真容院魔宫佛界等空虚此理何曽属有無直向臺山始相見可中還有二文殊讀火山瑩襌詩卷禪師隩州白氏歧山令君舉樞判文舉之弟自㓜日有詩名河東甞有詩云十日柴門九不𨳩松庭雨後滿蒼苔草鞵挂起跏趺坐消得文殊更一來歸寂後客有示其集者因題其上長短都歸一夢中身前身後兩無窮李憕信士今如在定向江湖訪澤公君馬白我馬瘦君馬肥我馬虺隤君馬飛彫鞍寳校錦障泥向風振迅長鳴嘶一朝計落路傍兒銅鬲爲槨薪爲衣瘦馬雖瘦骨骼竒古人相馬遺毛皮千金一顧會有期陳宫詞三閣花深白晝迷酒催狎客賦宫詞管絃散落春風外一曲金釵兩鬢垂岢嵐岢嵐地勢橫三汊河朔城墉挂一箕紫塞髙連寒日短黃榆落盡長年悲按部道中二首窟野河津水没腰管岑官路雪封條一年樂事能多少強半光隂馬上消寒城脾睨挿山隅秋半霜風塞草枯月轉譙樓天未曉角聲吹徹小單于日觀峰半夜東風攪鄧林三山銀闕杳沉沉洪波萬里兼天湧一點金烏出海心族兄才卿下弟後赴宜禄酒官以詩寄之乆期老距擅文埸命壓人頭可得忙兩脚塵泥官業晩十年燈火夜䆫凉霜添老葉山梨紫雨浥寒花野菊香寒花一作寒藂南北相望無百里幾時樽酒浣離腸梨花丰姿閑淡洗粧慵眉緑輕顰秀韻重香惹夢魂雲漠漠光揺溪舘月溶溶陳家樂府歌瓊樹妃子春愁慘玉容安得能詩韓吏部郭西同去醉千鍾後趙擬倫人物指髙光可笑梟雛不自量正使成名皆竪子英雄也未到君行古採蓮曲洋洋長江水渺渺漲平湖田田靑茄荷艶艶紅芙蕖酣酣斜日外苒苒凉風餘蒨蒨誰家子裊裊二八初兩兩並輕舟笑笑相招呼悠悠波上鴛潑潑蒲中魚采采不盈手依依欲何如擬迴文四首春波緑處歸鴻過夜月明時飛鵲愁人去附書將恨寄暮山雲斷倚髙樓樓上却來樓下待晚䆫春盡斷回腸愁人有說嫌人問淚酒新詩掃墨香風幌半縈香篆細碧䆫斜影月籠紗紅燈夜對愁魂夢老盡春庭滿樹花萋萋碧草連天逺杳杳行人幾日迴凄雨晩凉空坐乆淚粧殘暈濕紅腮史内翰公奕公奕字季宏大名人系出石晉鄭王弘肇父良臣宣和中擢弟終於潞州觀察副使季宏大定二十八年進士再中博學宏辭科程文極典雅遂無繼之者累遷著作郎翰林修撰同知集賢院正大中置益政院楊吏部之美與季宏皆其選也以直學士致仕年七十三卒季宏文章書翰皆有前輩風調下至棊㮶之技亦絶人逺甚閑閑稱其温厚謙退與人交愈乆而愈不厭其學問愈扣而愈無窮其見重如此詩文號洹水集兵後失之子應祖字企先孫彦忠今在燕中李鴈門天下三分二属梁區區獨木欲支唐錦囊三矢傳遺恨不救朱三着赭黃龎都運鑄鑄字才卿大興人家丗貴顯明昌五年進士風流文采爲時輩所推字畫亦有藴藉仕至京兆運使自號黙翁雪谷曉裝圗溪流咽咽山昏昏前山後山同一雲天公談笑玉雪噴散爲花蘂白紛紛詩翁瘦馬之何許忍凍吟詩太清古老奴寒縮私目語作奴莫比詩奴苦木僵石老鳥不飛山路益深詩益竒老奴忍笑憐翁癡不知嗜好乃爾爲楊侯匈中富丘壑醉裏筆端驅雪落因何不把此詩翁畫向草堂深處着景骨城驛中夜雨畫角邊城暮孤舂野水秋一川霜樹老萬葉雨聲愁自古誰靑眼勞生只白頭何時問漁父客我亦扁舟洛陽懷古草樹蕭條故苑荒山川慘淡客魂傷玉光照夜新開塚劒彘沉沙古戰埸金谷更誰誇富麗銅駞無處問興亡一尊且對春風飲萬事從來糓與臧田器之燕子圗器之自敘云明昌丙辰予從軍塞外合虜里山野舎荒涼難以狀言春末有雙燕亦巢此屋土人不之識屢欲捕之予曲爲全護此燕晝岀夜歸予必𨳩户待之忽一日飛止坐隅都無驚畏巧語移時不去予始悟明日秋社此鳥當歸殆留别語也因作一詩贈之云幾年塞外歷崎危誰謂烏衣亦此飛朝向蘆陂知有爲暮投苐舎重相依君怜我處頻迎語我意君時不掩扉明日西風悲鼓角君應先去我何歸此詩以細字寫之爲䗶丸繫之燕足上明年四月予受代歸又八年泰和甲子任潞州觀察判官四月十二日偶坐廨舎之含翠堂忽雙燕至一飛簷户間一上硯屏子諦視之繫足䗶凡故在乃知此鳥蓋往年贈詩者也因請同年龐君才卿畫爲圗求諸公賦詩器之姓田名琢雲朔人明昌五年進士仕至山東路宣撫使慨慷有志節閑閑公所謂田侯落落竒男子者也田君才略燕雲客少年累有安邊䇿悔從筆研取功名直要撗馳沙漠北塞垣春雪白皚皚東風未放玄隂開烏衣之國定何許一雙燕子能飛來三年驛舎安西道眼底鸎花無夢到忽見伭飛入短簷此身似向邯鄲覺君居海東我中原相逢乃在穹廬前天涯流落俱爲客感時念逺空潸然長安何限髙髙閣晝夜風閑開翠幕底事猜嫌不往依甘從此地風沙惡土人嗜肉無仁心一生弋獵誇從禽有巢幸穩勿浪出汝身未必輕千金朝來暮去益狎昵物我相忘情意一怛怪重裘積漸添元是西風催社日須知音巧惟鷾鴯忽來坐隅如告辤我方留寓未歸得爲君忍賦傷心詩詩成自述聊爲戯繫足封之亦無意燕巳歸飛我未歸刀斗聲中忽驚歳旄頭夜落妖氛收嫖姚獻凱歸神州玉關早喜班超入比海不聞蘇武留君才經丗寜終枉幕府須賢來上黨别後歸期兩及瓜人間秋燕十來往沉沉官舎紅芳稀葛衣燕居澹忘機忽聞巧語入簷戸大似相識來相依一飛簷外窺庭樹一上屏山驚不去解足分明得帛書真是當年留别句天生萬物禽最微固耶偶耶吾不知古道益逺交情醨朝恩暮怨雲遷移當時握手悲别離一旦富貴弃如遺聞予燕歌應自疑慎無示之嗔我譏楊之羙尚書詩云危巢客舎乆相依常記西風社日歸海國傳心千驛隔塞垣回首十年非新詩尚在人空老舊夢無憑鳥自飛寄語齊諧休志怪沙鷗相欵解志機張巨濟云沙塞相逢命巳輕翠堂重見眼增明小詩繫足𥘉無意巧語迎人獨有情隂德自招黃雀報機心能致白鷗盟社前秋後風光好須賀他年大厦成李之純云一别天涯十見春重來白髮一畨新心知話盡春愁處相對依依如故人王大用云相别相㝷積歳年人心不及烏心堅填償恩義三生債分付平安七字篇王謝烏兠疑誕說紹蘭紅線定虚傳何如此叚人親見舊話從今不直錢李欽叔云塞上光風巳十霜仁心覆護獨難忘當時相送詩仍在此日重來話更長客舎花開新信息雲兠香冷舊昏黄主人得報君知否千古珠璣在錦囊閑閑趙公三詩田思敬敬之刀白晉卿趙丞元王副樞子明許節張雲卿師禇各一詩此不具錄晚秋登城樓山勢碧環合溪光縞帶明牛羊成晚景砧杵助秋聲酒薄人情廢官閑吏事生天東歸興滿不爲憶蓴羹落日危樓上詩成只自哦清商行老矣紅葉奈秋何墮甑前非悟跳丸去日多功名猶誑我未許着漁蓑冬夜直宿省中吏散庭空宿鳥過凍吟聊復戰詩魔陶泓靣冷真堪唾毛頴頭尖漫費呵畏事政宜賔客少不才偏覺簿書多西䆫燈闇尊無酒奈此迢迢夜漏何山行絶句四靣雲山玉作圍一川霜樹錦爲衣翩翩數騎南岡下傅粉王孫射鹿歸漉酒圗我愛陶淵明愛酒不愛官彈琴但寓意把酒聊開顔自得酒中趣豈問頭上冠誰作漉酒圗清風起毫端露電出形似神情想髙閑大似揮絃時目送飛鴻難袖中有東籬開卷見南山嗟予困塵土青鬢時一班折腰尚未免敢謂善閉關望望孤雲翔羡羡飛鳥還歸田未有日掩卷空長嘆夏日富國才踈合自羞清時無𥙷但優游只知錢向帋中褁不信能敎地上流花下香滿西園曉雨微萬紅千翠自髙低苦爲常作莊周夢飛向幽芳閙處棲梨花孤㓗本無匹誰令先衆芳花能紅處白月共冷時香縞𬒮清無染冰姿淡不粧夜來清露底萬顆玉毫光末開牡丹國香半吐醉顔酡炫耀春工巳自多愛惜不敎催羯鼓更澆卯酒看如何却暑九夏樓居不厭髙要須直至冷雲巢風來蘋末聊自快暑滿人閒無處逃蔗蜜漿寒冰皎皎畫簾鈎冷月梢梢閑思殿閣生凉句誰爲懸誠作解嘲懷友鏡裏衰顔失舊紅當年豪逸夢魂中山城對月中秋夜隴鴈寄書西北風遣興與誰同酒盞相思無處附詩筒慿髙想到消魂處落日無言水自東喜夏小暑不足畏深居如退藏青奴𥘉薦枕黃妳亦升堂鳥語竹隂宻雨聲荷葉香晩凉無一事歩屧到西廂墨竹三首隔溪煙雨一溪流水玉㳙㳙溪上脩篁接暮煙誰倩能詩文與可筆端移得小江天秋風驟雨瀰川急雨暗秋空無限琅玕澹墨中劒甲摐摐軍十萬欲將貔虎戰斜風春雷起蟄千梢萬葉玉玲瓏枯槁叢邊緑轉濃待得春雷驚蟄起此中應有葛陂龍山谷透絹帖君不見李廣射虎如射兔霹靂一聲石飲羽又不見巨靈擘山如擘雲蓮華萬仞留掌痕精神入物物乃爾筆端有神亦如此熈豐以來推善書日下無雙黃大史胸中八法蟠虹蜺峩眉僊人容竝馳平生敗筆塚纍纍妙處不减磨崖碑吕侯好古兼好異與字分身作游戯清潭錯落印星璧大澤縱橫散龍蛻又如漢宫粉黛爭嬋姢倚風顧影影更妍豈無硬黃官帋與臨倣畫師冩照非天然吕侯之子今詩仙傳家以此爲青氊須防神物有時合却逐六丁飛上天許司諌古古字道真氶安中進士在宣宗朝以直言極諌稱哀宗即位首命驛致之落致仕授右司諌未幾乞身還伊陽閑閑公制詞云安車蒲輪天子所以厚優賢之禮黃冠野服人臣所以遂歸老之心其恩榮足以两全而前後不可多得有臣如此如卿幾人具官道直以方氣剛而大議論非世儒所到名節以古人自期擢自先朝置之諌列斥安昌竊位巳聞折檻之忠及梁兾伏辜方見埋輪之志朕即大位稔聞直聲起之於田里退閑之間超之於侍從論思之地完備始終之節從容進退之間歎陽城之敢言惜其將去念孔戣之旣老挽之莫留特進一階榮躋四秩華山拂䄂最是爲丗上之閑神武挂冠猶不負山中之相勉終晚節益介壽祺郡守爲起伊川亭道真性嗜酒老而未衰毎乗舟出村落閒留飲或十數日不歸及泝流而上老稚奔走争爲之挽舟數十里不絶其爲時人愛慕如此正大七年年七十四卒前三日有書見及字巳欹傾矣青柯平二道人深谷縁危磴長林繞碧山山中四時好方外兩翁閑身丗青雲上塵埃大夢間髙情應笑我才到却空還被召過少室老病無堪合退休伊川乆巳得菟裘如今又上長安道好被青山笑白頭扇圗雲壓溪塘小雪春融融和氣浥輕塵山禽共作梅花夢物性由來懶是真訪箕和尚峴山箕出衣冠家在三屯山中有元夕懷京都詩云一燈明處萬燈明天上人閒不夜城前日惠林洪覺範雪䆫孤坐聽猿聲甚爲時人所稱山中風定夜沉沉月滿襌林静客心蒼檜四排嚴法界孤松中立殷潮音皷鍾有節人如玉臺殿無塵地布金二月來游春尚淺紅梅無數照山隂王防禦良臣良臣字大用潞人承安五年進士作詩以敏捷稱又於内典有所得入翰林與李欽叔善從軍南征欽亦預行道中酬唱甚多有詩云蕎花冉冉蜜脾香禾穗纍纍鶻眼黃一縷晚煙吹不去爲誰看意護秋霜欽叔愛之興定𥘉自請北行没于軍中贈孟州防禦使送任李二生赴舉塵澁鰲鈎公子恨風吹馬耳謫仙愁皇天老眼成人晚今日男兒得志秋官様文章堆筆底丗情風色候江頭主司不是冬烘物五色迷人莫浪憂汴堤懷古迷仙樓觀鬱連空一日都歸鬼唾中奢則兆亡天聽邇去而不返水聲東鎻煙弱桞愁蛾緑閣雨幽花淚臉紅緫爲錦帆歸不得至今啼鳥怨東風旬休飲嫋嫋東風雪外還又催春色動谿山百年莫作千年調十曰須謀一日閑千丈歸心詩卷裏一襟豪氣酒盃間醉鞭約住黃昏月馬首伭懸玉半環息軒乾没皇皇西復東不知假息禍機中黃金一旦隨胠篋腐骨千年付攓蓬世味甜於刀上蜜人心苦似蓼中蟲一庵松雪雙明底笑殺西山槁項翁九月七日飲紫霞零落帶孤禽平楚蒼蒼秋意深月過𥘉三半梳玉菊迎重九滿籬金天怜病骨商量煖雲促歸程計㑹隂風鴈飛來更瀟洒一枝蘆雪印波心牧牛圗三摩不受一塵侵本分功夫日念深杖屨得迴遊子脚葛藤灰盡老婆心㒹狂不作風頭絮出入誰傷井底金迴首人牛在何許一江明月夜沉沉狸奴畫軸三生白老與烏貟又現吴生小筆前乞與黃家禳䑕禍莫敎虚費買魚錢雜詩三首道人知我愛禪房浄掃階前紫石牀軟飽三盃風味好脫巾和月卧昏黃老子平生酷愛閑天敎行處得禪関粥魚𫾣落簷頭月猶在梅花醉夢閒殘陽収拾弟兄行揀得機心不到郷安置小奴今夜夢蘆花風細月如霜髙治中庭玉庭玉字獻臣思州人大定末進士章宗衛王朝甚有時名爲人豪爽尚氣節一時名士多歸之貞祐初自左右司郎官出爲河南府治中與知府復興屢以公事相可否時都城受圍使驛阻絶復興爲安撫副使懼獻臣謀巳乃以造逆訊之獻臣就逮龐才卿雷希顔王士衡辛敬之皆被羅織幾有一網之禍比赦至獻臣瘦死矣獻臣多作詩賦海中牛頭云鑿𨳩渾沌竅闖出神農首人多稱道之猶子廣之今在河平天津橋同李之純待月一首驂鸞追散仙乗槎抵銀潢跳上玉龍背抱得銀蟾光素娥愁不歸再拜捧瑶觴問以天上事玉色儼以莊爾能爲我歌白雪我亦爲爾搗玄霜不然借我廣寒殿與我長作無何郷傍有謫仙人拍手笑我狂天風忽吹散人月兩茫茫柳絮斷送春歸去紛飛不暫停和風三徑雪微雨一池萍蝶惹依芳草蜂沾過小庭静宜投隙地狂欲攪青冥得得穿朱户時時撲翠屏黃鸎枝上語似與訴飄零道岀平州寒食憶家柳色方濃别玉京程程又值石龜城山重水複人千里月苦風酸鴈一聲上國春風桃葉渡東陽寒食杏花餳楚魂蜀魄偏相妬兩地悠悠寄此情飛山怨漢家自有飛將軍軍中駭嘆箭有神一朝乃與獄吏對惜無千金書牘背手把屬鏤口衘須號天者三我何辜伊吾壯志長巳矣不得提携玉龍死可怜休唱白浮鳩至今秦人悲杜郵李治中遹遹字平甫欒城人明昌二年進士髙才慱學無所不通爲人滑稽多智而不欲表表自見工畫山水得前軰不傳之妙龍虎亦入妙品然皆其餘事也泰和中大興幕官時虎賊知府事賣權恃勢奴視同列平甫每以公事相可否不少假借又摘其隂事數十條欲發之虎謀篡者也聲勢熖熖人莫敢仰視乃爲一書生所抗積不平先以非罪誣染之幾至不測雖有以自解竟坐是仕宦不進以東平治中致仕閑居陽翟十餘年自號寄庵先生平生詩文甚多如云舊管新収粧鏡在昨非今是酒盃乾贈筆工云工不能書何以筆士須知筆乃能書感事云半錢利路人乃虎一鈎名餌吾其魚魯山道中云老夫自喜林野僻路人頗笑衣裳寛散失之餘不復全見矣臨終戒家人吾明日歸而輩慎勿遽哭果如期而逝家人哭不禁良乆𨳩目云戒汝勿哭令我心識散亂言畢目復瞑其明了又如此子冶字仁卿正大七年收世科屏山贈詩所謂仁卿不是人閒物太白精神義山骨者也贈中山楊果正卿士道彫喪愁天公隂霾慘慘塵濛濛三冬不雪春未雨野桃無恙城西紅春光爲誰作駘蕩造物若我哀龍鍾數行墨浪合眼死一包閑氣終身窮中山公子文章雄雅隨童稚爲彫蟲禰衡不過孔文舉坡老懶事陳元龍唯之與阿將無同乾坤萬里雙飛蓬飄飄南北東西風江村陸地無根客江村有髮僧兩盂殘喘粥一寸苦吟燈集句題廣寜勝覧亭薝前無數好峰巒醉眼詩腸冰雪寒不識閭山真靣目請君來此凭䦨干獅子峰解脫眼光三界静端公伎倆一時休雲閒正使金毛現子細看來是石頭送窮昔年曽作送窮詩結柳賫粮擬退之送去還來還復語君家猶有讀書兒使髙麗去國五千里馬頭猶向東宦情蕉葉鹿丗味蓼心蟲倦枕三更夢征衫八月風山川秋滿眼歸思寄孤鴻陳司諌規規字正叔稷山人明昌五年進士慱學能文詩亦有律度爲人敦厚動有禮節南渡以後諌官稱許古陳規而正叔不以訐直自名尤見重云仕至右司諫卒官子良臣今在燕中送雷御史晞顔罷官南歸五事前陳志拂劘屹如砥柱閱頽波一麾共惜延年去三黜何傷柳季和運蹇仕途如我老激昂衰俗在君多扁舟南去知難戀萬頃煙波一釣蓑過驪山豐鎬無由問故基三章止見黍離詩而今多少華清石都與行人剋豔辭馮内翰延登延登字子駿吉州人承安二年進士令寜邊日適閑閑公守此州與之考論文義相得甚歡故子駿詩文皆有律度正大末奉命北使見畱使招鳯翔不從欲殺者乆之割其鬚髯羈管豐州二年乃得還天興初元授禮部侍郎京城䧟自投井中子駿資禀淳雅與人交殊欵曲讀書長于易左氏傳好賢樂善有前軰風調甞欲作國朝百家詩而不及也有集號撗溪翁予過大名見於其子源如賦德順道院隴泉云玉壘制方維瓊漿閟仙宅何人斸雲根一旦泄地脉金匱鎻龍漦月窟逗蟾液銅壷漏水清玉斗天醴碧光揺日千道影落天一席窈然仇池穴自與天壤隔又登封途中遇雨留僧舎云濕雲若煙伭飛雨如矢集近山衣巳凉薄寒復相襲霽景凾草木秋意滿原隰林紅寒更殷山翠晴更濕不知髙幾許但見蒼壁立群峰誰暇數庭笋紛戢戢騰擲來眼中左右疲顧揖皆其得意句也郾城道中北風慘澹揚沙塵郾西三日無行人十村九村雞犬静髙田下田狐兎馴昨朝屏息過溪口知有白額藏深榛赤子弄兵更可惻路傍僵尸衣血新野叟傴僂行拾薪欲語辟易如驚􅍪瘦梅踈竹未慰眼只有清淚沾衣巾元日隆安道中山岡重複三竿日溪路縈迴一席天老境飄零情更惡又從馬上得新年宿三冢寺老栢蒼蒼纒去老藤招提牢落有殘僧瞑禽自入藏經閣飢䑕時窺照佛燈未得安心如北秀却思覔法趂南能濛濛雨暗門前路更得雲房一曲肱代郡楊黻之與余同辰月日時亦然渠有詩因爲次韻隂陽亹亹定何如自信祥金先有模曽見唐生談躍馬豈知阮籍亦窮途倦游笑我衰髯白弄筆怜君醉袖烏便欲移書與歐九略分餘論爲嘘枯寄笏靑柯平飛雪驚沙捲屋茅淸寒潑水透綈袍松風度壑江聲逺蘿月當軒扇影髙敢對名山談丗事不妨空腹貯離騷且將手版牢藏起政恐山人識馬曹射虎得山字田翁太息論三害獵騎俄驚見一斑涎口風生雷吼怒角弓寒勁月痕灣柳營共許千人敵魚服仍餘一矢還我欲殘年賞神駿短衣匹馬夢南山雪屋破寒無那庭空雪巳深山川非舊觀松栢見貞心凍雀争遺粒棲鴉點暮林携琴訪溪友清興憶山隂華清故宫寵貴羊羔退曲江華清霧閣對雲䆫層巒未了霓裳舞遷客俄驚羯鼓腔簷際踈星疑曉鏡天邊晴樹認髙幢逰人尚喜風流在白石涵波皁筴雙西園得西字芳逕層巒百鳥啼芝門里蘭畹自成蹊仙舟倒影涵魚藻畫㨂銷香落燕泥淑景晴薰紅樹煖蕙風輕泛碧藂低岡頭醉夢俄驚覺歌吹誰家在竹西八月十四日宿官塔下院二首野僧引客看脩竹拄杖入林驚瞑禽一道細泉鳴蘚磴怳如閑聽頴師琴喬松脩竹翠交隂涼月玲瓏地布金老懶無詩酬節物夜涼閑聽候蟲吟探春得波字劉鄧州祖謙祖謙字光甫安邑人承安五年進士歷州縣有政迹拜監察御史以鯁直稱其不能俯仰丗好蓋天性然也正大初爲右司都事除武勝軍節度副使召爲翰林修撰家多藏書金石遺文略備父東軒工畫山水故光甫以鑒裁自名至於信筆作簡牘尤有可觀一時名士如雷御史淵李内翰献能王右司渥皆逰其門得人一詩可傳必殷勤稱道唯恐不聞人以此稱之子敏仲今在平陽雅集圖翠雀翩翩野鶴孤玉京人物㑹仙圗後來且莫輕題品席上揮毫有大蘇崆峒山圗爲撗溪翁賦二首好竒仍有客相携絶頂披雲快一躋三十六峰靑似染五年拄笏羡横溪獨占名山每羡渠京塵今日汚吟須西州十載經行處惆悵雲煙是畫圗髙慱州憲憲字仲常遼東人祖衎字穆仲國𥘉進士仕至吏部尚書伯父守義大定十六年進仕父守信以䕃補官叔守禮宣徽使仲常黃華之甥㓜學於外家故詩筆字畫俱有舅氏之風天資頴悟博學強記在太學中諸人莫敢與抗泰和三年乙科登弟自言於丗味澹無所好唯生死文字間而巳使丗有東坡雖相去萬里亦當往拜之屏山故人外傳說仲常年未三十作詩巳數千首矣釋褐博州防禦判官遼陽破没於兵閒元夕無燈九陌無燈夜悄然小紅時見點春煙多情唯有梅梢月拍酒樓頭照管絃寄李天英稻秸蒼蒼陂巳枯西風剪剪弄楸梧蒹葭水落魚梁迥蟋蟀聲髙山驛孤社瓮新成元亮酒并刀細落季鷹鱸作詩逺寄霜前鴈人在海東天一隅題新山寺壁列壑攅峰發興新落花飛絮舞餘春虚堂坐視三千界冠者相從五六人㵎草軟宜丞屐齒溪泉清可濯纓塵静聽山鳥松風裏始悟人間樂未真焚香六言四首抺利花心曉露薔薇蕚底温風洗念六根塵外忘情一炷煙中滿地落花春曉一簾微雨輕隂正要金蕉引睡不妨玉隴知音帋帳収煙宻下松灰卷火常虚午寂春閑小睡人間自有華胥沉水濃薫甲煎宫梅細點波津奕奕非煙非霧依依如幻如真長城秦人一鎩連雞翼六國蕭條九州一祖龍跋扈侈心開牛豕生民付碪礩詩書簡冊一炬空欲與三五争相雄阿房未了蜀山上石梁擬駕滄溟東生人膏血俱枯竭更築長城限裘褐卧龍隱隱半天下首出天山尾遼碣豈知士秦非外兵宫中指鹿皆庸奴驪原宿草猶未變咸陽三月爲丘墟黃沙白草彌秋塞唯有坡陁故基在短衣匹馬獨歸時千古興亡成一慨王監使特起特起字正之代州崞縣人智識精深好學善論議音樂技藝無所不能長於辭賦岀入經史摘其英華以爲句讀如天造神岀至得意不减郭黼在張代州門下與屏山爲忘年友泰和三年進士甲科調真定府録事叅軍有惠政民立碑頌其遺愛改令沁源又遷司竹監使朝議欲以舘職召試會卒遊龍德宫聮句云棘猴未窮巧槐蟻或失王賦雙峰競秀云龍頭矗雙角駞背堆寒峰華山云三峰盤地軸一水落天紳造化無遺巧丹青緫失真閑閑公屢哦此詩以爲妙沁源山中野夫不識武城宰問之無言色微改但說今年秋雨多黃芪滿谷無人采踏徧西城錦石盤暮投佛屋解征鞍隔林依約見燈火山谷人家𥘉夜寒張代州挽大節砥柱堂堂閱潰川諌書一帋力回天兩朝眷倚傳龜玉五郡歡謡𬒳管絃茇舎棠隂餘舊緑夜臺松月耿孤圎行人謾洒碑前淚誰識顔公是地仙謾作有時幽鳥話心事無限秋蟲誇口才北闕上書吾老矣東籬把菊思悠哉竹林留得巨源在蓮社招入淵明來不然餘子敗人意懷抱耿耿胡爲開偶作人情争勝似争棊死怕輸人一着遟黒白不分傍䄂手年來吾亦愛吾癡絶句二首山勢奔騰如逸馬水流委曲似驚蛇溪靈不欲露天巧眼力未到雲先遮鳥語留春春巳廻落花隨意卧蒼苔清明寒食因循過萱草薔薇次弟開下弟人間萬事等樗蒲敢謂何人不得盧勝負到頭俱偶爾狂夫安用繞牀呼李經經字天英大定人作詩極刻苦如欲絶去翰墨蹊逕間者李趙諸人頗稱道之甞有詩云鴈奴失寒更拍拍呌秋水天長夢巳盡秋思紛難理最爲得意其餘或有不可曉者累舉不弟卒雜詩六首長河老秋凍馬怯冰未牢河山冷鞭底日暮風更號晨井凍不爨誰療壯士飢天廐玉山禾不救我馬􅯁塵埃汨没伺候工離騷不振矜魚蟲風雲誰復話蓍蔡不圗履狶哀屠龍挾牋搦管坐書空咿嚘堂上酣歌鐘乃知造物戯兒童不妨逺目送歸鴻莫怪魏瓠無所容此去未許江舩東五經不掃途轍窮門庭日月生皇風太阿剖室礪以石坐掃鸛鶴揺天雄巖椒鬱雲曰夕生隂雨雪縞夜秋黄老林人煙墨突樵徑雲深造物開巖地巖帳揜劒壁苔花張古錦霜苦老秋碧日夕雲竇隂風鼓泉湧石馬蹄忌磽确樵道生枳棘盤盤出井底廻首悵如失長老不耐事底事挂塵迹披雲出山椒白鳥表林隙梁太常持勝持勝字經甫絳州人本名洵義避宣宗諱改父襄字公賛大定𥘉進士質直尚義有古人之風仕至保大軍節度使有諌興陵田獵表傳於丗其賀章宗即大位表云曽天子袓天子丗嫡相承舜何人子何人自強不息又自河南府倅移華州防禦使謝上表云昔同雒尹巳陪嵩岳之呼今領華防願効封人之祝丗亦稱之經甫泰和六年進士制䇿優等宏辭亦中選爲人儀觀雄偉以文武志膽見稱貞祐初由太學慱士爲咸平治中宗室承𥙿辟爲僚佐承裕死太平謀不軌以兵脅經甫使作文移經甫大罵不從即日遇害時年三十六贈韓州刺史初赴官有詩云山雲欲雨花先慘客路無人鳥亦悲人以爲䜟云海棠一首野杏山桃委路塵芳華都屬錦城春只縁造物偏留意任使無香亦可人粉白謾誇䊋様巧烟脂難染睡痕新沉香亭子勾欄畔消得君王比太真愚軒居士趙元元字宜之定襄人經童岀身舉進士不中以年及調鞏西簿未幾失明自少日慱通書傳作詩有規矩泰和以後有詩名河東李屏山爲賦愚軒有落筆􅊳兀無黃初之句愚軒宜之自號也用是名益重南渡以後往來洛西山中閑閑公雷御史王子文許至忠崔懷袓皆愛之所至必虚左以待爲人有材幹處事詳雅旣病廢無所營爲萬慮一歸於詩故詩益工若其五言平淡處他人未易造也宜之之父名淑字清臣由門資叙與先隴城爲莫逆交故好問交游閒得宜之之詩爲多子顒有隱節今居郷里鄰婦哭鄰婦哭哭聲苦一家十口今存五我親問之亡者誰兒即被殺夫遭虜鄰婦哭哭聲哀兒郎未埋夫未廻燒殘破屋不暇葺田疇失鋤多草萊鄰婦哭哭不停應當門户無餘丁追胥夜至星火急并州運米雲中行渡洛口一脉寒流兩岸冰斷橋無力強支撐忘機羡殺沙鷗好不省人間有戰争書懷繼元弟裕之韻蓍龜不須問我命只自知多生墮宿業丗網纏綿之驊騮受羈銜大笑跛鼈遟跛鼈亦復笑縮首甘自卑何必叅漆園物理本自齊㯽榔可消榖志士常苦飢穆之萬人雄猶不免此譏我懦更多病區區欲何爲鍾鼎不可倖藜藿分所宜安能如黃蜂爲人填蜜脾清白儻少汚平聲後人何所貽初學悔大謬篆刻工文辭年來厭酸鹹淡愛陶潜詩愛詩固自佳其如未忘機回頭四十年言動俱成非誰能逐丗利日乆常規規惟當種溪田與子常相期䆫扉有生意山間春到時長安冠蓋塵游哉不如兹西疇將有事老農真吾師不見元魯山夢寐役所思遺山乃其後僻處政坐詩時復一相過照眼珊瑚枝竒書多攜來爲子卧聽之少從白衫游氣與山崢嶸一念墮文字腸腹期拄撐多機天所災室暗燈不熒拈書枕頭睡鼻息春雷鳴泰山與鴻毛何者爲重輕蹄泓與渤澥誰能較虧盈如能平其心一切當自平嵩箕有竒姿出雲何悠然雲山足佳處留客今幾年有子罷讀書求種山閒田栗里愧淵明香山慚樂天二老巳古人相望雲泥懸得酒邀月來對影空自憐攝衣欲起舞稚子不須牽喜霽片叚溪雲破縱撗野水淙人閑泥塞路蠅動日烘䆫胤壁苔痕滿侵堦樹影雙還思釀新黍瓮靣挹秋江詩送辛敬之東歸二首風埃憔悴舊霜袍老去新詩價轉髙橡栗漫山猶可煑不須低首向兒曹文章無力命有在一點浩然天地間風雪滿頭人不識又携詩藁出西山修城去甲戍歳忻城䧟官復完治途中聞哀嘆聲感而有作修城去勞復勞途中哀嘆聲嗷嗷幾年備外敵築城恐不髙城髙慮未固城外重三壕一鍬復一杵瀝盡民脂膏脂膏盡猶不辭本期有難牢護之一朝敵至任椎擊外無強援中不支傾城十萬口屠滅無移時敵兵出境已踰月風吹未乾城下血百死之餘能幾人鞭背駈行𥙷城缺修城去相對泣一身赴役家無食城根運土到城頭𥙷城殘缺終何益君不見得一李勣賢長城莫道丗閒無李勣田閒秋日三首好雨知時便放晴天和醖釀作西城秋収但得官軍飽未怕輸租逺十程禾穗纍纍豆角稠崧前村落太平秋熈熈多少豐年意都在農家社案頭皤翁傴僂負薪行稚子跳梁剥棗聲不似二姑忙更殺晚春椎髻脫釵荆客况廬山踏遍却歸崧世事悠悠付老慵樂近僧居非佞佛苦無田種強爲農菊花雨似人情冷梨葉霜如酒力濃一十五秋河表客合敎節物笑龍鍾學稼不堪炊煑一箱書十口東西若可餬食禄巳慚中隱吏墾山聊作下農夫稾遺埸圃無多積子入官倉困逺輸近日愚軒睡眠少打門時復有追胥立秋日况味年來老比丘禅房三伏得遟留連宵雨作垂垂曉十口家貧盻盻秋熟未先須伺禾黍有無何暇問衣裘半生枉却親燈火一事不成空白頭村居夏日官府不著名散跡村落深白雲自朝暮青山無古今愛此夏曰永門巷多繁隂呼兒具繩床不履亦不簪殷勤好風來爲我消煩襟一飽萬事了何用腰黃金羈勒困名馬網羅多珎禽何如山鹿癡􅊯􅊯戀長林次韻荅𥙿之薄暮𫾣門喜客佳水萍風絮共天涯行藏一話傾心肺古律三詩淬齒牙朱研不妨閑度日青山終得共飡霞扶持老病須君輩滿地豺狼萬里家書懷懶退無心廪與庖願携諸子斸山磽閑消白日醒吟醉猛省浮生夢幻泡窈窕雲山三兔窟漂揺風樹一鳩巢聮名便入村家社莫認公卿是故交寄裕之二首汨没兵塵滿鬢霜買鄰心樂古清涼閑陪老秀春行脚悶欠臞元夜對床正欲脫身求兔窟誰能隨丗轉羊腸南陽未比嵩陽好滿眼交游即故郷老嬾愚軒百不能飽諳人意冷於冰清狂舊日躭詩客灰朽而今有髮僧夢褁帋衾三丈日話延雪屋一龕燈新開一逕通蘭若斬盡清涼舊葛藤丙子夏卧病汗後有作枯腸得水若通靈渙汗週身一雨零行客筋骸困方歇醉人心骨喚初醒病蟬移夢入新殻老鶴息神梳舊翎乞得殘骸對兒女不愁無粟貯陶瓶宿少林寺雙輪走雞棲下嶺分閒道行行得精舎翠崦作迴抱諸峰知客來故故顔色好征衫滿塵土慚愧方丈老殷勤一瓣香爲我除熱惱丗縁如落花籬䄄跡俱掃箇中有佳處行脚恨不早一庵袓師傍異日親結草晚出坐乆卧還起畏此夏日長岀門鬢鬔鬆西日明半墻鳩鳴舎東柳雌和墻南桑十日暑煩苦一雨方論量偶然釋憂抱露坐移繩床群兒莫相催老子便晚凉次韻裕之見寄二首魚入深淵鶴在隂飛潜何幸逺庖砧乾坤萬里雲無迹冰雪三冬栢有心故國鉤留清夜夢歳華分付白頭吟莘川擬作桃源隱共與青山閱古今古屋颼颼四壁塵不堪憂獨足吟呻瓶儲看客常年慣家具爲農近日新丗味飽甞唯可睡詩情漫苦不醫貧相從分我西山半欲乞臞元伴老身題裕之家山圗繫舟盤盤連石嶺牧馬澄澄倒山影山光水氣相混涵中有元家舊廬井鴈門一𨳩豺虎場駕言投迹嵩之陽青山偃蹇不可將十年竟墮兵塵黃東巖風物知猶在說與寄庵神巳㑹一揮淡墨能似之清輝逺寄形骸外元家故山吾與鄰夢見不如畫圖真舊曽行處聊經眼未得歸時亦可人早發寳應龍門道中有感山僧送客客行東迴首雲寮夢寐中人語吚􅊯村店火㡌簷欹側石門風伊川逺映春冰緑少頂先攙曉日紅爲問年來幾還往只應烏鵲識衰翁欽若遽有啇於之行作長語爲別兼簡仲澤弟一笑盧山鋩然深可居洛水蚓然清可漁嘉哉山水有如此不能留客如蘧廬楚茅不入干王誅大帥分閫臨商於謀叅帷幄渇英俊蒐羅逺到山間癯隴西四欽出將種人愛若也温而愉朅來誰飛薦鶚書枕前墮檄催馳驅行叅幕賔亦大可把酒當爲帥君賀王家仲澤如仲宣共看吐竒飛玉唾一軍號令雅歌中聲落荆蠻膽先破愚軒退居如甑墮閑暇多君時見過明朝笑語隔関山一月須拚靣墻卧丁亥三月二十五日雪夬變乾將至隂凝陽不流雨飛猶帶雪風急似號秋草木無春意関河慘客愁天心寜易測三嘆索冬裘大暑旱雲飛火燎長空白日渾如墮甑中不到廣寒冰雪窟扇頭能有幾多風讀樂天無可奈何歌鳧脛苦太短蚿足何其多物理斬不齊利劒空自磨老跖富且壽元惡天不訶伯夷豈不仁餓死西山阿天意寓冥邈人心徒揣摩不如且飲酒流年付蹉跎酒酣登髙原浩歌無奈何哀古道山深道壞水縱撗怪得春來少客行不信天敎人迹斷水乾更遣蒺䔧生薛鼎臣罷登封弄人鼓笛不相疑便着當場傀儡衣終日抱飢唯飲水也和醉客一時歸鼎臣材大夫宰登封有惠政今以例罷故有上句宻國公璹宻公字子瑜興陵之孫越王之長子百年以來宗室中弟一流人也少日學詩于朱巨觀學書于任君謨遂有出藍之譽文筆亦委曲能道所欲言朝臣自閑閑公楊禮部雷御史而下皆推重之資雅重薄於世味好賢樂善寒士有不能及者明昌以來諸王法禁嚴諸公子皆不與得外間交通故公得窮日力於書讀通鑑至三十餘過是非成敗道之如目前越王薨後稍得出㳺文士輩亦時至其門家所藏法書名畫㡬與中秘等客至貧不能具酒肴設蔬飯與之共食焚香煑茗盡出藏書商畧之談大定明昌以來故事或終日不聼客去風流藴藉有承平時王孫故態使人樂之而不厭也所居有樗軒又有如安自號樗軒老人其詩號如庵小槀圍城中以疾薨時年六十一秋郊雨中羸驂破蓋雨淋浪一抺煙林覆野塘不着沙禽閑點綴只横秋浦更淒涼宴息二首宴息春光晚閑眠晝景虚冥心居大道逹理契真如樂對忘形友欣逄未見書世閒幽隱者何必盡樵漁日日閒窓下簞瓢樂不殊花魁穠且艶湖玉秀而臞憶友㝷詩卷思山展畫圖丹青傳六逸能著老夫無梁䑓汴水悠悠蔡水來秋風古道野花開行人驚起田間雉飛上梁王鼓吹䑓自適晴晝揺涼光長空澹虚碧燕鴻亦何爲老翅南又北衰柳墮殘葉庭户覺岑寂幽人誦佛書清香縈几席西方病維摩東臯醉王績俱到忘言地佳處畧相敵小齋蝸角許夜卧膝仍屈能以道眼觀寛大猶四極有書貯實腹無事梗虚臆謝絶聲利徒尚友古遺直城西雁帶邊聲逺牛横廢壠長人居似河朔岡勢接滎陽禾短新村墅沙平古陣場悠然望西北暮色起悲涼送王生西逰飛伯紫陘仙人今淵雲騎風御氣七尺身丈夫耻與噲等伍故作野鶴昂雞羣往年書劒㳺梁日咳唾中間滿珠璧温子徒勞手八义蘇老猶迷日五色慨然拂袖逰嵩陽西南陌上書傳香仲宣堂堂舍我去舉杯却愁愁更長去程相近黄花節三十六峯如玉列龍門楓葉墮紅綃洛浦蘆花舞晴雪勲名細事猶秋毫政可痛飲讀離騷天津月照紫綺裘緱嶺風吹靑玉簫我無羽翼隨君起浩歌相送秋光裏慿髙西望青茫茫落日無情下寒水王生以秋騷見示復此謝之三年京國與君逰每限知君尚未周始露雄文陵楚些又登長陌佩吳鉤燈殘茅店雞催曉霜落金風鴈喚秋後夜文星岀西洛仲宣知在水南樓自題冩真枯木寒灰久亦神應縁來現胙公身只因酷愛東坡老人道前身趙德麟樗軒常封胙國公故云黃華畫古栢黃華老人畫古栢鐵簡將軍挽大弨意足不求顔色似荔支風味配江瑶鐵簡万户以神射名天下書龍德宫八景亭刻桷朱楹墮紺紗裙腰草色趂堦斜誰知剥落亭中石曽聽宣和玉樹花思歸四時唯覺漏聲長幾度吟殘䗶燼釭驚夢故人風動竹催春羯鼓雨𫾣䆫新詩淡似鵝黃酒歸思濃如鴨緑江遥想翠雲亭下水滿陂青草鷺鷥雙如庵樂事人間最美安心睡睡起從容盥漱終七卷蓮經爇沉水一柸湯餅潑油䓗因循黙坐規襌老取次拈詩教小童炕煖䆫明有書冊不知何者是窮通題晉卿玉暉寳繪顧陸張吳寳繪堂風花雪月保寧坊錦囊玉軸三千幅翠袖金釵十二行數筆丹青參李范一時遷謫爲蘇黃太原珍玩名天下舊跡猶慿古印章得友人書聞有書來喜欲狂紫芝眉宇乆難忘别離唯嘆我頭白詩句屢成君馬黃公幹覊栖猶洛下孔明髙卧尚南陽冷官領取閑中趣逺勝區區夢蟻忙内族子銳歸來堂一旦能知夢裏真平生看破主中賔歸來堂上忘形友名利埸邊稅駕人東郭風煙冝蕙帳南山猿鶴識綸巾清尊雅趣閑棊味盞盞冲和局局新題潘閬夜歸圖不是詩人㶚水壖又非野老曲江邊風姿便認王摩詰藴藉還疑李謫仙驢背倒騎蓮岳下牛腰穩跨竹林前掀髯對月餘髙興明日佳篇幾處傳漫賦貧知囊底一錢無老覺人間萬事虚富貴儻來終作麽勲名便了又何如季膺未飽松江鱠魯望將成笠澤書自是杜門無客過不関多病故人踈寓跡寓跡中山記昔年西溪卜築欲終焉飄零何在五株柳離亂難歸二頃田漫叟未能忘野寺道人猶解識林泉吾郷巳宅無何有一笑醯雞盡瓮天秋晚出郭閑逰塵中俗事海漫漫暫出城闉借眼寛沙麓去邊羣牧小野雲平處一鵰盤殘荷露水秋光晚衰柳揺風古渡寒此幅大年横景畫魯岡圖上似曽看老境老境唯襌况幽居似寳坊酒盃盛硯水經卷貯詩囊懶甚書彌少閑多夢自長不知何處雨徑作夜來凉北郊晚歩陂水荷凋晚茅簷燕去凉逺林明落景平麓淡秋光群牧歸村巷孤禽立野航自諳閑散樂園圃意尤長閑詠歳晚陶元亮平生馬少游凋殘半枯木浩蕩一虚舟鶴望塵迷眼雞棲屋打頭瓶儲尚蕭索焉敢計菟裘池蓮輕輕姿質淡姢姢點綴圎池亦可憐數點忽飛荷葉雨暮香分得小江天梁園一千八里汴堤柳三十六橋梁苑花縱使風光都似舊北人見了也思家釋迦出山息軒畫厖眉袖手出巖阿及至拈花事巳訛千古雪山山下路杖藜無處避藤蘿過胥相墓亭亭華表映朱門始見征西宰相尊下馬讀碑人不識夷山髙處望中原秋日小雨白鷺徘徊花鴨逰城南城北幾汀洲緑荷風底飛來雨做弄今年甲子秋東郊瘦馬此歳無秋畎畝空病驂誰遣齧枯叢倉儲自益駑駘肉獨爾空嘶苜蓿風枕上聽雨卧聽羯鼓打凉州元是芭蕉細雨秋庭際玉簪𨳩幾許小䆫特地暮香幽溪景飛飛鷗鳥自徜徉也解新秋受用凉日暮碧溪微雨過滿風都是藕花香題紙衣道者圖紫袍披上金撗帶藜杖拖來紙掩襟冨貴山林争幾許萬縁唯要緫無心春半喜晴隂寒二月雪含雲兩日𨳩晴淑景新借問海棠紅㡬許杏花楊柳不曽春漁父詞二首楊柳風前白板扉荷花雨裏緑蓑衣紅稻美錦鱗肥漁笛閑拈月下吹釣得魚來卧看書舩頭穩置酒葫蘆煙際柳雨中蒲乞與人間作畫圖馬伏波可歎迂踈一老翁豈堪床下拜梁松明珠薏苡猶難辨萬里争教論杜龍留侯辟糓輕身慕赤松不知誰舉傳春宫君方避溺猶居水忍使餘波及四翁對鏡二首鏡中色相類吾深吾靣終難鏡裏㝷明月卬空空受月是他空月本無心明明非淺亦非深何事癡人泥影㝷照見大千真法體不関形相不関心夏晩登樓登樓晩暑復相攻快意淸風忽此逢雲似碧山天似水霽波平浸兩三峯華亭丗尊遺法本忘言敎外别傳意巳圎隻履携將葱嶺去不妨來上月明舩中州戊集卷終
