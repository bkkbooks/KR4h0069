body:
  text: 白先生賁一首王内翰樞一首晦軒先生趙晦一首浚水王先生丗賞四首南湖靖先生天民一首東皐桑先生之維一首歩元舉一首馮文叔一首張庭玉一首宗道一首鮮于溥三首史士舉二首王敏夫二首王利賔一首孫益一首郝先生天挺一首孫􅀖傑一首張瓛一首徐好問一首吕六鵬一首髙永一首曹用之一首趙達夫二首邢安國二首張温一首馬舜卿一首劉曹王䂊七首杜丞相充一首虞令公仲文一首張丞相孝純一首張左相汝霖一首劉右相長言一首右相文献公􅁘律履一首張平章萬公一首董右丞師中一首孫太師鐸一首梁叅政􅚻一首賈左丞益謙一首丞相壽國髙公汝勵一首胥莘公鼎一首張左丞行中一首楊戸部慥二首鄭内翰子聃一首孟内翰宗獻六首趙内翰攄一首趙文學承元一首張太保行簡三首張内翰楫四首閻治中長言八首李治中著一首擬栩先生王中立六首王先生予可七首照了居士王彧三首無事道人董文甫七首薛継先四首白先生賁賁汴人自號决壽老自上丗以來至其孫淵俱以經學顯客有求觀予孝經傳者感而賦詩古人文瑩理後人但工文文工理愈暗紙扎何紛紛君看六藝學天葩吐竒芬詩書分躰製禮樂造乾坤千岐更萬轍要以一理存如何臻至理當從踐履論茇渉經險阻鑚研閲寒温孝第作選鋒道德嚴中軍仰觀及俯察萬象入見聞不勞施斧鑿筆下生煙雲髙以君唐虞下以覺斯民君如不我鄙時來對爐熏王内翰樞樞字子愼良郷人遼日登科仕國朝直史館三河道中十載歸來對故山山光依舊白雲閑不須更讀元通偈始信人間是夢閒睡軒先生趙晦晦字光道管城人宋末代州法曹秀容主簿汴京破後不復仕自號睡軒居士子洵子都大定二十年進士真定路緫管判官孫綱三赴廷試以䕃􅀘官終于永壽令曽孫居禮之讓今在燕中暮春壓枝梅子半靑黄葉底残紅雨褪香翠鈿舞風榆落莢緑鍼浮水稻抽秧酒濃猶覺春酲困睡美方便午夢長苦被啼鸎訴花老揮毫􅂓作送春忙浚水王先生丗賞丗賞字彦功汴人與尹無忌王逸賔趙文孺相周旋明昌中保舉才能德行賜出身釋􅄄鞏州敎授終于鹿邑簿有浚水老人集傳于丗立春後十日登樓今日登樓眼風煙倍􅁴新溪梅初破蕚屋雪半融銀鴈外天逾碧鷗邊水自春兒曹應見􅀏吟望獨傷神春雪只謂春天暖寧知雪霰飛龍蛇且深蟄花柳不勝威糝糝凌風細紛紛帶雨稀誰當問穹昊生殺果何機探梅候得南枝破玉腮心顔今日爲君開細看苔逕無行跡先賞應輸我獨來稱善齋宮途馳逐只堪羞何意須封萬户侯平日少游真可念絶勝辛苦駐壷頭南湖靖先生天民天民字達卿􅇭陽人其父國初官原武因而家焉少日甞兩魁郷試自望者不碌碌所與交如龐才卿楊茂才劉之昂王逸賔皆一時名士晚年買田南湖葺亭圃植竹樹以詩酒爲事自號南湖老人年七十九卒子文煒德昭從孫顒子昂西子放瓢圖髻鬟蕭颯苧羅秋千古香溪水自流吴越兵争竟何得風流輸與五湖舟東皐桑先生之維之維字之才恩州人蔡丞相伯堅之子婿也以樂府著稱有東皐集傳于丗白髪白髮近年見十中三兩莖半因愁儧出多爲病添成梳裏有時落鑷餘還又生老知無可避何處是功名歩元舉元舉関中人下弟過榆次栖遟零落未歸人巳坐無成更坐貧意氣散論題柱客晨昏多􅀒􅀝門親囊空漸覺錢餘貫衣敝翻饒虱滿身遥望秦関獨惆悵一天風雨落花春馮文叔文叔遼東人客舎秃􅁭紬􅄄破書囊十五年來客異郷生事穽中揺虎尾窮途天上轉羊腸三朝不遇馮唐老半夜悲歌􅇞戚狂獨􅀝牛車望遼海西風塵土鬢蒼蒼張庭玉庭玉字子榮易縣人能日賦百篇有集行于丗即事烏鳶繞樹山棃熟胡蝶穿花木槿開赤脚城中借書去蒼頭原上􅀒薪來宗道道字雲叟山隂人以足疾不仕有詩云家藏千卷冨身得一生閑茅屋經年補柴門盡日関其自處可見寶嵓僧舎寂寂鍾魚栢滿軒午風輕颺煑茶煙西堂竟日無人到只許山人借榻眠鮮于溥溥字彦仁宋文臣子駿之後髙祖淳淳之子孝標標之子壽吉壽吉之子坦皆擢進士弟而仕亦達彦仁坦之子以門資仕終于櫟陽令濟源盤谷天壤佳處坦父子居其間飲酒賦詩翛然塵垢之外至今人以髙士目之弟彦魯子忠厚今居郷里魯村道中小橋沙路巳堪圖更着衰翁跨蹇驢暮靄似催寒日短秋容仍帶逺林踈鵰盤平野黄榆落兔走横岡白草枯漸喜閑身逺朝市一年強半在村墟春日倣舊詩體年老逢春莫等閑逢春能得幾回看挿花儘要花枝滿把酒休辝酒琖乾好向酒邊留舞袖不妨花外駐吟鞍聞身徤在須行樂燕語鸎啼春又残早發燈前夢断家千里馬上詩成月一痕晨粥未烹官路逺隔林煙火是漁村史士舉士舉字仲􅂛滎澤人漢功臣弘肇之後髙祖所賜鐵劵故在其大父官濟源樂其山水因家焉父神山令激石琚牓進士仲􅂛以䕃補官歷銅鞮三川兩縣令初任京兆録事以歳旱擅開倉賑貧身往太一湫禱雨㝷􅀗嘉澍用是得名爲人雅重知義理褒衣緩帶消揺山水閒宛然一老書生也貞祐之亂避于太行保聚失守老㓜皆出降仲􅂛義不受辱投絶㵎而死年七十九孫庭玉宇德秀今居山陽超化石根寒溜迸珠璣㝷丈驚看雪浪飛我是玉川煙水客蹔來盤礴亦忘歸􅀳祠小橋流水竹蕭森竹裏人家一徑􅀷只欠東風小籬落梅華踈淡月籠隂王敏夫敏夫五臺人作詩工於賦物甚爲趙宜之所稱鴈門前輩中有許蛻子遷以武皇廟詩著名又酒渇後四句云眼底恨無雲夢澤胷中疑有沃焦山南䆫花影三竿日指􅀧銀瓶照病顔有集傳河東往往稱此倪民望字具瞻屏山所謂倪侯頭如筆其鋒不可當者有種松詩云種松莫種柳種柳莫種松堅脆非所計雅俗寧與同可是種松無􅂩地却敎憔悴柳隂中張韶九成􅀉朔州苟輔臣云陳雷膠漆輕餘子楚漢風雲属少年李忠直卿賦雪云不將柳絮春風比好作梨花月夜看至于蘇吉莘老李鵬翼冲霄與具瞻之子仲儀詩文多可傳喪亂之後惜不能記憶之矣同東嵓元先生論詩林逋仙去幾來年驚見梅花弟二篇千歳氷霜松骨瘦九秋風露鶴聲圎騰輝定出連城上得趣知從太古前邂逅茅齋話終夕只疑人丗改桑田李氏友雲樓霧幕煙迷十二欄壷觴招我一躋攀黄簾卷起湘川竹分得西州數􅀧山王利賔利賔字茂實襄城人朴直純素作詩有古意似其爲人然亦未甞以示人也家與衞昌叔隣居而不相往來計平生所交唯不肖而巳予一日過襄城知茂實病就卧内􅀱之乃見壁閒所黏五言古詩十數首竄改重疊往往可傳然後知茂實所以交予者特以詩故耳渠旣不言予亦無從知之惜登時不謄冩今忘之矣題扇頭輕紗畫竹雀柄短不􅄹握暑氣正憑陵清風一何邈孫益益字德􅁉秀容人甞從先大夫學詩送張安中還雲中名保極雲朔名士相送還相送臨分手重分驊騮欣得路鴻鴈惜離羣木落黃華露城伭紫塞雲中秋月正好千里謾思君郝先生天挺天挺字􅀳卿陵川人家丗儒素伯父子颺有詩名號東軒老人先生少日有賦聲早衰多疾厭於名場遂不復就舉貞祐之兵避于河南往來其衞閒爲人有崖岸耿耿自信寧落薄而死終不一傍冨兒之門年五十七卒於舞陽臨終浩歌自得不以死生爲意其平生自處爲可見矣好問十四五先人令陵川時從先生學舉業先生教之曰今人賦學以速售爲功六經百氏分磔綴緝外或篇題句讀之不知幸而得之不免爲庸人况一敗塗地者乎又曰讀書不爲藝文選官不爲利養唯通人能之又曰今丗仕官多用貪墨敗官皆苦于飢凍不能自堅者耳男子生丗不耐飢寒則雖小事不能成子試以吾言求之先生工于詩時命好問属和或言令之子欲就科舉詩非所急將無徒費日力􅁘先生曰君自不知所以敎之作詩正欲渠不爲舉子耳子思温字和之孫經字伯常今居順天送門生赴省闈靑出於藍靑愈靑小年􅂣屋便馳聲未饒徐淑早求舉却􅀏陸機遟得名嗟我再衰空眊矂喜君初筮巳崢嶸此行占取鰲頭稳平地煙霄属後生孫􅀖傑􅀖傑字伯英雄州容城人曽祖堅國初有功官至隴州刺史伯英少日住太學有時名所與游皆名士興定初知丗將亂棄家爲黃冠師燒笋煨茁舊聞山谷語勸耕還憶大蘇詩傳將火候無多訣留得天真又一竒未放錦䙀開束縳巳看玉版證荼毗白麻初拜驚燒尾見此應慚冨貴癡張瓛瓛字君玉大名朝城人嗜作詩年巳老而刻苦殊未减爲人謹愿有禮見稱諸公閒卒年六十八子鏞鎮今居郷里送侯道士十年走南北黃塵汙人衣翩翩夜啼烏一枝無可依問君何所如鳬舄東南飛恨我不得往失脚穽與機從君知不能一􅀏人閒非何水無蒲魚何山無蕨薇終當拂衣去往叩雲山扉徐好問好問字􅁉之永寧人龍門䟽鑿而來道路通行人萬古翠微中南山山寺題詩滿一字何曽到禹功吕大鵬大鵬字鵬舉宻縣人自言宋名相申公之裔宣宗頻歳南伐鵬舉作詩欲以撼主兵者云縫掖無由挂鐵衣劒花生澁馬空肥燈前草就平南䇿一夜江神泣涕歸其以氣岸自許皆此􅀋也夏日北渡後作旋移石枕拂藤床細洒槐隂趂晩凉大地嗷嗷困爐鼎老天不肯下残陽髙永永字信卿出于盤陽大族父元字善長敎信卿作舉子讀書略通即棄之去爲人不顧細謹有幽并豪俠之風賔客入門則盡家所有者爲具不爲明日計人以此愛之貞祐初避兵太原與李長源居于廣平寺有盗穴墻而入長源性恇怯聞騷窣聲噤不敢語盗盡挈信卿所有而去長源徐曰緑林之子至矣於是信卿生理大狼狽南渡居嵩州出入屏山之門其學遂進􅀄名䕫字舜卿又名揆屏山改焉真定王之竒士衡攻雜學屏山目爲怪魁王從之内翰爲賦善哭詩奉聖馬餌􅂛公敢爲大言著書十萬言號北新子大略以談兵爲主且曰古人兵法非不盡但未有北新子五十里火雨耳信卿皆與之游故其詩豪宕譎怪不爲法度所窘有冰柱雪車風調觀咀龍篇及大􅀨後見􅀉可槩見矣正大壬辰病没於京師年四十六跋賈天升所藏叚志寧山水蒼壁雲氣湧長松風雨寒湍流擘山出玉虹飲溪灣胷中無雲夢筆底無江山想見破墨初布袖蛟龍蟠壯觀駭心魄萬象本自閑寒齋静相對逺意空追攀曹用之用之歸德人㓜有賦聲屢中甲乙詩亦有功甞戲作􅀑仙語云瀏瀏竹閒􅀨熒熒牎下燈相逢不相顧含淚過巴陵詩有本事中山楊正卿能道所以然真人作􅀑語也憶舊花鳥廵簷喚曉晴喚來和氣滿春城春風二十年前客煑酒靑梅也後生趙達夫達夫太原人性嗜讀書而不事科舉南渡後居緱氏山中安貧守分故終丗窮悴壬辰之兵遇害紅梅西湖句好巳成塵蠟􅀧都能幾許春乞與瓊兒薄梳洗才情留待月中人柳楊柳􅍴春不耐秋十分憔悴儘風流水邊沙際風煙冷收拾殘陽合暮愁邢安國安國字仲祥沁州武郷人少日有賦聲四十歳後即不應科舉以詩酒自娱避亂客泌陽十餘年後北歸俻極艱苦其見於詩者如此往時李長源傳仲祥柳花一詩渠甚愛之今以丹崖集校之與傳者不同當是長源曽與商略之耶楊花細􅀧輕團轉復飄隋家堤岸覇陵橋非綿非絮寒無用如雪如霜暖不消狂惹客衣知有恨巧㝷禅榻故相撩陂塘回首浮萍滿依舊春風擺翠條過唐州西李口白沙翠竹溪上村漁家賣魚喚行人西風吹皺一溪水水光日影金鱗鱗張温温字元佐上黨人祖仲容字才翁宋末登科仕至屯田貟外郎以好士名天下致仕後有詩云病身衰退謝明朝北洞閑眠晝寂寥十畝晚禾煙冉冉一林脩竹雨瀟瀟黒花遮眼秋不落白雪撲頭春未消丗事悠悠吾老矣一壷濁酒且逍遥至今爲郷里所傳元佐泰和六年李演牓乙科登弟詩樂府俱有名于時感懷一首彌月不出門出門沙漲東風昏老樹擺撼轟雷奔􅀑物叫嘯山前村僑居客子驚心魂歸來遶屋㝷蘭蓀蘭蓀落索靈苗髠主人醉倒老瓦盆衣䄂半帶淋漓痕芸芸蕭艾同歸根天生天殺何怨恩糟床與翁共淸渾絶勝􅀍髮叫帝閽馬舜卿舜卿名肩龍以字行宛平人先丗遼大族有知興中府者故又號興中馬氏祖大中國初登科節度全錦兩州父成􅁩字冝之張楫牓登科京兆路統軍司判官舜卿在太學有賦聲宣宗初人有告宗室從坦殺人從坦字履道一時賢將帥處猜嫌之地人以爲必死而不敢言其􅁈舜卿以太學生上書大略謂從坦有將帥材方今人物無有出其右者臣一介書生無用於丗願代從坦死留爲天子將兵書奏詔問汝與從坦交分厚􅁘舜卿對臣知有從坦而從坦未甞識臣從坦􅁈人不敢言臣以死保之宣宗感悟赦從坦授舜卿東平録事委行臺試驗宰相侯莘公與之語不契留數月罷歸將渡河與排岸官紛競筐中搜得軍馬糧料名數及利害事目疑其姦人之偵伺者繫歸德獄根勘適從坦至立命出之正大四年冬薄游鳳翔德順州將愛申以書招舜卿舜卿欲往鳳翔緫管以敵兵勢甚張吾城可恃德順不可守勸勿往舜卿曰愛申平生未甞識我一見爲知巳我知德順不可守我往必死然以知巳故不得不死也乃舉行橐付族父明之爲死别冐險而去旣至不數日受圍城中義兵七八千而巳州將假舜卿鳳翔緫管判官守禦一以委之凡受攻百日食盡乃䧟軍中募生致之不知所終時年五十三詔贈某官配食褒忠廟舜卿年少時過襄垣題詩酒家壁辤氣縱横時輩少有及者如云玉鞭再過長安道人靣依前似花好殷勤勸我梨花春要看尊前玉山倒他語􅀋此㑹州道中山腰薄雪眩朝􅚐未放陽和入燒痕一片長安丗情月梨花院落幾黃昏諸相劉曹王豫豫字彦由阜城人仕宋知濟南府事汴京下立張􅀖昌爲大楚皇帝宋滅楚更立彦由國號齊建元阜昌八年廢爲蜀王遷黃龍府改封曹有集十卷行于丗二子麟猊孫通海陵朝叅知政事四丗孫瑛今在太原雜詩六首竹塢人家瀕小溪數枝紅杏出踈籬門前山色帶煙重幽鳥一聲春日遟風荷柄柄弄淸香輕薄沙禽落又翔紅日轉西漁艇散一川山影暮天凉古渡停􅆖日向沉凄凉歸思梗淸吟碧山幾􅀧塞天闊紅葉一林秋意􅀷􅀝嵓蕭寺據危崖丈室軒䆫靣水開雪霽暮寒山月上數竿脩竹一枝梅晝色晴明着色圖山光凝翠接平湖煙嵐自古人難畫逺即􅀷􅀷近却無寒林煙重暝棲鴉逺寺踈鍾送落霞無限嶺雲遮不断數聲和月到山家客館雪消北嶺安排暖寒入東風阻節春絶塞亂山圍古驛他時􅀃着也愁人杜丞相充充字公美相州人仕宋知滄州歸國拜尚書右丞相領中山行臺以壽終塵汨汨勞生爲爾忙只除不到白雲郷歩回洛浦生羅韈歌断秦樓蔌杏梁閑撲衣襟迷逺望静穿䆫􅂩鎻斜陽帝城別有風流在輦路春風十里香虞令公仲文仲文字質夫丗南之裔武州寧逺人仕爲遼相歸朝授樞宻使平章政事封秦國公四歳作詩賦煎餅有魚目蟬聲之句人以神童目之雪花四歳作瓊英與玉蘂片片落前池問着花來處東君也不知張承相孝純孝純字永錫滕陽人宣和末知太原國兵圍守踰年人相食幾盡乃下朝廷怜其忠換相職後以相齊致仕汴京建行臺起爲左承相踰年得請歸郷里二兄尚安徤郷人爲作三老圖薨謚安􅂤子公藥字元石昌武軍節度副使致仕孫觀字彦國丗爲文章家曽孫厚之字茂弘承安二年進士中運使􅀉酒淸明日到以詩謝之芳樽到日恰淸明似與嘉辰黙計程擬助林園延勝賞肯容桃李落繁英老來官爵渾無味閑裏柸盤却有情見􅀃使車臨岱麓儻能相過共飛觥張左相汝霖汝霖字仲澤遼陽人家丗貴顯父浩字浩然以門資仕􅀭歷中外遂􅂛端揆進拜太師封南陽郡王五子仲澤平章政事莘國公汝爲字仲宣河北東路轉運使汝翼仕不達皆進士也汝方字仲賢自號丹華老人汝猷宇仲謀俱至宣徽使父子兄弟各有詩傳于丗王子端内翰太師之外孫其淵源有自云春溪一首黯黯春愁底處消小桃無語半含嬌東風不管前溪水暖緑溶溶拍畫橋劉右相長言長言字宣叔東平人宋相莘老之孫而學易先生斯立之猶子也父蹟年三十五終於儀真令工詩能文有南榮集傳東州今獨予家有之宣叔正隆宰相詩文能丗其家今不復見矣通叔以詩送古鏡爲長言生日之壽次韻謝之綵衣禄隱非臞仙猶有向來文字縁都城一別兩歳晩􅀉聲勞苦常相先人間始生俗禮重而我永感方頽然逺憑詩句致竒物欲挽暮景廻虞淵規摹九寸函大方古製不作菱花妍開奩拂拭愧􅋘質但喜虹氣浮晴天夫君乆要心不遷期與鐵杖論清堅保身賴此􅀌月圎明年上印歸行田右相文獻公􅁘律履履字履道東丹王之七丗孫學通易太玄至於隂陽歷數無不精究甞以郷賦一試有司以露索爲恥遂不就舉䕃􅀘國史􅁺興陵朝累遷薊州刺史入翰林爲修撰歷直學士待制禮部尚書特賜孟宗獻牓進士弟俄預淄王定􅉺功拜叅知政事明昌元年進右丞薨年六十一興陵甞問宋名臣孰爲優履道以蘇端明軾對上曰吾聞軾與王詵交甚欵至作歌曲戲及􅁎侍非禮之甚尚何足道􅁘履道進曰小􅀃傳聞未必可信就使有之戲􅀏之間亦何得􅀷責丗徒知軾之詩文人不可及臣觀其論天下事實經濟之良才求之古人陸贄而下未見其比陛下無信小􅀃傳聞而忽賢臣之言明日録軾奏議上之詔國子監刋行自號忘言居士有集傳于丗三子辨才武廟署令善才工部尚書楚才中書令四孫鈞鉉鏞鑄史完從事日感懷不學知章乞鑑湖不隨老阮醉黃壚試從麟閣諸賢問肯屑蘭臺小史無一戰得侯輸妄尉長身奉粟媿侏儒禁城鍾定燈花落坐拊塵編惜壯圖張平章萬公萬公字良輔東阿人正隆二年進士仕長山令有惠政人爲立祠入爲右司貟外􅀰太師淄王愛之許以宰相器明昌初累遷御史中丞以言事忤旨除彰國軍節度使召爲大興尹拜叅知政事以母老丐歸養出判東平河中濟南丁内艱起復擢平章政事封壽國公爲相知大體有敦厖耆艾之目旣致政而眷顧未衰復起判濟南安撫山東便冝行事未幾得請薨於家謚文貞繪像衍慶宫配享章宗廟廷戊戌二月中旬登稷山清榭問囚推案朝還暮危坐不知春淺􅀷今日簷閒看風色一株紅杏暗驚心董右丞師中師中字紹祖邯郸人後徙洺州皇統九年進士承安中入政府直道自立而以通材濟之泰和初元妃李氏方寵􅄑兄喜兒爲宣徽使有楊國忠之權一日德州敎授田庭方上書言事云大臣持禄近臣怙寵此言路之所以塞也道陵顧謂紹祖言大臣持禄當謂公等近臣怙寵者爲誰時喜兒侍立殿上紹祖倒笏指之曰莫非謂李喜兒之屬否上頷之紹祖甞言作宰相不難但一心正兩眼明足矣少日以詼諧得名及在相位亦未甞廢談􅀏然不害其爲國朝名相也俄致政賜弟京師後三年薨有燕賜邊部詩傳於丗紹祖師王内翰彦潜而與之同牓登科彦潜没後待其子恩禮殷重不减骨肉論者謂孫鐸振之事其兄明之張彀伯英愛其弟伯玉舉丗無與爲比至於紹祖之待其師之子則古所未有也有漳川集傳于家自臨洮還臨潭仍是漢家城漢家城在臨潭羗人所稱積石相望十驛程西略河源東竝海此身何地不經行紹祖之孫濟剛記此詩末句又作塵埃風􅀨嘆劳生孫太師鐸鐸字振之恩州人大定十三年進士明昌中擢戸部尚書時巳有相望及考滿以戸曹繁重且未有可代者特旨進一官再任而同列二人俱以入相矣振之賀席中戲舉青州老栢院布衣張在詩云南隣北里牡丹開公子王孫去不回惟有庭前老栢樹春風來似不曾來爲御史所劾降授同知河南府事有以詩送之者云想到洛陽春正好南隣北里牡丹開聞者皆大􅀏振之後入政府遷尚書右丞薨贈太子太師作詩甚多其賦玉簮有披拂秋風如有待裴回凉月更多情之句甚爲詩家所稱癸亥清明日翛然一室暗塵凝兀兀端如打坐僧習氣未除私自􅀏短檠還對讀書燈梁叅政􅚻􅚻字國寳別字瑩中范陽人大定十六年進士歷州縣稍遷警廵使治尚嚴肅權貴歛迹朝廷知其才累試繁劇由中都路轉運使拜户部尚書俄叅知政事資方正敢言大事北兵動立和議人有􅀏其懦者卒如其言未幾薨于位虎賊咤曰梁􅚻在族矣其爲人可知留題長平驛秦趙均爲失覇圖起何残忍括何愚殺降未見無禍者累將其能有種乎日暮悲風噎丹水夜􅀷寒月照頭顱山名也快心千載杜郵劒人所誅耶􅀑所誅賈左丞益謙益謙字亨甫本名守謙避哀宗諱改焉宣宗朝叅知政事出知濟南移鎮河中南渡後召拜左丞㝷致仕居鄭州哀宗即位史官乞因宣廟實録遂及衞紹王初虎賊旣弑逆乃立宣宗宣宗之人至謂衞王失道天命絶之虎實無罪且於主上有推戴之功獨張信甫上章言虎賊大逆不道當用宋文帝誅􅀓亮徐羡之故事章奏不報爾後舉朝以大安崇慶之事爲諱及是謂亨甫大安中甞拜御史中丞宜知衞王事乃差編修官一人就訪之亨甫知其旨謂來者言知衞王莫如我然我聞海陵􅀍弑而丗宗皇帝立大定三十年禁近能􅁀海陵蟄惡者得美仕史官修實録誣其淫毒狼鷔遺臭無窮自今觀之百可一信耶衞王勤儉慎惜名器較其行事中材不能及者多矣吾知此而巳設欲飾吾言以實其罪吾亦何惜餘年朝議偉之正大三年年八十薨子賢卿頥卿翔卿皆以門資仕今一孫仲明在東平贈荅史院從事見􅀃才名自妙年多慙政府舊妨賢物華天寶無今古鳳閣鸞臺孰後先鄭圃道尊何敢望濟南書在子當傳莫言老眼昏花滿及見風鵬上九天丞相壽國髙公汝礪汝礪字嵓甫應州金城人大定中進士揚歷中外居戸曹三司爲最久相宣宗十年小心畏愼夙夜匪懈篤于古人造膝詭辤之義謀謨周宻人莫得而聞元光末宣宗上仙公亦薨于位君臣之契義均同體者於斯見之平生嗜讀書南渡之後機務倥偬未甞一日廢書不觀臨終留詩有􅀉謝東門千樹柳安排青眼送行人之句時年七十一謚配享宣宗廟庭至今士論謂公才量渾厚足爲守成之良相恨所遭不時耳雨後時雨雨三日田家家萬金有年天子慶憂國老臣心胥莘公鼎鼎字和之代州繁畤人父持國大定中爲太子司藏有功母后家章宗即位擢拜尚書右丞和之大定二十八年進士至寧􅀄都城受兵由戸部尚書叅知政事宣宗即位除泰定軍節度使不赴改判大興貞祐二年拜尚書右丞車駕南渡出爲汾陽軍節度使移知平陽權河東南路宣撫使四年授樞宻副使權右丞兼職如故五年正月朝京師進平章政事封莘國公行臺関中未幾兼左副元帥明年以温國公致政進封英行臺衛州以病薨於位雷希顔爲作神道碑云黄覇爲良吏稱首及爲丞相與張敞論列功名大减王允當漢祀之衰計誅董卓近古社稷臣然不赦凉州人旋致傕汜之禍蕭俛之淸介崔植之論議皆足爲唐名臣而俛議銷兵植餓朱克融輩不􅂌一官遂再亂河朔彼或量不足或才略有所窮權不足以濟事智不足以知時故也以姚崇之賢惟其不知道未免爲捄時之相其他可知也國家有通明相曰英國胥公尚兼數公之長予謂希顔此論似渉過差至于爲國朝名相以度量雄天下則在公爲無媿矣在長安日乞致仕表云興造功業方聖主有爲之時表裏山河豈愚臣養病之地送弟有之云丗事正須髙着眼官途休厭少伭頭他文􅀋此弟恒常之子嗣祖今在燕中送弟恒作州男子四方志人生五馬榮君恩何以報民政不宜輕御物當存恕存心要盡誠勿矜新號令姑守舊章程歛􅁀單貧困囚淹狡僞萌慈柔難禁􅁀苛急必傷生東郡吾將老西陲敵未平一生能幾别四事果難并方此對床樂愴然分􅃑驚荒詩何足記􅂓冩弟兄情張左丞行中行中字信甫莒州日照人祖莘鎮西軍節度副使父暐御史大夫以武安軍節度致仕兄行簡易無體牓弟一人信甫大定二十八年進士衞紹王朝虎賊巳除名爲民賂遺權貴得復用信甫言其必反及弑逆自爲太師尚書令澤王信甫時爲禮部尚書人謂必爲所殺甚危之一日虎下禮部鑄監國寶信甫持不可虎雖怒然亦竟不能殺也宣宗即位授叅知政事丞相髙琪專權用事聲勢熖熖人莫敢仰視議論之際唯信甫與之抗朝廷稱焉所居拙軒有爲作銘者其引云發凶豎未形之謀則先識者以爲明犯強臣不測之威則疾惡者以爲剛蓋實録云元光末出爲静難軍節度使哀宗即位首命召之遷尚書左丞後二年致政卒於崧山之崇福宮信甫家丗儒素雖位宰相而奉養如寒士日書經史五百字爲課寒暑不廢者四五十年故於書無所不讀詩殊有古意也右丞文獻公所畫張果像古來人物畫爲難驚見仙公樹石間莫把丹靑名右相太平勲業在人寰楊戸部慥慥字叔玉代州五臺人承安五年進士歷州縣入爲尚書省令史拜監察御史侍御史京西大農司丞京南司農卿戸部侍郎權尚書自入戸曹即有相望資雅重事無巨細處之皆有法至於知朝廷大體則又非他人所能及也京城受兵權叅知政事明年卒於河平叔玉文工於詩而人不以能文稱特未見其文耳過司竹監有懷王監正之不見崧丘跨鶴仙才名留得萬人傳春郊漬酒傷今日夜􅀨論文記昔年宰樹謾懸公子劒髙山巳絶伯牙絃故居脩竹靑靑在寂寞終南落照邊乾陵牝雞一啄血波流天下何縁不姓周今日阿婆心力盡乾陵秃似老僧頭狀元鄭内翰子聃子聃字景純大定人少日有賦聲時輩莫與爲敵天德三年弟三人登科士論仍以爲屈而海陵不之許也正隆二年詔景純再試擇能賦者八人先以題付之以困景純且將視其中與否罪賞之御題天賜勇智正萬邦海陵謂侍臣漢髙祖諱不避之可乎乃改作萬國及開卷景純果弟一人楊伯仁張汝霖中選劉幾綦戩李師顔輩皆被黜海陵終不以景純爲工與被黜者兩罷之趙獻之賀啓云丹桂一枝不失舊物靑錢萬選無媿古人其爲名流所稱道如此累官吏部侍郎改侍講學士卒其賦酴醿有玉斧無人解修月珠裙有意欲留仙之句甚爲詩家所稱即事一錢不直程衞尉五斗解酲劉伯倫讀罷離騷解衣卧門前花柳自争春孟内翰宗獻宗獻字友之開封人大定三年郷府省御四試皆弟一供奉翰林曹王府文學兼記室叅軍以疾㝷醫乆之授同知單州軍州事丁母憂哀毀致卒劉無黨題其詩卷後云簮紱忘情累山林閱歳隂選官堂印手􅀃法老婆心友之深於内典丗路嗟前却人生變古今公乎真不死名姓斗之南相人孔嗣訓挽云二十年閒事才名一夢新衰羸驚喪母哀毀竟亡身魂返愁楓夜情留淚草春黃公酒壚在此去只悲辛汴人髙公振特夫云見􅀃平生夢前途盡目前友之未弟時夢中預見前途所至于今皆驗乗除雖有數㓙禍竟何縁禮樂三千字才名二十年仁人遽如許無路問蒼天又云誰謂詩成䜟淸冰果自焚友之雪燭詩固知劫火終無盡誰謂淸冰也自焚未幾下丗人嗟埋玉樹天爲落文星友之隣舎李生言六月中連二明星隕于友之所居虚靜軒前數詩雖不盡工姑并記之有以見先生於出處之際死生之變造物者皆使之前知其以天下重名􅂌之者爲不偶然云龔平甫森玉軒古人借宅亦種竹大是饕竒心未足髙齋聞有萬琅玕坐對懷山飲秋緑官閑勝日無一事尊酒不空仍有肉他時剥啄叩君門髙枕矮床容我宿舊畜一琴弃置者乆之李君仲通爲張絃料理仍鼓數曲以詩贈之我家筝奴憂樂同塵埃滿面􅁂髮蓬徽絃不具挂墻壁似慙無以娱衰翁夫君一見爲披拂坐使寒谷回春融中含太古意味足雜以新態來無窮繁聲流水不可喻直與造化相㝠通形神乆巳坐􅁅槁一旦抉剔驅盲聾寂然反聽杳難詰但覺萬竅俱玲瓏千金不得和扁力誰謂起廢由枯桐曲終玄旨竟誰㑹非絃非指仍非空拂衣欲往君且止爲我乗興彈悲風張仲山枝巢達人􅀌髙與丗踈百年直􅀉猶須􅁷歸來掩関􅂓自如人之不足等有餘樂哉下視濠梁魚逍遥自契荘􅀩書異時馭氣㳺太虚我知枝巢亦蘧廬柳塘揺揺風影􅃞寒塘静裏亭臺日月長不似隋家堤岸上亂鴉殘照管興亡蘇門花塢繞舎雲山慰眼新看花差後洛陽塵從君小築繁香塢不􅀒長腰玉粒春閏月九日南崖烘暖貯秋光勝處相㳂嚼一觴俚諺難逢兩寒食閏餘今值小重陽頭風比似常年愈菊靣渾如去歳黃老矣歡逰定能幾佳時此樂最難忘趙内翰攄攄字子充宛平人自號醉全老人早赴北宫蒼龍􅀟闕鬱層雲湖水鱗鱗柳色新絕似江行看淸曉不知身是趂朝人趙文學承元承元字善長先丗汴人兵火閒寓旅河閒遂占籍焉大定十三年詞賦弟一人除應奉翰林文字兼曹王府文學以踈俊少檢得罪王府貶廢乆之遇赦量敘卒於臨洮􅊥春冰底流泉匹練飛麹塵着柳不禁吹杖蔾恰到春生處巳有人家挿酒旗張太保行簡行簡字敬甫大定十九年詞賦弟一人家丗儒臣備於禮文之學典貢舉三十年門生徧天下南渡後遷禮部尚書太子太保䎐林學士承旨薨謚文正楊内翰之美銘其墓稱敬甫天性孝友太夫人疾不解衣者數月居喪哀毀過禮事其父御史大夫自㓜至終未甞少違顔色與諸弟居三十餘年家門肅睦人無閒言率勵子弟不知爲驕侈雖處冨貴與素士無異平生無泛交無私謁慎勤周宻動循禮法居無怠容口無俚言身無徑行雖古君子無以加故天下言家法者唯張氏爲弟一言禮學言文章言德行之純俻者亦唯張氏之歸有集三十卷傳於家敬甫賦燕云王氏烏农巷盧家白玉堂寒食云􅄳粥雞毬留故事風花鸎柳閙春城中秋云露凝灝氣霑瑶席雲近淸光護桂宫此􅀋甚多也六月二十九日北官朝回踈柳衰荷又一時淸波飛葉夢靈芝年年踏盡溪邊路不覺吴霜􅀧鬢絲酬郭光秀才疇昔君來事巳暌豈知今我又覊栖波臣儻不辤􅂛斗鵠􅆑終當遇魯雞題子端雪溪小隱圗出處皆天豈自由仙摽終合冠鰲頭不妨貌取黃華景時向鈴齋作卧游張内翰檝檝字巨濟先丗泰州長春人有官於山隂者遂占籍焉曽祖頥宗銀靑榮禄大夫祖惠懷逺大將軍父天白􅉑縣簿巨濟明昌五年詞賦弟一人仕至鎭戎州刺史爲人有藴藉善談論文賦詩筆截然有律度時人甚愛重之陜州詩云駭浪奔生馬荒山卧病駞永寧劉氏園亭云菊老芙蓉衰棃柿葉争絳叩門人不譍一犬吠深巷此􅀋甚多秋興飄零千里道牢落半生愁残月如新月今秋似去秋露濃花氣重風細竹聲幽何日清溪上煙蓑一釣舟客中絳脣花不語靑眼柳􅀄眠塵去㝷芳馬香來載酒舩歸期仍鴈後野興巳鷗邊惆悵無家客春風又一年蓮實水妃擎出紺珠囊玉笋彫槃喜乍甞膚白巳攙新藕嫰心青猶帶小荷香闘餘翠鳥零珎羽飛盡黃蜂露􅁡房口腹累人良可􅀏此身便欲老江郷初夏小園緑笋閒朱櫻􅀧綴年華似有情露浥葛巾晨氣潤風隨竹簟晩凉生閑窺􅃛䑕潜身處静厭飛蚊遶􅁂聲安得冷泉幽石畔解衣盤礴樹隂淸閻治中長言長言字子秀濟南長淸人客居兖州之嵫陽祖俊行臺南牓父時昇任忠傑牓曽髙以來登科者六丗矣子秀少日慕張忠定之爲人故名詠避衞紹王諱改焉㓜􅀌養於從祖能自振厲好學工詞賦閒有前人句法性本豪俊使酒任氣及㳺京師乃更折節遂以謹厚見稱酒酣耳熱故態稍出甞以弟一流自􅀒屏山獨􅀷知之不以爲過也平生多竒夢果魁天下士論厭服在翰苑十年出爲河南府治中􅀍召以道梗不得前卒於亳州子魯瞻魯安今一孫在洺州北齊行天保大人襲丗貴未待齊成巳無魏䜟裏方傳近水羊夢中先兆攻城蝟六君三丗都能幾二十八年翻手裏細思孝静靈運詩天道好還非妄矣應制中秋璧月當秋夜未䦨漢宫髙㑹浹宸歡塊蘇塵丗三千界珠翠瑶光十二欄桂實飄香浮壽斚露華零潤溢仙槃都人側聽雲韶奏共指天家是廣寒婆速道中書事此地先經戰人生苦未􅂓泉源䟽地脉田壠上山􅆎敗石平危徑枯柴􅀘短橋曉煙明逺爨暮雪暗歸樵履滑心頻悸梯危骨欲銷解鞍空倒卧無夢訖通宵送麗酒麗橙與秀實御史騘馬朝回畫閤􅀷遥知春意領梅心麗橙嬌軟麗尊小􅂓助風流對淺斟閻立本職貢圖諤諤昌周此一書形容􅆈貢冩成圖寧知右相無􅀷意莫指丹靑便厚誣盤山招隱圖畫出中盤望隱歸鳴珂朝馬尚遟遟賦詩未敢輕相誚却恐吾山也勒移三門集津圖津門未爲天下險勿作駭相觀兹圖偃月堂中李林甫有人能冩此心無丁氏思祖亭鶴野三千里鳬函五百年人閒仍舊德􅀛筮得新阡族屬東州望衣冠鼻祖傳異時誰式墓應識子孫賢李治中著著字彦明真定人髙才愽學詩文得前人體工於字畫頗尚玄言承安二年經義弟一人在翰林七年出副定州召爲戸部貟外郎坐大中黨事謫臨洮府判官量移西京路按察司判官遷彰德府治中城再䧟避于塔上兵人招降大罵不從掘塔倒而死觀音院書閣門巷蓬蒿一尺􅀷小軒岑寂似山林鳥聲落枕有髙下山色閱人無古今客裏三年侵老境床頭一易浣塵􅁭晩凉癡坐忘言裏滿地西風白玉􅆪異人擬栩先生王中立中立字湯臣岢嵐人愽學強記問無不知少日治易有聲􅂣屋間家豪於財賔客日滿門所以待之者備極豐腆其自奉則日食淡湯餅一杯而巳年四十喪妻遂不更娶亦不就舉選齋居一室枯淡如衲僧如是三四年乃出時人覺其談吐髙闊詩筆字畫皆超絶􅀂有物附之者問之不言也閑閑趙公知平定先生往謁之與之詩云􅀉語閑閑傲浪仙枉將詩酒汚天全黃塵遮断來時路不到蓬山五百年因言唐丗士大夫五百人皆仙人謫降中有爲丗味所著迷而不反者如公與我皆是也一日來都下館於閑閑公家中秋夜飲酒賦詩且就公索墨水一槃公如言與之明旦不告而去壁間留􅀛鶴二字廣長一丈而墨水具在不知以何物書之也朝士來觀者車馬填咽都下競傳王先生仙去矣久之先生從外至問二字以何物書之不荅題詩其旁云天地之閒一古儒醒來不記醉中書旁人錯比神仙字只恐神仙字不如先生平生詩甚多有醉袖舞嫌天地窄詩情狂壓海山平之句他亦稱此人有問丗外事者亦一二言之好作擘窠大字往往瞑目爲之筆意縱放勢􅀂飛動閑閑公甚愛之屏山甞見先生商略前代人物引先儒論議數十條在目前如人人自相詰難然後以巳意断之以爲辨􅀶中弟一流人也臨終預尅死期如言而逝州將石倫葬之忻州時年五十六予甞從先生學問作詩究竟當如何先生舉秦少㳺春􅀨詩云有情芍藥含春淚無力薔薇卧晚枝此詩非不工􅀂以退之芭蕉葉大梔子肥之句校之則春雨爲婦人語矣破却工夫何至學婦人先生晚年易名雲鶴自號擬栩云中秋素丸東溟來飛上玻璃盆􅂓揮五輪手撥去萬里隂印透山河影照開天地心人丗有昬曉我未甞古今屏山所傳作素紈靑溟來􅂓舒五輪指雜詩四首華山宫殿白雲封不見當年打睡翁貪看終南山色好不知紅日下前峯獨跨蒼虬下太清春風萬里月華明因君感激爲君􅀃鑿破天機我也驚雲葉􅉿􅉿皺碧空笙簫逓響入天風忽驚風浪耳邊急不覺形神來丗中此生休更問浮名名利區區不蹔停我有一丸天上藥用時還解濟蒼生題􅁉之樂府後常恨小山無後身元郎樂府更淸新紅裙婢子那能曉送與凌煙閣上人王先生予可予可字南雲吉州人父本軍校南雲亦甞􅀠籍年三十許大病後忽發狂乆之能把筆作詩文及說丗外恍惚事南渡後居上蔡遂平郾城之閒在郾城爲最久遇文士則稱大成將軍於佛前則諦摩龍什於道則騶天玄俊於貴游則威錦堂主人爲人軀幹雄偉皃亦竒古戴靑葛巾項後垂􅀟帶狀􅀂牛耳一金鏤環在頂額之閒兩頰以靑湼之指爲翠靨衣長不能掩脛故時人有哨腿王之目落魄嗜酒毎入城市人爭以酒食遺之夜宿土室中夏月或尸穢在旁蛆虫狼藉不卹也人與之帋落帋數百言或詩或文散漫碎雜無句讀無首尾多六經中語及韻學家古文竒字字畫峭勁遇宋諱亦時避之人或問以故事其應如響諸所引書皆丗所未見談說之際稍􅀂有條貫則又以誕幻語亂之麻知幾張伯玉與之㳺最狎􅀃其所詩以百分爲率可曉者才二三耳題崧山石淙云石裂雯華漬月秋蓋石淙之石皆狀􅀂湖玉其髙有五六十尺者石之文如䖝蝕木如太古􅂐籕竒峭秀潤一一在潭水中親到其處知詩爲工也蔡州北懸壷觀仙榆云壷樹苔波月漬皴醉後云一壷天地醒眠小宫體云萬疊雲山飛小鴈射虎首句云風色偃貂裘即閣筆自戲云此虎來矣樂府云唾尖絨舌淡紅甜又自戲云欲下犁舌獄􅁘和太白宫詞云金盆水不暖翠雀啄晴苔又云鳳蹴瑶華散龍銜桂子香西􅀲云一片冷截潭底月六彎斜卷隴頭雲烹茶云簾捲緑隂花外月玉山冰雪醉扶翁凌霄花云啼鳥倒銜金羽舞驚蛇斜傍玉簾飛威錦堂樂府云鳳環捧席帶香屏鯨杯􅀝伎和雲捲屏疑作慿此􅀋尚多人亦多贈南雲詩者李子遷云石鼎夜聮詩筆徤布囊春醉酒錢麁真南雲傳神詩也壬辰兵亂爲順天軍將領所得知其名竊議欲挈之北歸館於州之瑞雲觀南雲明日見將領自言云我不能住君家瑞雲觀也不數日病卒後復有見之淮上者宫詞水曲朱門漪􅃞漫一簾花雨月波寒金閨背襯鴛鴦冷春困秋千立畫干南園湖石翠雀銜雲墮翠蕪砥峰倒影卧平湖飛花不到穿簾月髙􅀝晴天一劒􅀌馴鶴圖張伯玉家畫幀宫人徐行以手整釵一鶴後随謂之馴鶴圖伯玉請賦詩欽叔常苦其作詩多不用韻限以釵來苔三字寢處粧鈆未捲􅁫􅀌雲花帶月邊來六宫簾幕金鸞冷露濕晨煙啄翠苔雜詩二首白露沙灘浸緑湄小舟艤岸尚依希山回屏曲江連樹春鎻人家􅀷處歸暗悲秋色素團團一雨飄零飈霽寒天浄長空煙歛處彩虹金挂樹頭山宫體二首紅葉鋪霜撼御階繡蓮塵蹴襯羅鞋袖沾鸎翅調簧語墮却銜翹入鬢􅁫驕馬金籠藉草歸翠鸞屏曲染紅霏凭欄山色春風裏喚得鸎兒燕子飛照了居士王彧彧字子文洺州人承安中進士資剛决不可犯爲尚書省掾知管差除與郎官相可否即弃官去往來登封盧氏山中改名知非字無咎自號照了居士居山中二十年布衣􅂼食井􅍫自親時人哀苦之而知非處之自若也少日爲文工於四六詩亦有功和二宋落花韻四首云曽見嬌窺宋玉墻忽驚遺夢到延凉聚塵非分侵凌玉流水無情葬送香錦韈謾抛終隔靣綵􅁅雖吐若爲腸蒼苔碧草無窮恨木石癡兒亦自傷可人未厭出鄰墻回首空殘翠幕凉好事只傳懷夢草殊郷誰致返魂香塵凝燕子慵䦕眼煙暗馬嵬空断腸穠李絳桃俱異物爲歌薤露冩餘傷緑影浮空只自傷賞心死着未能忘瓊枝不解留春色銀燭空曽照夜粧肺腹巳傳蜂􅁡盡肌膏仍與燕泥香情知靑帝回車日合有祥風老退房韶華終竟合彫傷献􅀏縈懷忍遽忘露壓不禁昬淚臉風披無柰醉愁粧芳菲頓减林園趣狼籍空餘陌路香却憶班􅁎浪辛苦一生都得幾專房旣學佛作决定歌禅家以爲證道新豐之後無有及者􅀄出京有詩云親踈俱穩人倫了㛰嫁齊成俗意周一筆盡鉤塵債断都無􅃜欠大家休休休休愛著何時是徹頭風息浪平人巳渡􅀏携明月下􅀌舟崧山中云撒手寧論萬丈崖脚跟未肯􅀧塵埃東君也自魔君數故着青紅眼底來來何遟去何早二五不多十不少一聲柄木徧虚空誰識堂堂真照了又贈安居士國寶云不招措大嗔不喚王子文不惹禅和􅀏不名王照了他人怕人嫌照了要人嫌人人有靣樹有皮努力方便勤粧嚴粧嚴也田賢不然也由賢鼻孔莫遣他人穿又荅國寶云幻人誰拙復誰能㳺戯何妨傀儡棚凡事不堪君莫怪儂家靣目得人憎又云忽然識破虚空我六合縱横更有誰正大壬辰參知政事宗室思烈行臺洛陽以知非有重名力致之使參議臺事城䧟不知所終子􅂛卿有賦聲早卒禅頌三首昧巳全抛大事憂爲渠剛􅄃等閑愁乗榆晩景無多子針芥人身豈易投閑日搆來忙日用此生迷却再生休鼻頭捩轉從今始看作回程火裏牛吾身非我底爲情􅀃着塵勞特地驚五九盡時山更好澗泉雲鳥自春聲放下情懷觸處安生涯取取没多般􅄄衣襤䄛􅂓遮赤短髮鬅鬙底用冠一榻省縁資困歇二匙隨分了飢飡也知苦澁人人􅀏烈日初心不敢謾貞祐末行臺都尉南征􅀗武經進士李申之于盱眙左右司􅀰中劉光謙逹卿潤文官李献能欽叔愛其才辯欲活之以避嫌不敢也乃託以問事機令軍中覊管之申之作詩贈主囚者云一飯感君無地報寸心許國只天知明朝定作長準􅀑馬革仍煩爲褁尸又云胷中萬古撗鐘阜一死鴻毛断不移又献書都尉云金國歳歳南侵計所得不能一二州而軍力折耗殆盡今歳此舉亦曽慮人有議其後何以禦之乎爲公計者不􅀂此南軍大舉斂兵而退雖屢出無功得全師而返猶可自救不然師老食殚困頓于堅城之下讒間一行則公受禍不久矣某軍敗而死固其所也乞于盱眙城下責以不降之罪以一死見處使人人知之則都尉亦于名教有功書上之明日申之謀遁歸不果乃殺之欽叔􅀃其臨刑回靣南向欣然就戮甚嗟惜之予謂申之􅅐中萬古撗鍾阜與王知非烈日􅀄心不敢謾皆列丈夫語故附見于此無事道人董文甫文甫字國華潞人承安中進士爲人淳質恬于丗味於心學有所得人知尊敬之而不知其所以得也子安仁亦學道父子甞閑居寶豐閉户不出以習靜爲業朝夕不継晏如也國華歷金昌府判官禮部貟外郎昌武軍節度副使正大中以公事至􅂎縣自知死期作書與家人及同官又作詩貽􅂎縣令佐詩畢擲筆于地以扇障靣而逝有和太白山明和尚牧牛圖詩刻石於洛陽其引云夫人有等差敎分頓漸上根之人一聞千悟不落階級中智而下必由漸進此人牛次弟不得不立心性動静徼妙有無學者所冝諦觀也以人牧牛是動而有制從有以觀其徼者也進進而不巳則漸至於回首馴伏從無以觀其妙者也有入于無徼及于妙固善矣又不如靜而無礙之爲愈也靜而無礙又不如兩忘􅀟泯之入神也􅀂夫人牛兩忘明月獨照恍然俱失所在當是時也吾將離形去智神亦無功同于大通與道爲一則向之人牛亦筌蹄中一微塵耳吾儒所謂盡心盡性者無外於是因借明和尚韻再下一轉語㑹心者必能知之詩不録秋夜見即如無爐上雪淡而有味水中塩齊行定惠千燈熖淨識乾坤一鏡奩晝眠莊周先我復天眞化蝶飛來管領春我亦莊周周亦蝶不知􅀂箇是真身審是堂按劒人人駭夜光蜀鷄合道勝鸞凰飛蛾可是無分别直道油燈是太陽文中子續經紛紛述作史才雄聽似秋來百草􅆉不是春雷轟蟄窟蚓蛇㑹得化成龍予甞以王氏六經爲問先生云王氏六經是權道設敎雖孔子亦然但後人不能知之耳因以此詩見示臨終詩四首無情喪主没錢僧送上城南無事人撿盡傳燈無盡録更無公案遮番新生有地死有處萬牛不能移一歩一輪明月印天心此是渠儂住處住白髪三千丈紅塵六十年只今無見在虚費草鞋錢今古一輪月分明印碧霄門門蟾影到處處桂香飃不起眼中暈何勞指上標真空渾照破歸去杖頭挑隱德薛継先継先字曼卿猗氏人少日三赴廷試南渡後隱居洛西山中課童子學事母孝與人交謙遜和雅所居人化之子純孝字方叔有父風客有詐爲曼卿書就方叔取物者曼卿年已老狀皃如少壯人客不知其爲曼卿而以爲方叔也而與之書曼卿如書所取物付之雖其家人亦不以語之也監察御史石玠子堅行部過曼卿曼卿避不之見或言君何無郷曲情􅁘曼卿曰君未之思耳凡今時政未必皆善石御史一有所劾則必謂自我發之同惡相庇他日并鄰里有受禍者其畏愼􅀋此正大未司農卿楊慥叔王丞康􅃬伯禄薦曼卿與汴人髙仲振武陟宋可武淸張濳磁陽曹珏大名王汝梅隱操不减古人朝廷議授以官以兵亂不果曼卿喜作詩工于賦物如松化石云瘦見千年傲霜骨錬成一片􅀘天心時人稱焉壬辰之亂病没於宜陽仲振字正之系出遼東其兄領開封鎭兵正之㓜就舉選年四十後即以家業付其兄挈妻子居嵩山於書無不讀而以易皇極書爲業安貧樂道不入城市山野小人亦知敬之王汝梅張濳從之學三人行山谷閒人望正之風袖翩然如欲仙而未舉也張王􅀃正之甞遇異人敎之養生呼吸吐納日以爲常靈氣時至安坐不動而骨節戞戞有聲恍惚中時與真靈接對所談皆丗外事旣不以語人故無得而傳潜字仲􅂛有志節慕荆軻聶政之爲人三十歳後乃折節讀書太學諸人髙其行義有張古人之目客崧山從正之學易五十歳始娶妻妻魯山孫氏亦有賢行夫婦相敬如賔負薪拾穗行歌自得大用與之同業而生理優贍怜髙張之貧時有餽餉皆謝不受郷里爲仲􅂛斸􅀲田􅀲熟仲􅂛約中分之以償其勤衆不忍但小摘而去仲升亦弃􅀲不收衆如約然後取食之甞行道中拾得一斧夫婦計度移時乃持歸就訪其主歸之所居寺㽵有兄弟分財致諍者其弟指仲􅂛所居曰我家如此獨不畏張先生􅀏人􅁘天興之兵避於少室絶頂時丗已亂寇􅟃􅁀撗無復人理仲􅂛不甘與之處閉口不食七日而死婦隨亦投絶澗中汝梅字大用律學出身伊陽簿秩滿遂不出性嗜讀書動有禮法生徒以法理就學者兼以經學授之後生輩服其敎無敢爲非義者可字予之貞祐之兵其姑嫁大姓槀氏夫與子皆兵死而貲産獨在姑以白金五十笏遺予之予之受不辤一日姑得槀之踈屬立爲後挈之省外家予之置酒㑹郷鄰且謂姑言姑往時遺可以金可以槀氏無子故受之姑今有子矣此金槀氏物非姑物也我何名取之因呼妻子舁金出歸之槀氏郷里用是重之大兵再駐山陽軍中有聞予之之名者問知所在質其子使人招之曰肯從我者禍福與公共之不然公之子死矣親舊競勸之往予之不從曰吾有子無子與吾兒之死與生皆有命焉豈以一子故併平生所守者而亡之乎其後予之竟以無子死􅑻字子玉早歳有賦聲誠實樂易丗俗機械事皆所不知喜賔客欵於接物無書生氣習從之㳺者樂之而不厭也六人者喪亂後惟子玉居弘州十二年乃終九日感懷曼卿衰年易感我今知無訝騷人動楚悲故國乆抛兵刼後佳辰多􅀒菊華期一時蘭艾同凋落兩􅁂雪霜仍别離髙丗輸他陶靖節悠然髙興滿東籬過洛陽予之西來東去洛陽城千尺浮圖了送迎十日酒旗歌板地白頭􅀌客可怜生􅀉人宰縣仲􅂛縣務無難易人才自異同割雞良蹔屈製錦要專工積弊姦贓後遺􅀺喘汗中不存憂丗志底用讀書功嫉惡看平日知君有古風莫敎循吏傳獨載魯山翁載方言作上聲呼白髮感懷子玉少年豪舉氣如虹今日蕭然一病翁曉鏡秪添頭上雪春風不緑􅁂邊蓬文章那作一錢直燈火空勞半丗功擬築糟丘便歸老醉郷何者是窮通中州壬集卷終
