樂與哀仰看孤月一片白玉露泥泥從空來直須卧此待雞唱身外萬事徒悠哉早春春風走塵沙鳥語滿京國東皇發潜潤土木變顔色桃李爭嫵媚白紅姹容飾唯有松栢姿依然蔽崖黒村舎二首何事區區守一丘春花過了月明秋等閑濁酒籬邊興寂寞寒花􅀨裏愁不識故人今在否毎思前事隔重㳺西風又是靑山晚落葉無聲水自流墻外靑山半在樓山村盡晩􅀨脩脩旃裘擁腫無餘事尊酒飄零又一秋學得屠龍無用處秖如􅀞虎反成羞回頭爲向淵魚道鴻鵠而今不願游懷友曽聮金轡賞春風花裏風前酒面紅行樂昔年君我醉詩觴何日我君同一聲啼鳥靑春晩幾樹殘紅野寺空相憶情懷正蕭索半山夕日水聲東夜深月落秋山萬象淸濕螢微近露枝明夢魂黯慘家千里鼓角凄凉夜幾更弟子亡來郷校冷舎人别後子虚成銀河漸轉梧桐黒何處江湖望客星春花零落春花零落鴈秋悲巳過流年二十朞有舌能忘坐韉辱無金莫怪下機遟丗情冷􅀬雖予閒人事􅂛沉未汝知何日上方容請劒會乗風􅀨断鯨鯢岀門􅀐馬出門騎馬即三千面目塵埃動􅃤然生計若爲田二頃飢顔飜媿宦三年乾坤造物能無用富貴由時枉自鞭達否從今巳知計五湖煙裏有漁舩帝城帝城回想夢魂中秋月春花在處同朱雀橋南三月草鳯凰樓上四更風錦囊别後吟牋少玉􅅇閑來酒盞空嬴得當時舊標格九分憔悴入靑銅新香新香終比舊香濃只是相逢乆不容繡􅀍暫同巫峽夢銀鞍多􅀒景陽鍾寳檀煙断閑金獸玉鎻聲傳惱睡龍簾影漸分風又起一塘秋水落芙蓉聞簫弄玉吹簫玉管低秋風散入滿天悲滄波夜漲龍吟細琪樹霜風鳳嘯遟漢月有情如静聽蕭郎無路不相知秦樓虚􅀒淸宵意惆悵乗鸞舊有期和致仕李政奉韻車馬年年陌路塵安知六􅂹過䆫頻雲泉是處堪爲樂軒冕從來只累人浮丗夢中無限事紅顔花上霎時春五湖興有扁舟笛好在晴天月一輪别友從來雞鶴不同羣涇渭何人與細分鏡裏光隂誰念我雲中岐路巳饒君清觴且吸年時月白雪休徴夢裏雲别後相思不相見水邊黃葉暮山村送妹夫之太原山含秋氣冷參差送客西城落日低怨别弟兄歸怏怏戀郷車馬去遟遟浮萍聚散元無定流水東西却有期惆悵黄榆故山路碧天回首鴈南飛惜春春來春去惱春晴花落花開又幾經夜雨多情愛沾灑楊花無賴只飄零毎成宴賞須成醉不恨歸來却恨醒眼見紅英留不住緑枝􅀷處一星星客思客思逢春易感傷不堪殘泪愛家鄉離親恍愡來千里餬口凄凉在四方羞向孫劉圖富貴浪從李杜學文章官街坐對黃昏月半屋淸燈滿地霜暮鍾落日行人断􅀷秋瞑雨殘一聲煙樹外千里暮山寒倦鳥方知止哀猿冷不安蕭蕭風葉下時有野僧逺夢断繡枕紅衾晚意濃啼鸎大似不相容夢魂苦恨歸來早不盡瀛洲弟一峯花開人散二首花開人散正消魂花語無情獨閉門看即春光留不住一聲啼鴂又黃昏閑花閑草滿芳洲春水無人自在流白日遟遟倦㳺子一聲啼鳥一聲愁聞笛雌鸞無鳯怨西風月女愁寒泪洒空牙板急隨聲不断滿天􅃻碎玉玲瓏王文伯還家詩以迎之陌上東風故國春瘦􅆖羸僕倦行塵十年一夢成何事千首新詩不􅀒人重對􅀌燈聽軟語遞憐華髮各淸貧西齋煙草應知舊桃李新蹊滿四鄰晚行隔浦行聞晩寺鍾断坡寂歷對寒松蒼煙暮合􅀌城暗破月微昏逺岫重宿翼飛投空自急断蓬無計竟何從新年又入應添歳歸把靑銅怨暮冬山中丗路風波老不禁一㕓歸買就槐隂坐詩爲累言難解因酒成狂病轉􅀷山月荒凉窺断夢壁燈靑黯伴微吟十年積毁應消骨豈礙􅀌雲萬里心自嘆終日忘言一炷香散華時復遶繩床乆貧自沃三彭熾一醉齊休六賊狂道士生涯􅀌似鶴衲僧門戸冷於霜自知衰病耽杯酒擬及温柔老是郷新秋示友一頃山田半巳蕪閉門髙卧著潛夫不才分作溝中断舊好誰瞻屋上烏南阮強須攀北富東丘何用嘆西愚自怜幽黙相忘乆闘鳥鳴蟬枉叫呼偶題二首當年樂事嘆今衰人丗空驚日未移風榭醉眠摧鳳燭雨䆫狂飲殢蛾眉長松茂草窮年事野水􅀌村入夢時強鑷􅁂絲臨晚鏡瞥然塵念不勝悲短髮臨風􅂴不冠窪尊塵坌寂無歡離騷夕賦醒尤獨􅀌憤空書說轉難晩節慣成林壑僻幽居􅀷入水雲寒蒼崖瘦栢無窮思鵠立溪頭盡日看新居鏡裏巖花落澗泉對䆫靑壁便叅天幾當雪月開春酒時有松風入夜絃逺􅓯山田多種􅁰稀經城市少言錢平生謾忽王公貴俯仰村鄰更可怜閑題十年一夢到灰心歸􅁂吴霜漸欲侵物外少逢稀有鳥冶中仍作不祥金閑雲閣􅀨終何事枯木因風亦自吟却嘆淵明非逹道無絃猶是未忘琴荅文伯二首老情無頼畏虚勞巳絶朱弦又一操閑事每來知酒聖浮生欲去愧僧髙息心鍾鼎休看鏡安枕茅茨不夢刀遥羡郭西王處士道傍羸馬詠風騷晩䆫淸鏡卷浮埃恨入新秋不可裁露酒野花三徑合風傳雲壑七松哀忘機魚鳥真相識落手功名亦儻來萬古消沉一杯酒直須白骨􅀧蒼苔閱見一十首君居淄右妾河陽平白相逢惹断腸蠟燭巳殘歌欲闋併敎離恨遶飛梁蕭史吹笙鳳女臺月髙霜冷鳳笙哀不堪好酒沉沉夜又遣靑鸞獨自來鳳􅁓銜封玉鏡臺繡鸞傳記巳相猜傾城􅀏臉千金様莫對閑人一例開歌裏冲冲􅀏裏嗔􅀷情㑹處幾何人慿君爲向五陵道冶葉倡條不是春􅀏裏仾眉引醉波閬風秋月一聲歌明知􅀞燭無情物何是尊前泪更多􅀏不成歡歌歛眉景陽鍾動酒䦨時此情􅁍羡牽牛㑹一歳相過可是遟牛女佳期歳一過都縁迢逓隔金河可怜馬上香車畔只隔珠簾更不多輕蓮素質澹蕭蕭葉宻溪􅀷未可招雨暗蘭舟人去後却容白鷺逞風標􅀟鸞夾鏡鳳撗􅁫捧額黃梅小鴈排爲報阿環休調戲􅀟成西母緫相猜膩髮堆雲鏡舞鸞五雲仙洞接淸歡歸來失却吹簫伴腸断崐山昨夜寒李承旨晏晏字致美髙平人唐順宗弟十六子福王綰之苗裔父森字彦實工於詩有云少年日日醉花邊短白長紅一一怜自􅀏老來心尚在惡風常廢五更眠又賦梅云冰骨有香魂乍返玉顔無暈酒全消人多傳誦之致美皇統二年經義進士釋􅄄臨汾丞時張太師浩判平陽一見愛其才爲之延譽稍遷遼陽幕官與興陵有藩邸之舊入翰林爲學士髙文大􅁽號稱獨歩拜御史中丞初遼人掠中原人及得奚渤海諸國生口分賜貴近或有功者大至一二州少亦數百皆爲奴婢輸租爲官且納課給其主謂之二稅戸大定初一切免爲民閭山寺僧賜戸三百與僧共居供役而不輸租故不在免例訴者積年臺寺不爲理又訴於致美致美上章大略謂天子作民父母當同仁一視分别輕重乃胥史舞文法之敝陛下大明􅀶照豈可使天下有一民不􅀍其澤者且沙門旣謂之出家而乃聽其與男女雜居乎書奏宰相持不可丗宗詔致美與相詰難致美伏御座前曰前日車駕幸遼東閭山寺曽供從官一宿之具寺僧物陛下物也陛下無以此直寺僧而使三百家受屈丗宗大􅀏曰李晏刼制我邪即日免之明昌初爲禮部尚書分諸道府試復經義設經童科皆自致美發之出爲沁南軍節度使告老不從改昭毅軍節度使且授子仲略澤州刺史以榮之時澤潞旱甚致美擅發倉粟三萬石捄餓者因上章請罪章奏而本道提刑彈章亦至章宗謂宰相言提刑職當然李晏義當然不之罪也仲略字簡之大定二十二年進士仕至山東路按察使道陵愛其俊快比爲脫帽鶻云致美自號㳺仙野人􅂤之丹源釣徒有集傳于丗􅂤之之子肯播字克紹肯穫字克守肯德字克修白雲亭白雲亭上白雲秋桂棹蘭槳記昔㳺往事巳隨流水去靑山空對夕陽愁興亡翻手成舒卷今古無心自去留獨􅀝西風一惆悵數聲柔櫓下汀洲贈燕王謝堂前燕秋風又送歸向人如惜别入戸更低飛海闊迷煙㠀樓髙近落暉不知從此去幾日到烏衣通州道中冉冉年華老飄飄客路難塵埃山色断雲霧日光寒念逺心先折􅀌吟􅈹亦酸平生江海意潦倒愧儒冠髙麗平州中和館後草亭藤花滿地香仍在松影拂雲寒不收山鳥似嫌逰客到一聲啼破小亭幽題武元直赤壁圖鼎足分來漢祚移阿瞞曽困火舩歸一時豪傑成何事千里江山半落暉雲破小蟾分樹暗夜􅀷􅀌鶴掠舟飛夢㝷仙老經行處只有當年舊釣磯嗅梅圖簡之朧朧霽色冷黃昏缺月踈籬水外村人在天涯花在手一枝香雪􅀉銷魂蓮塘陪諸公賦潦倒何堪接俊逰神仙空羡李膺舟官曹只在空湖畔簿領如山屋打頭省幕在城外極卑陋故云王都運寂寂字元老薊州玉田人系岀三槐父礎字鎮之國初名士仕至歸德府判官元老天德三年進士興陵朝以文章政事顯終于中都路轉運使壽六十七謚文肅有拙軒集北遷録傳於丗三子欽哉直哉鄰哉俱爲能吏元老專於詩有云生涯貧到骨家具少於車元夕感懷云殘夢􅀜河鰲禁月舊㳺燈火馬行春留别郭熈民云五年風雪黃州閏萬里􅀜河渭水秋与涿郡先主廟詩當年竹馬戲兒曹􅀏指樓桑五丈髙故國神逰得無恨壞垣風􅀨夜蕭騷人共傳之行記載其先人雞山一詩云記得垂齠此地逰雞山孤立水平流而今重過山前路山色靑靑人白頭予謂詩固佳恨其依倣蘇才翁太甚耳易足齋吾愛吾廬事事幽此生隨分得優㳺窮冬夜話蒲􅇛暖長夏朝眠竹簟秋一榻蠹書閑處看兩盂薄粥飽時休紅旗黃紙非吾事未羡元龍百尺樓送張仲謀使三韓照海旌幢出樂浪過家上􅃁路生光鴨江桃葉朝迎渡㞯嶺松花夜煮湯㤙詔肅將芝撿重醉鞭伭裊玉鞘長遺民􅀏指天車道酷似南陽異姓王髙麗稱中原使節皆曰天車某官事見閆子秀鴨江行記自東營來廣寧道出牽馬嶺經梁利器墓下毁譽譊譊息蓋棺百年春夢大槐安功名倒挽九牛尾富貴真成一䑕肝故國鸎花人事改空山風􅀨夜臺寒平生老我心如鐵醉眼西州泪不乾黃桃花應瞋國色朝酣酒賜與羽衣如太真道士厭看千樹老令君別換一城新緗梅拂額更不俗栗玉削肌殊可人想得乞漿㝷舊約東風不似去年春沁水山寺兩峽山髙月半輪五更人起馬嘶頻無端又上長安道輸與僧牎飽睡人奉題少保張公曲阿别墅二首休沐時時散馬蹄緑隂如染轉長堤帝城和氣融春圃相國餘波到兩溪無數􅀛魚欣作主不言桃李自成蹊聖時正要傳衣事賀監從渠老會稽鍾湖亭下水淙淙緑野平泉未易􅀟十里藕花紅歩障一軒松䕃碧油幢洛中獨樂有司馬天下不名知曲江紙尾欲煩賢宅相􅀨蓑添我坐篷牎蓮峯真逸喬扆扆字君章􅀄名逢辰洪洞人天德三年進士詩樂俱有名子宇字德容八歳能鼓琴召入東宫顯宗稱其不凢大定十六年登科貞祐􅀄爲益都按察轉運使與田琢器之俱殁兵間淩虚堂
