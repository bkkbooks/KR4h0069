body:
  text: 祝太常􅂤一十二首張子羽三首朱諌議之才一十七首劉内翰著二十四首施内翰宜生四首朱葭州自牧二十首孫内翰九鼎一首劉修撰彧二首趙内翰可三首劉西嵓汲一十首劉内翰瞻三首郝内翰俁二十首張郾城公藥三首任南麓詢九首馮臨海子翼七首史明府旭三首邊内翰元鼎四十二首李丞旨晏七首王都運寂七首蓮峯真逸喬扆一首祝太常簡簡字廉夫單父人宋末登科國初倅某州仕至朝奉郎太常丞兼直史館有嗚嗚集行於丗其詩說有云予政和丁酉任洺州敎官是時括蒼鮑慎由欽止出所注杜詩說天王守太白守讀如狩於河陽之狩髙秋登寒山南望馬邑州馬邑州在城州界予撿唐書志宝應元年徙馬邑州于塩井城欽止爲有據矣舊注馬邑属鴈門與杜子美作詩處全無􅀜渉後人遂謂王源叔謬於牽引不知源叔􅀄不注杜詩予識其孫彦朝彦朝不說杜詩非其大父注盖彦朝不學見流俗皆讀舊注因而認有可歎可歎好問常以此問趙禮部趙云廉夫前軰必不妄試更考之今日見吴彦高東山集有贈李東美詩引云元祐閒秘閣校對黃本鄧忠臣字愼思余柳氏姨之夫今丗所注杜工部詩乃愼思平生究竭心力而爲之者鏤板家標題遂以託名王源叔翰林兩王公前後記初無一語及此注而後記又言如源叔之能文止作記於後則源叔不注杜詩爲可見矣舉丗雷同無爲辨之者宣和近貴李東美有才藻善行書且喜作小楷所冩杜集精宻遒麗有足嘉賞爲作古詩一篇帋尾因記鄧公事後人聞此其誰不疑然予少時目擊不可不識姑以告李侯非求信後人也彦髙此說正與廉夫合近歳得浙本杜詩是源叔之孫祖寧所傳前有序引備言其大父源叔未甞注杜詩廉夫彦髙益可信故併記於此廉夫詩甚工如賦雪云雲屋無寒夢油燈有細香書懷云白髮渾無賴朱顔更不回遮眼細書􅂓引睡扶頭濁酒㝡􅀜情此􅀋甚多舟次丹陽舩頭東下趂晨鍾舩外清霜氣暗通断鴈聲歸煙靄裏􅀌㠶影落月明中隋河波浪千年急梁苑池臺一旦空試問碧堤無限柳敗條衰葉幾秋風下第魚臺東寺病眼逢花亦倦開流鸎飛去悮相猜多情却愛僧堂燕才得春風却再來靑奴名實於人不可誣馬牛我亦受人呼丗閒物化多難曉誰爲此君爲此奴雜詩雨後淸寒滿袖風鴈聲南去暮雲濃秋來􅂎菊能多少欲助盤飡自不供榴花嬌欲闘羅裙石竹開成碎纈文更有戎葵亦堪愛日烘紅臉酒初醺虚極齋獨坐虚齋長鋏短燈檠明月當䆫夜氣淸却掩塵編時閉目胡床獨坐聽秋聲相國寺鍾寒雞縮頸未鳴晨巳聽舂容入夢頻未必佛徒知警悟秪能喚起利名人春日鸎語相喧浩蕩春落花細􅀧禁街塵㳺絲飛絮狂隨馬遟日和風欲醉人夏􅀨電掣雷轟雨覆盆晚來枕簟頗冝人小溝一夜水三尺便有蛙聲喧四鄰和常祖命二首著書不得自名家卷裏蠅頭散眼花未用一杯張翰酒正須七椀玉川茶操筆文章學古風生平羞與腐儒同相如雖有凌雲賦不及東方射守宫撿旱草樹連雲緑間黃年飢村落自荒凉晩蟬抱樹聲聲急野菊迎人細細香張子羽子羽字叔翔東阿人馬定國薺堂集載其師友六人其一香嚴可道上人題比陽道邊僧舎云山頭翠色僧房静山下紅塵客路長五月行人汗如􅀨豈知髙處有清凉其一鮮于可字東父蜀嘉州人從祖侁父之武皆有名於時東父詩有小雨潤履綦花氣襲芳襟十里靑山堪布屐半篙春水巳勝舟之句其一髙鯤化字圖南平原人少有能詩聲如盤中酒影金蛇活與流虹聚石矼之句皆竒怪不凡其一王景徽字彦美祁國文献公溥之後贈定國詩云㵎下松杉巳蔽牛溪中蘋藻可供羞故郷未有終焉計欲指吴山歸去休其一吴縯字子長東平人文肅公奎之孫年三十以食貧暫仕即歸隱于魚山狼溪之側􅀉定國云情馳夏日流目断晩雲碧新詩從何來逺自金馬客雄􅀷作者意奔軼古人迹名髙四海望髮未一莖白應嗤窮途士抽簪老泉石采蕨在南山驅牛向東陌勞生豈不苦衣食迫晨夕膏粱無宿懷茅茨得真適卒歳將何求一飽惟力訪國城石氏云昔我訪君處樹凉炎暑收今君訪我來城空殘雪留經時少乗興兩至皆空投茅茨隔溪上車馬度城頭不聞機杼聲但聽溪水流向來方圎翁曽伴此中遊近聞大梁至京塵滿衣裘相思懶歸歩落日風颼颼山居云西首魚山崦北連黃石祠崇岡在東南我家山北陲地僻少人事終朝掩柴扉尊酒不常得書卷聊自怡春風數日來處處生蕨薇寸心復何累一飽良可期當年終南人捷徑以貽譏知我無心者豈顧悠悠辝擬淵明貧居云淒其歳云暮北風無時休晨興倦薪水夜寐乏衾裯缺月正裴回宿鳥頻啁啾欲無憔悴歎奈此霜霰秋松楸脫兵火環堵且淹留閉門念􅀽安守賤弔黔婁坐讀貧士詩吾乃淵明儔溪上招王仲先云幽居復何爲冬來性成懶柴門俯淸溪寸歩出亦罕今晨偶携杖愛此晴日暖寓目隨所之行到南溪畔背隂雪猶積向暖冰全冸搘頥卧石上仰靣蒼崖断泉聲何從來乍喜兩耳換平分意甚遟斗落􅀔方悍坐來百慮忘還惜日景短塵寰多憂虞中林足閑散故人戀明時歸休苦遟緩幅巾來何時臨流話幽欵叔翔亦其一也定國謂叔翔於文章無所不能甞仕國朝官洛陽云㳺龍門訪潜溪僧舎入谷訪精舎鍾聲先逺聞陽光時翳竹泉脉俄當門山僧禁足乆瞑目誦微言要知鹿臺寺但指山頭雲䇿杖御栝西幽蘭秀荆榛風煙浩難及薄暮花紛紛宿寶應重嵓煙靄合寶閤春風暮山􅀷月影遟坐乆識歸路伊昔府中彦征􅆖同夜駐徂年能幾時變滅等驚霧禪房伴茗飲豈待酒中趣卧來淸不寐瘦鶴警宿露㴝明覓舊題松間宛如故又作巳復等驚霧壽張和滑益之理髮秋庭趂夕陽静中誰可共傳觴雲横故國三年别水遶􅀌村六月涼病眼只貪書味永渴心頻夢橘奴香魚山早有終焉計少日應容解印章朱諌議之才之才字師美洛西三郷人宋崇寧閒登科入齊爲諌官坐直言黜爲泗水令㝷乞閑退寓居嵫陽因而家焉昆弟數人皆有文名師美自號慶霖居士有霖堂集傳於丗如云魯甸分鴻影齊山入馬蹄門静堪羅雀書成不換鵝雨過好花紅帶潤日長嘉樹緑移隂此􅀋甚多子瀾字巨觀南越行南越太后邯鄲女皓齒明眸照蠻土􅃢瑚爲帳象作床錦繖髙張擊銅鼓太液池内紅芙蓉自怜謫墮蠻煙中㶚陵故人杳無耗􅀷宫獨看南飛鴻隨兒作帝心不願惟願西朝栢梁殿茂陵劉郎亦可人遣郎海角來相見金猊夜燎龍涎香明珠火齊爭煌煌番禺秦甸隔萬里今夕得遂􅀟鴛鴦白首相君佩銀印干戈欲起蕭墻釁莫言女子無雄心置酒宫中潜結陣漢家使者懦且柔纎手自欲操霜矛􅀌鸞竟落老梟手可怜空奮韓千秋樓舩戈鋌師四起或出桂陽下灕水越郎追斬吕嘉頭九郡同歸漢天子尉他墳草幾畨靑覇業猶與炎洲撗玉璽􅀄從真定得黃屋却爲邯鄲傾五羊江連湘浦竹嬌魂應伴湘娥哭後薄薄酒薄酒可以謀醉不必霞滋玉味麁布可以御冬不必狐貉䝉茸醜婦可以肥家不必楚女吴娃獨夫長夜商祚訖羲和􅊺淫紊天曆李白跌宕三百盃阮籍沈醟六十日眠瓮吏部寡廉恥解貂常侍隳法律儻使飲薄酒未見有此失秦昭狐腋幾喪首鄭藏鷸冠貽厥咎尨裘金玦豈不哀繡衣朱襮固無取皆縁麁衣惡不御賈禍招譏亦何有夏􅁎滅兩國驪􅁎禍五丗捧心顰眉亡夫差墮髻啼粧敗梁兾醜婦似可惡終不至顚沛勸君飲薄衣麁娶醜婦此樂人間最長乆薄酒麁衣吾何悲醜婦自醜吾不知道眼混圎宜不二媺惡妍􅋘無殊歸瓦罍石臼斟吾酒脫粟藜羹皆可口醉境陶然無後憂玉盌浮蛆彼何有漢文天子猶弋綈士服麁布乃所宜要繩屐葛同一煖霞縠冰紈徒爾爲無塩如漆后齊桓孟光舉臼配伯鸞古來傾城由哲婦有德乃令家國安我能遣婦縫麁對婦飲薄傍人大􅀏吾不惡寓言二首獸有善觸邪草有能指侫獸草非有心不移本天性前王着臣冠俾爾効端鯁如何不稱服觸指反忠正吾欲取二物豢植列臺省一令邪侫徒奔逃亟􅀷屏風雨晦時夜雞鳴有常聲霜雪枯萬幹松栢有常青内守􅀄巳定外變終難更若人求丗利浮沉無定情俯仰効􅥱槹低昂甚權衡反出木鳥下徒爲萬物靈謝孫寺丞惠梅華我來泗水上居與墟墓鄰彌望多棗栗礙眼昏荆榛忽忽度歳月不知時巳春朝來佳公子遺我梅花新秀色照牎几妙香襲衣巾莽如瓦礫場驚賭瓊瑶珍念昔客江南千樹臨江津吴儂不知貴但與桃李倫自從墮東土夢繞江之濵嘆彼和鼎實亦復生不辰窮愁坐空山犲虎雜鳯麟此贈意不淺難爲俗子陳次韻東坡跋周昉所􅀞欠申美人巫峽昭君有竒色毛生欲􅀞無由得但作東風背靣身看來巳可傾人國朝來睡起􅁂髮垂手如春笋領蝤蠐繡帷幽夢断難續想像翠黛顰脩眉春光三月濃於酒燕燕􅀟飛鸎喚友不敎膩臉露桃花且喜腰支似楊柳君不見漢宫多病李夫人轉靣不顧君王嗔古來􅀞工􅀞意亦自足煙霧玉質何由眞􅁀雨掣電奔雷晻靄間崩騰白雨襲人寒頺山黒霧傾濃墨倒海衝風㵼急湍􅀔似陽侯夸海若聲如項籍破章邯炎歊一濯須􅁷耳巳看天圍碧玉寬宿閑廐淡煙衰草慵回首晩日殘霞欲斷魂脫帽卸鞍投逆旅蕭蕭黃葉水邊村十月十五日夜作連珠詩四首披衣開戸幾宵興永夜無眠魂九􅂛坐覺飛霜明瓦屋天如寒鑑月如冰天如寒鑑月如冰僵卧家僮喚不譍却憶少年逰太學蕭然獨對短檠燈蕭然獨對短檠燈引睡翻書睡幾曽自􅀏年來憂患熟跏趺真作坐禅僧跏趺真作坐禅僧不學䆫間故紙蠅湛若琉璃含寶月此中無减亦無増卧病有感二十韻臯蘇粲園英澤芝紛水葉赤弁舞纎肌黃􅂁緩老頰鳴飛各有適吾獨嗟衰薾齒髮乆巳踈又復失調燮梁肉謝鼎俎參苓富巾篋葵扇風未來桃笙汗初浹呻吟和哀蝉夢寐追化蝶撫枕念平生丗故飽更渉弱齡􅀒竒志􅇩蜺蟠煒曄夜徯傅嵓訪朝待渭濵獵荀爽歳九遷康侯日三接功業著鍾鼎聲名垂史諜那知事大謬舉趾得躓跲多難集暮年百願亡一愜寒灰消寸心淸淚腐􅀟睫坐令􅀌鵬騫化作瘴鳶跕憂來復自慰人生幾􅕴莢呼吸過百歳俯仰失千刼乗流須縱櫂遇坎即停楫些語不成騷商歌鼓長鋏復用九日詩韻呈黃壽鵬忽忽天星二十九當年曽醉瓊林酒癸未歳登科弟適二十九年春風射䇿紫垣􅀷猶記靈和殿前柳與君雖異千佛名出入南宫同戸牖春蠶食葉七千人看君運筆如揮帚妙齡忠氣軼衡嵩餘子紛紛真培塿那知晩莭岱陽城白髮蒼顔兩閑叟君材有如萬斛舟顧我碌碌才筲斗時窮壯士或飯牛遇合封侯起屠狗東皐有田供王賦天寒且輟扶犂手寂寥圭竇對書􅁽火冷燈青夜方乆先生乗興肯相過亦有青錢沽玉友七夕長短言牛不可以服箱女不可以成章其名則然實豈爾政如箕斗難挹􅀭河漢特水象安有波浪爲津航惟􅍎乃巢居詎能上天構橋梁星經有􅄤次東西永相望今夕復何夕乃謂合并如鸞凰一人唱誕惑萬丗浪令兒女爭猖狂瓠牛載槃何等秩金梭擲地殊荒唐吾命有貴賤吾性本直方探官與乞巧是豈吾所臧何如舉酒邀明月更遣清風屏炎􅀬星光落盞黃金空露華糝袂眞珠滑我方幕天席地醉兀兀癡牛騃女知何物水月有興明月落湖水天淵體俱一浩蕩碧琉璃奩此寒玉璧微風觸湖波合散作六七浮光逐水紋金蛇勢盤詰人心湛寂初與月同淸質外累一汨之萬態紛殊迹因知養心者無爲風浪失劉内翰著著字鵬南舒州皖城人宣政末登進士弟歸朝預銓調碌碌州縣年六十餘始入翰林充修撰出守武遂終于忻州刺史皖城有玉照郷旣老號玉照老人示不忘本云次韻彦髙即事福威看九落筆削在麟經中道亡三鑑危時憶九齡網羅無處避鼙鼓不堪聽身逺遼陽渡心懷峴首亭脫巾頭半白傾蓋眼誰青断鴈西風急潸然涕泗零順安辭呈趙使君二首太平時丗屢豐年勝事空聞父老傳郭外桑麻知幾頃舩頭魚蟹不論錢六朝興廢渡河年舊國歸來更黯然八月邊城山未雪蘆花藉藉巳漫天次韻玉子愼玉田道中一首兼呈韓公美閣老東􅀳風流属子猷開元峭直讓韓休絲綸對掌驚三雋樽酒更酬失四愁古道隂隂槐樹老歸鴻杳杳荻花秋浩然詩思天涯逺月滿江南小謝樓出榆􅀜羽檄中原滿萍流四海閒少時過桂嶺壯歳出榆閞竒禍心如折覊愁􅁂巳班楚纍千萬億知有幾人還渡遼身隔遼東渡心懷冀北群㑹歸蘇属國却憶范將軍風陣撗秋鴈雷聲吼夜蚊方言莫相􅀏唐梵本殊分至日亂離南國忽經年一線愁添未死前心折靈臺候雲物眼看東海變桑田燕巢幕上終非計雉畜樊中政可怜安得絶雲行九萬却􅀐鯨背上青天次韻彦髙暮春書事戊申歳平生漫浪老清暉却掃丘園属少微丗亂傷心青眼舊天涯流泪白雲飛羈愁只憶中山酒貧病長懸子夏衣澤畔行吟誰念我秪應形影自相依􅀉題張浩然松雪樓入座山光秀玉柯岸巾絶景意如何瘦來豈爲寒松句和寡還驚白雪歌地近雲煙來鶴駕簷髙星斗㵼銀河懸知老子登臨處􅄅渺滄波月色多次韻彦髙占雪天秋鼔南風雲海飄暮雪三春猶泫寒九夏那苦熱土圭測中氣甞聞先儒說窮髮多異冝泥古誠亦拙吴侯擅六藝名宦端不屑晚歳登泰山蚤巳探禹穴千歳可坐致不待數旬月重隂畏坎䧟五陽欣夬决君子方履霜渠肯蹈覆轍雞猪與魚蒜幸可充朝餟枕上言懷九土將分裂中原政擾攘孰爲眞漢相却憶假齊王􅀳室遷神鼎梁園作戰場可怜羈客夢夜夜在家郷再和彦髙否泰由來在歳星誰聽叩角作商聲一朝漢魏成今古百口燕秦隔死生雉堞僅能逃病婦鴈書猶記作團兄雪雲埋盡遼西路有酒如淮奈此情聞鴈千里寒雲卷朔風當軒月午鴈書空煩君爲報江南客顦顇遼東更向東閨情二絶己酉歳天邊北斗又回春愁絶龍沙任酒醺萬里巫山歸夢断不知何處覓行雲蕙帳金爐泠􅂐煙故山春草幾芊芊只今唯有瀟湘月萬里相隨照不眠過白溝趂順安萬折狂瀾肯倒流歸心夢寐在東周平生快意君知否今日驅車過白溝題御城寺壁一徑埋雲草樹荒石麟蒼蘚卧田桑漢家陵闕今何在洛水嵩山滿夕陽月夜泛舟浮丗渾如出岫雲南朝詞客北朝臣傳郵擾擾無虚日吏俗區區老却人入眼青山看不厭傍舩白鷺自相親舉杯更欲邀明月暫向堯封作逸民病中􅀉楚卿月滿江樓午夜鍾多情多病一衰翁行雲不道無行雨只恐相逢是夢中送客亭十年羈旅􅁂成絲千里淮山信息稀送盡長亭短亭客且看莊舄幾時歸病中言懷呈韓給事潦倒淮山客金臺五見秋退飛嗟宋鷁畏暑甚吴牛問疾怜摩詰分曹􅀋子猷自慚無補報只合隱林丘伯堅惠新茶緑橘香味郁然便如一到江湖之上戲作小詩二首建溪玉餅號無􅀟􅀟井爲奴日鑄降忽聽松風飜蟹眼却疑春雪落寒江黄苞猶帶洞庭霜翠䄂傳看緑葉香何待封題三百顆只今詩思滿江郷文季侍郎得緑蕚香梅子文待制有詩輒亦同賦一枝蕚緑冠群芳瀟洒猶疑楚岸傍香骨痩來冰蘂細夢魂清處月波涼賡酬便合成千首醒醉寧須計百觴撗玉叫雲吹不盡只敎今古洗離腸施内翰宜生冝生字明望浦城人宣和末爲頴州敎官仕齊仕國朝官至翰林學士自號三住老人有集行於丗賦柳云朱門處處臨官道流水年年遶禁宫草書云臨池翕忽雲霧集舞劒浩蕩波濤飜山谷草書云行所當行止當止錯亂中閒有條理意溢毫揺手不知心自書空不書帋社日云濁澗廻湍激青煙弄晩暉縁隨春酒熟分與故山違社鼔喧林莽􅀌城隱翠微山花羞未發燕子喜先歸又云割少詼諧語分均宰制功靈祇依古樹醉叟泥村童萬里開耕稼三時順􅀨風行春從此樂着意酒盃中􅀄在頴州日從趙德麟㳺頗得蘇門沾丐云柳魏王堤暗雨垂垂還似春殘欲別時傳語西風且停待黛殘黃淺不禁吹無題唱得新飜稳貼腔阿誰能得肯􅀟􅀟天寧寺裏尊前月分擘清寒入小牎盆池盆池㶑灔䕃芭蕉􅀧水圎荷未岀條分得江湖好風景断雲飛去晩蕭蕭平陽書事春寒窣窣透春衣㳂路看花緩轡歸穿過水雲􅀷宻處馬前蝴蝶作團飛朱葭州自牧自牧字好謙棣州猒次人皇統中南選宋端卿榜登科大定􅀄以同知􅀳寧軍事卒官有詩云寒天展碧供飛鳥落日留紅與断霞又云水禽孤影白霜果半腮紅海氣􅂛􅀌月嵓姿起暝煙山雪㝷崖断林煙逐樹伭燈殘星在壁霜重水漫衾句法之工􅀋如此病起書事牢落衰年病轉侵醫編藥褁廢閑吟卧銷白日塵凝屨起對青銅雪滿簪霜後癡蠅看老態天邊倦鳥識歸心維摩不岀文殊去門巷蕭條翠蘚􅀷晨起趨省鄰雞一鳴僕再呼三星巳在東南隅霜風遶屋伺我岀布衾尚欲留須􅁷才踈性懶真勉強飢寒見迫誰能逋山靈􅀏我眞有謂能使我􅁃如陵乎自鄜州歸至新市鎭時方渡險喜見桑野誾山自天降爲田洛水自瀑舒爲淵山川險盡鞍馬穩昔居􅥱橰今乗舩三年官業無毫髪萬里裝囊更蕭瑟歸來何以謝郷閭細說艱難爲土物自鄜州罷任歸宿澠池道中有虎爲􅁀崤山之阿澠之滸行路蕭條正艱阻日落山空澗水哀市門静閉防飢虎前年張茅殺餉婦今歳食驢断行旅我來萬里逐一官安可不戒爲汝脯晝持弓矢夜枕戈静匿兒童防􅀏語白額將軍莫􅀏人丗無劉琨當畏汝趂鄜州過湖城縣武帝望思臺在焉寒骨千年飲恨埋餘哀空􅀉望思臺縱令曲沃精魂見寧與商山羽翼來趙虜典刑何足正周公􅀞像可怜開忍心本自窮兵起巫蠱焉能作禍胎􅀳寧感興莫將官况說葭蘆一味蕭條稱鄙夫老圃不禁􅂼代肉樵丁還喜炕連􅌮兒音半巳漸秦􅀳郷信無因接魯洙三見秋風落庭樹年年歸意􅀒蓴鱸年節嵐州席上贈同知王子直中散别時風雪暗龍津一夢經年復見君去國光隂雖易得夾河形􅀔且平分心如征馬常嘶代身伴秋鴻却渡汾此日一樽難惜醉新年風景舊知聞送鄜州節判任元老罷任東歸二首長塗冰雪歳峥嶸客裏那堪送客行萬里歸心應接淅一樽别酒且班荆春生汶水庭闈近人去雕隂幕府輕欲仗征鴻􅀉消息地寒不肯過邊城都騎駸駸指汶陽􅀜門應識棄繻郎暮寒煙浪歸期阻細雨簷花飲興長束帶暫爲彭澤令曳裾休忤漢梁王邊城情味君應㑹爲說無憀與故郷小􅀨不岀寧海司理㕔吏散庭空鎻碧苔冷官門戸幾曽開踈踈細􅀨槐華落寂寂虚堂燕子來多病始知窮有鬼獨賢方覺仕無媒故園抛擲奔馳外剛道江山未放回過渾源留别田仲祥同知節使金臺前夢杳無蹤一阻雲山莫計重􅀟鯉附書常不達兩萍浮海偶相逢燕南落日車分轍代北春風酒滿鍾明日去留牽丗務燈前談􅀏且從容劉仲規挽辤富貴康強九十春公歸無憾我傷神人間秀氣還嵩岱夢裏行年属巳辰名姓空留耆舊傳衣冠不見老成人凄凉通德門前路無復青蒲褁􅀞輪訪山寺僧踏破蒼苔叩竹扃晩晴庭院有餘清幡腰落日紅千颭簷際遥岑翠一撗種秫公田􅂓卒歳栽蓮僧社擬投名從今興熟頻來往未信齋鍾午後鳴謝吳堡知寨安巨濟贈帋百幅百幅溪牋逺見羞故人佳餉若爲酬幸將晩節收魚網未得良工起鳯樓柿葉學書差足慰芸香辟蠹㑹須求揮毫不見雲煙落愚賈操金愧暗投淸河道中暮歸緩轡溪邊喜乍晴夕陽流水浸􅀌城川平佛塔層層見浪穩商舟尾尾行十里煙霞隨野歩兩崖禾􅁰撼秋聲雨暘雖有豐年兆久客都無地可耕晚泊濟陽江北秋隂一半晴晩凉留與客襟淸水邊􅀞角孤城暮雲底殘陽逺樹明旅鴈爲誰來有信断蓬如我去無程寥寥天地誰知巳村酒悠然只獨傾冬日擬江樓晩望萬里長空淡落暉歸鴉數盡下樓遟山如駭浪髙伭湧天佀寒灰黯淡垂紫塞西撗連統萬黃河東下接汾睢此􅀖形􅀔雄今古只與羈人百不宜對雪寂寂􅀽安舎柴門雀可羅靑旃無舊物黃竹有新歌罷飲瓢仍棄供吟筆旋呵殷勤掃荒逕尚憶子猷過郊行緩轡㝷春水一涯㝡憐朝􅀨浥輕沙小溪煙重偏冝柳平野雲垂不礙花靑眼歩兵元好酒黒頭江令未還家興長不覺歸來晩過盡城頭陣陣鴉和郭仲榮郡城秋望城髙野闊思何窮人在西風一􅅇中樓影不揺溪水浄舂聲相荅暮山空海天引望能供碧霜樹禁秋更􅀝紅回首客魂招不得蓴鱸歸興滿江東孫内翰九鼎九鼎字國鎭忻州定襄人天㑹六年經義弟一人在太學時逰金明作詩云片片桃花逐水流東風吹上木蘭舟隔溪紅粉休相認年少孫郎不姓劉弟九疇億俱有時名三人同榜登科吴彦髙贈國鎭詩云孫郎有重名談􅀏取公卿淸廟瑟三嘆齋房芝九莖其爲名流所稱道如此中州文派先生指授之功爲多年八十餘卒甄㽵三藏真身三藏來中土時其師授記謂當緣甄住殁後三百年見夢于白氏出地中生自􅀛兹國來從大業年縁甄駐飛錫夢白出重泉鐵石亦有毁筋骸何尚全應知待彌勒萬刼庇山川劉修撰彧彧字公茂安陽人天眷二年經義弟一人自號香嵓居士歷京兆緫幕終于翰林修撰春隂似􅀨非晴意思􅀷宿酲牽率泥重衾苦怜燕子寒相並生怕梨花晩不禁薄薄簾幃欺欲透悠悠歌管壓來沉南園北里狂無數唯有芳菲識此心秋􅀨得雲字一室蕭然半掩門簷牙懸溜喜􅀄聞棲鴉不動寒偎樹過鴈無聲冷貼雲􅊗耳半隨風淅􅄋舞堦仍帶葉􅌭紛隔籬爲問東皐叟麰麦前春定十分趙内翰可可字献之髙平人貞元二年進士仕至翰林直學士風流有文采詩樂府皆傳於丗號玉峯散人集子述字勉叔承安二年登科賦雪云竒貨可居天種玉太平有象麦連雲屏山故人外傳說勉叔詩章字畫皆有父風性落魄嗜酒卒以樂死俶儻竒男子也來逺驛雪夕使髙麗時作江上東風冷不禁晩雲飜手弄晴隂春來天氣不全好夜乆雪花如許􅀷煖老正思燕地玉辟寒誰有魏臺金空齋寂寞靑綾被學得東山擁􅈹吟雲興館曉起􅀟旌晩泊雲興館對靣髙峯絶可人一夜山雲飛作雪要誇千樹玉嶙峋江路聞松風雪裏雲山上竹屏松風入耳細泠泠朝來醉着江亭酒却􅀍髯龍喚得醒劉西嵓汲汲字伯􅀷南山翁之子天德三年進士釋􅄄慶州軍事判官入翰林爲供奉自號西嵓老人有西嵓集傳於家屏山爲作序云人心不同如靣其心之聲發而爲言言中理謂之文文而有節爲之詩然則詩者文之變也豈有定體哉故三百篇什無定章章無定句句無定字字無定音大小長短險易輕重惟意所適雖役夫室妾悲憤感激之語與聖賢相雜而無愧亦各言其志也巳矣何後丗議論之不公邪齊梁以降病以聲律􅀋俳優然沈宋而下裁其句讀又俚俗之甚者自謂靈均以來此祕未睹此可􅀏者一也李義山喜用僻事下竒字晩唐人多効之號西崑體殊無典雅渾厚之氣反詈杜少陵爲村夫子此可􅀏者二也黃魯直天資峭拔擺出翰墨畦逕以俗爲雅以故爲新不犯正位如叅禪着末後句爲具眼江西諸君子翕然推重别爲一派髙者雕鐫尖刻下者模影剽竄公言韓退之以文爲詩如敎坊雷大使舞又云學退之不至即一白樂天耳此可􅀏者三也嗟乎此說旣行天下寧復有詩邪比讀劉西嵓詩質而不野淸而不寒簡而有理澹而有味蓋學樂天而酷似之觀其爲人必傲丗而自重者頗喜浮屠􅃉於性理之說凡一篇一詠必有􅀷意能道退居之樂皆詩人之自得不爲後丗論議所奪眞豪傑之士也題西嵓人愛名與利我愛水與山人樂紛而競我樂静而閑所以西嵓地千古無人看雖看亦不愛雖賞亦不懽欣然㑹予心􅁲築於其間有石極峭屼有泉極淸寒流觴與祓禊終日堪盤桓此樂爲我設信哉居之安􅁲築西嵓㝡可人靑山爲屋水爲鄰身將隱矣文何用人不知之味更真自古交㳺少同志到頭聲利不􅀜身清泉便當如澠酒澆盡􅇩中累刼塵平涼道中青山烱無塵塵滿行人衣行人望靑山咫尺不得歸吾歸不作難丗故苦相違何當臨溪水一洗從前非南園歩月雲撗樹外山樹映山巔月微風拂寒枝踈光散清樾幽歡難相遇此景安可忽從來山水心不爲塵埃没不如意朝亦不如意暮亦不如意今日只如此來日復何異一懽強欲謀百憂巳先至乃知塵網苦動輒心萬計髙軒與華冕儻來亦如􅀉規規必欲求愈勞終不遂善哉榮啓期自寛以遣累慶州回過盤嶺宿義園隨馬雨不急催人日欲晡山從林杪出路到水邊無拘縛嗟微宦﨑嶇走畏途村家應㝡樂雞酒夜相呼到家三載塵勞慮飜然盡一除園林未揺落庭菊正扶踈遶屋看新樹開箱撿舊書依然故山色瀟洒入吾廬髙陽道中杏花開過野桃紅榆柳中間一逕通禽鳥不呼村塢静滿川煙雨淡􅄥􅄥家僮報西嵓栽植滋茂喜而成詠􅀌雲出岫本無心何用微名挂士林近日故園消息好西嵓花木巳成隂留别四弟對床喜淸夜樽酒話平生自是今宵雨於人却有情酒中作樹暗春將老酒䦨人欲歸徘徊風月夜花絮一簾飛劉内翰瞻瞻字嵓老亳州人天德三年南牓登科大定初召爲史館編修卒官党承旨丗傑酈著作元與魏内翰飛卿皆甞從之學嵓老自號櫻寧居士有集行於丗作詩工於野逸如厨香炊豆角井臭落椿花之􅀋爲多春郊桑芽粒粒破春靑小葉迎風未展成寒食歸寧紅袖女外家紙上看蠶生無極道中銀河淡淡㵼秋光缺月梢梢挂晩凉馬上西風吹夢断隔林煙火路蒼茫所見傾欹石片挿漣漪上有蕭蕭楊柳枝藻荇半浮苔半濕浣沙人去不多時郝内翰俁二十一首俁字子玉太原人正隆二年進士仕至河東北路轉運使子居簡字仲寛進士不第有詩名太原平陽間居中字仲純樞宻院令史出身甞刺坊州人物楚楚所謂文献不足猶超人群者也正大末除鳯翔治中南山安撫使詩亦有功子玉自號虚舟居士有集行于丗如云勞生雖可厭淸景亦自適殊有古意也郝吉甫蝸室草草生涯付短椽身隨到處即安然功名角上無多地風月壷中自一天丗路久諳甘縮首麴車才值便流涎一生􅀏我林鳩拙辛苦營巢二十年聽雪軒扶踈䆫外竹歳暮亦可愛蕭散軒中人髙節凛相對淸寒入夢境風雨號萬籟覺來聞雪落淅瀝珠璣碎飢腸出佳句亹亹入三昩華堂沸絲竹此樂付兒軰魏處士野故㽵郊原冷落霜風後桑柘蕭條兵火餘試問當時卿與相幾家猶有舊田廬七月十五日夜顯仁寺東軒對月野迥雲歸盡山髙月上遟暗螢依露草驚鵲遶風枝素影隨波逺新凉與酒宜中秋更有味試爲􅁲歸期應制狀元紅仙苑竒葩别曉叢緋衣香拂御爐風巧移傾國無􅀟艶應費司花弟一功天上異恩􅀷􅀨露丗閒凡卉謾鉛紅情知不逐春歸去常在君王顧盻中疊翠樓􅀞樓西畔石州山指􅀧雲煙識翠鬟回首十年真一夢淡天如水夕陽閑題均福堂三首憧憧車馬競春遊不見溪堂五月秋卧聽雲濤舂午枕夢隨鷗鳥落沙洲爲魚爲鳥知誰是看水看山俱得意存亡貴賤聽天公只有歸休須早計歸休得計即歸來林下空言只可咍莫待山靈嫌俗駕却將鞍馬覔塵埃次仁甫韻渺􅄅撗煙渚凄凄挂月村酒非鄰舎取詩復故人論丗態烏栖屋生涯雀在門西山却多思松雪動吟魂題温容村寺壁草樹醒朝雨烏鳶快晩晴山光自明潤野氣亦淒淸茗椀閑中味紋楸静裏聲此懷能自適未要縛簪纓故城道中同元東巖賦客亭南北厭飄零尚喜揚鑣過故城桐葉不堪追往事泥丸尤足見民情靑山閱丗幾興廢白塔向人如送迎佇立夕陽無限思西風禾黍動秋聲晩過壽寜稻壠分棊局松門入􅀞圖牛羊歸自急鷗鷺􅀫相呼落日低靑嶂髙風起暝途歸僧上煙靄回首愧區區子文致君九日用安字韻􅂓亦同賦旅食京華秋又殘舊㳺真似夢槐安閑居浪說重陽好塵丗端知一􅀏難黃菊巳堪増悵恨白衣無復慰荒寒馬頭明月應相􅀏依舊紅塵滿客鞍題孔氏園亭嚴勝諸孫賢至今相承種德滿家林緑槐丹杏風流逺翠竹蒼松歳月深傾盖昔誰陪俊賞過庭今復嗣徽音此生夙有東㳺願杖屨他時或可㝷􅄃秀軒寺得新㳺處軒餘舊賦詩山川蒲子國松栢􅀳侯祠行止非人力登臨且歳時道人應􅀏我真􅀒鹿門期上巳前後數日皆大雪新晴㳺臨漪亭上十日隂風料峭寒試從花柳問平安野亭寂歷春將晩山徑縈紆雪未乾足踏東流方縱酒手遮西日悔投竿淵明正草歸來賦莫作山中令尹看奉陪太守㳺南湖同郭令賦翠幄千章䕃晚空年華心賞兩無窮雲頭欲落催詩􅀨池靣微生解愠風經笥使君談似綺仙舟令尹飲如虹娵隅自適清池樂不信叅軍是郝隆三月望日次邊德舉􅄃秀軒水遶千家邑山圍一席天桑麻新􅀨露檜栢老風煙夢後餘芳草愁時更杜䳌亦知推不去端用得忘年新秋旅食京華困鬱蒸可人秋意及新晴夜䆫便覺風千里曉鏡從添雪數莖蟬噪不離羈客耳燕歸還動故園情軟紅塵外西山色乞與閑人眼暫明寺樓晴望詰曲欄杆靣翠微葱籠䆫戸溢清暉􅀨侵斜日明邊過雲望山前缺處歸多病過春猶止酒薄寒向晩却添衣宦名不􅀒滄波願羞見陂田白鳥飛題五丈原武侯廟一首仲純籌筆無功事可哀長星飛墮蜀山摧三分豈是平生志十倍寧論盖丗才壊壁丹青仍白羽断碑文字只蒼苔夜深老木風聲惡尚想褒斜萬馬來張郾城公藥公藥字元石宰相安簡公孝純永錫之孫以文􅄻入仕甞爲郾城令詩號竹堂集寒食云一百五日寒食節二十四番花信風新年云客情病裏度殘臈老色鏡中添一年雲樹縈寒猶漠漠竹梢迎日巳姢姢春晩云細風皺緑漲溪水小􅀨􅀧紅添海棠又云芭蕉葉斜卷舒􅀨酴醾架小縱撗春人喜傳之子觀字彦國仕爲某軍節度副使孫厚之茂弘承安五年進士許下三􅁃劇暑