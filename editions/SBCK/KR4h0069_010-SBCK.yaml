body:
  text: 溪南詩老辛愿二十首李講議汾二十五首李戸部獻用一十三首司馬侍郎朴一首滕奉使茂實八首通理先生何宏中一首醉軒姚先生孝錫三十六首朱奉使弁三十八首籧然子趙滋一首先大夫詩四十四首敏之兄詩五首三知巳溪南詩老辛愿愿字敬之福昌人其大父自鳳翔來居縣西南女几山下以力田爲業敬之自號女几野人年二十五始知讀書取白氏諷諌集自試一日便能背誦乃聚書環堵中讀之書至伊訓詩至河廣頗若有所省欲罷不能因更致力焉音義有不通者搜訪百至必通而後巳有一事闕十年者由是􅀶極羣書於三傳爲尤精至于内典亦稱該洽杜詩韓筆未常一日去其手作文有綱目不亂詩律深嚴而有自得之趣性野逸不修威儀貴人延客敬之麻衣草屨足脛赤露坦然於其閒劇談豪飲旁􅀂無人髙獻臣爲河南治中聞其名引爲上客及獻臣爲府尹所誣敬之亦􅀍訊掠幾預一網之禍自是人以敬之之名爲諱絶不與交不二三年日事大狼狽田五六十􅅿歳入不足一牛屢爲追胥所奪竟賣之以爲食衆雛嗷嗷張口待哺雅􅀒髙氣不能從俗俯仰迫以飢凍又不得不與丗接其枯槁憔悴流離頓踣往往見之于詩元光􅀄予與李欽叔在孟津敬之自女几來爲之留數日其行也欽叔爲設饌備極豐腆敬之放筯而嘆曰平生飽食有數毎見吾二弟必得羙食明日道路中又當與老飢相抗去矣㑹有一日辛老子僵仆柳泉韓城之閒以天地爲棺椁日月爲含穟狐狸亦可螻蟻亦可耳予二人爲之惻然敬之佳句極多如自怜心似魯連子人道靣如裴􅀳公萬事直須稱好好百年端欲付休休院靜寛留月䆫虚細度雲浪翻魚出浦花動鳥移枝之􅀋恨不能悉記耳木栖云吟䆫醉几秋風晚只許幽人箇裏知三郷光武廟云万山青遶一川斜到其處知爲工也予甞論敬之士之有所立必藉國家敎養父兄淵源師友講習三者備而後可喻如丗之羙婦多出於膏􅃾甲族薰醲含浸之下閭閻閒非無名色一旦作公夫人則舉歩羞澁曽大家婢不如其理然也故作新人材言敎育也獨學無友言講習也生長見聞言父兄也至於傳記所載西子乃苧蘿山采薪氏之女越君臣敎之容止七日而納之王遂能惑夫差傾吴國豈常理也哉敬之落落自拔耿耿自信百窮而不憫百辱而不沮任重道逺􅀂將死而後巳者三十年亦可謂難矣南渡以來詩學爲盛後生輩一弄筆墨岸然以風雅自名髙自摽置轉相販賣少遭指擿終死爲敵一時主文盟者又皆汎愛多可坐受愚弄不爲裁抑且以激昂張大之語從􅁷之至比爲曹劉沈謝者肩摩而踵接李杜而下不論也敬之業專而心通敢以是非白黒自任毎讀劉趙雷李張杜王麻諸人之詩必爲之探源委發凡例解絡脉審音節辨清濁權輕重片善不掩微纇必指如老吏断獄文峻網宻絲毫不相貸如衲僧得正法眼徴詰開示幾於截断衆流人有難之者則曰我雖不解書曉書莫如我故始則人怒之駡之中而疑之巳而信服之至論朋輩中有公鍳而無姑息者必以敬之爲稱首蓋不本於敎育不階於講習不出於父兄而卓然成就如此然則􅀂吾敬之者真特立之士哉劉景玄趙宜之雷希顔李欽叔張仲經杜仲梁王仲澤麻知㡬亂後兵去人歸日花開雪霽天川原荒宿草墟落動新煙困䑕鳴虚壁飢烏啄廢田似聞人語亂縣吏巳催錢贈趙仲常名憲宜之從弟詩有黄塵衮衮塵隨脚華髮蕭蕭老壓頭之句趙子年雖小論詩樂最􅀷秋風凡幾首冬日更多吟老大吾無力文章爾用心荒山松竹底莫厭數相㝷過崧山催老年光衮衮來好懷知欲向誰開箕山潁水春風裏呼起巢由共一柸隆德故宫蛇分鹿死巳無秦五十年來漢苑春問着流鸎無一語栁條依舊拂墻新同趙長水汎舟洛水秦山晚自澄􅀌洲煙樹緑相仍波揺朗月浮金鏡嶺隔華星断玉䋲但覺轉舩驚白鳥豈煩揮翣怒青蠅風塵浩蕩飄蓬裏愧似林宗陪李膺山寒山寒春靜早関門新月微光照短垣可恨暮雲欺落景却將殘靄助黃昏􅋘室􅋘室何妨似燕窠暮年終得返魚蓑壷中日月時常好枕上功名不足多往古來今真夜旦髙天厚地一􅆯羅鹿門幸有龐公樂牛角徒爲寗戚歌亂後還三首兵戈爲客苦思郷春暮還郷却自傷典籍散亡山閣冷松筠憔悴野園荒鸎銜晩色啼􅀷樹燕掠春隂入短墻鄰里也知歸自逺競將言語慰凄凉亂後還家春事空樹頭無處覔殘紅棠梨妥雪霑新雨楊柳飃綿颺晚風談􅀏取官驚小子艱難爲客愧衰翁殘年得見休兵了收拾閑身守桂叢春來漂泊心情减老去艱危氣力微芳草際天愁思逺干戈滿地故人稀懷金躍馬時何有問舎求田事巳違糲食弊衣􅂓自足白頭甘息漢隂機題㳺彦明林園三首先生未老厭儒冠築屋栽籬守歳寒經史日長常滿桉魚蝦溪近得供盤幽花入室無多種瘦竹関情只數竿蕭洒逺辤車馬跡求官何必近長安城郭繁華断往還林園幽􅞔養髙閑花伭煖蘂斜窺水竹亞晴梢巧避山尊俎歳時君得意風埃南北我何顔丹房藥鏡㳺心乆不惜哀矜洗病孱不礙遥看冷翠微儘敎叢竹映䆫扉籬根傍水知魚樂屋角隣花鳥自歸濁酒野芹安巳乆華軒髙馬到從稀人間回首皆堪鄙羡汝幽棲得所依贈劉庵主劉遼貴族蚤薄軒裳貴髙㝷綺皓蹤一囊閭里藥六尺水雲笻午枕眠芳景晴簷望逺峯柴門常不掩應得野夫從函􅀜􅀟峯髙聳大河旁自古函􅀜一􅀾􅂣紫氣乆無傳道叟黃塵那有弃繻郎煙迷短草秋還綠露浥寒花晚更香共􅀃河山雄百二不堪屈指筭興亡贈趙宜之二首夫子今詞伯胡爲逺帝京靑雲無轍迹白髮有柴荆􅀑戲多年病人髙四海名麟經方有缺無惜継丘明轉徙家無地逢迎客有樽光隂連病枕天地一愚軒霜雪靑松古風塵白璧温從渠投􅂩者衮衮向金門送􅁉之往許州酒間有請予歌渭城煙雨者因及之白酒留分袂靑燈約對床言詩真漫許知巳重難忘爽氣虚韓岳文星照許昌休歌渭城柳衰老易悲傷􅀉􅁉之靑雲一别阮家郎甚欲題詩逺􅀉將好句眼前常蹉過佳人心上不曽忘誰家秋月茅亭底何處春風錦瑟旁昌谷煙霞乆寂寞歡㳺還肯到三郷山園歳暮山園懶再行蘭衰菊悴頗􅀜情靑靑多少無名草爭向残陽暖處生李講議汾汾字長源平􅀳人系出鴈門曠達不羈好以竒節自許避亂入􅀜京兆尹子容愛其才招致門下留二年去之涇州謁張公信甫一見即以上客禮之自是㳺道日廣然關中無一人敢與相軒輊者元光末用薦書得從事史館舊例史院有監修宰相爲之同修翰長至直學士兼之編修官專纂述之事若從事則職名謂之書冩特抄書小史耳凡編修官得日録分受之纂述旣定以藁授從事從事録㓗本呈翰長平居無事則翰長及從事或列坐飲酒賦詩一預史事則有官長􅁺属之别長源素髙亢不肯一丗乃今以斗食故人以府史畜之殊不自􅂓髙張諸人率以新進入館史家凡例或未能盡知就其所長且不滿長源一􅀏故刋修之際長源在旁則蓄縮慘沮握筆不能下長源正􅁭危坐讀太史公左丘明一篇或數百言音吐洪暢旁􅀂無人旣畢顧四坐漫爲一語云看秉筆諸人積不平而雷李尤所切齒乃以嫚罵官長訟干有司然時論亦有不直雷李者故證左相半踰年不能决右丞師公以傷風化爲嫌遣東曹􅁺置酒和解之不得巳乃罷㝷入􅀜明年駈數馬來京師日以馬價佐歡道逢怨家則畫地大數而去又明年恒山公仙在鄧之西山長源往􅀃之署行尚書省講議官旣而恒山與參知政事思烈相異同頗謀自安懼長源言論欲除之遁之泌陽竟爲所害長源孝友廉介過人者甚多寧寒餓而死終不作寒乞聲向人人亦以此愛之平生以詩爲專門之學其所得爲尤多如洛陽才子懷三䇿長樂鍾聲又一年清鏡功名兩行泪浮雲親舊一囊錢煙波蒼蒼孟津渡旌旗歷歷河陽城長河不洗中原恨趙括元非上將才三輔樓臺失歸燕上林花木怨啼䳌空餘一掬傷時淚暗墮昭陵石馬前同輩作七言詩者皆不及也辛卯秋遇予襄城盃酒間誦􅀜中往來詩十數首道其流離丗故妻子彫喪道塗萬里奔走狼狽之意雖辤旨危苦而耿耿自信者故在鬱鬱不平者不能揜淸壯磊落有幽并豪俠歌謡慷􅁣之氣此詩兵火中散亡今就其少作予所能記憶者録之陜州黃河城下水澄澄送别秋風似洞庭李白形骸雖放浪并州豪傑未凋零十年道路雙蓬􅁂萬里乾坤一草亭八月崤陵霜樹老傷心休折柳條青州北州北光風艶綺羅南來扈從北人多棃園法曲懷奴舞月窟新聲倩女歌紫禁衣冠出金馬青樓阡陌瞰銅駞薄㳺却憶開元日常逐春風醉兩坡再過長安細柳斜連長樂坡故宫今日重經過一時人物存公論萬里雲山入浩歌白髮歸來幾人在青門依舊少年多自怜季子貂裘敝辛苦燈前讀揣摩汴梁雜詩四首天津橋上晩凉天鬱鬱皇州動紫煙長樂觚稜青似染建章馳道直于􅃶犬牙磐石三千國聖子神孫億萬年一䇿治安經濟了漢庭誰識賈生賢琪樹明霞五鳳樓夷門自古帝王州衣冠繁㑹文昌府旌㦸森羅部曲侯美酒名謳陳廣座凝笳咽鼓送華輈秦川王粲何爲者憔悴囂塵坐白頭樓外風煙隔紫垣樓頭客子動歸魂飄蕭蓬􅁂驚秋色狼藉麻衣涴酒痕天塹波光揺落日太行山色照中原誰知滄海横流意獨􅀝牛車哭孝孫寥落関山對月明客䆫遥夜夢魂驚二年歧下音書絶八月河南風露清苒苒暮愁生草色迢迢秋思入􅆉聲誰知廣武英雄嘆老却窮途阮歩兵上清宫三首憶昔秋風從茂陵詞臣忝預漢公卿瑶池宴罷西王母翠輦歸來北斗城石馬嘶殘人事改刼灰飛盡海山平唯餘太一池邊月伴我驂鸞上玉京蒼梧雲氣赤城霞綿絡鈞天帝子家仙掌髙承九霄露霓旌遥駐五雲車昆明火刼驚人丗瀛海風濤撼客槎醉裏忽逢王子􅀳玉笙吹上碧桃花千劫塵縁謝吏曹道山仙闕事遊遨樓臺縹緲滄溟闊宫殿森羅紫極髙幾代雲孫接仙李千年王母醉蟠桃詩成便欲還山去猶待君王賜錦􅂁避亂陳倉南山回望三秦追懷淮隂侯信漫賦長句慿髙四顧戰塵昏鶉野山川自吐吞渭水波濤喧隴阪散関形􅀔軋興元旌旗日落黃雲戍弓劒霜寒白草原一飯悠悠從漂母誰怜國士未酬恩雪中過虎牢蕭蕭行李戞弓刀踏雪行人過虎牢廣武山川哀阮籍黃河􅁭帶控成皐身經戎馬心逾壯天入風霜氣更豪横槊賦詩男子事征西誰爲謝諸曹清明鳴珂振轂滿重城春日綿綿老燕鸎人在碧雞坊外住澹隨流水過清明下弟學劒攻書謾自竒回頭三十六年非春風萬里衡門下依舊并州一布衣磻溪封侯輸與曲如鉤冷坐磻溪到白頭老婦厨中莫彈鋏白魚留待躍王舟感寓述史雜詩五十首并引正大庚寅予行年三十有九獻賦明廷爲有司所病遂有不遇時之嘆皁衣斗食從事史館以素非所好愈鬰鬰不得志臥病中僻居蕭條盡日無來人緬維先哲凡所以進退出處之際窮達榮辱之分立身行道建功立事関諸人事者竊有所感焉於是始自騷人屈平以來下逮漢􅀳隨唐諸公終之以逺祖鴈門武皇作爲述史詩五十首以自慰其羈旅流落之懷述近代則恐渉時事故断自唐以下不論嗚呼三百篇大抵皆聖賢感憤之所爲作也余以愚忠謬信􅀗譏于斯丗乆矣非敢示諸作者庶幾後丗有楊子雲者出或能亮予之宿心是歳秋七月旣望并州人李汾引􅂫客卿秦游􅀃諸侯􅀗上卿賈人唇舌事縱撗可怜一丗癡兒女爭羡腰間六印榮韓淮隂信杖劒淮隂去復還舉頭西望識龍顔堂堂竟握眞王印未害男兒辱胯閒叔孫奉常通秦時博士魯諸生漏網驪山百丈阬邂逅劉郎習綿蕝便能弹壓漢公卿馬中令周脚踏長安陌上塵布衣西上欲誰親君王不省常何䇿憔悴新豐一旅人逺祖鴈門武皇死心唐室正諸侯鐵馬南來隘九州當日三垂岡上意諸孫空抱腐儒羞擬張水部行路難洛陽行人心欲折半年西州信音絶弹箏峽口兵塵髙半夜心懸隴山月君不見嗷嗷失羣鳥泪盡眼流血潼関晝閉漢使稀安得慰我生離别雲溪曉泛圖曉景淡明月落影潭西丘晴川挂煙樹光拂雲河流楓林入行色関山生白頭羡羡畫中人憶我秦川㳺君帆􅄅何許儻下滄浪洲滄浪吾有約􅀉謝同盟鷗古月一篇爲􅁉之賦古月天不收敵君三萬秋天孫弄明鏡光湧雲間流憶昔放逐江南州金陵女兒歌櫂謳草褁烏紗巾散着紫綺裘酒酣把玉笛直欲捫參歷井􅀐斗牛醉中呼兒揺􅀟舟吾欲乗流下石頭起來茫茫視八極萬里只有元丹丘丹丘子㳺人間風塵何爲往復還玉華山人近招我九日朝帝蒼梧山西歸擾擾王城足是非不堪多病决然歸只因有口談時事幾􅀍無心觸禍機日暮豺狼當路立天寒鵰鶚傍人飛終南山色明如畫何限春風笋蕨肥避亂西山作三月都門晝不開兵塵一夕捲風回也知周室三川在誰復秦庭七日哀鴉啄腥風下陽翟草銜􅁈血上琴臺夷門一把平安火定逐恒山􅃸􅀐來李户部獻甫獻甫字欽用欽叔從弟也兄欽止欽􅀂皆中朝名勝家故將種而同時四進士人門之秀照映一時欽用博通書傳於左氏及地理之學爲精爲人有幹局心所到則絶人逺甚故時人有精神滿腹之目歷咸陽簿辟行臺􅁺属正大初夏人請和朝廷以馮子駿往議欽用預行夏使有口辯馮善人無以折之往復之際至以歳幣爲言欽用不能平從旁進曰夏國與敝邑和好百年今雖易君臣之名而爲兄弟之國使兄而輸幣寧有據耶曰兄弟且不論宋日曽與吾家二十五萬疋典故具在君獨不知耶金朝必欲修舊好非此例不可欽用作色曰使者尚忍言耶宋以歳幣餌君家而賜之姓岸然以君父自居夏國君臣無一悟者誠謂使者當以爲諱乃今公言之使者果能主此議以從賜姓之例敝邑雖歳􅂢五十萬某請以身任之夏使語塞和議乃定使還朝廷録其功授慶陽緫帥府經歷官㝷辟長安令京兆行臺所在供須之繁急于星火欽用所以處之者常若有餘縣民頼之以安入爲尚書省􅁺壬辰之兵奏充行六部貟外郎守備之䇿時相􅀝任之以功遷鎮南軍節度副使兼右警廵使車駕東廵死于蔡州之難時年四十所著詩書文號天倪集者留京師欽用死其家亦破非同年華隂王元禮購得之幾有人琴俱亡之恨然則文字言語之傳與否亦有數存於其間􅁘夏夜銀潢淡淡没踈星一陣凉從􅀨後生仰看浮雲成獨卧數圍蛛網絡中庭九龍池春望五年外地看清明袖手伭回過客亭謝絮楚萍無定着春光如我更飄零興慶池書所見短短蒲菰刺水青翠萍開處鑑波明􅀞舩轉過垂楊外水靣風來聞樂聲題黃華幽居圖層層佛屋貼山腰山下幽居勝午橋物外人家無稅役閑中生理足漁樵鴈踰逺障凌虚逈人與髙秋共寂寥何處人閒景如此便應歸隱不須招長安行長安道無人行黄塵不起生榛荆髙山有峯不復險大河有浪亦巳平向來百二秦之形秪今百二秦之名我聞人固物乃固人不爲力物乃傾將軍誓守不誓戰戰士避死不避生殺人飽厭敵自去長安有道誰當行黃塵漫漫愁殺人但見蔽野雞羣鳴河東㳺子淚如雨眼花落日迷秦城長安道無人行長安城中若爲情别春辝東皇按轡來何遟人閒二月才芳菲六十日春能幾時不如意事常相隨一聲啼鴂花片飛把酒却與春别離春緩歸聽我歌滔滔歳月如流波貴憂孰與賤樂多吾寧不欲列華鼎馳鳴珂香屏􅀝妓薦綺羅人生賦分有定在誰能買愁費天和長安市上酒如海跨驢徑上烟脂坡酒酣醉舞􅀟婆娑春自來去如予何秋風怨踈星耿耿明天河夜凉翠幕生微波碧梧委葉傅金井一夕秋風將奈何春風令人和秋風感人悲妾愁自與秋風期秋風爭管人别離燈灺垂紅粉泥暗􅀛甲屏風雲影亂絡緯弔月啼不断蓮漏壓荷夜未半凉飃蕭蕭入踈竹枕底寒聲碎瓊玉敲愁撼睡睡不明花露盈盈泫魚目秋風且莫吹念妾守空閨嫁狗隨走雞隨飛九死莫作蕩子妻郎薄倖妾薄命花自無言絮無定碧雲暮合郎未歸幾度粧成掩明鏡河上之役三首河堤一决豈天窮失在當年固白公誰與麻岡開故道蹔敎版籍見山東新築河堤要䇿勲萬人採浄北壖薪青青好借曹州柳舊是中原一叚春曹䧟没巳乆萬夫卷􅁟障橫流􅀒土成山水未收明日落成真盛事誰能作賦擬黄樓圍城碧樹蒼煙起暮雲長安陌上断行人百年王氣餘飛觀萬里神州隔戰塵身與􅀌雲向􅀟闕愁隨落日到咸秦山河大地分明在莫爲時危苦愴神驟雨龍戰雲鏖擁日囚鞭驅雷電走蛟虬望中雨脚横天落觸處湍聲卷地流梁苑樓臺失炎暑漢家城闕動髙秋􅀂爲借得天瓢去倒㵼明河淨九州資聖閣登眺同麻杜諸人賦髙閣凌雲眼界寛野煙碧樹有無閒天邊􅀌鳥飛不盡陌上行人殊未還魏國幾回時事改汴堤千古夕陽閑愁來重􅀝欄干望崧少西頭是故山南冠五人司馬侍郎朴朴字文季温公之猶子宋兵部侍郎以奉使見留居于祁陽授以官託疾不拜遨逰王公之門以壽終文季工書翰有􅀳人筆意興陵萬機之暇甞購其遺墨學之有雪霽同韓公度登圎福寺閣和李効之詩今略載于此積雪日出杲雪飛梅巳殘朋㳺要及時閣鄰有遐觀乗此蕪穢平快覧天宇寛霽色混銀界矌望連江干山如白毫相滉溢清楊端一氣轉浩􅄅萬里皆瀰漫優哉賦梁苑想像排廣寒此下不可讀當俟善本考之無餘居士齋壁有沈傳師㳺道山岳麓詩石刻穆仲等和之因亦次韻湘西勝景豈易論群山騰闖萬馬奔鶴泉一麓騫鵬噣松風十里藏祗園當時侍御偶題冩筆力孰敢爭雄尊東京少年妙詞藻南陽舊族齊隂樊天心月脇出竒語使我展讀忘朝昏差差戈劒隠一敵落落旗鼓嚴千屯無餘居士厲幽志細研六藝方專門凍骭嬌兒慣腸莧啼飢瘦婦餘淚痕帷君德義允相愜毎窮道妙角與根他人勸酒驚逐魂二子頻酌勤空樽醉中詩成􅄅江海風外幡影徒飛翻卷藏篋笥巳戢戢風生􅁭䄂何軒軒嗟乎我亦有餘腐􅋘哉羊政囚華元􅅬奉使荗實荗實字秀頴姑􅂫人初名祼徽宗改賜焉以太學正兼明堂司令與樞宻路允迪翰林修撰宋彦通奉使割三鎭太原㝷奉宻詔據城不下國相怒囚使人於雲中欽宗北遷秀頴謁見涕泣請從行主者不之許放允迪彦通南歸荗實留鴈門與兄宗正丞福字伯壽淮南發運使䄎共居乆之家人至自汴梁秀頴往來并代之閒布衣終身臨終令黃幡褁尸而葬仍大刻九字云宋使者東陽􅅬荗實墓士大夫哀其忠爲之起墳於鴈門歳時致􅀕好問兒時先大夫敎誦秀頴臨終詩然亦僅能記末章數語而巳庚子春自山東還郷里值郷先生鴈門李鍾秀挺求秀頴詩文鍾秀云喪亂以來家所藏書焚蕩都盡避兵山中民家偶於破箱中得秀頴詩一編帋巳敗爛前序秀頴自作可辨者百餘字大略言能安於死生之分而不能忘感槩不平之氣又曰蘇属國牧羊海上而五言之作自此始予敢援以爲例後敘是筆吏林泉野老彦古彦古不著姓年七十八手録三􅅬始末號東陽􅅬秀頴鳳山思逺記者詩數百首可讀者什六七臨終一詩缺三五字而巳非筆吏此集則秀頴之事無以見於丗予意先生名節凛然不愧古人其文字言語宜有神物護持雖埋没之乆而光明發見决有不可揜焉者因備述于此亦使彦古之名託之而不腐云椅字恐悮當作祹見南申髙濟叔碑哀隆德守臣張確確浮休張舜民之弟甞爲烏延帥幕獨不廷謁童貫作詩吊之睢陽萬古一張廵忠義傳家有丗臣顔子伏膺當入室潘郎望拜肯同塵圍城巳䧟天猶晦仗劒臨危氣益振餘子鄰􅀖盡曹李偷生端作九泉人天寜節有感節臨重十慶天寜古殿焚香祝帝齡身在北方金佛刹眼看南極老人星千官花覆常陪燕萬里雲遥阻在廷松栢滿山􅂓獻壽小臣􅀌操亦青青汴梁故老云徽宗本以五月五日生以俗忌移之十月十日故此詩有重十之句雨後􅂼盤可喜偶成過雨盤􅂼日日新從今休嘆􅁃郎貧寒虀安取咄嗟辦火食不憂生死隣野莧何施雖可鄙美芹欲獻去無因干戈萬里風塵晦慙媿平生肉食人五日節物驚心動逺思薰風又見浴蘭時空㝷好句書紈扇無復佳人繫綵絲酒注菖蒲唯欲醉筒包菰􅁰不勝悲明年此日當何處風裏􅀌蓬自不知喜雨旱暵雨霑渥豐穰都不疑商羊應屢舞布􅂖強多知龍見寜非數雲行自有時當年班夏令曽得近丹墀偶成纎雲卷盡見秋容古木交隂一掃空雪壓羣山曉來雨葉侵缺甃幾番風欲歸未得人將老屢送還來􅀑亦窮賴得子卿佳傳在整冠時讀慰飄蓬立春東皇布政物皆春山色禽聲便可人滿谷和風消積雪半䆫晴日動㳺塵宫花揷㡌枝枝秀菜甲堆槃種種新拘窘經時成土俗􅂓從一醉適天真臨終詩并序厶奉使亡狀不復反父母之􅀖猶當請従主行以全臣節或怒而與之死幸以所杖節幡褁其尸及有􅂐字九爲刋之石埋於臺山寺下不必封樹蓋昔年大病夢遊清凉境界覺而失病所在恐于此有縁如死窮徼則乞骸骨歸悉如前禱預作哀詞幾于不逹方之淵明則不可亦庶幾少㳺之遺風也虀塩老書生謬列王都官索米了無􅀘從事敢辤難殊隣復盟好杖節來榆関城守乆不下川涂望漫漫儉軰果不惜一往何當還牧羊困􅂫武假道拘張騫流離念窘束坐閱四序遷同來悉言歸我獨留塞垣形影自相吊國破家亦殘呼天竟不聞痛甚傷肺肝相逢老兄弟悼歎安得驩波瀾卷大厦一木難求安就不違我心渠不汗我顔昔燕破齊王群臣望風犇王蠋猶守節燕人有甘言經首自絶脰感槩今昔聞未甞食齊禄徒以丗爲民况我禄數丗一死何足論逺或死江海近或死朝昏歛我不須衣褁尸以黃幡題作宋臣墓􅂐字當深刋我室尚少艾兒女皆童頑四海無置錐飄流倍悲酸誰當給衣食使不厄飢寒歳時一酹我猶足慰我魂我魂亦悠悠異郷􅀉沉􅁈它時風雨夜草木號空山通理何先生宏中宏中字定逺先丗居鴈門叔祖青出武弁任忻州兵馬使因家焉祖行宣西逰遇仙不返行宣之子子竒子霖政和中中武舉髙科子竒秉義郎武州宣寧尉子霖忠翊郎守豐州安豐砦皆没王事定逺子竒子也㓜倜儻儀觀秀整雅以竒節自許宣和末方賊擾江浙定逺以太學武舉進士陳破賊三䇿徽宗褒諭謂非近日言事者所可比巳而破賊如定逺䇿遂知名宣和元年集英殿試䇿中弟二調滑州韋城尉汴京􅀍圍州郡多避走獨韋不下兵退統制武漢英奏辟欽宗御札召赴軍前以路塞不果因請兵真定宣撫司時副帥种師中兵巳潰宣撫司檄定逺副漢英守銀冶路旣而太原破西路無完城定逺等提兵竝山而東將赴援京師俄漢英戰死定逺收合散亡立山棚七十四所號令所及千里而逺艱食數月人不敢相食詔以爲武節大夫河東河北兩路統制接應使是後國朝兵日盛所守唯銀冶一城而巳帥府募人生致定逺天㑹五年二月粮盡被擒大帥昭刺憐其忠解縳授以官定逺投牒於地曰我常以此物誘人出死力若軰乃欲以此嚇我􅁘帥嘉其不降屈又問欲還郷否定逺謀南奔陽以願歸爲言㑹監送使臣有先與定逺相攻刼者愬之囚西京府君廟二年帥一日召之授以官又不拜使之充軍亦不從取家属填城黃龍府益偃蹇不行帥怒裭衣欲斬之定逺欣然就戮曰得死所矣擁之行巳數十歩帥終不忍召還問爾授官不願充軍又不行填城又不行斬又不懼畢竟欲如何定逺徐曰生死在公奚問爲帥怒解繫之西京獄得州人保任者數十族乃放歸請爲黃冠時神霄宫廢道士舊以徽宗爲東華君將毀其像定逺爲起紫微殿遷像事之年六十三正隆四年病殁自號通理先生所著成真通理二集藏于家州將傅慎微幾先贈詩云故人何定逺造物不虚生骨骼稜稜痩詩篇字字清丗皆尊道藝我獨見忠誠尊酒分携後何時蓋復傾其餘與朱少章輩唱酬甚多皆爲所推重載之墓碣之隂述懷馬革盛尸毎恨遟西山餓踣更何辤姓名不到中興曆付與皇天后土知醉軒姚先生孝錫孝錫字仲純豐縣人政和四年登科調代州兵曹國朝兵入鴈門州將議以城降官属恇怯投死無所仲純投床大鼾略不以爲意帥府就注五臺簿未幾移疾去因家五臺善治生亭榭塲圃富扵逰觀賔客日盈其門州境歳飢出家所藏粟萬石振貧乏多所全濟郷人德之中年之後以家事付諸子放浪山水閒詩酒自娱醉軒其自號也資稟簡重喜怒不形于色弃官時年二十九至八十三乃終名士大夫爲詩以吊者數十人先生長于尺牘所著雞肋集喪亂以來止存律詩五卷而巳今略載於此次冠卿韻云節物後先南北異人情冷暖古今同次趙獻之韻云紅纈退風花着子緑鍼浮水稻抽秧溪墅早春云乆客交情諳冷暖衰年病骨識隂晴春日和德充云煙染緑絲迷别浦􅀨催紅糝綴長條新詩云愁邊日晷偏疑短夢裏江郷未當歸盤無兼味慙留客夢厭多岐不到郷賦雪云酒敵餘威翻索寞詩含幽思倍清新􅀨云岸漲魚吹沫山空石轉雷雪云舞風初學絮帶雨不成花峯山寺云谷虚繁地􅄜境寂散天香雲生古木千章秀山抱晴川一掌平懷士㑹云詩忙踈酒醆俸薄减厨煙感懷云玄晏暮年常抱病子山終日苦思歸古詩尤有髙趣恨不復見之矣挽詞今載丁此掌飲令胥持國云山東夫子老河東誰與先生嗅味同早歳遽辭名宦裏百年常樂聖賢中醉軒風月千秋恨蝸室樽罍一夢空白玉樓成人不見空餘郷淚託東風司經劉迎云百年陸變蒼茫曉向山林得老蒼􅀌幹鬱生陳栢樹故基巋立魯靈光謀生有道田園樂閱丗無心壽命長何日車聲過通德拜公一炷影前香髙平李仲略云蚤歳才猷著﨑嶇歩丗艱非嫌食周粟甘學抱呉關髙義追東漢移文謝北山􅀌風激貪懦凛凛莫容攀平水毛麾云蓋丗清芬五十年直疑湖海水雲仙不矜江夏無􅀟譽便造南華弟一篇松菊就荒堪􅀏晚蓴鱸託興果誰賢佳城鬰鬰髙名在應與臺山萬古傳西京都轉運使丹元子田彦臯云淋浪風月三千首㳺戲塵凡八十秋三徑尚存元亮菊五湖空負子皮舟王元老云夫子人之傑魁終道最純郷閭連沛邑族系出虞賔清節冰壷瑩􅀌標玉樹新妙齡探桂窟雅志傲蒲輪事業傳衣鉢風流表縉紳斗南唯此老月旦復誰人忍死哭亡社偷安􅀏具臣斯文雖未喪吾道竟難伸彭澤不書宋東陵無􅀒􅁗直從強徤日􅀵得自由身把臂言猶在迴頭跡巳陳發書占賈鵩絶筆惑商麟去矣􅀐箕尾嗟哉厄巳辰終天従此别窮壤向誰親墮椁逢王果留燈待沈彬彭湯俱逝水丘跖共荒榛書帶縁新壠笛聲起舊隣絶絃􅀟墮淚撫劒一傷神冢樹悲長夜山花作好春􅀛趺平木杪誰爲冩光塵丞旨党丗傑云望西山以馳吊􅀆其下維德人抱明月以螭盤􅀆寜終屈而不伸天昬廓以西闢􅀆群飛紛其上翥將搏拏以並征􅀆惜衝風之落羽蘭爲佩􅀆桂爲帷誰招余者􅀆余從與歸青雲豈難振跡􅀆顧犍結之不素玄豹自媚其文􅀆亦何嫌于隱霧詩書與友􅀆琴尊與游適意自安􅀆樂閒自休出吾餘以研桑􅀆猶足以比素封之侯惟清閒爲秘福􅀆非有力能兼取雖神仙猶可畏􅀆曽莫樂于下土數與數相乗除􅀆常此奪而彼與陋巖栖之下槩􅀆心實往而跡藏出非徼而處非隱􅀆吾獨蹈古人之所常隨時委順以終老􅀆噫先生爲不士睡起生涯甘分􅀉耕桑山色圍門水遶墻困病乆懲耽酒癖愛閑猶有和詩忙簷冰滴砌春猶冷野馬浮川日漸長舊事老年多記憶故園歸夢正悠颺枊溪别墅安車隨意飽甘肥晩食徐行理亦齊山市日髙人未集柴門客至鳥先啼溪橋散望携笻渡野寺牽吟信筆題容膝易安􅂓自適瓮天閑看舞醯雞歳晩懷二弟少易成歡老易傷壯逰垂白未還郷煙塵無復音書到魂夢猶疲道路長爆竹又驚新薦歳屠蘓空憶舊傳觴年年此日遥相憶鴻鴈何時續断行睡起睡起日侵牖開軒遥見山曉風吹臘盡芳草惹春還煙暖鸎遷谷雲低鴈渡関衰年人事减遇酒得開顔次李平子登臺有感韻落日􅀌雲帶逺岡戍樓煙瘴舊邊􅂣疲民卒歳方懷土逺客慿髙自憶郷漢使一朝延四皓秦詩千古吊三良行藏此意無人解􅂓借青山送酒觴九日題峰山不須歌吹上叢臺千里晴川入座來丗事難慿休挂口生涯見在且銜盃無情趂暖花先老有信迎寒鴈巳迴遥想故園親種菊霜枝露蘂向誰開次韻王無競見􅀉客懐重􅀝仲宣樓白草黃雲塞上秋山色不隨塵丗改水聲還抱故城流􅂩中畏景那堪玩鏡裏衰顔秪自羞多愧詩人苦相憶逺傳佳句吊清愁閑居無客訪衰殘柴門盡日関躭書真是癖惜酒近成慳苔徑行搜句茅簷臥看山却嫌明鏡裏偏照􅁂毛班和成冠卿見􅀉别恨頻添􅁂雪􅀷百年懷抱鬰沉沉摽名不挂金銀牓渉丗空堅鐵石心俗物何勞供一醉殘僧正欲伴􅀌吟朱絃三弄虚簷寂唯有清風是賞音次韻秋興老畏年光速愁添旅夢多西風著梧竹歸思入煙波夜永慿詩遣顔衰得酒和故溪千樹柳誰復曬漁蓑感白髮彈鋏慿誰聽客歌震雷那復化魚梭梳頭白雪驚新有障眼玄花比舊多郷問阻兵猶断絶覉懷憑酒暫消磨不須更問今朝客門外元無雀可羅曉霽一夜雲峯卷迅雷殘紅狼藉􅀧蒼苔鸎聲豈解留春住燕語虚勞喚夢迴愁寂頓疑詩思减衰殘偏感歳華催柳溪魚鳥應相識乗興無嫌日日來重九偶成天邊今日又重陽隴樹紅飛鴈信霜且挿茱莄慰衰􅁂莫將詩句撓回腸歌勤皓齒人俱醉舞戀晴暉蝶也忙來日預期扶宿酒未應籬菊减秋香溪橋早春輕黃未染柳梢匀連日溪風卷塞塵乍暖乍寒花信晚相呼相應鳥聲頻少勤謾挾經綸䇿老懶空餘病患身追憶故園桃李樹年年紅紫爲誰新東軒琴示兒子沂古人無復見但有東軒琴一鼔髙山操因窺古人心正聲乆沉埋俚耳喧哇􅁋正可自怡恱不須求賞音花前獨酌二絶句老將花酒作知音起就花前酒自斟莫便興來先酩酊却妨真賞廢搜吟移得名花手自栽花知不爲老人開興來誰是樽前客唯有提壷送酒盃題柳溪别墅雨霽風和不動塵柳邊携酒賞晴春頻來溪鳥渾相識渡水穿花不避人芍薬緑蕚披風瘦紅苞浥露肥只愁春夢断化作彩雲飛次韻李相公偶成簾鳥喚歸夢竹風追夕凉感時空有淚却老分無方流水依山白􅀌雲帶日黃無人共樽酒散髮卧蔾床村居偶成靜愛柴門野興幽杖蔾徐歩到岩丘深林有獸爲先噪廢圃無人泉自流土􅇤稅租隨力辦年豐禾􅁰過時收客來不慮無供給白酒黃雞亦易求用峯山舊韻舊歩西風寺窮幽未覺賖松根纒石痩雲磴出岩斜思爽餘三唱詩成自一家空餘幾兩屐不踏渡溪槎春水上堤沙春晴散望賖衰年花近眼久客夢還家映日􅀌鴻没迎風双燕斜平生江海意早晩送浮槎題佛先寺臧􅂖雖殊竟兩亡􅀝欄終日念行藏巳忻境寂洗塵慮更覺心清聞妙香􅀌鳥帶煙來逺樹断雲收􅀨下斜陽人間未卜蝸牛舎逺目橫秋益自傷芭蕉鳳翅揺寒碧虚庭暑不侵何因有恨事常抱未舒心蜀葵傾心知向日布葉解承隂空側黃金盞誰人與對斟次韻公才對菊見懷髮蓬新感二毛侵尚阻清樽對菊斟乆擬芝蘭同臭味莫疑魚鳥自髙􅀷食貧豈復甘秦灸客病空懷奏楚音挂席無由上牛斗漫慿流水送歸心􅀉田朝散善輔粉署標名舊山城識靣新青雲摧勁翮空谷滯幽人丗路謀身拙心田育德醇乆要知可􅁲傾蓋巳情親春日書懷雲散交情薄棊飜丗態新山容猶帶臘鳥語巳回春節物驚心遽丘園入夢頻東風如解語端􅀏未歸人春日溪橋留戀春光慰病顔無情風雨卷春還隂隂宻緑籠溪暗細細踈紅􅀧徑斑老去益怜詩思澁懽來聊破酒腸慳不嫌門外無車轍得遂衰慵一味閒登樓有懷老愧凭欄目力昏百年懷抱向誰論晴空鴈起雲邊塞夕照人歸郭外村因記昔逰驚迅晷暫將離恨付清樽誰人肯似邊居士逺駕朱輪過雀門題􅅬奉使祠本期􅂫鄭共􅀭鑣不意芝蘭失後凋遺老秖今猶涕泪後生無復識風標西陘鴈度霜前塞滹水撨爭日暮橋追想生平英偉魄凌雲一􅀏豈能招朱奉使弁弁字少章宋吉州團練使天㑹六年以通問見留命以官託目疾固辤猝然以錐刺之而不爲瞬用是得歸凡居雲朔二十年自號觀如居士有曲洧風月堂詩話行於丗􅂫子翼送黃精酒仙經何物堪却老較功無如太陽草龍銜雞銜名雖異菟公羊公事可考􅂫君真是神仙裔橘井隂功貫穹昊雲笈書成數萬言銀関珠宫用心早獨知此物有竒効福地名山爲儲寳不惮林泉新斸掘斥去杵􅍫謝飾擣况從髙士論麹糜更課公田收秫稻一朝靈液浮瓮盎三冬浩氣生􅁭抱且欣軟飽得澆腸漫􅀃逆流工􅀘腦眼碧那憂散黒花髮白故應還翠葆賈傳只嫌松醥􅋘劉墮敢誇桑落好直須五斗論解酲寧待三柸乃通道誰知萬里落旄人亦許匏尊自傾倒爲君喚迴雪窖春八載覊愁供一掃曼倩宜分此日桃安期莫詫他年棗何煩更採石斛花巳覺容顔不枯槁根連石室喜入夢句擬桐溪媿摛藻平生我亦愛書扎朱髓緑腸勤􅊥討幸君汲引成此志鶴駕駸駸望仙島吞腥啄腐非夙心歳晩兹言良可保初春以蔓菁作虀因憶往年避難大隗山采蘋澗中爲虀虀成汁爲粉紅色而香美特異乃信鄭人所言爲不誣矣今食新虀因成長韻藏􅂼飽三冬媚盤無靃靡陳虀解束􅅞冰雹散刀几春畦蕪菁苗入眼漸可喜青黃含風露採摘從此始持歸作新虀一飽競鮮美芬香溢肺肝甘脆響牙齒捫腹幽䆫下芻豢詎能比憶昔避難􅀄竄身重嵓裏雲煙昬具茨老稚且棲止燕兵大捜索焚蕩石牛底脫命擉虎山野哭紛四起暮投山前店茅棟例燒毀潜伏窟室中衣敝不蓋體妻孥坐相對生意薄於紙晨朝行澗中采芹澗邊洗鄭人誇此虀他菜非所擬氤氲投瓦盎觸鼻似蘭芷一杯紅粉羮析酲勝仙醴乃知野人獻涼薄未宜鄙今來滯殊郷白首家萬里猶能對葷羶咀嚼出宫徴回思十年夢爭奪殊未巳飽食但謀身吾顙良有泚北人以松皮爲菜予初不知味虞侍郎分餉一小把因飯素授厨人與薗􅂼雜進珎美可喜因作一詩吾老似出家晚悟愧根鈍滋旨却羶葷禅蛻要親近偉哉十八公兹道亦精進舎身奉刀几割體絶嗔恨鱗皴老龍皮鳴齒溢芳潤流膏爲伏龜千歳未須問便堪奴笋蕨詎肯友芝􅌲跏趺得一飽萬事皆可擯侍郎文懿後落落衆推俊澹然丗味薄内典得所信香厨留淨供頻食不言頓晏然黙不語草木雷音震得法於此公骨髓傳心印應怜持節人餉此爲問訊欲將無上味爲我洗塵坌食之不敢餘感激在方寸予以年事漸髙氣海不能熟生煖冷旅中又無藥物遂用火攻之䇿灼艾凡二百壯吟呻之際得詩二十韻不作漳濵卧年侵血氣衰據鞍思少壯􅄃鏡嘆清羸有病方求艾無營莫問蓍心知出下䇿理勝遇中醫陽燧神逾速銅仙術盡施論功鄙炮製取穴辨毫􅁵火帝恩光異炎官績用竒書螢比差似珠蟻迫方知忖物嗟炮鱉觀形􅀏灼􅀛煙微初炙手氣烈漸鑚皮閉目書徒展支頭枕屢移發狂還自哂賈勇僅能支宋鷁追風日吴牛喘月時忠言勞緩頰善謔爲開眉服氣工夫逺燒丹歳月遟衞生防後患伐性釋前疑展轉那成夢呻吟且當詩因心念民瘼出位嘆身卑欲巳七年病當從百丗師保身將保國未可廢箴規元夕有感朔雪餘千里東風徧九州関河中土異燈火上元愁緑蟻甞新釀青貂戀故裘紫姑無用􅁲丗事正悠悠憶鍾離濬浚都同聚讀書螢楚岸春風憶送行三十年前初識靣四千里外更関情出疆我亦徒勞爾入仕君今何似生旅鴈相逢須一問要從郵上得新聲炕寢三十韻風土南北殊習尚非一躅出疆雖仗節入國蹔同俗淹留歳再残朔雪滿崖谷禦冬貂裘弊一炕且跧伏西山石爲薪􅉳色驚射目方熾絶可邇將盡還自續飛飛湧玄雲􅆋􅆋積紅玉稍疑雷出地又似風薄木誰容䑕棲冰信是龍銜燭陽曦助喘息未害揺空腹惠氣生袴􅃭仍工展拳足豈惟脫膚鱗兼復平體粟􅀒暄那用詫執熱定思沃收功在歳寒較德比時燠雖餘炙手熖寧有爛額酷矧當凝泫辰炎帝獨回轂玄冥真退聽祝融端可録嗟予亦何者萬里歌黃鵠偃仰對䆫扉妍煖謝衾褥壯懷羞竈媚晩悟􅀏突曲因思墮指人􅁀露苦皸􅏿頻年未解甲蹈此鋒刃毒遥知革輅中旰食安豆粥陪臣將命來意懇誠亦篤有竒不能吐何術止南牧君心想更切臣罪何由贖此身雖自温此志轉煩促論武貴止戈天必從人欲安得四海春永作蒼生福􅂓擬少陵翁秋風賦茅屋秋泉次韻新醅滃滃溢瓶盆漱石秋泉帶雨渾翡翠盃􅀷雲液凝鸕鷀杓滿月波翻照人光入樽罍瑩流齒香隨語􅀏噴巳􅂸扶頭日三丈朝酲未解任昬昬夜雨枕上淅淅風聲止凄凄雨氣凉愁工縈客思夢故遶江郷書䟽親朋少干戈歳月長平城弭節地可復見秋霜客懷兵氣常時見客懷何日開形骸病自瘦􅁂髮老相催巳􅀒秦庭哭終期漢節回風雷識意我一雨洗氛埃歳序歳序忽將晏節旄嗟未還伭雲􅃤衆木寒雨失群山喪亂関詩思謳謡發病顔夢魂識舊隱時到碧溪灣白髮白髮使車前煙波思渺然霜清穫稻日風急授衣天客館但愁坐釣舟誰醉眠乗槎㑹有便真到斗牛邊有感容貌與年改鬢毛隨意斑鴈邊雲度塞鳥外日銜山仗節功奚在􅂢軀志未閑不知垂老眼何日覩龍顔劉善長出示李伯時畫馬圖俯首舉尾拳一蹄掣韁欲嗅驕不嘶奚官聳肩兩足垂意皃自與造父齊雞目麟鬐鳯皇臆玉山禾逺未容食籋雲追雹有餘地置之畫圖人豈識精神權竒孰可班當在白兔青龍閒君知此馬從何來龍眠􅇩中十二閑謝崔致君餉天花三年北饌飽羶葷佳􅂼頗憶南州味地菜方爲九夏珎天花忽從五臺至崔侯􅇩中散千卷金甌名相傳雲裔愛山亦如謝康樂得此携歸豈容易應怜使館乆寂寥分餉明明見深意堆槃初見瑶草瘦鳴齒稍覺瓊枝脆樹雞濕爛慚扣門桒蛾青黃謾趨市赤城菌子立萬釘今日因君不知貴乖龍耳僅兔一割沙門業巳通三丗偃戈息民未有術雖復加飡秖増媿雲山去此縱不逺口腹何容更相累報君此詩永爲好捧腹一􅀏萬事置戰伐戰伐何年定悲愁是處同黃雲縈晩塞白露下秋空魚躍􅀷波月烏啼落葉風誰知渡江夢一夜繞行宫龍福寺煑東坡羮戲作山寺解塵鞅溪邊有微行手摘諸葛菜自煑東坡羮雖無錦繡腸亦飽風露清鉤簾坐捫腹落日千峯明丙申中秋不見月中秋萬里月何處駕冰輪底事隔年㑹不憐今夕人兔疑停杵􅍫蟾豈避風塵黙識常娥意氶平賞更新十七夜對月病骨怯風露愁懷厭甲兵人居絶域乆月向此宵明輪仄初經漢光分半隱城遟遟不肯下應識異郷情人謂少章此詩似微外古塞外而末章尤爲凄絶必有能辨之者睡軒爲趙光道作􅀷炷爐香睡息匀蕭然一覺得天真生涯􅂓示人閒丗縁境都忘藥褁身窺牖屢來從汝喚叩門空去任渠嗔更須滿壁圖雲水卧想江湖􅄅莾春南齋即事頻年行役夢庭闈陟岵常嗟脚力疲毎訴酒廵嫌客惡力營官事􅀏兒癡雲山幸不持錢買花竹何妨帶雨移此味責人元未識恐縁詩好被渠知餞和父之并州有北何堪說如南未是歸并門子徑往漢節我方鞿筆硯論心乆干戈㑹靣稀新程相憶處路入嶺雲微獨坐草凍慵抽碧桃癡懶暈紅黃雲猶漢野紫塞漫春風使節空留滯侯圭未㑹同堦除雪不掃獨立數歸鴻寒食絶域年華乆衰顔淚􅀧新毎逢寒食節頻夢故郷春草緑唯供恨花紅只􅀏人南轅定何日無地不風塵上巳行行春向暮猶未見花枝晦朔中原隔風煙上巳疑常令漢節在莫作楚囚悲早晩鸞旗發吾歸敢恨遟送春風煙節物眼中稀三月人猶戀褚衣結就客愁雲片叚喚回郷夢雨霏微小桃山下花初見弱柳沙頭絮禾飛把酒送春無别語羡君􅂊到便成歸天問絶句穴邊酣􅀾君臣蟻波上群嬉婢妾魚苦樂不同同一宇問天此理竟何如客夜城月四更上䆫風一室幽纎雲縈鴈塞重霧逼貂裘兵革何年息乾坤此夜愁殊郷兩行淚騷屑洒清秋攄抱客滯殊方乆山圍絶塞深秋風入撗笛夜月傍沾􅁭造􅂰他時語􅂢軀此日心飛霜滿明鏡髮短不勝􅆪重九九日今何地寒􅀷紫塞霜敢嫌蘆酒濁且對菊花甞歳月􅀟蓬鬢乾坤百戰􅂣賜茰知未舉夢自識鴛行次韻劉太師苦吟之什長城五字屹逶迤可􅀏偏師敢出竒句補推敲未安處韻更瘀絮益難時癡迷竟作禽填海辛苦真成蟻度絲却羡彌明攻具速劉侯漫􅀃也能詩善長命作歳除日立春土牛巳着勸農鞭葦索仍專捕􅀑權且喜春盤兼守歳莫嗟臘酒易經年東風漸入江梅夢朔雪猶迷塞柳天元㑹明朝定何處覊臣揮淚節旄前次韻子文秋興逸興常時有逢秋一倍多山長含楚􅀨天逺接吴波㝷壑同元亮浮家伴志和釣竿行入手還着向來蓑冬雨冬雨不成雪北風寒未􅀷山藏千壘秀雲結四垂隂逈洒凌朝閣残聲入夜衾端能洗兵甲足慰此時心寒食感懷次韻吴英叔疾風甚雨老難禁嶺外無餳誰解吟􅀟􅁂客塵諳丗變兩眉郷思儘愁侵榆錢何處迎新火杏粥頻年繫此心落日髙城魂易断天臨牛斗五湖􅀷春隂関河迢逓繞黃沙慘慘隂風塞柳斜花帶露寒無戲蝶草連雲暗有藏鴉詩窮莫寫愁如海酒薄難將夢到家絶域東風竟何事秖應催我􅁂邊華寒食清明六到客愁邊􅀟􅁂星星只自憐兵氣尚纒巢鳳閣節旄巳落牧羊天紙錢􅁅入松楸夢餳粥香隨榆柳煙北向鴈來寒霧隔音書不比上林傳李任道編録濟陽公文章與僕鄙製合爲一集且以雲館二星名之僕何人也乃使與公抗衡獨不慮公是非者紛紜於異日乎因作詩題於集後俾知吾心者不吾過也庚申六月丙辰江東朱弁書絶域山川飽所經客蓬歳晩任飄零詞源未得窺三峽使節何容比二星蘿蔦施松慙弱質蒹葭􅀝玉怪殊形齊名李杜吾安敢千載公言有汗青濟陽公謂宇文叔通叔通受官而少章以死自守恥用叔通見比故此詩以不敢齊名自託至于書年爲庚申與稱江東朱弁者蓋亦有􅀷意云秋夜秋夜雖漸永未抵客愁長秋月雖巳圎不照寸心方將心貯此愁莫作萬斛量爲月憐此夜誰共千里光空令還家夢欲趂征鴻翔附見籧然子趙滋滋字濟甫夲出馮翊其祖貞元閒來爲南京漕司户籍判官卒官下妻子不能歸遂爲汴人濟甫少日出閭里閒其曉音律善談􅀏得之宣政故家遺俗者爲多及長厭于㳺蕩乃更折節取古人書讀之學書學畫學詩學論文立志旣堅力到便有所得爲人強記黙識不遺微隱唐以來名人詩文往往成誦如目前考論文義解析絡脉殆􅀂夙昔在文字間者畫入能品詩學亦有功如黃石廟等作今代秉筆者或亦未可輕議閑閑趙公書法爲今代弟一手學者多倣之但得其形似而巳濟甫筆勢飛動頗得公不傳之妙宗室胙公文采風流照映一時而濟甫以布衣從之㳺商略法書名畫胙公亦以真賞稱焉隆德太一故宫樓觀臺沼門戸道路花木水石悉能歷數之聽者曉然如親到其處至於宋名賢所居弟宅坊曲與其家行輩群從孫息姻婭排比前後雖生長鄰里者不加詳也甞過長清一禅寺與僧談僧言五􅂀傳授圖大不易作濟甫􅀏曰易與耳因索筆作圖坐中他日以舊本證之不毫末差也丁酉歳殁於東平時年五十九黄石廟狂豪擊車代無人神石一砭志乃信吹嘘風雲遮楚秦炎精熾然四百春一縮尚悋續後塵江山有待終此身望望乆愁撗目民朝陽凄凄霜未休江燕竟來江北㳺山回鼎移海横流天風何時清九州草泥自古跧王侯神弃不卹誰當羞割牲釃酒空千秋先大夫詩郷先生權叅知政事代郡楊公叔玉譔先人墓銘今略載於此先生姓元氏字德明秀容人唐禮部侍郎次山之後自㓜讀書丗俗鄙事終其身不挂口爲人誠實樂易洞見肺腑雖童子以言欺之亦以爲誠然也先大夫殁遺産無幾先生布衣􅂼食處之自􅀂家人不敢以生理累之僮奴有竊拾東家之􅀥者立命還之貧人􅀒債則往往令折劵以貸之也累舉不弟放浪山水閒未甞一日不飲酒賦詩春秋四十有八終于家先生作詩不事彫飾清美圎熟無山林枯槁之氣居東山福田精舎首尾十五年東嵓其自號也有集三卷藏于家銘曰貪夫徇財智士死名宇宙古今萬轍混并我機弗張我戸弗扄天宇泰然物莫敢攖飲芳食菲岩岫杳㝠玉佩瓊琚御風泠泠魯山之醇次山之清閲丗幾傳猶有典刑邈哉先生明昌承安閒科舉之學盛大夫士非賦不談人知先人有聲􅂣屋閒其以詩文爲業則不知也先人􅂢館後十年好問避兵南渡逰道日廣丗始知有元東岩之詩楊尚書之美云彼美元夫子學道知觀瀾孔孟澤有餘曽顔膏未残林觀察顯卿云文章變古名新躰孝弟傳家守舊規雷内翰希顔云詩句妙九州孝友化一川王右司仲澤云讀書楓樹林曵杖白石灣至今文彩餘虎子仍班班李長源云衣冠巢許自髙雅岩壑䕫龍非棄􅂢餘人不能悉紀家集亂離以來凡三失之今所存者特吾益之兄及門生輩所記憶者耳小子不肖暗於事機不能髙蹈逺引戀嫪􅂛斗徼倖萬一以取縶維之禍殘息奄奄朝夕待盡誠懼微言將絶謹以古律詩四十首附之中州集之癸􅉺庶幾來者知百餘年閒作詩如先人而人或未之見其餘抱一槩之操泯泯黙黙終老而無聞者豈勝計哉是又可爲嘆也桃源行山中三月山桃開紅霞爛熳無邊涯音崖山家藏春藏不得落花流水人閒來憶昔携家竄岩谷秦人半向長城哭回頭塵土失咸陽繒弋徒勞羡鴻鵠冬裘夏葛存大朴小國寡民皆樂俗晝永垣籬雞犬閑春晴門巷桑榆緑漁郎偶到本無心仙境何縁得重㝷今日武陵圖上看唯見雲林深復深送德温同舎赴簾試太常侍祠水蒼珮内相夜下金蓮燭皇家結網未曽踈亦有佳人在空谷一從唐賦變遼律仰視折楊猶雅曲雲臺勲業一青衫􅀍髮操戈踵相属筋疲力涸僅乃得墨水一􅂛凡幾辱英雄俛首入彀中舉丗悉然非子獨子家口衆親又老歳月旨甘須寸禄薦書聞􅀃過南宫冷煖人情到僮僕我􅀄與子偕計吏人後人前隨碌碌不慚齊客售鼓瑟頗爲荆人悲獻玉一詩今日送君行萬里秋風看鴻鵠功名前路知不免雞􅁰後期良未卜錦標無用咤龍頭帛書且當傳鴈足雨後十日山中雨今朝見夕陽乾坤覺清曠草􅁄有輝光竹影揺殘滴松聲送晚凉南䆫􅂓自適無用􅀃羲皇覧鏡四十宜未老年年添􅁂絲直敎隨牒去也是挂冠時臺閣多新賦山林有逸詩悠然一樽酒滿酌不須辝室人生朝新酒清渾共糟床洗盞甞平時唯欲醉此日重難忘容服慙王覇山林得孟光白頭翁與媪萬事聽諸郎太原古城惠明寺塔秋望西山萬古壯陪京一日汾流入廢城浩浩市聲爭曉集畇畇原隰但秋耕􅀳公老去詩仍在􅀳公􅀳陽官舎春日詩云白頭官舎裏今日又春風越石亡來恨未平千尺浮圖暮煙底瓦盆濁酒爲誰傾薄遊同郝漕子玉賦全􅀳山河百戰􅂣登臨歷歷見興亡夷居狵雜尤堪嘆覇氣沉雄亦未量石瓮煙霞詩秀潤駘祠風月酒淋浪書生不是功名具慚愧山翁問葛強山中秋夕黄卷有餘習青燈共晚凉只知書味永不覺􅁂絲長老檜千年物幽蘭一國香平生陶靖節此夕邈相望􅀉宗人彦達交城人杯酒無縁接舊歡空將書尺問平安要君知我詩成處落日西風正􅀝欄榴華山茶赤黃桃絳白戎葵米囊不入格庭中忽見安石榴嘆息花中有真色生紅一撮掌中看模寫雖工更覺難詩到黃州隔千里畫家辛苦費鈆丹過鳳凰山在鴈門鳳凰聞􅀃似天壇北去南來馬上看想得松聲滿嵓谷秋風無際海波寒瓶形嶺早發在繁畤界海雲蕭瑟雪花乾人在羊腸百八盤閑客不知名利苦見時應作畫中看寒食再遊福田寺春山寂寂掩禅扉複嶺盤盤入翠微布韈青鞋供勝踐粥魚齋鼓薦玄機日烘幽徑緑煙暖風定曉枝紅雨稀曽是西堂讀書客不應啼鳥也催歸家園假山八尺飛來峰蒼然立於獨細看甲乙字疑是平泉族山非一草石見石山亦足便恐東岫雲來我簷下宿今朝鑿盆池明朝種松菊自􅀏住山人何時返嵓谷同侯子􅀳賦鴈沉沉江浦雲浩浩朔漠雪微生幾寒暑翅老飛欲折樓中見新過夕照送明滅欹枕數聲來踈䆫耿残月悲鳴或天性南北隨所愜誰念􅀌旅人年年爲愁絶寒林圖爲侯子􅀳賦川光茫茫風景暮一雪無情天地素長安閉門千萬家亦有行人踏長路新豐煙火㶚橋水畫史工作荒寒趣雪中故事知幾何偏識詩翁忍寒處君不見淮西城下鵝鸛鳴官軍夜斫吴家營只如党家麁俗亦不惡銀燭金荷天未明拈出雪詩三十韻蹇驢席帽可憐生雪詩三十韻見坡集贈答彦文相過之什程太原人剥啄誰叩門開門得吾友握手一大􅀏慰我離群乆之子富才具事業可力取瞻望青松姿衰遟愧蒲柳金閨滿鵷鷺什伯自爲偶寂寞林野人過從但隣叟盤飡無兼味笋蕨才適口窮達俱偶然相逢且柸酒枕上往時見白髮談􅀏輕歳月誰謂明鏡裏蕭蕭不勝鑷山林蹉跎乆丗慮初未絕觸物重興懷忽忽不自愜遭逢有竒耦才用隨巧拙如何杜陵叟自比稷與契茫茫拊塵編何時卒吾業秋暮王氏園亭細徑雲林底危亭澗水湄秋先殞黃葉寒未老紅葵嚼句幽禽荅㝷花晩蝶隨無人共幽興思與野僧期六言北闕三臺五省東山萬壑千岩琴書中有真味風月外無多談山園梨葉有青紅相半者戲作一詩霜輕霜重偶然中一葉雖殊萬葉同不信丗閒閑草木解隨兒女作青紅詩少有吟詩癖吟來欲白頭科名不肯換家事幾曽憂含咀將誰語研磨􅀂自讎百年閑伎倆直到死時休尊酒土􅁅論逺計木石􅀏浮生但有一尊酒何須千載名憶山中二絶句東寺留連飲張園爛熳遊兒童望歸路一日幾登樓秋色山中好山翁醉不廻不知籬下菊霜後幾叢開山中雨後遶屋湍聲轉臨崖老樹摧雷轟一雨去雲擘兩山開遣興張翰一盃酒林逋千首詩性唯便自適材敢論時施狡兔從三窟鷦鷯分一枝青山有佳色只似往年時發兾州留别恩禅師詩拙非同社情親本故郷共知成逺别且復暫相將池古蓮花淨䆫􅀷檜葉香何時重携酒來宿賛公房貴公子詠髙堂紅燭鼓聲齊舞徧纎腰月未西一曲􅆞頭一􅀟錦驊騮空自惜障泥蓮葉觀音恩禅師所藏同路宣叔賦瑞相分明一葉中華嚴性海共圎通補陀自有丹青變畫史區區可得工謝張使君夢弼餽春肉牙豬肋厚一尺玉塩花入􅀷蒸脫骨韭芽蓼甲春滿盤走送茅齋慰幽獨山人食貧才一粥幾􅀍艾生嘲首蓿食前方丈非素懷頗憶懸貆繞髙屋呼來鄰叟共一飽爲􅀃使君方継肉飢民待哺今幾家無䇿賛君慚此腹區區一肉見歌詠􅀃食書生良未足却愁今夕夢寐閒有物踏破園􅂼緑仙雞詩并序繁畤義興鎮酒家韓氏子畜一雞以善􅃲雄其郷一日敵家以藥飼雞使不知痛求與韓雞對韓雞闘乆果􅀍傷口下頷不收垂死矣一賣藥道人過其門曰我能活此韓欣然使療之里中諸兒隨看者一二十軰皆使向壁立道人以雞置籠中探手良乆若摩拊然者巳而取瓢水噀之置瓢籠上即出門兒曹怪其乆不還竊視之雞喙巳復生矣道人布􅂁草冠腋下懸青囊落魄嗜酒夜宿寺閣上韓氏子與里中人奔走求之并所卧草薦不在矣是時明昌七年仲規弟爲此鎮酒官予亦在焉作仙雞詩以記之老雄徤闘夸擅􅂣韓郎抱歸神色􅀭豈知􅃛兒出徼倖毒手一發不得妨毳毛散灑尚可養利觜一哆何由張青囊道人何許來自言捄藥吾有方垂髯噀水濯殘血半喙隨手生新黃筠籠半開聞腷膊草冠巳往徒驚忙神仙丗有寧虚荒惜哉詭激不可量丗人鷙勇天且劓况於物也資強梁敷筞枯枿變金石未若與丗鍼膏盲何須變化示狡獪知君辦作淮南王蓬萊東望雲茫茫愛而不見心爲狂刀圭不願換凡骨且欲共醉無何郷燈下讀林和靖詩落葉落復落淸霜今幾番踈燈照茅屋山月入頽垣老愛寒花淡幽嫌宿鳥喧卷中林處士相對兩忘言觀西岩張永淳畫鴈􅃤淡經營下筆難畫成不似卷中看知君連夜江湖夢折葦蕭蕭沙水寒從趙敷道覔石榴仙人囊中五色露得種昔與蒲桃俱猩猩染花開五月巳覺秋實懸庭除張園一酸齒欲裂君家兩株􅁡不如竹馬兒童厭梨栗緑囊􅂓爲剥紅珠雪行五更驢背滿靴霜残雪離離草樹荒身在景中無句冩錯敎人比孟襄陽龍眠畫馬驪黃求馬丗皆然滅没存亡自一天當日塩車人不識只今空向畫中傳歳暮蔌蔌霜力勁沉沉山氣冥北風半夜起吹動一天星送張兾州致政還都狀元行簡之父一扎恩書下紫宸東門祖道畫圖新路人也解賢踈傅河内猶思借寇恂父子文章千載事田園松菊自由身玉京才過梨花節靈沼行春莫厭頻用宋退傅張公閑遊靈沼探春回故事春雪幾日韶華雪更侵龍公試手本無心寒留整整斜斜態暖入融融􅂥􅂥隂著柳直疑香絮重擁堦還似落花􅀷前頭桃李應無恙剰破相如買賦金楸樹道邊楸樹老龍形社酒澆來漸有靈只恐等閑風雨夜怒隨雷電上青冥七夕天河唯有鵲橋通萬刼懽縁一瞬中惆悵五更仙馭逺寂寥雲幄掩秋風觀柘枝􅇊腰鼓聲乾揭畫梁綵雲擎出柘枝娘􅄕閒飛燕時窺影鑑裏驚鸞易断腸輕細不妨重暈錦廻旋還恐碎明璫杖頭白􅀨催花急拂散春風兩袖香敏之兄詩敏之諱好古性識頴悟讀書能強記務爲無所不闚年二十就科舉時先東岩君巳􅂢館太夫人年在喜懼望其立門戸爲甚切及再上不中意殊不自􅂓又娶婦不諧日致惡語遂以狷介得疾甞作望月詩有莫怪更􅀷仍坐待宻雲或有暫開時之句人或言詩境不開廣非佳語也嘆曰吾得年不永境趣能開廣否未幾没于北兵之禍年三十一中秋無月佳辰無物慰相思先賞空吟昨夜詩莫怪更􅀷仍坐待宻雲或有暫開時讀裕之弟詩藁有鸎聲柳巷􅀷之句漫題三詩其後阿翁醉語戲兒癡􅀃着蝉詩也道竒吳下阿􅀩非向日新篇爭遣九泉知鸎藏􅀷樹只聞聲不着詩家畫不成慚愧阿兄無好語五言城下把降旌傳家詩學在諸郎剖腹留書死敢忘先人臨終有剖腹留書之語背上錦囊三箭在直須千古􅀃穿楊題江村風雨圖渡口舟横水拍空墨雲傾雨樹號風江山不到紅塵眼半幅煙綃想像中中州癸集卷終
