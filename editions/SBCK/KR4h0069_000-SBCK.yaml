front:
  text: 中州皷吹翰􅁐英􅂠序商右司平叔衡甞手抄國朝百家詩略云是魏邢州元道道明所集平叔爲附益之者然獨其家有之而丗未之知也歳壬辰予􅁺東曹馮内翰子駿延登劉鄧州光甫祖謙約予爲此集時京師方受圍危急存亡之際不暇及也明年留滯聊城杜門深居頗以翰墨爲事馮劉之言日往來於心亦念百餘年以來詩人爲多苦心之士積日力之久故其詩往往可傳兵火散亡計所存者才什一耳不緫萃之則將遂湮滅而無聞爲可惜也乃記憶前軰及交游諸人之詩隨即録之會平叔之子孟卿攜其先公手抄本來東平因得合予所録者爲一編目曰中州集嗣有所得當以甲乙次第之十月二十有二日河東人元好問􅁉之引翰苑英􅂠中州集緫目聖製
