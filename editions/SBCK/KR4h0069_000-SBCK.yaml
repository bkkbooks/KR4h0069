body:
  text: 顯宗一首賜石右相琚生日之壽章宗一首雲龍川泰和殿五月牡丹第一卷宇文大學虚中五十首余留平城趙光道自代郡來相聚旬日而歸各題數句以誌其事古劒行白菊還舎作庭下養三鴛鴦忽去不反予冩金剛經與王正道正道與朱少章復以詩來輒次二公韻郊居歳寒堂重陽旅中春日巳丑重陽在劒門梁山鋪生日和甫諸公載酒袖詩爲禮和題稽古軒巳酉歳書懷涇王許酒幾月不至以詩促之從人借琴過居庸􅀜晩􅀫耀武􅀜安定道中上烏林天使三首滕惇禮齋心閣和髙子文秋興二首又和九日中秋覓酒四序回文一十二首燈碑五首館中書事時習齋醉經齋醉墨齋烏夜啼呉學士激二十五首山中見桃花李花長安懷古宿胡城簿㕔窮巷偶成二首病後􅀉􅄏父過南湖偶成夜泛渦河龍潭秋興晚春言懷􅀉燕中知舊歳暮江南四憶四首述懷喜晴和張魯瞻國公女生日席上命賦秋夜招趙資深拾遺同兒曹賦蘆花張戡北􅀐早春雞林書事題宗之家初序瀟湘圖張秘書斛一十八首沙邊東川春日巫山對月懷湖外親友武陵春雪盧臺峭㠶亭髙寺寓中江縣樓迴文二首仙門驛聽泉夜􅀨南山平安􅀜道中二首將渡江還家訪香林老海邊亭爲浩然賦南京遇馬丈朝美蔡丞相松年五十九首晩夏驛􅀐再之涼涇觀獵山閒往來十有五日因書成詩漫成淮南道中五首夢與范季霑登北潭臨芳亭􅁴而作詩記其事以示范從師還自頴上對新月獨酌一十三首七月還祁庚戌九日還自上都飲酒於西巖以野水竹間淸秋巖酒中緑爲韻十首小飲邢巖夫家因次其韻閑居漫興師還求居鎮陽初􅁲潭西新居􅀉王仲侯讀踈詠之詩懷家山次韻見意和子文寒食北潭雪晴呈玉堂諸公和子文晩望兵府得告將還鎮陽先􅀉王仲侯渡混同江初至遵化黃海棠夜坐槽聲同彦髙賦韓侯昆仲許送名酒以詩促之歩㝷野卉癸丑歳秋郊入􅀜宿昌平秋日髙麗館中二首西京道中銀州道中髙昌館道中黃海棠梅花蔡太常珪四十六首野鷹來撞冰行讀史醫巫閭讀戎昱詩有作二首感寓風竹如水聲荷香如沉水鄰屋如江村保德軍中秋雪擬坡公韻登陶唐山寺到廣河簡王温父昆仲秋日和張温仲韻二首和彦及牡丹時方北趨薊門戯楊新城和曹景蕭暮春即事并門無竹官舎東堂之北種碧蘆以􅀉意因作長句春隂􅀄至洛中霫川道中飲陳氏第代主人留客􅀉通州王倅岀居庸葵花讀史閭山十三山下村落暮春即事燕山道中三首太白捉月圗雪谷早行圗華亭圗畫眉曲七首髙内翰士談三十首梨花將赴平陽諸公祖席予所居之南下臨短壑因鑿壁開䆫規爲書室坐􅀗山林之趣榜曰野齋且作詩約諸友同賦春愁曲次韻東坡定州立春日詩集東坡詩贈程大本曉起戯集東坡句二首秋興村行不眠秋晩書懷早起春日庚戌元日次伯堅韻次韻飲巖夫家醉中作晚登遼海亭風􅀨􅀫江上棣棠雪苦竹睡起楊花道中丙寅刑部中二首二月十一日見桃花志隱軒偶題馬御史定國三十一首􅀫田舎淸平道中登歴下亭有感長相思客懷招康元質􅀨晴離開化寺秋日書事讀莊子雪霽寒食楊休烈村居㳺何氏園四月十日遇周永昌二首過李湘雪懷髙圖南送王松年之汶上香嚴病中題崇子中庵郢州城西送圖南秋日書事村居五首宣政末所作二首第二卷祝太常簡一十二首舟次丹陽下第魚臺東寺靑奴雜詩二首虚極齋獨坐相國寺鐘春日夏􅀨和常祖命二首撿旱張子羽三首㳺龍門訪潜溪僧舎􅀫寳應壽張和滑益之朱諌義之才一十七首南越行後薄薄酒二首寓言二首謝孫寺丞惠梅花次韻東坡跋周昉􅀞欠申美人􅁀􅀨􅀫閑廐十月十五日夜作連珠詩四首臥病有感二十韻復用九日詩韻呈黃壽鵬七夕長短言水月有興劉内翰著二十四首次韻彦髙即事順安辭呈趙使君二首次韻王子慎玉田道中出榆􅀜渡遼至日次韻彦髙暮春書事􅀉題張浩然松雪軒次韻彦髙占雪枕上言懷再和彦髙聞鴈閨情二首過白溝趁順安題御城寺壁月夜泛舟病中􅀉楚卿送客亭病中言懷呈韓給事伯堅惠新茶緑橘戯作小詩二首文季侍􅀰得緑蕚香梅子文待制有詩輒亦同賦施内翰宜生四首柳無題盆池平陽書事朱葭州自牧二十首病起書事晨起趨省自鄜州歸至新市鎮宿澠池道中有虎爲􅁀赴鄜過湖城縣武帝望思臺在焉􅀳寧感興年節嵐州席上贈同知王子直送鄜州節判任元老罷任東歸二首小􅀨不出寧海司理㕔過渾源留别田仲祥同知節使劉仲規挽辤訪山寺僧謝呉堡知寨安巨濟贈帋百幅淸河道中暮歸晩泊濟陽冬日擬江樓晚望對雪郊行和郭仲榮郡城秋望孫内翰九鼎一首甄㽵三藏真身劉修撰彧二首春隂秋􅀨趙内翰可三首來逺驛雪夕雲興館曉起江路聞松風劉西巖汲一十一首題西巖二首平涼道中南園歩月不如意慶州回過盤嶺􅀫義園到家髙陽道中家僮報西巖栽植滋荗喜而成詠留别四弟酒中作劉内翰瞻三首春郊無極道中所見郝内翰俁二十首郝吉甫蝸室聽雪軒魏處士野故㽵七月十五日夜顯仁寺東軒對月應制狀元紅疊翠樓題均福堂次仁甫韻題温容村寺壁故城道中同元東巖賦晩過壽寧子文致君九日用安字韻同賦題孔氏園亭􅄃秀軒上巳前後數日大雪新晴㳺臨漪亭奉陪太守㳺南湖同郭令賦三月望日次邊德舉􅄃秀軒新秋寺樓晴望題五丈原武侯廟仲純張郾城公藥三首許下三庚劇暑懷思故郷嶧山山水眞淸涼境界也感而作詩往鄜州二月任南麓詢九首西湖濟南黃臺三首􅂫州宴庚辰十二月十九日雪憶􅀰山巨然山寺浙江亭觀潮馮臨海子翼七首三月七日登龍尾山寺佑德觀試經書事和張浮休舊韻小圃茅亭新成贈張壽卿歧山南顯道冷香亭史明府旭三首懷郭碩夫劉南正程雲翼早發驝駞堋梨花邊内翰元鼎四十二首八月十四日對酒早春村舎二首懷友夜深春花零落出門􅀐馬帝城新香聞簫和致仕李政奉韻別友送妹夫之太原惜春客思暮鐘夢斷花開人散二首聞笛王文伯還家詩以迎之晚行山中自嘆新秋示友偶題二首新居閑題荅文伯二首閱見十首李丞旨晏七首白雲亭贈燕通州道中髙麗平州中和館後草亭題武元直赤壁圖嗅梅圖簡之蓮塘陪諸公賦王都運寂七首易足齋送張仲謀使三韓自東營來廣寧道出牽馬嶺經梁利器墓下黃桃華沁水山寺奉題少保張公曲阿别墅二首蓮峯真逸喬扆一首凌虚堂第三卷劉龍山仲尹二十八首墨梅一十首自理西溪牡丹秋盡晩隂冬日寒夜晚日東齋䆫外梅蕾二首初秋夜涼謝孔遵席後堂􅀞山水圖别墅二首龍德宫酴醿夏日不岀一室劉記室迎七十六首淮安行修城行河防行梁忠信平逺山水普照旃檀像舊物也方丈老人比以見還作詩謝之連日雪惡用聚星堂雪詩韻徐夢弼以詩求蘆菔輒次來韻再次前韻鰒魚樓前曲題十眉圖雲中君圖楚山淸曉圖題劉德文戯綵堂送劉德正盤山招隱圖􅀉題禹城孫氏茂德亭郭熈秋山平逺用東坡韻南口晚到八逹嶺下逹旦乃上出八逹嶺隰川上谷蔡有鄰碑車轣轆沙漫漫摧車行敗車行數日冗甚懷抱作惡作詩自遣􅀉題安巖起官舎北溟莫州道中上施内翰題呉彦髙詩集後代王簿上梁孟容副公二首清明前十日作聞丘丈晩集慶壽作詩戯之明日復㑹客普照繼呈觀古人梅詩戯成一章秋郊馬上二首贈人別後有懷元濟贈董丞秉國聞彦美服藥以詩問訊和人七夕韻海上次曹次仲韻因以自感寒食阻􅀨招元功㑹話次韻諸園不暇㳺覧自解陪諸友登三山亭二首秋郊次劉元直韻二首次韻夜􅀨代人憶舊梅題雪浦人歸圖歸來圖戯作城南庵書何維禎見贈詩後􅀉題薊丘僧房虚春亭􅀨後題歸去來圖過􅀜渡水圖􅀉題孔德通東園次韻酈元與贈于元直道舊二首彦美生朝張萱戯嬰圖河橋昌邑道中題仲山枝巢許内翰安仁六首望少室送二道者歸汾州草木蟲魚詠二首少室道中遊泰安竹林丞旨党公六十五首穆陵道中二首瓊花木后土像君錫生子四月八日立春端午日照道中夏日道出天封寺龍池春興􅀫宣灣黃彌宇􅀞呉江新霽圖雪中四首雪蟬漁村詩話圖曉雲次子端韻送髙智叔歸濟南日照道中夜發蔡口西湖晩菊西湖芙蓉浪溪別呉安雅奉使行髙郵道中二首􅀌鴈集句黃菊集句金山趙飛燕冩真村齋遣事和張德逺伐松之什題獐猿圖和濟倅劉公傷秋題春雲出谷圖新泰縣環翠亭喜􅀨睡覺門外月色如晝霜風過翏然成聲作一絶中秋送雷希顔赴涇州録事魯直烏絲襴黃庭同粹中師賦梅㳺華山􅀉元􅁉之和淵明飲酒九首和韋蘓州秋齋獨􅀫擬兵衛森􅀞㦸􅀉王學士子端上淸宫二首􅀉陳正叔􅀉􅁉之古鉼䗶梅暮春得寒字靈感寺五月牡丹應制代州開元寺謁北嶽陪李舜咨登憫中寺閣廬州城下白鴈桃花島􅀉王伯直郎山馬耳峰春遊三首暮歸清居寺五杉亭觀子野留題雞鳴山盧溝􅀨晴二首寓望戴花玉堂夏至華山􅀨晴即事同樂園二首繫舟山圖虎牢第四卷常山周先生昂一百首晩望香山有感冷巖行賦冷巖相公所居早起曉望覊旅早春雷􅀨過晩歩夜晩望獨酌秋夜對月促織溪南繼人韻送李天英下弟􅀫西藍北湖淸明中秋夜髙陽對月丘家㽵早發邊月侍祠太室夜歩宋文貞公廟讀陳後山詩偶書失子北行即事二絶句邊月晨起西城道中醉經齋爲虞郷麻長官賦清放齋孫資深歳寒堂登綿山上方謁先主廟送客莫州道中即事二首感秋對月鵲山望山中松利渉道中􅀉子端即事二首九日對月翠屏口七首邊俗山家七首北行二首山丹花春日即事􅀉金山老􅀉王子明無題萱草得家書書齋聞蟬晩隂不成竇氏園亭二首即事二首代書􅀉大元伯和路宣叔梅新秋靳子温欵春亭厎柱圖寒林七賢過省􅁈谷魯直墨跡讀柳詩憶劉及之家園晩望水南晩眺正月大風􅀨吊張益之黃山趙先生渢三十首晩􅀫山寺僊和尚坐脫黃山道中郊外貢院中懷山中故居貢院聞􅀨聚逺臺秋日感懷用仲謙元夕詩韻分韻賦雪得􅀨字和茂才韻留題西溪三絶九日懷尹無忌立秋和崔深道春寒西城觀水盆池荷花扈從車駕至荆山中秋題齊物堂秋郊晩望元日過良鄉縣學和詵上人雪詩澗上新涼過蓚縣董大夫廟寓居冩懷劉左司昂一十一首醉後山中􅀨都門觀別客亭山堂弔張維翰維忠兄弟即事二首歌風臺吊李仲坦王官谷魏内翰􅅮霄三首送河南府尹張壽甫赴闕次韻遊龍門寳應用天隨子體二首王隱君磵一十三首暮春郭南記南塘所見簡孟友之次文逺韻謝竹堂先生見過次友之秋日􅀨後韻寓居南村雜詩七首劉治中濤六首小雪和德卿雪井陘宿平遥集福寺送王純叔守曹州戯用前人語題天平別墅劉左司中二首冷巖公柳溪龍門石佛路司諌鐸二十六首書州驛壁王子端挽辤慶壽寺晩歸賦丈室碧玉壷二首次韻荅季通􅀨中輞川髙唐劉氏駐春園赫仲華求賦鄴臺張氏野堂題鄒公所藏淵明歸去來圖衛州贈子深節度潼􅀜七夕與信叔仲荀㑹飲晩歸作襄城道中感寓冠氏􅀨中細香軒三首芳梅如佳人贈襄城衛昌叔遂初園詩閑閑堂思玄堂汴梁公廨西樓二首次韻酈著作病起師拓一十二首秋夜吟浩歌行送濟夫之􅁗冬夜二首游同樂園陪人游北苑曲江秋望和王逸賔繁臺詩贈雲中劉巨濟郡城南郭早望中元後二日和張叔獻題首善閣酈著作權一十六首聞砧夷門遣懷西游雜詩慈恩寺塔木犀竹林寺矮松自鶴壁游善應浢山八渡崖留仲澤􅀉唐州幕官劉無黨除夜七夕濟源海子内有二黿人以將軍目之投餅餌則至裴公亭郊行二首禮部楊公雲翼二十一首陽春門堤上光林