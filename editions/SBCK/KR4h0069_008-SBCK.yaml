front:
  text: 中州辛集弟八
  hash: sha256:ecc0a69276a47d605cde1786d0a88f9acf4896a13129248f9b19fe2cb6448970
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0069_SBCK_008-1a}
body:
  text: 邢内翰具瞻一首王太常繪一首王禮部競一首杜佺一首邊轉運元勲二首李寜州之翰四首三興居士一首楊興宗一首趙亮功一首賈泳一首元日能一首范墀一首王雄州仲通一首韓内翰汝嘉一首王吏部啓一首晁洗馬㑹一首王内翰遵古二首王汾州璹二首李特進獻可二首雷溪先生魏道明二首學易先生雷思一首王大尹翛一首髙工部有鄰一首宋孟州揖二首髙轉運德裔一首路兾州仲顯一首張代州大節一首趙轉運慤三首郭祕􅁥長倩一首郭録事用中一首趙太常之傑三首趙轉運鼎一首田轉運特秀一首趙漕副文昌一首路轉運忱一首髙宻州公振一首張轉運彀一首宗御史端修一首張戸部翰五首李好復二首楊祕監􅀖基一首吕陳州子羽四首趙塩部文昌一首韓内翰玉二首王都運擴一首趙吏部伯成三首梁録事仲新一首盧待制元一首太常卿石抹卋勩一首苑滑州中一首趙禮部思文六首李坊州芳一首劉鄠縣昂三首錦峰王仲元三首盧冝陽洵一首刁涇州白三首劉戸部光謙一首毛提舉端卿一首康司農錫一首張戸部德直一首馮辰一首王丗昌二首李宜陽過庭一首田錫二首張介一首龐漢一首宋景簫二首李警院天翼三首張叅議澄四首劉神童微一首郭宣道一首張仲宣二首胡汲一首王修齡一首别起邢内翰具瞻具瞻字嵓夫遼西人天㑹二年進士與吴蔡爲文章友仕至翰林待制出塞樓外青山半夕陽寒鴉翻墨􅀧林霜正沙細草三千里一笛西風人断腸王太常繪繪字質夫濟南人天㑹二年進士武陟道中詩云梧葉重勝迎日露蕎秧薄要護霜雲人頗稱之仕至太常卿有注太白詩行於丗江天秋晚圖萬頃波閒踏浪兒瀟湘秋晚趂歸時四山紅葉風聲徤散入儂家欵乃詞王禮部競競字無競安陽人宋末登科仕國朝至禮部尚書兼翰林學士承㫖年六十四大定四年卒無競善作大字字或廣長丈餘而結宻如小楷京都宫殿題牓皆其筆趙禮部以爲古今弟一手唯党􅂐差可配耳一孫名道通字彦􅀷今爲黃冠師奉使江左讀同官蕭顯之西湖行記因題其後雲煙濃淡費臨摹行記看來即􅀞圗雲夢不妨吞八九筆頭滴水了西湖杜佺佺字真卿武功人宋末有詩名於関中兒時甞作藥名詩有杜仲吾家好弟兄自然同姓又同名之句及以五言百韻上乾州通判馬㳙㳙大加賞異阜昌中登科􅊩官亦有聲馬嵬太真墓過客多題其詩甚多道陵詔録其詩得五百餘首付詞臣弟之真卿詩在髙等舊有錦溪集亂後不復見矣子師楊亦能詩尤工書翰奉天􅀭煥然云然馬嵬道中垂柳隂隂水拍堤春晴茅屋燕爭泥海棠正好東風惡狼藉殘紅送馬蹄邊轉運元勲元勲字輔臣豐州人後遷雲中祖貫道遼日狀元輔臣天㑹十年進士終於河閒路轉運使與弟元鼎元恕望瀛臺春望晴雲如困桞如癡丹杏開殘碧草齊一􅂀望瀛臺下水煖風遲日浴鳬鷖七夕髙樓人散酒罇空漫擬新文送五窮獨􅀝南䆫夜岑寂一鈎凉月下踈桐李寜州之翰字周卿濟南人宣和末擢弟人有勸叅童貫可以徑至館職者周卿謝絶之國兵破洺州縳見元帥誘之使降語及君臣之際辭情慷􅁣自分一死帥怜之遂􅀍録用後守寜州陷田侍郎珏黨籍除名徙上京遇赦復官終於東平倅有漆園集行于丗子靈石尉謙孫德元今在郷里書呈仲孚造物固難量誰能計寒餓失馬乃爲福夢牛翻作禍長溪霜練静脩嶺蒼龍卧魂夢吾已安不勞歌楚些題宻雲州學壁﨑嶇到此興何堪况復風謡意未諳旅舎蕭條空自遣􅇩懐磊落向誰談留連暮雨侵踈牖宛轉飛雲掃翠嵐因億林泉歸去好一燈幽夢遶春潭中京遇因長老天涯流落偶生還古刹相逢語夜䦨歎我歸途千里逺喜君禪榻一身安松聲不断風吟細月影無邊露氣寒分手山堂更寥索冷雲衰草伴征鞍歳暮休怪年來白髮新天涯三載困埃塵隅離沙磧窮隂地收得桑榆老病身對雪莫吟秦嶺句撥醅且醉漢江春此生自断無餘事何必區區問大鈞三興居士三興居士阜昌中人題平隂僧寺三吴家近水晶宫行坐紅香緑影中今日異郷僧寺裏一盆荷葉戰西風楊興宗興宗髙陵人宋旣渡江故興宗有龍南集予同舎郎関中楊君美甞見之出劒門嘔啞鳴櫓下長川萬疊青峰只眼前山鷓啄殘紅杏粉杜䳌啼破緑楊煙夢廻蜀棧雲千片醉枕巴江月一舩物色誰分杜陵老風騷牢落劒南天趙亮功亮功華州人甞監冨平酒甘露寺鄭南峯下寺泉石間踈篁飛雨度山閣閑雲生野塘簷前松子落厨際栢煙香别後聞鍾磬山隂空夕陽賈泳泳字漢甫洛陽人題安生僧寺天㑹巳酉予甞舉王化原李端中同過是寺属兵厄甫罹堂宇頽弊繪素剥落秋草野蔓羅生階上盤桓終日間闃其無聞時風塵未静竊謂此地當日就丘墟及今與端中復來則寺有僧􅂤師矣向之所見頽者巳完葺剥者復嚴㓗鍾閣巍焉石塔巋焉庭樹鬱焉皆向之所未有者也因一讀舊題已經五稔自念五年之間所向齟齬十歩九蹶卒䧟機穽豈非禍患之來有積漸歟抑得失行止非人所能爲歟嗚呼事去如夢人生如􅀉窮達相推雖賢智有不能免焉者顧余何足道哉所不知者他日過此寺之興廢余之得喪悲歡又何如也續題一詩貽失路者共爲一嘆云癸丑七月八日題重來巳是五年㳺憂患相仍欲白頭翻羡亭亭兩竒樹不知風雨過春秋元日能日能不知何許人與劉嵓老同時紅梅天上瓊兒白玉肌吴粧略約更相宜認桃辨杏由君眼自有溪風山月知巖老同賦云一􅀧清香透雲雪是中那得杏花天評者謂二詩同意而日能爲工范墀墀字元渉系出頴川有詩話行于丗和髙子􅀄梅春風也自惜流光只放寒梅一樹芳玉粉更粧前夜雪口脂猶注昔年香江湖昨夢誰同記詩酒風流豈易忘東閤何郎未全老花枝休􅀏􅁂絲長王雄州仲通仲通字達夫長慶人天㑹六年進士皇統中䧟田㲄黨藉編配五國㑹赦還丗宗即位復官終于永定軍節度使送客措足疑無地捫心幸有天故人成解后殘喘見哀怜落日驚魂外􅀌雲泪眼邊西歸萬里夢今夕到君舩韓内翰汝嘉汝嘉字公度宛平人父昉遼末狀元仕國朝至宰相甞作武元聖德神功碑爲作者所稱公度皇統二年進士累遷真定路轉運使坐公事遷清州防禦使召爲翰林侍讀學士卒􅀉元真同年十年塵土􅁂毛班杖屨還來踏故山葉􅀉殘紅春尚在雲酣濕翠雨仍慳不堪􅀝樹追前事更恐臨溪見病顔一日暫來千日去何時倦鳥得真還王吏部啓啓字希畢大興人正隆二年進士累遷戸部貟外郎通州刺史用宰相萬公薦權右司郎中章宗即位不一歳遷工部侍郎即以河南北路提刑使拜吏部尚書使宋使還出爲絳陽軍節度使致仕還郷里與左丞董公叅政馬公宣徽盧公尚書郭公爲九老㑹年七十九卒子師揚字仲雄南渡後隱居崧山時年巳六十餘經傳子史皆手自抄之如徤舉子結夏課然希顔􅀃仲雄在太學同舎號爲閉户王先生其謹厚蓋家法云孫造字成叔今居東平王右轄許送名酒乆而不到以詩戲之燕酒名髙四海傳兵厨許送巳經年靑看竹葉應猶淺紅比榴花恐更鮮枕上未消司馬渴車前空墮汝陽涎不如便約開東閤一看長鯨吸百川晁洗馬㑹㑹字公錫髙平人道院文元公之後宣和末中武舉仕爲太子洗馬天眷二年經義進士爲人美風儀器量宏博澤人經靖康之亂生徒解散公錫稍誘進之貧不能就舉者必厚爲津遣在官下則分俸以給之至于李承旨致美昆仲亦出其門士論歸焉歷虞郷猗氏臨􅀳三縣令以興平軍節度副使致仕年七十八終於家詩號泫水集虞郷縣齋云官况薄於重搾酒􅀲期近似欲殘碁王官谷云煙藏芳樹逺雲􅀘断山齊郷人至今傳之孫國章字公憲李承􅈲外孫教授郷里樂於提誨諸生經指授者肅然如在官府進退拱揖皆有可觀蓋其家法云杜䳌杜宇啼聲枕上來一聲哀似一聲哀千哀萬怨無今古喚得行人􅀂箇廻王内翰遵古遵古字元仲父政金吾衞上將軍三子遵仁遵義元仲其季也元仲四子庭玉宇子温内郷令終於同知遼州軍州事庭堅字子貞有時名庭筠字子端庭掞字子文過太原贈髙天益天益能作大字遼海渺千里風塵今二毛心雖如筆正官不稱才髙筦庫非君事山林必我曹相期老郷國拂石弄雲璈野菊子貞闘雞臺下秋風裏白白黃黃無數花日暮城南城北道半隨榛􅁄上樵車王汾州璹璹字君玉太原人天眷二年進士弟珙器玉珦汝玉皇統九年同牓家丗業醫有隂德聞里中甞有金蚕金馬之瑞君玉仕至汾陽軍節度使郷人榮之號三桂王氏行尚書省左右司郎中仲澤其從孫也金馬在部􅁺清卿房迄今寳之㳺太寜寺西山踏破萬層靑與客携壷上太寜泉石有情容避俗軒裳無術可逃形雲榮屋角僧禪静露下松梢鶴夢醒明日却㝷塵境去曉猿啼月􅀂爲聽王元仲海岳樓同諸分賦汝玉十二朱欄􅀝半空元龍髙卧定誰雄簷楹翠濕蓬山雨枕簟凉生弱水風物色撗陳詩卷裏雲濤飛動酒柸中謫仙㑹有􅀐鯨便八極神㳺路可通李特進獻可獻可字仲和遼東人太師金源郡王石之子太師遼末狀元仲和丗宗元妃之弟大定十年史紹魚牓進士歷州縣入翰苑累遷戸部貟外􅀰以事貶淸水令召爲大興少尹遷戸部侍郎終於山東東西路提刑使衞紹王即位以仲和元舅贈特進道國公子道安特􅈲符寳郎淸水寒食感懐桃花零亂柳成隂人到春􅀷思更􅀷芳草戍樓天不盡異郷寒食故郷心召還過故関山過関天日正晴明誰道山神不丗情逺客得歸心緒别隴瀧閑作断腸聲雷溪先生魏道明道明字元道易縣人父遼天慶中登科仕國朝爲兵部郎中子上達元真元化元道俱弟進士又皆有詩學元道最知名仕至安國軍節度使暮年居雷溪自號雷溪子有鼎新詩話行於丗元道春興云燕來燕去烏衣巷花落花開榖雨天髙麗館偏凉亭云凉或作梁碧海半彎蝸角國春風十里鴨頭波中秋云丹桂知經幾寒暑冰壼别是一山川其所得者也佛嵓寺虎谷西垠北口南撗橋過盡見松庵舊逰新夢猶能記般􅀂真如得徧叅霜圃擷􅂼充早供石泉煮茗薦餘甘殘年便擬依僧住過眼空花乆巳諳退食竿頭犢鼻清貧在夢裏槐安舊習空退食歸來澹無事水邊長嘯看晴虹學易先生雷思思字西仲渾源人天德三年進士大定中任大理司直持法寛平至今稱之仕至同知北京轉運使事有易解行於丗弟志字尚仲亦弟進士仕至永定軍節度使西仲季子淵最知名食松子千嵓玉立盡長松半夜珠璣落雪風休道東㳺無所得歳寒梁棟滿􅇩中王大尹翛翛字翛然范陽人皇統二年進士資禀鯁峭甫入仕即以材幹稱大定中皇子曹王尹大興翛然爲少尹王移鎮北門復以同尹從之前後多所規益朝廷稱焉遷咸平轉運使改知瀋州坐爲怨家所誣奪官宰相有爲辨理者得鄭州防禦使章宗即位召拜禮部尚書以選爲大興尹兩月政成發姦擊強剖繁理劇百年以來無有岀其右者㝷爲護前者所排繫獄累月天子知其非罪出之翛然幅巾歸范陽明年起爲定國軍節度使致仕卒遺命無請謚無立碑然至今言名臣者必及焉烏子秀自左司貟外郎左遷上京幕官楚山白玉􅀧蠅頭正坐􅇩中有九流同部吏郎皆五馬不知山􅀑解揶揄髙工部有鄰有鄰字德卿遂城人數歳入小學州將爲子娶婦􅆖御盈路同舎兒競觀之德卿讀書自􅀂也大定三年弟進士歷州縣爲尚書省令史時相議絀詞賦專明經德卿以賦有譎諌之義反復詰難竟得不罷爾後擢弟者廷試時務䇿亦自德卿發之明昌􅀄累遷安國軍節度使父飛狐令某甞尉南和以公事活千餘人德卿實生是邑父老有身及當時事者扶杖迎勞歡呼馬前德卿亦爲立碑尉㕔不踰月子嵩猶子鑄同牓登科時人榮之泰和中使宋還拜工部尚書致仕卒德卿孝友廉介長於吏事所至興學校敦風化以儒雅自縁飾耆舊至今稱之子嵓字士瞻弟進士季子嶷字士美正大􅀄監察御史最知名馬嵬事去君王不奈何荒墳三尺馬嵬坡歸來枉爲香囊泣不道生靈淚更多宋孟州楫楫字濟川長子人年十九天德三年擢弟除著作􅀰母老丐歸養許之泰和三年以省􅁺從吏部尚書梁肅使宋副趙王府長史直臣獵淮上射一虎斃之濟川有詩記其事語意俊拔泗州守刻石於鎮淮堂濟川官至孟州防禦使子元吉字祐之明昌二年進士元圭字達之泰和三年進士皆有名於時曾孫弘道今在武陟還紫雲寺素扇且題詩其上吴綾便靣小團團失手拈來亦厚顔障盡驛塵三十里却還明月紫雲閒庭槐庭槐先人手所植再丗淸隂方滿臺慚媿兒孫種桃李花枝凖擬當年開髙轉運德裔德裔字曼卿鶴野人髙才􅀶學弱冠擢弟累遷登聞撿院同知太府少監平陽少尹開州刺史豐王傅卒於西京路轉運使工於爲文字畫尤有法所題卷軸今猶有存者甞以樗軒所書比之氣韻形似無毫髮少異樗軒自望者甚髙何至學曼卿乃暗之合真異事也子元道殿中侍御史坐忘女女環州張氏年十三異夢之後坐忘巳四年矣贈詩者甚多結習銷來性自圎去留元不閒人天消揺自是忘形蝶枯寂寧同委脫蝉無礙真空常蕩蕩􅀂存餘息尚綿綿立亡坐脫皆㳺戲定力何甞有變遷路兾州仲顯仲顯字伯達兾州人家丗寒微其母有賢行敎伯達讀書國􅀄賦學家有􅀋書名節事者新出價數十金大家兒有得之者輒私藏之母爲伯達買此書撙衣節食累年而後致戒伯達言此書當置學舎中必使同業者皆得觀少有靳固吾即焚之矣伯達正隆五年進士明昌􅀄授武安軍節度使郷人榮之雲朔用兵伯達奉使江左還獻賜弊以佐軍未報而伯達死章廟詔以所獻還其家夫人傅氏曰此非吾夫意復上之有司不聽夫人付之州學買上田二千􅅿有竒以贍生徒故相馬琪德玉時判州事聞于朝賜號成德夫人伯達二子鐸字宣叔鈞字和叔俱有名于時宣叔爲諌官諌章廟元妃李氏出細微不應上僣有累聖德又其兄弟恃寵納賂將有楊國忠之禍坐謗訕除名宣叔布衣還郷里傅夫人臨終敕宣叔曰汝以憂國愛君故極言直諫天子明聖特蹔有所蔽計他日必復起汝前事須再言勿有所顧藉也墓碑不之載故表岀之楊祕監釋伽出山像自從此老岀山隅惱亂蒼生底事無他日􅀂逢楊處士只教畫箇湼盤圖張代州大節大節字信之五臺人天眷中進士與興陵有藩邸之舊愛其真淳甚􅀝重之歷横海軍節度使咸平大興尹吏部尚書河東北路兵馬都緫管明昌􅀄請老特授鴈門節銊除其子嵓叟忻州刺史以榮其歸信之好奬進士􅀋滄州徐韙太原王澤大興吕造經其􅃌授卒成大名士論以風監歸之嵓叟字夢弼亦弟進士歷嵐潞懐三州節度終於集慶軍屏山謂吏事不及乃父而以長厚見稱子待舉臺􅁺選授奉御正大末從車駕東狩不知所終孫紹祖在東平同新進士吕子成輩宴集狀元樓鸚鵡新班宴杏園不妨老鶴也乗軒龍津橋上黃金牓三見門生是狀元趙轉運慤慤字叔通黃山先生渢之父也宋末汪彦章任鄆州敎官通叔爲學正甞預酬唱故其詩文皆有源委國􅀄登科仕至同知南京路轉運使事擬古春風動地來依依燒痕青王孫行不歸離恨何時平翩翩誰家兒曉獵開紅旌彫弓挿白羽怒馬懸朱纓圍合意氣雄厮養厭庖烹人生一春草時至何足榮君看五陵樹日暮悲風生蜀山曉發曉發蜀山道山􅀷人自迷殘星數徽小斜月一梳低隔舎繰車響遥林杜宇啼區區事行役何日得安栖寒齋雪中書呈許守剪水作花開紛紛天上來聲淸偏傍竹艶冷欲欺梅積潤滋牟麦餘膏丐草萊窮閻休嘆息數日是春回郭祕監長倩長倩字曼卿文登人皇統丙寅經義乙科仕至祕書少監兼禮部郎中修起居注與施朋望王無競劉嵓老劉無黨相友善所撰石次明傳爲時人所稱有崑崙集傳于丗子天􅂹義師院藂竹南軒移植自西壇瘦玉亭亭十數竿得法未應輸老栢植根兼得近幽蘭雖無穠艶包春色自許貞心老歳寒百草千花盡零落請君來向此中看郭録事用中用中字仲正平陽人大定七年進士歷浮山簿陜州録事卒年三十一有寂照居士集郝子玉毛牧達鄭仲康爲之引其賦醋魚云身卧不知雲子白氣酣􅂓作木奴酸按愽物志西羗仲秋日取鯉子不去鱗破腹以赤秫米飯塩醋合糝之逾月則熟謂之秋鮓故仲正云然又賦雪云㶚橋柳絮人千里楚澤蘆花水半扉殊有詩人思致恨不假之以年耳偶得叅徧藂林懶出㳺指端􅀌月照髙秋大千界裏閑窺掌不二門中暗􅀧頭掃地燒香􅂓自遣栽花種竹儘風流莊􅀩抵死談齊物無物齊時也合休趙太常之傑之傑字伯英大定人本名宗傑避諱改大定十六年進士歷西京提刑副使棣州防禦使終于太常卿使宋還言事云宋人文敝之極且脆弱不足爲慮邊部爲可慮也其前識如此子繪名進士早卒孫季卿在燕中許道寧羣峰暮雪道士平生林野人醉中拈出雪峯真爲君療却煙霞癖比似青囊藥更神題濟源龍潭寺樹圍脩竹竹圍庵庵下泓然碧一潭極目荷花半秋色小撗圖上看江南除夜日月不肯留歳曆倐云畢僧坊見節物新正在明日夜半拊枕嘆半百又加七形骸念念改膂力能不失經言男數八此去才有一徤者未可期况乃常衰疾物情忌盈滿君子愼名實行矣安退閑吾其保終吉趙轉運鼎鼎字德新欒城人大定十六年進士喜作詩頗知道學屏山所許如此仕至西京路轉運使元日詩云拜嗟筋力隨年改飲覺屠酥到手遟惜不多見也子中立字正卿弟進士文譽甚著􅀫來同堡渭北洮南過却春窮邊冰雪更愁人來同驛裏題詩處破屋青燈一病身田轉運特秀特秀字彦實昜縣人大定十九年進士仕至太原轉運使喜作詩爲周德卿李之純所賞感興云散木不材寜適用虚舟無意任乗流百年身丗槐安國千古人情羮頡侯賦古塔云締構百年人換丗消沉千古鳥盤空他􅀋此彦實所居里名半十行弟五以五月五日生小字五兒二十五歳郷府省御四試俱中弟五年五十五八月十五日卒造物之戲人如此五月五日生者見其賦集序胡國瑞云􅀫萬安寺長途鞍馬倦黄塵喜見空嵓萬疊雲漫漫野煙迷去鳥蕭蕭林葉帶殘曛苔封老檜龍鱗起石礙流泉燕尾分夜敞松䆫耿無寐一庭蘿影月紛紛趙漕副文昌文昌字當時陵川人仕至京兆轉運副使甞有詩云蟲聲連壊壁樹色入秋䆫草香花落處山黒雨來時頗爲黃華所稱歌扇媚娘巧作貫珠喉畫扇團􅇛半掩羞唱到春山小顰處一輪明月爲花愁路轉運忱忱字子誠平郭人大定二十二年進士累遷監察御史終於河東北路轉運副使秋懐落日留虚壁秋風急戍樓髙歌􅀑神夜揮涕虎狼秋豪貴少靑眼文章多白頭何時挂長劒天地一扁舟髙宻州公振公振字特夫正隆􅀄進士歷南京留幕終於宻州刺史詩有家學賦南園江郷有翠蓋紅粧無俗韻緑隂青子更多情之句惜不多見也裴氏西園簿領沉迷倦不禁偶從名勝此幽㝷竹隂踈處見潭影人語定時聞鳥音陳跡謾留千古恨歡逰􅂓慰十年心多情一片梁園月送我垂鞭出上林張轉運彀彀字伯英臨潁人大定二十八年進士仕至河東南路轉運使家多法書名畫古物袐玩周秦以來鏡至百餘枚他物稱是天性孝友與人交極誠􅅃古所謂􅀶雅君子者伯英可以當之弟瑴字伯玉美風儀善談論氣質豪爽在之純希顔伯仲閒舉進士有聲􅂣屋及再上不中即拂衣去甞自言丈夫子娶非尚主官不徒歩至宰相不屑可也宰相李公仲修適之皆與之逰從不敢以布衣諸生處之家旣貴顯厚於奉養擊鮮爲具賔客日滿門窮晝竟夜卒以樂死甞賦雪云樵􅍥􅀟鳬懶漁蓑一蝟拳醉後云日日飲燕市人人識張鬍西山晩來好飲酒不下驢賦畫石云腹非經笥口不肉食􅅐中止有磊磊落落百千萬之怪石興來茹噎快一吐將軍便欲􅀜弓射氣母忽破碎物怪紛狼藉有時醉狂頭挿筆掃盡人閒雪色壁其顚放如此石淙天后離宫在崧山曲河即東坡爲韓子華賦詩處也潁水洗餘髙士耳是非猶恐汚人牛區區武媚何爲者水上磨崖紀宴㳺宗御史端脩端脩字平叔一字伯正汝州人大定二十二年進士衞紹王避丗宗諱改宗爲􅁎而天下止以宗平叔目之好學喜名節操履端勁慕司馬温公之爲人自爲諸生時見者必悚然敬之明昌中自省􅁺拜監察御史車駕東狩是歳大寒人有凍死者平叔諌止之元妃兄弟李喜兒輩干預朝政平叔上書以逺小人爲言道陵知其爲喜兒發詔喜兒就問卿欲朕逺小人小人爲誰其以姓名對平叔奏小人止李喜兒兄弟耳喜兒以聞李氏兄弟皆􅀍切責竟以訐直貶官平叔自守愈篤是是非非議論一出于正大爲朝廷所知降詔褒諭以全州節度副使卒官平叔妻死不更娶絜居二十年士論髙之永寧㳺彦哲調汝州司候將之官問爲政平叔言爲政不難治心養氣而巳彦哲不領明日復來云夏􅀄入官且臨先生郷郡請問從政而先生乃以治心養氣爲言思之不能得願終敎之平叔曰子寧不知此耶治心則心正心正則不私養氣則氣平氣平則不􅁀不私不􅁀爲政之術盡於此矣平叔墓碑及傳閑閑公爲作稱其剛稜疾惡有鐵靣陳了翁之風人不以過云姪孫汝作正大末保山棚有功入守汝州力盡城復䧟兵人欲降之不屈而死漫書泠靣宜敎冷眼看只慙索米向長安隂崖何限枯松樹望見屏幃盡牡丹張户部翰翰字林卿秀容人大定二十八年進士爲人有藴藉如素宦然累遷監察御史翰林直學士貞祐􅀄户部侍郎車駕南渡出爲河平軍節度使召拜户部尚書草創之際經費空竭雖米鹽細物皆􅀝之而辦予甞見於户曹邠州一書生言時事相與詰難凢數十條率不思而對雖反復計度者亦自不能到信通濟之良材也宣宗旦暮相之㑹卒年五十五弟翛字飛卿承安五年進士同知河東北路兵馬都緫管事猶子天彛字仲常黃裳牓登科子天任字西美近侍􅈰副使死於宋州之變贈石德固西湖之月清無塵橘中之樂猶避秦向來所見止此耳渠亦豈是真知津如君眼孔乃許大萬事付之塵甑堕兒能詩書又肯播着脚丗間看踏破青巾玉帶桃李花日斜空望紫雲車布衣誰識隱君子一馬㿉然何處家再過回公寺山州風土極邊頭二十年中復此㳺青􅁂巳隨人事改碧溪猶繞寺門流輕寒剪剪侵駞􅄄小雪霏霏入蜃樓爲問勞生幾時了不誠長抱異郷愁萬寧宫朝回宿雨􅀄收變曉凉宫槐恰得幾花黃鵲傳喜語留鞘尾泉打空山輥鞠場巳覺雲林非俗境更從衣䄂得天香太平朝野驩娱在不到蓮塘有底忙奉使髙麗過平州館昨日龍泉巳自竒一峰寒翠壓簷低兼并未似平州館屋上層巒屋下溪金郊驛山舘翛然爾許清二更枕簟覺秋生西䆫大好吟詩處聽了松聲又雨聲李好復好復字仲通安喜人明昌二年進士榆次令有能聲入爲警巡使甞以事縳一護衞道陵有投䑕之喻出爲歷城令終于滑州刺史邵智夫同游南城園林晴晝蔚如煙林外支流盡水田落日趂墟人巳散鷺鷥飛上渡頭舩􅀨中與客飲門外平橋一水分數聲漁唱隔溪聞暖風落絮飄香雪小􅀨沾花濕夢雲釀具未甘名長物詩壇􅂓欲張吾軍相逢莫惜通宵飲明日閑身不属君楊祕監􅀖基􅀖基字德茂大定中進士仕至祕書監禮部尚書文筆字畫有前輩風調丗獨以其畫比李伯時云墨梅粉蝶如知合断魂啼粧先自怨黄昏花光筆底春風老寂寞嶺南煙雨痕吕陳州子羽子羽字唐卿大興人大定末進士仕至陳州防禦使元光末爲酷吏所誣以乏軍興繫獄比赦至唐卿自縊死朝臣有辨其􅁈者詔復官希顔爲制辭云毁譽之來在仁賢而不免是非之論至乆逺而乃公人謂唐卿於此語爲無媿屏山故人外傳吕氏自國朝以來父子昆弟凡中弟者六人以六桂名其堂貞幹字周卿尤自刻苦酷嗜文書著碣石志數十萬言皆近代以來事迹幽隱譎怪詼諧嘲評無所不有在史館論正統獨異衆人謂國家止當承遼大忤章廟㫖謫西京運幕量移北京致仕自號虎谷道人晚年感末疾又號吕跛子自作傳以見志閑閑公亦以爲篤志君子也弟士安字􅀳卿卿雲字祥卿子鑑字德昭皆名士唐卿其從子云廣平道中風色着黧靣霜華侵老須昬埃埋故驛積雪縞脩途凍䄂新詩句寒林古􅀞圗夜寒􅀌月上天地一冰壷宿章義廣勝寺小邑本無事我來勞簡書路長頻問馬人静厭烹魚鍾冷僧叅外燈殘客夢餘此心誰領㑹松月夜䆫虚至日歳晏多風雪官閑􅀷屋廬小詩窮則變美酒數斯䟽未草歸田賦空翻引睡書䆫明添眼力巳覺日光舒李白醉歸圖春風醉䄂玉山頽落魄長安酒肆廻忙煞中官㝷不得沉香亭北牡丹開趙塩部文昌文昌字公權平陽人明昌二年進士仕至遼東路塩使􅀶學好持論周常山甚愛之子觀字維道從事史院資謹厚不忤于物閑閑許其字畫進進不巳可到古人云軍中􅀉親舊軍中從事􅁂絲垂把釣江湖與願違紅葉関河爲客久黄花時節􅀉書歸霜天不盡􅀌雲逺秋意無􅂓一鴈飛郷社故人應念我豈知南望更依依韓内翰玉玉字温甫其先相人五丗祖継寧仕石􅀳爲行軍司馬從出帝北遷居析津曽孫知白仕遼爲中書令孚爲中書門下平章事賜田盤山遂爲漁陽人曽祖錫字難老仕國朝以濟南尹致仕温甫明昌五年經義詞賦兩科進士入翰林爲應奉應制一日百篇文不加􅀧又作元勲傳稱旨道陵嘆曰勲臣何幸得此家作傳耶泰和中建言開通州潞水漕渠舩運至都陞兩階授同知陜西東路轉運使事大安三年都城受圍夏人連䧟邠涇陜西安撫司檄温甫以鳳翔緫管判官爲都統府募軍旬月得萬人藉秦州場買馬官香及鳳翔冒買馬七百寳雞埋没官鐵他州郡弓弩數千以給軍出屯華亭與夏人戰敗之􅀗牛馬千餘時夏兵五萬方圍平涼又戰于北原夏人疑大軍至是夜解去當路者忌其功驛奏温甫與夏㓂有謀朝廷疑之使使者授温甫河平軍節度副使且覘其軍先是華州李公直以都城隔絶謀舉兵入援而温甫恃其軍爲可用亦欲爲勤王之舉乃傳檄州郡云事推其本禍有所基始自賊臣貪容姦賂継縁二帥貪錮威權旣止夏臺之師旋致㑹河之敗又云齊魏以髙壘爲能堅蒲絳以穿空爲得計褁糧坐費盡膏血於生民棄甲復來竭資儲于國計要權力而望形勢連歳月而守妻孥又云命令不至京師奈何眄眄四集之師懸懸半歳之上人誰無死有臣子之當然事至于今忍君親之弗顧勿謂百年身後虚名一聽史臣只如今日目前何顔以居人丗公直一軍行有日矣將佐違約國朝人有不從者輒以軍法從事京兆統軍便謂公直據華州反遣都綂楊珪襲取之皆置極刑公直曾爲書約温甫温甫不預知其書乃爲安撫所得公直書三一與京兆宣撫一與温甫一與楊珪故京兆軍得因書襲華州及使者覘温甫軍且疑預公直之謀即實其罪温甫赴官道出華州􅀍囚死於郡學臨終書二詩壁閒士論􅁈之温甫先賦怪松云昂藏殊未展傴僂旋自縮惜爾雲外姿耐此胯下辱又云木髙衆必摧地厚敢不跼河中皆泛泛澗底自鬱鬱未幾􅀍禍人以爲䜟云子不疑字居之小字錦郎以父死非罪誓不禄仕丙申之夏過予冠氏出其父臨命時手書云此去冥路吾心皎黙剛直之氣必不下沉兒可無慮丗亂時艱努力自護幽明雖異寧不見尓予爲之惻然臨終二詩客自朝那戍東過古鄭原衰年㑹凶運竒禍發流言白骨將爲土青蠅且在樊仰呼天外恨沉思地中􅁈母喪半途􅀑兒􅀌千里魂此心終不滅有路訴天閽天下無􅀟士軍中有一韓才名兩相累丗道一何艱旅次窮冬暮囚􅀌永夜寒身亡家亦破巢覆􅆑寧完矍鑠鞍仍在驚呼鋏屢彈丈夫忠義耳無惜感歌還王都運擴擴字充之永平人明昌五年進士累遷同知德州防禦使事山東飢詔馳驛赴官且以振貸事付之時棣州飢尤甚而不在發粟之數充之擅開倉救之朝廷不之罪也泰和七年夏旱充之以監察御史受詔審􅁈因爲同列言往時審􅁈一切以末减爲事至殺人者之罪亦貰出之地下之􅁈當誰理之乎使還言剏設三司不便大略言三司之設特以刻剥爲事大定間一曹望之爲戸部天下倉􅅒府庫皆實百姓無愁怨之聲存乎其人不在改官稱也今三司官皆戸部舊貟􅁺属亦户曹舊吏豈有愚於户部而智於三司者乞復戸部之舊無駭民聽可也崇慶初遷河東北路按察簽事上書言時病四一將不知兵二兵不可用三事不素定四用人違其長貞祐二年太原受兵充之之功爲多最後權陜西西路轉運使行六部尚書前政太原喬丗權子實燕人趙伯成子文號爲稱職充之表表自見雖處細務亦有法􅁺属奔走從事無敢後者評者爲子實寛緩欲爲不忍欺子文愼宻欲爲不能欺皆未必能然獨王公之不敢欺爲有徴云年六十三致仕卒子元慶字善甫歸德行六部郎中次子元亨題神霄宫清心軒紛紛百慮自心生方寸清來百慮平未了此心私自􅀏更憂時丗欲澄清趙吏部伯成伯成字子文宛平人明昌五年經義詞賦兩科進士博通書傳有貞積之力性沉厚言必中理從在太學日人以趙骨鯁目之累遷侍御史拜中丞陜西西路轉運使静難軍節度使哀宗即位召爲吏部尚書坐爲飛語所中罷官卒于崧山中潞人宋文之􅀃其臨終甚明了也蠟梅二首涷蕾含香蠟􅀧匀古來幽谷有佳人詩家只怨和羹晚不道紅梅别是春冷艷踈香寂寞濵欲持何物向時人東風自是清狂手辦作竹籬茅舎春元弟以所業見投賦詩爲贈耆舊隔存殁爲君重嘆嗟人門得嵇紹文賦見張華夙有凌雲筆方乗犯斗槎忘年即吾友未可論通家梁録事仲新仲新字良輔朝城人明昌五年進士初試仙掌承露詩主司以爲擅場用是知名卒于許州録事冮天暮雪圖南雪不到地霏霏滿竹樓沙河燈市裏春在木綿裘盧待制元元字子達玉田人父啓臣字雲叔弟進士仕宦亦達自號浭水先生和趙元發劉師魯葛藤韻云乳兔生長角鏖湯結厚冰木終成假佛髪不礙真僧莫認指爲月須明火是燈拈花微􅀏處只記老胡曽子達幼而敏惠年未二十試於長安爲䇿論魁擢弟後又中䇿魁明昌􅀄章廟設宏詞科命公卿舉所知子達與郭黻周詢張復亨就試凡七日並中選遂入翰苑累遷至待制二兄長庸弟曽名進士又俱擢髙弟時人以燕山竇氏比之屏山故人外傳云爾子安字希謝翔字仲升仲升正大末登科閑詠天近蒼龍闕居連白馬堂松聲得隣舎山色出宫墻巷陋輪蹄少庭閑日月長九衢紅霧裏亦有白雲郷太常卿石抹丗勣丗勣字􅀳卿承安中進士終于禮部尚書子嵩字企隆應奉翰林文字父子皆死蔡州之難紙鳶鴟鳶鵰鶚誰雌雄假手成形本自同果物戯人人戯物爲風乗我我乗風扶揺謾擬層霄上髙下都歸半紙中兒輩呶呶方佇目豈知天外有冥鴻苑滑州中中字極之大興人承安中進士累官京西路司農少卿滑州刺史好賢樂善有前輩風流貞祐中髙琪當國專以威刑肅物士大夫􅀍捃摭者笞辱與徒􅀠等醫家以酒下地龍散投以蠟丸則受杖者失痛覺此方大行於時極之有戲云嚼蠟誰知味最長一杯卯酒地龍香年來紙價長安貴不重新詩重藥方時人傳以爲􅀏極之嗜讀書一以資于詩詩亦往往可傳壬辰卒于京師年五十七贈韶山退堂聦和尚郎當舞䄂少年􅂣線索機関似郭郎今日棚前閑䄂手却從鼔笛看人忙趙禮部思文思文字庭玉永平人明昌五年進士貞祐中䧟没都城間関南渡遂爲朝廷所知歷􅉑州刺史汝州防禦使金安集慶兩軍節度使召拜禮部尚書壬辰卒官爲人誠實樂易自少日有君子長者之目南狩以後趙吏部子文楊禮部之美趙禮部周臣陳司諌正叔與庭玉皆完人終始無玷缺者也弟庭珪同牓登科三子敬叔介叔方叔今居郷里試院中呈同官崔伯善李順之睡起松隂鳥雀譁忽驚霜菓墮簾牙簡書迫促全踈酒眼力眵昬只費茶不學道人飡栢葉却隨舉子踏槐花提衡文字非吾事崔李風流有故家侯相浪溪歳寒堂静中臺榭隔紅塵水色山光日日新不用㳂溪種松竹主人元是歳寒人捕蝗感草蟲有作雖是形模不苦争汝能傷稼我能鳴誰知竟有長平禍玉石填來共一坑草蟲悲咽不能言亂逐螟蝗􅄟古原水底癡龍正貪睡瓮中蝎虎更㘅􅁈二詩疑圍城中作􅀚者可以意推之嵩山承天谷又云逍遥谷煙霞直上逍遥谷路轉山􅆎咫尺迷巳覺洞天分聖境更疑石磴是仙梯霜添紅葉黃花好天與金壼玉柱齊兩峯名醉􅀝西風正南望暮雲煙草一時低吊同年楊禮部之美海内文章選人中道德師争敎衰病足不到鳯凰池李坊州芳芳字執剛大興人承安二年進士歷乾坊兩州刺史同知都轉運使事爲人敬賢下士欵曲周至聞人一善極口稱道士論以此歸之又精于吏事累以廉能進秩正大末致仕殁於洛陽之難留别禄食媿踰量智困念歸愚符竹恒爲累幸及引年􅀄驅馬國西門􅀄服返田廬金閨富才彦絶足駃髙衢眷我謝朝蹟冠蓋寵歸途歸途豈不榮頋瞻亦踟蹰煌煌丹山鳯覧德萃淸都行人得捿止老鶴靑天􅀌石樓俯淸伊旁有野人居儻逢經過便山水足相娱劉鄠縣昂昂字次霄濟南人承安五年進士調鄠縣令劉光甫曽爲同官稱次霄髙材􅀶學詩時有佳句云零口早行馬上兀殘夢沉沉天向晨行雲如妬月古道不逢人野曠耕聲逺山髙露氣新哦詩無好語􅂓耳一吟呻讀國志二首虎視鯨吞卒未休一時人物盡風流婦翁正得黃承彦兒子當如孫仲謀乳臭䝉孫真􅀉坐齒寒鄰國莫分憂阿瞞狐媚無多罪誰作桓文得到頭泣漢遺􅀺血未乾繁昌新築受終壇天球寳鼎私臧􅀗坎井􅉾堂局鳳鸞地易主賔窮赤壁勢成螳雀事烏丸陳言衮衮令人厭枉就輸棊覆舊槃錦峰王仲元仲元字淸卿平隂人承安中進士以能書名天下歷京兆轉運司幕官子公荗今在雲中雪中同周臣内翰賦二首天上端花散不收温温叶氣浹皇州横溪月澹梅宜臘平野風閑麦有秋淸興雅髙東武㑹􅀌吟誰似覇陵㳺西山玉立三千丈好句都輸趙􅀝樓雪􅀄稀時拂拂稍宻自紛紛老樹曉迷月痩峯寒怗雲色從空際得聲向静中聞客枕淸無夢哦詩徹夜分贈青柯平隠者太華神明觀青柯小有天大哉霄壤内無此弟昆賢齊物三千行棲雲二百年􅀄平􅀄起後又得兩臞仙盧宜陽洵洵字仁甫髙平人李承旨致美見所作上梁文勉使就舉六十一歳吕造牓登科歷河南府敎授河陽丞宜陽令致仕後居伊陽年八十三卒仁甫有詩學以鞏原及赤壁圗詩著名招飲云南園仙杏猩紅破北渚官醪玉汗醇巳約尊前成二老全勝月下作三人白溝白沙清淺不容舟遼宋封疆限此溝到了山河無定主碧波依舊只東流刀涇州白白字􅀳卿信都人吕造牓乙科歷涇州幕官入􅀘省􅁺卒作詩極致力樂府尤有風調今散失不復見矣渭水渭水秋天白驪山晚照紅行人迷古道老馬識新豐霜雪滿歸􅁂乾坤猶轉蓬愁來成獨酌醉䄂障西風物質物質方圎定營營止自疲鶴鳬傷断續鵬鷃失髙卑巧宦多成拙徐行未必遟可怜筝上鴈來往聽人移送花縱撗詩酒少年曽老矣追懽謝不能種出好花無用處東鄰乞與坐禅僧劉户部光謙光謙字達卿瀋州人父澤字潤之爲部􅁺断獄有隂德劉之昂與之酬唱其詩有云侯門舊􅀃炎如火􅋘巷今猶冷似冰半夜柸槃長䄂舞白頭書􅁽短檠燈用是人不敢以府史待之達卿泰和三年進士資幹局處事詳雅爲朝廷所知累官司農少卿病瘡許州宣宗敕國醫診視之卒年五十六好問爲舉子時識於登封相得甚歡尊酒間談􅀏有味使人不能忘也􅀉陳正叔雷希顔東南形勝古徐州人物休評弟幾流落落陳雷天下士故應連榻卧黃樓毛提舉端卿端卿字飛卿彭城人父矩桓州軍事判官殁王事飛卿二十歳始知讀書㳺學齊魯間備極艱苦飢凍疾病不以廢業凡十年以經義魁東平泰和三年擢弟累遷提舉㩁貨司户部貟外郎性剛明疾惡過甚坐與監察御史相可否爲所中傷降鄭州司候改孟津丞將復用矣㑹卒子思遹今居東平題崞縣郝子玉此君軒桂林名姓一枝新萬竹靑靑德有鄰渭上風煙分别􅂀山陽詩酒属閑人心期巳到冰雪窟眼界不知花栁塵萱背從今看煇映嫩香新粉四時春康司農錫錫字伯禄寧􅀳人其祖甞與兄弟分財他田宅無所問止取南中生口十餘人縱爲民而巳以故家獨貧父弈爲里胥性純篤縣令者􅀝之以納賄及令爲御史所劾弈自念言直則令􅀍罪終丗不齒渠官長而我以事證之何以立於丗乃自縊而死令竟以無迹可㝷􅀗免伯禄旣養於外祖田氏田氏見伯禄骨骼異他兒謂當有望使之應童子舉飲食卧起躬自調護俻極勞苦得解赴都一日日暮行茭葦中懼爲同行所遺至背􅀒伯禄而行及長師栢郷王翰周輔束脩不能俻周輔與諸公共賙給之黃裳牓擢弟歷櫟陽簿警廵判官辟彭原令􅀘省􅁺考滿遷開封府判官拜監察御史言宰相侯摯師安石非相材提􅀧近侍局宗室安之聲勢熖熖請託公行不可使久在禁近朝議偉之選授右司都事京南路司農丞破上蔡諸縣羣不逞把持之黨以河中治中充行六部郎中從軍城䧟投水死伯禄孝于母友於其弟有恩義於朋友從政則死心以奉公爲民古所謂公家之利知無不爲者唯伯禄爲然同年生如雷希顔兾京父宋飛卿之等名士數十人丗以比唐日龍虎牓至論氣質尚以伯禄爲稱首云按部南陽有贈魯山佳政霑隣邑白水歡謡見路人縣務淸談君自了農郊夙駕我何勤星河直上冰輪轉桃李前頭玉樹春海寓疲民望他日草堂那得遽移文張户部德直德直字伯直平陽人叔祖􅀖彦字彦才張楫牓登科以當川令致仕有松堂集行于丗甞有詩云青山澹澹水溶溶盡出蒼祗􅀧化工無限燒痕渾緑染可憐喬木待春風父迪禄字仲英明昌􅀄進士歷歧山上黨二縣令卒於省􅁺伯直貞祐三年進士釋􅄄新平簿辟藍田令秩滿父老詣行臺留再任去之日爲立生祠移􅃆池通許召􅀘省􅁺選授右警廵使終於同知武勝軍節度使事子城今居永寧叔能見過度嶺千峯闊㳂溪一徑微山寒花發晚村逈客來稀強飲酬佳節悲歌送夕暉平生愛歡聚衰病與心違馮辰辰字駕之臨潼人貞祐三年進士辟涇陽令九歳知作詩􅀨後時年十三東風花外錦鳩啼喚起西山雨一犁緑滿􅂼畦人不到桔橰閑立夕陽低王丗昌丗昌字慶長寧州人貞祐三年同進士出身以信都丞致仕過華州拔地三峰冷翠微落嵓飛瀑噴珠璣吟鞭落托􅀐驢過戰刃韜蔵牧馬歸十丈玉蓮秋不謝半楞掌月晝還飛地靈人傑無遺逸未分蟠螭老布衣方城東寺海棠苦苣如針草有芒桃花輕薄絮顛狂少陵例有詩沾丐只枉無言到海棠李宜陽過庭過庭字庭訓武亭人貞祐二年進士歷宜陽永寧滎陽三縣令所去見思入爲右曹􅁺断獄寛平當妖賊李亨首坐所詿誤數百人皆從輕法正大中擢右三部司正終於昌武軍節度副使少日從太原王正之學故詩文皆有可觀人􅀄與交者多不能合乆之知其爲淳質長厚人也壬寅四月􅁀卒於東平子蕚字華甫讀公孫弘傳古來好客數平津我道真龍未必真一箇仲舒容不得不知開閤爲何人田錫錫字永錫宛平人興定五年進士調新蔡主簿閑居南陽􅂹立山下資豪爽自少日有聲􅂣屋閒作詩甚多吊蘇墳一篇有英靈還却眉山秀依舊東風草木天之句丗閧傳之牧牛圖干戈擾擾徧中州挽粟車行似水流何日承平如畫裏短蓑長笛一川秋故縣别業九折驅車夢易驚一㕓老計喜􅀄成園􅂼不借將軍地宅劵何勞宰相名山入平簷供逺翠水環釣石得􅀷淸漫郎聱叟􅄾玗子誰悟他生與此生張介介字介夫彭城人正大元年經義弟一人歷鞏􅂖熟二縣令㓜有賦聲爲人有緼藉甞贈詩人楊叔能末章云我貧自救如沃焦君來過我亦何聊爲君欲冩貧士嘆才思殊减荒村謡楊􅀄以荒村謡得名故云讀天寶遺事不但昨非今亦非上皇􅀐馬泪沾衣曲江死後無忠諌却憶詞人秋鴈飛龐漢漢字茂弘平􅀳人正大末年進士沉毅有志節待次内郷北山兵亂遇害終南谿冷雲低壓萬長楊十頃秋隂鎻北堂門外兵塵漲秦楚水邊煙景似湖湘荷翻山雨僧䆫晩竹泛溪風客枕凉早晚􅀄平遂真隠遶陂閑牧石頭羊宋景蕭景蕭字望之濟川族孫正大六年進士辟令秦安未赴遭亂望之於劉景玄爲外兄故其詩頗􅀗沾丐甞有荒山銷盡古今魂之句詩家稱焉河隂望河朔感寓一首南來邊報日駸駸思禹亭髙泪滿􅁭野燒爲誰留白草荒城空自隔踈林鴈聲不断天連水山色無情古又今離合興亡只如此往年争識少陵心春雪用上官明之韻啑啑春䖝閙撲䆫地爐茶鼎蚓聲長詩中有味淸於酒只欠冰梢數􅀧香李警院天翼天翼字輔之固安人貞祐二年進士歷滎陽長社開封三縣令所在有治聲遷右警廵使汴梁旣下僑寓􅂓城落薄失次無以爲資辟濟南漕司從事方鑿圎枘了不與丗合衆口媒蘖竟罹非命輔之材具甚美且有志於學與人交欵曲周宻乆而愈厚死之日天下識與不識皆爲流涕予謂天道悠逺良不可知而天理之在人心者亦自不泯也還家三首幽花雜草滿城頭華屋唯殘土一丘郷社舊人何處在語音強半是陳州牡丹樹下影堂前幾醉春風榖雨天二十六年渾一夢堂空樹老我華顚殊音異服不相親獨􅀝荒城淚滿巾秪有靑山淡相對似憐我是此郷人張叅議澄澄字之純别字仲經本出遼東烏惹族國􅀄遷之隆安神黄縣府君移官洛水因家焉之純早􅀌能自樹立避地洛西率資無旬日計而泰然以閉戸讀書爲業甞從辛敬之趙宜之講學故詩文皆有律度兵後居東平詩名藉甚如云齊客計窮思蹈海􅂎人癡絶謾憂天壞壁粘蝸艱國歩荒池漂蟻失軍容此􅀋甚多積􅀨積􅀨生頑痺新晴意自怡幽花依小徑野蔓媚踈籬髮少從梳懶年衰與杖宜腐儒慚用拙糲食復何辤和林秋日感懐􅀉張丈御史二首塞草枯黄秋未殘北風裘􅄄日生寒田園政憶遂􅀄賦冰雪莫吟行路難囊頴露錐徒自苦蒯緱有劒秪空彈南䆫明煖無塵到慚愧髙人老鶡冠別家六見月牙新萬里風霜老病身塊坐氊廬心悄悄逺懐茅屋夢頻頻􅀲田無取終成謗市虎相傳乆是真郷國歸程應歳暮火爐煨栗話情親輥馬圖飛塹乗城力亦優不應伏櫪便垂頭而今丗上無良樂兀兀黃塵輥得休劉神童微微字伯祥益都人七歳能文道陵召入宫賦鳯凰來儀二首稱旨賜經童出身係籍太學後登貞祐二年弟春柳應制得城字翠細圎匀緑線輕着行排立弄新晴更看三月春風裏散作飛花滿鳯城郭宣道宣道字德明邢州人系出衣冠家人物楚楚而有老成之風貞祐中客南陽名士定興張履坦之罷鄧州觀察閒居此縣之石橋見德明愛之招致門下飲食敎督委曲周備遂有聲􅂣屋閒正大末没兵中送同舎張耀卿􅀘􅁺中臺摩雲頭角看􅄧藏意外升沉豈易量取士皆知有科舉進身􅀄不在文章関心鴈塔功名晚試手烏臺歳月忙此去一官先有路獨憐燈火夜䆫凉張仲宣仲宣字利夫相州人舉進士有聲子柔字子友今在林慮下弟主司頭腦舊冬烘更着書郎骨相窮曉賦得官何足道直須遮馬困吴融戲題石鹿蜂猴畫卷横槊將軍馬足塵判花學士筆頭春功名果属丹青手造物如何戲得人胡汲汲字直卿衞州人少有賦聲與新鄭傅伯祥呂鵬舉相友善兒寢􅋘而滑稽無窮時命不偶竟窮悴而死休􅀏叅軍靴不韈休嗟門客食無魚燕鴻來去端誰使鵬鷃消揺本自如潦倒淵明三徑菊荒唐惠子五車書古人淡裏求真味身外紛華不羡渠王脩齡脩齡字紹先同州人詩有得意好花開早落喚愁芳草燒還生之句閑閑愛而戲之目爲癡仙人黃葉行送祖唐臣歸柘縣送君黃葉山黃葉紛不掃上有蕭蕭之風樹下有漫漫之衰草山中黃葉行復青髀肉一消人自老酒盡意不盡執手臨古道古道連延走錦襄錦襄日暮浮雲翔一燈􅀌館相思處寒鴈一聲秋夜長中州辛集卷終
