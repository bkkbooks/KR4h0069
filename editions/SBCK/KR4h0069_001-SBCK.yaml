body:
  text: 宇文大學虚中五十首吳學士激二十五首張祕書斛一十八首蔡丞相松年五十九首蔡太常珪四十六首髙内翰士談三十首馬御史定國三十一首宇文大學虚中虚中字叔通成都人宋黃門侍郎以奉使見留仕爲翰林學士丞旨皇統初上京諸虜俘謀奉叔通爲帥奪兵仗南奔事覺繫詔獄諸貴先􅀍叔通嘲􅀏積不平必欲殺之乃鍜錬所藏圖書爲反具叔通嘆曰死自吾分至於圖籍南來士大夫家例有之喻如髙待制士談圖書尤多於我家豈亦反邪有司承風旨并寘士談極刑人至今寃之鄭下趙光道與余有十五年家丗之舊守官代郡之崞縣聞余以使事覉留平城與諸公相從皆一時英彦遂以應舉自免去駕短轅下澤車驅一僮二驢扶病以來相聚凡旬日而歸昔白西風蕭颯百草黃南齋白菊占秋芳主人好事不專饗擷送客館分幽香幽香淸豔兩難得冰雪肌膚龍麝裛悄然坐我蘂珠宫玉斧瑶􅁎皆舊識仙家蓺菊名日精我今号爾爲月英月中風露秋夕好感此仙種來曽城憑君傳與金天令月與霜姿駐淸景重陽好伴白衣來五柳先生憶三逕還舎作燕山歸來頭巳白自􅀏客中仍作客此生悲歡不可料況復吾年過半百故人驚我酒尚狂爲洗缾罍貯春色酒䦨人散月盈庭静聽淸渠流㶁㶁庭下養三鴛鴦忽去不反戲爲作詩先生久忘機爲爾虞繒繳一朝長羽翮萬里翔寥廓誰信惡溝鴟忽作華表鶴豈無三玉鐶遺音嗣黃雀予寫金剛經與王正道正道與朱少章復以詩來輒次二公韻次正道韻平生幸識繫珠衣窮走佗郷未得歸有客爲傳低樹法此心便息漢隂機百千三昧一門入四十九年諸是非􅀉與香山老居士要憑二義發餘輝次少章韻前丗曽爲粥飯僧此生隨處且騰騰經中因認人我相敎外都忘大小乗寫去欲云居士頌信來如續祖師燈佗年辱贈茅庵句誰謂因縁昔未曾郊居芒屨松冠野外裝茶鐺藥竈靜中忙含風荇逐波紋展着雨花連土氣香停䇿仰簷朝覓句被襟穿樹晩追涼蓬蒿似欲荒三逕踈􅂴誰知意更長歳寒堂洞戸延清吹庭除貯緑隂不隨風月媚肯受雪霜侵潤入珠泉爽聲傳玉帳深主人留勝賞同此歳寒心重陽旅中偶記二十年前二詩因而有作舊日重陽厭旅裝而今身丗更悲涼愁添白髮先春雪淚着黃花助晩香客館病餘紅日短家山信斷碧雲長故人不恨村醪薄乗興能來共一觴春日北洹春事休嗟晚三月尚寒花信風遥憶東吴此時節滿江鴨緑弄殘紅已丑重陽在劒門梁山鋪兩年重九皆羇旅萬水千山厭逺㳺白酒黄花聊度日青萍緑綺共忘憂却憐風雨梁山路不似蓴鱸楚澤秋何必東臯是三逕此身天地一虚舟生日和甫同諸公載酒袖詩爲禮感佩之餘以詩爲謝詞人詩句壓離騷按膝長吟意自豪䄂裏虹蜺衝霽色筆端風雨駕雲濤將衰難稱千年祝増重虚蒙隻字褒太史巳應飛急奏文星偏傍使星髙和題稽古軒堆架縑緗粲蔀居眼前長物掃無餘避囂肯要鄰人􅁲論友先㝷上丗書汲古不須憂綆短隨波聊復任舟虚勿欺丈室纔容膝六合神㳺有日車巳酉歳書懷去國忩忩遂隔年公􅀻無益兩茫然當時議論不能固今日窮愁何足憐生死巳從前丗定是非留與後人傳􅀌臣不爲沉湘恨悵望三韓別有天涇王許以酒餉龍溪老人幾月不至以詩促之龍溪叔通別號也先生寂寞草玄文正要侯巴作富鄰客至但須樽有酒日髙不怕甑生塵急催嶺外傳梅使來餉籬邊采菊人巳掃明䆫供􅀧筆爲君擬賦洞庭春從人借琴嶧陽慣聽鳯鶵鳴㵼出泠然萬􅄜聲巳厭笙篁非雅曲幸從炊爨脫餘生昭文不皷縁何意靖節無絃且􅀉情乞與南冠囚縶客爲君一奏變春榮過居庸關奔峭從天拆懸流赴壑清路回穿石細崖裂與藤争花巳從南發人今又北行節旄都落盡奔走愧平生晩􅀫耀武􅀜山與煙雲暝溪兼冰雪流寒枝啼秸鞠煬室聚咿嚘此日征行困何時喪亂休尚矜争席好無復舊鳴騶安定道中落日塵埃壯隂風天地昏牛羊争隘道烏雀聚空村跛曵傷行役光華誤主恩未甘遟暮景伏櫪意猶存上烏林天使三首平生隨牒浪推移只爲生民不爲私萬里翠輿猶逺播一身幽圄敢終辝魯人除舘西河外漢使驅羊北海湄不是故人髙議切肯來軍府問鍾儀拭玉轅門吐寸誠敢將緩頰沮天兵雷霆儻肯矜彫􅁦草芥何須計死生定鼎未應周命改登壇合許趙人平知君妙有經􅀖䇿存取威懷萬丗名當時初結兩朝歡曾見軍前捧血槃本爲萬年依䕃厚那知一日遽盟寒羊牽巳作俘囚献魚漏終期綱罟寛幸有故人知底藴下臣􅀗考敢謀安姑􅂫滕惇礼榜所居閣曰齋心成都宇文某作詩以廣其意不是慿虚避丗喧此中於物本無縁静看畏影徒勞爾題作齋心亦且然意識巳隨言語断生涯聊任歳時遷老夫未渉天㳺趣三復南華第四篇和髙子文秋興二首沙碧平猶漲霜紅粉巳多駒年驚過􅂩鳬影倦隨波散歩􅀟扶老棲身一養和羞看使者節甘荷牧人蓑好問按養和几名事見江湖散人集扶老見歸去來辝揺落山城暮棲遟客舘幽葵衰前日雨菊老異郷秋自信浮沉數仍懷頋望愁蜀江歸棹在浩蕩逐春鷗又和九日老畏年光短愁隨秋色來一時旌節岀五見菊花開強忍玄猿淚聊浮緑蟻盃不堪南向望故國又叢臺中秋覓酒今夜家家月臨筵照綺樓那知􅀌舘客獨抱故郷愁感激時難遇謳吟意未休應分千斛酒來洗百年憂四序回文十二首春短草鋪茸緑殘梅照雪稀暖輕還錦褥寒峭怯羅衣翠漣冰綻日香徑晩多花細笋抽蒲宻長條舞柳斜折花幽檻小傾酒緑盃深蝶舞輕風曉鸎啼老樹隂夏翠宻圍䆫竹青圎貼水荷睡多嫌晝永醒少得風和草徑迷深緑蓮池浴膩紅早蟬鳴樹曲鮮鯉躍潭東暴雨隨雲驟驚雷隱地平好風揺箑透輕汗浥冰清秋晚日欣簾捲凉風覺􅃑揺逺吟髙興遣長醉􅀫愁銷短葦低殘雨虚舟帶晩潮断鴻歸暗浦踈葉墜寒梢慼慼蛬吟苦茫茫水驛孤日銜山色暮霜帶菊叢枯冬鶻徤呼風急烏啼促景殘窟深宜兔蟄蒲折䕃魚寒裂瓦寒霜重鋪䆫月影清滅燈驚好夢孤枕念深情秀栢留隂緑芳梅蘸影斜溜簷冰結玉裝樹雪飛花燈碑五首清隂靄靄匝城闉萬井熈熈桃杏春紫陌傳呼旌斾出重臣新佩玉騏驎軸軸天章拜異恩驔驂花􅀐映朝暾手持禁鑰千門肅官壓東宫二品尊壘原清照白登山彌隴連天麦浪寒劒㦸漸銷農器岀人家只識勸農官九夏南風入舜琴㤙風澤雨浹飛沉陪京最是儀形地先識君王解愠心枹皷無聲訟獄空懽謡擊壤萬家同時人共解班春意兵寢刑清第一功舘中書事雨來蒸鬰似江郷雨過西風特地涼尚有庭花共客恨可無尊酒慰幽芳時習齋未厭平生習氣濃更將餘事訓兒童魯論二萬三千字悟入從初一句中醉經齋傍人但􅀏腹便便枕藉詩書正晝眠不識先生眞悟處未離文字巳逃禪醉墨齋旋汲清泉起縠紋定知婁永是前身箇中自可逃眞性不用淋漓汚􅁑巾烏夜啼汝琴莫作歸鳯鳴汝曲莫裁白鶴怨明珠破璧掛髙城上有烏啼人不見堂中蠟炬紅生花門前紺幰七香車博山夜長香燼冷悠悠蕩子留倡家妾機尚餘數梭錦織恨傳情還未忍城烏爲我盡情啼知道單棲泪盈枕吴學士激激字彦髙宋宰臣拭之子王履道外孫而米芾元章婿也工詩能文字畫得其婦翁筆意將命帥府以知名留之仕爲翰林待制岀知深州到官三日而卒有東山集十卷并樂府行于丗東山其自號也岀散関詩云春風蜀棧青山盡曉日秦川緑樹平悆甫索水墨以詩􅀉之云煙拂雲梢留淡白雲蒸山腹岀深青三衢夜泊云山侵平野髙低樹水接晴空上下星太清宫云玉座煙霞春寂寂石壇星斗夜蒼蒼呈正甫云手版西山聊復爾角巾東第定何時逰南溪潭云竹院鳴鍾疑物外畫橋流水似江南飛瀑巖云數樹殘花喜春在一聲啼鳥覺山深誄鄭邸故伎云玉雪自知塵不涴丹青難冩酒微醺送樂之侍郎云四海蒼生謝安石一言宣室賈長沙送韓鳯閣使髙麗云海東絕域皇華使天上仙官碧落卿偶題云江湖欹枕夢風雪打䆫時此􅀋甚多樂府夜寒茅店不成眠南朝千古傷心事誰挽銀河等篇自當爲國朝第一手而丗俗獨取春從天上來謂不用他韻風流子取對属之工豈真識之論哉山中見桃花李花錦里春風徧海棠别時無計奈紅芳山中桃李渾疑晩猶有殘花断客腸長安懷古佳氣猶能想鬰葱雲閒􅀟闕峙蒼龍春風十里霸陵樹曉月一聲長樂鍾小苑花開紅漠漠曲江波漲碧溶溶眼前疊嶂青如􅀞借問南山共幾峯􅀫湖城簿㕔日遟風暖燕飛飛古柳髙槐靣翠微卷上踈簾無一事滿池春水照薔薇窮巷窮巷無來轍貧家有舊醅牎明怜雪在睡美覺春回菜甲方齊拆梅華亦半開茅簷鳴好鳥節物莫相催偶成二首一畨瘦筍羽林槍松架隂隂盡日涼繞屋雲煙無定態連山草木有真香蟹湯兔盞闘旗槍風􅀨山中枕簟凉學道窮年何所得只工掃地與燒香病後􅀉開父暗蛩咽幽響􅂩月漏微光溪上風雨過翛然有餘凉病瘦鶴骨立伭垂不能翔懷我中山兄開經焚道香猿嘯耿清夜鍾鳴悠夕陽商秋早晩至夢􅄰松楸蒼過南湖偶成杏山松檜紫坡陁湖靣無風亦自波緑􅁂朱顔嗟老矣落花啼鳥奈春何詩人未必皆憔悴丗事從來有折磨列坐流觴能幾日知誰對酒愛新鵝夜泛渦河龍潭輕舟弄素月静夜横清渦天風毛髮亂踈皇燦明河圖經記父老􅁳寞年歳多淵沉三千丈湛碧寒無波微流帶文藻絕岸無柔莎烱如帝鴻鏡可鑒不可磨中蟠至神物役使羣蛟鼉蜿蜿頭角古勁鬛誰敢劘深宫照珠貝頗費蚌與螺何時􅁑陂竹化作陶公梭秋興後園雜樹入雲髙萬里長風夜怒號憶向錢塘江上寺松䆫竹閣瞰秋濤晩春言懷􅀉燕中知舊閑雲􅂥􅂥日暉暉林斧谿春響翠微天氣乍晴花滿樹人家乆住燕􅀟飛鄰村社後容借酒客舎新來未䘺衣遥憶東郊亭畔柳歸時相見亦依依歳暮江南四憶瘦梅如玉人一􅀏江南春照水影如許怕寒粧未匀花中有仙骨物外見天眞驛使無消息憶君清淚頻天南家萬里江上橘千頭夢繞閶門逈霜飛震澤秋秋深宜映屋香逺解隨舟懷䄂何時献庭闈底處愁吴松潮水平月上小舟横旋斫四腮鱠未輸千里羮擣虀香不厭照箸雪無聲幾見秋風起空悲白髮生平生把鰲手遮日負垂竿浩􅄅渚田熟青熒漁火寒憶看霜菊艷不放酒盃乾比老垂涎處糟臍箇箇􅇛述懷旅食空彈鋏歸休合掛冠煙塵榆塞逺風雨麦秋寒巢燕長如客鳴蛙不属官柴門江漲到落日下漁竿喜晴和張魯瞻原野怳新沐豐隆寧丗情鳥歸林靄暝樓射澗虹明春草牛羊逺人家機杼鳴慘舒長有命誰復問隂晴國公女生日席上命賦雪射瑶堦月春回玉女扉雲中三秀草石上六銖衣酒熟鵝兒色身輕燕子飛客槎還泛斗誰解􅁲榰機秋夜豈有㳙埃􅀘盛明強扶衰病厠豪英夜䆫燈火靑相對曉鏡髭􅂡白幾莖年去年來還似夢江南江北若爲情石田茅舎君家近借與林泉送此生招趙資深拾遺別乆皃逾壯道同心更親移居近韋杜相對邈參辰雪少似饒客鳥喧知得春歸期淹幾日莫厭馬蹄頻同兒曹賦蘆花天接蒼蒼渚江涵裊裊花秋聲風似雨夜色月如沙澤國幾千里漁村三兩家翻思杏園路鞭裊㡌簷斜張戡北􅀐張生鞍馬客幽都却􅀏靈光筆法麤秪今白首風沙裏憶向江南見畫圖早春寂寂重寂寂岀門春草齊晩芳猶着樹江漲欲平溪山暝有時雨村深何處雞逺山縁底恨故作傍人低雞林書事箕子朝鮮僻蓬丘弱水寛儒風通百粤舊史記三韓邑聚居巢慣夷裝􅀍髮安猶存古籩豆兼用漢衣冠兔頴家工縳鮭腥俗嗜餐􅀐兵腰玉具府衛挾金丸長袖鳶窺肉都場狖掛竿琴中蔡氏弄指下祝家彈主禮分庭抗賔筵百拜難漬橙粇釀旨滋桂鹿脩乾潑墨松如櫛隤墻石似丹地偏先日出天迫衆山攅鵬翼雲帆逺羊腸石磴盤由來異文􅁤休訝變暄寒事可資談柄誰能記筆端聊將詩邈取歸作􅀞圖看題宗之家初序瀟湘圗江南春水碧於酒客子往來舩是家忽見􅀞圖疑是夢而今鞍馬老風沙張祕書斛斛字德容漁陽人仕宋爲武陵守國初理索北歸官祕書省著作郎有南游北歸等詩行于丗漁陽有峒陽故詩中多及之如賦小􅀌山云天圍秋漲闊山背夕陽􅀌岸樹晴猶濕汀煙近却無巫山對月云雲開千里月風動一天星河池出郭云細草沙邊樹踈煙嶺外村中江縣樓云緑漲他山􅀨青浮近市煙中秋云月色四時好人心此夜偏松門峽云春木有季色野雲無俗姿賦禮部侍郎張浩然遼海亭云晴光摇碧海逺色帶滄洲又賦臨漪亭云雨聲喧暮島水色借秋空秋興樓云碣石晩風催鴈急昭祁寒漲與雲平人多誦之予甞見其文筆字畫皆有前輩風調宇文大學甚激賞之沙邊晚雨漲平堤沙邊獨杖藜長風催鴈北衆水避潮西楚客相逢少呉天入望低故園無路到春草自萋萋東川春日巴蜀三年客江湖萬里情滄波何䖏盡歸棹幾時行丗態浮雲變春愁細草生羣山遮望眼片月上髙城巫山對月懷湖外親友衆壑歛新雨􅀌舟増暮寒巫山今夜月湘水幾人看不得臨湖醉惟愁下峽難􅀟魚慿􅀉逺尺素勸加餐武陵春雪天風吹雪滿千山不見桃花泛碧瀾洞裏仙人貪種玉豈知人丗有春寒盧臺峭㠶亭髙秋客未還何處望郷􅀜喬木蒼煙外􅀌亭落照間􅀨晴山覺近潮滿水如閑目断峒陽路歸雲不可攀髙寺髙寺鳴鍾後􅀌舟落鴈邊巳知歸逕晩故就上方眠石峻溜聲急月髙松影圎明朝下煙靄廻首阻清川寓中江縣樓武江斜轉石文岫獨參天江曰玄武山曰文達緑漲他山雨靑浮近市煙松薪炊白粲水蔓繫紅鮮自喜飄蓬跡安居過兩年廻文二首野曠悲行客湍驚礙去舩夜江清泛月秋草碧連天緑逕斜縈草紅梢半落花曲池風碎月欹岸􅀨摧沙仙門驛聽泉一亭圍古水􅀟磵瀉清流行到雲山暮卧聞風雨秋客塵何日浣病渴此時瘳歸去南溪上輕舟細浪浮夜雨南山􅀨夜􅀫山齋夜深􅀨聲息石室含餘清風枝墮殘滴平安閞道中二首髙林俯青􅁳柯葉森若織陽光巳轉午隂嶺仍半黒峥嵘亂石間行子有苦色臨深地􅀔入渉險天宇塞四顧無所投迹蠒去未息悵然増百憂􅁳􅁳羡歸翼窮冬十日隂積雪千山路晴雲開半嶺落日猶在樹悠悠客心速􅃤􅃤天色暮寒鳥各有依解鞍尚無處㳺魚誤銜鈎玄豹終􅀮霧行行謝冠冕復我林壑趣將渡江無數飛花委路塵不堪重醉楚城春明朝回首江南岸煙􅀨昏昏不見人還家雲林無俗姿相對可終老如何塵中人不見青山好訪香林老風雨無時浪蹴天南浮舟楫信多艱半生夢破寒江月萬里春回故國山歸客自傷青􅁂改髙僧長共白雲閑誅茅借我溪西地未厭相從水石間海邊亭爲浩然賦夙有滄洲趣雲扃夢幾回臨深疑地盡望逺覺天開月湧冰輪出濤翻雪陣來無機同海客鷗鳥莫相猜南京遇馬丈朝美浮雲乆與故山違茅棟如存尚可依行路相逢初似夢舊㳺重到復疑非滄江萬里悲南渡白髮幾人能北歸二十年前河上月尊前還共惜清輝蔡丞相松年松年字伯堅父靖宋季守燕山仕國朝爲翰林學士伯堅行臺尚書省令史出身官至尚書右丞相鎮陽別業有蕭閑堂自號蕭閑老人薨謚文􅂤百年以來樂府推伯堅與吴彦髙號吴蔡體有集行于丗其一自序云王夷甫神情髙秀宅心物外爲天下稱首言少無宦情使其雅詠玄虚不經丗務超然遂終其身則亦何必减嵇阮輩而當衰丗頽俗力不可爲之時不能逺引髙蹈顚危之禍卒與晉俱爲千古名士之恨又甞讀山隂詩引考其論古今感槩事物之變旣言脩短隨化期于共盡而丗殊事異興懷一致則死生終始物理之常正當乗化歸盡何足深歎乃區區列敘一時述作刋紀歳月豈逸少之清眞簡裁亦未盡志情於此耶故因作歌併及之好問按此歌以離騷痛飲爲首句公樂府中最得意者讀之則其平生自處爲可見矣二子珪字正甫璋字特甫俱第進士號稱文章家正甫遂爲國朝文宗特甫非其比也自大學至正甫皆有書名其筆法如出一手前輩之貴家學蓋如此晩夏驛􅀐再之凉陘觀獵山間往來十有五日因書成詩兠羅䓗鬱浮空青曉日馬頭􅀟眼明名山不作丗俗態千里傾蓋來相迎老松閱丗幾千尺玉骨泠風戰天碧應􅀏年年空往來塵土勞生種陳迹山回晩􅀫一川花剪金裁碧明煙沙寒郷絕艶自開落􅁒慰寂寞無流霞明日行營獵山麓古樹寒泉更深緑強臨水玉照􅁂毛只恐山靈怪吾俗陂潮不盡水如天清波白鷗自在眠平時朝市手遮日思把一竿呼釣船驛􅀐回時山更好過雨秋容静如掃山英知我宦游心爲出清光慰枯槁可憐歳月易侵㝷慙愧山川知我心一行作吏豈得巳歸意乆在西山岑他年俗累粗能畢雲水一區供老佚舉盃西北酹山川爲道此言吾不食漫成人生各有適一受不可更違巳欲徇丗憂患常相嬰三軍護漢將九鼎調蒼生功名豈不羙強之輒無成朝昏忘寢食俯仰勞心形何如從所好足以安餘齡予也一丘壑野性真難名力懦謝提劒才拙慙窮經踈放巳成癖紛華誰與争驚鹿便草豐白鷗願江清不堪行作吏萬累方營營夜慮多俗夢曉枕無餘酲挂頰西山語適意千里羹塵土走歳月秋光浮宦情欲語固中趣知音耿晨星丗途古今險方寸風濤驚封侯有骨相使􅀑須銅腥誓収此身去田園事春耕淮南道中南楚二月雨淮天如漏巵畏塗泥三尺車馬真雞棲却思閑居樂雨具無所施髙枕聽簷聲爐煙暈如絲吾年過五十所過知前非顔􅁂日蒼蒼老境行相追􅥱橰聽俯仰隨人欲何爲歸計勿悠悠出處吾自知南渡國不競􅀳民益瘡痍陶翁遂超然不忍啜其醨北䆫談清風􅁣望犧皇時道喪可奈何抱琴酒一巵三年鎮陽逰春歸緑扶踈櫻笋媚園林日長閑枕書行復當此時涼塵暗歸塗會洗酴醿雪月波浮祕壷鎮陽亘西南山河在圖􅀞花雨草煙閒人家或僧舎經行毎悵然真賞知未暇待予藍輿歸香火復蓮社丁巳九月夢與范季霑同登北潭之臨芳亭覺而作詩記其事以示范髙陵五六松潭水涵清隂白鳥如避丗巢居得幽深雜花眩青紅苦節方森森何人作虚亭想像雲棲心我夢渉陳迹君亦同登臨相與定嘉名洗去花草滛看雲撫脩碧夕景低遥岑風林淡秋月霜枝鳴玉琴兩意誰識之好處煩幽㝷閑居志則同歳月能駸駸時無陶彭澤此曲難知音亭前有竒石遷流失山林頋亦如我曹􅁂髮風沙侵小兒重外物列屋享千金區區心甚長因循困華簪忽焉事大謬危機恐難任平生下澤車斯言吾所欽志士願不辱俗情便孔壬自喜迹猶淺鳬鴈容浮沉泥行自蕭散丗路皆﨑嶔此􅀖真可老城郭環清潯結廬與君俱開寫平生襟里巷日還往杖屨行謳吟還㝷夢逰處無忘神所箴庚申閏月從師還自頴上對新月獨酌伊昔三年前淫􅀨催行輈青燈忽今夕華屋映髙秋華屋亦何爲百年竟山丘適意在歸與肉食非我謀大塊本何事遑遑勞一生所過種陳迹歳月如流星貪夫甘死禍幅帋馳虚名晉室有先覺柴桑老淵明我家恒山陽山光碧無賴月窟䕃風篁十里㵼澎湃兹焉有樂地不去欲誰待自要塵網中低眉受機械人言歸甚易但苦食不足必使極其求萬鍾不盈腹處丗附所安無禍即無福却視髙蓋車身寵神巳辱我本山澤人孤煙一輕蓑功名無骨相彫琢傷天和未能􅃍免俗尚爾同其波梧桐喚歸夢無奈秋聲何孟夏幽州道上陘車轣轆旌旗却南行飛電隨馬足行窮清潁水不辨洗蒸溽吾生豈匏􅀲一􅀏爲捧腹燈花何太喜似報天􅀨霽客情念還家如瞽不忘視到家問松菊早作解官計青鏡髮蕭蕭及此霜雪未鳴蛙属官􅀻庸兒固可􅀏江山本誰爭但苦歸不早物情閑始見宛轉爲君好區區乞鑑湖多事憐賀老天下任之重人物古難得誰爲經濟才有亦未易識吾曹與雞鶩官倉等伏食行將問征途滿眼西山碧懦微莫如我往往從險艱譬之驅山麋八鑾困天閑豈惟物違性成功亦良難風煙念何地野水長松間出處士大節􅀝伏殊茫茫絕交苟不作自足存嵇康哲人乃知機曲士迷其方顧我􅀋社檪匠石端相忘問舎前年秋巳買潭西地髙明􅀑所瞰聊取風􅀨蔽瀕溪樹嘉木成隂十年計仍當作茅舎名之以今是斯言巳譊譊要未離憂患何時但飮酒臧否了不􅀜不飲逝者多秋草麒麟閑懷哉竹林人吾方仰髙山七月還祁洪河注天南兵氣撗髙穹我從兵前來歸心疾驚鴻官柳未揺落蓮荇香濛濛吏舎在前村舊年養踈慵爰自三軍去青苔瘞人蹤夕陽叩柴門歡迎來僕僮濁酒古罍洗停觴問新柗却對一床書睡鴨􅀌煙中土花暈湖玉冰絃冷霜桐燈火未可親露坐茅堂東西山月中淡夜茶煑松風到床便安寢不復知晨鍾平生幽棲心斯言略形容人道動有患百態交相攻而我觸􅀋真治容鄙青紅非才見臨事叩之輒空空知難不知回飄流劇飛蓬暫去聲利􅂣樂佚猶無窮况於得行意蕭洒畢此躬勿爲才者傳從渠作夔龍庚戍九日還自上都飲酒於西嵓以野水竹間淸秋巖酒中緑爲韻雞群媚稻梁老鶴日踈野人言隨其流故有不同者骨相乃封侯銅腥能使􅀑文章亦可憐不直一杯水在昔安九鼎功名照帛竹貞觀用玄成一士天下足憂國在肉食歛玉峩淸班吾曹漫浪人合眼松雲閒閑居度重九昔賢愛嘉名霜菊有正色糟床逢聖清平生一丘壑晩墮法家流一􅀧無俗物今年真好秋謝公旣經丗永懷東西巖翠䄂亂清光輕雲點風鬟我得秋風暇鱸魚一杯酒佳人發皓歌此樂當不杇去年哦新詩小山黃菊中年年說秋思逺目驚髙鴻韙哉生處樂陵谷異風俗南枝吾永安􅀏撫西嵓緑小飲邢嵓夫家因次其韻東風􅀄度野梅黃醉我東山雲霧牎只今相逢暮春月夜牀風􅀨翻寒江人生離合幾春事霜雪行侵靑􅁂􅀟大梁一官且歸去酒腸雲夢吞千缸閑居漫興歸田不早計歳月易云徂但要追蓮社何須賜鏡湖簿書欺俗吏繩墨守愚儒安得如嵇阮相從興不􅀌師還求歸鎮陽春風卷甲有歡聲漸識天公欲諱兵節物無情新嵗換男兒易老壯心驚落身丗網癡仍絶挂眼山光計未成聞道恒陽似江國一官漫學阮東平􅀄􅁲潭西新居喬木千章􅀞不如白鷗煙􅀨到江湖誰爲求仲營三徑竊比楊雄有一區故國興亡樹如此他年聲利蔓難圖屋西便與秋山約莫遣歸來見白湏􅀉王仲侯冰簟風簾千柱宫月華淸浸雪芙蓉誰教曉馬三千里好在行雲第幾峰酒市烏紗懷李白仙人鶴氅看王恭拍浮花裏知恩否􅀉與新詩洗醉悰有本事可發一􅀏讀踈詠之安陽對竹二詩懷家山次韻見意短髮新霜及未侵幾年和月買泉林偶然行李對寒碧憶得故園驚歳隂枕上秋嵐吹醉夢門前沙鳥立淸深箇中湏着翛翛玉落日微風伴我吟和子文寒食北潭夢裏潭光翠欲流何時春水一虚舟吾廬想見扶踈樹宦意渾如浩蕩鷗聞道西山明酒靣應無外物到眉頭别來誰唱驚人句十里珠簾有莫愁雪晴呈玉堂諸公雪晴松頂玉斕斑曉眼淸於化鶴山欲立凍雲搜傑句却思仙客退淸班􅉊毺帳底沉香火薝蔔花中碧霧鬟喚取廣寒修月手月波千丈捲春還和子文晩望醉眼郊原感􅁣生夕陽長向古今明髙人法士玄憎愛羙酒空名誰重輕二頃只謀他日老五絃猶喜晩風淸因君欲賦思歸樂安得穿雲一笛横兵府得告將還鎮陽府推官王仲侯以書促予命駕先􅀉此詩老􅂹心疲十二閑天教洗眼小江山名園無處不冝酒勝日有朋方解顔老木溪光留月駐禪房竹徑約花􅀜先憑樂府求風骨或有佳人字玉環渡混同江十年八喚清江渡江水江花􅀏我劳老境歸心質􅀌月倦㳺陳迹付驚濤兩都絡繹波神肅六合清明斗極髙湖海小臣尸厚禄夢㝷煙􅀨一漁舠􅀄至遵化岀山風物便淸和森木如雲秀靄多白水臨流照踈􅁂靑門折柳記柔柯重㳺化國驚歳月有象豐年占麥禾亦有黃公酒鑪在微官自要阻山河黃海棠淸隂不嘆晩㝷芳縹緲緗雲翠袖長蕚緑江花輸帶葉醉紅蜀􅃩恨無香南州氣味連三月東􅀳風流共一觴老眼寒來易愁絶温柔乞與醉中郷夜坐吾生有幾事無涯清夜漫漫歎物華但願聞鉦似疲馬可能粘壁作枯蝸只今雪屋重衾濕去歳梅溪醉㡌斜終得蕭閑對床語靑燈挑盡短檠花槽聲同彦髙賦糟床過竹春泉句聚簷秋􅀨喧踈溜過竹淸泉咽暗冰門巷蕭條三尺雪琴書寥落一龕燈彦髙詩也他日人云吾亦云自愛淳音含太古誰傳淸溜入南薫秋風幾共橙香注曉月曽和鶴唳聞我欲婆娑竹林國洗空塵耳正湏君韓侯晁仲許送名酒渴心生塵以詩促之好在銀缾秋露光借君雲夢到枯腸解澆萬里客愁破暫吐十年黃卷香江水苦揺梁苑夢海棠新學漢宫粧天東四月春如許坐待白衣投醉郷歩㝷野卉風煙草木照人明神藥竒花問識名聞道東州有仙窟欲㝷根撥學長生癸丑歳秋郊漫漫黃雲水清淺碧花無處亂鳴蛬此生愈覺田園樂夢裏曉山三四峯入􅀜宿昌平黃塵􅁍送入􅀜山自断何如二頃田記得鳴蛬碧花句蹉跎秋思又三年秋日風螢開闔度松隂松下飄然倦客心幾􅀧淸光照凉夜何時逺寺得幽㝷髙麗舘中二首蛤蜊風味解朝酲松頂雲癡􅀨不晴悄悄重簾断人語碧壷春筍更同傾晩風髙樹一襟淸人與縹甆相照明謝女微吟有深致海山星月緫􅀜情西京道中來時緑水稻如鍼歸日靑梢没鶴深莫忘共山買田約藕花相間柳隂隂銀州道中小渡霜螯賤於土重嵓野菊大如錢此時最憶涪翁語無酒令人意缺然髙昌館道中􅀨餘嵓石古苔靑松裏珠璣萬業明􅄅􅄅緑畦看鷺立深深靑樾有蟬鳴黃海棠輕如紅豆排冰雪一拂新鵝色更竒不覺濃隂破明玉有情誰解賞披離梅華的皪横枝愛老崔一尊長對􅀞圖開此生端有梅華分閑逺春風入手來蔡太常珪珪字正甫大丞相松年之子七歳賦菊詩語意驚人日授數千言天德三年進士擢第後不赴選調求未見書讀之其辨博爲天下第一歷澄州軍事判官三河簿正隆三年銅禁行官得三代以來鼎鍾彛器無慮千數禮部官以正甫愽物且識古文竒字辟爲編􅀋官丁父憂起復翰林修撰同知制誥改户部貟外郎太常丞朝廷稽古禮文之事取其議論爲多大定十四年由禮部􅀰中出守濰州道卒有續歐陽文忠公集録金石遺文六十卷古器􅀋編三十卷􅀘南北史志書六十卷水經􅀘亡四十篇􅀳陽志十二卷金石遺文跋尾一十卷燕王墓辨一卷傳于丗國􅀄文士如宇文大學蔡丞相吴深州之等不可不謂之豪傑之士然皆宋儒難以國朝文􅂀論之故断自正甫爲正傳之宗党竹谿次之禮部閑閑公又次之自蕭戸部真卿倡此論天下迄今無異議云野鷹來南山有竒鷹寘穴千仞山網羅雖欲施藤石不可攀鷹朝飛聳肩下視平蕪低徤狐躍兔藏何遲鷹暮來腹肉一飽精神開招呼不上劉表臺錦衣少年莫留意飢飽不能隨爾軰撞冰行舡頭傅鐵撗長錐十十五五張黃旗百夫䄂手略無用舟過理棹徐徐歸吳儂􅀏向吾曹􅀃昔歳江行苦風雪􅀭鎚啓路夜撞冰手皮半逐冰皮裂今年窮臘波溶溶安流東下閑篙工江東賈客借餘潤貞元使者如春風讀史夏氏不無釁作孽生妖龍蒼􅁎丁衰期玄黿㳺後宫天心未悔禍墜此文武功檿弧漏天網哲婦䲭梟同狂童一何愚巧言惟爾從殷鍳不云逺覆車還蹈蹤坐令周南詩悲入黍離風君㸔後庭曲曽􅀏驪山峯醫巫閭幽州北鎮髙且雄􅀝天萬仞蟠天東祖龍力驅不肯去至今鞭血餘殷紅崩崖暗谷森雲樹蕭寺門撗入山路誰道營丘筆有神只得峰巒兩三處我方萬里來天涯坡陁繚繞昏風沙直敎眼界増明秀好在嵐光日夕佳封龍山邊生處樂北山之間亦不􅁖他年南北兩生涯不妨丗有楊州鶴讀戎昱詩有作我家北潭邊溪流卧衡門俗客自不來好客時開尊路人或不知云是渭南村底事半年别此懷誰與論來時西郊林木末秋未老借筯數歸日廼復見冬杪心馳􅀝門望望我綿綿道慙愧戎子詩在家貧亦好感寓九宫名丗人制作歸一夔逹樂不逹禮漢儒言足嗤古人寓意耳結髦持鍜鎚俗子未易識絶藝聊相推坐令編簡門亦以專門竒疑是期字堂堂張長史楷妙丗莫知謂予言不信願視郎官碑風竹如水聲好竹風浙浙流水聲泠泠吾廬兼有此要是佳友生北䆫午夢断冷簟無飛蠅端疑故人至喚作寒泉鳴􅄃衣起徘徊自􅀏還自驚無須問形似自可名􅀟淸荷香如沉水新荷翠參差十􅅿藏漪瀾臨風􅀝雲蓋過雨驚珠盤夕陽香四來坐我西欄干三徑未論菊九畹空羞蘭聊分海南珎炷之古愽山誰能品優劣待以季孟閒鄰屋如江村斜川一壷玉川東三四家籬落半流水茁茁青蒲芽我爲水邊㳺月魄舒晴華隔籬見燈火兒語時紛㧝想像澤南州􅀉興棲雲霞從渠非知音我意亦自嘉保德軍中秋定羗城下河南流定羗城上三層樓使君置酒勞行役今夕何夕當中秋􅀌煙落日明天末洶湧碧雲俄暮合惺惺騎馬雨中歸造物戲人無乃虐紈如戍鼓方三更夢回一室還虚明岀門驚􅀏遽如許浮雲四卷秋天淸誰家髙㑹搴珠箔􅀏語聲從雲外落倦客明朝又短亭行人何似居人樂雪擬坡公韻門外黃昏噪晩鴉瑶塵細逐九雲車豐年待作三登兆暮景重開六出花濁酒無人同此興扁舟有客訪誰家明朝試望東林樹百尺寒梢􅀝玉义登陶唐山寺嶺外髙槐驛路長嶺頭蕭寺俯朝陽定知絶頂有佳處聊與廋藤㝷上方千里好風隨野色一軒空翠聚山光道人底是怜行役不惜禪床坐午涼到廣河淸漳節物似淸江不復蓴鱸夢故郷歷下果能留太白鏡湖端是屬知章身隨客路常岑寂心與沙鷗共􅄅茫尚困馬蹄三百里小舟聊欲過滄浪簡王温父昆仲荷鈿小小半溪香槐幄隂隂一􅅿涼飛絮亂將春色晩行雲閑属暮山長求田巳喜成三徑適意真堪􅀉一觴君是山隂換鵝手可無傑句傲風光秋日和張温仲韻二首琴裏忘憂盡日彈百憂俱息夜􅀄䦨靑燈把卷逢真味緑酒傾尊破薄寒月色半留梧影上露華應到菊花􅇛在家須信貧猶好夢想人間行路難照水踈林万木蒼迎軒爽氣一襟涼有時獨聽溪舂坐無事方驚晝景長雲薄西山聊隱見煙撗白鳥去微茫可憐􅀐省多秋思拘士安能識大方和彦及牡丹時方北趨薊門情見乎辝舊年京國賞春濃千朶曽開共一叢好事秪今歸北圃知音誰與醉東風臨觴􅀏我官程逺賦物輸君句法工却􅀏燕城花更晚直應趂得馬家紅戲楊新城長短亭中竟日忙解鞍􅀄喜水雲郷風前列席花鈿秀􅀨後行厨杏粥香春色紛紛驚過眼歌聲故故促傳觴蓬萊殿下同年客定􅀏狂夫老更狂和曹景蕭暮春即事户部尚書望之瓮頭春色開重酎門外春風改裌衣灼灼向來花又􅀏翩翩幾處燕于飛山隂未辨羲之集沂上聊從􅀧也歸節物驚心遽如許却因觀化識天機并門無竹舊矣李文饒甞一植之至今寺僧日爲平安報其難可知巳官舎東堂之北種碧蘆以􅀉意因作長句靑君那肯頋寒郷試着葭蘆擬汶篁有若何堪比夫子虎賁猶想見中郎色添新􅀨簾櫳好聲入微風枕簟凉他日東堂慙政拙只將此物當甘棠春隂城上春隂暗晩空城頭山色有無中似聞啼鳥來幽樹巳有㳺絲曳好風流水小橋歸未得落霞孤鶩興無窮林花不解東君意邀勒逰人未破紅􅀄至洛中水北酴醿半欲芳長條十丈更餘長春風得得憐覉客借與䆫攏六日香霫川道中扇底無殘暑西風日夕佳雲山藏客路煙樹記人家小渡一聲櫓断霞千􅀧鴉詩成鞍馬上不覺在天涯飲陳氏第代主人留客風定息林葉􅀨晴開夕陽停歌方待月挿羽且傳觴文舉客常滿次公醒亦狂更䦨君莫去促席就新凉􅀉通州王倅長夏少人事官閑簾户深枕凉秋入夢林宻翠交隂適欲非吾事謀閑遂此心絶交吾豈敢覔句識知音岀居庸亂石妨車轂深沙困馬蹄天分斗南北人問日東西側脚柴荆短平頭土舎低山花兩三樹􅀏殺武陵溪葵花北墉開處葉森森政以多花􅀒賞音小智區區能衛足􅀌忠耿耿秪傾心讀史伯陽名迹丗人知太史成書未免譏不是道家齊物我豈容同傳着韓非閭山西風絶境撫孤松千里川原四望通但恠林梢看鳥背不知身到碧雲中十三山下村落閭山盡處十三山溪曲人家􅀞幅間何日秋風半篙水小舟容我一蓑閑暮春陌上歌聲枕上聽秋千梧影兩亭亭春風三月正花好曉日一竿􅀄酒醒即事竟日開編樂有餘古人妙處不欺予胷中更着五千卷未到漢家城旦書燕山道中三首欵叚乗凉未五更徐河十里霧中行前村煙樹望不見欲到忽聞雞犬聲獨輪車重汗如漿蒲秸芒鞋亦販商我自行人更怜汝却應逹者􅀏予狂燕南趙北困風埃投宿雲居眼暫開明日都門選官路逢人羞道見山來太白捉月圖寒江覔得釣魚舡月影江心月在天丗上不能容此老􅀞圖常看水中仙雪谷早行圖冰風刮靣雪埋屋客子晨征有底忙我欲題詩還自􅀏東華待漏滿靴霜華亭圖頭無片瓦足無土不犯清波過一生釣得金鱗便歸去依然明月大江撗􅀞眉曲七首樓外春山幾􅀧螺樓頭望處染􅀟蛾不知深淺隨宜否却倩菱華問眼波小閤新裁􅀉逺書書成欲遣更踟蹰黛痕試與雙􅀟印封入雲牋認得無纎葉斜撗蜀柳條拂成風思自妖嬈元和才子才猶拙只對春風詠舞腰􅀞手新翻十様圖西廵故事出成都憑君列置華堂上與問丹靑解語無龍尾雲根玉作紋紋間有月半痕新若爲喚取文􅁎軰分付雲䆫筆下春未識春愁識曉酲嬌啼恰恰似雛鸎日髙阿母嗔粧晩促􅀞鴉兒轉不成時丗華粧巧闘春張卿態度獨清新五陵年少多才思數􅀧章臺走馬人髙内翰士談士談字子文一字季黙宋韓武昭王瓊之後宣和末任忻州戸曹仕國朝爲翰林直學士皇統􅀄預宇文大學之禍有蒙城集行于丗如云寒花貪晩日瘦竹強秋霜又題禹廟云可憐風􅀨胼胝苦後丗山河属外人時人悲之子公振字特夫亦有詩名梨花中原節物正梨花配寒食黄昏一􅀨過滿地嗟狼藉塞垣春巳深花事猶寂寂朝來三月半􅀄見一枝白爛熳雪有香瓏鬆玉仍刻芳心􅀧深紫嫰葉裁輕碧􅂴慢不岀門􅀟缾貯春色殷勤􅃒老眼邂逅慰愁夕一樽對花飲况有風流客酒䦨思故郷相顧空嘆息將赴平陽諸公祖席分韻作灞橋波似箭南浦草如裙此夜燈前淚他年日暮雲醉和醒一半悲與􅀏相分莫作陽關叠愁多不忍聞予所居之南下臨短壑因鑿壁開牕䂓爲書室坐􅀗山林之趣榜曰野齋且作詩約諸友同賦我本麋鹿姿強服冠與簪束縛二十年夢寐㳺山林朅來古晉國官舎南城隂鑿壁取踈豁開䆫舒滯淫山光射几席野色供登臨怡顔眄庭柯明目増遥岑草木逓榮落雲煙自浮沈玩彼物色變感此歳月侵兀坐獨無人窺簷囀幽禽誰知城市中門若郊居深巷陋顔子樂地偏陶令心一室亦何有狼籍書與琴晴暉朝徙􅀝皎月夜相㝷欲賦伴牢愁先爲梁父吟詩成輙自和酒熟時􅀌斟結茅會有期種竹當及今日來官更忙塵埃滿衣􅁭暮歸唯憊卧筋力殊不任常思返邱壑豈願紆朱金遥知北山處猨鶴餘淸音春愁曲壓花曉露萬珠冷金井咿啞轉纎綆寳階寂寂苔紋深東風揺碎緗簾影芙蓉帳煗春眠重􅖠外啼鶯喚新夢推枕起來嬌翠顰一線沈烟困金鳯㳺絲飛絮俱悠揚慵􅀝繡牀春晝長郎馬不嘶芳草暗半篩急􅀨飛橫塘次韻東坡定州立春日詩柳色看有未梅花折巳堪流年空客恨舊事與誰談落日窺愁絶東風半醉酣雲深歸曉鴈水暖浴春􅁞從事終無愧空餐色有慙家山方杳杳官府謾覃覃隱几心猶靜焚香鼻觀參語新憐鵲喜聲鄙惡鴟貪旅迹何時定歸心不厭南佳辰近燒燭盛事憶傳柑學業虚千卷生涯􅀉一庵誰能弔雙影無月不成三集東坡詩贈程大本十圍偏腹貯天真謀道重來不計身公業有田常乏食陶潛無酒亦從人異同更莫疑三語飢飽終同寓一塵待我南㳺載君去扁舟歸釣五湖春曉起戯集東坡句二首簟紋如水帳如煙一榻清風直萬錢困卧北􅖠呼不起老夫風味也堪憐清風終日自開簾吏散空庭雀噪簷午醉醒來無一事地偏心逺似陶潛秋興鼓角邊城暮􅀜河古塞秋淵明方止酒王粲亦登樓揺蕩傷殘歳棲遟憶故邱乾坤尚傾仄吾敢歎淹留村行墟落依林莽茅廬出短牆兒童避車馬父老饋壷漿半濕田新􅀨猶靑􅀥未霜逢人問豐歉一一歎聲長不眠不眠披短褐曳杖出門行月近中秋白風從半夜淸亂離驚昨夢漂泊念平生淚眼依南斗難忘故國情秋晚書懷肅肅霜秋晩荒荒塞日斜老松經歳葉寒菊過時花天闊愁􅀌鳥江流憫斷槎有巢相喚急獨立羡歸鴉早起曉起先烏鵲愁多竟不眠風霜嚴塞草星月淡秋天落葉親擕帚垂缾自汲泉禁門朝萬馬魂斷憶當年春日遟日回輕暖東風掃積隂客愁眉上見春意柳􅁁㝷健犢躬耕計歸鴻去國心醉郷如可隱㑹放酒杯深庚戌元日舊日屠蘇飲最先而今追想尚依然故人對酒且千里春色驚心又一年習俗天涯同爆竹風光塞外只寒煙殘年無復功名望志在蘇君二頃田次伯堅韻公道向來唯白髮浮生何處用黃金東風吹散三年恨春色驚回萬里心急景只教人貌改滄溟不放酒杯深異時儻及公榮酌凖擬歸來卧柳隂次韵飲嵓夫家醉中作月中招得飲中仙草露吹風洒淨便地有溪山真可樂人如冰雪自無眠淸新李白詩能勝勃率張憑理最玄功業本非吾軰事此身聊復闘樽前晚登遼海亭登臨酒面洒淸風竟日憑䦨興未窮殘雪樓臺山向背夕陽城郭水西東客情到處身如􅀉別恨他時夢可通自歎不如華表鶴故郷常在白雲中風􅀨宿江上風􅀨蕭蕭作暮寒半晴煙靄有無間殘紅一抹沉天日濕翠千重隔岸山短髮不羞黃葉亂寸心長羡白鷗閑濤聲午夜喧􅀌枕夢入瀟湘落木灣棣棠閑庭隨分占年芳裊裊靑枝淡淡香流落􅀌臣那忍看十分深似御袍黃雪簌簌天花落未休寒梅踈竹共風流江山一色三千里酒力消時正􅀝樓苦竹宻葉脩莖雨後新肯因憔悴損天真淸如南國紉蘭客痩似西山採蕨人睡起平生心性樂踈慵多病追歡興亦空睡起不知春巳老一簾紅􅀨杏花風楊花來時官柳万絲黃去日飛毬滿路傍我比楊花更飄蕩楊花只是一春忙此詩亦甞載橘林集中然子文集是其子特夫手録恐無悞收者故從之道中鳴鳩逐婦婦欲去燕子引雛雛不來樹底樹頭千􅀧􅀨山南山北一聲雷丙寅刑部中二首丗事邯鄲枕歸心渭上舟釁來無朕兆意外得俘囚忠信天堪仗淸明澤自流藜羹猶火食永愧絶粮丘幽囚四十日坐穩穴藜床縲紲元非罪艱難巳備甞全家音頓阻􅀌枕夢難忘㑹有相逢日牽衣話更長二月十一日見桃花鳴鳩天色半晴隂竹屋松䆫老寸心閉户不知春早晩桃花紅淺柳靑深志隱軒家居瀟洒似江村花草侵堦水映門元亮結廬山挂眼孔融好客酒盈尊肯敎軒冕移心志未厭林泉入夢魂我亦平生倦㳺客一㕓無處問東屯偶題羡他田父老於農逺是㽵西與舎東不似宦㳺情味惡半生常在别離中馬御史定國定國字子卿茌平人唐中令周裔孫少日志趣不凡宣政末題詩酒家壁有蘇黃不作文章伯童蔡翻爲社稷臣之句用是得罪亦用是得名阜昌􅀄逰歷下亭以詩撼齊王豫豫召與語大恱授監察御史仕至翰林學士石鼓自唐以來無定論子卿以字畫考之云是宇文周時所造作辨餘萬言岀入傳記引㩀甚明學者以比蔡正甫燕王墓辨􅀄學詩未有入處夢其父與方寸白筆從是文章大進自號薺堂先生有集傳于丗宿田舎狂風作帚掃春隂投宿田廬話古今尊俎只如平日事干戈方識故人心凄凉一樹梅花發迤邐千門柳色深天子蒙塵終不返酒酣相對淚沾襟清平道中􅁄林苦苣野花黃一馬駸駸渡漯陽别墅酒旗依古柳􅀧溪花片落新香伏波事業空歸漢都護田園不記唐今日清明過寒食又將書劒客他郷登歷下亭有感男子當爲四海逰又携書劒客東州煙撗北渚芰荷晚木落南山鴻鴈秋富國桑麻連魯甸用兵形􅀔接營丘傷哉不見桓公業千古遶城空水流長相思歷歷春陽􅀍群木白沙淺水明如鵠結廬聊可障􅀨風學道未能充耳目故人家居紫翠傍枳籬日落青山長歳云晏矣不可見望盡楚天飛鳥行客懷結髮㳺荆楚勞心惜寸隂草長春逕窄花落曉煙深􅂖旱惟祈雨年飢不問金三齊雖淡薄留此亦何心招康元質此生依著定如何不傍耕疇即釣蓑北阜平蕪隨鳥逺東湖新漲與天多詩成重墨題飛葉睡起輕芒路軟莎猶有客愁銷不盡風軒茶竈待君過雨晴離開化寺澗谷流秋水樓臺入暮寒連城遭雨積一日得泥乾利劒青鯊室名駒白鐵鞍回頭棲隱地風樹響􅃢􅃢秋日書事南山悠悠去天尺雀寒未晩爭投􅁄野人籬落不勝荒溪欲絶流堆亂石小園􅂼藥知有無未免杖藜煩兩屐霧蒙甘菊細莖紫風動牽牛晩花碧鄰舎翁歸竹几空秋天日落松䆫寂小盃翻酒足自娛閭巷浮沉真可惜讀莊子吾讀漆園書秋水一篇足安用十万言磊落載其腹北風熟柤梨冷日照鴻鵠人生固多事端坐至秉燭雪霽髙巖旭日吐深頳雪霽樓臺白玉京獨往南塘􅊥春色琵琶花下竹雞鳴寒食燕泥半落烏衣巷柳色全添緑綺䆫且伴丁香過寒食弄晴胡蝶一􅀟􅀟楊休烈村居籬落牽牛放晩花西風吹葉滿人家閉門乆􅀨靑苔滑時見鴛鴦下白沙㳺何氏園八尺龍虵薜荔墻瘦松踈竹更蒼凉梅花映水無人見隔岸飛來片片香四月十日遇周永昌二首竹裏㳙㳙􅀨未晴日髙䆫牖受虚明數家燕雀青雛出是處園林緑顆成貧覺酒盃真有味病思丘壑豈無情東山舊隱許相過他日秋原看耦耕㓜時種木巳巢鳶猶向花前作酒顚郭外靑山招曉岀圃中明月照春眠丗無蘓黃六七子天断文章三十年今日逢君如舊識醉持盃杓望靑天過李湘數樹髙槐散乳鴉時於缺處見黃花凉風不断如流水相對胡床坐日斜雪紅樓翠瓦不禁寒欲剪梅花去路難淨掃竹亭聊飲酒恰如明月照金盤懷髙圖南劉义一狂士尚得韓愈知君才百劉义知者果其誰三隨計吏貢躡屩㳺京師文章善變化不以一律持碧海涵萬􅀋青天行四時去年髙唐别河柳揺風枝今年清明飲髙花見辛夷兹來又幾日軍檄忽四馳尺書無處􅀉相見果何期白日開龍虵黃塵笳鼓悲春風獨無憂吹花發江湄一杯送歸鴈萬里􅀉相思送王松年之汶上去去東平道飛轅不可攀地鄰邾子國天近穆陵􅀜問俗徴前事移家􅁲好山溪堂醉花月春興幾時還香嚴病中九州四海盡行路萬户千門非我家金彈不徒驚燕雀春雷終待起龍虵題崇子中庵羨君髙節似陶潛五􅅿園林老不添遯丗人情雖淡薄開門秋色自清嚴案頭黃卷香終日砌下蒼苔􅀨一簷後夜中秋更應好隔䆫雲木看飛蟾郢州城西秋江白水浪花麁墟落人歸鳥自呼新月髙城三百雉角聲吹徹小單于送圖南壷觴送客柳亭東回首三齊落照中老去厭陪新客醉興來多與古人同戍樓藤角垂新緑山店檉花落細紅他日詩名滿江海薺堂相見兩衰翁秋日書事井邊薏苡吐秋珠舎下􅀲區雜芋區丗道未夷聊小隱不湏辛苦著潛夫村居五首溪頭梅是去年花閑日􅀄長逕竹斜向晩孤煙三十里不知樵唱落誰家蠶蠋成蛾桑柘稀海棠花發照牎扉離騷讀罷無人㑹獨立溪南看夕暉五月南風化蟪蛅野塘晩筍未成蒲檉花落盡紅英細沙渚鴛鴦半引雛柿葉經霜菊在溪天寒落日見雞棲田家有客篘新酒紅葉蕭蕭蓋芋畦歳暮行人竟不來空吟溪樹覓寒梅何時消盡􅀜山雪収拾春風入酒盃宣政末所作二首蘓黃不作文章伯童蔡翻爲社稷臣三十年來無定論到頭姦黨是何人山杏山桃取次開紅紅白白上樓臺移將海底􅃢瑚樹乞與人家也不栽中州甲集卷終
