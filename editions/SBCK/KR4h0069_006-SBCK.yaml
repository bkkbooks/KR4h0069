body:
  text: 馮内翰璧一十五首王内翰若虚三十八首麻徴君九疇二十五首劉御史從益三十三首宋内翰九嘉一十一首雷御史淵二十九首李右司獻能二十首王右司渥一十一首冀都事禹錫二首馮内翰璧璧字叔獻别字天粹承安二年進士歷州縣召入翰林再爲曹􅀰宣宗朝屢以使􅃌鞠大獄權貴如歸德知府宿州緫帥聲􅀔熖熖朝廷知其跋扈而不能摧伏者叔獻以法臨之毛髮不貸也㓜有重名就所長論之館閣臺諌與賔客言乃其選也徒以小心奉法不畏強禦故屢以城旦書屈之識者有用違其長之嘆興定末以同知集慶軍節度使事致仕居崧山龍潭者十餘年諸生從之㳺與四方問遺者不絶賦詩飲酒放浪山水閒人望以爲神仙焉山中多蘭毎中春作華山僧野客人持數本詣公以香韻髙絶爲勝少劣則有罰謂之􅋐蘭所釀松醪東坡所謂歎幽姿之獨髙者惟叔獻能盡之客有以京國名酒來與之校者味殊不能近正如深山草衣木食人語覺傭兒販夫塵土氣爲不可嚮也是後松醪􅋐蘭遂爲山中故事叔獻少日在太學賦聲籍甚其學長於春秋詩筆淸峻似其爲人字畫楚楚有魏􅀳間風氣雅爲閑閑公所激賞制誥典麗當代少見其比尺牘又其專門之學風流藴藉不减前丗宋景文左丞董公紹祖奉使江左得其詩餞行喜見顔間詩四韻毎誦一句輒爲一舉觴李右司之純談􅀏此丗爲不足玩見叔獻則必爲之􅋏然王延州從之公於鍳裁爲海内稱首敬其名德至不敢以同年生數之北渡還郷里年七十九終於家墓碑云所貴於君子者三曰氣曰量曰品有所充之謂氣有所受之謂量氣與量備而才行不與存焉本乎才行氣量而絶岀乎才行氣量之上之謂品品之所在不風岸而峻不表襮而著不名位而重不耆艾而尊是故爲天地之美器造物者靳固之不輕以予人閲百千萬人之衆歷數千百年之乆乃一二見之同乎其時非無孤雋偉傑之士從容於禮文之域角逐乎功名之地唯其俗不可以爲雅劣不可以爲勝故自視缺然陳太丘事業無聞而名重天下房次律坐鎮雅俗而舉世以王佐許之施之當時未必適用然千載而下有爲之歛衽者非品何以得之元光正大以來天下大夫士論公平生者蓋如此子渭字淸甫以門資敘仕爲宻院機察淸慎而文天下有馮孝子之目今居鎭陽同裕之再過㑹善有懐希顔寺元魏離宫十日來凢兩前與髯卿借齋奠少林往其時巳薄暮諸勝不暇訪今同魏諸孫再到風煙上寺僧導升殿雄深肅瞻仰柱礎門限砧追琢成大壯不見磨琢痕瑩滑明滉朗摩挲三嘆息後丗無此匠晚登西南亭碧玉對千丈如王官天柱如太華仙掌留宿賛公房秀色夢餘想夜靜耿不眠泉溜琴筑響惜髯今不來聮詩共淸賞和希顔虎守天門未易通􅁃塵無扇障西風主人何􅀒盗憎主公論不明私害公老伏固非千里􅂹冥飛似是五噫鴻紛紛往事渠知幾都付崧巓一􅀏中送國毉儀師顔企賢得請歸関中次朝賢韻心平窮富恐欺天靣有隂功蓋有年歸去靑山仁者樂秘來丹訣老而傳尚毉冗食渠百輩公論共推君十全技道精微仍逺引就非輕舉亦幾仙河山形勝圗書劒丁年記昔㳺中條之麓過蒲州地形西控三秦逺河􅀔南吞二華秋􅀳魏兵爭一春夢漢唐壇祀幾荒丘披圗吊古令人􅁣不必重登鸛雀樓雒帥覔蘭作詩以􅀉雲挿髙牙畫㦸森春移寳檻燕堂深水南紅藥初退舎嵩麓紫蘭今嗣音蠒足赬肩坐香累髙梁華棟豈渠心使君有問花應語玉樹誠佳非故林明皇擊梧桐圖三郎耳譜趂花奴風調才情信有餘天寳錯來非一拍霓裳中節亦區區送人出使陽春有脚蘓疲瘵水鏡無心照㓗汙九道澄淸天意切人才一一似君無習池醉歸圗襄漢方屯十萬兵習池日往不曽醒紛紛悮􅀳皆渠輩何獨王家一寜馨東坡海南烹茶圖講筵分賜宻雲龍春夢分明覺亦空地惡九鑚􅀺洞火天㳺兩液玉川風隂晦中忽見華山吏部能􅄏衡嶽雲坡仙曽借海宫春蓮峰清曉忽自獻二公何人予何人草堂春暮撗披遷客􅀝樓家萬里五陵飛鞚酒千金草堂澹與春山對幽鳥一聲春巳深元光閒予在上龍潭毎春秋二仲月往往與元雷㳺歴崧少諸藍襌師汴公方事叅訪毎相遇輒揮毫賦詩以道閑適之樂今猶夢寐見之兒子渭近以公故抵任城襌師附􅀉詩以叙疇昔未幾駐錫東庵因造謁閒出示裕之數詩醉筆縱橫亦略道崧逰舊事感嘆之餘漫賦長句二首性理諸方巳徧叅歸來一錫駐東庵山中蓮社舊招隱旅舎阿戎新對談詩筆如君僧有幾文章媿我老無堪綾書大字拈香䟽須趂微之酒半酣少林脩竹欲天叅竹外幽閑草結庵顧我雖存唯白髮與君曽此共玄談干戈撗絶境猶夢草樹荒殘人豈堪臈瓮松醪髯莫預啇歌悲壯不能酣雨後看竝玉所控諸峯竝玉如髙人壁立九千仞一日不見之令人生鄙吝春深木葉敷秀色益濡潤結茅􅀉僧藍晴碧時得趂老宿詫孫峯隅侍到齠齓連延靑一色枚數須諦認溟濛空翠閒我亦疑未信朝夾雲氣昬埋没瑜匿瑾如蒼梧政愁湘妃鬱思舜重隂俄解駮霮湗夕暉襯姢姢忽層岀歷歷分逺近雪峰互吞吐千狀􅂊一瞬岀竒如孫吴相降如廉藺如衆星拱辰如侯伯入覲接武如朋簮承迎如价儐􅀒固如吴楚争長如齊􅀳怪詭如夷蠻駢羅貢琛贐窘蹙如擒􅀗係纍將就釁如應龍神靈蟄卧時奮迅如天駟超軼坰牧稅羈靷如雄對改容失筯駭疾震如猛士無譁攅槊俟嚴陣獨兩峰巍然魁傑儼崇峻光輔岳柱天鬱爲中興鎮降生申與甫周室僨復振詩傳配崧髙百丗磨不磷同希顔怪松崧髙地氣靈花木競妍秀玉峰西南趾有松獨怪􅋘偃蹇如蟠螭奮迅如攫獸葉勁須髯張皮古鱗甲皺菌蠢藤癭怒支離笻節瘦月上虬影揺風度􅀨聲驟子落慰枯禪枝樛礙飛鼬盤根萬乗器平蓋千歳壽樵斤幸免㝷厦匠矧肯搆龍化㑹有時天旱期汝救王内翰􅀂虚􅀂虚字從之槀城人承安二年經義進士少日師其舅周德卿及劉正甫得其論議爲多愽學強記誦古詩至萬餘首他文稱是善持論李屏山柸酒間談辯鋒起時人莫能抗從之能以三數語窒之使噤不得語其爲名流所推服􅀋此釋􅄄鄜州録事歷門山令入翰林自應奉轉直學士居冷􅈰十五年崔立之變群小獻謟爲立起劫德碑以都堂命召從之從之外􅀂遜辭而實欲以死守之時議偁焉北渡後居郷里癸夘三月東游與劉文季輩登太山憇於黃峴峰之萃美亭談􅀏而化時年七十從之天資樂易􅀒海内重名而不立厓岸雖小書生登其門亦折行輩交之滑稽多智而以雅重自持謀事詳審岀人意表人謂從之於中外繁劇無不堪任直以投閑置散故百不一試耳自從之没經學史學文章人物公論遂絶不知承平百年之後當復有斯人不也子恕字寛夫攄憤非有驕謇心非徼正直譽浩然方寸閒自有太髙處平生少諧合舉足逢怨怒禮義􅀄不愆謗訕亦奚顧孔子自知明桓魋非所懼孟軻本不逢豈爲臧氏沮天命有窮逹人情私好惡以此常泰然不作身外慮贈王士衡王生非狂者乃以善哭稱每至欲悲時不閒醉與醒音詞􅀄惻愴涕泗隨縱撗問之無所言坐客􅀏且驚王生不暇䘏􅀂岀諸其誠嗟我與生友此意猶未明絲染動墨悲麟亡傷孔情韓哀峻嶺陟阮感窮途行涕流賈太傅音抗唐衢生古來哭者多其哭非無名生其偶然歟何苦摧神形如其果有爲爲爾同發聲貧士嘆甑無塵瓶無粟北風蕭蕭吹破屋入門四顧何悲凉稚子低眉老妻哭丗無魯子敬郭元振之真丈夫故應餓死填坑谷蒼天生我亦何意蓋丗虚名食不足爭如只使冗且愚大腹便便飽􅆝肉感秋西風撼庭柯踈葉鳴䇿䇿天地一蕭條羈懷亦岑寂靑春怳如昨轉盻年半百自從長大來轉覺日月迫功名非所慕老大不足恤怛然感時心自亦不能釋淸晨梳短髪巳見數莖白刀鑷雖可施殆似兒子劇此身委蛻耳毁棄無足惜况於毛髮間而乃強修飾靑靑如陸展星星行復出畢竟白滿頭復將何所摘生日自祝空囊無一錢羸軀兼百疾况味何蕭條生意渾欲失淸晨聞喧呼親舊作生日我初未免俗隨分略修飾舉觴聊自祝醉語盡情實神仙恐無從富貴安可必脩短卒同歸何足喜與戚一祈粗康強二願早閑適衣食無大望但要了晨夕萬事不我攖一心常自得優游終吾身志願從此畢失子妍研掌中兒捨我一何遽其來誰使之而復奄然去平生三舉子隨滅如朝露顧我能無悲其如有天數自從學道來衆苦頗易度有後固所期誠無亦何懼人生得淸安政以累輕故㛰娶眼前勞託遺身後慮百年曽幾何爲此雛稚悮顧語長號妻此理亦應諭憶之純三首㓜嵗永真契中年得偉人傾懐當一靣投分許終身燈火談玄夜鸎花逐勝春何時重一􅀏􅅐次欲生塵靣目三年隔音書萬里遥宦途俱蹭蹬日事各蕭條志大謀常拙身􅀌道易消本無當丗用隱處㑹相招雋氣輕天下髙情到古人衘柸曼卿放下筆老坡神時論誰優劣人材自屈伸窮愁須理遣不必淚沾巾復􅀉二首志大言髙與丗違拂衣具作竹林歸黃塵道口風波惡未必先生自處非自􅀏趨塵亦強顔食謀未免敢言閑紫芝果可充飢腹從子玉屏巖石間病中二首學道今何得謀生乆不成藍衫幾棄物絳帳亦虚名事拙應天意交踈即丗情煩憂時自解感觸又還生鬱鬱窮愁意營營乆病身詩情渾欲减藥物但相親未得驅窮􅀑終須問大鈞三時勞慰拊甚愧故人真感懐枉却全家仰此身書生那是治生人百憂耿耿填􅅐臆強作歡顔慰老親自􅀏酒得數柸還巳足詩過兩韻不能神何須豪逸攀時傑我自丗間隨分人别家到了身安是本圗何須身外覔浮虚誰能置我無飢地却把微官乞與渠慵夫自號身丗飄然一瞬閒更將辛苦送朱顔時人莫􅀏慵夫拙差比時人得少閑西城賞蓮呈晦之晦之自号放公舊賞回頭巳隔年髙花又見岀新妍偶成濁酒狂歌㑹恰及斜風細􅀨天樂事適來偏有興閑身常得分無縁作詩莫怪多誇語差比放公先着鞭題淵明歸去來圖五首此下皆中年所作靖節迷途尚爾賖苦將覺悟向人誇此心􅀂識真歸處豈必田園始是家􅀌雲出岫暮鴻飛去住悠然兩不疑我自欲歸歸便了何須更􅀃丗相遺抛却微官百自由應無一事掛心頭銷憂更藉琴書力借問先生有底憂得時草木竟欣榮頗爲行休惜此生乗化樂天知浪語看君於丗未忘情名利醉心濃似酒貪夫衮衮死紅塵折腰不樂飜然去此老猶爲千載人翰長閑閑公命題城南訪道圖戲作二詩且爲解之云得道由來不必勞癡兒舎父謾逋逃閑閑老子還多事時向招提打一遭竹木蕭森䕃緑苔幽襟自愛北軒􅄏主人無􅀃吾何問乗興而來興盡迴荅鄭下辨禪師見戲代防禦髙俟酒肆淫房緫道􅂣偶然游戲亦何妨阿師自墮泥牛趣更􅀏春風柳絮狂還家五首日日他郷恨不歸歸來老淚更沾衣傷心何啻遼東鶴不但人非物亦非荒陂依約認田園松菊存亡不足論我自無心更懐土不妨猶有未招魂山杏溪桃化􅁄榛舞臺歌榭墮灰塵春來底事堪行處門外流鸎枉喚人回思夢裏繁華事幸及當年樂此身閑立斜陽看兒戲憐渠虚作太平人艱危甞盡􅁂成絲轉覺讙華不可期幾度哀歌仰天問何如還我未生時山谷於詩毎與東坡相抗門人親黨遂有言文首東坡論詩右山谷之語今之學者亦多以爲然漫賦四詩爲商略之云絶足由來不可追汗流餘子費奔馳誰言直待南遷後始是江西不幸時信手拈來丗巳驚三江衮衮筆頭傾莫將險語誇勍敵公自無心與物爭戲論誰知出至公蝤蛑信美恐生風奪胎換骨何多様都在先生一􅀏中文章自得方爲貴衣鉢相傳豈是真巳覺祖師低一着紛紛嗣法更何人王内翰子端詩近來􅈝覺無佳思縱有詩成似樂天其小樂天甚矣漫賦三詩爲白傳解嘲功夫費盡謾窮年病入膏肓豈易䥴􅀉語雪溪王處士恐君猶是管窺天東途西抹闘新妍時丗梳粧亦可憐人物丗衰如䑕尾後生未可議前賢妙理宜人入肺肝麻姑搔背豈勝便丗聞筆墨成何事此老􅅐中自一天麻徴君九疇九疇字知幾莫州人三􅀊識字七歳能草書作大字有及數尺者故所至有神童之目章廟召見問汝入宫殿中亦懼怯否對曰君臣父子也子寧懼父耶上大竒之弱冠住太學有聲􅂣屋間南渡後讀書北陽山中其詩云讀書空山裏落月低巖幽山􅀑語夜半怪我非巢由又云壯士半凋落鐡花繡吴鈎始以古學自力愽通五經於易春秋爲尤長少時有惡疾就道士學服氣數年疾遂平又從宛丘張子和學醫子和以爲能得其不傳之妙大率知幾於學也專故所得者深飢寒勞苦人所不能堪者處之怡然不以累其業也甞爲郾城張伯玉賦透光鏡欽叔傳之京師趙禮部大加賞異貼壁間坐卧讀之興定末府試經義弟一詞賦弟二省試亦然簾試以脫悮下弟知幾先有才名又連中甲選天下想望風采雖牛童馬走亦能道麻九疇姓名正大三年右相侯蕭公趙禮部連章薦知幾可試館職乃賜盧亞榜第二甲第一人及第授太祝權太常􅀶士應奉翰林文字知幾資野逸髙蹇自便與人交一語不相入則逕去不返顧自度終不能與丗合未幾謝病去作詩工於賦物如夏英公􅂐韻其詩云千狀萬態了不同哭􅀑號神自兹始簡如庖羲地上畫繁如神農日中市圎如有娀乙鳥夘方如姜源巨人􅂂傾如怒觸不周山遡如逆上蠶叢水積如女媧石未煉碎如昆吾瓦經毀􅃖尤旗張尾後曲黄帝鼎成足下峙五丈專車断禹戈九日横天落羿矢流漦不去龍垂髯銜書怱來鳯挽觜方相四目闢門闕䕫牛一脛踔階戺貌似心猜未必然賴君注􅇚車南指及手植檜印章等詩可見也字畫正書八分皆有功詩㝡其所長少時猶失持擇近詩精深峭刻似其爲人他文不及也明昌以來以神童稱者五人太原常添壽四歳作詩云我有一卷經不用筆冩成展􅄏無一字晝夜放光明合河劉滋文榮六嵗有詩云鸎花新物態日月老天公劉微伯祥七歳被旨賦鳯凰來儀新恩張漢臣丗傑五六歳亦召入賦元妃素羅扇􅀞梅云前村消不得移向月中栽其後常隱居不岀餘三人者皆無可稱道獨知幾能自樹立一日名重天下耆舊如閑閑公且以徴君目之而不名也壬辰歳遇亂卒年五十平山常仲明之子德葬之小商橋傍近趙㽵賦伯玉透光鏡太隂淪魄元不耀太陽分光成二曜嗚呼怪銅盗此幻透影在壁與背肖奩􅄏㸌㸌光走庭劃如剸犀乍脫鞘泓澄秋落百丈潭疑有龍向天門跳秦娃漢婉化鴛士寵􅀨恩雲埋鳯詔當年椒塗鑑桃李身後泉臺映蓬藋枕簟無情草木香笙歌不暖梟狐嘯髑髏一醜不再妍不知持此將安照萬斛珠璣委俑人喚得偷兒成􅀑剽借問金椎一控時何如海上青蠅吊壽如金石佳且好此銘此􅂐兩竒峭今誰子後曩誰先贏得紐樞經蟻竅千古繁華一夢醒恍然入手稱神妙丹砂紫翠羽靑萬金難買人年少君侯新自洛陽來玉臺人物今温嶠相看大􅀏古人癡收鏡入奩還自􅀏跋范寛秦川圖山水人傳范家筆􅀞史推尊爲第一朅來因看􅁗川圖天下丹靑能事畢大山巖巖如國君小山鬱鬱如陪臣大石盤盤社與稷小石落落士與民一山一形似爭長一石一態如布軍想君􅅐中有全秦見鐻削鐻鐻乃真掌上長安近於日千樹萬樹生靑春憶昔岐山鳯皇語葱葱柞棫霑新􅀨昆夷束手宻須降不見功勲見歌舞黃金鑄牛西入􅈎五丁雲棧通中國驪山宫闕九天髙六處孱王走銜璧不信詩書信法家関東半被魚書惑盡卷圖籍亦大好五十年兇都一掃章邯董翳舉如毛沐猴冠委金陵道北原兵自天而下漢室傾頽如解瓦祁山六岀縱無功渭水猶堪飲君馬螭蟠老將骨未朽草付那能濟陽九技癢投鞭抵歳星歸來鹿死何人手神武空矜賀六渾投機常落周人後竟令馮翊軟沙邊東風一夜吹新桞侵㝷皁角相料理抛擲龍津浮汴水鷁頭過處巳非隋不覺􅀳陽人姓李華淸髙宴戞宫梧舞馬如何護兩都縱得靑騾還蜀道肉得沙􅂣白骨無興亡自取不足吁可憐神州爲盗區貪徴徃古山川事忘却題詩賞􅀞圖松筅同希顔欽叔裕之賦犧尊靑黃災木命羈絆剪剔傷馬性折松爲筅得之天此君幸免牋殘撗􅀄縁形似有代無不料竒功乃差勝人閒斤斧不須勞坐中活火鳴笙簫千秋蟄骨養霜雪一日奮鬛翻雲濤巖􅃄擊拂殷雷起顚風蹴踏銀山髙莫嫌勺水懦無力如捲三江都一吸借汝􅀊寒姿扶我衰朽質掃除幻夢不到眼洗刷埃霾下􅅐臆捫霞直與羡門期一􅀏桑田海波白竹癭冠爲李道人賦東方有物字豐隆以鳴爲職驅群聾萬頭濈濈囚凍窟欲岀不岀愁天公廻寒作煖出一噫黑帝不敢藏昆蟲所以獨爲六子長揮斥元氣周神功車轟鼓震頃萬里六甲雲風隨喚起四隂用事合収聲猶奮狂陽鳴不巳號令非時遭物玩草木不凋花再蕾惱得司秋訴帝􅕡漏泄機緘法當死天公大怪下桎梏推落車中墮巖谷非程非馬亦非人化作蒼莨一枝竹勁氣剛風難遽銷夜聞風􅀨猶蕭蕭聳身直上三千尺天公又怪干雲霄􅀑壓神縳不聽出只見白雲鎻三日雲散唯餘靑屈盤頥隱於臍變仙質道人真是萬物盗斫取爲冠就天巧秋霜爭敢上頭顱常與春風同醉倒此冠固竒惜未大有冠獨在方之外日月爲藤織四時烟霞爲樺綿千載天潢絶漢梁虚碧比斗旋衡簪沆瀣不隨脂粉侣狻猊不逐風霜陪獬豸一任旋乾復轉坤頭上峩峩終古在欲作檀那施此冠不識先生苦爲戴彈琴懐山中人門前雪垂垂室中理朱絲手按十三徽心飛天一涯故人􅄅何許萬里驚鴻飛試慿朱絲語一聲聲亦悲一彈雪欲落再彈雪正作只在此山中故人今憂樂我欲彈文王岐山雲渺茫我欲鼓曽子無田可耘耔道逺望不及千山復萬水思君復思君正恐須髯皤后䕫􅀂不來柰此宫商何春風早晩起百鳥喧庭柯時携一尊酒爲君奏雲和夏日亭柯碧合龍蛇影睡起轆轤鳴曉井一簾曉􅀨捲不晴槐花滿地黃金冷屈指西風又到門相思團扇欲生塵何時萬户垂楊裏髙揖金鞭逢故人牛嘆誰憐􅀫料一生無身後仍遭金十奴帷蓋却教蒙狗馬不知何事􅀒農夫淸明村村榆火碧烟新拜掃歸來第四辰城裏看家多白髮逰春緫是少年人暮春山家二首山煙向晩白濛濛人過梨花樹底風一犬不鳴村徑黒野燈􅀌起逺林中語䦨壯氣欲消磨奈此青燈永夜何壁上取琴彈一曲不知天外落銀河手植檜印章梁折山摧入小成日華留得寸暉明不盈一握空蟲􅂐未喪斯文粗姓名草木西周朝有暮圖書東觀死猶生二千年後司封細未信栽時出此情贈􅁉之向來三度見君詩常望西山有所思誰料并州天絶處相逄梁苑雪消時賢人樂古聲猶在聱叟文髙丗豈知只恐神嵩不留客秦川如􅀞渭如絲秋懐江山如􅀞衣冠盡蒲柳無情宫殿秋亦用此韻者也昨夜新凉御褐裘一番節物弄淸愁月懸􅀟杵􅀂爲夜人在一隅偏覺秋敗葉只能驚􅀞扇啼螿終不到朱樓還郷夢斷寒衾曉依舊雲山是蔡州和伯玉食蒿醬韻九尺東方生不如一侏儒飲啄各有程厚薄與生俱文蒲及屈芰何乃淡以枯正如謝三旌甘心作羊屠伊蒿本薪材豈足克庖厨薄雪草堂徑新霜古城隅河南地差煖冬有不死蕪靑來澗邊筥緑入几上盂微香能侣菊小苦賢於荼酷烈變醯醢薫醲破脂酥書生喜倒􅀃食亦變精麁借問冰茶者何如羔酒乎况爾蓼彼蕭蓬茆固其徒偶然躐一等遽欲忘樵夫邇來歳頗饑太半殣在途攘肉或至犬首丘不如狐命賤秪求死計窮交議逋尚有紈袴兒朝夕食於株寜知掃野椑一飽不易圖遂令人輕生不畏鑕與鈇如君有蒿醬猶是千金軀復次韻五臟太多可張頥託臞儒自非何曽家安得陸海俱莊周幸有粟不至魚肆枯何勞夷門市下車朱亥屠春韭與秋菘歳晚不供厨蒿腹不蒿目大方果無隅爲醬非􅀒口猶勝范萊蕪豈無靑精飯駐顔炊一盂豈無菖蒲歜辟邪如神荼又豈無椒花除瘟等酴酥蒿於數品中頗同武官麁數品雖異饌置之醬可乎猶材各有施豈必皆吾徒公綽優爲老劣於滕大夫大抵食如士取之非一塗君詩誌其味食經有董狐彼哉黿羹指斵棺終莫逋彼哉萍虀手竟死􅃢瑚株寜如醬以蒿不出本草圖蓋後人好竒一洗腥砧鈇爲謝饞祟􅀑渠今離我軀又翌日又爲􅂂道所戲其意似欲窮吾技再和前章書呈伯玉菣可爲炙啖博哉釋草儒奈何騷人詠不與蘭􅊉俱靑靑發陳荄嫰勝梯生枯靣柔似張禹氣冽如申屠忽逢易牙口一日登君厨君兄昔在日作事太廉隅㳺宦三十年不治一室蕪甞載米之郡政如置水盂不義􅀗八珎棄之猶堇荼相對話終日茗椀無塩酥見客惟恐遟遇飯不擇麁無食但有名窮不亦冝乎我本寒素士卧雪􅀽司徒臭味偶相似豈是敦薄夫見君食蒿醬取嘲於仕途和君蒿醬詩緼袍隨衣狐詩醬兩情苦此債無由逋蒿荻無棄材奈此蒼松株何當列鉶瓮一依饗禮圖唯聞廣庭樂不見轅門鈇此日雖無醬猶堪養羸軀元􅁉之以山遊見招兼以詩四首爲􅀉因以山中之意仍其韻石華政可採􅀒我􅀌舟蓬胡爲紅塵裏擾擾槐安宫山間緑蘿月一照千巖空洪崖去不返淸游誰與同空餘松根泉􅄂佩流無窮人心墮泥滓不如與天通舉頭視霄漢浩露洗心􅅐日月兩角蝸天地一粒粟老盆可徑醉豈擇瓦與玉大􅀏區中人朱門丐梁肉淸曉登少室日夕眺王屋紫煙晞我髮碧霞貯我腹溪中有白雲萬事付濯足物物愜幽情不獨蘭與菊南風入桂樹髙葉碧崢嶸舉手戲攀折上與雲煙撐黃金間白玉遍地先晶熒笙簫坐間發鸞鶴空中鳴浩歌山谷應起舞衣裳輕一尊石上酒如我浩氣盈目送飛鴻盡靑雲萬里平國風乆巳熄如火不再然流爲玉臺詠鈆粉嬌華年政須洗妖冶八駿踏芝田靑苔明月露碧樹凉風天塵土一一盡象緯昭昭懸寂寥抱玉辨爭竟揺尾憐幸有元公子不爲常語牽許方邨即事聮句體披􅀬逹許方山巔靑漫漫野黃麥初割畦緑蔬􅂊灌村籬檾葉深巷樹春花亂煙長見新治風逺聞淸鍜濯衣女在溪販鐵人栖舘墻危壘破石路黒沾遺炭山雲頃刻􅀨沙地須􅁷暵鐸鳴駕犢耕􅇁宻防雞散繰餘殘繭挂釣罷么系貫沽酒有客賖鬻李何人喚朴􅃤官始威牒煩民更玩歴險小車多逢人黯衣半縣逺肉難求山近宼可逭何當卜隱居㝷我杖藜伴梁山宫圖梁山宫髙髙切雲􅁗家簫鼔空中聞宫殿作雲王作龍何人敢謁滈池君珠圍翠繞窮天下道上行人衣半赭不覺生靈血液枯化爲宫上鴛鴦瓦朝盧生暮侯生師事二人學羡門焉知以政藏其身神仙亦死何曽神空能詐取六孱國不識盧生真間客種成間􅂩盧生去尚令道士作􅀑語祖龍竟墮此機中以璧見欺猶未悟魚腥引得扛鼎來梁山火滅漢旗開何如後丗丹靑手一夫不役千樓臺梁山之圖却傳丗梁山之宫安在哉跋伯玉命簡之臨米元章楚山圖巴東峽壁如駮霞天鑿荆門當虎牙下有奔湍沉碧沙直衝北顧如投家雲煙昬曉互明滅朝看沃日暮呑月逺山如指近如奉過客那知空一瞥髙人廬此恨來晩不厭􅀌蓬疊往返莫言造物好窮人許大乾坤冨君眼以心爲鏡照諸山山如人靣紛殊顔扁舟日日靑山上靑山却在滄波間人道癡兒固貪取我怪髙人亦如許巳將􅅐次祍長江更把豪端扛巨楚薺列楓林葉浮舸巧促魁梧入么麽丈㝷収拾無邊春千里逰邀坐中我自此頭吴尾甌越蠻􅃄五月髠人髪江山多處乃爾毒始信中原天下甲楚山可覧不可上水氣昬昬且多恙􅀞山縱不到真山有楚之峯無楚瘴靜明居士見山饞想在庵中得飽叅戲呼老李臨君􅀞已坐君貪我更貪秋􅀨小霽湖陽道中一􅀨􅀄晴菊瘁花朝來啼殺報晴鴉地鄰異域空懐古人對殘秋更憶家十月紅爐是明日往年新火醉流霞忩忩又上湖陽道何處還堪駐客槎秋望雲氣東南壯風煙正北長逺人投屋小寒草帶城荒馴鴨便秋潦飢牛背夕陽閑情儘堪􅀞未要􅀨浪浪堂谿城南感寓斷岸崩崖帶草長茂林髙塏晚生凉田頭經水成駒卧雲色因風變狗蒼戰地尚餘唐壘柵故城曽入楚封疆牛童趂日貪捫虱那解興亡事可傷俳優施能賣􅀳移君貳旃解譏􅁗救陛􅀰多少諌臣飜􅀗罪却敎􅀂輩管興亡李道人家山圖見􅀃髙齋住太行溪山襟帶古祠堂圭桐葉落周家􅀨鐵樹根盤􅀳國霜烽火不堪耕夜月􅀞圖猶可掛殘陽自怜不及汾川鴈春去秋來過石梁李道人嵩陽歸隱圖城郭維崇井里維通冠蓋維錯紈綺維藂云誰之子招子歸嵩舎我箏筑樂彼潺淙食彼瓦􅇲遺我鼎鍾云誰之子繪子歸嵩離人友鹿避俗朋松石嚙我足泉癭我嚨吾恐時人􅀏子歸嵩有山有怪有水有龍盗出宼没嘯兕咻熊吾恐狂人誑子歸嵩子謂我言决意歸嵩歸嵩何如如鴻避弋如鶴脫籠與幻俱化與化俱融是以歸嵩南山重重翠如植葱北山隆隆紺如堆銅仰嵩俛嵩􅀨濯雲烘嵩之爲我我之爲嵩我聞子言衣如張風心先去鳥層雲盪胷靜言思之冨爲目蒿貴爲心蓬飾􅀃于令詎知任公歸嵩良是生􅀛脫筒子不歸嵩送子歸嵩陽夏何正卿作疊語四句未成章予復以疊語􅀉之凡四變文緼緼蠢蠢何等民矯矯亢亢内守真昂昂藏藏獨異俗落落莫莫不厭貧歸與歸與且餬口鳯􅀆鳯􅀆德衰乆樂云樂云無絃琴命乎命乎一柸酒匪鱣匪鮪故爲藏避言避丗必也狂至大至剛秣吾馬爰淸爰淨修我牆用之捨之時所係􅀳如摧如寜復計煖然凄然任春秋優哉游哉􅂓卒歳紅梅一種冰魂物巳尤朱脣􅀧注更風流歳寒未許東風管澹抹穠粧得自由劉御史從益從益字雲卿南山翁撝之曽孫大安元年進士拜監察御史坐與當路者辨曲直得罪去乆之起爲葉縣令修學講義聳善抑惡有古良吏之風葉劇邑也兵興以來户减三之一田不毛者萬七千􅅿其歳入七萬石故在也雲卿請於大農爲减一萬民賴之流亡歸者二千餘家未幾􅀍召百姓詣臺乞留不聽入授應奉翰林文字踰月以疾卒時年四十四葉人聞之以端午罷酒爲位而哭且立石頌徳以致哀思之心焉雲卿愽學強記於經學有所得爲文章長於詩五言古詩又其所長雷御史􅀃雲卿在太學時年甚少甞有詩云黃金錯落雲間闕紅粉髙低栁外墻時輩皆推伏之其卒以詩得名者固巳見於此矣雲卿詩如荒烟斜日村村晩衰栁寒蒲岸岸秋兩郷留寓風黧面千里相望月滿􅁭子美不妨衣露肘長卿猶有賦􅓸雲春雪云千層寳樓閣一片玉山川臨終云壞壁秋燈挑夢破老梧寒雨滴愁生此􅀋甚多不能悉載也有蓬門先生集行於丗二子祁字京叔郁字文季俱有名於時題蘓李合􅀞淵明濯足圖天機本自足人事或相須東坡􅀞三昧廼與龍眠俱黃州冨丘壑餘杭􅄅江湖巳困口嘲弄更堪手糊塗其來本㳺戲所到非功夫平生斜川翁尚友千載餘可聞不可見風摽定何如􅀏倩李居士爲予巧形模臨流想有詩滄浪元非漁不入聲利埸政恐吾足汚二公有深意百年留此圖不着色塵相澹然如游天地􅀄主人牢緘縢丹靑有渝此不渝過尉氏懐阮籍朝來國門逰暮抵蓬池􅀫有懐阮歩兵豪氣無撿束嘯歌陟髙臺長風振林木老眼何曽靑四海無一物萬古留詩名九原消醉骨居然方丈家惜也微瑕玉塗窮道不窮先生安用哭泛舟回瀾亭坐中作昔年醉回瀾猶恨身屬官今年邂逅來身與亭俱閑洗心亭下水照眼亭西山溪山如故人喜我復來還有酒澆我􅅐有花怡我顔韝鷹乍脫臂但覺天地寛山隂忽回舩夜䦨情未闌樂山松樂山一何崇上有千嵗松淸􅀌月露底秀拔天地中蒲柳抱常質桃李􅄏芳容爭如十八公􅀏傲冰霜風居然喜避丗不肯汚秦封蟠如北海螭伏如南陽龍紛紛過者多匠石終不逢明堂幾時搆喚起蒼髯翁和淵明雜詩俗士苦紛競此心本無塵功名廼外物了不関吾身吾身復何有形神假相親天地􅄏一室日月挾兩鄰有生即有化如晏之必晨但得酒中了亦足稱逹人揮戈欲却日小力自不量何如任天運閉門坐齊芳詩書列四隅着我於中央夏臥北䆫風隆冬曝朝陽但有藜藿羹亦足充飢腸少爲飢所驅老爲病所迫人生能幾何東阡復南陌急須沽酒來一􅀏舉太白浩歌草木振起舞天地窄同歡二三子誰主復誰客浮沉大浪中畢竟歸真宅歳月去何速老炎變新凉㳺子乆不歸回首望大梁風埃􅃤如此何處真吾郷野菊明落日林楓染飛霜勸我一柸酒悠然秋興長和淵明始春懐田舎家食自不惡菽水甘清貧學道未有得讀書亦良勤雖勤竟何補俛首愧古人靜言閱丗故來者日月新况復抱沉痾百憂無一忻安得衛生訣益我華池津怳如一夢覺不與萬法鄰野人借問我恐是劉遺民和淵明飲酒韻日入了公事援琴洗塵喧秋堂一燈明清響到夜偏彈罷枕書臥􅄅然夢靑山山英向我問君駕何時還家僮忽喚覺惆悵不能言臘日次幽居韻丗務方擾擾人生何營營不如不岀門坐頥天地情泰中有否來隂極即陽生掀髯一􅀏起䆫外風鐸鳴㸔雲偶獨立踏雪時閑行最愛朝日外􅀒暄向南榮歳除夕次東坡守􅀊韻人生都百年誰問􅋐􅀛蛇容顔鏡中換老醜不可遮殷勤守此嵗來歳復如何南鄰􅀕竈喧北里驅儺譁須􅁷罷無爲但聽樓鼓撾明朝四十過暮景真易斜初心自慷􅁣白首還蹉跎􅀉語少年子雖徤不足誇次韻别歳一日復一月其來不肯遟一冬復一春旣去誰能追問嵗果安往懵不知津涯常於􅀊除夕知是相别時鄰翁慣禮餞買酒烹鮮肥百挽不得留一别那須悲年年例如此華髮吾何辭惟有學道心自覺老不衰次韻餽歳親朋餉無時鄰里歡有佐况當歳之終可以具百貨禮意各示勤手叚不妨大我貧無往還閉户但髙卧藜羮且充腸珎味不登坐猶勝許文休衣食岀馬磨自非楊子雲載酒何人過空吟餽歳詩自歌還自和淸明即事用前韻一度淸明了一年温風嫋嫋􅀨班班幾家繡幰㝷芳去何處蹇驢䭾醉還􅀫草新墳驚丗短落花流水占春閑曉鸎啼破松䆫夢缺月東南掛屋山五月十四夜對月有感丗事易隨雲變滅人生難保月團圝淮陽旅舎三年夢河朔風聲五月寒何處雲山端可老向來天地爲誰寛宦游脚底生荆􅁄蜀道而今却不難再過郾城示伯玉知幾三年兩度過溵陽鞍馬紅塵道路長花月不應知我老溪山也解􅀏人忙朔風凛凛頻驚坐夜􅀨蕭蕭偶對床他日水南營葬地愧無遺愛在桐郷次韻閑閑公夢歸眉間喜色幾時黃滿貯覊愁着瘦腸萬里郷関飛不到十年歧路走空忙盃心蘸月松梢影鼻觀通風栢子香最愛南山舊山色夢中相覔不相忘題閑閑公夢歸詩後用叔通韻學道幾人知道味謀生底物是生涯莊周枕上非真蝶樂廣柸中亦假蛇身後功名半張帋夜來鼓吹一池蛙夢間說夢重重夢家外忘家處處家送儀提􅀧西歸自斷平生不問天拂衣歸去任吾年五侯鯖飽無多味九老圖成又一傳叵首京華瞻日逺放懐郷社得天全綸巾醉卧咸陽市始信人間有散仙再賡人定端能坐勝天刀圭有力制頽年道非岀丗頭頭是丹不遺經口口傳隂魄沉迷終􅀑録陽精飛錬即神全三山縹緲誰能到目下身安亦是仙次韻李公度缾有儲糧􅁂有絲蹉跎歳晩坐書癡輞川􅀞隱王摩詰錦里詩窮杜拾遺應舉尚陪新進士主文半是舊相知春闈看决魚龍陣未必尖錐勝鈍錐題無盡藏梁斗南所藏􅀞誰􅄏天地秘宻藏今古人間用不窮眼尾揺光千丈月耳根傳響一溪風勝游赤壁文章在髙卧燕山氣象同二老風流􅄅何許後生猶可畫圖中三弟手植瓢材且有詩予亦戲作爲愛胡盧手自栽弱條柔蔓漸縈回素花飄後􅀄成實碧䕃濃時可數枚試問老禪藤繳去何如㳺子杖挑來早知􅉚落終無用只合江湖養不才次韻三弟贈南庵老人一庵礴勝巢仙不入叢林怡是禪花圃蓮塘閑打景粥盂齋鉢老隨縁忘言巳了八千偈適意更揮三兩絃邂逅我來推不去坐分一半好風煙次韻劉少宣旅䆫蝶夢曉驚廻黙數流年秪自哀與丗迂踈甘袖毛及身強徤且衘柸桐彫翠葉看看盡菊着黃花旋旋􅄏杖屨南庵訪幽事秋光滿眼送詩來酬李子遷曽著朱衣侍冕旒忽乗羸馬岀皇州靑山有約携琴往白髮無成把鏡羞却􅀏張儀誇舌在不妨巢父有詩留柳湖莎徑東南夢又見兒童迓細侯過洧川次侯生君澤韻誰能􅀌憤效韓非且喜玄微對鏡機出得山來無逺志􅀉將書去有當歸閑居巳判平生了真賞從教舉丗稀日咀道􅃾深有味更須口腹事甘肥聞蛬用少陵韻唧唧不堪聞村居更惱人靑衫傷乆客華髪念􅀟親嵗莫那逢􅀨秋宵未向晨石心猶可轉百感本來真除夕用少陵韻䆫送迢迢漏燈􅄏艶艶花正愁聞過鴈乆客羡栖鴉放眼春猶好驚心日又斜一蓑江上􅀨歸思浩無涯即事卧疾劉公幹躬耕鄭子真溪山留好客天地許閑人花醉紅沾袖松吟翠繞身捫心無所歉持此壽吾親宋樓道中十里羊腸路詰盤過花穿柳幾廻還馬頭忽轉靑林角緑繞人家水一灣過武丁廟旱則爲霖水則舟􅀂人端合夢中求荆王枕上陽臺雨板築英雄老死休戲荅侯威卿覔墨萬松火厄化緇塵依舊徂徠雪裏春冷劑香螺䕫一足破慳分與􅀞眉人宫中取張遇墨燒去膠以之􅀞眉謂之􅀞眉墨北園碧梧斜影落胡床白葛烏巾滿意凉宴坐不知紅日晚笋輿歸路麥花香宋内翰九嘉九嘉字飛卿夏津人黃裳榜進士乙科歷藍田髙陵扶風三水四縣令皆有能聲入爲右警廵使應奉翰林文字正大中病失音廢居殁於癸巳之禍甞有詩云浩歌風露下醉袖拂南山又題壽安煙霞亭云粧鑾土壁紅千􅀧界畫銀沙緑一鈎其才藻可略見矣途中書事三首㓜穉扶輪婦挽轅連顚翁媪抱諸孫飢民羸卒如流水掘盡原頭野薺根老稺扶携訪熟郷驛塵滿路殣相望終朝拾穗不盈把只有流民如麥芒攘絲奪麥人爭略烘日吹風天有年湯餅元非小人腹蠒絲都作大夫賢館中納凉書事凉洒塵纓聵耳醒虚堂窈􅄅好風淸雀知愛子來迴哺䑕不畏人旁午行每用熟眠酬􅞔寂端知固有享髙明宦游非不佳官府奔走塵勞漫一生東州有感東城衰草没黃沙故壘周遭小范衙牧竪那知真老子􅀛趺繫馬卧吹笳搗金明砦作建除體建牙誓諸將梟鳴軍盡驚除道非戰事銜枚幻竒兵滿鎧霜日輝行陣寂無聲平旦飛岀谷桑棗蔽金明定知此陳迹中原遮㓂城執鞭吾不及范公凛如生破碑字仍在屭贔卧深荆危襟按其壘信哉天下英成敗翻覆手狐兔今橫行收復㑹有時夷吾當請纓􅄏圖聣督亢按劒逐長鯨閉塞亦巳乆一揮氛曀淸􅀍檄從軍不巾不襪柳隂行朝醉南村暮北㽵一旦捉將官裏去直駈盲馬陣中央即所乗盲馬而言留别孫俊民姚公茂草根殘日射離觴主席風生􅀬肺腸此去兠零紅照夜輸君吹笛傍糟床酴醿菊酴醿風味醺人醉着莫東籬愛酒翁一夜金英全換骨冷香晴雪滿秋風蓮社圖野鶩家雞俗好乖虎溪泉石滿塵埃壯哉砥柱頽波裏惟有淵明挽不來飛卿不喜佛法自言平生有三恨一恨佛老之􅀃不出于孔氏前二恨辭學之士多好譯經潤文三恨大才而攻異端淵明挽不來之句蓋自况也卯酒臈蟻􅀄浮社瓷篘􅀫酲正渴卯時投醉郷兀兀陶陶裏底是形骸底是愁雷御史淵淵字希顔别字季黙同知北京路轉運使事思之季子崇慶二年黃裳榜進士甲科釋􅄄涇州録事徐州觀察判官召爲荆王府文學兼記室叅軍轉應奉翰林文字同知制誥兼國史院編修官拜􅁥察御史以公事免用宰相侯莘卿薦除太學慱士還應奉終于翰林修撰􅀄在東平東平河朔重兵處也驕將悍卒􅀝外㓂爲重自行臺以下皆務爲摩拊之希顔􅊩官自律者甚嚴出入軍中偃然不爲屈不數月閭巷間家有希顔􅀞像雖大將亦不敢以新進書生遇之甞爲户部髙尚書所辟櫂遂平縣事時年少氣銳擊䑓右發姦伏一縣畏之稱爲神明及以御史巡行河南百姓相傳雷御史至豪猾望風遁去正大庚寅倒迴谷之役希顔上書破朝臣􅀌注之論引援深切灼然易見而主兵者沮之䇿爲不行至今以頋望爲當國者之恨希顔三歳喪父七歳養於諸兄年十四五貧無以爲資乃以胄子入國學便能自樹立如成人不二十游公卿間太學諸人莫敢與之齒渡河後學益􅀶文益竒名益重爲人軀幹雄偉髯張口哆顔渥丹眼如望羊遇不平則疾惡之氣見於顔間或嚼齒大罵不休雖痛自摧折然猝亦不能變也生平慕田疇陳元龍之爲人而人亦以古人期之故雖以文章見稱在希顔仍爲餘事耳雲卿父子有宛丘之行作二詩爲餞陽春到上林百卉紛白紅岸谷稍敷􅃾溪光亦冲融獨有石間栢不落鼓舞中期君如此木歳晩延淸風漢庭議論學傾耳待歆向君家賢父子千載蔚相望讀書二十年閉户自師匠異端絀偏雜陳言刋猥釀剛全百鍊餘氣岀諸老上頽風正波靡去去作隄障京叔將拜掃于陳徴言爲贈老嬾廢學茫無所得獨記其與屏山雲卿􅁭期所在者非以爲詩也梁苑池塘生緑煙吹臺草色春芊芊故人幽扄閉長眠氣槩英英猶眼前陽春無力􅂫重泉孝子感時涕泗漣匍匐歸掃淮陽阡徴予贈别意拳拳我自頑頓須人䥴安能視後輒子鞭姬情孔意星日懸斡旋萬化中持權斯文興喪實関天㝷常墨客技藝然毉巫星曆相比肩何用雕琢空徂年即今海縣謾腥膻獨挽洙泗可洗湔廼公有志屏山賢二豪在日予牽連傷哉未售墳巳顚老我欲種南山田子之兄弟其周旋事業絶勝空言傳同􅁉之欽叔分韻得莫論二字㓜安謝辟命子雲老寂寞趨嚮豈獨異時命非所度我乆困流離一㕓求􅀒郭雖無斬敵功尚舉力田爵崧少啓吾封四履盡伊洛有客來問津醉眼入寥廓丗事乆閉眼終日只睡昏淸風何處來佳客巳在門倒屣往從之玉色向我温妻孥趣作具歡喜傾瓶盆淸夜襆􅀍往共就遺山元嘲謔及俳語發揮閒微言懸斷漏天樞髙嘯驚鄰垣脗合政相和意到俄􅀌騫恨不倒囷廪矧肯留籬樊弃屩􅀗珠玉披榛見蘭蓀我肱巳三折醉墮偶全渾知無適俗韻量力任灌园二君淸廟器巾􅇈華罍尊蒼生望休息朝廷待崇尊出處旣異途㑹合難預論此樂未易得此夕勿憚煩白酒舉􅀄子黃雞溷諸孫水樂喧後部山鬟秀前軒一醉萬事休啇聲滿乾坤㑹善寺怪松物生自有常怪特物之病嗟嗟此老蒼怪怪生魁柄侏儒蹙髀股􅀫瘤擁腮頸蜿蜒蛟龍戲騰擲貙虎競須髯喜張磔意氣怒狂迸匠石求棟楹節目足譏評芻蕘急薪槱堅悍空盻瞪靜言觀􅀝伏未易相吊慶雖違時丗用顧免斤斧撗陽秋莫榮悴歳月何究竟盤盤曲則全挺挺獨也正小草悮掃迹㐲神還守性儻隨天中景廣宇共庥映玉華山中同􅁉之分韻送欽叔得歸字洗耳潁川水療飢西山薇山川得佳客草木生光輝末路風敎薄此道日巳微相期千載事非君誰與歸九日登少室絶頂同􅁉之分韻得蘿字閑居愛重九佳人重相過登髙酬節物少室鬱嵳峩迤邐謝塵土夷猶出煙蘿歘如據鰲頭萬壑俯蜂窩浩浩跨積風濔濔􅄅長河日車昃紅輪天宇凝蒼波指􅀧數齊州始覺氛埃多我無􅀝天劒有淚空滂沲驚鱗盼奥渚倦翼占危柯悔不與家來結茅老巖阿歸途睠老阮廣武意如何月下仝飛伯觀畦丁灌園得畦字村居鄰老圃喘汗憫夏畦轆轤徤晚凉月輪轉天蹊剡剡金融溝㳙㳙冰冸溪黃萎漸蘇息緑潤俄凄迷生意續夜氣甘滋浹新荑風露觸處香河漢望中低野人無逺謀且喜豐食鮭雖愧下帷董稍悟養生嵇歸懐自浩然流光挹平西濟南珎珠泉大地萬寳藏玄冥不敢私抉􅄏靑玉罅渾渾流珠璣輕明疑夜光㓗白真摩尼風吹忽脫串日射俄生輝有時如少靳觱沸却纍纍風色媚一川老蚌􅀄未知君看一日間巧歴所不貲逰人隨意滿不􅂌乾没兒吾謂歷下城繁華富瑰竒貪夫死專利帝意怜其癡故露連城珍可玩不可幾􅀂曰天壤間所遇皆汝資何必秘篋笥自貽伊瑕疵詩成一大􅀏臆􅀃量天機讀孔北海傳漢室風流絶建安老瞞父子力排山可怜魯國真男子也着區區七子間賦侯相公雲溪相君􅁭度本汪洋戲鑿陂池便􅄅茫解起晴雲作霖􅀨更邀明月貯淸光千重􅃨嶺藏仙境萬斛香泉釀醉郷畢竟麟符抛不得煙波空效五湖蒼贈陳司諫正叔洗兵有志挽天河補衮剛留諫諍坡賦岀石腸還婉麗政成鐵靣却中和寒侵桃李淒無色雪壓池塘􅃤不波急手尊前謀一醉六街塵土涴人多濟南汎舟水底見山有感而作南山巳在風塵外更恐飛埃涴碧巔一棹晩凉波底看浴沂靣目本天然洛陽同􅁉之欽叔賦日上煙花一片紅崧邙西峙洛川東􅂊聞候􅀐傳靑蓋又見牽羊岀絳宫事去関河不撗草秋來陵寢但飛蓬書生不柰興亡恨斗酒聊澆磈磊􅅐啓母石同􅁉之賦千古崩崖一罅􅄏強將神怪附郊禖無情頑石猶胎謗貝錦從爲巷伯哀贈荅麻信之并序麻弟避兵渡河徑謁􅁉之于崧髙夤縁一見相與之意甚厚旣留數日又將過吾景玄于女凢之隂維元劉國士也而弟游於其間則弟之爲人可知巳臨行復長歌相贈淸平豐融蓋他日未易量也愛仰不足詩以送之五老英靈未陸沉一枝髙秀出詞林珪璋自是淸朝器律吕偏諧治丗音此去文章足知已後來功用只齋心濟時相約元劉了索我雲山深復深雪風定雲仍煖天圍四顧低紛紛俄攪野浩浩欲平溪樵檐歸時重漁舟望處迷飢鴉空繞樹􅀂箇可安棲宫鴉萬樹瓊芳鎻漢宫群鴉容與五雲中曙光先背朝陽日春信頻呼禁籞風靑􅁂巧梳欣一色秀眉學􅀞闘新工鳯樓未訝啼聲切愁滿長門信未通洮石硯緹囊深􅃨有滄洲丈室春融翠欲流退筆成丘竟何益乗時真欲礪吴鈎馬上見桃花九衢鞍馬苦塵腥忽見溪桃倦意醒未必施朱便麁俗最憐滌露出娉婷城東詩老圖幽絶水上仙􅀰記窈􅁳何似玉堂留故事賣花擔上有丹靑叔獻兄歸隱崧山有詩見及依韻奉􅀉幾百千年一敬通飄飄歸袂振􅀌風平生自處神明在衰俗無從議論公韶箾向來儀彩鳯弋繒何苦慕􅁳鴻他年杖屨相㝷處三十六峯雲霧中劉御史雲卿挽詞二首氣幹叅天擬萬㝷聖門梁棟自堪任豸冠岳岳鋒稜峻鳧舄翩翩惠愛深可忍佳城玉埋土最哀慈幄血霑􅁭傳家頼有􅀟珠在不爾何如慰士林少同里閈早知音投分交情􅀨舊今郷校聮裙春誦學上庠連榻夜論心南山松桂愁霜殞北地乾坤恨日侵不得生芻躬一奠西風吹淚满衣襟題黃華江臯烟樹二首踈桞靜茅亭亭下長江路不見亭中人蕭蕭烟景莫江山萬里眼一亭略約之黃華未死在看取畫中詩送李執剛致仕歸洛漕計中興屬老成引年陳請獨崢嶸果能辦此公真勇愛莫留之我愴情塵坌恐驚黃鵠舉烟波不􅀒白鷗盟洛陽去去春如錦晝日神仙看地行梨花得紅字雪作肌膚玉作容不將妖艶嫁東風梅魂何物三春在桃臉真成一􅀏空􅀨細無情添寂寞無情亦作淚痕月明有意助豐融有意助亦真態更相如病渴妨文賦想像甘寒結小紅河山形勝圖髙峯巨壍與天連中國関防表裏全北岸塵氛重回首不如圖上看風煙次􅁉之韻兼及景玄弟名腸相焮半成􅁅戰退紛華斾始廻文字喜逢修月手津梁愧乏濟川材等閑有酒輒共醉信口俄詩不置才最憶平生劉子駿紫芝可惜不偕來愛詩李道人􅀂愚崧陽歸隱圖我家崧前凢再朞詩僧騷客相追隨春葩􅌭紛香澗谷夏泉噴薄淸心脾霜林置酒曵錦障雪嶺探梅登玉螭重陽夜􅀫太平頂天雞夜半鳴喔咿整冠東望見日出金輪湧海光陸離神州赤縣入指顧風埃未靖空嘘欷窮探極覧不知老泉石佳處多留題簡書駈出踏朝市期㑹迫窄愁鞭笞􅁭懷塵土少淸夢齒頰􅁄荆真自癡叩門剥啄者誰子道人靣有熊豹姿披圖二室忽當眼貫珠編貝多文辭我離山乆詩筆退摹冩豈復能淸竒東風吹客衣敗絮逐風飛曉雪没寒薺無物􅂶朝飢空簞嘖嘖號飢䑕饕虱蠕蠕縁破袴人生豈是犬與雞終歳區區守門户㳺􅀃萬乗苦不早儀秦殆是穿窬盗六國印千金車滿眼榮華鏡中老孔子聘列國孟軻㳺濟梁能令千載後名與日月光男兒生丗不虚生死恨身後無聲名不然鳴玉㳺紫京不然著書談六經九日可射天可􅀘鞭笞百蠻作降虜離騷一篇亦不惡雄筆盤盤映千古君不見彩鳯翔丹霄一鳴應九韶寸雲起太山霖雨滿人間丈夫窮逹果在天安用兒女得志相歆羡失志相悲怜仰天大􅀏出門去四海今誰魯仲連夜􅀫虚皇閣下􅀝天靑壁截雲霞一水髙懸界削􅀲不惜竛􅿓攀石磴要看絢爛坼雲華玉峯影裏虚皇閣鐵笛聲中祕監家明日川塗入塵土却應平地幾褒斜玉華谷同希顔􅁉之分韻得秋字玉龍落峽噴飛流空翠霏霏晩不収軟脚山堂一壷酒暮凉閑對兩峯秋四皓圖弋繒安足致冥鴻自是兼懐翊賛功謾說壷関有遺老望思臺上巳秋風韶華過眼弦上箭人生得酒從歡醼北斗闌干夜叅半耿耿踈星淡河漢追憶潁亭泛舟􅀉陽翟諸友十月冬氣寒淸霜殞群木輕舟泛潁水微風吹野服信流不知還石艇撗老玉苔花錦斕班懸溜珠䍡􅝹頗離㕓市雜倒㵼軒裳俗􅀊月今幾何春草萋以緑懐歸劇飢渴仰羡􅀟飛鵠矯首九山雲迢迢傷逺目郟城秋夜懐李仁卿日入羣動息暝色隂濛濛故人隔潁水嫋嫋生秋風輕風捲纎雲碧漢磨靑銅坐乆襟袖凉皎月升天東伊人如此月霽色羅心􅅐可望不可親倐巳駕飛鴻念此太虚間心交神自通而况千里月相望寜不同􅀌光透薄帷儼如接音容翻翻繞枝鵲唧唧侵堦蛬上床轉不寐髙樓待晨鍾相思夜何永月落秋床空題飛伯詩囊飛伯以布爲囊采當丗名卿詩投其中頴露毛錐秪自賢智如樗腹但求全迂踈差似淵才冨羞澁猶無杜老錢収拾珠璣三萬斛貯儲風月一千篇嘔心大勝奚奴錦要與風人被管絃送王飛伯歸陽翟物外根株本仙種丗間紅紫避嚴粧遨頭詞伯今何遜一􅀏詩成字字香丹陽觀竹宫中移賜素士如林侍紫淸紫淸新許住蓬瀛姢姢粉節霜匀出矗矗煙梢玉削成福地根莖蒙化育中天􅀨露惜恩榮緑章封事朝來奏又聽風前彩鳯鳴王右司渥渥字仲澤以字行興定二年進士調管州司候不赴壽州防禦使􅀖獻商州防禦使國器武勝節度庭玉愛其才連辟三府經歷官在軍中凢十年舉寜陵令未赴丁太夫人憂廬墓三年服除復授寜陵正大七年朝廷與宋人議和擇可爲行人者仲澤以才選凢再至楊州制司宋人愛其才有中州豪士之目使還以寜陵課㝡遷一官入爲尚書省􅁺三月即授太學助敎充樞宻院經歷官八年院廢權右司郎中中牟失利不知所終仲澤􅀶通經史有文采善談論工書法妙于琴事詩其專門之學人物楚楚若素宦于朝吏事則與兾京父相上下其辨􅀶又屏山所許天下談士三人之一也甞與予行内郷止中馬上賦詩云霜風十月餘千山錦崢嶸又九日登潁亭見􅀉云茫茫襄城野歳晏多風埃野田半巳荒草蟲鳴更哀西風吹白雲大隗安在哉七聖之所迷而我胡爲來我本林野人􅀄無經丗材失身鞍馬間坐令􅀟􅁂摧安得元紫芝共舉重陽柸詩成西比望九山鬱崔嵬此詩脫遺處不復能記憶讀之尚可以見斯人胷懷之髣髴仲澤潁上詩不才􅀍棄飜爲福拙計無營却似髙是處靑山可埋骨誰家白酒不消憂夕陽轉屋卧林影急􅀨壊橋喧水聲人喜傳之潁亭三載西湖阻勝逰潁亭􅂓喜散羇愁九山西絡煙霞去一水南吞澗壑流賔主唱酬空翠琰干戈横絶自滄洲怱怱疋馬從軍去慚媿煙波萬里鷗有􅀉十年鐵馬暗京華客子飄零處處家征鴈乆踈河朔信小梅重見汝南花棲棲活計依簷雀冉冉年光赴壑蛇舊􅀨故人應念我不來聮句夜煎茶􅀉京父憶昔相從在寢丘城南城北縱歡逰杏花聮句香隨馬野水添杯浪拍舟邂逅又成三月别飄零合􅀒一春愁汝陽淮甸經行徧應有新詩爲我留餐秀軒秘風幾日揺霜樾秋色南山兩竒絶野人䆫戸終日開要看千秋􅁗嶺雪層崖深谷相吐吞落日白鹿東南奔野花􅀟塔古蘭􅀂樓觀縹􅄅煙霞昏玉山生玉人不識草木四時空好色輞川舊與藍橋通細水至今流石室一川黃葉長安秋望望不見令人愁書生不是濟時具収得閑身成此逰主人開筵留客醉山􅀨多情濕征􅃑明朝􅀐馬上七盤廻首山家但空翠遊藍田甲申之秋月建戌我行商顔正落木山英似與行子期撥霧披雲到山腹古潭千丈照錦峰下有蟄龍上棲鵠髙風吹雪巳多時熊耳􅀟尖寒欲縮新乗一水出龍渦驚見千峯遮木槲南山秀拔北山雄劒㦸森然對羣玉﨑嶇直過藍田西始見商山真靣目悮真峽口忽中斷天末脩眉􅀞濃緑此峽何年得此名曽有金仙構華屋西巖石室懸細水萬斛瓊珠輸輞谷行人尚􅀃有七盤瘦馬巳愁疲百曲風門放眼望秦川擾擾更嗟塵界跼去年游􅀐渡葭蘆萬里撗行如􅀑速㶚陵原下馬飲血太華峰頭虎擇肉今年九月未防秋始見登􅂣有新􅂖一鞭暮指古招提踈􅀨有情留客􅀫主人聞客喜相接尊酒􅀏談如昔夙蹇予􅈸散本真性臨水登山此生足一行作吏志益違十載從軍􅀟􅁂秃官家後日鑄五兵便擬買牛耕白鹿送􅁉之還嵩山髙懐不受簿書侵淸潁鷗盟欲重㝷老去宦情知我薄閑來道念見君深對床夜􅀨他年夢滿馬西風此日心嵩頂勝游誰得共仙聞仙馭待知音末句用古仙人詩語古仙人辭今附於此夢入雲山宫闕幽鸑鸑同侣鴛鳯流桂月竟夜光不収丗俗擾擾成囂湫醉飛星馭鞭金虬八仙浪迹追真㳺􅀛玉筌蹄二十秋摩霄注壑須人求覔劒如或􅀏刻舟陽燧非無甪綺儔元鼎以來虚崑丘東井徒勞冠帶修松飡竹飲度蜃樓崧頂坐嘯垂直鉤秪應慚愧劉幽州知音者無惜留跡興定庚辰夏六月望予與河南元好問趙郡李獻能同㳺玉華谷又將歷崧前諸刹因憇於少姨廟元周行廓廡得古仙人詞於壁間然其首章直屋漏􅀨爲所漫剥殆不能辨乃磴木石而上拂拭汛滌迫視者乆之始可完讀觀其體則柏梁事則終始二漢字畫在鍾王之間東井又元鼎所都幽州必賢宗子虞也夫眷眷不忘幽州者非吾田疇尚誰歟田復所事之讎却曹瞒之賞衰俗波蕩中挺挺有烈丈夫風氣其死而不亡蓋無疑其能道此語亦無疑觀者不應以文體古今之變而疑仙語也噫仙山靈岳宜有閎衍􅀶大之真人往來乎其間而丗人莫之識也予三人者乃今見之夫豈偶然哉再拜留跡以附知音者末渾源雷淵題此詩爲仙語無疑然直謂田疇則似亦未安屏山李純甫題逰丹霞下院同􅁉之鼎玉分得留字霜落豐山白水収歳華全在竹園頭賦詩鞍馬慚真賞載酒林泉阻勝游野色自隨人意逺夕陽應爲鳥聲留仙源回首旌旗隔一笛西風喚客愁丹霞下寺土人以竹園頭名之驛口橋看白蓮隂隂喬木障晴暉的的冰蕖照碧漪秋暑困人仍御扇晩風生竹却添衣百年蓬􅁂関心切千里蓴羮與願違杖屨頻來約他日不妨先築釣漁磯蒙城縣齋榖􅀨連朝没麥􅂣官糧未入長官忙堦庭有􅀨靑鞋閙牢户無人白日長三門津層崖摩蒼穹四月號隂風大河三門險神禹萬丗功他山亦崔嵬砥柱獨尊雄雷霆日闘擊悍􅁀愁天公劉侯智有餘始令舟楫通仍餘石上穴飛棧曽連空遥瞻白玉枝梃植丹竈中仙公去不返此事真冥蒙夫人與鼓崖怪幻尤難窮獨喜兵火餘巋然出新宫當時䟽鑿意四海要㑹同誰知千歳後築壘防嘯兇詩成一大􅀏浩浩洪波東􅀍檄再至楊州制司驛亭有題詩譏予和事不成者云來往二年無一事靑山也解􅀏行人因爲解嘲二年奔走道途間知􅀍靑山􅀏往還只向江南南岸老行人應更􅀏靑山冀都事禹錫禹錫字京父龍山人崇慶二年進士調沉丘簿與縣令者不相能及令以贓敗疑京父發之乃賂遺權貴誣京父以賔客依託之事坐廢十年朝臣薦其才者積數十人終爲銓曹所礙居襄邑部使者起之攝旁近諸縣所至有父母之愛農司治許昌又爲主事區處餽餉上下千餘里不露聲跡而條畫次弟皆具雖鱗雜米塩􅀂不足經意者問之即應如指諸掌一時吏如康伯禄李欽止諸人多自以爲不及也正大中當路諸公極力辨其􅀍誣乃得以常調守扶風丞召􅀘省􅁺不就歸德奏充知事及城􅀍攻京父爲經歷官守禦之䇿一府􅀝重之車駕至授左右司都事兼應奉翰林文字官奴之變家人勸京父羸服免禍不從人有自外至者京父問賊入禁中否曰禁中賊滿矣乃自投水中在京師時希顔仲澤欽叔京父相得甚歡升堂拜親有昆弟之義而不肖徒以文字之故得幸諸公間希長予六歳澤長四􅀊欽與京少予二歳希殁於正大辛卯之八月年四十八澤殁于明年之七月年四十七欽殁于其年十一月年四十一歳京殁于又明年之三月年四十二蓋不二三年而五人者唯不肖在耳今日録諸君子詩感念平昔不覺流涕之被靣也僧房上方樓觀裌衣寒霜後川原眼界寛我是禅房未歸客阿師休作長官看贈雷御史兼及松庵馮丈平生疾惡如風手力振臺綱事所難人道千鈞羞射䑕我怜衆喣解漂山明時士論知無􅀒晚􅀊交盟豈易寒見說嵩前茹芝老白雲􅀝杖待君還中州己集卷終
